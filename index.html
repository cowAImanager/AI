<p class="rb-p">문제는 높아진 영양 수요가 부실한 사료 품질과 겹칠 때다. 이때 체내 에너지·단백질 비축분이 일정한 우선순위에 따라 동원되는데, 기초대사가 가장 먼저고 그다음이 ① 먹이를 모으는 운동 ② 성장 ③ 최소 에너지 비축 ④ 현재 임신 유지 ⑤ 비유를 통한 자축 생존 ⑥ 2차 에너지 비축 ⑦ 수태를 포함한 번식 기능 ⑧ 3차 에너지 비축 순이다.</p>
<div class="rb-caution"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg><span class="rb-tag">주의</span><span class="rb-tt">번식은 끝에서 두 번째 — 적시 수태의 역설</span></div><div class="rb-cc-b">장기 수익성에 가장 중요한 &#x27;적시 수태&#x27;가 이 위계에서 끝에서 두 번째로 우선된다. 그래서 교배 직전(임신 후기·비유 초기)에 영양 부족이 생겨 체내 비축분이 크게 동원되면 수태 지연이나 실패가 일어나기 쉽다. 수태 지연은 자축이 동기축보다 어리고 가벼워 총수입 손실, 수태 실패는 그 암소가 매각되어 수익 잠재력이 조기에 끝나 손실로 이어진다.</div></div>
<p class="rb-p">한 마리에서 나오는 평생 순수입이 크지 않으므로, 임신 후기·비유 같은 고우선 대사가 일어나지 않는 시기에 전략적으로 에너지·단백질 비축분을 쌓아야 한다. 그래야 농후사료 급여를 최소화하고 번식우가 영양 수요의 대부분을 방목 조사료·거친 사료로 충족할 수 있다.</p>
<div class="rb-sub">12개월 생산주기 — 영양요구의 결정 요인</div>
<p class="rb-p">번식 암소가 임신→분만→비유→재임신까지 도는 데 12개월이 필요하고, 그 사이 어느 시점에 자축이 이유되며 비유가 급작스럽게 멈춘다. 출생·이유처럼 갑작스럽게, 임신·비유처럼 연속적으로 영양요구가 바뀐다. 수태 간 12개월 간격은 다태를 빼면 사실상 번식 육우의 생물학적 최댓값이고, 분만 간격이 12개월을 넘는 암소는 적시 수태에 실패해 도태 위험이 있다.</p>
<p class="rb-p">표 31.1은 생체중 589.6kg(1300lb) 헤리퍼드×앵거스 암소의 12개월 주기를 보여준다(절식 체중=생체중×0.96, 산유 정점 9.75kg/일, 비유 210일, 출생체중 36.3kg 가정; 열중성·사사·건조 피모·이온운반체 무급여·체중 변동 없음 전제). 이 표의 가치는 산유·태아 성장·자궁 발달을 받치는 영양요구 변화의 &#x27;크기&#x27;를 체감하는 데 있다.</p>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">요구 변동의 크기 — 한눈에</span></div><ul><li>유지 정미에너지(NEm): 8.94 → 산유 정점 15.94 Mcal/일 (+78%)</li><li>임신 마지막 달: 모체+임신자궁+태아가 하루 1.54kg 증가</li><li>그 증가의 약 40%가 임신 자궁 단독 몫</li><li>임신 자궁+태아 합계 약 60kg (출생체중은 36.3kg에 불과)</li></ul></div>
<p class="rb-p">요구가 교배·분만·이유 시기에 맞춰 예측 가능하게 출렁이므로, 관리자는 언제 그 일이 일어나는지 알고 필요할 때 표적량의 영양소를 공급할 수 있어야 한다. 상당한 운동·열 스트레스·피모 악화는 번식에 충분한 체내 비축 유지를 더 어렵게 한다.</p>
<div class="rb-sub">체형 점수(BCS) — 영양 관리의 출발점</div>
<p class="rb-p">체형은 골격을 덮은 근육과 피하지방의 상대량이며, 체형 점수(BCS)로 정량화한다. 가장 흔한 체계는 9점 척도로 BCS 1이 극도로 수척, 9가 극도로 비만이고 최적은 5~6이다. 성장·비육 소의 체중 정량 관리는 쉽지만, 미국 번식우 농장엔 저울·사료배합 소프트웨어 같은 자산이 드물어 BCS 변화를 증체의 대용 지표로 쓴다.</p>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">BCS별 공체 지방·단백 비율 (표 31.2)</span></div><ul><li>BCS 1: 지방 3.77% / 단백 19.42%</li><li>BCS 2: 7.54 / 18.75</li><li>BCS 3: 11.30 / 18.09</li><li>BCS 4: 15.07 / 17.42</li><li>BCS 5: 18.84 / 16.75</li><li>BCS 6: 22.61 / 16.08</li><li>BCS 7: 26.38 / 15.42</li><li>BCS 8: 30.15 / 14.75</li><li>BCS 9: 33.91 / 14.08</li></ul></div>
<div class="rb-clinical"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v6M9 5h6M6 9v4a6 6 0 0 0 12 0V9"/><path d="M6 9H4M18 9h2"/><circle cx="12" cy="19" r="2"/></svg><span class="rb-tag">임상</span><span class="rb-tt">BCS 1단위 ≈ 절식 체중 45kg — 증체 역산</span></div><div class="rb-cc-b">8편의 보고를 평균하면 BCS 1단위 변화는 절식 체중 41±5.8kg에 해당하는데, 안전하게 45kg(~100lb)으로 반올림해 쓴다. 활용 예: 후기임신 90일 전 BCS가 4인데 5로 올리려면 45kg 증체가 필요하고, 45÷90 = 하루 0.5kg 증체 → 체중의 2.3~2.7% 건물 섭취량으로 사료를 배합한다.</div></div>
<p class="rb-p">대부분의 BCS 체계는 최대 30m 거리의 시각 평가로 고안됐지만, 시각 평가는 골격 차이·위 충만·피부색·피모 두께·조명·거리, 그리고 여러 평가자 탓에 오류가 크다. 그래서 의사결정 나무(표 31.4)와 함께 쓰거나, 촉진(palpation)으로 평가하면 시각적 편견과 위 충만의 영향을 줄일 수 있다.</p>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">BCS 촉진법 (단계별 — 만질 부위)</span></div><ul><li>① 어깨 위 봉우리(기갑) 바로 뒤 &#x27;등뼈 가시뼈(극돌기)&#x27;: 손바닥으로 눌렀을 때 압력 없이 만져지면 ≤5, 눌러야 만지면 ≥5</li><li>② 어깨 앞끝(견단)에서 뒤로 30~40cm 갈비뼈: 압력 없이 만지면 ≤4, 약간 눌러 만지면 ≥5; 손가락으로 피부를 집어 좌우로 밀어 스펀지처럼 미끄러지면 ≥6</li><li>③ 꼬리 뿌리(엉덩이 뒤 미근부): 평평·단단하면 6, 양쪽에 물결 모양 지방이 잡히면 ≥7</li><li>④ 뒷다리 허벅지 뒤쪽 큰 근육(반건양근): 꼬리 뿌리와 뒷다리 관절(비절) 중간에 사과 크기 지방 덩이가 잡히면 ≥8 (양쪽 대칭 확인)</li><li>⑤ 보정틀에서 나갈 때 움직임이 심히 어려우면 9</li><li>장점: 속도·일관성·교육 용이 / 단점: 보정 필요, BCS 1·2·3 구분엔 시각 보조 필요</li></ul></div>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">BCS 시각 부여 의사결정 나무 (표 31.4 요지)</span></div><ul><li>BCS 1: 신체적 쇠약+근위축 뚜렷+늑골 전부 보임+무기력</li><li>BCS 2~3: 근위축 뚜렷, 늑골 다수, 극돌기·요각/좌골단 보임</li><li>BCS 5: 근위축 없음, 보이는 늑골 0~2개, 흉판 지방 약간, 운동 정상</li><li>BCS 6~7: 미근부 옆·유방 내 지방 침착 시작</li><li>BCS 8~9: 후대퇴근 지방 침착, 운동성 다시 느림·무기력</li></ul></div>
<div class="rb-clinical"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v6M9 5h6M6 9v4a6 6 0 0 0 12 0V9"/><path d="M6 9H4M18 9h2"/><circle cx="12" cy="19" r="2"/></svg><span class="rb-tag">임상</span><span class="rb-tt">측정 최적 시기 = 이유 직후</span></div><div class="rb-cc-b">번식 암소의 가장 가치 있는 연간 BCS 평가 시점은 이유 시점 또는 그 직후다. 이유와 임신 후기 개시 사이는 경쟁하는 대사 우선순위가 최소인 때라, 체형 결손을 가장 싸고 쉽게 교정할 수 있다.</div></div>
<div class="rb-sub">이유 후 영양 관리 — 단백질과 에너지</div>
<p class="rb-p">12개월 분만 간격 유지가 최우선인 만큼 적시 재임신 실패는 큰 문제다. 재임신 지연 손실은 2002년 두당 $14~15였고, 누적 물가상승(42.6%) 반영 시 현재 약 $20~22/두로 추정된다. 적시 재임신은 분만 전후 에너지·단백 섭취와 관련되는데, 기능적 발정 주기 복귀에는 분만 후보다 &#x27;분만 전&#x27; 섭취가 상대적으로 더 중요할 수 있다 — 이유~임신 후기 사이엔 영양 수요의 주요 원천(임신 후기·비유)이 최소이거나 없기 때문이다.</p>
<p class="rb-p">반추가축에서는 조사료와 보충사료 사이의 &#x27;연합효과(associative effect)&#x27;를 알아야 한다. 이는 자발적 조사료 섭취·전소화관 소화율·에너지 산출에 강한 양·음의 영향을 주며, 한 사료에 결합된 원료들의 에너지가 기대 가산성에서 벗어나는 현상이다.</p>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">연합효과 — 한눈에</span></div><ul><li>조사료 質 높을 때(CP 10%↑) 또는 보충제가 섬유(구조 탄수화물) 기반 → 에너지 가산적·예측 가능</li><li>조사료 質 낮을 때(CP&lt;7%) 단백 보충 → 자발 조사료 섭취 최대 150%</li><li>〃 → 총 가소화 건물 섭취량 최대 180%</li><li>고전분·저단백 보충 → 저질 조사료 섭취·에너지 산출 저하</li><li>결론: 저질 조사료엔 전분 적고 단백 높은 보충제를 선호</li></ul></div>
<p class="rb-p">육우는 북미에서 저~중품질 조사료를 환금하는 가장 흔한 수단이다. 따라서 비용 효율적 체형 관리를 위해 이 관계를 이해하고, 저품질 조사료를 먹일 때는 전분이 적당하고 단백이 비교적 높은 보충사료를 골라야 한다.</p>
<div class="rb-sub">광물질과 비타민 영양</div>
<p class="rb-p">번식 부진을 미량 광물질의 잠재성 결핍 탓으로 돌리는 일이 흔하지만, Corah 등은 미량 광물질 결핍이 육우 번식 실패의 흔한 원인은 아니라고 지적했다 — 오히려 고생산 무리에서 더 잘 생기고, 모축 체중·번식보다 송아지 건강에 영향을 줄 가능성이 크다.</p>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">광물질 — 핵심</span></div><ul><li>육우에 의미 있는 광물 원소 25종 (Ca·P·Na·Mg·K·Co·Cu·Fe·Zn·Mn·I·Se 등 요구량 정의)</li><li>임신·비유로 요구가 확정적으로 변하는 것은 Ca·P·Mg·K·Na 다섯뿐</li><li>독성·길항 원소: 크롬·몰리브덴·황·알루미늄·비소·브롬·카드뮴·불소·납·수은·스트론튬</li><li>결핍되기 쉬운 원소: Ca·P·Na·Mg·Mn·Zn·Co·Cu·I·Se</li><li>물·사료의 S·Fe·Mo는 Cu와 길항 → 모니터</li></ul></div>
<div class="rb-clinical"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v6M9 5h6M6 9v4a6 6 0 0 0 12 0V9"/><path d="M6 9H4M18 9h2"/><circle cx="12" cy="19" r="2"/></svg><span class="rb-tag">임상</span><span class="rb-tt">식욕 ≠ 광물 필요량</span></div><div class="rb-cc-b">체내 광물질 비축은 필요 시 동원될 수 있고 결핍은 발현까지 오래 걸리므로, 식욕은 필요량의 지표가 아니다. 과소비(예: 2주분을 1주에 소비)는 흰소금을 자유급여로 함께 줘 조절하거나 목표 섭취에 맞을 때까지 보충을 보류한다. 과소소비는 흰소금을 빼거나 곡물·유박을 소량 더해 기호성을 높인다.</div></div>
<p class="rb-p">비타민은 반추위 미생물이 대부분의 수용성 비타민(비오틴·콜린·B12·엽산·나이아신·판토텐산·B6·리보플라빈·티아민)을 합성하고 비타민 C도 체내에서 충분히 합성하므로, 수용성 비타민 보충은 일반적으로 불필요하다. 지용성은 A·D·K 요구량이 정의돼 있고(E는 미정의), 햇빛에 노출되고 햇볕 건조 또는 자라는 조사료를 먹는 소는 A·D 보충이 보통 불필요하다. K는 체내 합성으로 혈액응고 문제를 막을 만큼 충분하고, 비스트레스 성우의 E 요구량은 작아 정상 사료로 충족된다.</p>
<div class="rb-sub">후보우 육성</div>
<p class="rb-p">현대 육우는 후보우의 첫 분만을 23~24개월령으로 기대한다. 첫 분만철 초반에 분만한 후보우는 일찍 재임신하고 평생 더 많고 무거운 송아지를 이유시킨다. 그래서 12~13개월령까지 사춘기에 도달시켜 14개월령 교배 전 한두 번의 완전한 발정 주기를 거치게 해야 한다. 사춘기 연령은 품종·계절·영양 수준의 영향을 받고, 이유 전·후 성장률은 사춘기 연령과 역상관이며 이유 후 성장률은 영양 수준에 비례한다.</p>
<div class="rb-clinical"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v6M9 5h6M6 9v4a6 6 0 0 0 12 0V9"/><path d="M6 9H4M18 9h2"/><circle cx="12" cy="19" r="2"/></svg><span class="rb-tag">임상</span><span class="rb-tt">사춘기 개시 기전 — LH 펄스</span></div><div class="rb-cc-b">사춘기 개시는 박동성 LH 분비 빈도 증가와 관련된다. 에너지 섭취 증가는 박동성 LH를 자극하고, 감소는 억제한다. 사춘기 지연은 낮은 IGF-1 농도와 동반되며, 렙틴도 번식 조절자·영양 신호 매개자로 작용한다 — 사춘기 전후 단기 절식은 렙틴 발현을 낮추고 인슐린·IGF-1·LH 박동을 함께 떨궈 사춘기를 늦췄다. 반대로 혈청 렙틴은 사춘기 전 체중 증가와 양의 상관을 보였다. 이온운반체는 성장률을 높이며 체중과 무관하게 사춘기 연령을 낮추는 경향이 있다.</div></div>
<div class="rb-clinical"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v6M9 5h6M6 9v4a6 6 0 0 0 12 0V9"/><path d="M6 9H4M18 9h2"/><circle cx="12" cy="19" r="2"/></svg><span class="rb-tag">임상</span><span class="rb-tt">주기 정지엔 중등~중증 제한이 필요</span></div><div class="rb-cc-b">사춘기에 도달한 뒤 발정 주기를 멈추려면 상당한 제한이 든다. 섭취를 NEm 요구량의 30%로 제한하자, BCS 5에서 시작한 후보우는 61일 만에, BCS 7에서 시작한 후보우는 148일 만에 주기가 멈췄다(둘 다 초기 체중의 16~18%를 잃음). 즉 살이 있는 소일수록 주기가 더 오래 버틴다.</div></div>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">목표체중 — 근거</span></div><ul><li>전통 목표: 첫 교배 시 예상 성숙체중의 60~65%</li><li>318kg(~60%) vs 272kg(~50%): 20일 임신율 39 vs 9%, 시즌말 임신율 82 vs 66%</li><li>55% vs 60%: 교배 시 60%군이 더 무겁고 BCS↑(6.0 vs 5.6)·주기율↑(85 vs 74%)</li><li>단 45일 최종 임신율은 차이 없음(88 vs 92%)</li><li>이후 3년 유일한 차이: 55%군 송아지의 205일 보정체중이 더 큼</li><li>분만 시엔 성숙체중의 80~85%에 도달해야 함</li></ul></div>
<div class="rb-clinical"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v6M9 5h6M6 9v4a6 6 0 0 0 12 0V9"/><path d="M6 9H4M18 9h2"/><circle cx="12" cy="19" r="2"/></svg><span class="rb-tag">임상</span><span class="rb-tt">후보우는 성우보다 2~4주 일찍 교배</span></div><div class="rb-cc-b">후보우를 성우보다 2~4주 먼저 교배 공시하면, 둘째 교배 공시 전에 자궁 복구(involution)와 발정 재개에 더 많은 시간을 줘 두 살 시기의 번식 실패를 완화한다.</div></div>
<div class="rb-sub">수소 영양</div>
<p class="rb-p">이유 후 증체율·영양 수준이 수소의 사춘기 체중·연령을 좌우한다. 저영양은 고환 성장·사정량·정자 생산·정낭 발달을 줄이고, 에너지 과급은 음낭·덩굴정맥총의 지방 침착으로 번식 성적을 떨군다. 심한 단백 제한도 정자 생산 능력을 줄인다. 성숙 수소는 사료 스트레스에 더 저항적이지만 과급여·심한 단백 제한은 성욕을 낮춘다. 특히 &#x27;이유 전&#x27; 영양 제한이 이유 후보다 사춘기 연령·고환 크기에 더 큰 영향을 준다(Barth).</p>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">수소 번식 광물질 (Cu·Mn·Se·Zn)</span></div><ul><li>Cu: 정액 Cu↑ → 전진 운동성·총 항산화·사정 후 생존성·임성↑</li><li>Mn: 결핍 → 스테로이드 생성 억제·성욕↓·정자수↓·부고환/정세관 변성 (Mn-SOD는 미토콘드리아에만 존재)</li><li>Se: 정자형성·형태·운동성 필수(비타민E 독립). 중편부 PHGPx 필요 — 결핍 시 발현↓·정자수↓·중편 기형</li><li>Se 농도: 정액이 혈액의 16배 (소 정자 중편 미토콘드리아 부피가 사람·말·돼지·양보다 큼)</li><li>Zn: 형질막 완전성·꼬리 형태·운동성·고환 성장·테스토스테론·성욕에 관여</li></ul></div>
<div class="rb-caution"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg><span class="rb-tag">주의</span><span class="rb-tt">고시폴(목화씨)</span></div><div class="rb-cc-b">목화씨 유래 사료의 고시폴은 시험관에서 수소 정자를 부동화한다. 전립 목화씨·목화씨박을 60일 미만 단기 급여하면 사춘기 후 수소의 정액 질엔 영향이 적지만, 고시폴이 많은 사료는 사춘기 전후 수소의 사춘기를 지연시키고 성장을 줄인다.</div></div>
<div class="rb-sub">태아 프로그래밍 (영양 측면)</div>
<p class="rb-p">발달 프로그래밍은 임신 중 모체 영양의 부족·과잉이 태아 발달과 자손에 장기 영향을 준다는 개념이다(북미는 임신우 영양 부족이 흔해 결핍 연구가 더 많다). 태아 성장은 주로 임신 초기에 형성되는 태반이 조절한다.</p>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">영양 제한의 시기별 효과</span></div><ul><li>임신 초기 ME 75% 제한 → 임신 125일 태아 경량 + 자손 비만도↑·포도당 불내성 억제</li><li>임신 3분기 에너지 제한 → 출생·이유 체중↓ (암양도 동일; 단 비유 중 충분히 먹이면 회복)</li><li>마지막 90일 유지에너지 70% 제한 → 자손 이환·폐사↑ (평균 이하 체중 출생의 생존 불리)</li><li>마른(BCS 3~4) 두 살 후보우 송아지: 활력↓·24h 혈청 면역글로불린↓</li><li>모체 영양 부족 → 초유 질↓·송아지 IgG 흡수 손상</li></ul></div>
<p class="rb-p">단, 효과는 미묘하고 자손의 분만 후 영양 수준에 좌우된다. 경미한 영양 제한은 미국 번식우 농장에 흔하지만 전국 이유율은 교배 공시의 83%로 상당히 강하다. 그래서 발달 프로그래밍이 현재 무리 생산성 지표(임신율·이유체중·이유율)에 미치는 영향을 기술하는 자료는 아직 불확실하다. (참고: 미국 송아지 2.3% 사산 + 생존 송아지 3.2% 이유 전 폐사.)</p>
<div class="rb-sub">특수 영양 문제 ① 소나무잎 유발 유산</div>
<p class="rb-p">1920년대부터 폰데로사 소나무(Pinus ponderosa) 잎 섭취가 만삭 유산을 일으킨다는 추측이 있었고, 추위·강설 시 소의 솔잎 섭취가 기록됐다. 미국 서부는 분만이 늦겨울·초봄이라 악천후가 임신 마지막 3분기와 겹친다. 임신 후기에 솔잎을 매일 0.71~0.85kg(DM) 급여하면 후산정체를 동반한 유산이 일어났고, 병리에서 태아에 혈액을 공급하는 자궁소구(caruncle) 동맥의 심한 협착이 확인됐다.</p>
<div class="rb-clinical"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v6M9 5h6M6 9v4a6 6 0 0 0 12 0V9"/><path d="M6 9H4M18 9h2"/><circle cx="12" cy="19" r="2"/></svg><span class="rb-tag">임상</span><span class="rb-tt">기전과 원인 물질</span></div><div class="rb-cc-b">시험관에서 솔잎 급여 암소의 혈장은 태반분엽의 관류압을 높여 자궁 긴장도를 올리고 태아 혈류를 줄였다. 유산 유발 물질은 이소쿠프레스산(isocupressic acid)으로 동정됐고, 임신 후기에 1일 2회 체중당 100mg/kg이 최소 유산 용량이었다.</div></div>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">섭취·유산 위험을 키우는 요인</span></div><ul><li>고단백 사료 → 솔잎 섭취 증가 (축합 탄닌이 높은 반추위 암모니아의 불쾌감을 덜어줘 식욕↑로 추정)</li><li>부실한 BCS → 솔잎을 더 많이 먹음</li><li>보충 에너지 부족 → 위험↑ (옥수수 사일리지로 에너지를 채우면 유산이 안 일어남)</li><li>대책: 마지막 3분기 솔잎 접근 차단, 충분한 에너지 균형 + 보수적 단백 급여</li></ul></div>
<div class="rb-sub">특수 영양 문제 ② 페스큐 중독증과 임성</div>
<p class="rb-p">1940년대 미국 남동부에 톨 페스큐(Lolium arundinaceum)를 널리 파종했는데, 진균 내생균(Epichloë coenophiala)이 식물엔 방목 내성·질소/물 이용 효율 같은 이점을 주지만 독성 맥각 알칼로이드(ergot alkaloid)도 만든다. 반추가축이 먹으면 &#x27;톨 페스큐 중독증&#x27;을 일으키고 극단적 기온에서 악화된다.</p>
<p class="rb-p">내생균 감염 페스큐 방목 시 임신율·분만율 저하가 널리 보고됐다. 조사료 섭취 감소도 특징이라 영양 저하와 번식 실패가 혼동되지만, 섭취 감소와 무관하게 맥각 알칼로이드 자체가 혈관 수축을 늘려 사지·말단 혈류를 줄인다. 소의 자궁·난소 혈관 수축이 기록됐고, 알칼로이드는 발정 주기 불규칙·호르몬 분비 억제·임신율 저하·무유증을 유발하는 호르몬 변화를 일으킨다.</p>
<div class="rb-clinical"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v6M9 5h6M6 9v4a6 6 0 0 0 12 0V9"/><path d="M6 9H4M18 9h2"/><circle cx="12" cy="19" r="2"/></svg><span class="rb-tag">임상</span><span class="rb-tt">수소에도 영향</span></div><div class="rb-cc-b">K31(내생균 감염) 톨 페스큐를 방목한 수소는 정상 정자세포 수가 약 20% 감소해 번식 건전성 검사 불합격이 늘었다. 더 우려스러운 것은 음낭둘레 감소·음낭 온도 상승이며, 에르고타민과 배양한 정자는 생존성이 떨어졌다 — 감염 페스큐 방목과 수태율 저하의 인과를 시사한다.</div></div>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">관리 전략</span></div><ul><li>알칼로이드는 늦봄에 정점·종자머리(seedhead)에 농축</li><li>종자머리 깎기 / 사이갈이로 목초지 다양화 / 무해 내생균·저알칼로이드 품종으로 전환</li><li>비알칼로이드 사료로 전략적 희석</li><li>분만·교배 시기를 알칼로이드 정점 회피로 조정</li><li>단일 회피·희석 전략 하나로는 해결 어려움 → 다면적 접근 필요</li></ul></div>
<p class="rb-p">과거 알칼로이드 노출이 이후 비육 전 소(stocker) 성적에 영향을 준다는 보고가 있고, 도파민 수용체 D2 유전자 SNP가 페스큐 방목우의 혈청 프로락틴과 연관돼 유전적 민감성 식별 가능성이 제기됐으나 아직 검증되지 않았다. 페스큐 중독용 사료 첨가제는 많이 시험됐지만 자료의 상당수가 독점 정보라 객관적 평가가 어렵다.</p>
<div class="rb-sub">요약</div>
<p class="rb-p">분만 후 발정 재개와 수태는 대사적으로 낮은 우선순위라, 유지·성장·비유·기초 에너지 비축이 충족되기 전엔 잘 일어나지 않는다. 그래서 &#x27;분만 전 영양 공급과 그로 인한 분만·교배 시 BCS&#x27;가 육우·후보우 번식 성적을 결정하는 가장 중요한 요인이다. 유지 이상의 분만 후 에너지 섭취도 도움이 되지만, 체형으로 에너지를 쌓는 가장 저렴한 시기는 이유와 임신 마지막 60~80일 사이다.</p>
<div class="rb-clinical"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v6M9 5h6M6 9v4a6 6 0 0 0 12 0V9"/><path d="M6 9H4M18 9h2"/><circle cx="12" cy="19" r="2"/></svg><span class="rb-tag">임상</span><span class="rb-tt">실무 핵심</span></div><div class="rb-cc-b">조기 이유는 비유 중의 체형 손실을 막고 이후 수태율·임신율을 높일 수 있다. 1년령 후보우를 성우보다 2~4주 일찍 교배하면 발정 재개 시간을 더 번다. 결국 육우 번식의 성패는, 암소가 임신 후기·산유 정점을 견디고 교배 시작 20~40일 전에 발정을 재개하도록 &#x27;전체 생산 주기&#x27;를 전략적·경제적으로 관리하는 데 달려 있다.</div></div></div>
<div class="grass-section-title"><span class="gst-wrap"><span class="gst-main">${svgIcon('leaf',15)} 21. 젖소 영양과 번식</span><span class="gst-sub">전이기·케토시스/간지질증·NEFA와 난자·MUN·메티오닌·열스트레스·BCS·광물질/비타민·미량광물 길항</span></span></div>
<div class="rb-block"><div class="rb-sub">서론과 번식 목표</div>
<p class="rb-p">현대 젖소의 번식 성공은 최선의 관리 관행을 실행한 결과다. 전염병이 없는 상황에서 번식 성적을 가장 크게 좌우하는 것은 과거·현재의 영양 상태이고, 이는 다량영양소·미량영양소·무리 관리 사이의 복잡한 상호작용을 수반한다. 수의학적으로 동물 영양의 제1원칙은 예방의학이다 — 소는 비유하지 않는 임신 후기에서 비유하는 분만 후로 넘어가는 &#x27;전이기(transition period)&#x27;의 대사 스트레스 정도에 따라 번식적으로 성공하거나 실패하도록 프로그램된다.</p>
<p class="rb-p">상업 젖소 번식 프로그램의 목표는 분만 후 생리적으로 가능한 한 빨리 다음 임신을 성립·유지하는 것이고, 이 임신이 또 다른 분만과 새 비유 주기로 이어진다. 다만 분만은 상당한 위험을 동반하는 사건이라, 낙농가가 소를 이 위험에 노출시키는 유일한 강력한 동기는 수익성이다. 소가 수익성 곡선 아래 면적에 머무는 누적 시간이 길수록 더 수익성이 있고, 그 구간에 들어가는 유일한 방법은 추가 분만이다.</p>
<div class="rb-sub">전이기 — 분만 전후 3주</div>
<p class="rb-p">전이기는 분만 직전 3주부터 직후 3주까지로 널리 받아들여진다. 이 기간의 장애로는 분만 전후 마비(유열, milk fever), 후산정체, 자궁염, 간지질증(지방간), 케토시스, 4위전위 등이 있고, 이들은 난포 기억(follicular memory)·면역 기능·자궁내막 상태를 통해 번식 성적에 직간접 영향을 준다.</p>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">일부 대사 장애 발생률 (표 32.1)</span></div><ul><li>유열 5~10%</li><li>후산정체 5~10%</li><li>임상형 케토시스 5~10%</li><li>자궁염 8~40% 초과</li><li>임상형 자궁내막염(분만 4~6주 후) 15~20%</li></ul></div>
<div class="rb-sub">후산정체와 자궁염</div>
<p class="rb-p">태반 박리는 면역학적으로 유발되는 사건이다. 후산정체 암소의 호중구는 분만 전후~분만 후 2주까지 기능이 유의하게 낮았고, 혈장 IL-8 농도도 더 낮았다(IL-8은 호중구 화학유인물질·식작용 유도). 자엽 표본에 항-IL-8 항체를 넣자 시험관 내 호중구 화학주성이 41% 감소했다.</p>
<p class="rb-p">자궁염은 분만 후 자궁 내에 국한된 감염으로, 보통 질에서 미생물이 침입하거나 의원성으로 들어가 생기는 그람음성 혐기성 세균 감염이다. 분만 1~2주 전부터 시작되는 분만 전후 면역억제가 소를 자궁염에 취약하게 만든다. 난산을 겪은 암소는 정상 분만보다 자궁염 발생 가능성이 각각 2.58배·4.32배 높았다.</p>
<div class="rb-clinical"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v6M9 5h6M6 9v4a6 6 0 0 0 12 0V9"/><path d="M6 9H4M18 9h2"/><circle cx="12" cy="19" r="2"/></svg><span class="rb-tag">임상</span><span class="rb-tt">오메가-6:오메가-3 비율</span></div><div class="rb-cc-b">분만 전 면역억제를 개선하려는 한 방법은 십이지장의 n-6:n-3 지방산 비율 조정이다. 분만 전 경산우에서 이 비율을 높이면 단핵세포 기능이 개선될 수 있고, 사료 n-6:n-3을 15:1 이상으로 하면 이후 비유기 번식 성적에 이로울 수 있다고 제안돼 왔다.</div></div>
<div class="rb-sub">케토시스와 간지질증</div>
<p class="rb-p">음에너지 균형(NEB)은 대사 요구를 채울 열량을 충분히 못 먹는 상태로, 분만 직전·직후 젖소에겐 통례다. NEB는 분만 전부터 시작돼 분만 며칠 전 건물 섭취량(DMI)이 급락하며 진행되는데, 이 급락은 이제 과도한 지방분해의 &#x27;원인&#x27;이 아니라 &#x27;결과&#x27;로 본다.</p>
<p class="rb-p">케토시스는 케톤체 BHB(β-하이드록시뷰티르산)의 혈장 수치 상승으로 분류된다. 신체 조직(주로 근육·신경)이 간이 만드는 것보다 적은 케톤을 쓸 때 생기며, BHB 증가는 비에스테르화 지방산(NEFA)의 과도한 동원의 결과다. 케토시스 자체는 생존 기전이지만, 경제 동물은 생존 역치에 접근해선 안 된다. 비유 3~7일에 잠재성 케토시스(BHB 1.2~2.9 mmol/l)에 처음 양성인 암소는 8일 이후 첫 양성 암소보다 첫 수정 수태 가능성이 0.7배였다 — 발생률뿐 아니라 시점도 영향을 준다.</p>
<p class="rb-p">간세포의 NEFA 흡수는 순환 NEFA 농도에 좌우된다. 세포 내 NEFA는 에스테르화로 중성지방(TG)이 되어 저장되거나, 초저밀도지단백(VLDL)으로 재포장돼 배출되거나, 부분 산화로 케톤을, 완전 산화(β-산화)로 ATP를 만든다. 그런데 소 간은 VLDL 생성 능력이 제한적이라, 과도한 지방분해 시 간세포가 TG에 압도돼 물리적으로 손상된다. 이 극단이 간지질증으로, 보통 습중량 기준 간의 5%를 TG가 넘게 차지할 때 생긴다.</p>
<div class="rb-clinical"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v6M9 5h6M6 9v4a6 6 0 0 0 12 0V9"/><path d="M6 9H4M18 9h2"/><circle cx="12" cy="19" r="2"/></svg><span class="rb-tag">임상</span><span class="rb-tt">나이아신·콜린 — 지방분해 조절</span></div><div class="rb-cc-b">나이아신은 GPR109A 수용체를 자극해 지방분해를 제한하고(반추위 보호 나이아신 12 g/일/두에서 비슷한 효과), 효과적이나 에너지 보정 산유량을 유의하게 떨궈 상업적으로 받아들이기 어렵다. 반면 반추위 보호 콜린은 TG를 VLDL에 넣는 율속 단계를 다뤄, 간 부하를 늘리지 않으면서 간 에너지 생산을 순증가시킨다. 콜린은 포스파티딜콜린 생성에 필수이고 지질 수송·지단백 합성에 결정적이며, 메티오닌과 함께 메틸 공여체로 서로를 절약한다. 반추위 보호 콜린 급여는 유방염 감소(통계적 유의성 근접)로도 이어졌다.</div></div>
<div class="rb-clinical"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v6M9 5h6M6 9v4a6 6 0 0 0 12 0V9"/><path d="M6 9H4M18 9h2"/><circle cx="12" cy="19" r="2"/></svg><span class="rb-tag">임상</span><span class="rb-tt">모넨신</span></div><div class="rb-cc-b">임상형·잠재성 케토시스의 또 다른 영양 전략은 모넨신 나트륨(현재 비유 젖소에 승인된 유일한 이온운반체)이다. 메타분석에서 모넨신은 임상형 케토시스 발생과 잠재성 케토시스 중증도를 줄였다. 세균 선택을 통해 반추위 프로피온산 생성을 늘려 작용하는데, 추가 프로피온산이 식후 급증보다 긴 시간에 분산되므로 간 산화 이론과도 양립한다. (캐나다 등에선 서방형 체류 캡슐 승인, 미국은 모넨신 급여만 승인.)</div></div>
<div class="rb-sub">β-글루칸과 유중요소태질소(MUN)</div>
<p class="rb-p">β-글루칸에 의한 면역 조절은 젖소 면역학에서 초기 단계다. 공급원, 더 중요하게는 형태가 표적 면역세포 내 유전자 발현에 큰 영향을 주는 것으로 보이며, 정확한 전염증·염증해소 효과와 번식 영향을 밝히려면 광범위한 연구가 필요하다.</p>
<p class="rb-p">유중요소태질소(MUN)는 혈중요소태질소(BUN)와 밀접하고, BUN은 &#x27;과잉&#x27; 사료 단백질(구체적으로 암모니아)의 간접 척도다. 단백질 분획을 반추위 분해율에 맞춰 해당 탄수화물 분획과 잘 맞추면 미생물 단백질이 효율적으로 생성돼, 간이 요소로 해독해야 할 암모니아가 최소화된다(암모니아→요소 전환은 에너지 비용을 지운다).</p>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">MUN과 임신 — 한눈에</span></div><ul><li>MUN 10.0~12.7 mg/dl 암소: 15.4 초과보다 임신 확인 1.4배</li><li>MUN 10.0 미만 암소: 15.4 초과보다 임신 확인 2.4배</li><li>BUN 상승 → 난자 발달·배아 성숙·자궁 환경 변화 등 다요인적 임성 저하</li><li>대사단백질·아미노산 균형 모델 + 반추위 보호 라이신·메티오닌(제1·2 제한 아미노산)으로 조단백·MUN을 낮추며 생산 유지 가능</li></ul></div>
<div class="rb-sub">NEFA 농도와 난자 형성</div>
<p class="rb-p">암컷 번식의 기능적 최소 단위는 난자다. 난포 기억(follicular memory)은 대사 상태가 번식 성적에 미치는 영향을 최대 60일까지 지연시키는 잔여 효과다. 올레산, 그리고 올레·팔미트·스테아르산 조합이 과립막세포·난구-난자 복합체·난포막세포에 미치는 직접 효과가 연구됐는데, 생체 내에서 이 음의 효과는 이들 NEFA의 순환 혈장 수치 상승에 이차적으로 나타난다. 지방조직의 지방산 조성은 사료와 불포화지방산의 반추위 생체수소화 정도에 크게 좌우된다.</p>
<p class="rb-p">순환 NEFA 상승은 통제 불능의 염증 반응 및 인슐린 저항성과 연결되는데, 인슐린 저항성은 다시 NEFA를 끊임없이 높이는 악순환 고리의 일부다. 오메가-3인 α-리놀렌산·DHA 급여는 증식자 활성화 수용체에 결합해 이 과염증을 직접 완화할 수 있고, EPA·DHA 보충은 배아 손실 감소·산유량 증가를 보였다.</p>
<div class="rb-clinical"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v6M9 5h6M6 9v4a6 6 0 0 0 12 0V9"/><path d="M6 9H4M18 9h2"/><circle cx="12" cy="19" r="2"/></svg><span class="rb-tag">임상</span><span class="rb-tt">포도당 절약 가설</span></div><div class="rb-cc-b">EPA·DHA 보충의 효과 추론: 면역계의 열량 요구가 줄어 포도당이 비선택적으로 절약된다(포도당은 대식세포·호중구의 주 에너지원). 소 간은 포도당신생합성 능력이 유한하므로, 이 절약이 분만 후 암소를 더 이른 비유일수에 양에너지 균형으로 되돌리고, NEB 해소가 정상 난소 주기성 재확립으로 이어진다. 분자 수준에선 전염증성→염증해소성 에이코사노이드 전환이 활성산소·조직 파괴의 양성 되먹임 고리를 끊는 것으로 본다.</div></div>
<p class="rb-p">지방세포·지방조직 대식세포의 TNF-α 생성은 인슐린 저항성을 강화할 수 있다. 이는 이미 인슐린 수치가 낮고 감수성이 떨어진 전이기 암소에서 특히 중요하며, 이 모델이 사람의 비만 유발 당뇨와 젖소의 분만 전후 지방분해→고케톤증/간지질증 진행을 설명할 수 있다.</p>
<div class="rb-clinical"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v6M9 5h6M6 9v4a6 6 0 0 0 12 0V9"/><path d="M6 9H4M18 9h2"/><circle cx="12" cy="19" r="2"/></svg><span class="rb-tag">임상</span><span class="rb-tt">케토시스→유방염→번식</span></div><div class="rb-cc-b">케토시스와 번식 효율의 간접 연관은 임상형 유방염 매개 전신 염증으로 만들어질 수 있다. 케토시스 암소는 임상형 유방염 위험이 2배였고, 수정 후 30일 이내 임상형 유방염을 겪으면 첫 수정 수태 가능성이 16% 낮았다. 첫 수정 전 유방염은 첫 수정까지 일수·공태기를 늘리고 수태율을 떨궜다 — 전염증성 프로스타글란딘에 방해받은 황체가 충분한 프로게스테론을 못 만드는 그림이다.</div></div>
<div class="rb-sub">영양학적 열 스트레스 완화</div>
<p class="rb-p">열 스트레스(온습도지수 THI 상승에 대한 생리 반응)는 수태율·임신율을 낮춘다. 비유 젖소는 보통 THI 70 부근에서 시작되고, 사료 섬유 소화로 악화된다 — 건물 단위당 중성세제섬유(NDF)의 반추위 분해가 다량영양소 중 열 증가량(heat increment)이 가장 크고, 조지방(EE)은 가장 낮다.</p>
<div class="rb-clinical"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v6M9 5h6M6 9v4a6 6 0 0 0 12 0V9"/><path d="M6 9H4M18 9h2"/><circle cx="12" cy="19" r="2"/></svg><span class="rb-tag">임상</span><span class="rb-tt">더위철 사료 조정</span></div><div class="rb-cc-b">극심한 열 스트레스 시기엔 비유 사료의 NDF를 낮추고 EE를 높이는 게 통상 관행이다 — 열량 밀도를 높여 체온 유지에 쓰는 에너지를 보충하고, 한계 섬유 소화로 생길 열 증가량을 줄인다. 단 섬유가 너무 낮으면 반추위 산증, EE가 너무 높으면 섬유 소화율·DMI 저하 위험이 있어 양극단을 피한다. 육우에서 연구된 &#x27;삼투 활성 원료 급여&#x27;도 체온 상승을 최소화하는 것으로 나타나 젖소에 적용 가능하나 추가 연구가 필요하다.</div></div>
<div class="rb-sub">체형 점수(BCS)</div>
<p class="rb-p">젖소 BCS는 번식·생산 양쪽의 유전적 소인과 관리 결정에 결부된 수많은 변수의 조합이다. 높은 BCS는 보통 수태 지연·유산과 관련돼 비유 기간을 늘리고, 비유 곡선이 월 약 −9% 기울기로 진행하며 산유가 줄어 이 암소들을 유지보다 에너지 밀도 높은 사료에 계속 머물게 한다. 분만 시 비만한(5점 척도 BCS&gt;3.75) 암소는 대사 장애 위험이 높아 NEB 기간을 늘리고 수태를 지연시킨다.</p>
<div class="rb-clinical"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v6M9 5h6M6 9v4a6 6 0 0 0 12 0V9"/><path d="M6 9H4M18 9h2"/><circle cx="12" cy="19" r="2"/></svg><span class="rb-tag">임상</span><span class="rb-tt">현재 권고 BCS 3.0~3.25</span></div><div class="rb-cc-b">현재 권고는 분만 시 BCS 3.0~3.25 유지다. 이 전략은 에너지 관련 대사 장애 발생을 줄이지만, 이어지는 비유기를 위한 가용 에너지 비축을 줄이면 비유 곡선에 부정적일 수 있다 — 분만 후 콜린 보충 같은 다른 전략이 NEB 관리에서 더 수익성 있는 경로일 수 있다. 영양·번식·체형의 축은 결합되면 효율 개선의 근거, 분리되면 난제·손실로 이어진다.</div></div>
<div class="rb-sub">메티오닌</div>
<p class="rb-p">거의 모든 포유류 단백질의 개시 아미노산이자 필수 아미노산인 메티오닌 보충은 상업 젖소에서 흔하고, 다수 경로에서 메티오닌 보충에 대한 반응으로 배아 잔존(retention) 증가를 보였다.</p>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">메티오닌 — 배아 생존 근거</span></div><ul><li>Toledo(2015): 경산우에 Smartamine M 21.2 g/일(비유 30~126일) → 임신 28~61일 손실 6.1% vs 무보충 19.6% (p=0.03)</li><li>임신 33일 배아 복부 직경 5.9 vs 5.3 mm, 배아 부피 209.3 vs 160.5 mm³ (긍정적, p=0.008·0.005)</li><li>단 초산우에선 유의차 없음</li><li>Acosta(2016): 분만 전 21일~후 30일 사료 건물 0.08% Smartamine M → AI 6.5일 후 배아 세포질 지질 농도↑(7.02 vs 3.61 AU) → 착상 전 배아 지질↑이 생존 증가 설명</li></ul></div>
<p class="rb-p">경산우는 초산우보다 자궁이 크고 임성이 낮으며, 자궁이 더 큰 수란우에서 번식 성적이 낮아지는 경향이 있었다(Baez). 메티오닌의 경우 수정란을 품은 모축의 가변적 자궁 부피가 이 아미노산의 절대 사료 요구량을 결정할 수 있는 것으로 보인다. 착상 전 자궁액의 필수·비필수 아미노산 농도 증가도 보고됐다.</p>
<div class="rb-sub">광물질과 비타민 — 저칼슘혈증</div>
<p class="rb-p">전이기의 적절한 영양·관리는 분만 후 번식 장애 예방에 결정적이다. 자궁 장애 예방에서 에너지·단백 보충의 역할은 잘 정의돼 있으나 광물질·비타민 균형도 무시하면 안 된다.</p>
<p class="rb-p">임상형·잠재성 분만 전후 저칼슘혈증을 겪는 암소는 난산·자궁탈·후산정체·자궁염 같은 이차 장애 위험이 높다. 기여 요인: 과도한 분만 전 사료 칼슘(1.35% DM), 과도한 인, 낮은 마그네슘, 고령, 품종(저지 위험↑). 유열의 가장 흔한 양상은 분만 2기이며 와위·차가운 사지·약하고 빠른 맥박으로 진단하고, 총 혈청 칼슘 8.0 mg/dl 미만을 저칼슘혈증으로 본다.</p>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">저칼슘혈증 예방 — DCAD</span></div><ul><li>전통법: 분만 전 칼슘 섭취를 총 흡수 칼슘 20 g/일 미만으로 제한 → PTH 분비·골흡수 자극</li><li>현재는 사료 양이온-음이온 차이(DCAD)식으로 대체: (Na+K)−(S+Cl), 실무선 (K−Cl)로 단순화</li><li>음이온염(염화암모늄·염화칼슘·황산마그네슘)으로 보상성 대사성 산증 유도</li><li>신제품: 합성 제올라이트 X-Zelit — 분만 전 칼슘·인·마그네슘 결합, 산성화보다 저칼슘·저인산 예방에 더 효과적(저자 경험). 단 추가 마그네슘(건물 0.45~0.50%)·보호형 미량영양소 주의</li><li>클로즈업 사료 마그네슘 권장 0.35~0.4%(고칼륨은 마그네슘 흡수·음이온염 효과를 떨굼)</li></ul></div>
<div class="rb-caution"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg><span class="rb-tag">주의</span><span class="rb-tt">과도한 산성화 주의</span></div><div class="rb-cc-b">과도한 산성화는 대사성 산증 보상에 열량 요구를 늘려 바람직하지 않다(호흡수 증가·DMI 감소로 나타남). 소는 이미 지방 동원·DMI 감소 중인 분만 직전 3주에 산성화 사료를 받으므로, 성공하려면 소변 pH를 성실히 모니터링해 산증 정도를 관리해야 한다.</div></div>
<div class="rb-sub">미량광물질과 비타민</div>
<p class="rb-p">미량광물질은 조직에 매우 낮은 농도(mg·μg 단위)로 존재한다. 젖소에 중요한 것은 코발트·구리·요오드·철·망간·몰리브덴·셀레늄·아연, 그리고 아마 크롬·불소다. 이들은 금속효소·호르몬 구성요소이거나 에너지·단백 대사·호르몬 합성·면역의 보조인자다. 난소 활동 감소·수태율 저하·난산·유산·사춘기 지연을 포함한 불임이 하나 이상의 미량광물 결핍에 따른 효소 기능장애와 연결되고, 수소에선 정자형성 감소·성욕 감소·비정상 정자·고환 크기 감소와 관련된다.</p>
<div class="rb-clinical"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v6M9 5h6M6 9v4a6 6 0 0 0 12 0V9"/><path d="M6 9H4M18 9h2"/><circle cx="12" cy="19" r="2"/></svg><span class="rb-tag">임상</span><span class="rb-tt">셀레늄·비타민 E</span></div><div class="rb-cc-b">셀레늄(Se)은 글루타티온 과산화효소의 보조인자로, 체액·장기와 정자·난소 세포 내의 중요한 항산화제다. 이 항산화 활성은 산화 스트레스에 맞서 세포·면역 기능을 지키고, 비타민 E와 함께 보충하면 수정을 개선하고 후산정체를 줄이며 낭종성 난소 질환 발생을 줄일 수 있다.</div></div>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">비타민 — 한눈에</span></div><ul><li>젖소 비타민: 지용성(A·D·E·K), 수용성(B군·C)</li><li>수용성은 반추위 미생물이 생성 → 기능하는 반추위 소에선 진성 결핍 드묾</li><li>비타민 D는 피부 UV로, K는 반추위·장 세균으로 생성 → 진성 사료 요구는 A·E 뿐</li><li>건유우 비타민 D 20,000~30,000 IU/일 보충은 합리적(특히 고위도·UV 부족)</li><li>비타민 E와 셀레늄은 서로 요구량을 절약(상승 관계) — Se는 세포 내외 활성, E는 세포막 보호</li></ul></div>
<div class="rb-sub">미량광물질·비타민 보충의 난제</div>
<p class="rb-p">미량광물질·비타민은 면역·세포 건강·호르몬 합성에 필수이고, 이는 분만 후 자궁 복구·생식기 건강·정상 발정 주기 재개에 필수다. 후산정체·자궁염을 겪은 신선우가 부진한 번식 성적·늘어난 비유일수를 겪는다는 점은 확립됐는데, 이를 가중하는 것이 분만 약 1개월 전 모축→태아로의 저장 미량광물 모체 전달이다(가장 제한적인 구리·망간·아연·셀레늄에서 입증). 초유로 비타민 A·E도 전달된다. 이 전달은 송아지엔 필수지만, 분만 전 DMI 감소·면역 부담 시기에 &#x27;암소의 희생&#x27;으로 일어난다.</p>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">광물질 길항 — 구리·셀레늄</span></div><ul><li>건조 주정박·당밀·물의 과도한 황 → 황화구리 형성으로 위장관 구리 흡수↓</li><li>셀레늄과 황은 유사 → 황 과다 시 흡수 경쟁으로 셀레늄↓</li><li>사료 건물 1% 초과 칼슘 → 천연원 셀레늄 흡수↓</li><li>과도한 황+과도한 몰리브덴 → 티오몰리브데이트 형성 → 구리 흡수·전신 기능 차단, 담즙 배설↑ → 구리 결핍</li></ul></div>
<p class="rb-p">길항·모체 전달·분만 전 DMI 감소로 생긴 미량광물 잠재성 결핍은 비유기까지 지속돼 번식 성적을 손상시킬 수 있다. 영양사는 적정량 공급 + 부정적 상호작용·길항 완화 + 킬레이트/유기태 같은 생체이용률 개선 형태 포함으로 위험을 다룬다. 최근 연구는 보충 사료를 받는 암소에 미량광물을 추가·비경구 투여 시 이점을 보였고, 아연·망간·셀레늄·구리 주사용 제품을 건유기·비유 초기에 투여 시 자궁 건강 개선과 자궁염 유발 세균 감소를 보였다.</p>
<div class="rb-sub">요약</div>
<p class="rb-p">유전적 선발·고산유 압력·수익성 유지로 오늘날 젖소는 &#x27;생리적 운동선수&#x27;가 됐지만, 그 발전은 번식·건강에 많은 난제를 낳았다. 연구로 이 난제들을 끊임없이 다룸으로써, 성공적인 평생을 가능하게 하는 사료·무리 위생 프로토콜을 선제적으로 설계하는 법을 더 잘 이해하게 됐다.</p></div>
<div class="grass-section-title"><span class="gst-wrap"><span class="gst-main">${svgIcon('shield',15)} 22. 육우 번식 위생·백신</span><span class="gst-sub">유산 시기별 병원체·진단(혈청 프로파일링)·백신 설계(태아 보호·연속체)·위험 수준별 프로토콜(폐쇄/수정개방/개방)</span></span></div>
<div class="rb-block"><div class="rb-sub">서론 — 감염성 질병과 번식 손실</div>
<p class="rb-p">번식 효율은 번식우-송아지 농장의 재정 건전성에 가장 중요한 산출 지표다. 최적 이하 번식·송아지 생존의 많은 원인 중 감염성 질병이 주요·결정적 기여 요인이다 — 조기 배아 사망, 만삭 유산, &#x27;허약 송아지 증후군&#x27;, 수태 지연이 흔한 시나리오이고, 최종 결과는 이유 출하 체중 감소다. 임상의가 감염원·노출 위험·임신 손실 시기·진단 정보·생산성의 관계를 이해해야 농장 전체 면역 프로그램을 구성할 수 있다.</p>
<div class="rb-sub">진단의 활용 — 유산 시기별 병원체</div>
<p class="rb-p">백신 선택은 병원체의 무리·지역 내 존재, 도입 위험, 처치 일정에 달렸다. 번식 병원체는 특정 임신 단계에 발생하는 경향이 있어 &#x27;손실 시기(초기·중기·후기·분만 전후)&#x27; 판정이 병인 이해와 백신 설계의 출발점이다. 다만 유산 사례의 병인 진단은 50% 미만에서만 식별된다.</p>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">유산 병원체와 주된 시기·진단 (표 41.1·41.2)</span></div><ul><li>바이러스 — IBR: 중기~후기(PCR·IHC·FA·VI) / BVDV: 중기(PCR·IHC·FA·VI) / 블루텅: 후기</li><li>세균 — Brucella abortus: 중기~후기(배양) / Leptospira: 후기(IHC·PCR) / Campylobacter fetus venerealis: 어느 시기든(배양·PCR·MAT·IHC) / Ureaplasma: 후기</li><li>기회성 세균(Arcanobacterium·E.coli·Salmonella 등): 어느 시기든(배양) / Listeria: 후기</li><li>원충 — Tritrichomonas: 초기(배양·PCR·은염색) / Neospora: 중기~후기(IHC·PCR) / Sarcocystis: 중기~후기</li><li>진균 — Aspergillus·Mucor·Candida: 어느 시기든(배양·H&amp;E)</li><li>미확인 유행성·풍토성 유산(Pajaroellobacter aortibovis): 후기</li></ul></div>
<p class="rb-p">진단 실험실과 긴밀히 협력하고, 무리 병력을 포함한 충분한 정보와 포괄적 시료(태반·태아·태수)를 완전히 제출하는 것이 확정 진단의 가장 중요한 단계다. 감염원이 보고 병인의 대부분이나 유산이 감염원에 국한되진 않는다 — 환경·독소·영양·유전 같은 비감염성 원인도 고려한다.</p>
<div class="rb-sub">진단의 활용 — 혈청 검사와 프로파일링</div>
<div class="rb-caution"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg><span class="rb-tag">주의</span><span class="rb-tt">혈청 검사의 한계</span></div><div class="rb-cc-b">단일 혈청은 거의 가치 없음(백신 vs 자연 노출 역가 구별 어려움; 단 역가가 없으면 특정 원인 배제 가능). 쌍(paired) 혈청도 제한적 — 많은 병원체가 유산 훨씬 전에 태아·태반을 감염시켜, 감염~유산 시차로 역가 상승·하강을 놓치고 두 &#x27;회복기&#x27; 시료만 잡을 수 있다(이환 암컷만 채취 시 특히). 쌍 혈청은 태반·태아·태수 시료를 포함한 완전 정밀검사의 일부일 때 훨씬 유용.</div></div>
<div class="rb-clinical"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v6M9 5h6M6 9v4a6 6 0 0 0 12 0V9"/><path d="M6 9H4M18 9h2"/><circle cx="12" cy="19" r="2"/></svg><span class="rb-tag">임상</span><span class="rb-tt">혈청 프로파일링</span></div><div class="rb-cc-b">이환/유산 모축과 비이환 모축의 역가를 같은 기간 분석하는 것이 기초다 — 가능하면 같은 임신 단계·연령의 이환·비이환을 같은 수로. 만성 손실 무리에선 교배 전·임신 검사 시 다수 소 혈청을 채취·동결해 두고, 이후 손실 감지 시 저장 혈청을 급성기·회복기와 함께 제출해 명확한 양상을 본다. 풍토 감염(BVDV) 무리는 모든 동물이 혈청전환해 병인 증거가 없을 수 있고, 태아·초유 전(precolostral) 혈청 검사도 유익할 수 있으나(태아가 면역적격해야 함), 조기 태반 분리 시 모체 항체 누출로 위양성 주의.</div></div>
<div class="rb-sub">백신 프로토콜 설계 — 원칙</div>
<p class="rb-p">백신은 번식 보호의 중요 도구이나 육우에서 과소활용되는 경향이 있다(IBR 성우 24.6%·BVDV 28.1%·렙토 37.1% 수준). 모든 개체의 완전 방어는 비현실적이고, 목표는 &#x27;집단 내 감수성 동물 수 최소화&#x27;로 유행성 발생과 만성 풍토 손실을 모두 막는 것이다.</p>
<div class="rb-clinical"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v6M9 5h6M6 9v4a6 6 0 0 0 12 0V9"/><path d="M6 9H4M18 9h2"/><circle cx="12" cy="19" r="2"/></svg><span class="rb-tag">임상</span><span class="rb-tt">연속체(continuum)로 보기</span></div><div class="rb-cc-b">백신을 관리 그룹별 개별 프로토콜이 아니라 &#x27;연속체&#x27;로 본다 — 자가 육성이면 포유 송아지 프로그램을 여름 방목·가을 이유 너머, 후보 풀 합류·임신·성숙 무리까지 보고 구성한다. 어린 나이 접종이 세포매개 면역을 형성해 이후 백신·질병 반응 능력을 높이고, 혈청음성 암컷의 교배 전 백신 부작용(난소 다발성 괴사·출혈·염증 침윤·황체 낭종 — 일시적이나 단기 번식 저하)을 최소화한다.</div></div>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">태아 보호와 면역 지속</span></div><ul><li>최근 기술로 모체 감염 후 병원체의 태반·태아 전파를 막는 능력 입증 가능</li><li>BVDV·IBR·Leptospira hardjo 도전 연구: 임신 손실·BVDV 지속감염(PI)·렙토 신장 집락·요 배출에 대한 태아 보호</li><li>MLV(약독화 생)·사독 모두 BVDV 태아 보호를 보이나 보통 MLV가 더 나은 보호·더 긴 지속</li><li>보호가 접종 후 1년 이상 지속 가능 → 인접 무리 접촉 많고 연 1회만 처치하는 육우에 특히 중요</li><li>위험 수준 용어: 개방(open)·폐쇄(closed)·수정개방(modified open)</li></ul></div>
<div class="rb-sub">1단계 — 폐쇄 무리</div>
<p class="rb-p">폐쇄 무리는 번식 동물 이동이 제한적이라 유입 위험이 낮다(자체 후보 육성·인접 무리 접촉 거의 없음). 주된 유입 원천은 번식 수소 추가에 따른 교미전파 질병과 지역 가축·야생의 렙토스피라 노출 — 바이러스·세균에 매우 감수성이나 유입 위험은 매우 낮은 무리다.</p>
<div class="rb-clinical"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v6M9 5h6M6 9v4a6 6 0 0 0 12 0V9"/><path d="M6 9H4M18 9h2"/><circle cx="12" cy="19" r="2"/></svg><span class="rb-tag">임상</span><span class="rb-tt">검역과 백신</span></div><div class="rb-cc-b">검역은 신규 도입~잔류 무리 코-코 접촉을 최소 30일 막아(IBR 재발 배출·급성 BVD가 도입 전에 청소되게) 한다. 도입 시 BVD-PI·트리코모나스 선별이 검역 해제 전 완료되게 하고, 도태 동물 연례 선별로 혈청전환 수준을 파악한다. 백신은 차단방역으로 막기 어려운 병원체에 집중 — 모든 번식 암컷에 Leptospira·Campylobacter fetus venerealis 다가 제품 연례 추가접종(C. fetus는 교배 전이 가장 효과적이나 흔히 임신 중기에 렙토와 함께). 후보우는 가장 위험 높은 집단이라 교배 30~45일 전 MLV IBR·BVDV(이전 노출 있고 스트레스 적고 비임신이라 이상적).</div></div>
<div class="rb-sub">2단계·3단계 — 수정개방·개방 무리</div>
<div class="rb-clinical"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v6M9 5h6M6 9v4a6 6 0 0 0 12 0V9"/><path d="M6 9H4M18 9h2"/><circle cx="12" cy="19" r="2"/></svg><span class="rb-tag">임상</span><span class="rb-tt">수정개방 무리 (중등 위험)</span></div><div class="rb-cc-b">신규 추가가 제한적이거나(확장·구입) 개별 동물이 드나들거나(품평회) 인접 무리 접촉이 있는 무리 — 항상 바이러스에 부분 감수성으로 본다. 신규 후보우가 흔한 바이러스에 높은 방어 면역을 갖는 게 필수(잔류 무리의 연례 바이러스 백신 의존도↓). 1년령 후보우가 면역 기반 구축의 핵심 — 교배 전 IBR·BVDV(1·2형)·렙토·C.fetus, 비임신이라 MLV의 긴 지속 활용. 구입 임신 후보우면 MLV 부작용을 피해 IBR·BVDV 사독 피하 또는 비강내 조합(백신 이력 미기록 시 특히), 분만 후 교배 전 MLV로 전환.</div></div>
<div class="rb-clinical"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v6M9 5h6M6 9v4a6 6 0 0 0 12 0V9"/><path d="M6 9H4M18 9h2"/><circle cx="12" cy="19" r="2"/></svg><span class="rb-tag">임상</span><span class="rb-tt">개방 무리 (최고 위험)</span></div><div class="rb-cc-b">출입 동물 이동(후보축 정기 구입·고위험 비육 송아지 혼합·경매장 고아 송아지)으로 유입되고, 보통 이전 백신·질병 이력을 전혀 모른다 — 검역·도착 선별이 절대적으로 결정적. 핵심은 높은 집단 면역 유지를 위한 바이러스 성분 — 공태 암소에 교배 30~45일 전 MLV가 가장 흔하고, 임신 검사 시(중기)에만 접종하거나 분만철이 길면 연례 사독이 유일한 선택일 수 있다. 수소 출처·교미전파 위험에 따라 트리코모나스 백신 고려(단 메타분석상 유산 감소엔 작은 효과, 감염률·공태 위험엔 효과 없음). 렙토·캄필로박터는 폐쇄 무리와 동일.</div></div>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">위험 수준별 백신 프로그램 (표 41.4)</span></div><ul><li>폐쇄 성축(암·수): 캄필로박터(교배 전)·렙토(교배 전 또는 중기)</li><li>폐쇄 후보축(교배 전): IBR·BVDV(MLV 피하)·캄필로박터·렙토·브루셀라(선택, 4~10개월)</li><li>수정개방 후보축(비임신): 브루셀라·IBR·BVDV(MLV)·캄필로박터·렙토 / (도입 전 임신): IBR(사독 피하·비강내)·BVDV(사독)·캄필로박터·렙토</li><li>개방 성축(비임신, 교배 30~45일 전): IBR·BVDV(MLV) / 임신 암컷·수소: IBR(사독·비강내)·BVDV(사독)</li></ul></div>
<div class="rb-sub">요약</div>
<p class="rb-p">면역 프로그램 설계는 출입 교통 양상·정상 처치 시기·접종 대상의 임신 상태·과거 질병 양상·유입 상대 위험을 고려한다. 목표는 감수성 동물 수를 최소화해 집단 면역을 높여 유행성 발생과 만성 풍토 질병을 모두 통제하는 것이다. 번식 병원체와 생식기의 관계 이해가 깊어지며 제조사가 부작용을 최소화하면서 태아 보호·긴 면역 지속을 보장하는 제품을 제공할 수 있게 됐다.</p></div>
<div class="grass-section-title"><span class="gst-wrap"><span class="gst-main">${svgIcon('shield',15)} 23. 젖소 번식 위생</span><span class="gst-sub">번식 효율 지표(21일 임신율)·케토시스/전이기·유방염·파행·열스트레스·감염병 예방(BTM)·VWP·수정률(TAI)·임신 손실 4기·임신 평가</span></span></div>
<div class="rb-block"><div class="rb-sub">서론 — 번식 효율의 네 인자</div>
<p class="rb-p">현대 젖소 농장은 유전·건강·영양·번식·환경·관리의 상호작용에 좌우되는 복잡한 시스템이다. 농장 수익성은 젖소를 비유 곡선의 가장 수익적 구간에 유지하고, 가능한 한 빨리 그곳으로 되돌리며, 평생 비유 횟수를 극대화하는 데 달렸다. 번식 무리 위생의 목표는 자발적 대기 기간(VWP) 설정 후 교배기 시작 후 가능한 한 빨리 임신을 성립시키는 것이다.</p>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">번식 효율 지표 — 21일 임신율</span></div><ul><li>효율의 네 인자: VWP, 수정률(IR), 인공수정당 임신율(P/AI), 임신 손실</li><li>21일 임신율 = 수태율(CR) × 수정률(IR)</li><li>좋은 수태율 = 건강·복구된 생식기 + 양에너지 균형 + 임성 난자 + 좋은 AI 기술</li><li>수정률 = 좋은 발정 발현·발견(또는 동기화로 발정 발견을 변수에서 제거 시 프로토콜 순응도)</li></ul></div>
<div class="rb-sub">케토시스와 전이기 질환</div>
<p class="rb-p">케토시스는 혈중 케톤체(BHBA) 상승으로, 소가 음에너지 균형에 적절히 적응하지 못할 때 일어난다 — 건물 섭취가 낮고 태아 급성장·산유 증가로 에너지 비축을 쓰는 분만 전후가 가장 위험. 산유 감소·식욕부진·쇠약이면 임상형, 증상 없이 BHBA만 오르면 잠재성(SCK).</p>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">케토시스의 번식 영향</span></div><ul><li>비유 초기(분만 후 16일 미만) SCK 소는 첫 수정 임성↓·150일까지 임신 가능성↓</li><li>SCK 역치(1주 BHBA 1000·2주 1400 mmol/l) 초과 소 임신까지 중앙 130일 vs 무SCK 108일</li><li>BHBA 100 mmol/l↑마다 첫 수정 P/AI가 1주 케토시스 2%·2주 3% 감소</li><li>무리 경보: 분만 전 15%가 NEFA 0.27이면 무리 임신율 1.2%↓·BHBA 12mg/dl이면 0.8%↓</li><li>케토시스→자궁염·자궁내막염·유방염·면역억제·4위전위로 하류 효과</li><li>저칼슘혈증도 면역억제·후산정체·자궁염·주기 재개 지연</li></ul></div>
<p class="rb-p">적절한 사료 배합, 사료대 접근 개선, 우방 이동 최소화, 과밀 감소로 섭취·광물질·에너지 균형을 관리하는 것이 체형 유지와 최대 번식 효율에 결정적이다.</p>
<div class="rb-sub">유방염</div>
<p class="rb-p">유방염은 가장 흔하고 비용 큰 감염성 질병이다 — 임상형(우유·유방 성질 변화)이나 잠재성(체세포 수 150,000/ml 초과 상승, 우유 성질 변화 없음)으로 정의.</p>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">유방염의 번식 영향</span></div><ul><li>임상형 유방염은 교배 직전·직후에 임성에 유의한 영향</li><li>만성 임상형 / 임상형 / 잠재성 소의 임신 오즈가 무유방염 대비 0.56 / 0.67 / 0.75 (교배 위험기 = 수정 3일 전~32일 후)</li><li>잠재성: 수정 32일 내 SCC 200,000~399,000이면 임신 오즈 약 18%↓, &gt;399,000이면 거의 26%↓</li><li>임상·잠재성 유방염의 큰 비율이 비유 첫 두 달(=대부분 VWP)에 발생 → 이 기간 통제에 집중</li></ul></div>
<div class="rb-sub">파행</div>
<p class="rb-p">파행은 가장 흔하고 비용 큰 질병의 하나로 복지·생산성·번식에 영향을 준다. 진단이 다소 주관적이나, 대부분 연구는 파행 소가 분만 후 주기 재개가 느리고 발정 발현이 부실하며 임성이 낮음을 보인다.</p>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">파행의 번식 영향</span></div><ul><li>수의사 진단 파행 소: 첫 황체기까지 6일·공태기 9일 더 김</li><li>생산자 식별 임상 파행: 첫 수정까지 6일·공태기 43일 더 김</li><li>파행 + 체형 손실·SCC 상승이 결합하면 첫 황체기 시간에 상승 효과</li><li>영국 연구: 파행 소의 50%가 분만 후(30~80일) 무배란 또는 호르몬 자극에 무반응</li></ul></div>
<div class="rb-sub">열 스트레스</div>
<p class="rb-p">열 스트레스는 외부 환경이 체온을 높여 생리 반응을 유발할 때 일어나며, 온습도지수(THI)로 측정한다(열중성대 상한 THI 72, 일평균 적용이 가장 정확). 사료 섭취 감소·대사 적응으로 음에너지 균형을 일으켜 번식에 영향을 주고, 생식기 직접 효과도 있다.</p>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">열 스트레스의 번식 영향</span></div><ul><li>발정 행동의 지속·강도↓, 발정 징후 없는 배란 가능</li><li>난자 질·배아 발달 손상, 배아 폐사↑, 자궁내막 기능부전, 난포·황체 스테로이드 생성 손상, 자궁 혈류↓</li><li>온대 기후에서도 교배 21일 전~1일 전 THI 73 노출 시 임신 가능성 61%↓</li><li>효과가 수정 35일 전~6일 후까지 누적</li><li>수정·초기 배아 발달(열 민감 단계)을 우회하는 수정란이식이 임성 개선 잠재</li></ul><div class="rb-key-concl">온대 기후에서도 더운 계절 내내 열 스트레스 완화 시행</div></div>
<div class="rb-sub">감염성 질병 예방 — BTM/HACCP</div>
<p class="rb-p">무리 위생 자문가의 역할은 효과적 차단방역·백신 프로그램 설계다. 저자는 &#x27;젖소 돌파 관리(Breakthrough Management, BTM)&#x27;와 유사한 체계를 쓰는데, FDA의 위해요소중점관리(HACCP)의 영향을 받은 12단계 접근으로 일관·실행 가능하고 관리팀 전원 동의를 보장하는 프로토콜을 설계한다 — 결과를 예측하고 통제를 적용하며 바람직하지 않은 결과(질병·유산·불임)를 막는 &#x27;중요 관리점&#x27;에 모니터링·임계 한계·교정 조치를 배정한다.</p>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">효과적 백신 프로토콜 설계 단계</span></div><ul><li>① 위해 분석: 목표(질병 예방/수태 보호/태아 보호?)·현행 프로그램 순응도·노출 위험(농장 질병 현황·미지 상태 반입·자연교배)·관리/스트레스 요인</li><li>② 관리팀 구성(소유주·목부·수의사·백신 취급자)</li><li>③ 원하는 결과 식별 / ④ 현 작업 흐름 논의</li><li>⑤ 중요 관리점: 백신 저장·혼합·신속 투여, 재고 관리, 처치 시기, 동시 투여 수, 올바른 제품→올바른 동물, 적절한 경로, 추가접종 정확성</li><li>⑥ 프로토콜 작성 / ⑦ 모니터링·조치점 / ⑧ 기록 체계 개발</li></ul></div>
<div class="rb-sub">생산 의학과 VWP 설정</div>
<p class="rb-p">1990년대 호르몬 조작·동기화·자료 관리의 등장으로 &#x27;생산 의학(production medicine)&#x27;이 진화했다 — 영양·건강·번식·유전체·후보축·경제·교육·프로토콜을 통합하는 농장 전체 관점이다. 분만 간격 단축은 평균 비유일수를 줄여 더 수익적 구간에 소를 둔다(공태기 비용은 90일 $1.25 → 201일 $2.75).</p>
<div class="rb-clinical"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v6M9 5h6M6 9v4a6 6 0 0 0 12 0V9"/><path d="M6 9H4M18 9h2"/><circle cx="12" cy="19" r="2"/></svg><span class="rb-tag">임상</span><span class="rb-tt">목표 설정</span></div><div class="rb-cc-b">수의 권고가 성공하려면 ① 과학적 근거 ② 효과적 전달 ③ 생산자 목표 위에 세워져야 한다. 네덜란드 연구에서 22개 농가:수의사 조합 중 16개가 주 목표에서 불일치 — 수의사는 생산·유방 건강을 과강조, 농가는 소 임성을 더 우선했다. &#x27;생산자에게 지시하기를 멈추고 목표를 묻기&#x27; 시작하자 진전이 컸다.</div></div>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">이상적 VWP 결정</span></div><ul><li>VWP = 분만 후 소가 수정 자격 전까지 기다리는 기간(자궁 복구·에너지 균형·주기 재개에 시간)</li><li>산유 낮고 비유 지속 부실·21일 임신율 낮은 소 → 더 짧은 VWP / 고생산·지속·높은 임신율 → 더 긴 VWP 유익</li><li>21일 임신율 &lt;15% 무리는 분만 직후 교배해도 110·130일 목표 충족 불가, &gt;22.5%면 VWP 60~98일로 충족</li><li>미국 DHIA 평균: VWP 59.4일·21일 임신율 19.2%·임신까지 148.9일</li><li>첫 AI 수태율 좋으면 더 긴 VWP가 반드시 더 긴 분만 간격을 낳진 않음</li></ul></div>
<div class="rb-sub">수정률을 높이는 전략 — TAI·활동 모니터</div>
<p class="rb-p">수정률은 발정 소가 교배에 제시되는지에 달렸다. 전통적 발정 관찰(절반 남짓이 첫 수정에 여전히 사용)은 발견 효율에 좌우돼 대부분 무리에서 낮다 — 열 스트레스·무리 크기·사육 밀도·콘크리트 계류가 발정 발현에 영향을 준다. 이제 대부분 농장이 정시인공수정(TAI)·활동 모니터로 수정률을 높인다.</p>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">TAI와 발정 발견 통합</span></div><ul><li>1970년대 PGF 황체용해 → 1990년대 TAI가 배란·수정 동기화로 수정률 개선(발견 어려운 무리에 특히)</li><li>첫 수정에 TAI + 발정 발견 병행 무리가 임신까지 중앙 일수 최단·두당 이익 최대</li><li>Galvão 시뮬레이션: 첫 수정 95% 순응 TAI + 60% 효율·95% 정확도 발정 발견 = 21일 임신율 최고</li><li>경제 수익 개선이 가장 큰 건 이전에 순응도 부실했던 무리</li></ul><div class="rb-key-concl">효과적·순응적 TAI 후 발정 발견 통합이 최적, 정확한 발정 발견은 여전히 핵심</div></div>
<div class="rb-clinical"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v6M9 5h6M6 9v4a6 6 0 0 0 12 0V9"/><path d="M6 9H4M18 9h2"/><circle cx="12" cy="19" r="2"/></svg><span class="rb-tag">임상</span><span class="rb-tt">자동 발정 발견·자연교배</span></div><div class="rb-cc-b">목 활동 모니터·보수계 다리띠가 활동 역치 초과 시 알림 — 발정 소의 최대 80%를 정확히 식별(한계: 경산우·파행·낮은 BCS·화농성 분비물 소는 활동 부실; 방목·이동·발굽 손질은 위양성). NAHMS 2014: 미국 농장 절반 이상이 수소 자연교배를 통합(10%는 수소만). 수소 교배가 임신까지 일수·21일 임신율을 개선할 수 있으나, 표준화 시 TAI 소가 자연교배보다 임신당 거의 $38 이득 — 자연교배는 AI 관리 자원·노동이 부족한 생산자의 선택일 수 있으나 효율·유전 진보·경제 극대화엔 최선이 아님.</div></div>
<div class="rb-sub">수정 실패·임신 손실 4기</div>
<p class="rb-p">P/AI와 임신 손실을 인지·모니터링하는 것이 번식 효율의 핵심이다. Wiltbank는 감염성 질병 외 임신 손실을 네 위험기로 정리했다.</p>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">임신 손실 4기</span></div><ul><li>1기(수정~첫 주): 열중성·건강·고임성 정액에서 수정 실패 10~20%(부적절 AI 기술·자궁 염증·부실 정액·열 스트레스). 첫 주 배아 변성은 낮은 P4로 큰 잔존 난포가 배란해 — 체형 손실 반응일 수 있음(작은 난포 제시가 배아 질↑)</li><li>2기(8~27일, 손실 10~50%): ① 배아·영양막 발달(낮은 P4) — 라이신·메티오닌·히스티딘이 배아 신장 중 자궁 환경에서 가장 증가 ② 모체 임신 인식(16일, 배아 발달 의존) ③ 모체 면역 억제(건강한 면역·다양성 필요)</li><li>3기(28~60일, 약 12%): 임신 검사(28~30일) 후 손실이라 모니터링 중요 — 체형 손실·VWP 종료 시 무배란·우성 난포 중 P4↓·자궁/비자궁 질환·비타민E/셀레늄 결핍</li><li>4기(60~90일, 1~3%): 최대 75%가 쌍태(특히 같은 자궁각) — 적절한 모축 영양 지원 결정적</li></ul></div>
<div class="rb-sub">임신 평가와 기록 모니터링</div>
<div class="rb-clinical"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v6M9 5h6M6 9v4a6 6 0 0 0 12 0V9"/><path d="M6 9H4M18 9h2"/><circle cx="12" cy="19" r="2"/></svg><span class="rb-tag">임상</span><span class="rb-tt">임신 상태 평가</span></div><div class="rb-cc-b">조기 임신 평가와 미임신 시 재등록이 효율에 필수. 직장촉진은 숙련 시 30일 이상에서 매우 정확, 직장초음파는 26일부터 가능하나 이후 정상 손실로 30일 미만 민감도 낮음(심박동 보면 더 정확). 28~30일 검사 프로그램은 임신 후기 재평가를 포함해야 한다. PAG-B 상용 검사는 1990년대부터 — 민감도 높으나 특이도 83~97%로 다양, 보통 우방 결과 안 나옴(향후 유중 인라인 검사가 즉각 상태 제공 가능).</div></div>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">기록 표준화 (Kirkpatrick 9대 질병)</span></div><ul><li>전체 농장 95%·대형 100%가 개체 추적 기록(대형 94%는 컴퓨터 기반)</li><li>농장 특이·모호한 정의(&#x27;SICK&#x27;) 대신 질병 정의 표준화 필요</li><li>9개 임상 질병: 유열·후산정체·자궁염·케토시스·4위전위·파행·임상형 유방염·폐렴·소화기 질환</li><li>평가: ① 발병 30일 내 도태 비율 ② 30일 내 폐사 비율 ③ 산유 영향</li><li>질병의 번식 영향은 비유 120일까지 임신한 잔류 비율, 카플란-마이어 생존 곡선으로 시각화</li></ul></div>
<div class="rb-sub">요약</div>
<p class="rb-p">젖소 무리 위생과 번식 효율은 생산성·수익성에 상당한 영향을 주는 상호 관련 인자다. 생산자는 자문가와 함께 &#x27;생산자 목표&#x27;를 인식·충족하는 프로그램을 설계하고, 경제적 VWP를 식별한 뒤 수정 제시 소 수를 극대화하는 프로토콜 + 정확한 발정 발견을 통합해야 한다. 최적 임성을 위해 대사 질환·감염성 질병·유방염·파행·열 스트레스를 최소화하고, 동물 건강·번식 결과를 모니터링할 정확·일관된 기록 체계를 개발한다. 달성 가능한 목표 설정·시행·병목 식별·효과 모니터링이 현대 생산 의학의 특징이다.</p></div>
<div class="grass-section-title"><span class="gst-wrap"><span class="gst-main">${svgIcon('bar-chart-2',15)} 24. 육우 무리 교배철 평가</span><span class="gst-sub">교배철 평가·자료 수집(사건 관리)·생산 지표(표 44.1)·벤치마크(표 44.2)·임신 분포(정상/후방적재/수소 실패)</span></span></div>
<div class="rb-block"><div class="rb-sub">서론 — 교배철 평가란</div>
<p class="rb-p">번식 무리의 번식 성적이 지속적 수익성에 핵심이다 — 임신율·분만율·분만 분포·산자율이 모두 공시 암컷당 이유 체중에 영향을 주고, 번식 지표와 송아지 성적 지표는 밀접히 상관된다. 교배철 평가(번식 프로파일링·&#x27;임신 분석&#x27;)는 생산자가 적절한 무리 기록을 제공하거나 임상의가 구성해 생산 평가·문제 식별을 가능케 하는 과정이다 — 현재 수준을 과거 추세·유사 농장 벤치마크와 비교해 관리 변화를 식별하고 비용 효율적 해결책을 시행한다. 일단 자리 잡으면 연례 평가가 쉬워진다.</p>
<div class="rb-sub">자료 수집 — 사건 관리</div>
<p class="rb-p">무리 정보의 유용성은 전적으로 정확성과 &#x27;의미 있는 번식 지표와의 관계&#x27;에 달렸다 — 이를 못 충족하는 자료는 분석을 더 어렵게 할 뿐이다. 기록이 불완전·부정확하면 임상의가 농장에 맞는 체계 설계를 돕는 게 더 생산적이다. &#x27;사건 관리(event management)&#x27; 개념 — 분만·낙인·방목 개시·교배철·여름 송아지 관리·가을 이유·임신 검사 같은 반복·주기·순차 사건마다 재고·생산 수치를 수집하는 체계를 확립한다. 교배철 분석은 여기서 시작된다 — &#x27;끝을 염두에 두고&#x27; 추적할 지표를 미리 정한다.</p>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">수집할 항목</span></div><ul><li>번식 암컷: 식별번호·연령·품종·체형 점수·방목지·추정 임신일 (처리 속도 맞으면 골격 점수·체중도)</li><li>농장 내 개별 번식 그룹별로 평가·비교 — 교배 그룹·연령·방목지별 부진 위치 파악</li><li>수소 집단: ID·방목지 배정·교배철 길이·교배 전 건전성 검사 결과·구조적 정상성</li><li>이유 송아지: 수와 체중(개체·그룹) — 주 수입원</li><li>영양: 임신 검사·분만 60일 전·교배 전·보충 시작 전 체형 점수, 방목철 내내 모니터(그룹별 층화)</li></ul></div>
<div class="rb-clinical"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v6M9 5h6M6 9v4a6 6 0 0 0 12 0V9"/><path d="M6 9H4M18 9h2"/><circle cx="12" cy="19" r="2"/></svg><span class="rb-tag">임상</span><span class="rb-tt">분만 분포가 이유 체중을 좌우</span></div><div class="rb-cc-b">송아지는 포유기에 일정 속도로 증체하므로 분만철 초기 출생 송아지가 이유 시 더 나이 들고 무겁다 — 같은 무리 조기/후기 출생 차이가 80~120 lb까지. 또 조기 분만 후보우가 후기 분만 동기축보다 생산 수명이 유의하게 개선됐다. 번식 성적·이유 체중·암컷 수명의 이 관계를 고객이 이해하도록 돕는 게 결정적이다.</div></div>
<div class="rb-sub">무리 기록 분석 — 지표와 벤치마크</div>
<p class="rb-p">전통적으로 임신율(임신 ÷ 공시 암컷)을 쓰지만, 단독으론 교배철 길이·수소:암컷 비·방목 조건·소 특성의 통찰을 못 준다. 더 완전한 분석은 &#x27;개별 소가 언제 임신했는지&#x27;와 발정 주기별 비율을 평가한다 — 분만일을 21일 간격으로 층화하는 데서 시작하고, 후보우 육성·영양·수소 특성도 함께 본다. 정확한 기록이 없는 경우가 흔해, 임상의가 쓰기 단순한 체계를 설계해 주는 게 책무다(잘 정리된 수기면 충분).</p>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">생산 평가 지표 (표 44.1) — 1년에 9개 수치만</span></div><ul><li>임신율 = (임신 소 ÷ 공시 암컷) × 100</li><li>분만율 = (만삭 분만 암컷 ÷ 분만 예정 수) × 100 — 역수가 만삭 유산율</li><li>분만철 폐사 = (분만철 폐사 ÷ 만삭 분만 암컷) × 100 (만삭만 셈)</li><li>포유 생존 = (이유 수 ÷ 방목 개시 수) × 100</li><li>이유율(산자율) = (이유 수 ÷ 공시 암컷) × 100</li><li>공시 암컷당 이유 체중 = 이유 총 체중 ÷ 공시 암컷</li></ul></div>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">중서부 권장 벤치마크 (표 44.2)</span></div><ul><li>임신율 90% / 분만율 97%</li><li>만삭 임신 손실 3% / 총 송아지 폐사율 5%</li><li>이유율 85% / 공시 암컷당 생산 체중 500 lb</li></ul></div>
<div class="rb-clinical"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v6M9 5h6M6 9v4a6 6 0 0 0 12 0V9"/><path d="M6 9H4M18 9h2"/><circle cx="12" cy="19" r="2"/></svg><span class="rb-tag">임상</span><span class="rb-tt">지표 해석 주의</span></div><div class="rb-cc-b">임신율은 수태 시점·교배철 길이·임신 분포를 못 준다 — 이전 교배철 &#x27;전체 공시 암컷&#x27;에 근거해야 하고 분만·임신 분포와 결합해야 유용. 분만율은 임신 판정 후 태아 손실과 직접 관련(역수=만삭 유산율), 분만 예정 수는 분만철 시작 시 임신 재고 기준(공시 암컷 아님). 송아지 폐사는 분만철 vs 포유기로 나눠 &#x27;언제&#x27; 일어나는지 봐야 원인(연령·단계별)을 안다.</div></div>
<div class="rb-sub">임신 분포 — 정상·후방적재·수소 실패</div>
<p class="rb-p">임신·분만 기록으로 21일 구간별 히스토그램을 구성한다(임신 검사 시 태령 추정 필요). 전체 무리로 만든 뒤 품종·연령·체형·방목지별로 세분한다.</p>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">임신 분포 — 세 양상</span></div><ul><li>정상(그림 44.1): 제한 교배철(45~75일)의 성숙 소(4~8세) 목표 = 첫 21일 구간 최소 60% 수태·공태 10% 미만</li><li>후방적재(back loaded, 그림 44.2): 거의 절반이 63일 이후 수태 지연·공태 — 부실한 영양 관리(특히 어린 소)나 임신 초기 태아 손실 병원체. 송아지 이유 체중↓·고르지 않아 가치↓·후보우 육성 어려움</li><li>수소 실패(그림 44.3): 교배철 잘 시작됐으나 수태가 급작 종료 — 수소 부상(음경 혈종·포피 열상·파행)이나 우위 수소의 저임성. 극단 고온·곰팡이 페스큐(열 보유)·과비 어린 수소도 정액 질·성욕 저하</li></ul></div>
<p class="rb-p">교배철 평가의 목적은 생산 문제를 정의하고 관리 해결책을 자리 잡게 하는 것이다 — 손실 규모뿐 아니라 어느 관리 그룹이 영향받는지, 관리/질병 중 어느 병인인지 판정한 뒤 회복 전략을 시행하고 매년 모니터링을 계속한다. 번식 질병 의심 시 임신·분만 분포를 분만율·송아지 폐사 정보와 결합하면 손실 시점을 짚어 병원체 통찰·진단 프로토콜을 안내한다.</p>
<div class="rb-sub">요약</div>
<p class="rb-p">번식 무리의 번식 효율이 목장 수익성을 추동한다. 최적 번식 성적은 임신 소의 절대 수가 아니라 임신의 &#x27;시기·분포&#x27;도 포함한다 — 출하 이유 송아지가 주 수입원이므로 번식·이유율·이유 체중의 관계를 강조하는 게 결정적이다. 임상의는 문제 식별·추세 인지·비용 효율적 해결책 자문을 요청받고, 생산자가 정확한 기록을 제공하면 이 과정이 훨씬 쉬워지며, 그 기록은 무리 생산성 변화를 매년 평가하는 수단이 된다.</p></div>
<div class="grass-section-title"><span class="gst-wrap"><span class="gst-main">${svgIcon('bar-chart-2',15)} 25. 젖소 무리 기록 분석</span><span class="gst-sub">모니터링·벤치마킹·문제해결 / 번식 매트릭스(PR·CR·HDR) / VWP·FSED·FSTAI·SSED·SSTAI / 교배 간격·유산·결함 지표 / 후보우 번식</span></span></div>
<div class="rb-block"><div class="rb-sub">서론 — 모니터링·벤치마킹·문제 해결</div>
<p class="rb-p">번식 효율은 젖소 성적·수익성의 핵심 동인이다. 기록 분석 전 &#x27;어떤 질문에 답하려는지&#x27;를 명확히 해야 한다 — 분석 이유는 무리 성적 모니터링, 문제 해결(troubleshooting), 연구 자료 수집으로 나뉜다.</p>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">세 가지 분석 목적</span></div><ul><li>모니터링: 프로토콜 순응도 + 프로그램 작동을 주기 점검(예: 자궁염 월별 모니터, 15% 초과 시 위험요인 조사). 목표는 구체적·관련적·현실적</li><li>벤치마킹: 지표를 다른 농장·산업 평균과 비교 — 적절하면 목표 설정에 도움이나, 농장이 이미 웃돌거나 한참 밑돌 수 있어 주의(밑돌면 더 낮고 현실적 목표+기한)</li><li>문제 해결: 특정 우려를 철저히 조사 — 먼저 문제 존재 확인 → 무리 영향 정량화 → 더 좁게 정의(예: 수태율 저하가 첫 수정 TAI 시점 일탈에서 비롯)</li></ul></div>
<div class="rb-clinical"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v6M9 5h6M6 9v4a6 6 0 0 0 12 0V9"/><path d="M6 9H4M18 9h2"/><circle cx="12" cy="19" r="2"/></svg><span class="rb-tag">임상</span><span class="rb-tt">자료 품질이 먼저</span></div><div class="rb-cc-b">분석 전 자료 품질 검토가 필수 — 입력 관행·완전성을 논의하고, 누락·오류를 해결할 때까지 분석을 미룬다. 세분 시 그룹 크기를 유념(표본 작을수록 우연이 차이를 냄), 기간 확대는 수를 채우나 관성(과거 자료 영향)을 더해 문제 식별을 지연시킬 수 있다. 자료 제한 시 중앙값·통계적 공정 관리·하한 신뢰구간을 고려. (DairyComp·PCDart, DHIA 보고서 DHI-202·DHI-350 활용; 지표 계산은 센터마다 달라 확인 필요.)</div></div>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">번식 지표 평균 (표 45.1, 7842개 무리)</span></div><ul><li>임신율(연평균): 평균 19.5%, 상위 20%는 26%</li><li>수태율(첫 수정, 지난 12개월): 평균 40.0%, 상위 50%</li><li>수태율(2차 이후): 평균 40.7%, 상위 50%</li><li>연간 관찰 발정 비율: 평균 48.2%, 상위 62%</li></ul></div>
<div class="rb-sub">번식 매트릭스 — PR·CR·HDR과 6구성요소</div>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">기본 지표 (예: 100두 자격, 50두 수정, 25두 임신)</span></div><ul><li>임신율 PR = 21일간 임신 수 ÷ 같은 21일간 교배 자격 수 = 25%</li><li>발정 발견율 HDR = 21일간 수정 수 ÷ 교배 자격 수 = 50%</li><li>수태율 CR(P/AI) = 수정군 임신 수 ÷ 수정 수 = 50%</li><li>PR = CR × HDR 관계</li></ul></div>
<p class="rb-p">이 지표의 추세를 아는 건 도움이 되나 관리에 쓸 구체성은 부족하다 — 번식 프로그램을 구성요소로 나눠 각각의 순응도(프로토콜 준수)·효능(작동)을 봐야 한다. 단 관리 교정이 가능한 곳에 한정하고, 필터링 편향에 주의한다. 초산우는 일반적으로 임성이 높아 그룹이 충분히 크면 별도 분석이 유익하다.</p>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">번식 프로그램 6구성요소</span></div><ul><li>VWP: 자발적 대기 기간</li><li>FSED: 첫 수정 발정 발견</li><li>FSTAI: 첫 수정 정시인공수정</li><li>SSED: 2차 이후 수정 발정 발견</li><li>SSTAI: 2차 이후 수정 정시인공수정</li><li>DNB: 비교배 정책</li><li>(100% FSTAI 농장은 FSED 없음, 전적 관찰 발정 농장은 FSTAI·SSTAI 임성 평가 불가)</li></ul></div>
<div class="rb-sub">구성요소별 분석 — VWP·FSED·FSTAI</div>
<div class="rb-clinical"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v6M9 5h6M6 9v4a6 6 0 0 0 12 0V9"/><path d="M6 9H4M18 9h2"/><circle cx="12" cy="19" r="2"/></svg><span class="rb-tag">임상</span><span class="rb-tt">자발적 대기 기간(VWP)</span></div><div class="rb-cc-b">두 가지 VWP가 있다 — 명시 VWP(sVWP)는 관리자가 정한 교배 자격 최소 비유일수(DIM), 실제 VWP(aVWP)는 소가 실제 처음 교배되는 시점(약 5%가 처음 수정된 DIM로 추정). 둘이 다르면 첫 수정 프로토콜을 직원과 검토하고, aVWP를 알면 더 정확한 발정 발견·PR 계산이 가능하다.</div></div>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">FSED·FSTAI 성적</span></div><ul><li>FSED(첫 수정 발정 발견): 잘 관리되는 무리는 FSTAI 전 50~80%를 수태율 30~45%로 교배</li><li>FSTAI(첫 수정 TAI): 프로토콜 임성 P/AI 24~60% — 단계가 올바른 날에 일어나는지 점검</li><li>연구 비교 시 설계 차이 고려(시작 DIM·호르몬 수/간격·발정 시 제외·임신 검사 시점)</li><li>관찰 발정으로 첫 수정 잘하는 무리는 100% TAI 무리보다 TAI 소 P/AI가 약간 낮은 경향(임성 소가 발정으로 빠져나가서)</li></ul></div>
<div class="rb-sub">구성요소별 분석 — SSED·SSTAI·DNB</div>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">SSED·SSTAI 성적</span></div><ul><li>SSED(2차 이후 발정 발견): 자격 소의 65~75%를 P/AI 30~41%로 교배 가능(넓은 범위는 이전 교배~다음 TAI 간격 등 변수 반영)</li><li>SSTAI(2차 이후 TAI, 재동기화): P/AI 22~43%, 재동기화 교배 비율은 발정 발견 안 쓰는 농장의 낮은 20%부터 100%까지</li><li>DNB·도태: 비유우가 더는 수익적이지 않은 시점 — 무리 제거 정책을 설정·검토하고 준수를 모니터</li></ul></div>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">TAI 프로토콜별 P/AI (표 45.3·45.4, FSTAI / SSTAI)</span></div><ul><li>GPG(Ovsynch 변형): 24~45 / 25~33</li><li>PPGPG(Presynch-Ovsynch): 31~59 / —</li><li>GGPG(preGnRH Ovsynch): 40~48 / 22~40</li><li>GPGGPG(더블-Ovsynch): 36~55 / 35~43</li><li>TAI+2차 PG(TAI 전 PGF 추가): 36~57 / 31~42</li><li>TAI+P4(프로게스테론 보충): 25~38 / 31~39</li></ul></div>
<div class="rb-sub">기타 번식 분석 — 교배 간격·수정사·계절</div>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">교배 간격 (표 45.5, 37무리)</span></div><ul><li>대다수 교배는 발정 주기 길이 18~24일에</li><li>4~17일 교배: 10% 미만 유지(임성 낮아 높으면 부정확한 발정 발견 지표) — 중앙값 9%</li><li>48일 초과 교배: 15% 넘으면 발정 발견 개선·공태 소 빨리 재등록 — 중앙값 10%</li><li>임신율(표준 50일 VWP) 중앙값 24%</li></ul></div>
<div class="rb-clinical"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v6M9 5h6M6 9v4a6 6 0 0 0 12 0V9"/><path d="M6 9H4M18 9h2"/><circle cx="12" cy="19" r="2"/></svg><span class="rb-tag">임상</span><span class="rb-tt">수정사·계절·고급 기술</span></div><div class="rb-cc-b">수정사를 기록에 식별하되 임성 비교는 주의(흔히 다른 그룹 교배 — 주말 발정 소만 / 동기화 AI 전담 / &#x27;문제 소&#x27;만). 주·월·계절별 CR 추적으로 정액 저장·취급 문제나 열 스트레스 효과를 식별. ET/IVF/OPU를 많이 쓰는 농장은 효율 저하를 볼 수 있다(채란용 수란우 확보로 후보우 교배를 미루면 초교배 연령↑·HDR↓).</div></div>
<div class="rb-sub">건강과 번식 — 전이기·유방염·파행·유산</div>
<div class="rb-clinical"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v6M9 5h6M6 9v4a6 6 0 0 0 12 0V9"/><path d="M6 9H4M18 9h2"/><circle cx="12" cy="19" r="2"/></svg><span class="rb-tag">임상</span><span class="rb-tt">전이기·유방염·파행</span></div><div class="rb-cc-b">신선우 질환(특히 자궁염·케토시스)이 부진한 번식으로 이어진다 — 증례 정의로 일관 기록하고 월별 발생률 계산(위험 집단=해당 월 분만 소). 분만성 자궁염은 비유 첫 14일에 일어나 15 DIM 이상으로 한정(위험창 완료 전 도태는 예외). 비유 초기 높은 SCC·임상형 유방염도 번식 위험 — 신규 잠재성 감염·만성·임상형률을 일상 평가. 파행은 신규 사건을 정기 손질·만성과 분리 기록(치료율 100두당 사례·병변·DIM 양상), 과소 보고되니 보행 점수와 교차 참조. 난산·DOA는 신선우 질병·부실 산유·조기 도태로.</div></div>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">유산율 — 두 계산</span></div><ul><li>참 유산 발생률 = 위험창 내 유산 ÷ [(위험창 통과 임신 소) + (위험창 내 유산)]</li><li>조유산율(crude) = 기간 내 손실 임신 ÷ 같은 기간 생성 임신</li><li>임신을 더 일찍 진단할수록·최초~재확인 간격이 길수록 &#x27;정상&#x27; 손실 비율이 높아짐</li><li>28일 진단~분만까지 전체 25% 손실(표 45.6), 후기 배아(28~60일) 폐사 평균 12.8%(3.2~42.7%)</li></ul></div>
<div class="rb-caution"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg><span class="rb-tag">주의</span><span class="rb-tt">결함 있는 지표 — 피하라</span></div><div class="rb-cc-b">다음 전통 지표는 의미 있는 정보를 못 줘 피한다 — 분만 간격(CI): 지연 정보이고 2회 분만 안 한 소(현재 공태 소)를 제외 / 공태기(DOPN): 임신 미확인 소 제외 / 수태당 수정 횟수(SPC): 임신 미확인 소를 모두 제외해 부정확. 모두 &#x27;임신 확인된 소만&#x27; 보는 생존자 편향이 문제.</div></div>
<div class="rb-sub">후보우 번식</div>
<p class="rb-p">후보우 번식 관리 이해는 성우만큼 중요하다 — 초교배·초산 연령, VWP(체중), HDR, PR, CR로 나눈다. 평균 초산 연령은 흔히 인용되나 관리에 둔감하고, &#x27;분포&#x27;를 보면 적시 수태 못 한 비율과 지연의 경제적 결과를 추정할 수 있다. 초교배 연령 분포는 목표를 놓친 동물(의도적 지연 vs 프로토콜 붕괴)을 식별.</p>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">후보우 번식 목표</span></div><ul><li>VWP: 성숙 체중 55~60% 도달 + 초산까지 목표 성장률 유지 시 교배 시작</li><li>HDR: 후보우는 행동 발정을 잘 나타내 성우보다 높음 — 70~75% 달성, 교배방 진입 45일 내 90% 첫 수정(365일 VWP 기준 평가로 지연 발견→불필요 육성비↓)</li><li>PR: 후보우 교배 프로그램 효과의 최선 척도 — 40~50% 일관 달성</li><li>CR: 성우보다 임성 높아 통상 정액 60~65% 목표(발정 발견 불가 시 FTAI로 P/AI 50~65%)</li></ul></div>
<div class="rb-clinical"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v6M9 5h6M6 9v4a6 6 0 0 0 12 0V9"/><path d="M6 9H4M18 9h2"/><circle cx="12" cy="19" r="2"/></svg><span class="rb-tag">임상</span><span class="rb-tt">성판별 정액·ADG</span></div><div class="rb-cc-b">성판별 정액은 주로 후보우에 써 유전 진보를 가속하고 가장 임성 높은 동물에 사용해 비용 최소화(기술 발전으로 임성이 통상 정액에 근접) — 성판별·통상 정액 임성을 추적. 많은 농장·위탁 육성업자가 후보우를 정기 칭량해 ADG를 모니터, 성장 장벽을 조기 교정해 목표 연령에 교배 체격에 이르게 한다(농장마다 다른 정확한 평균 성숙 체중을 알아야 함).</div></div>
<div class="rb-sub">결과 요약과 보고</div>
<p class="rb-p">분석 후 유의한 결과를 요약해 관리자에게 보고하고, 교정 조치 권고와 가능하면 재무 영향·교정 비용을 포함한다(부분 예산이 유용). 번식 경제는 복잡해 Wisconsin-Cornell Dairy Repro 같은 모델링 도구로 프로그램 비교·개선 추정을 한다. 일상 모니터링이면 무리 위생 방문에 보고를 포함하고, 문제 해결 분석은 더 상세히 문서화해 농장 기록에 포함·공유한다 — 진전 추적·향후 조사의 과거 기록으로 특히 유용하다.</p>
<p class="rb-p">젖소 번식 기록의 정확한 분석은 교배 프로그램 내 문제를 조기 식별·교정하고 목표를 추적해 개선을 동기화하게 한다. 농장 기록에서 통찰을 제공하는 자문가는 젖소 관리팀에서 결정적 역할을 한다.</p></div>
<div class="grass-section-title"><span class="gst-wrap"><span class="gst-main">${svgIcon('search',15)} 26. 무리 진단 검사 전략</span><span class="gst-sub">진단 검사 유용성·민감도/특이도(분석적 vs 진단적)·유병률·검사 후 예측도(PPV/NPV)·직렬/병렬 검사</span></span></div>
<div class="rb-block"><div class="rb-sub">서론 — 진단 검사란</div>
<p class="rb-p">임상수의사는 무리 번식 목표(임성 향상·불임 최소화, 감염성/대사성 질병 영향 최소화, 유전 가치 향상)를 돕는다. 개체·무리의 질병·생산 특성에 대한 &#x27;불확실성을 줄이는 모든 검사·절차&#x27;를 넓게 진단 검사라 한다 — 혈청학·면역조직화학·PCR·바이러스 분리·세균 배양 같은 감염원 실험실 검사뿐 아니라, 수소 번식 건전성 검사·후보우 생식기 점수·임신 진단·체형 점수·사료 평가도 포함된다.</p>
<div class="rb-clinical"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v6M9 5h6M6 9v4a6 6 0 0 0 12 0V9"/><path d="M6 9H4M18 9h2"/><circle cx="12" cy="19" r="2"/></svg><span class="rb-tag">임상</span><span class="rb-tt">검사를 쓸지 판정</span></div><div class="rb-cc-b">특정 상태에 가용 검사를 쓸지 결정하는 입력: 검사 사용·해석의 용이성, 상태의 유병률·확률, 진단 민감도·특이도, 질병 역학, 상태와 그 치료·예방의 경제적 비용. 문헌 리뷰·스프레드시트로 검사 후 예측도, 경제적 가치, 결정의 민감도를 계산한다.</div></div>
<div class="rb-sub">민감도와 특이도 — 분석적 vs 진단적</div>
<div class="rb-caution"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg><span class="rb-tag">주의</span><span class="rb-tt">두 맥락을 구별하라</span></div><div class="rb-cc-b">&#x27;민감도&#x27;·&#x27;특이도&#x27;가 분석적(analytic)인지 진단적(diagnostic)인지 모르면 검사 결과에 오도될 수 있다 — 이 구별이 결정적이다.</div></div>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">분석적 vs 진단적</span></div><ul><li>분석적 민감도: 실험실 특성 — 검출 가능한 물질의 최소량(농도, ng/ml·ppm). 높으면 매우 낮은 농도도 검출</li><li>진단적 민감도: 표준(gold standard) 대비 집단 특성 — &#x27;실제 그 상태인 동물 중&#x27; 검사가 양성으로 식별한 비율 = 진양성 ÷ (위음성+진양성)</li><li>분석적 특이도: 비표적 물질과의 교차반응성이 낮은 정도(실험실)</li><li>진단적 특이도: &#x27;실제 상태 없는 동물 중&#x27; 검사가 음성으로 식별한 비율 = 진음성 ÷ (위양성+진음성)</li></ul></div>
<p class="rb-p">수의학은 인의학과 달리 진단 검사 규제 감독이 면밀하지 않으므로, 수의사가 품질 보증·관리의 필요를 인식하고 실험실 검사뿐 아니라 수소 번식 건전성·생식기 점수·임신 진단·체형 점수·청진 등 &#x27;진료에서 쓰는 모든 검사&#x27;의 진단 민감도·특이도를 자주·엄격히 평가해야 한다.</p>
<div class="rb-clinical"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v6M9 5h6M6 9v4a6 6 0 0 0 12 0V9"/><path d="M6 9H4M18 9h2"/><circle cx="12" cy="19" r="2"/></svg><span class="rb-tag">임상</span><span class="rb-tt">컷오프는 절충이다</span></div><div class="rb-cc-b">검사는 두 집단(비정상/정상)을 분리하려 하나 대부분 상태에서 두 집단이 겹쳐, 양성·음성을 가르는 임의의 절단값(컷오프)을 써야 한다. 측정치가 겹치므로 진단 민감도와 특이도는 역관계 — 컷오프 설정은 항상 위음성·위양성 영향 간 절충이다. 예: 폐렴 송아지 빈호흡 컷오프 25(민감↑·위양성 많음) vs 40(특이도↑·위음성 많음).</div></div>
<div class="rb-sub">유병률과 검사 후 예측도</div>
<p class="rb-p">유병률은 특정 시점에 증례 정의를 충족하는 동물 비율 = 무작위 개체에 상태가 있을 확률이다. 수의학 대부분의 감염성·번식 상태는 발표된 유병률이 제한적이라, 병력·임상 검사에 근거한 임상의 판단이 흔히 확률을 설정할 유일한 수단이다.</p>
