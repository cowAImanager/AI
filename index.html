============================================================ */
function renderPregCheckView(){
  const today = todayStr();
  const animals = ownerAnimals();
  const rows = [];
  animals.forEach(a => {
    const allRecs = DATA.records.filter(r=>r.owner===UI.owner && r.animalId===a.animalId);
    const aiRecs = allRecs.filter(r=>r.aiDate).sort((x,y)=> sortKeyOf(y) - sortKeyOf(x));
    const sorted = allRecs.slice().sort((x,y)=> sortKeyOf(y) - sortKeyOf(x));
    // 감정은 '가장 최근 수정 이후'의 것만 현재 상태로 인정 (지난 수정의 감정은 무시)
    const latestAiTs = aiRecs.length ? sortKeyOf(aiRecs[0]) : -Infinity;
    const diagPool = sorted.filter(r => sortKeyOf(r) >= latestAiTs);
    const preg1 = (lastNonEmpty(diagPool,'pregnant')||'').trim();
    const preg2 = (lastNonEmpty(diagPool,'pregnant2')||'').trim();
    const fsex  = (lastNonEmpty(diagPool,'fetalSex')||'').trim();
    // 수정기록도 없고 감정 표기도 전혀 없으면 제외
    if(!aiRecs.length && !preg1 && !preg2 && !fsex && !latestCalvingDate(allRecs)) return;
    const aiRec = aiRecs[0] || null;
    const aiD = aiRec ? dateOnly(aiRec.aiDate) : '';
    const days = aiD ? Math.floor((new Date(today+'T00:00') - new Date(aiD+'T00:00')) / 86400000) : null;
    const isPreg = isCurrentlyPregnant(allRecs);
    const calved = calvedAfterPregnancy(allRecs);
    const calvRec = latestCalvingRec(allRecs);
    const calvDate = calvRec ? dateOnly(calvRec.calvingDate) : '';
    const calfSex = calvRec ? (calvRec.calfSex||'') : '';
    const expCalv = dateOnly(lastNonEmpty(sorted,'expectedCalving')||'');
    const recordForEdit = sorted.find(r => (r.pregnant||r.pregnant2||r.fetalSex||r.calvingDate)) || aiRec || sorted[0];
    rows.push({ animalId: a.animalId, record: recordForEdit, aiDate: aiRec ? aiRec.aiDate : null, days,
      pregnant: preg1, preg1, preg2, fsex, isPreg, calved, calvDate, calfSex, expCalv, fattening: !!a.fattening });
  });
  rows.sort((x,y)=> (y.days==null?-1:y.days) - (x.days==null?-1:x.days));

  const pregnant = rows.filter(r => r.isPreg);
  const active   = rows.filter(r => !r.isPreg);

  const renderRow = row => {
    const p1 = (row.preg1||'').trim().toUpperCase();
    const p2 = (row.preg2||'').trim().toUpperCase();
    const isNotPregnant = p1==='X' && !row.isPreg && !row.calved;
    const needsCheck = !row.fattening && !row.preg1 && !row.calved && row.days!=null && row.days>=30;
    let rowClass = '';
    if(row.calved) rowClass='confirmed';
    else if(row.isPreg) rowClass='confirmed';
    else if(isNotPregnant) rowClass='notpregnant';
    else if(needsCheck) rowClass='overdue';

    const tags = [];
    if(row.preg1) tags.push(`<span class="preg-tag ${p1==='O'?'pos':(p1==='X'?'neg':'rechk')}">1차 ${esc(row.preg1)}</span>`);
    if(p1!=='X'){   // 1차 X면 2차·성감정은 의미 없으니 숨김
      if(row.preg2) tags.push(`<span class="preg-tag ${p2==='O'?'pos':(p2==='X'?'neg':'rechk')}">2차 ${esc(row.preg2)}</span>`);
      if(row.fsex)  tags.push(`<span class="preg-tag sex">성 ${esc(row.fsex)}</span>`);
    }

    let badge = '';
    if(row.calved){
      const pp = daysBetween(row.calvDate, todayStr());
      const vwp = row.fattening ? '' : (pp < VWP_DAYS ? `재수정 대기 D-${VWP_DAYS-pp}` : '재수정 가능');
      tags.length = 0; // 분만완료 행은 분만 정보 위주로
      tags.push(`<span class="preg-tag calf">분만 ${fmtShort(row.calvDate)}</span>`);
      if(row.calfSex) tags.push(`<span class="preg-tag sex">송아지 ${esc(row.calfSex)}</span>`);
      if(vwp) tags.push(`<span class="preg-tag ${pp<VWP_DAYS?'rechk':'pos'}">${vwp}</span>`);
      badge = `<span class="pregcheck-badge confirmed"><span class="badge-label">분만완료</span></span>`;
    } else if(row.isPreg){
      if(row.expCalv){
        const dd = daysBetween(todayStr(), row.expCalv);
        if(dd >= 0){
          badge = `<span class="pregcheck-badge preg"><span class="badge-label">분만 D-${dd}</span></span>`;
        } else {
          rowClass='overdue';
          badge = `<span class="pregcheck-badge"><span class="badge-label">분만 확인 필요</span></span>`;
        }
      } else {
        badge = `<span class="pregcheck-badge unknown"><span class="badge-label">알 수 없음</span></span>`;
      }
    } else if(isNotPregnant){
      badge = `<span class="pregcheck-badge notpregnant"><span class="badge-label">비임신</span></span>`;
    } else if(needsCheck){
      badge = `<span class="pregcheck-badge"><span class="badge-label">임신감정 필요</span></span>`;
    }

    // 보조태그: 배지 왼쪽에 같은 모양으로 (비육전환=갈색 / 재수정 대기=빨강)
    let subTag = '';
    if(row.fattening) subTag = `<span class="preg-subtag brown">비육전환</span>`;
    else if(isNotPregnant) subTag = `<span class="preg-subtag red">재수정 대기</span>`;

    return `
    <div class="pregcheck-row ${rowClass} ${row.fattening?'fattened':''}" data-action="editRecord" data-id="${esc(row.record.id)}">
      <span class="tag-chip" data-animal-id="${esc(row.animalId)}">${esc(row.animalId)}</span>
      <span class="pregcheck-mid">
        <span class="pregcheck-date">${row.aiDate?('<span class="pcd-prefix">수정일 </span>'+fmtShort(row.aiDate)):'수정기록 없음'}</span>
        ${row.days!=null && !row.calved?`<span class="pregcheck-days">${row.days}일 경과</span>`:''}
        <span class="preg-tags">${tags.join('')}</span>
      </span>
      <span class="pregcheck-end">${subTag}${badge}</span>
    </div>
  `;
  };

  const activeHtml = active.map(renderRow).join('') || `<div class="empty-state">해당 개체가 없어요.</div>`;
  const pregnantHtml = pregnant.map(renderRow).join('') || `<div class="empty-state">임신 확인된 개체가 없어요.</div>`;

  // 수태율: 임신감정(O/X)이 난 라운드 중 '그 라운드의 수정을 내가 한 것'만 집계.
  //   (감정은 감정한 날, 내수정횟수는 수정한 날에 적힐 수 있으므로 — 같은 줄이 아니어도
  //    개체별 날짜순으로 보며 '직전 수정' 기록의 내수정 여부로 내 라운드인지 판정)
  const dkeyP = r => dateOnly(r.examDate || r.aiDate || r.estrusDate || '');
  const inh = r => String((r.inHouseAiCount!=null && r.inHouseAiCount!=='') ? r.inHouseAiCount : (r.inHouseAi||'')).trim();
  const inhN = r => { const n = parseInt(inh(r),10); return isNaN(n) ? 0 : n; };
  const pregOf = r => (r.pregnant||'').trim().toUpperCase();
  const allByAnimal = {};
  DATA.records.filter(r=>r.owner===UI.owner).forEach(r => { (allByAnimal[r.animalId] = allByAnimal[r.animalId] || []).push(r); });

  let totalServices = 0, svcSuccess = 0;   // 분모: 내가 수정한 라운드의 감정 수 / 분자: 그중 O
  let fsSuccess = 0, fsTotal = 0;          // 첫수정 수태율
  Object.values(allByAnimal).forEach(list => {
    list.sort((a,b)=> dkeyP(a).localeCompare(dkeyP(b)));
    // 수정횟수대비 수태율 — 각 감정(O/X)을 직전 수정의 내수정 여부와 연결
    let lastAiMine = null;   // 가장 최근 수정(aiDate)을 내가 했는지
    list.forEach(r => {
      if(r.aiDate) lastAiMine = inhN(r) >= 1;
      const p = pregOf(r);
      if(p==='O' || p==='X'){
        let mine = lastAiMine;
        if(mine===null) mine = inhN(r) >= 1;   // 직전 수정이 없으면 감정 기록 자체의 내수정 사용
        if(mine){ totalServices++; if(p==='O') svcSuccess++; }
      }
    });
    // 첫수정 수태율 — '내수정 1' 실제수정이 분모(결과 난 사이클만), 재수정 없이 O면 성공
    const firstIdx = [];
    list.forEach((r,i)=>{ if(inh(r)==='1' && r.aiDate) firstIdx.push(i); });
    firstIdx.forEach((startI, k) => {
      const endI = (k+1 < firstIdx.length) ? firstIdx[k+1] : list.length;
      const cycle = list.slice(startI, endI);
      const hasResult = cycle.some(r => pregOf(r)==='O' || pregOf(r)==='X');
      if(!hasResult) return;
      fsTotal++;
      const hasReAI = cycle.some(r => inhN(r) >= 2);
      const hasO = cycle.some(r => pregOf(r)==='O');
      if(!hasReAI && hasO) fsSuccess++;
    });
  });
  const rateSvc = totalServices ? Math.round(svcSuccess / totalServices * 100) : 0;
  const avgServices = svcSuccess ? (totalServices / svcSuccess).toFixed(1) : '—';
  const rateFirst = fsTotal ? Math.round(fsSuccess / fsTotal * 100) : 0;

  return `
    <div class="panel">
      <div class="preg-summary five preg-five">
        <div class="preg-stat">
          <div class="preg-stat-num">${active.length}</div>
          <div class="preg-stat-label">임신감정 대상</div>
        </div>
        <div class="preg-stat pregcol">
          <div class="preg-stat-num">${pregnant.length}</div>
          <div class="preg-stat-label">임신중</div>
        </div>
        <div class="preg-stat ratecol2">
          <div class="preg-stat-num">${rateSvc}%</div>
          <div class="preg-stat-label">수정횟수대비 수태율 <span class="preg-stat-sub">수태 ${svcSuccess} / 수정 ${totalServices}</span></div>
        </div>
        <div class="preg-stat ratecol">
          <div class="preg-stat-num">${rateFirst}%</div>
          <div class="preg-stat-label">첫수정 수태율 <span class="preg-stat-sub">수태 ${fsSuccess} / 첫수정 ${fsTotal}</span></div>
        </div>
        <div class="preg-stat">
          <div class="preg-stat-num">${avgServices}<span style="font-size:14px;font-weight:700;">회</span></div>
          <div class="preg-stat-label">수태당 수정횟수 <span class="preg-stat-sub">수정 ${totalServices} / 수태 ${svcSuccess}</span></div>
        </div>
      </div>
      <div class="section-title"><span>임신감정 대상 (${active.length}두)</span></div>
      <div class="pregcheck-list">${activeHtml}</div>
      <div class="section-title" style="margin-top:26px;"><span>🐄 임신중 (${pregnant.length}두)</span></div>
      <div class="pregcheck-list">${pregnantHtml}</div>
    </div>
  `;
}

function renderDiseaseView(){
  const dkey = r => dateOnly(r.examDate || r.aiDate || r.estrusDate || '');
  const recs = DATA.records
    .filter(r => r.owner===UI.owner && (((r.uterineDisease||'').trim()) || ((r.ovarianDisease||'').trim()) || recHasCyst(r)))
    .sort((a,b)=> (dkey(b)||'').localeCompare(dkey(a)||''));

  const uterineRecs = recs.filter(r => (r.uterineDisease||'').trim());
  const uterineResolvedCount = uterineRecs.filter(r => r.uterineResolved).length;
  const uterineCount = uterineRecs.length - uterineResolvedCount;   // 진행중(치료완료 제외)
  const ovaryCount   = recs.filter(r => (r.ovarianDisease||'').trim()).length;
  const animalsSet   = new Set(recs.map(r=>r.animalId));

  // 낭종 호전 판정: 과거 낭종 기록이 있는데 가장 최근 진료에서 낭종 없음
  const cystAnimals = new Set(recs.filter(recHasCyst).map(r=>r.animalId));
  let improvedCount = 0;
  cystAnimals.forEach(id => { const latest = animalRecords(id)[0]; if(latest && !recHasCyst(latest)) improvedCount++; });

  const rows = recs.map(r => {
    const d = dkey(r);
    const tags = [];
    if((r.uterineDisease||'').trim()){
      tags.push(`<span class="disease-tag uterine"><span class="dtag-prefix">자궁 · </span>${esc(r.uterineDisease.trim())}</span>`);
      tags.push(r.uterineResolved
        ? `<span class="disease-tag improved" title="자궁질환 호전">${svgIcon('checkCircle',13)} 호전</span>`
        : `<span class="disease-tag activecyst" title="자궁질환 진행중">🔴 진행중</span>`);
    }
    if((r.ovarianDisease||'').trim()){
      tags.push(`<span class="disease-tag ovary"><span class="dtag-prefix">난소 · </span>${esc(r.ovarianDisease.trim())}</span>`);
    } else if(recHasCyst(r)){
      // 난소질환 칸은 비었지만 초음파 등에 낭종이 적힌 경우: 종류만 (상세 소견은 행 클릭 시 확인)
      tags.push(`<span class="disease-tag ovary"><span class="dtag-prefix">난소 · </span>${esc(cystType(r))}</span>`);
    }
    if(recHasCyst(r)){
      const latest = animalRecords(r.animalId)[0];
      const resolved = latest && !recHasCyst(latest);
      const ct = cystType(r);
      tags.push(resolved
        ? `<span class="disease-tag improved" title="${esc(ct)} 호전">${svgIcon('checkCircle',13)} 호전</span>`
        : `<span class="disease-tag activecyst" title="${esc(ct)} 진행중">🔴 진행중</span>`);
    }
    return `
    <div class="disease-row" data-action="editRecord" data-id="${esc(r.id)}">
      <span class="tag-chip" data-animal-id="${esc(r.animalId)}">${esc(r.animalId)}</span>
      <span class="disease-date">${d?fmtShort(d):'—'}</span>
      <span class="disease-tags">${tags.join('')}</span>
    </div>`;
  }).join('') || `<div class="empty-state">등록된 질환 기록이 없어요.</div>`;

  return `
    <div class="panel">
      <div class="preg-summary five disease-five">
        <div class="preg-stat">
          <div class="preg-stat-num">${animalsSet.size}</div>
          <div class="preg-stat-label">질환 개체</div>
        </div>
        <div class="preg-stat ratecol">
          <div class="preg-stat-num">${uterineCount}</div>
          <div class="preg-stat-label">자궁질환</div>
        </div>
        <div class="preg-stat pregcol">
          <div class="preg-stat-num">${uterineResolvedCount}</div>
          <div class="preg-stat-label">자궁 호전</div>
        </div>
        <div class="preg-stat ratecol2">
          <div class="preg-stat-num">${ovaryCount}</div>
          <div class="preg-stat-label">난소질환</div>
        </div>
        <div class="preg-stat pregcol">
          <div class="preg-stat-num">${improvedCount}</div>
          <div class="preg-stat-label">낭종 호전</div>
        </div>
      </div>
      <div class="section-title"><span>질환 기록 (${recs.length}건)</span></div>
      <div class="pregcheck-list">${rows}</div>
    </div>
  `;
}

let modalCtx = {};

let pendingFocus = null;

function openModal(html){
  closeModal();
  const div = document.createElement('div');
  div.id = 'modalRoot';
  div.className = 'modal-overlay';
  div.innerHTML = html;
  div.addEventListener('mousedown', e=>{ if(e.target===div) closeModal(); });
  document.body.appendChild(div);
}
function closeModal(){
  const el = document.getElementById('modalRoot');
  if(el) el.remove();
}
function toast(msg){
  const old = document.querySelector('.toast');
  if(old) old.remove();
  const div = document.createElement('div');
  div.className = 'toast';
  div.textContent = msg;
  document.body.appendChild(div);
  setTimeout(()=>div.remove(), 2200);
}
function openConfirm(message, fn){

}

/* ===== 구조화 초음파 난소 입력 ===== */
const OVARY_TYPES = ['난포','황체','낭종','소난포들'];
let ovaryState = {};   // { ultraOvaryL:{items,type,free}, ultraOvaryR:{...} }
function parseOvary(val){
  const items=[]; const leftover=[];
  String(val||'').split(',').map(s=>s.trim()).filter(Boolean).forEach(part=>{
    let matched=false;
    for(const t of OVARY_TYPES){
      // 소난포들: 크기 없음, 뒤에 비고 가능
      if(t==='소난포들'){
        const m0 = part.match(/^소난포들(?:\s+(.+))?$/);
        if(m0){ items.push({type:t,size:'',note:(m0[1]||'').trim()}); matched=true; break; }
        continue;
      }
      const m = part.match(new RegExp('^'+t+'\\s*(\\d+(?:\\.\\d+)?)\\s*mm(?:\\s+(.+))?$'));
      if(m){ items.push({type:t,size:m[1],note:(m[2]||'').trim()}); matched=true; break; }
    }
    if(!matched) leftover.push(part);
  });
  return { items, free: leftover.join(', ') };
}
function ovaryCombined(key){
  const st = ovaryState[key]; if(!st) return '';
  const parts = st.items.map(it => {
    let s = it.type;
    if(it.size) s += ' ' + it.size + 'mm';
    if(it.note) s += ' ' + it.note;
    return s;
  });
  if(st.free && st.free.trim()) parts.push(st.free.trim());
  return parts.join(', ');
}
function ovaryChipsHtml(key){
  const st = ovaryState[key]; if(!st) return '';
  return st.items.map((it,i)=>`<span class="ov-chip">${esc(it.type)}${it.size?' '+esc(it.size)+'mm':''}${it.note?' '+esc(it.note):''}<span class="ov-x" data-action="ovaryDel" data-key="${key}" data-i="${i}">${svgIcon('x',12)}</span></span>`).join('');

/* 프로토콜 버튼: 단계별 type 채우고, 1번 날짜가 있으면 오프셋 날짜 자동 계산 */
function applySyncProtocol(name){
  const p = SYNC_PROTOCOLS[name];
  if(!p) return;
  for(let i=1;i<=SYNC_STEPS;i++){
    const typeEl = document.getElementById('f_sync'+i+'Type');
    const dateEl = document.getElementById('f_sync'+i+'Date');
    const timeEl = document.getElementById('f_sync'+i+'Time');
    if(!typeEl) continue;
    if(i <= p.steps.length){
      typeEl.value = p.steps[i-1];
    } else {
      typeEl.value = '';
      if(dateEl) dateEl.value = '';
      if(timeEl) timeEl.value = '';
    }
  }
  UI.activeSyncProtocol = name;
  const base = (document.getElementById('f_sync1Date')||{}).value || '';
  if(base) fillSyncProtocolDates(name, base);
  toast(`${name} 적용 — 1번 날짜를 넣으면 나머지가 자동 계산돼요.`);
}
function fillSyncProtocolDates(name, base){
  const p = SYNC_PROTOCOLS[name];
  if(!p || !base) return;
  for(let i=1;i<=p.steps.length;i++){
    const dateEl = document.getElementById('f_sync'+i+'Date');
    if(dateEl) dateEl.value = addDays(base, p.offsets[i-1]);
  }
}
function clearSyncSteps(){
  UI.activeSyncProtocol = null;
  for(let i=1;i<=SYNC_STEPS;i++){
    const typeEl = document.getElementById('f_sync'+i+'Type');
    const dateEl = document.getElementById('f_sync'+i+'Date');
    const timeEl = document.getElementById('f_sync'+i+'Time');
    if(typeEl) typeEl.value = '';
    if(dateEl) dateEl.value = '';
    if(timeEl) timeEl.value = '';
  }
  toast('동기화 단계를 모두 비웠어요.');
}
function syncSummary(r){
  const parts = [];
  for(let i=1;i<=SYNC_STEPS;i++){
    const type = r['sync'+i+'Type'];
    const date = r['sync'+i+'Date'];
    if(type) parts.push(`${i}) ${type}${date?' '+fmtShort(date):''}`);
  }
  return parts.join(' · ');
}
function firstSyncDate(r){
  for(let i=1;i<=SYNC_STEPS;i++){
    const type = r['sync'+i+'Type'];
    const date = r['sync'+i+'Date'];
    if(type && date) return date;
  }
  return null;
}
function parseDT(str){
  if(!str) return null;
  const datePart = str.slice(0,10);
  const timePart = str.length>10 ? str.slice(11,16) : '00:00';
  const [y,m,d] = datePart.split('-').map(Number);
  const [hh,mm] = timePart.split(':').map(Number);
  return new Date(y, m-1, d, hh, mm);
}
function ownerAnimalsFor(owner){
  return DATA.animals.filter(a=>a.owner===owner).sort((a,b)=>a.animalId.localeCompare(b.animalId));
}
function ensureAnimalExists(owner, animalId){
  if(!DATA.animals.find(a=>a.owner===owner && a.animalId===animalId)){
    DATA.animals.push({animalId, owner, breed:'한우', sire:'', damSire:'', damDamSire:'', birth:null, parity:'', lastCalving:null});
  }
}

function actionCalcInterval(){
  const sd = combineDT(document.getElementById('f_estrusDate_date').value, document.getElementById('f_estrusDate_time').value);
  const ad = combineDT(document.getElementById('f_aiDate_date').value, document.getElementById('f_aiDate_time').value);
  if(!sd || !ad){ toast('발정일시와 수정일시를 먼저 입력해주세요.'); return; }
  const t1 = parseDT(sd), t2 = parseDT(ad);
  let diffMin = Math.round((t2-t1)/60000);
  const neg = diffMin<0; diffMin = Math.abs(diffMin);
  const days = Math.floor(diffMin/1440), hours = Math.floor((diffMin%1440)/60), mins = diffMin%60;
  const parts = [];
  if(days) parts.push(days+'일');
  if(hours) parts.push(hours+'시간');
  if(!days && mins) parts.push(mins+'분');
  document.getElementById('f_aiInterval').value = (neg?'-':'') + (parts.join(' ') || '0분');
}

    if(!DATA.scheduleAnimals[owner].includes(animalId)) DATA.scheduleAnimals[owner].push(animalId);
    const rng = DATA.scheduleRange[owner];
    syncDates.forEach(d => { if(d < rng.start) rng.start = d; if(d > rng.end) rng.end = d; });
  }
  const prevRec = DATA.records.find(x=>x.id===rec.id);
  const oldCalv = prevRec ? dateOnly(prevRec.calvingDate||'') : '';
  const newCalv = dateOnly(rec.calvingDate||'');
  const oldAi = prevRec ? (prevRec.aiDate||'') : '';
  const newAi = rec.aiDate || '';
  const idx = DATA.records.findIndex(x=>x.id===rec.id);
  // 자동 +1 기준값은 '이 기록을 제외한' 현재 수정횟수
  const baseAiCount = (()=>{
    const animal = DATA.animals.find(a=>a.owner===owner && a.animalId===animalId);
    if(!animal) return 0;
    return currentAiCount(animal, DATA.records.filter(r=>r.owner===owner && r.animalId===animalId && r.id!==rec.id));
  })();
  if(idx>-1) DATA.records[idx] = rec; else DATA.records.push(rec);

  // 분만일 자동 처리: 분만일이 '새로' 들어오면 산차 +1, 최근분만일 자동 갱신
  let parityBumped = false, aiBumped = false;
  if(newCalv){
    const animal = DATA.animals.find(a=>a.owner===owner && a.animalId===animalId);
    if(animal){
      if(!oldCalv){                                  // 빈 값 → 분만일 입력 (신규 분만)
        const p = parseInt(animal.parity,10);
        animal.parity = String((isNaN(p)?0:p) + 1);
        animal.aiCountCurrent = '0';                  // 분만하면 수정횟수 리셋 (다음 수정부터 0)
        parityBumped = true;
      }
      const latest = latestCalvingDate(DATA.records.filter(r=>r.owner===owner && r.animalId===animalId));
      if(latest) animal.lastCalving = latest;        // 최근분만일 = 기록 중 가장 최근 분만일
    }
  }
  // 수정일(aiDate)이 '새로' 들어오면 현재 수정횟수 자동 +1 (같은 저장에서 분만 리셋이 일어나면 제외)
  if(newAi && !oldAi && !(newCalv && !oldCalv)){
    const animal = DATA.animals.find(a=>a.owner===owner && a.animalId===animalId);
    if(animal){ animal.aiCountCurrent = String(baseAiCount + 1); aiBumped = true; }
  }
  saveState();
  closeModal();
  UI.selectedAnimal = animalId;
  renderMain();
  const msgs = [];
  if(parityBumped) msgs.push('산차 +1·최근분만일 갱신');
  if(aiBumped) msgs.push('수정횟수 +1');
  toast(msgs.length ? '기록 저장 · '+msgs.join(' · ') : '기록을 저장했어요.');
}

function actionSaveAnimal(){
  const owner = modalCtx.owner;
  const newId = document.getElementById('f_animalId').value.trim();
  if(!newId){ toast('개체번호를 입력해주세요.'); return; }
  const oldId = modalCtx.originalId;
  const dup = DATA.animals.find(a=>a.owner===owner && a.animalId===newId && a.animalId!==oldId);
  if(dup){ toast('이미 존재하는 개체번호예요.'); return; }
  const fields = {
    breed: (document.getElementById('f_breed')||{}).value || '한우',
    sire: document.getElementById('f_sire').value.trim(),
    damSire: document.getElementById('f_damSire').value.trim(),
    damDamSire: document.getElementById('f_damDamSire').value.trim(),
    birth: document.getElementById('f_birth').value || null,
    parity: document.getElementById('f_parity').value.trim(),
    lastCalving: document.getElementById('f_lastCalving').value || null,
    aiDifficulty: document.getElementById('f_aiDifficulty').value,
    aiDifficultyNote: document.getElementById('f_aiDifficultyNote').value.trim(),
    waveMode: (document.getElementById('f_waveMode')||{}).value || '2',
    cycleLength: (document.getElementById('f_cycleLength')||{}).value.trim() || '21',
    manualCycleDay: (document.getElementById('f_manualCycleDay')||{}).value.trim(),
    aiCountCurrent: (document.getElementById('f_aiCountCurrent')||{}).value.trim(),
  };
  if(oldId===null){
    DATA.animals.push({ animalId:newId, owner, ...fields });
    UI.selectedAnimal = newId;
  } else {
    const a = DATA.animals.find(x=>x.owner===owner && x.animalId===oldId);
    Object.assign(a, fields);
    if(newId!==oldId){
      a.animalId = newId;
      DATA.records.forEach(r=>{ if(r.owner===owner && r.animalId===oldId) r.animalId=newId; });
      DATA.schedule.forEach(s=>{ if(s.owner===owner && s.animalId===oldId) s.animalId=newId; });
      const sidx = DATA.scheduleAnimals[owner].indexOf(oldId);
      if(sidx>-1) DATA.scheduleAnimals[owner][sidx]=newId;
      if(UI.selectedAnimal===oldId) UI.selectedAnimal=newId;
    }
  }
  saveState();
  closeModal();
  renderMain();
  toast('개체정보를 저장했어요.');
}

function actionDeleteAnimal(ds){
  const owner = UI.owner, id = ds.id;
  openConfirm('이 개체와 관련된 모든 진료·수정 기록, 스케줄이 함께 삭제돼요. 계속할까요?', ()=>{
    DATA.animals = DATA.animals.filter(a=>!(a.owner===owner && a.animalId===id));
    DATA.records = DATA.records.filter(r=>!(r.owner===owner && r.animalId===id));
    DATA.schedule = DATA.schedule.filter(s=>!(s.owner===owner && s.animalId===id));
    DATA.scheduleAnimals[owner] = (DATA.scheduleAnimals[owner]||[]).filter(x=>x!==id);
    if(UI.selectedAnimal===id) UI.selectedAnimal = null;
    saveState();
    renderMain();
    toast('개체를 삭제했어요.');
  });
}

/* 풀정보: 섹션 제목 + 카드를 접이식(아코디언)으로 묶기 — 모바일에서 목차부터 보이게 */
function groupGrassSections(){
  const root = document.getElementById('modalRoot');
  if(!root) return;
  const titles = [...root.querySelectorAll('.grass-section-title')];
  titles.forEach(title => {
    const details = document.createElement('details');
    details.className = 'grass-acc';
    details.open = false;          // 기본 접힘 → 목차처럼 보임
    const summary = document.createElement('summary');
    summary.className = 'grass-acc-sum';
    summary.innerHTML = title.innerHTML;
    details.appendChild(summary);
    title.replaceWith(details);
    let node = details.nextElementSibling;
    while(node && !node.classList.contains('grass-section-title') && !node.classList.contains('modal-actions')){
      const next = node.nextElementSibling;
      details.appendChild(node);
      node = next;
    }
  });
}

function allOwnersScheduleHtml(){
  const today = todayStr();
  // 개체별 스케줄과 동일한 규칙(scheduleRowsForOwner): 자동개체 포함·숨긴칸 제외·축주별 설정 범위
  const allRows = [];
  DATA.owners.forEach(owner => {
    scheduleRowsForOwner(owner).forEach(r => { if(r.date >= today) allRows.push({ ...r, owner }); });
  });
  allRows.sort((a,b)=>a.date.localeCompare(b.date)||(a.owner.localeCompare(b.owner))||(a.aid.localeCompare(b.aid)));
  if(!allRows.length) return `<div class="empty-state">표시할 스케줄이 없어요.</div>`;
  let html = '';
  let lastDate = '';
  allRows.forEach(row => {
    if(row.date !== lastDate){
      lastDate = row.date;
      const isToday = row.date === today;
      html += `<div class="allsched-date ${isToday?'allsched-today':''}">${row.date} (${weekdayKr(row.date)})</div>`;
    }
    const done = row.done;
    const skipped = isCellSkipped(row.owner, row.aid, row.date);
    html += `<div class="allsched-item ${done?'done':''} ${skipped?'skipped':''} ${row.isAuto?'auto':''}">
      <span class="tag-chip sm" data-animal-id="${esc(row.aid)}" data-owner="${esc(row.owner)}">${esc(row.aid)}</span>
      <span class="allsched-owner">${esc(row.owner)}</span>
      <span class="allsched-note">${esc(row.note)}</span>
      <button class="done-btn ${done?'is-done':''}" data-action="toggleCellDoneAll" data-owner="${esc(row.owner)}" data-aid="${esc(row.aid)}" data-date="${row.date}" title="함(완료)">${svgIcon('check',14)}</button>
      <button class="skip-btn ${skipped?'is-skip':''}" data-action="toggleCellSkipAll" data-owner="${esc(row.owner)}" data-aid="${esc(row.aid)}" data-date="${row.date}" title="안 함">${svgIcon('x',14)}</button>
    </div>`;
  });
  return html;
}

function updateScheduleCell(animalId, date, value){
  value = (value||'').trim();
  const idx = DATA.schedule.findIndex(s=>s.owner===UI.owner && s.animalId===animalId && s.date===date);
  if(value===''){
    if(idx>-1) DATA.schedule.splice(idx,1);
  } else {
    if(idx>-1) DATA.schedule[idx].note = value;
    else DATA.schedule.push({ id:uid(UI.owner+'-sch'), owner:UI.owner, animalId, date, note:value });
  }
  saveState();
}

}

/* ============================================================

============================================================ */
function exportData(){
  try{
    const payload = JSON.stringify(DATA, null, 2);
    const blob = new Blob([payload], { type:'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `번식기록부_백업_${todayStr()}.json`;
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
    toast('백업 파일을 내려받았어요.');
  }catch(e){ console.error(e); toast('백업 내보내기에 실패했어요.'); }
}
function handleImportFile(file){
  if(!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try{
      const obj = JSON.parse(reader.result);
      if(!obj || !Array.isArray(obj.owners) || !Array.isArray(obj.animals) || !Array.isArray(obj.records)){
        toast('형식이 올바른 백업 파일이 아니에요.'); return;
      }
      const cnt = `축주 ${obj.owners.length} · 개체 ${obj.animals.length} · 기록 ${obj.records.length}`;
      if(!confirm(`이 백업으로 현재 데이터를 모두 교체할까요?\n(${cnt})\n현재 내용은 사라집니다.`)) return;
      DATA = obj;
      SAVE_LOCKED = false;                 // 복원하면 저장 잠금 해제
      DATA.owners.forEach(ensureOwnerMeta);
      if(!DATA.owners.includes(UI.owner)) UI.owner = DATA.owners[0];
      saveState();
      applyTheme();
      const banner = document.getElementById('load-error-banner'); if(banner) banner.remove();
      closeModal();
      render();
      toast('백업을 복원했어요.');
    }catch(e){ console.error(e); toast('파일을 읽지 못했어요.'); }
  };
  reader.readAsText(file);
}
function openBackupModal(){
  const st = storageStatusLabel();
  openModal(`
    <div class="modal" style="max-width:440px;">
      <h2>데이터 백업 / 복원</h2>
      <div class="modal-sub" style="margin-bottom:14px;">
        현재 저장 위치: <b>${st.icon} ${esc(st.text)}</b><br>
        데이터는 index.html 파일이 아니라 위 저장소에 보관돼요. 파일을 새로 올려도
        같은 주소(같은 브라우저/클라우드)면 유지됩니다. 만일을 대비해 주기적으로 백업을 내려받아 두세요.
      </div>
      <div style="display:flex;flex-direction:column;gap:10px;">
        <button class="btn" data-action="exportData">${svgIcon('arrowDown',15)} 백업 내보내기 (JSON 다운로드)</button>
        <button class="btn secondary" data-action="importData">${svgIcon('arrowUp',15)} 백업 가져오기 (현재 데이터 교체)</button>
      </div>
      <input id="import-file-input" type="file" accept="application/json,.json" style="display:none;">
      <div class="modal-actions" style="margin-top:16px;">
        <button class="btn secondary" data-action="closeModal">닫기</button>

  const inp = document.getElementById('import-file-input');

}

    const nv = cur===ds.val ? '' : ds.val;

    const grp = e && e.target && e.target.closest('.seg-toggle');
    if(grp){ grp.querySelectorAll('.seg-tbtn').forEach(b=>b.classList.toggle('on', b.dataset.val===nv && nv!=='')); }
    if(ds.then==='refreshPregStage') refreshPregStage();
  },
  applySyncProtocol: ds=>{ if(!isAdmin()) return noAdminToast(); applySyncProtocol(ds.name); },
  clearSyncSteps: ()=>{ if(!isAdmin()) return noAdminToast(); clearSyncSteps(); },
  closeModal: ()=>closeModal(),
  saveRecord: ()=>{ if(!isAdmin()) return noAdminToast(); actionSaveRecord(); },
  saveAnimal: ()=>{ if(!isAdmin()) return noAdminToast(); actionSaveAnimal(); },
  saveOwner: ()=>actionSaveOwner(),
  editOwnerProfile: ()=>openOwnerProfileModal(),
  addKvRow: ds=>actionAddKvRow(ds.cat),
  removeKvRow: ds=>actionRemoveKvRow(ds.cat, parseInt(ds.idx,10)),
  saveOwnerProfile: ()=>{ if(!isAdmin()) return noAdminToast(); actionSaveOwnerProfile(); },
  confirmYes: ()=>{ const fn=pendingConfirmAction; pendingConfirmAction=null; closeModal(); if(fn) fn(); },
};

function initEvents(){
  document.addEventListener('click', e=>{
    const chip = e.target.closest('.tag-chip[data-animal-id]');
    if(chip){
      e.preventDefault();
      const id = chip.dataset.animalId;
      const owner = chip.dataset.owner;
      if(owner && DATA.owners.includes(owner)) UI.owner = owner;
      if(document.getElementById('modalRoot')) closeModal();
      if(UI.globalSearch){ UI.globalSearch=''; const gi=document.getElementById('globalSearchInput'); if(gi) gi.value=''; }
      UI.view = 'animal';
      UI.selectedAnimal = id;
      renderMain();
      return;
    }
    const el = e.target.closest('[data-action]');
    if(!el) return;
    const action = el.dataset.action;
    if(ACTIONS[action]) ACTIONS[action](el.dataset, e);
  });
  document.addEventListener('input', e=>{
    const t = e.target;
    if(t.id==='animalSearchInput'){
      UI.animalSearch=t.value;
      const box=document.getElementById('animalListBox'), cnt=document.getElementById('animalCount');
      if(box){ const d=animalListData(); box.innerHTML=d.listHtml; if(cnt) cnt.textContent=d.animals.length; }
      else { pendingFocus={id:t.id,pos:t.selectionStart}; renderMain(); }
    }
    else if(t.id==='dateSearchInput'){
      UI.dateSearch=t.value;
      const box=document.getElementById('dateRowsBox');
      if(box){ box.innerHTML=dateViewRows(); }
      else { pendingFocus={id:t.id,pos:t.selectionStart}; renderMain(); }
    }
    else if(t.id==='globalSearchInput'){
      UI.globalSearch=t.value;
      renderMain();
    }
    else if(t.classList && t.classList.contains('ov-free')){
      const key=t.dataset.key; if(ovaryState[key]){ ovaryState[key].free=t.value; const hid=document.getElementById('f_'+key); if(hid) hid.value=ovaryCombined(key); }
    }
  });
  document.addEventListener('keydown', e=>{
    const n=e.target;
    if(n && n.classList && (n.classList.contains('ov-num')||n.classList.contains('ov-note')) && e.key==='Enter'){
      e.preventDefault();
      ACTIONS.ovaryAdd({key:n.dataset.key});
    }
  });
  document.addEventListener('change', e=>{
    const t = e.target;
    if(t.matches && t.matches('.sched-cell input')){ if(!isAdmin()){ t.value = DATA.schedule.find(s=>s.owner===UI.owner&&s.animalId===t.dataset.aid&&s.date===t.dataset.date)?.note||''; return noAdminToast(); } updateScheduleCell(t.dataset.aid, t.dataset.date, t.value); }
    else if(t.id==='dateFromInput'){ UI.dateFrom=t.value; renderMain(); }
    else if(t.id==='dateToInput'){ UI.dateTo=t.value; renderMain(); }
    else if(t.id==='calc_aiDate'){ actionCalcDateChange(t.value); }
    else if(t.id==='f_estrusDate_date' || t.id==='f_aiDate_date'){
      const nextEl = document.getElementById('f_nextEstrusDate');
      if(nextEl && t.value){ nextEl.value = addDays(t.value, 21); }
    }
    else if(t.dataset && t.dataset.animalField){
      if(!isAdmin()) return noAdminToast();
      const a = DATA.animals.find(x=>x.owner===UI.owner && x.animalId===t.dataset.id);
      if(a){ a[t.dataset.animalField] = t.value; saveState(); renderMain(); }
    }
    else if(t.id==='f_pregnant'){ refreshPregStage(); }
    else if(t.id==='f_sync1Date' && UI.activeSyncProtocol){
      fillSyncProtocolDates(UI.activeSyncProtocol, t.value);
    }
  });
  document.addEventListener('focusin', e=>{
    if(e.target.matches && e.target.matches('.sched-cell input')){
      UI.focusedCell = { id:e.target.id, aid:e.target.dataset.aid, date:e.target.dataset.date };
    }
  });
  document.addEventListener('keydown', e=>{
    if(e.key==='Escape') closeModal();
  });
}

/* ============================================================
   초기화
============================================================ */
function applyTheme(){
  if(!DATA.theme) DATA.theme = 'light';
  document.documentElement.setAttribute('data-theme', DATA.theme==='dark' ? 'dark' : 'light');
}
// 명백한 오류 날짜 정리 (2000년 이전 예상분만일 → 빈값). 멱등.
function sanitizeData(){
  let changed = false;
  (DATA.records||[]).forEach(r=>{
    const v = (r.expectedCalving||'');
    if(v && /^\d{4}-/.test(v) && parseInt(v.slice(0,4),10) < 2000){
      r.expectedCalving = ''; changed = true;
    }
  });
  return changed;
}
async function init(){
  STORAGE_MODE = await detectStorageMode();
  let stored = null, loadFailed = false;
  try{
    stored = await loadState();
  }catch(e){
    loadFailed = true;
    console.error('불러오기 실패 — 저장을 잠급니다', e);
  }

  if(loadFailed){
    // 읽기 실패: 절대 시드로 덮어쓰지 않음. 화면엔 시드를 보여주되 저장은 잠금.
    DATA = buildInitial();
    SAVE_LOCKED = true;
    setTimeout(showLoadErrorBanner, 0);
  } else if(stored){
    DATA = stored;
  } else {
    // 저장소가 정말 비어있음(최초 실행) → 시드 저장 OK
    DATA = buildInitial();
    await saveState();
  }
  DATA.owners.forEach(ensureOwnerMeta);
  const sanitized = sanitizeData();                 // 오류 날짜(1900 등) 자동 정리
  if(sanitized && !SAVE_LOCKED){ try{ await saveState(); }catch(e){ console.error('정리 저장 실패', e); } }
  UI.owner = DATA.owners[0];
  applyTheme();
  initEvents();
  render();
  subscribeRemoteIfNeeded();
}

function showLoadErrorBanner(){
  if(document.getElementById('load-error-banner')) return;
  const bar = document.createElement('div');
  bar.id = 'load-error-banner';
  bar.style.cssText = 'position:sticky;top:0;z-index:9999;background:#A32D2D;color:#fff;'
    + 'padding:10px 14px;font-size:13px;font-weight:700;text-align:center;line-height:1.5;';
  bar.innerHTML = '⚠️ 저장된 데이터를 불러오지 못했어요. 표시된 건 기본 시드 데이터이며 '
    + '<u>저장이 잠겨 있어</u> 덮어쓰기 사고는 일어나지 않아요. 새로고침하면 다시 시도합니다.';
  document.body.prepend(bar);
}

/* ============================================================
   뷰어 / 관리자 모드
============================================================ */
const ADMIN_PASSWORD = '0918'; // ← 원하는 비밀번호로 바꾸세요
const ADMIN_KEY = 'breeding-admin';

// 현재 관리자 모드인지 여부
function isAdmin(){
  return sessionStorage.getItem(ADMIN_KEY) === 'ok';
}

// 관리자 비밀번호 모달 열기
function openAdminLogin(){
  openModal(`
    <div class="modal" style="max-width:340px;text-align:center;">
      <div style="font-size:28px;margin-bottom:8px;">🔐</div>
      <h2 style="margin:0 0 4px;">관리자 모드</h2>
      <div class="modal-sub" style="margin-bottom:20px;">비밀번호를 입력하면 수정·추가·삭제가 가능해요.</div>
      <input id="admin-pw" type="password" placeholder="비밀번호" style="
        width:100%;box-sizing:border-box;padding:12px 16px;font-size:17px;
        border:1.5px solid var(--line);border-radius:10px;background:var(--surface-alt);
        color:var(--ink);font-family:inherit;text-align:center;letter-spacing:4px;outline:none;margin-bottom:8px;
      ">
      <div id="admin-err" style="height:16px;font-size:12px;color:var(--accent);margin-bottom:12px;"></div>
      <div class="modal-actions">
        <button class="btn secondary" data-action="closeModal">취소</button>
        <button class="btn" id="admin-login-btn">입력</button>
      </div>
    </div>
  `);
  const pw = document.getElementById('admin-pw');
  const btn = document.getElementById('admin-login-btn');
  const err = document.getElementById('admin-err');
  const attempt = () => {
    if(pw.value === ADMIN_PASSWORD){
      sessionStorage.setItem(ADMIN_KEY, 'ok');
      closeModal();
      render();
      toast('관리자 모드로 전환됐어요.');
    } else {
      err.textContent = '비밀번호가 틀렸어요.';
      pw.value = '';
      pw.focus();
      setTimeout(()=>{ err.textContent=''; }, 1500);
    }
  };
  btn.addEventListener('click', attempt);
  pw.addEventListener('keydown', e=>{ if(e.key==='Enter') attempt(); });
  setTimeout(()=>pw.focus(), 100);
}

function logoutAdmin(){
  sessionStorage.removeItem(ADMIN_KEY);
  if(UI.view === 'owner') UI.view = 'animal';
  render();
  toast('뷰어 모드로 전환됐어요.');
}

function noAdminToast(){
  toast('🔒 관리자 모드에서만 수정할 수 있어요.');
}

/* ============================================================
   엑셀 내보내기
============================================================ */
function exportExcel(){
  if(typeof XLSX === 'undefined'){
    toast('엑셀 라이브러리 로딩 중이에요. 잠시 후 다시 시도해주세요.'); return;
  }
  const wb = XLSX.utils.book_new();

  // ── 시트 1: 진료·수정 기록 ──
  const recHeaders = [
    '축주','개체번호','진료일','발정일시','수정일시','수정간격',
    '다음발정일','예상분만일','예상발정주기','1차감정','2차감정','성감정','분만일','송아지성별',
    '발정증상(외음부)','발정증상(점액)','발정증상(자궁수축)','발정증상(기타)',
    '직장검사(자궁)','직장검사(좌난소)','직장검사(우난소)',
    '초음파(자궁)','초음파(좌난소)','초음파(우난소)',
    '자궁질환','난소질환',
    '호르몬처치','수정횟수','내수정횟수','농가수정횟수','KPN','진료메모',
    '동기화1','동기화1날짜','동기화2','동기화2날짜','동기화3','동기화3날짜',
    '동기화4','동기화4날짜','동기화5','동기화5날짜','동기화6','동기화6날짜',
    '동기화7','동기화7날짜',
  ];
  const recRows = DATA.records.map(r => {
    const row = [
      r.owner, r.animalId,
      r.examDate ? r.examDate.slice(0,10) : '',
      r.estrusDate || '', r.aiDate || '', r.aiInterval || '',
      r.nextEstrusDate ? r.nextEstrusDate.slice(0,10) : '',
      r.expectedCalving ? r.expectedCalving.slice(0,10) : '',
      r.expectedCycle || '', r.pregnant || '', r.pregnant2 || '', r.fetalSex || '',
      r.calvingDate ? r.calvingDate.slice(0,10) : '', r.calfSex || '',
      r.estrusVulvar || '', r.estrusMucus || '', r.estrusContraction || '', r.estrusOther || '',
      r.rectalUterus || '', r.rectalOvaryL || '', r.rectalOvaryR || '',
      r.ultraUterus || '', r.ultraOvaryL || '', r.ultraOvaryR || '',
      r.uterineDisease || '', r.ovarianDisease || '',
      r.hormoneTreatment || '', r.aiCount || '', r.inHouseAiCount || '',
      r.farmAiCount || '', r.kpn || '', r.notes || '',
    ];
    for(let i=1;i<=7;i++){
      row.push(r['sync'+i+'Type']||'');
      const sd = r['sync'+i+'Date'];
      row.push(sd ? sd.slice(0,10) : '');
    }
    return row;
  });
  const ws1 = XLSX.utils.aoa_to_sheet([recHeaders, ...recRows]);
  // 열 너비 자동 설정
  ws1['!cols'] = recHeaders.map((_,i) => ({ wch: i<2 ? 10 : i<10 ? 14 : 12 }));
  XLSX.utils.book_append_sheet(wb, ws1, '진료·수정 기록');

  // ── 시트 2: 개체 정보 ──
  const animalHeaders = ['축주','개체번호','품종','부','외조부','외외증조부','출생일','산차','마지막분만일','수정난이도','수정난이도메모'];
  const animalRows = DATA.animals.map(a => [
    a.owner, a.animalId, a.breed||'한우', a.sire||'', a.damSire||'', a.damDamSire||'',
    a.birth||'', a.parity||'', a.lastCalving||'',
    a.aiDifficulty||'', a.aiDifficultyNote||'',
  ]);
  const ws2 = XLSX.utils.aoa_to_sheet([animalHeaders, ...animalRows]);
  ws2['!cols'] = animalHeaders.map(h => ({ wch: h.length > 6 ? 14 : 10 }));
  XLSX.utils.book_append_sheet(wb, ws2, '개체 정보');

  // ── 시트 3: 스케줄 ──
  const schedHeaders = ['축주','개체번호','날짜','내용','완료여부'];
  const schedRows = DATA.schedule.map(s => [
    s.owner, s.animalId, s.date, s.note||'',
    DATA.completedCells && DATA.completedCells[`${s.owner}|${s.animalId}|${s.date}`] ? '완료' : '',
  ]);
  const ws3 = XLSX.utils.aoa_to_sheet([schedHeaders, ...schedRows]);
  ws3['!cols'] = [{ wch:10 },{ wch:18 },{ wch:12 },{ wch:20 },{ wch:8 }];
  XLSX.utils.book_append_sheet(wb, ws3, '스케줄');

  // 파일명: 날짜 포함
  const today = todayStr().replace(/-/g,'');
  XLSX.writeFile(wb, `번식진료기록부_${today}.xlsx`);
  toast('엑셀 파일이 다운로드됐어요.');
}
