<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">임신 4대 주징후 (cardinal signs)</span></div><ul><li>막 슬립(융모요막 슬립): 임신 30~32일부터(숙련 시 후보우 28일), 자궁각을 손가락-엄지로 잡아 들면 막이 미끄러지며 &#x27;톡&#x27; — 32일 실 느낌, 45일 가는 끈, 60일 양쪽 각 굵은 끈, 75일 털실. 90일까지 가장 흔히 사용</li><li>양막낭: 배아를 둘러싼 팽팽한 액체 주머니. 32~35일 직경 6~7mm 매듭, 6주 1.5cm, 7주 3.5~5cm, 8주 6~7cm(팽팽함 소실)</li><li>태아: 약 55~60일 촉진(길이 5~6cm), 액체 속에 떠 있음·부구감(ballottement). 3개월이면 복강으로 떨어지고 4~5개월엔 깊이 내려가 촉진 어려움, 7개월에 다시 접근 가능</li><li>태반분엽(placentome): 75~80일 완두콩 종창, 90일 10센트 동전, 5개월 50센트. 난소 오인 방지 위해 최소 3개 식별. 중기에 태아 도달 어려우면 확정 진단의 최선</li></ul></div>
<p class="rb-p">확정 진단은 &#x27;임신했을 때만 존재하는 구조물&#x27;(4대 주징후)의 식별에 근거하고, 자궁체와 양쪽 자궁각을 완전히 촉진하기 전엔 미임신 진단을 내리지 않는다. 보조 징후 — 자궁경 견인 불가, 자궁 내 액체·파동감, 자궁각 직경 증가·비대칭, 중자궁동맥 비대·진동음(fremitus) — 는 임신을 뒷받침하나 단독으론 확정 지표가 아니다.</p>
<div class="rb-sub">직장촉진 심화 — 오진·감별진단</div>
<p class="rb-p">임신 상태 오판은 대개 불완전한 검사·미숙 때문이고, 서두름·피로가 악화시킨다 — 체계적 루틴을 만들고 충분한 시간을 배정한다. 4대 주징후 중 하나가 없으면 확정하지 않고, 보조 징후로 결정하려는 유혹에 저항한다(보조 징후는 다른 상태로도 생긴다).</p>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">임신으로 오인되는 상태들</span></div><ul><li>자궁축농증·점액자궁증: 자궁 내 액체·파동감으로 견인 어렵고 비대칭 — 단 자궁벽이 임신처럼 얇아지지 않아 더 긴장된 느낌</li><li>기종자궁증(자궁 내 공기): 비대칭·비대</li><li>종양: 견인 어려움·비대칭, 중자궁동맥 비대·드물게 진동음(분만 후 한동안 지속 가능). 자궁은 BLV 유발 종양 호발 부위 — 태아 부위(머리·다리) 없고 태수에 안 떠 있으며 자궁내막과 밀착</li><li>미라화·침연(연화) 태아: 양수·요수 없이 자궁벽이 잔해 주위로 수축, 침연 태아는 갈리는 염발음(crepitus)</li><li>비대한 자궁경: 소프트볼 크기·단단해 태아 머리/골반으로 오인</li><li>분만 후 자궁: 비대·비대칭이나 벽이 두껍고 주징후 없으며 표면 주름(rugae) 촉진</li></ul></div>
<p class="rb-p">자궁과 무관한 구조물도 오인된다 — 반추위 등쪽 주머니(태아보다 훨씬 &#x27;반죽 같은&#x27; 느낌, 특히 유압식 보정틀), 오른쪽 신장(부구감 비슷하나 더 등쪽), 방광(액체 충만 자궁으로 오인). 주의·인내로 철저히 검사하면 생식기와 무관함을 판정할 수 있다.</p>
<div class="rb-sub">직장촉진 심화 — 임신 단계 판정과 위험</div>
<p class="rb-p">임신 1분기는 태아 발달이 일관돼 며칠 이내로 정확히 단계를 판정할 수 있으나(중기부터·마지막 분기로 갈수록 변동↑, 출생체중 25~50kg+로 다양해 추정 정확도 하락). 초기엔 양막낭 크기·막 슬립 정도·자궁각 직경으로, 60일경부터 태아 크기로, 75~80일부터 태반분엽으로, 그리고 자궁동맥 진동음으로 판정한다.</p>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">임신 단계 — 구조물 크기 (표 38.2)</span></div><ul><li>30일: 양막낭 0.6~0.7cm, 임신각에 실, 동맥 3~4mm</li><li>40일: 양막낭 1.2~1.5cm, 가는 끈</li><li>50일: 양막낭 3.5~5cm</li><li>60일: 양막낭 6~7cm(팽팽함 소실), 태아 체장 5~6cm</li><li>70일: 양쪽 각 굵은 끈 (태아 ~생쥐)</li><li>80일: 태반분엽 완두콩 (태아 ~쥐)</li><li>90일: 태반분엽 10센트 동전, 비단-두정 ~3.5cm</li><li>120일: 태반분엽 5센트~25센트, 동측 진동음 6mm (~작은 고양이)</li><li>150일(5개월): 태반분엽 50센트, 동측 진동음 9mm (~큰 고양이)</li><li>180일(6개월): 양측 진동음 10~12mm (~비글)</li><li>210일 스프링어 스패니얼 / 240일 도베르만 / 270일 저먼 셰퍼드 크기</li><li>동측 진동음=약 4개월, 양측 진동음=약 6개월</li></ul></div>
<div class="rb-clinical"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v6M9 5h6M6 9v4a6 6 0 0 0 12 0V9"/><path d="M6 9H4M18 9h2"/><circle cx="12" cy="19" r="2"/></svg><span class="rb-tag">임상</span><span class="rb-tt">직장촉진의 위험 — 질병 전파·배아 사망</span></div><div class="rb-cc-b">BLV: 양성우 촉진 후 공용 소매로 음성우를 반복 촉진 시 혈청전환 입증 — 소매에 혈액이 묻으면 교체·세척이 신중. BVD: PI(지속감염)우 촉진 후 같은 소매로 촉진한 후보우 8/8이 혈청전환·5두 바이러스 분리(소매에 혈액 없었음) — PI 보유 고위험 무리는 추가 예방. 배아 사망: 옛 연구는 45·50일 이전 촉진의 의원성 손실을 시사했으나, 최근 연구(막슬립·양막낭 촉진 vs 초음파)는 임신 손실·분만율·신생아 이상에 차이를 못 보였다 → 정상 관리 내 일상적 직장촉진은 조기 배아·태아 폐사에 유의하게 기여하지 않을 가능성이 크다.</div></div>
<div class="rb-sub">생화학 검사 — 개요와 원리</div>
<p class="rb-p">임신·비임신의 신속·정확한 진단은 수익성이 번식 효율에 좌우되는 낙농에 결정적이다. 전통적으로 직장촉진·직장초음파에 의존했는데, 둘 다 특화 훈련이 필요하고 교배 직후 발정 전에는 진단할 수 없다. 대동물 수의사 부족과 &#x27;가능한 한 이른 비임신 식별&#x27; 욕구가 맞물려 생화학 검사가 매력적이 됐다 — 임신 관련 호르몬이나 임신 특이 분자를 검출하지만, 직장촉진·초음파와 달리 그 자체로는 임신 단계를 정밀히 추정하진 못한다.</p>
<div class="rb-clinical"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v6M9 5h6M6 9v4a6 6 0 0 0 12 0V9"/><path d="M6 9H4M18 9h2"/><circle cx="12" cy="19" r="2"/></svg><span class="rb-tag">임상</span><span class="rb-tt">이상적 검사와 소의 한계</span></div><div class="rb-cc-b">직장촉진은 숙련 시 수정 후 30~35일, 초음파는 25일(최대 민감도 후보우 26일·경산우 29일, 그래서 &#x27;표준&#x27;으로 쓰임)에 진단 가능하나 둘 다 &#x27;다음 예상 발정 전 비임신 진단&#x27;은 못 한다. 이상적 검사는 수정 후 짧은 시간에 임신·비임신을 정확히(민감도·특이도·정확도), 비침습·저비용·우방(chute-side)에서 — 사람의 hCG 임신검사처럼. 그러나 소는 hCG 같은 분자를 안 만들어, 대신 프로게스테론·PAG·EPF·ISG를 본다.</div></div>
<div class="rb-caution"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg><span class="rb-tag">주의</span><span class="rb-tt">특이도는 높지만 민감도는 낮다</span></div><div class="rb-cc-b">P4·PAG·EPF·ISG 분석은 &#x27;임신 식별&#x27;보다 &#x27;비임신 검출&#x27;에 더 정확하다(특이도 &gt;90%, 민감도는 다소 낮음). 이게 경제적으로 중요한 이유 — 공태로 잘못 식별된 암컷은 흔히 프로스타글란딘을 받는데, 이는 임신 암컷에 유산을 유발한다(미국 젖소 임신 손실 평균 $555). 또 자연 임신 손실이 교란 요인이다 — 수정률은 높으나(&gt;90%) 배아·태아 사망이 주 손실원이고, 최초 검사 후 확인 검사 전 손실이 &#x27;위양성&#x27;으로 잘못 표시돼 자료를 왜곡한다.</div></div>
<div class="rb-sub">생화학 검사 — 프로게스테론·PAG</div>
<div class="rb-clinical"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v6M9 5h6M6 9v4a6 6 0 0 0 12 0V9"/><path d="M6 9H4M18 9h2"/><circle cx="12" cy="19" r="2"/></svg><span class="rb-tag">임상</span><span class="rb-tt">프로게스테론 농도</span></div><div class="rb-cc-b">임신이면 CL이 P4를 계속 생성해 다음 예상 발정 시점에도 P4가 상승 유지되고, 공태면 CL 퇴행으로 기저로 감소한다. 보통 교배 후 21~24일에 유·혈청을 RIA/ELISA로 분석한다. 비임신 식별엔 매우 신뢰성 높으나(수정 후 21일 혈중 P4 &lt;1ng/ml면 임신일 수 없음, 비임신 검출 95~100%), 발정 주기 길이의 개체 변동 때문에 임신 양성 진단엔 신뢰도가 낮다(임신 올바른 식별 68~97%). 단점: 단일 시료로 신뢰하려면 교배·수정일을 알아야 한다.</div></div>
<div class="rb-clinical"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v6M9 5h6M6 9v4a6 6 0 0 0 12 0V9"/><path d="M6 9H4M18 9h2"/><circle cx="12" cy="19" r="2"/></svg><span class="rb-tag">임상</span><span class="rb-tt">임신 관련 당단백(PAG)</span></div><div class="rb-cc-b">반추가축 영양막이 모체 인식의 일부로 방출하는 단백(아스파르트산 펩티드분해효소). 처음 발견된 PAG가 임신 특이 단백 B(PSPB) — 착상 무렵 영양막 이핵세포가 생성하고 착상부터 임신 내내 모체 순환에서 검출되며 분만 후까지 지속된다. 공태·미경산 후보우 혈청엔 없어 임신 특이적이고, hCG와 달리 소변엔 안 나온다. 수정 후 24일이면 RIA로 검출(1986 Sasser), &#x27;수정일이 필요 없는&#x27; 게 P4 대비 이점.</div></div>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">PAG 상용 검사 — 한눈에</span></div><ul><li>상용 ELISA: BioPRYN, IDEXX 소 임신 분석, DG29</li><li>소·후보우 모두 수정 후 28일부터 사용, 직장초음파만큼 정확하다고 광고</li><li>시료(혈액·우유)를 실험실 보내 당일 결과 또는 농장 30분 키트</li><li>초음파 동시 검증 시 임신 검출 정확도 89~100%</li><li>단점 ① 긴 반감기 — PSPB가 분만 후 80~100일까지 검출돼 분만 후 초기 교배우에서 주의</li><li>단점 ② 임신 손실 후 위양성 가능</li><li>단점 ③ 교배 후 첫 발정 전 비임신 진단은 못 함</li></ul></div>
<div class="rb-sub">생화학 검사 — EPF·ISG와 떠오르는 연구</div>
<div class="rb-clinical"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v6M9 5h6M6 9v4a6 6 0 0 0 12 0V9"/><path d="M6 9H4M18 9h2"/><circle cx="12" cy="19" r="2"/></svg><span class="rb-tag">임상</span><span class="rb-tt">조기 임신 인자(EPF)</span></div><div class="rb-cc-b">성공 수정 후 24~48시간에 처음 검출되는 면역억제 호르몬으로, 항원적으로 이질적인 임신체를 모체 거부에서 보호한다. 배반포에 이른 생존 임신체만 생성하고, 임신체 사망·제거 후 빠르게 소실되며, PAG와 달리 분만 후엔 검출된 적 없다 → 임신 판정과 배아 사망 인지에 잠재적으로 매우 유용. 단 조기 배아 폐사 빈도가 높아 양성 암컷은 후일 재검해야 한다. 유일한 신뢰 검사는 로제트 억제 검사(RIT)인데 시간이 많이 들고 유지가 어려워 농장 정기 사용엔 비실용적. (과거 ECF 측방유동 검사가 있었으나 특이도 38~51%로 공태 식별이 부정확해 단종.)</div></div>
<div class="rb-clinical"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v6M9 5h6M6 9v4a6 6 0 0 0 12 0V9"/><path d="M6 9H4M18 9h2"/><circle cx="12" cy="19" r="2"/></svg><span class="rb-tag">임상</span><span class="rb-tt">인터페론 자극 유전자(ISG)</span></div><div class="rb-cc-b">소 모체 임신 인식의 주역은 IFN-타우 — 영양외배엽이 분비해 자궁내막에 작용, PGF2α 박동을 억제해 황체용해를 막는다. 단 IFN-타우는 모체 말초에 농도가 너무 낮아 직접 검사 불가. 대신 IFN-타우가 모체 백혈구에서 상향조절하는 ISG(Mx1·Mx2·ISG15)를 본다 — ISG15 mRNA는 수태 후 약 14일 발현, 17~18일 정점, 21~26일 감소. 비임신(특히 후보우) 식별에 유망하나, 단일 채혈(18일) 비임신 검출 89%·최대 정확도엔 연속 검사 필요, 소비자 검사 없음(실시간 PCR 필요), 바이러스 감염 시 ISG가 활성화돼 위양성 가능.</div></div>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">떠오르는 바이오마커</span></div><ul><li>순환 핵산(CNA): 무세포 DNA/RNA — 소 태아 DNA의 &#x27;경태반 누출&#x27;이 입증됨. 임신 30일 이후 성별 판정 정확(수컷 100%·암컷 91%), 임신 20일 임신/공태 간 조성 차이 발견 → 교배 후 20일 식별 가능성</li><li>마이크로RNA(miRNA): 유전자 발현에 관여하는 짧은 비암호화 RNA, 거의 모든 체액에 있어 최소 침습 채취에 이상적 — 임신 고유 miRNA 식별 중, 추가 연구 필요</li></ul></div>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">생화학 검사 비교 (표 39.1)</span></div><ul><li>프로게스테론: RIA/ELISA/LA, 생산자용 있음, 유효 21~28일~, 단점 — 교배일 알아야 신뢰</li><li>PAG: RIA/ELISA, 생산자용 있음, 28일~, 단점 — 긴 반감기로 분만 후 90일 이전 교배우 왜곡</li><li>EPF: RIT, 생산자용 없음, 2~14일, 단점 — 생산자 검사 없음</li><li>ISG15: RT-PCR, 생산자용 없음, 14~26일, 단점 — 신뢰 생산자 검사 없음·바이러스 감염 위양성</li></ul><div class="rb-key-concl">현재 EPF·ISG15만 수정 후 첫 발정 전 개입을 가능케 하나, RIT·실시간 PCR이 필요해 실용성 제한</div></div></div>
<div class="grass-section-title"><span class="gst-wrap"><span class="gst-main">${svgIcon('dna',15)} 15. 태아 프로그래밍과 영양</span><span class="gst-sub">자궁 내 환경이 평생 성적·다음 세대를 좌우한다</span></span></div>
<div class="rb-block"><div class="rb-sub">태아 프로그래밍이란</div>
<p class="rb-p">태아 프로그래밍을 한 줄로 요약하면, 태아기에 어미가 겪은 환경이 그 새끼의 평생 표현형을 바꿔놓고 그 효과는 출생 후 아무리 잘 관리해도 되돌리기 어렵다는 것이다. 같은 유전형이라도 노출이 배아·태아·송아지 중 언제 일어났느냐로 영향이 크게 달라지며, 발달 가소성이 가장 높은 태아기가 제일 취약하다.</p>
<div class="rb-caution"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg><span class="rb-tag">주의</span><span class="rb-tt">출생체중만 보면 안 된다</span></div><div class="rb-cc-b">저체중 송아지는 이환·폐사 위험이 높고 성장이 느리며 지방은 많고 근육은 적은 나쁜 체성분에 대사·번식 기능까지 떨어진다. 다만 출생체중이 멀쩡해도 프로그래밍 효과가 숨어 있다 나중에 드러날 수 있다.</div></div>
<p class="rb-p">소는 양과 다르다는 점도 알아둔다 — 양은 태반이 임신 첫 2/3에 다 자라고 태아 성장의 90%가 마지막 1/3에 몰리지만, 소 태반은 임신 내내 계속 커지되 태아가 태반보다 훨씬 빨리 자란다. 그래서 양 연구를 소에 그대로 적용하면 안 된다.</p>
<div class="rb-sub">근섬유 수는 출생 전에 확정된다</div>
<p class="rb-p">자손 성적에서 반드시 기억할 핵심이다. 총 근섬유 수는 소에서 임신 180일에 확정되고 그 뒤로는 새 근섬유가 생기지 않는다 — 출생 후 성장은 전부 기존 근섬유가 굵고 길어지는 것뿐이다. 그러니 수율 좋은 도체를 원하면 출생 후가 아니라 자궁 안에서 승부가 난다.</p>
<p class="rb-p">자궁에서 영양이 부족하면 대사 성향이 지질 저장 쪽으로 굳어, 나중에 잘 먹여도 따라잡기 성장의 상당 부분이 근육이 아니라 지방으로 간다.</p>
<div class="rb-sub">어미 영양과 결정적 창</div>
<ul class="rb-list"><li><b class="rb-label">분만 전 100일 굶김</b> 송아지 출생체중 7%↓, 폐사율 10%↑. 단 태아 체중당 혈류 효율은 오히려 좋아지는 보상.</li><li><b class="rb-label">임신 첫 1/3 제한</b> 딸의 동난포 수(AFC) 60% 낮게 태어남 → 딸의 평생 가임성에 영향.</li><li><b class="rb-label">임신 후기 단백 보충</b> 딸이 14일 일찍 사춘기 도달.</li></ul>
<div class="rb-clinical"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v6M9 5h6M6 9v4a6 6 0 0 0 12 0V9"/><path d="M6 9H4M18 9h2"/><circle cx="12" cy="19" r="2"/></svg><span class="rb-tag">임상</span><span class="rb-tt">멜라토닌 보충</span></div><div class="rb-cc-b">임신 후반 어미에게 멜라토닌을 보충하면 자궁동맥 혈류가 늘고, 출생체중은 그대로인데 이유 체중이 는다(육우 57파운드). 태아 근육에서 위성세포 활성·근생성이 오르고 지방 생성은 줄어, 강화된 근육 성향이 이유까지 이어진다 — 진짜 태아 프로그래밍 효과다.</div></div></div>
  `;
}
function reproDisorderHtml(){
  return `
<div class="modal-sub" style="margin-bottom:6px;">${svgIcon('noEntry',16)} 번식 장애 — 번식 장애·난소낭종</div>
<div class="grass-section-title"><span class="gst-wrap"><span class="gst-main">${svgIcon('noEntry',15)} 11. 번식 장애</span><span class="gst-sub">무배란/무발정/발견실패 분류, 난소·자궁 질환, 리피트 브리더</span></span></div>
<div class="rb-block"><div class="rb-sub">분류 — 발정이 없으면 난소 상태로 가른다</div>
<p class="rb-p">번식 장애는 우군의 약 10~20%에서 발생하며 난소 관련이 50~60%, 자궁 관련이 20~30%다. VWP를 경과해도 발정이 없는 소는 검진 시 난소 상태로 분류하는 것이 출발점이다.</p>
<ul class="rb-list"><li><b class="rb-label">무배란우</b> 황체 없음, 주기 미회복 — 난소 정지·난포 낭종.</li><li><b class="rb-label">무발정 배란우(둔성 발정)</b> 배란·황체는 있으나 외부 징후가 없음.</li><li><b class="rb-label">발정 발견 실패</b> 관찰 미비 또는 황체 유잔으로 인한 인위적 무발정.</li></ul>
<div class="rb-sub">난소 장애</div>
<p class="rb-p">난소 정지는 황체 형성이 없고 주기가 미회복된, 진짜로 발정이 없는 상태다. 분만 후 회복이 순조로우면 보통 30~40일에 첫 발정이 오므로, 이를 넘겨 난소가 조용하면 의심한다. 배경에 분만 전후 영양 부족, 난산·주산기 질환, 저BCS가 흔하다. 배란 유도제(GnRH/hCG)나 동기화로 배란을 촉진하되, 근본은 컨디션 회복이다.</p>
<p class="rb-p">난포 낭종은 우성 난포가 멈춰야 할 시점에 P4가 낮아 LH 억제가 풀리면, 난포가 배란도 퇴행도 못 하고 25mm 이상으로 커져 10일 이상 유지되는 것이다(저프로게스테론–과잉 LH가 근본 원인, 3장). 고비유 초기 강한 음에너지 균형이 흔한 배경이다. 25mm 이상의 낭종 자체보다 그 이면에서 발육 중인 우성 난포의 배란을 노려 배란 유도제·동기화를 쓰고, 1~2주 후 새 황체 형성을 확인한다.</p>
<p class="rb-p">황체 유존(잔)은 임신 아닌데 황체가 장기간(20mm 이상 15일 이상) 유지돼 발정이 안 오는 상태다. 자궁 내 이물질(미이라·농·점액)이나 내막염에 의한 PGF2α 생성 저해가 배경이며, PGF2α 투여로 퇴행시킨다(자궁 이상 시 세척 병행). 무발정 배란(둔성 발정)은 고비유우에서 E2의 발정 발현 효과가 약해 흔하며, 분만 후 첫 배란의 약 94%가 발정을 동반하지 않는다는 보고와 맥을 같이한다.</p>
<div class="rb-sub">자궁·질 장애</div>
<p class="rb-p">먼저 외음부에서 점액 이외의 비정상 배출물(농=하얀 덩어리, 뇨=소변)이 있는지 본다.</p>
<ul class="rb-list"><li><b class="rb-label">요질</b> 소변이 질 내로 역류·저류(황색·요취). 노령우·수척우에 많고, 외자궁구를 덮을 정도면 발정 시 소변이 자궁으로 역류해 번식이 곤란.</li><li><b class="rb-label">질염</b> 농·질벽 충혈(발정 충혈보다 붉은기 강함). 난산·태반정체·자궁염에 속발. 역성비누 온수/생리식염수 반복 세척.</li><li><b class="rb-label">자궁내막염</b> 외자궁구 농 배출=임상성, 농 안 보이면=잠재성(사이토브러시로 확인). 정상 발정인데 3회 수정 불수태면 의심. 자궁 내 주입(항생제·요드제)이 1선택, 심하면 생리식염수 세척. 발정 발현·수태율을 떨어뜨리므로 번식 개시 전 평가·처치가 중요.</li><li><b class="rb-label">자궁축농증</b> 자궁강에 농 저류 + 난소에 황체 유지(농이 PGF2α를 막아 황체가 안 죽음). 임신 2~3개월과 감별(태막 슬립 없음, 좌우 대칭 팽만). PGF2α로 발정 유도·농 배출 후 자궁 내 주입.</li></ul>
<div class="rb-sub">리피트 브리더 (장기 불수태우)</div>
<p class="rb-p">발정주기·생식기가 정상인데 3회 이상 수정해도 수태되지 않는 소(또는 분만 후 150일 이후 미수태). 발생률 10~20%. 원인이 다양해 단일 처치로 해결되지 않으므로, 우군마다 유효한 방법을 찾는다.</p>
<ul class="rb-list"><li><b class="rb-label">배란 지연형</b> 발정·배란은 되나 발정 개시부터 배란까지 시간이 길어진다(보통 30h, 42h 이후 배란). 수정과 동시에 GnRH/hCG를 근주해 배란을 돕고 부황체 형성을 유도 — 수태율 약 10%↑(무처치 32% vs 처치 42%).</li><li><b class="rb-label">잠재성 자궁내막염형</b> 배란 지연이 아닌데도 3회 이상 불수태면 의심한다. AI 1일 후 배란 확인 시점에 0.5% 포비돈 요드제를 자궁 내 주입 — 항생제나 고농도 요드제보다 수태율 개선 효과가 높다.</li><li><b class="rb-label">진성 리피트 브리더</b> 위 처치로도 안 되면 배 발육 저하·수정 장애를 고려한다. ① 황체 보강: 수정 5일 후 hCG 또는 질내 P4(MFBP)(특히 4회 이상 수정우). ② 자궁내막 기능 회복: E2+P4 변법(시작 시 E2 5.0mg 증량, P4 7~9일 유치)로 정시 AI. ③ 수정란 이식(ET)·추가 이식(Hitch-hike). ④ 배사멸 방지: 임신 30일경 배사멸이 반복되는 소는 임신 확인 후 질내 P4를 2주 유치.</li></ul>
<div class="rb-sub">초음파로 본 병변 &amp; 전신 요인</div>
<ul class="rb-list"><li><b class="rb-label">난포낭종 vs 황체화 난포낭종</b> 난포낭종: 얇은 벽(3mm 이하)+균일 무에코+P4&lt;0.9ng/ml. 황체화 난포낭종: 벽 3mm 이상(3~5mm)+내부 회색 입자+P4&gt;0.9ng/ml. 벽이 두꺼워진 황체화 낭종은 생리적 공동성 황체와 혼동 주의.</li><li><b class="rb-label">자궁 병변</b> 자궁내막염=벽 비후+액체, 무에코에 흰 반점→점액화농성. 자궁농증=벽이 압력으로 얇음. 점액자궁증=다량 정상 액체+벽 정상 두께. 배아 흡수=심박 없음, 액체 성상 변화.</li></ul>
<div class="rb-clinical"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v6M9 5h6M6 9v4a6 6 0 0 0 12 0V9"/><path d="M6 9H4M18 9h2"/><circle cx="12" cy="19" r="2"/></svg><span class="rb-tag">임상</span><span class="rb-tt">생식기보다 소체부터</span></div><div class="rb-cc-b">파행(제병)은 통증·건물 섭취 저하로, 유방염은 발정 발현·수태율 저하로 번식을 크게 떨어뜨린다 — 생식기를 보기 전에 소체의 명백한 이상부터 치료한다. 기능성 황체가 끼면 직장검사만으로 오진하기 쉬우니 초음파로 확인한다.</div></div></div>
<div class="grass-section-title"><span class="gst-wrap"><span class="gst-main">${svgIcon('target',15)} 12. 난소낭종 (낭종성 난포)</span><span class="gst-sub">정의·발생률·병태생리(LH/E2 되먹임)·진단(초음파)·치료(GnRH·hCG·P4·PG·Ovsynch)·위험요인</span></span></div>
<div class="rb-block"><div class="rb-sub">정의와 용어</div>
<p class="rb-p">낭종성 난포(cystic ovarian follicles, COF)는 정상 난소 주기성을 손상시켜 번식을 크게 교란하는 상태로, 소에서 100년 넘게 인식돼 온 저임성·번식 저하의 흔한 원인이다. 가장 흔히 무배란으로 특징지어지고, 젖소에서 전 세계적 주요 경제 손실원이다. 손실은 공태기 증가에 따른 분만 간격 연장, 약물·치료비, 수태당 수정 횟수 증가로 인한 정액비, 이환우의 높은 도태율을 수반한다 — 한 연구에서 COF 암소는 대조보다 첫 수정까지 6~11일, 수태까지 20~30일이 더 걸렸다.</p>
<p class="rb-p">과거엔 낭종성 난소 질환(COD)으로 흔히 불렸고 부신성 남성화증·색정과다증·난소낭종·낭성 난소 변성 등으로도 기술됐다. Roberts의 고전적 정의는 &#x27;황체(CL) 없이 직경 2.5cm 초과로 최소 10일 지속된 무배란 구조물&#x27;이었으나, 소는 보통 직경 1.6~1.9cm 우성 난포를 배란하므로 2.5cm 기준은 더 작은 낭종을 배제하는 문제가 있다. 낭종은 본질적으로 동적이라 &#x27;10일 지속&#x27; 요건도 재고 대상이고(빈번한 교체·대체), 일부 낭종은 스테로이드를 안 만들어 CL이 있어도 발견되므로 &#x27;CL 부재&#x27; 요건도 보편적이지 않다.</p>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">현대적 정의 (Vanholder)</span></div><ul><li>활성 황체 조직 없이 한쪽/양쪽 난소에 존재하는 직경 최소 20mm 난포(들)</li><li>정상 난소 주기성을 명확히 방해</li><li>난포낭종: 보통 얇은 벽, 다양한 양의 에스트라디올 분비(과립막세포층 두께가 좌우), 프로게스테론 분비 안 함</li><li>황체낭종: 난포막·과립막이 어느 정도 황체화해 프로게스테론 생성(같은 질환의 다른 형태)</li><li>두 유형 구별의 단일 보편 프로게스테론 역치는 없음</li></ul></div>
<div class="rb-sub">발생률</div>
<p class="rb-p">COF 발생률은 용도·관리 체계에 크게 의존한다. 육우·후보우보다 젖소에서 훨씬 높아, 비유 젖소 평균 약 10~12%(연구에 따라 3~32%)로 추정된다. 진단 시점이 외견상 발생률에 쉽게 영향을 주는데, COF 젖소의 60%가 분만 후 첫 배란 전에 자연 회복해 진단을 피할 수 있기 때문이다. 정상 분만·태반 배출·분만 후 대사 질환에 교란을 겪은 소는 정상 대조보다 COF 위험이 거의 2배다.</p>
<p class="rb-p">육우는 통상 관리 하에선 발생률이 훨씬 낮지만, 번식을 집약적으로 관리·조작하면 일반 집단보다 높아지기 시작한다 — 과배란 후 수정란 공여에 쓰이는 육우는 발생률이 훨씬 높아 젖소에 근접할 수 있다.</p>
<div class="rb-sub">병태생리 — LH·에스트라디올 되먹임 붕괴</div>
<p class="rb-p">COF 발병 기전은 50년 넘게 연구됐으나 단일 결정적 원인은 밝혀지지 않았다. 일반적 합의는 배란 실패를 부르는 시상하부–뇌하수체–생식선 축의 다요인적 기능장애·신경내분비 불균형이다. 기여 요인은 유전·표현형·환경·대사/세포·관리 요인으로 묶인다.</p>
<p class="rb-p">가장 널리 받아들여지는 가설은 뇌하수체 LH 방출 변화다 — 배란 전 LH 급증이 없거나, 크기가 부족하거나, 시기가 부적절해 우성 난포가 배란에 실패하고 계속 자라 크고 무배란이 된다. 시상하부 GnRH 함량이나 뇌하수체 GnRH 수용체·LH 함량은 감소하지 않는 것으로 보인다. 외인성 에스트라디올을 주사해도 LH 급증을 못 유도하지만 GnRH 주사는 LH 방출을 유도한다 → &#x27;LH를 통제하는 양성 에스트라디올 되먹임 고리의 기능적 붕괴&#x27;를 뒷받침한다(시상하부의 E2 반응성 교란 → 배란 실패).</p>
<p class="rb-p">COF 암소에선 프로게스테론의 음성 되먹임도 소실돼 LH 박동 분비가 정상 황체기보다 높고, 이 높은 박동이 우성 난포의 지속·과도 성장을 촉진해 비정상적으로 큰 배란 전 난포를 만든다. 또 우성 난포의 에스트라디올·인히빈 생성 기간이 길어져 FSH를 억눌러 낭종의 장기 우성을 만든다. COF가 퇴행해 더는 E2·인히빈을 못 만들면 새 난포파가 출현하지만, E2 되먹임 이상이 교정되지 않으면 새 우성 난포도 낭종성·무배란이 되어 무배란이 영속된다(COF 교체·대체).</p>
<div class="rb-clinical"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v6M9 5h6M6 9v4a6 6 0 0 0 12 0V9"/><path d="M6 9H4M18 9h2"/><circle cx="12" cy="19" r="2"/></svg><span class="rb-tag">임상</span><span class="rb-tt">HSP·NEFA</span></div><div class="rb-cc-b">스트레스 요인과 COF 난소의 열충격단백질(HSP) 증가 간 연관이 제기됐다 — HSP 발현 변화가 난포벽 세포자멸사를 줄여 낭종 퇴행을 지연시킨다는 추정. 또 비유 초기 사료 섭취가 산유 수요를 못 채워 NEFA가 높아지는데, 높은 NEFA는 난포막세포·스테로이드 생성에 세포독성을 내 COF 기여 요인으로 제안되며, 자연 회복 실패·반복 발생의 잠재적 설명이다.</div></div>
<div class="rb-sub">임상 증상</div>
<p class="rb-p">COF 증상은 대개 변화된 번식 행동과 관련된다. 가장 흔한 것은 무발정 기간 연장으로 이환우의 80% 이상에서 나타나며, 분만 후 초기에 COF가 생긴 소에서 가장 뚜렷하다. 지속·빈번한 발정이 연장되는 색정과다증은 약 10%에서 나타나는데, 이환우가 다른 발정우에 자주 승가하면서도 자신은 서기 행동을 안 하는 경우가 흔하다. 극도로 수컷 같은 표현형도 색정과다 연장 COF와 연관됐고, 분만~진단 간격이 길수록 색정과다 행동을 볼 가능성이 높다. 산발적·불규칙한 발정 주기도 주된 증상일 수 있다.</p>
<div class="rb-sub">진단 — 초음파</div>
<p class="rb-p">생식기 직장 촉진이 오래 주된 수단이었으나, 숙련 임상의도 촉진만으로 낭종 유형을 정확히 식별하는 정확도는 낮다(낭종·발달 중 황체 모두 동적이라 복잡). 직장 검사로 낭종 진단된 암소의 10%가 초음파로 보니 정상 CL과 일치하는 구조물이었다.</p>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">초음파 감별 — 한눈에</span></div><ul><li>난포낭종: 얇은 벽(&lt;3mm), 난포액 흔히 저에코</li><li>황체낭종: 두껍고 에코 강한 벽(&gt;3mm), 거미줄 같은 강에코 가닥</li><li>초음파 진단 정확도: 난포낭종 74%, 황체낭종 거의 90%</li><li>프로게스테론 농도는 벽 두께와 잘 상관(3mm가 흔한 경계)</li><li>초음파+촉진+혈중 P4 종합 시 거의 100% 근접</li><li>단 현재 권장 치료는 두 낭종을 모두 다루므로 치료 전 유형 구별이 필수는 아님</li></ul></div>
<div class="rb-sub">치료 — GnRH</div>
<p class="rb-p">지난 100년간 많은 치료가 쓰였으나, 현재 효과적·널리 쓰이는 치료는 모두 호르몬 요법으로 우성 난포 배란을 일으키거나 E2 양성 되먹임에 대한 시상하부 반응성을 재확립하는 것을 목표로 한다. 난소절제·자궁 내 항생제 주입·압좌(crushing) 같은 옛 요법은 더는 권장되지 않는다 — 수기 압좌는 호르몬 요법 대비 이점이 없고 외상·유착, 심지어 치명적 출혈이 보고됐다.</p>
<div class="rb-clinical"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v6M9 5h6M6 9v4a6 6 0 0 0 12 0V9"/><path d="M6 9H4M18 9h2"/><circle cx="12" cy="19" r="2"/></svg><span class="rb-tag">임상</span><span class="rb-tt">GnRH (1차 선택)</span></div><div class="rb-cc-b">LH 급증을 일으키는 GnRH가 보통 먼저 선택된다(분자량이 작아 이상 면역반응 가능성 낮음). 표준 용량은 근육 100μg으로 배란 유발에 충분 이상이다. 주사 후 2시간 내 LH 급증 → 낭종 황체화 → 보통 18~20일에 자발 황체퇴행 → 정상 주기. 함께 있는 우성 난포의 배란을 일으키기도 한다. 약 72~85%에서 정상 주기 재개(보통 3주 내 발정 복귀). 한 연구: 단일 GnRH로 20일 내 정상 주기 재개 72% vs 대조 16%. GnRH→발정 간격은 치료 7~10일 후 프로스타글란딘을 줘 줄일 수 있다. (연구 간 결과 변동 큼.)</div></div>
<div class="rb-sub">치료 — hCG·프로게스테론</div>
<div class="rb-clinical"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v6M9 5h6M6 9v4a6 6 0 0 0 12 0V9"/><path d="M6 9H4M18 9h2"/><circle cx="12" cy="19" r="2"/></svg><span class="rb-tag">임상</span><span class="rb-tt">hCG</span></div><div class="rb-cc-b">사람융모성성선자극호르몬(hCG)은 GnRH에 반응하지 않는 난치성 낭종에 쓰는 단백 호르몬이다. 높은 LH 유사 특성으로 낭종·난포를 황체화시켜 프로게스테론 생성을 시작하게 하고, 이후 프로스타글란딘으로 황체 퇴행을 유도해 정상 주기를 재개한다. 흔한 용량은 근육 10,000 IU. 면역 반응(때로 난치성 유발)·아나필락시스 가능성이 있고 GnRH보다 비싸, 보통 GnRH·다른 요법이 실패했을 때만 쓴다.</div></div>
<p class="rb-p">프로게스테론 치료는 40여 년 전 제안됐고, 비유 젖소용 CIDR 승인으로 많은 연구가 이뤄졌다. CIDR로 치료하면 LH 분비가 줄고 낭종이 퇴행하며, 기구 제거 후 새 난포파가 개시돼 정상 주기를 재개한다. 기전(Todoroki 모델): CIDR 방출 P4가 순환 P4를 정상 황체기 수준으로 올려 LH 박동 빈도를 낮춰 낭종 폐쇄(atresia) 유도 → E2·인히빈 억제에서 벗어나 새 난포파 출현 → P4가 우성 난포 과성장을 막고 정상 간격 교체 가능. 축 회복에 충분한 P4 치료 기간은 3일만큼 짧을 수 있다.</p>
<div class="rb-clinical"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v6M9 5h6M6 9v4a6 6 0 0 0 12 0V9"/><path d="M6 9H4M18 9h2"/><circle cx="12" cy="19" r="2"/></svg><span class="rb-tag">임상</span><span class="rb-tt">CIDR 단독·과배란 공여우</span></div><div class="rb-cc-b">Ovsynch+AI한 COF 암소와, CIDR 7일 삽입 후 제거 시 PG 주사·발정 발견 후 AI한 COF 암소의 임신율이 비슷해 CIDR 단독으로도 효과적일 수 있다. Todoroki: 난포낭종 과배란 육우 공여우 28두를 CIDR 14일 치료 → 모두 발정·배란, 64%(18/28)는 반복 회수에도 재발 없음. 수정란 회수 후 동기화에 PG 대신 CIDR을 쓰자 공여우 COF 발생이 크게 줄었다(1년차 61두 중 2두, 2년차 54두 중 0두).</div></div>
<div class="rb-sub">치료 — 프로스타글란딘·Ovsynch</div>
<p class="rb-p">프로스타글란딘은 난포낭종엔 무효라 황체낭종에 국한된다. 난포낭종이 황체화해 황체낭종이 되면 비로소 반응한다 — 황체낭종에 PG 투여 시 8일째까지 90%에서 발정. 난포낭종에 무효라는 점이 &#x27;단독 치료 전 정확한 진단의 중요성&#x27;을 강조한다. 유형을 못 정할 땐 GnRH와 PG 동시 투여가 권장된다(황체낭종이면 가장 효율적으로, 난포낭종도 적절히 치료).</p>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">Ovsynch — COF 치료</span></div><ul><li>낭종 유형과 무관하게 작동하고 발정 발견 없이 수정 기회 제공 → &#x27;범용적&#x27; 유용</li><li>고전적 Ovsynch 후 COF 임신율 17~25%로 다양</li><li>개시 시 GnRH+PG 동시 사용 → 표준 Ovsynch보다 임신율 개선</li><li>Ovsynch+CIDR 결합이 매우 효과적: 새 난포파 동원·COF 교체·축 재설정 + 정시인공수정(FTAI) 가능</li><li>결과: Ovsynch+CIDR 임신율 37.5% vs Ovsynch 단독 16.7%</li></ul></div>
<div class="rb-clinical"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v6M9 5h6M6 9v4a6 6 0 0 0 12 0V9"/><path d="M6 9H4M18 9h2"/><circle cx="12" cy="19" r="2"/></svg><span class="rb-tag">임상</span><span class="rb-tt">추가 요법 — 날록손</span></div><div class="rb-cc-b">오피오이드 길항제 날록손이 평가됐다 — 스트레스가 COF 기여 요인일 수 있고, 내인성 오피오이드가 시상하부 GnRH 방출·E2 유발 LH 급증을 차단하는 것으로 여겨진다. GnRH 작용제 부세렐린과 결합 시 77.5%가 2주 내 낭종 퇴행·정상 주기 시작. 다만 임신율 개선은 통계적으로 유의하지 않아, 권장 전 더 크고 검정력 있는 연구가 필요하다.</div></div>
<div class="rb-sub">위험 요인과 예방</div>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">COF 위험 요인 — 한눈에</span></div><ul><li>고산유: COF와 양의 연관(또는 무연관). 산유↑로 COF↓를 보인 연구는 없음</li><li>분만 후 초기 COF 존재 = 수정 시점 COF의 단일 최대 위험요인(위험 36.6%↑)</li><li>분만 전 BCS 1단위 증가 → COF 발생 8.4배</li><li>비정상 산욕기 → COF 1.9배 / 쌍태 분만 → 2.0~2.7배</li><li>여름철 분만·고령·고생산·분만 직전 체형 증가에서 흔함</li><li>대사: 과비만·인슐린/IGF-1 감소·NEFA 증가</li><li>유전력 낮음(0.07~0.12)이나 특정 가계 호발 — 종축 제거로 발생률 10%→3% 보고</li></ul></div>
<p class="rb-p">예방의 초점은 흔한 분만 후 질병·스트레스 발생을 줄이는 것이다. 초음파를 활용한 신속 진단이 조기 인지·효과적 치료를 가능하게 한다. 특히 낭종 유형을 모를 땐 GnRH+프로스타글란딘 동시 사용을 고려해야 한다(유형 무관 효율적 치료). 분만 후 초기 경산우의 COF 치료는 이로울 수 있는 반면, 어린 암소는 자발적 대기 기간 종료까지 자연 해소를 기다릴 수 있다. 앞으로는 기여 요인을 최소화하고 적시 교배가 가능하도록 신속한 시간 틀 안에서 치료하는 데 노력을 집중해야 한다.</p></div>
  `;
}

<div class="rb-caution"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg><span class="rb-tag">주의</span><span class="rb-tt">자궁염·산욕열의 배경</span></div><div class="rb-cc-b">점액 없이 적갈색 수양성 오로가 나오면 자궁염, 발열·식욕부진까지 있으면 산욕열로 보고 치료한다. 수복 지연 원인은 난산·태반정체·쌍태분만·유열·과비(BCS 3.75↑)다.</div></div>

<p class="rb-p">분만 후 난소는 4~5일경 첫 난포파를 시작해, 우성 난포가 평균 11.6일에 출현하고 첫 배란이 평균 27.4일에 일어난다(개체 차가 크다). 빠른 소는 분만 후 14일 전후 배란해 21일까지 황체를 만들고, 늦은 소는 우성 난포의 발육·폐쇄를 몇 차례 반복한 뒤에야 배란한다. 무엇이 이 차이를 만드나 — 배란하려면 난포가 충분한 E2를 내 LH 서지를 일으켜야 하고, 그러려면 에너지원인 혈당(글루코스), 호르몬 원료인 콜레스테롤, 간에서 나오는 IGF-1이 난포에 충분히 공급돼야 한다. 그런데 고산유우는 간 부하가 크고 글루코스가 유선으로 우선 배분돼 난포로 갈 몫이 줄어 배란·발정 재개가 늦어진다. 그래서 첫 배란이 빠른 소는 분만 전후 대사·간 기능이 좋고 유량이 낮은 경향을 보인다. (한 농장 데이터: 평균 일유량 38kg에서 분만 후 60일까지 68.8%가 배란·주기 재개.)</p>
<div class="rb-clinical"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v6M9 5h6M6 9v4a6 6 0 0 0 12 0V9"/><path d="M6 9H4M18 9h2"/><circle cx="12" cy="19" r="2"/></svg><span class="rb-tag">임상</span><span class="rb-tt">첫 배란의 89%는 발정 없이 온다</span></div><div class="rb-cc-b">난소 주기가 회복돼도 발정 징후가 안 보일 수 있다 — 첫 배란의 89%가 무발정 배란이다. 기전은 이렇다: 배란을 일으킬 만큼 LH는 나오지만, 발정 행동을 켜는 데 필요한 E2 농도엔 못 미쳐 &quot;배란은 되는데 발정만 없는&quot; 둔성 발정이 된다(고비유우는 E2의 발정 발현 작용이 더 약하다). 무발정 비율은 배란을 거듭하며 2회 ~35%, 3회 ~15%, 5회 이후 7%로 낮아진다. 또 첫 배란 뒤 다음 배란이 21일이 아니라 10일 전후로 짧게 올 수 있어(첫 황체가 작고 단명) 주기를 추적해야 한다.</div></div>

<div class="rb-clinical"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v6M9 5h6M6 9v4a6 6 0 0 0 12 0V9"/><path d="M6 9H4M18 9h2"/><circle cx="12" cy="19" r="2"/></svg><span class="rb-tag">임상</span><span class="rb-tt">수익성 기준</span></div><div class="rb-cc-b">개별 소는 분만 후 120일까지 수태가 수익성 플러스, 130~150일 넘기면 다음 분만 시 난산·주산기 질환이 증가한다.</div></div>

<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">목표·BCS</span></div><ul><li>임신율 목표 21% = 발정 발견율 70%↑ × 수태율 30%↑</li><li>분만 후 21일 BCS 변화 → 60일 수정 수태율: 감소군 22.8% / 유지군 36.0% / 증가군 78.3%</li><li>BCS 2.5 이하로 내려가면 가임 주기 회복이 크게 늦어짐</li></ul></div>
<div class="rb-clinical"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v6M9 5h6M6 9v4a6 6 0 0 0 12 0V9"/><path d="M6 9H4M18 9h2"/><circle cx="12" cy="19" r="2"/></svg><span class="rb-tag">임상</span><span class="rb-tt">선순환 만들기</span></div><div class="rb-cc-b">악순환의 고리는 이렇게 돈다 — 이전 유기에 수태가 늦으면 공태 일수가 길어지고, 유량 적은 후기·건유기가 길어져 소가 살찐다 → 과비 상태로 분만하면 분만 후 BCS가 급락하고 질병(태반정체·자궁염·유방염·제병 등)에 잘 걸린다 → 그 유기 내내 번식이 저하된다. 끊는 지점은 &quot;분만 시 과비 예방&quot;이고, 그 방법은 이전 유기에 적기 수태시켜 공태 일수를 줄이는 것이다. 연구에서 분만 후 130일 이내 수태가 다음 분만의 BCS 감소를 억제하고 번식 성적을 끌어올리는 핵심으로 꼽힌다. 즉 지금 유기의 적기 수태가 다음 유기까지 좋게 만든다.</div></div></div>
<div class="grass-section-title"><span class="gst-wrap"><span class="gst-main">${svgIcon('pause',15)} 14. 분만 후 무발정</span><span class="gst-sub">유병률·생리(LH/FSH/키스펩틴)·분류(난포동태 I~IV형·P4 프로파일)·기여요인·진단·치료(P4·GnRH·Ovsynch·eCG)</span></span></div>
<div class="rb-block"><div class="rb-sub">정의와 의의</div>
<p class="rb-p">분만 후 무발정(postpartum anestrus)은 분만 후 수 주 동안, 흔히 자발적(선택적) 대기 기간이 끝날 때까지 발정이 관찰·보고되지 않은 상태다. 분만 직후의 짧은 난소 비활성기는 정상이지만, 젖소처럼 포유시키지 않는 소에서 무발정이 연장되면 적시 임신 재성립에 부정적이다. 소의 무발정은 1920년대에 번식 문제로 처음 보고됐고, 지금도 임상수의사·농가 모두에게 난제다.</p>
<div class="rb-clinical"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v6M9 5h6M6 9v4a6 6 0 0 0 12 0V9"/><path d="M6 9H4M18 9h2"/><circle cx="12" cy="19" r="2"/></svg><span class="rb-tag">임상</span><span class="rb-tt">임성과 도태</span></div><div class="rb-cc-b">현대 젖소의 최적 이하 임성은 전 세계 낙농의 문제이고, 번식 실패는 흔히 도태의 일차 이유다. 한 번도 수정되지 않은 암소의 도태 위험은 최소 한 번 수정된 경우보다 10배 높았다 — 과거 이력으로 교배하지 않기로 한 관리 결정도, 무발정 자체도 이 위험을 높일 수 있어, 발정 암소를 발견해 적시에 교배하는 것이 중요하다.</div></div>
<div class="rb-sub">유병률과 함의</div>
<p class="rb-p">젖소 무발정 유병률은 무리마다 크게 다르나, 선택적 대기 기간 종료(분만 후 60~80일) 시 전형적으로 10~30%이며 개별 무리에선 최대 59%까지 보고됐다. 캐나다 23개 무리 연구(637두 유중 P4 주 2회)에서 배란을 시사하는 첫 P4 상승까지 분만 후 평균 간격은 32.0±0.7일이었다.</p>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">황체 활동 개시 누적 비율 (Herd Navigator, 748두)</span></div><ul><li>분만 후 4주: 27%</li><li>5주: 53%</li><li>6주: 68%</li><li>7주: 77%</li><li>8주: 84%</li><li>9주: 89% — 약 90%가 선택적 대기 종료 시점(9주)까지 주기 개시</li><li>단 분만 후 &#x27;초기&#x27;에 주기 개시한 암소가 첫 수정 P/AI가 더 높음</li></ul></div>
<div class="rb-clinical"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v6M9 5h6M6 9v4a6 6 0 0 0 12 0V9"/><path d="M6 9H4M18 9h2"/><circle cx="12" cy="19" r="2"/></svg><span class="rb-tag">임상</span><span class="rb-tt">산차의 영향</span></div><div class="rb-cc-b">분만 후 28일 이후 황체 활동을 개시한 비율은 경산우보다 초산우에서 높았고(79.1 vs 68.6%), 비유 후기에 63일을 넘겨 무주기로 남은 비율도 초산우에서 높았다(13.1 vs 8.3%). 무발정의 가장 큰 영향은 분만~수태 간격 연장 → 분만 간격 연장이다 — 장기 무주기로 수태가 지연되는 암소는 흔히 비수익적이라 도태 후보가 된다.</div></div>
<div class="rb-sub">생리 ① 무발정으로 이어지는 내분비 사건</div>
<p class="rb-p">임신 중 순환 P4·에스트로겐이 높게 유지돼 시상하부-뇌하수체 축을 억제한다. 임신 후기 말초 P4는 황체기 중기보다 크게 높지 않으나, 순환 에스트로겐은 임신 약 60일부터 점진 증가해 분만 직전 며칠에 50~1000배 높아진다. 고농도 에스트라디올에 장기 노출되면 시상하부 GnRH 분비가 억제돼 LH 합성에 부정적이고, 뇌하수체 LH 비축분이 점진적으로 고갈된다 — LH 방출 기전 자체는 온전하나 박동성 GnRH 분비가 없는 게 문제다.</p>
<div class="rb-clinical"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v6M9 5h6M6 9v4a6 6 0 0 0 12 0V9"/><path d="M6 9H4M18 9h2"/><circle cx="12" cy="19" r="2"/></svg><span class="rb-tag">임상</span><span class="rb-tt">FSH와 난포파</span></div><div class="rb-cc-b">LH와 달리 임신 후기 FSH 변화는 덜 두드러진다 — 평균 FSH는 분만 전후 차이가 없으나, 며칠마다 일어나던 FSH 급증·하강이 분만 직전 마지막 몇 주간 없거나 느려져 난포파 출현도 분만 전 마지막 30일간 없다. 저용량 GnRH를 잦은 간격(1~2시간)으로 주사하면 박동성 LH를 회복시킬 수 있으나 모든 암소가 반응하진 않아, GnRH 억제가 무발정의 유일한 기전은 아닌 것으로 본다.</div></div>
<div class="rb-sub">생리 ② 주기성 재개로 이어지는 내분비 사건</div>
<p class="rb-p">분만이 다가오면 P4가 점진 감소하고 에스트로겐은 분만 직전 24시간 정점에 이른다. 순환 에스트로겐은 거의 전부 태반 기원이라 수정란 배출 후 급락해 분만 후 하루 이내 기저에 이른다. P4·에스트라디올이 사라지면 시상하부-뇌하수체 축이 억제에서 &#x27;해방&#x27;돼 GnRH 박동 발생기가 회복되고, 박동성 GnRH가 정상 FSH 양상을 회복시킨다 — 정상 FSH 급증은 분만 후 3일 이내 재개돼 난포파 출현을 유발한다.</p>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">난포 성장의 호르몬 의존성</span></div><ul><li>초기 단계: 성선자극호르몬 비의존적</li><li>4~9mm 난포 성장: FSH 지지 필요</li><li>9mm 초과 지속 성장: LH 박동 필수</li><li>분만 후 초기 LH 박동은 매우 낮음(4시간당 1회 미만) → GnRH 박동성 증가로 시간당 1~2회로</li><li>뇌하수체 LH 재축적은 3주 이상 걸릴 수 있음</li></ul></div>
<p class="rb-p">뇌하수체 LH 비축분이 보충되면 정상 LH 박동성이 회복돼 더 많은 에스트라디올을 만드는 우성 난포가 성장·확립된다. 우성 난포의 높은 에스트라디올이 LH 급증을 유발해 첫 배란이 일어난다. 첫 배란이 주기성 재개를 알리지만, 모든 암소가 첫 배란 후 정상 주기를 재개하진 않고 일부는 무발정으로 돌아갈 수 있다.</p>
<div class="rb-clinical"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v6M9 5h6M6 9v4a6 6 0 0 0 12 0V9"/><path d="M6 9H4M18 9h2"/><circle cx="12" cy="19" r="2"/></svg><span class="rb-tag">임상</span><span class="rb-tt">키스펩틴</span></div><div class="rb-cc-b">분만 후 초기에 외인성 GnRH·에스트라디올을 줘도 LH 비축분 부족으로 방출이 줄고 생물활성도 낮다. 키스펩틴(kisspeptin)은 시상하부에서 GnRH 합성을 통제하고 LH 방출에 영향을 주는 신경내분비 조절자로, 무발정 암양에서 배란을 유도했고 GnRH·LH 반응이 주기 암양보다 컸다. 소의 분만 후 무발정 종료에서의 직접 역할은 거의 알려지지 않았으나, 임신 유발 무발정 후 주기성 재개에 핵심 역할을 시사하는 증거가 있다. (첫 우성 난포의 운명: ① 배란→CL 형성, ② 무배란→낭종성 난포, ③ 퇴행→새 우성 난포로 교체.)</div></div>
<div class="rb-sub">분류 ① 난포 동태 (I~IV형)</div>
<p class="rb-p">출현(~4mm)·편차(deviation, ~9mm)·배란(10~20mm)의 세 직경에 근거해 무배란 상태를 I~IV형으로 분류한다(Peter 등).</p>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">무발정 I~IV형</span></div><ul><li>I형: 난포가 출현까지 자라나 편차 없음(우성 선택 안 됨) — 극심한 영양실조 추정, &#x27;비활성/매끈한 난소&#x27;(이스라엘 7751비유에서 8.5%). 잘 사양된 북미 젖소엔 드묾</li><li>II형: 편차·성장 후 우성 난포가 퇴행 → 2~3일 후 새 난포파(최대 9차례 보고). 결국 첫 배란 전 난포파가 순차 출현</li><li>III형: 우성 난포가 배란 실패 → 무배란 난포로 머물거나 낭종성 난포로 발달(낭종은 H-P축 되먹임 교란이 있어 무배란 난포와 구별; LH 박동·진폭·평균 농도·에스트라디올 모두 높음)</li><li>IV형: 배란해 CL 형성하나 적시 황체용해가 없어 황체기 연장(황체 잔존) — 황체용해 시점에 에스트로겐성 우성 난포가 없는 비정상 난포 양상이 원인</li></ul></div>
<div class="rb-sub">분류 ② 프로게스테론 프로파일</div>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">P4 프로파일 분류 (Opsomer, 334두)</span></div><ul><li>정상 51%: 분만 후 50일 이전 첫 P4 상승·규칙적 주기</li><li>주기성 지연 21.5%: 분만 후 첫 50일 무발정, 일관되게 낮은 P4</li><li>황체기 연장 21.5%: 선행 수정 없이 P4가 20일 초과 상승 유지</li><li>주기 중단 4%: 정상 주기가 최소 14일 낮은 P4로 중단</li><li>짧은 황체기 0.5% / 불규칙 1.5%</li></ul></div>
<div class="rb-sub">기여 요인 ① 생리·산차·산유</div>
<p class="rb-p">무발정 원인은 흔히 다요인적이고 생리·영양·관리·환경·병리로 분류된다. 수많은 요인 중 &#x27;포유&#x27;와 &#x27;영양(음에너지 균형)&#x27;이 가장 중요하다.</p>
<div class="rb-clinical"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v6M9 5h6M6 9v4a6 6 0 0 0 12 0V9"/><path d="M6 9H4M18 9h2"/><circle cx="12" cy="19" r="2"/></svg><span class="rb-tag">임상</span><span class="rb-tt">포유·산차·산유</span></div><div class="rb-cc-b">포유는 박동성 LH 분비를 억제해 배란을 지연시킨다 — 육우 무발정의 주요 요인이나 젖소는 출생 직후 분리해 일반적으로 원인으로 보지 않는다(단 실험적으로 포유 젖소는 첫 발정까지 5~9주 길었고 LH 박동 빈도 60%·진폭 40% 감소). 산차: 초산우는 첫 배란 지연으로, 4산 이상 경산우는 황체기 연장(자궁 복구 지연→자궁축농증·황체 잔존)으로 위험↑. 산유량: 고산유를 위험으로 본 연구도, 아닌 연구도 — 고산유 자체보다 음에너지 균형이 유력(305일 산유 5000~9500kg에서 100kg↑마다 무배란 2%↓, 9500 초과는 무변화).</div></div>
<div class="rb-clinical"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v6M9 5h6M6 9v4a6 6 0 0 0 12 0V9"/><path d="M6 9H4M18 9h2"/><circle cx="12" cy="19" r="2"/></svg><span class="rb-tag">임상</span><span class="rb-tt">사회적·화학적 신호·품종</span></div><div class="rb-cc-b">육우에서 수소 존재는 분만~주기 재개 간격을 유의하게 줄이고, 분만 후 초기 수소 노출은 무발정 젖소 LH 방출에 급성 효과가 있었다. 발정 암소나 그 자궁경 점액 노출도 특히 무발정이 연장된 암소에서 무발정 기간을 단축할 수 있다. 분만~황체 활동 개시 간격에 품종·유형(유전) 차이도 보고됐다.</div></div>
<div class="rb-sub">기여 요인 ② 영양·음에너지 균형</div>
<p class="rb-p">음에너지 균형(NEB)을 부르는 부족한 건물(에너지) 섭취가 젖소 무발정의 중요 요인이다. 분만 직후 산유 요구로 에너지 수요가 급증해 암소를 이화대사로 내모는데, 반추위 물리적 충만이 분만 후 초기 최대 건물 섭취를 제한한다. 게다가 고산유로 선발된 암소(북미 홀스타인)는 가용 영양을 체형을 희생하며 산유에 선택적으로 쓴다 — 가용 포도당이 모두 우유 합성에 우선 쓰여 이화 상태에서 못 벗어난다. 그 결과 분만 후 10~12주까지 NEB가 이어진다.</p>
<div class="rb-clinical"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v6M9 5h6M6 9v4a6 6 0 0 0 12 0V9"/><path d="M6 9H4M18 9h2"/><circle cx="12" cy="19" r="2"/></svg><span class="rb-tag">임상</span><span class="rb-tt">NEB의 내분비 사슬</span></div><div class="rb-cc-b">NEB 젖소는 인슐린·IGF-1이 낮다. 낮은 IGF-1 → GH 음성 되먹임 감소 → GH↑ → 간 포도당신생합성↑·지방분해↑(NEFA 방출). 높은 GH·NEFA는 인슐린 작용을 길항해 인슐린 저항을 만들어 비유방 조직 포도당 이용을 줄이고 우유용 포도당을 보존한다. NEB는 LH 박동 빈도 감소 + 낮은 혈당·인슐린·IGF-1을 통해 우성 난포의 에스트로겐 생성을 제한 → LH 급증에 필요한 에스트로겐을 줄여 배란을 지연시킨다.</div></div>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">건물 섭취를 줄이는 간접 원인</span></div><ul><li>높은 사육 밀도(사료 경쟁↑)</li><li>자주 일어나 먹기 꺼리게 하는 부실한 칸막이 설계</li><li>지속적 사료 접근을 막는 물리적 장벽</li><li>드문 사료 밀어주기</li><li>먼저 도달한 암소의 과도한 선별</li><li>부실한 발굽 관리로 인한 높은 파행 유병률</li></ul></div>
<div class="rb-sub">기여 요인 ③ 관리·환경·병리</div>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">관리·환경 요인</span></div><ul><li>이전 건유 기간: 77일보다 길면 무발정·배란 지연 위험 거의 3배(건유 없이 사양 시 분만~첫 배란 13.2일 vs 56일 건유 31.9일)</li><li>착유 빈도: 2→3·4회로 늘리면 첫 배란까지 1주 미만 길어짐(사소한 요인)</li><li>발정 발견 효율: 부실하면 미관찰 발정으로 무발정 악화</li><li>사료·급이 관리: 부족한 건물 섭취가 NEB 진입의 주요 이유 — 입자 크기·급이 빈도·그룹화·사료대 관리·과밀 회피</li><li>분만 계절: 겨울 분만이 여름보다 주기 재개 지연(광주기 역할)</li><li>날씨: 고온다습은 발정 발현↓ → 미약·무징후발정</li><li>사회 서열·밀도: 하위 암소가 선별 후 부실 사료 → NEB↑</li><li>수용 유형: 집약·계류식이 무발정 위험↑(활동 변화 못 나타냄)</li><li>누설 전류: 사료 섭취 저해</li></ul></div>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">병리적 요인</span></div><ul><li>자궁 염증: 급성 자궁염·세균 오염은 주기 재개 지연(PMN 높으면 첫 배란 45 vs 32일)</li><li>황체 잔존: 자궁 감염 시 황체기 연장으로 무발정 위험↑(감염 없어도 30일 초과 연장 보고)</li><li>낭종성 난포(COF): 흔히 무발정·무배란, LH 박동성 증가</li><li>분만 장애(난산·쌍태·후산정체), 대사 장애(케토시스·4위전위), 파행, 유방염</li><li>폐렴: 분만 후 첫 달 발생 시 난소 활동 재개 지연 위험 5.4배</li><li>파행+유방염, 파행+심한 스트레스 동반 시 위험 훨씬 큼</li></ul></div>
<div class="rb-sub">미관찰 발정과 임신 배제</div>
<p class="rb-p">미관찰 발정은 흔히 무발정의 주요 기여 요인이다 — 무발정으로 간주된 많은 암소가 사실은 정상 주기를 돌면서도 발정으로 관찰·보고되지 않는다. 두 범주: &#x27;미약발정(subestrus)&#x27;은 발정 행동이 부실해(짧고 약함) 놓치는 경우, &#x27;무징후발정(silent estrus)&#x27;은 뚜렷한 징후를 전혀 안 보이는 경우다. 둘 다 자발 배란·CL 형성이 가능하나 관찰 안 돼 무발정으로 잘못 분류된다.</p>
<div class="rb-clinical"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v6M9 5h6M6 9v4a6 6 0 0 0 12 0V9"/><path d="M6 9H4M18 9h2"/><circle cx="12" cy="19" r="2"/></svg><span class="rb-tag">임상</span><span class="rb-tt">첫 배란은 조용하다</span></div><div class="rb-cc-b">분만 후 첫 배란은 뚜렷한 발정이 선행하는 경우가 드물어 젖소의 단 10~13%만 첫 배란 전 승가허용 발정을 보인다 — 이 비율은 둘째·셋째 주기에서 유의하게 증가하고, 저생산 암소에서 첫 배란 시 발견 비율이 더 높다. 하루 3~4회 전담 관찰 + 이차 징후(턱 얹기·외음부 냄새·핥기·뒤따르기·부분 승가)를 보면 발견 확률이 오른다. &#x27;미관찰 발정으로 인한 무발정&#x27;과 &#x27;진성 무발정&#x27;을 구별하는 것이 매우 중요하다.</div></div>
<div class="rb-caution"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg><span class="rb-tag">주의</span><span class="rb-tt">임신을 먼저 배제</span></div><div class="rb-cc-b">암소가 무발정인 일차적 생리 이유는 임신에 의한 주기성 중단이다. 교배 기록 갱신 시 숫자 전위 같은 입력 오류로 수정우를 미수정으로 잘못 식별해 &#x27;깜짝 임신&#x27;으로 인한 무발정이 가끔 생긴다 — 번식 검사 시 항상 임신을 먼저 배제한다.</div></div>
<div class="rb-sub">진단과 무리 관리 전략</div>
<p class="rb-p">관리 방안을 짜기 전에 무리 수준 유병률을 평가한다. 무발정 육우는 치료하면 정상 임성으로 회복할 수 있으나, 무발정 젖소는 동반된 NEB 때문에 훨씬 낮은 임성을 보인다 — 첫 수정 전에 양에너지 균형으로 되돌리도록 모든 노력을 기울인다.</p>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">진단·영향 최소화 전략</span></div><ul><li>BCS 평가: 클로즈업 건유우(&gt;3.5는 대사장애·무발정 고위험)·신선우·교배군 주목. 비유 60일 넘긴 부실 체형(&lt;3.0) 과다도 문제 → 역치 도달까지 교배 보류. 급성 체형 손실이 절대 BCS보다 임성에 더 해로움</li><li>보행 점수: 파행 조기 식별, 정기 발굽 손질·족욕(파행 암소는 사료 접근 동기 약화 → NEB)</li><li>발정 발견 개선: 미근부 분필/페인트(3색으로 신선우·대기종료·기수정 구분), 대기 종료 30~40일 전 칠하고 매일 기록·주 1회 갱신</li><li>초음파: 분만 후 5~6주 검사가 P/AI 저하 위험 식별에 가치(7~14일 간격 2회 연속이 이상적, TAI 개시 시 1회로도 가능)</li><li>유중 P4 모니터링: Herd Navigator가 발정의 95%+ 검출(무징후 포함), 임신·낭종 발견에도 유용(단 DeLaval 전용·고가)</li><li>혈중 대사물: NEFA·BHBA(분만 첫 주 잠재성 케토시스)·낮은 혈당·IGF-1으로 조기 식별</li></ul></div>
<div class="rb-clinical"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v6M9 5h6M6 9v4a6 6 0 0 0 12 0V9"/><path d="M6 9H4M18 9h2"/><circle cx="12" cy="19" r="2"/></svg><span class="rb-tag">임상</span><span class="rb-tt">무리 전체 접근</span></div><div class="rb-cc-b">개별 사례 관리도 의미 있으나 무리 전체 접근이 흔히 더 유익하다 — 칸막이 편안함·설계 평가를 위해 소를 방해하지 않고 축사를 둘러보고, 번식 관리 관행을 파악하며 발정 발견·AI 인력과 정기 대화한다. 전자 발정 발견 시스템은 위양성(정액·노동 낭비)·위음성(놓친 교배)을 최소화하도록 무리에 맞게 최적화하고, 특히 새로 설치된 무리에서 전적 의존은 지양한다.</div></div>
<div class="rb-sub">치료 ① 영양적 개입</div>
<p class="rb-p">영양-번식 상호작용은 복잡해 특정 영양소의 난소 효과를 정확히 연구하기 어렵다. 클로즈업 건유기의 과도한 에너지 섭취는 분만 직전 건물 섭취 감소·높은 NEFA에 취약하게 하므로 클로즈업 건유우 사료 섭취 모니터링이 중요하다.</p>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">무발정을 줄이는 영양 개입</span></div><ul><li>분만 후 고전분 사료 / 모노프로필렌글리콜 매일 경구</li><li>분만 전 전분 / 리놀레산·리놀렌산 풍부 유지종자 → 첫 배란까지 간격 단축</li><li>건유기 에너지 제한(요구량 80%)이 160% 급여보다 분만 후 NEFA↓·건물 섭취↑</li><li>단 결과는 가변적이고 상업 환경에서 항상 실용·경제적이진 않음</li></ul></div>
<div class="rb-sub">치료 ② 프로게스테론·에스트라디올</div>
<div class="rb-clinical"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v6M9 5h6M6 9v4a6 6 0 0 0 12 0V9"/><path d="M6 9H4M18 9h2"/><circle cx="12" cy="19" r="2"/></svg><span class="rb-tag">임상</span><span class="rb-tt">프로게스테론(IVPD)</span></div><div class="rb-cc-b">분만 후 짧은 고프로게스테론 노출은 발정 발현·정상 황체 기능 확립에 중요하다. 무발정 암소를 P4로 치료하면 배란 전 난포의 LH 박동·에스트라디올·LH 수용체가 증가한다. 요법: 질내 P4 기구(IVPD) 7~9일 삽입→제거→발정 시 수정. PRID(P4 1.55g) 7일 후 71%에서 주기 유도(대조 40%). 무리 치료엔 미약·미관찰 발정의 황체용해 보장 위해 제거 시 PGF2α 병용 권장. 미국 IVPD: CIDR 1380(1.38g)·PRID-Delta(1.55g), 우유 휴약 없음. (경구 프로게스타겐 MGA는 도축용 육우 후보우 외 미승인.)</div></div>
<div class="rb-caution"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg><span class="rb-tag">주의</span><span class="rb-tt">에스트라디올</span></div><div class="rb-cc-b">에스트라디올 단독은 배란 반응이 가변적이라 권장 안 됨. P4 사전 노출이 없으면 발정·배란을 유도해도 황체기가 짧다. 7일 P4 후 에스트라디올 유도법(CIDR 6일→제거 24시간 후 EB 1mg → 87% 발정·P/AI 42%)은 뉴질랜드에서 널리 쓰였으나, 미국엔 소 승인 주사용 에스트라디올 제제가 없다. 식용동물 에스트로겐 우려를 감안하면 대안 제품이 현명하다.</div></div>
<div class="rb-sub">치료 ③ GnRH·Ovsynch</div>
<div class="rb-clinical"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v6M9 5h6M6 9v4a6 6 0 0 0 12 0V9"/><path d="M6 9H4M18 9h2"/><circle cx="12" cy="19" r="2"/></svg><span class="rb-tag">임상</span><span class="rb-tt">GnRH 단독</span></div><div class="rb-cc-b">외인성 GnRH는 분만 후 첫 주에도 LH 방출을 유도하나 반응은 둘째 주에 유의하게 높다. 우성·LH 반응성 난포가 있고 그 난포가 P4에 노출 안 됐다면 배란 확률이 높다(분만 둘째 주 GnRH 100μg에 5두 중 4두 배란). 단 P4 사전 노출 없는 무발정 암소의 배란 유도는 짧은 황체기를 초래해 무발정 회귀를 높일 수 있다 — 한 연구에서 108두 중 93두(86%)가 배란했으나 그중 20%가 무발정으로 회귀. GnRH 단독의 단점이다.</div></div>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">Ovsynch/TAI — 무발정 P/AI (표 34.2)</span></div><ul><li>GnRH+PGF2α 병용 TAI는 무발정 관리에 효과적, P/AI는 주기 대조보다 낮으나 수용 가능</li><li>Moreira: 무발정 18.2%(24) vs 주기 39.0%(303)</li><li>Stevenson: 24.1%(116) vs 38.0%(799)</li><li>Öztürk: 23.1%(26) vs 32.8%(58)</li><li>첫 GnRH에 반응해 배란한 무발정 암소 P/AI는 배란 실패보다 크게 높음(46 vs 6%) → 초음파로 첫 GnRH 배란 반응 판정이 가치</li><li>돼지 LH로 둘째 GnRH 대체 시 P/AI 14%p↑(42 vs 28%), 첫 GnRH 대체 시 배란 반응↑(62 vs 44%)</li><li>더블-Ovsynch가 무주기 배란 유도에 매우 효과적 — 특히 초산우 P/AI 개선</li></ul></div>
<div class="rb-sub">치료 ④ P4 병용·eCG·교배 후</div>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">Ovsynch + IVPD (표 34.3)</span></div><ul><li>Ovsynch 첫 7일 IVPD 삽입 무발정 암소는 IVPD 없는 무발정보다 P/AI↑, IVPD 없는 주기 암소와 비슷</li><li>Stevenson: 무발정 IVPD없음 24.1% vs IVPD있음 32.3%</li><li>McDougall: 33.9% vs 45.7%</li><li>Colazo: 21.8% vs 34.6%</li><li>뉴질랜드 현장(12무리 1662두): Ovsynch+IVPD가 가장 비용 효율적, 두당 NZ$80.40 최고 순이익</li><li>메타분석(21연구 13,762두): CL 없는 암소에 P4 보충 시 32일 P/AI 14%↑·60일 16%↑</li></ul></div>
<div class="rb-clinical"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v6M9 5h6M6 9v4a6 6 0 0 0 12 0V9"/><path d="M6 9H4M18 9h2"/><circle cx="12" cy="19" r="2"/></svg><span class="rb-tag">임상</span><span class="rb-tt">eCG·낭종·교배 후</span></div><div class="rb-cc-b">eCG: 프로게스테론 기반 프로토콜에 추가 시 유익 — GnRH+6~7일 IVPD 후 제거 시 PGF2α+eCG 400IU로 첫 수정 P/AI 5.4%p↑(36.0 vs 30.6%). eCG는 우성·배란 전 난포 발달·배란율을 개선해 CL 질·배아 생존에 긍정적. 낭종성 난포: Ovsynch/TAI가 성공적으로 쓰였으나 P4 기구를 더해도 임신은 개선 안 됨(표 34.4 — 첫 GnRH 후 새 난포 발달 93~100%, TAI 32일 임신 약 41%). 교배 후: AI 4.5일 후 7일 PRID는 임신 손실 감소 경향(5.6 vs 33.3%), TAI 5일 후 GnRH는 P/AI↑(45.5 vs 31.1%).</div></div>
<p class="rb-p">정상체온(&lt;39.1℃) 무발정 암소는 AI 전 PGF 보충 시 P/AI가 고체온(&gt;39.1℃)보다 높았다(38.8 vs 13.3%) — 보충 PGF로 LH 급증 지속·배란 전 난포 크기·난포내 에스트라디올이 더 컸다.</p>
<div class="rb-sub">요약</div>
<p class="rb-p">젖소 분만 후 무발정의 기저 원인은 흔히 다요인적이나 음에너지 균형이 주요 기여 요인이다. 번식 성공을 극대화하려면 무발정 고위험 암소를 조기 식별해 건물 섭취 증가로 관리하고, 발정 발견 효율을 개선해 미관찰 발정으로 인한 무발정을 줄이며, 초음파로 난소 상태를 평가한다. 치료를 택하면 프로게스테론 기반 Ovsynch, P4 기반 전동기화 후 Ovsynch/TAI, 또는 더블-Ovsynch/TAI가 권장되고, P4·GnRH를 쓴 AI 후 치료도 P/AI를 높인다. 무발정 암소를 TAI 프로그램에 넣어 치료하는 것이 무처리에 대한 비용 효율적 대안이다.</p></div>
  `;
}
function husbandryContentHtml(){
  return `
<div class="modal-sub" style="margin-bottom:6px;">${svgIcon('stethoscope',16)} 번식 사양·육성관리 — 후보우 육성·영양·생애주기</div>
<div class="grass-section-title"><span class="gst-wrap"><span class="gst-main">${svgIcon('star',15)} 17. 사춘기와 후보우 관리</span><span class="gst-sub">사춘기 기전·연령 결정 요인·교배 타이밍·생식기 점수(RTS)</span></span></div>
<div class="rb-block"><div class="rb-sub">사춘기의 정의와 기전</div>
<p class="rb-p">사춘기는 미경산우가 스스로 새끼를 밸 수 있게 되는 때다. 임상적으로는 첫 발정이 눈에 띄기 전에 이미 P4가 올라오기 시작하므로, 혈청 P4가 처음 1ng/ml를 넘는 날을 사춘기로 잡는다.</p>
<div class="rb-caution"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg><span class="rb-tag">주의</span><span class="rb-tt">사춘기 ≠ 첫 배란</span></div><div class="rb-cc-b">대부분의 미경산우는 사춘기 전후에 겉으로 발정 징후 없이 배란하는 무발정 배란을 한 번 거치고, 그때 생긴 황체도 정상보다 짧게 가다 사라진다. &quot;발정을 안 보였으니 미성숙&quot;이라 단정하면 틀린다.</div></div>
<p class="rb-p">기전의 핵심은 음성 되먹임 민감도다. 어린 미경산우의 시상하부–뇌하수체는 E2 음성 되먹임에 지나치게 민감해 LH가 눌려 있다 — 배란 능력 자체는 일찍부터 있지만(생식선자극호르몬을 주사하면 1개월령에도 배란 유도 가능) 자발적으로는 못 한다. 사춘기가 가까워지며 이 민감도가 떨어지면 LH 펄스가 잦아지고(첫 배란 무렵 시간당 약 1회), 잦아진 LH가 난포를 성숙시켜 거기서 나온 E2가 거꾸로 GnRH 발생기를 가속해 배란성 LH 급증을 터뜨린다.</p>
<div class="rb-clinical"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v6M9 5h6M6 9v4a6 6 0 0 0 12 0V9"/><path d="M6 9H4M18 9h2"/><circle cx="12" cy="19" r="2"/></svg><span class="rb-tag">임상</span><span class="rb-tt">프로게스테론의 예비점화</span></div><div class="rb-cc-b">첫 배란 후 황체가 짧게 끝나는 것은 내막 옥시토신 수용체가 많아 PGF2α가 일찍 터지기 때문이며, P4에 12~14일 노출돼야 수용체가 하향 조절된다. 그리고 사춘기 직전 약하게 한두 번 오르는 P4가 시상하부를 E2 양성 되먹임에 길들여 이후 정상 주기를 확립한다 — 프로게스틴 처치가 사춘기를 앞당기고 동기화 수태율을 올리는 근거다. 성성숙한 소에서도 P4가 쭉 낮아 이 예비점화가 빠지면 같은 일이 벌어진다 — E2가 있어도 서지가 안 터지는 난포낭종이며(번식 생리 3장), 그 치료에 P4 제제를 쓰는 것도 빠진 예비점화를 채워주는 것이다.</div></div>
<div class="rb-sub">사춘기 연령을 좌우하는 것</div>
<p class="rb-p">사춘기는 보통 9~10개월이지만 6~24개월까지 폭이 넓고, 핵심 원리는 연령보다 체중의 영향을 더 받는다는 것이다. 잘 먹여 빨리 키운 미경산우는 더 어린 나이에 도달하고, 같은 골격이면 더 무거운 쪽이 더 일찍 온다. 품종 효과는 이를 압도해, 성숙 체격이 큰 품종일수록 사춘기가 늦고 더 무겁다.</p>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">영양·신호</span></div><ul><li>증체 예: 100kg부터 하루 1.1/0.8/0.5kg → 사춘기 9/11/16개월</li><li>영양–사춘기를 잇는 신호: 렙틴(체지방 역치)·키스펩틴</li><li>4~9개월령이 신경내분비 축을 프로그래밍하는 결정적 창</li></ul></div>
<ul class="rb-list"><li><b class="rb-label">어미·태아 영양</b> 처녀우(어린 어미)의 딸은 1년령 동난포 수가 적다(난소 비축 작음) → 성숙한 어미의 딸을 후보로. 임신 후기 단백 보충 어미의 딸은 14일 일찍 사춘기.</li><li><b class="rb-label">기질·수소 노출</b> 예민한(보정틀에서 빨리 튀는) 보스 인디쿠스는 코르티솔↑로 사춘기 늦음. 수소 노출은 소에선 사춘기를 앞당기지 않음(양·염소·돼지와 다름).</li></ul>
<div class="rb-sub">교배 타이밍과 사춘기 앞당기기</div>
<div class="rb-caution"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg><span class="rb-tag">주의</span><span class="rb-tt">첫 발정에 바로 교배 금지</span></div><div class="rb-cc-b">사춘기 첫 발정에 수태시키면 분만율이 3차 발정 교배보다 21% 낮다. 미경산우는 교배 예정 시점보다 1~3개월 앞서 사춘기에 도달해 있어야 한다. 또 3차 발정 교배는 첫 발정 교배보다 초회 수태율이 21~36% 높으므로, 목표체중에 시즌 시작 최소 3주 전 도달시켜 미리 주기를 돌게 한다.</div></div>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">체중 목표</span></div><ul><li>사춘기 때 성숙 체중의 55~60%</li><li>교배 목표 ≈ 성숙 체중의 65% (품종마다 다름)</li><li>목표체중까지 ADG 0.5~0.8 kg/일 — 영국종 기준 총 약 91 kg 증체</li><li>2년령 분만이 3년령보다 생애 송아지 수↑ → 이득</li><li>실제론 56%까지만 키워도 65%와 최종 임신율·분만율 차이 없다는 연구도(사료비 두당 $22~45 절감). 단 50% 아래면 후반 수태·경량 송아지 위험</li></ul></div>
<ul class="rb-list"><li><b class="rb-label">광주기</b> 겨울은 사춘기를 늦추고, 멜라토닌·일장 연장은 앞당긴다</li><li><b class="rb-label">프로게스틴</b> MGA 8일 또는 CIDR — 예비점화를 가속하며, 조기 황체퇴행에 취약한 사춘기 전후 미경산우 동기화에 유효</li><li><b class="rb-label">영양</b> 조기 이유 + 고농후사료로 300일령 이전 조숙성 유도 가능</li><li><b class="rb-label">이오노포어</b> 모넨신 약 200 mg/일 — 사료효율·증체를 높이고 사춘기를 앞당긴다</li></ul>
<div class="rb-sub">생식기 점수(RTS)로 사춘기 가늠</div>
<p class="rb-p">직장검사로 난소 난포 발달과 자궁각 긴장도·크기를 보고 1~5로 매기는 주관적 지표다. 점수가 높을수록 인공수정 수태율과 양의 상관을 보인다.</p>
<ul class="rb-list"><li><b class="rb-label">RTS 1</b> 긴장도 없는 작은 자궁각 + 구조물 없는 작은 난소(유아형). 사춘기에서 가장 멀다.</li><li><b class="rb-label">RTS 2</b> 자궁각·난소가 더 커진 단계.</li><li><b class="rb-label">RTS 3</b> 자궁 긴장도와 난포가 만져져 주기 직전.</li><li><b class="rb-label">RTS 4</b> 자궁각이 꼬이고 배란전 크기 난포 존재(주기 도는 것으로 보되 황체는 잘 구별 안 됨).</li><li><b class="rb-label">RTS 5</b> 거기에 황체까지 만져지는 단계.</li></ul>
<div class="rb-clinical"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v6M9 5h6M6 9v4a6 6 0 0 0 12 0V9"/><path d="M6 9H4M18 9h2"/><circle cx="12" cy="19" r="2"/></svg><span class="rb-tag">임상</span><span class="rb-tt">난포 수 계측(AFC)</span></div><div class="rb-cc-b">RTS를 보완하는 선발 도구. 초음파로 양쪽 난소의 동난포를 합산하면 난소 비축(원시난포 수)을 반영하며, 유전·크기·나이·발정 단계가 달라도 재현성이 높다. AFC가 낮은 개체(총 &lt;15)는 작은 난소·낮은 임신율을 보였고(높은 군 &gt;25 대비), 리피트 브리더 소도 동난포가 적다 — 번식 전 가임성·수명 예측에 활용한다.</div></div></div>
<div class="grass-section-title"><span class="gst-wrap"><span class="gst-main">${svgIcon('star',15)} 18. 육우 후보우 육성</span><span class="gst-sub">후보우 경제성·이유 시 선발·교배 전 영양(56% vs 65%)·교배 전 선발(AFC·RTS·기질)·교배철·교배 후~분만·태아 프로그래밍</span></span></div>
<div class="rb-block"><div class="rb-sub">서론과 후보우 경제성</div>
<p class="rb-p">후보우(replacement heifer)는 번식우 무리의 다음 세대 유전적 진보를 대표한다. 투입 자본과 회수 기간 때문에 번식 효율 최적화가 매우 중요하다 — 투자 수익을 거두려면 후보우는 첫 교배철 초반에 임신하고, 두 살에 난산을 최소화하며 분만하고, 적시에 재임신하며, 이후 여러 해 생산성을 이어가야 한다. 그래서 이 목표를 염두에 두고 선발·육성·관리하는 것이 결정적이다.</p>
<p class="rb-p">육성 접근은 지역에 따라 갈린다. 방목지가 풍부·저렴한 지역은 조방적(extensive) 체계가 유리해 — 교배 전 선발 기준을 제한적으로 적용하고 훨씬 많은 수를 공시한 뒤, 교배철 초반 임신우를 임신 검사 때 선발하고 나머지는 판매한다. 토지가 작물과 경쟁하는 중서부는 집약적(intensive) 체계로, 공격적 교배 전 선발 기준을 적용해 공시 두수를 실제 필요보다 10~15%만 많게 제한한다. 어느 체계든 수의사가 관여해 성장·번식 성과 기준을 충족시키는 것이 공용연한·수익성에 도움이 된다.</p>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">후보우 한 마리 육성 비용 (표 29.1, USD)</span></div><ul><li>기간 1(수태~이유): $825.46 — 가장 큰 단일 비용 = 이유 시 시장가치 &#x27;기회비용&#x27;(시장에 안 팔고 남기는 결정에서 발생)</li><li>기간 2(이유~교배): $321 — 85%+가 사료·노동·사육관리비·이자</li><li>기간 3(이유~임신 검사): $129 — 주로 방목·교배 비용(방목 월 $13.60×4개월, 수소 $4,000을 4교배철 분할)</li><li>소계 약 $1,275 → 85% 임신율 보정 시 임신 후보우당 $1,500 → 미임신 판매 환입 후 $1,354</li><li>즉 기회비용 $825.46 + 육성 현금비용 $529</li></ul></div>
<div class="rb-sub">이유 시 선발</div>
<p class="rb-p">미국 육우 후보우의 약 85%가 자신이 분만한 농장에서 길러진다. 대부분 어미–송아지 개체 식별을 쓰지만 관리 결정에 충분히 활용되지 못한다 — 송아지 출생일, 난산 점수/출생 체중, 어미 기질, 이유 체중은 모두 개체 암소의 생산성 추론에 쓸 수 있어, 정확한 자료 수집의 중요성을 고객이 이해하도록 도와야 한다.</p>
<p class="rb-p">육성은 보통 이유 시 잠재 후보축 첫 선발로 시작한다. 연령·체중·기질·어미 생산성을 근거로 선발하고, 발·다리 구조(근골격 건전성)도 평가한다(나쁘면 공용연한에 악영향). 분만철 전반부에 태어난 송아지에서 고르면 교배철 시작 시 사춘기 도달 가능성이 높다. 연령·품종은 이미 정해져 있으므로 &#x27;이유 체중&#x27;이 주된 선발 지표이자 육성 기준이 된다.</p>
<div class="rb-clinical"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v6M9 5h6M6 9v4a6 6 0 0 0 12 0V9"/><path d="M6 9H4M18 9h2"/><circle cx="12" cy="19" r="2"/></svg><span class="rb-tag">임상</span><span class="rb-tt">균일성과 10~15% 규칙</span></div><div class="rb-cc-b">출생일과 무관하게 보통 한 해 송아지를 같은 날 이유하므로 후보축군 균일성이 문제가 된다 — 체중·골격 점수(frame score)로 분류하는 게 첫 단계다. 너무 큰(골격) 후보우나 너무 가벼운(체중) 후보우는 경제 효율을 위해 도태 대상으로 삼는다. 건전한 프로그램은 임신시킬 두수보다 이유 후보우를 10~15%만 더 보유하면 되며, 이로써 불필요한 기회비용을 피한다.</div></div>
<div class="rb-sub">교배 전 영양 관리</div>
<p class="rb-p">유전적으로 특이한 사춘기 체중까지 육성하는 것이 첫 교배철 성공·이후 생산성에 결정적이다(급이는 이유 시 기회비용에 이은 두 번째 큰 비용). 유전·기대 성숙 체격으로 목표 체중(사춘기 도달 체중 추정치)을 정하고, 이유 체중·목표 체중·교배까지 남은 일수로 사료를 설계한다. 보통 필요 증체는 0.5~0.8 kg/일이며, 영국계 품종은 약 91 kg 총 증체에 해당한다.</p>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">목표체중 — 56% vs 65% 근거</span></div><ul><li>전통적 집약 프로그램: 교배 전 기대 성숙체중의 60~65% 도달 강조 → 교배철 전 발정 주기 → 수태율·조기 임신↑</li><li>네브래스카-링컨: 56%(EXT, 부실 조사료+단백 보충 월동) vs 65%(DL, 비방목 사육장) 비교 → 번식 성적 차이 없음(표 29.2)</li><li>EXT군은 교배 전 사춘기 도달 수가 적었으나(46 vs 88%), 전체 임신율·첫 21일 분만 비율은 차이 없음(임신율 92 vs 94%)</li><li>단 50%까지만 육성하면 교배철 후반 임신·더 가벼운 송아지 위험</li><li>비용 절감: 전통 비방목 사육장 대비 후보우당 $22~45</li></ul></div>
<div class="rb-clinical"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v6M9 5h6M6 9v4a6 6 0 0 0 12 0V9"/><path d="M6 9H4M18 9h2"/><circle cx="12" cy="19" r="2"/></svg><span class="rb-tag">임상</span><span class="rb-tt">이오노포어와 3번째 발정</span></div><div class="rb-cc-b">이오노포어를 급여하면 사료 효율·일당증체가 늘고 사춘기 개시가 앞당겨진다(개체당 모넨신 200 mg/일이 효과적). 또 3번째 발정에 교배한 후보우는 사춘기에 교배한 후보우보다 첫 수정 수태율이 21~36% 높다 → 후보우가 교배 시작 최소 3주 전(=1~2주기 전)에 목표 체중에 도달하도록 증체를 관리한다.</div></div>
<div class="rb-sub">교배 전 선발과 관리</div>
<p class="rb-p">교배 약 30~60일 전, 후보우가 실제 교배 프로그램에 들어갈지 정하는 마지막 평가를 한다 — 체중·생식기 점수(RTS)·골반 크기·체형 점수·구조적 정확성을 본다. 어미 기질이 송아지 기질과 높은 상관을 보이고(기질 나쁜 어미의 자손은 비육 성적도 나쁠 수 있음), 사나운 후보우는 AI 수태율이 낮다는 일화적 증거가 있어 — 지나치게 공격적이거나 쉽게 놀라는 개체는 도태 고려한다.</p>
<div class="rb-clinical"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v6M9 5h6M6 9v4a6 6 0 0 0 12 0V9"/><path d="M6 9H4M18 9h2"/><circle cx="12" cy="19" r="2"/></svg><span class="rb-tag">임상</span><span class="rb-tt">동난포 수(AFC)로 공용연한 예측</span></div><div class="rb-cc-b">발정 주기는 2~3차 난포파 뒤 우성 난포 배란으로 이뤄지고, 난포파는 동난포(antral follicle)로 구성된다. AFC(양쪽 난소를 초음파로 주사해 동난포 합산)는 원시난포 수=난소 예비능과 상관이 있어 교배 전 번식 공용연한 평가에 쓴다 — 유전·크기·발정 단계·연령 변이에도 신뢰·재현성이 있다. AFC가 낮은(총 15개 미만) 후보우는 높은(25개 초과) 동기보다 송아지 출생 체중↓·난소↓·후보우 임신율↓였고, 반복 발정(repeat breeder) 암소는 정상 동기보다 동난포 수가 적었다.</div></div>
<p class="rb-p">선발 기준 미달 후보우는 이때 함께 도태한다. 평가는 가속 성장에 필요한 사료 변경에 충분한 시간을 주도록 교배철보다 앞서 한다. 이 보정 작업은 백신·구충제 투여의 좋은 기회이기도 하다. 위생 프로그램은 번식 질병을 표적하고 성장률을 최적화하며, 포유 송아지 때 프로토콜을 보완해 방어 면역을 극대화한다 — 백신 시기·방식·항원은 첫 교배철·첫 임신·이후 성적을 고려해 정하고, 목장 질병 이력·출입 동선·진단 정보를 함께 평가한다. 태아 보호 백신을 활용하고 BQA 지침을 따른다. 구충은 강우·기온·조사료 가용성, 구충제 계열, 목초지 오염 수준, 비용에 따라 전략적으로 한다.</p>
<div class="rb-sub">교배철 관리</div>
<p class="rb-p">교배철 계획은 수소 선발(AI/자연교배)과 발정 동기화 프로토콜 확보·실행에 시간을 둘 만큼 일찍 시작한다. 종축은 번식 건전성 검사 통과 능력과 기대후대차(EPD)로 평가하고, 음낭둘레가 크고 교배 전 수소 노출을 거친 수소를 쓴다(자손 사춘기 개시를 앞당김). 프로게스테론 기반 동기화는 일부 후보우에서 사춘기 유도 이점도 준다. 프로토콜은 농장에 맞게 개별화하고 비용·보정·교배 옵션을 고려한다.</p>
<div class="rb-clinical"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v6M9 5h6M6 9v4a6 6 0 0 0 12 0V9"/><path d="M6 9H4M18 9h2"/><circle cx="12" cy="19" r="2"/></svg><span class="rb-tag">임상</span><span class="rb-tt">조기 임신 진단</span></div><div class="rb-cc-b">AI 종료나 수소 격리 후 30~45일에 조기 임신 진단을 하면 임신 시기·송아지 부(父)·교배철 성공을 더 잘 파악한다 — 번식 실패의 조기 지표를 줘 수의사가 훨씬 일찍 진단에 착수할 수 있고, 조사료 부족 시 미임신·늦은 임신 후보우 도태를 앞당기는 데도 쓴다. 임신 검사는 위생 프로그램의 다음 단계(구충, 임신 중·후기 손실 항원 백신, 필요 시 송아지 설사 백신) 기회이기도 하다. 개체 임신 상태·체형 점수·전체 임신율·임신 분포·도태 정보를 서면 요약으로 보고한다.</div></div>
<div class="rb-sub">교배 후부터 분만까지·태아 프로그래밍</div>
<p class="rb-p">임신 판정되면 적정 체형(평균 체형 점수 5.5~6.5)으로 분만하도록 관리한다 — 난산이 적고 분만 후 간격이 짧으며 둘째 교배철 이후 임신율이 높다. 분만 전 영양은 초유 질·양에 영향을 줘 송아지 발달에도 작용한다. 초산우 송아지는 경산우 송아지보다 24시간 혈청 면역글로불린이 낮은데(초유의 질보다 &#x27;양&#x27; 감소 때문일 가능성), 체형 부실한 두 살 후보우 송아지는 활력↓·면역글로불린↓로 이환·폐사에 직결된다.</p>
<div class="rb-clinical"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v6M9 5h6M6 9v4a6 6 0 0 0 12 0V9"/><path d="M6 9H4M18 9h2"/><circle cx="12" cy="19" r="2"/></svg><span class="rb-tag">임상</span><span class="rb-tt">분만까지 증체 목표</span></div><div class="rb-cc-b">임신 검사 후 증체는 분만 시점까지 기대 성숙체중의 약 85% 도달에 초점을 둔다 — 0.5 kg/일 적정 증체면 충분한 골격·골반·체형으로 첫 분만에 이른다. 태아 성장의 70~75%가 마지막 3분기에 일어나므로 충분한 단백질·에너지·미량광물을 그에 맞게 조정하며, 이는 적시에 비유·성장·재임신해야 하는 분만 후 첫 3개월에 특히 중요하다.</div></div>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">모체 영양·태아 프로그래밍 (표 29.3)</span></div><ul><li>임신 중 모체 영양 손상 → 신생 폐사·장/호흡기 이상·대사 장애·성장률 저하·육질 저하(발달/태아 프로그래밍), 특히 마지막 3분기</li><li>단백 제한 어미의 암송아지: 이유·교배 전·임신 검사 체중↓; 단백 보충 어미 후보우는 더 일찍 사춘기·임신율↑ → 첫 21일 분만 28%↑</li><li>수송아지 동기도 이유 체중·비육장 섭취·초이스 등급·마블링 개선</li><li>주정박으로 에너지 높인 연구: AFC·사춘기 연령 변화 없이 후대 후보우 AI 수태율↑</li><li>후보우 번식 부진 시 무리 전체 영양 관리를 진단 검사에 포함</li></ul></div>
<div class="rb-sub">요약</div>
<p class="rb-p">후보우는 비교적 큰 자본 투자다. 적시에 임신·분만·재임신하도록 적절히 관리해야 하고, 결정적 사건은 적절한 선발·영양 관리·교배철 관리·프로그램 평가를 중심으로 한다. 이 결정적 시점에 성장·성적을 면밀히 모니터링하는 것이 성공의 핵심이며, 시간에 따라 객관적으로 평가·기준화(benchmark)할 기록 체계를 갖춰야 한다. 수의사는 고객이 이 부분을 평가하고 필요한 변화를 주도록 도울 독특한 위치에 있다.</p></div>
<div class="grass-section-title"><span class="gst-wrap"><span class="gst-main">${svgIcon('star',15)} 19. 젖소 후보우 육성</span><span class="gst-sub">이유 후 사양·체중목표(55%/82%)·여분유두·발육표·콕시듐/설폰아미드·기생충·호흡기·백신·유방염(IMM)·증체 목표</span></span></div>
<div class="rb-block"><div class="rb-sub">서론 — 세 가지 기본 원칙</div>
<p class="rb-p">젖소 후보우를 이유시킨 뒤의 사료·위생 관리가 효율적·수익성 있는 후보우 육성에 미치는 영향을 충분히 알아야 한다. 첫 비유기의 성적·생산·번식이 육성 프로그램 성공의 가장 좋은 지표다.</p>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">생산자에게 교육할 세 원칙</span></div><ul><li>① 비용을 과소평가 금지 — 젖소 농장 생산비의 약 25%가 후보우에 배분되고, 그 25% 중 사료가 후보우 육성 총비용의 약 50%</li><li>② 사춘기 이전의 과도·가파른 증체는 첫 비유기 번식·생산에 직접 악영향</li><li>③ 첫 분만 연령은 적정 체중과 함께 약 22~24개월령 — 사료비 최소화·생산 수명 연장에 결정적</li></ul></div>
<div class="rb-sub">이유한 후보우 — 수용과 체중 목표</div>
<p class="rb-p">갓 이유한 후보우는 방목이든 사사(舍飼)든 과밀을 피하고 한 번에 5~10두씩 작은 무리로 허치에서 옮기는 게 필수다 — 이때가 무리로서 가장 큰 스트레스 시기다. 작은 무리의 이점은 사료 변화·병원체 도전·성장에 적응할 기회를 주는 것이고, 궁극 목표는 가능한 한 균질·균형 잡힌 건강한 후보우를 교배군에 보내는 것이다. 단 무리로 모으면 호흡기병·설사, 특히 30일령 이상의 콕시듐증(coccidiosis) 위험이 오른다.</p>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">체중 목표 — 한눈에</span></div><ul><li>체중은 사춘기뿐 아니라 첫 비유기 산유량과도 직접 상관</li><li>교배 개시 시: 성숙 체중의 약 55%</li><li>분만 시: 성숙 체중의 82%</li><li>성장률이 교배 후보우 프로그램의 단연 가장 큰 기여 요인</li><li>체형 점수 1점 ≈ 체중 54kg</li><li>후보우는 9~12개월령, 체중 약 280~300kg에 첫 발정</li></ul></div>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">생산 주기별 목표 체형 점수 (표 30.1, 1~5척도)</span></div><ul><li>성우 분만 3.5 / 산유 정점 2.75 / 비유 중기 3.0 / 건유 3.5</li><li>후보우 6개월령 2.75 / 교배 적령 3.0 / 분만 3.5</li></ul></div>
<div class="rb-clinical"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v6M9 5h6M6 9v4a6 6 0 0 0 12 0V9"/><path d="M6 9H4M18 9h2"/><circle cx="12" cy="19" r="2"/></svg><span class="rb-tag">임상</span><span class="rb-tt">교배 적령·springing 전환</span></div><div class="rb-cc-b">번식 부적격·발육 부진·프리마틴(freemartin)은 가능한 한 빨리 제거한다. 예상 교배 2~3개월 전에 교배군으로 옮겨 발정·문제를 식별하고, 이 시점의 과도한 성장은 낭비이므로 안정적 증체율을 준다. 분만 2개월 이내 &#x27;분만 임박(springing) 후보우&#x27;는 비유군과 비슷한 사료를 주되 양질 조사료 + 제한된 농후사료(체중의 1~2%)로 매끄럽게 전환해 분만 직후 높은 DMI·산유 정점을 받친다. 분만 후 유방부종 원인이 되므로 사료의 나트륨·칼륨 농도에 각별히 주의한다.</div></div>
<div class="rb-sub">여분 유두(부유두) 제거</div>
<p class="rb-p">유방에 유두가 4개를 초과해 있으면 정확히 식별·제거하는 처치가 일상적으로 이뤄지며, 젖소 후보우 건강·성적에 중요하다. 비유우에 여분 유두가 있으면 착유(특히 로봇 착유기)에 지장을 주고 잠재성·임상형 유방염 가능성을 높인다. NAHMS Dairy 2014에서 약 47%가 일상 제거한다고 보고됐고, 12주 미만 송아지일 때 일상 제거하는 농장은 45% 미만이었다(서부 vs 동부 지역 차).</p>
<div class="rb-clinical"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v6M9 5h6M6 9v4a6 6 0 0 0 12 0V9"/><path d="M6 9H4M18 9h2"/><circle cx="12" cy="19" r="2"/></svg><span class="rb-tag">임상</span><span class="rb-tt">권장 시기·방법</span></div><div class="rb-cc-b">저자는 이유 무렵(생후 10~12주)에 날카롭고 깨끗한 메첸바움/메이오 가위로 여분 유두를 식별·제거할 것을 권한다. 아나플라스마증·BVD·소백혈병(BLV) 같은 혈액매개 질병 전파를 막기 위해 개체 간 가위 냉소독(cold sterilization)을 쓰는 엄격한 차단방역 프로토콜을 반드시 지킨다.</div></div>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">홀스타인·저지 발육 목표 (표 30.2)</span></div><ul><li>6개월: 체중 H160 / J113kg, 체고 H100 / J90cm, ADG 0.7~0.8kg/일</li><li>12개월: H295 / J204, 체고 H119 / J107, ADG 0.7~0.8</li><li>18개월: H408 / J272, 체고 H127 / J114, (사춘기 후) ADG 0.6~0.7</li><li>24개월: H544 / J363, 체고 H132 / J122, (사춘기 후) ADG 0.6~0.7</li><li>(H=홀스타인, J=저지; 지역·육성 체계에 따라 변동)</li></ul></div>
<div class="rb-sub">이유 후 위생 — 콕시듐과 이오노포어</div>
<p class="rb-p">위생 사건은 부진한 성적·추가 노동·조기 도태·폐사로 후보우 육성 비용을 높이는 주요 동인이다. 원충성(Eimeria sp.) 설사에 이어 호흡기 질환이 이유 후 질병의 주된 원인이다.</p>
<div class="rb-clinical"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v6M9 5h6M6 9v4a6 6 0 0 0 12 0V9"/><path d="M6 9H4M18 9h2"/><circle cx="12" cy="19" r="2"/></svg><span class="rb-tag">임상</span><span class="rb-tt">이오노포어</span></div><div class="rb-cc-b">이온운반체는 현재 수의사료지시(VFD) 처방을 요하지 않지만 라벨 지침을 따르도록 조언해야 한다 — 콕시듐증 예방을 도울 뿐 아니라 메탄 손실을 줄이고 반추위 프로피온산 생성을 늘려 사료 효율을 높인다(프로피온산은 간 포도당신생합성에 필수라 에너지 생산에 기여). 육우 비육장에서 널리 쓰이고 2000년대 초 비유 젖소용 라벨이 마련됐다. 분만 전 모넨신은 비유 초기 에너지 대사·전환에 긍정적이고 잠재성 케토시스·분만 후 질병 감소와 관련된다. 비유 초기 모넨신은 산유량을 하루 1kg 늘릴 수 있으나 유지방 저하가 올 수 있는데, 특히 라살로시드에서 반추위 휘발성지방산 영향으로 나타나며 용량 의존적이다. 라벨상 송아지 모넨신은 200mg/일/두를 넘기지 않는다.</div></div>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">항콕시듐제 (표 30.3) — 예방 / 치료</span></div><ul><li>암프롤리움(Corid): 예방 5mg/kg·28일 / 치료 10mg/kg·5일</li><li>설파메타진(Sustain III bolus): 치료 32.1g/200lb 1회 (예방 해당 없음)</li><li>설파디메톡신(Albon): 치료 25mg/lb 후 12.5mg/lb·3~4일</li><li>라살로시드(Deccox): 예방 0.5mg/kg·28일</li><li>데코퀴네이트(Bovatec): 예방 1.0mg/kg·28일</li><li>모넨신(Rumensin): 예방 1.2mg/kg·28일</li></ul></div>
<div class="rb-clinical"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v6M9 5h6M6 9v4a6 6 0 0 0 12 0V9"/><path d="M6 9H4M18 9h2"/><circle cx="12" cy="19" r="2"/></svg><span class="rb-tag">임상</span><span class="rb-tt">설폰아미드</span></div><div class="rb-cc-b">콕시듐 설사 발작 치료에 설폰아미드도 쓴다. 식용동물용 라벨은 설파디메톡신·설파메타진뿐이고 나머지는 1994년 AMDUCA로 금지된다. 설파메타진은 비유 젖소용 서방형 볼루스(라벨대로 최대 72시간 치료 농도)이고, 비유 젖소 치료엔 설파디메톡신만 가능(정맥·경구). 식육 7일·우유 60시간 휴약을 반드시 지킨다.</div></div>
<div class="rb-sub">이유 후 위생 — 기생충·호흡기·백신</div>
<p class="rb-p">내부 기생충은 위장관 영양 흡수를 떨어뜨려 증체를 깎고, 외부 기생충(진드기·모기·침파리·집파리·뿔파리·등에·사슴파리·이)은 혈액·피부·털을 먹어 피부병·개방창까지 일으킨다. 발생은 계절·지역을 타므로 그에 맞춰 방제한다. 이·진드기는 수직·수평 전파 매개체로, 파리는 우유 세균 수 증가에 기여하고 전염성 소각결막염(IBK)·혈액매개 질병의 주요 매개체다.</p>
<div class="rb-clinical"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v6M9 5h6M6 9v4a6 6 0 0 0 12 0V9"/><path d="M6 9H4M18 9h2"/><circle cx="12" cy="19" r="2"/></svg><span class="rb-tag">임상</span><span class="rb-tt">호흡기 질환</span></div><div class="rb-cc-b">호흡기 발생 조사 시 이환·폐사·백신·치료 프로토콜·영양·연령·수용 조건·증례 정의 기록이 필요하다(McGuirk). NAHMS Dairy 2014: 호흡기 질환이 이유 후보우 폐사의 약 59%, 진단우의 90% 이상이 항균제 치료. 상위 3개 항균제는 순서대로 플로르페니콜·마크로라이드·테트라사이클린.</div></div>
<div class="rb-clinical"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v6M9 5h6M6 9v4a6 6 0 0 0 12 0V9"/><path d="M6 9H4M18 9h2"/><circle cx="12" cy="19" r="2"/></svg><span class="rb-tag">임상</span><span class="rb-tt">교배 전 백신</span></div><div class="rb-cc-b">교배 30~45일 전 핵심 백신 추가접종(booster)이 강력히 권장된다 — 이유·추가 합사 전에 약독화 생호흡기 5종(IBR·PI3·BRSV·BVDV 1·2형), 교배 시점에 5가 렙토스피라(Pomona·Grippotyphosa·Canicola·Icterohaemorrhagiae·Hardjo). 임신우는 지난 12개월 내 같은 제품에 노출된 개체만 약독화 생제품으로 추가접종할 수 있다. 이유 전 송아지에 호흡기병이 잦으면 초유 관리·비유우/건유우 백신 프로토콜을 평가한다. (호흡기 치료 라벨 항균제(표 30.4)는 용량·경로·휴약·허용 연령군이 제각각이고, ELDU 시 일부는 AMDUCA 금지 범주(플루오로퀴놀론·특정 설폰아미드)에 해당.)</div></div>
<div class="rb-sub">유방염(IMM)과 증체 목표</div>
<p class="rb-p">잠재성·임상형 유방염은 초산우의 산유·번식 손실과 관련된다. 유방내(IMM) 항균제는 분만 후 유방내 감염 유병률·체세포 수를 낮추고 산유량을 늘릴 목적으로 분만 임박 후보우에 흔히 쓰이나, Royster·Wagoner(2015) 리뷰는 분만 시 IMI 유병률을 낮춘다는 증거는 있어도 감염 위험이 높거나 다른 관리가 없는 경우가 아니면 경제적·실용적이지 않다고 밝혔다.</p>
<div class="rb-clinical"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v6M9 5h6M6 9v4a6 6 0 0 0 12 0V9"/><path d="M6 9H4M18 9h2"/><circle cx="12" cy="19" r="2"/></svg><span class="rb-tag">임상</span><span class="rb-tt">후보우 유방염 — 예방이 핵심</span></div><div class="rb-cc-b">분만 임박 후보우 IMM 사용은 라벨 외 사용(ELDU)이라 유방염 발생이 높은 것으로 입증된 무리에서만 면허 수의사가 처방한다. de Vliegher(2012): 비유 후보우가 주요 유방염 병원체에 흔히 감염되고 수평 전파 가능 — 핵심은 예방(전반 위생, 특히 분만 시 / 파리 방제 / 교차 포유 방지). 주된 원인체는 응고효소 음성 포도상구균, 이어 응고효소 양성 포도상구균·환경성 병원체. IMM 단독은 늘 효과적이진 않으나, IMM + 유두 봉합제(teat sealant) 병용은 비유 첫 9개월 임상·잠재성 유방염을 줄이고 체세포 점수에 장기 효과를 보였다. (상위 4개 건유기 IMM: 세파피린·세프티오퍼·페니실린G+스트렙토마이신·클록사실린 — 표 30.5; 모두 ELDU로 VCPR 기록 필요.)</div></div>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">증체 목표 — 한눈에</span></div><ul><li>NRC: 건강한 송아지·열중성 환경 가정 ADG 0.7~0.8kg/일</li><li>Drackley: 0.9kg/일도 달성 가능·유방 발달에 영향 없으나 건강·생산성 위해 조정 필요</li><li>기온 15℃ 미만 시 DMI를 늘려야 함 — 추가 에너지 못 주면 ADG가 최대 0.2kg/일까지 감소</li><li>방목 후보우는 사료 변동이 커도 NRC 목표 도달에 문제없어야(지역·계절 따라 미량·다량 광물 보충 주의)</li><li>갓 이유 어린 후보우엔 고에너지·고단백·저섬유 조기 수확 조사료 선호(반추위 미발달이라 고섬유 회피)</li></ul></div>
<div class="rb-sub">요약</div>
<p class="rb-p">성공적 후보우 육성은 최소 비용으로 번식 효율적이고 우수한 첫 비유 성적을 내는 후보우를 키우기 위해 연속 적용되는 일련의 체계다. 이 시기의 영양은 번식·성장·전반 건강과 직접 상관이라 가장 중요한 요인 중 하나다.</p></div>
<div class="grass-section-title"><span class="gst-wrap"><span class="gst-main">${svgIcon('leaf',15)} 20. 육우 영양과 번식</span><span class="gst-sub">12개월 생산주기·BCS·단백/에너지·광물질/비타민·후보우/수소 영양·태아 프로그래밍·식물독성</span></span></div>
<div class="rb-block"><div class="rb-sub">서론 — 영양 동원의 우선순위</div>
<p class="rb-p">육우 번식우의 영양소 요구량은 교배·이유·분만 시기에 따라 예측 가능하게 변한다. 단백질·에너지·비타민·광물질 요구량은 산유 정점과 맞물려 분만 후 4~8주에 최고조에 이르고, 그 뒤 산유량이 줄면서 감소해 이유 직후 연중 최저점에 닿는다. 그러다 임신 마지막 60~80일에 기하급수적 태아 성장과 가속된 자궁 대사를 받치기 위해 다시 오른다. 관리자가 교배·이유 시기를 통제하므로 이 변동의 시기도 대체로 통제할 수 있다.</p>
