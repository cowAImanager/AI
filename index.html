<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">유병률이 해석을 바꾼다</span></div><ul><li>특이도 불완전 검사: 유병률↓일수록 양성 중 위양성 비율↑ → 저위험 집단엔 정확한 검사도 낮은 양성예측도(PPV)</li><li>민감도 불완전 검사: 유병률↑일수록 음성 중 위음성 비율↑ → 고유병률 집단엔 낮은 음성예측도(NPV)</li><li>PPV(양성 중 실제 양성): 대부분 진단 특이도에 더 영향</li><li>NPV(음성 중 실제 음성): 대부분 진단 민감도에 더 영향</li><li>유병률↑ → PPV 증가·NPV 감소 / 유병률↓ → 반대</li></ul></div>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">공식</span></div><ul><li>PPV = (Se×P) ÷ [Se×P + (1−Sp)(1−P)]</li><li>NPV = [Sp×(1−P)] ÷ [Sp×(1−P) + (1−Se)×P]</li><li>Se=진단 민감도, Sp=진단 특이도, P=유병률</li></ul></div>
<div class="rb-clinical"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v6M9 5h6M6 9v4a6 6 0 0 0 12 0V9"/><path d="M6 9H4M18 9h2"/><circle cx="12" cy="19" r="2"/></svg><span class="rb-tag">임상</span><span class="rb-tt">BVD-PI 예 — 같은 검사, 다른 PPV</span></div><div class="rb-cc-b">민감도 99.7%·특이도 99.3% BVD-PI 검사라도 집단에 따라 PPV가 달라진다. 최근 BVD 확진 무리에서 폐렴·설사로 죽은 송아지(검사 전 확률 약 70%): PPV 99.7% → 양성을 믿는다. 반면 엄격한 차단방역으로 모든 송아지를 일상 검사하는 종축 무리(확률 &lt;0.1%): 같은 검사 PPV 12.5% → 양성을 매우 회의한다.</div></div>
<div class="rb-sub">검사 전략 — 직렬과 병렬</div>
<p class="rb-p">단일 검사로 PPV·NPV가 모두 거의 완벽할 가능성은 매우 낮다 — 수의사는 한 방향(양성 또는 음성) 결과만 믿을 수 있는 상황에 놓이기 쉽다. 믿지 못하는 결과의 동물은 재검하거나, 추가 진단 비용과 위양성/위음성 개입 비용을 견줘 받아들인다.</p>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">직렬 검사(testing in series)</span></div><ul><li>초기 PPV가 낮을 때(낮은 특이도 또는 낮은 유병률) 양성 동물을 재검</li><li>두 검사 모두 양성이어야 양성으로 결론</li><li>순결과: 민감도 손실 + 특이도 이득 → PPV 개선·NPV 감소</li><li>쓰는 경우: 2차 검사가 비싸/어려워 고유병률에만 쓰고 싶을 때, 위양성의 해가 클 때</li><li>예: BVD 저확률 무리의 양성 송아지를 2차 검사해 둘 다 양성일 때만 진성 PI로 분류</li></ul></div>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">병렬 검사(testing in parallel)</span></div><ul><li>초기 NPV가 낮을 때(낮은 민감도 또는 매우 높은 유병률) 음성 동물을 재검</li><li>어느 검사든 양성이면 양성으로 결론</li><li>순결과: 민감도 이득 + 특이도 손실 → PPV 감소·NPV 개선</li><li>쓰는 경우: 검사가 쉽고 저렴하거나, 위양성 회피보다 모든 상태 동물 식별이 중요할 때</li><li>예: 트리코모나스(특이도 좋으나 민감도 53~77%) — 확률 75% 무리에서 단일 검사 NPV 약 50%라 음성 신뢰 낮아 병렬 필요</li></ul></div>
<div class="rb-sub">요약</div>
<p class="rb-p">진단 검사 해석은 임상 진료의 중요한 구성요소다. 검사 결과를 적절히 해석하려면 진단 민감도·특이도와 상태 유병률이 개별 결과 해석에 어떻게 영향을 주는지 이해해야 한다. 많은 진단 질문에서 직렬·병렬로 해석하는 둘 이상의 검사를 적절히 쓰면 진단 정확도와 검사 전략의 경제적 수익을 최적화할 수 있다.</p></div>
<div class="grass-section-title"><span class="gst-wrap"><span class="gst-main">${svgIcon('briefcase',15)} 27. 소 번식 진료의 마케팅</span><span class="gst-sub">마케팅 원리(4P+서비스 3P)·시스템 vs 계획·세 기둥(역량·자원·감내)·고객 확보/만족/유지·계획 평가</span></span></div>
<div class="rb-block"><div class="rb-sub">서론과 마케팅 원리</div>
<p class="rb-p">마케팅은 고객·의뢰인·파트너·사회에 가치 있는 제공물을 창출·소통·전달·교환하는 활동·제도·과정이다(미국마케팅협회 2007) — 달리 말해 &#x27;고객을 얻고, 만족시키고, 유지하는&#x27; 것이다. &#x27;마케팅&#x27;은 수익성에 직접 영향을 주지 않는 사업의 여러 측면도 함의한다.</p>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">마케팅 4P + 서비스 3P</span></div><ul><li>4P — 제품(Product): 제공 서비스나 약품·기구 / 가격(Price): 경쟁력 있는 합리적 수수료 / 판촉(Promotion): 판매 대상을 잠재 고객에 알림 / 유통(Place): 고객이 편리하게 얻도록 분배</li><li>서비스는 무형성(intangibility)이 있어 3P가 더 작용</li><li>사람(People): 사무직원~보조원~수의사 모두의 기술·외양·효율을 고객이 평가</li><li>물적 증거(Physical evidence): 증명서·청구서·유인물의 전문적 품질</li><li>과정(Process): 접수~수소 취급~기구 효율~결과 제시까지 전체</li></ul></div>
<p class="rb-p">수소 번식 건전성 검사(BBSE)를 받은 수소는 검사 후에도 거의 같아 보인다(픽업트럭과 달리 유형의 물건이 남지 않음) — 그래서 고객은 서비스가 &#x27;수행되는 동안&#x27;의 단서로 품질을 판단한다.</p>
<div class="rb-sub">시스템인가 계획인가 — 세 기둥</div>
<p class="rb-p">의식하든 안 하든 모든 활동 중인 사업에는 마케팅 &#x27;시스템&#x27;이 이미 존재한다(효율적이든 아니든 서비스 전달·판촉·가격·분배가 일어남). 한 측면만 개선하면 다른 측면에 해로울 수 있어 — 서비스를 탁월히 해 고객을 만족시켜도 판촉이 약하면 신규 확보가 안 되고, 확보·만족에 힘써도 경쟁자의 우월한 판촉에 기존 고객을 잃으면 진전이 없다. 마케팅 &#x27;계획&#x27;은 결함을 떠받치는 데 그치지 말고 시스템의 모든 측면을 다뤄야 한다.</p>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">계획의 세 기둥 (착수 전 전제)</span></div><ul><li>역량(Competence): 전념하려는 의지와 성공시킬 전문성은 별개 — 끊임없는 학습·세미나·동료 교류·새 기법 개방성(금전·시간이 비쌈)</li><li>자원의 투입(Dedication of resources): 충분한 자금+수의사의 시간(가치 산정 어렵지만 필요) — 예산화·문서화·준수</li><li>감내(Comfort/toleration): 계획은 &#x27;완전한 수용 부재&#x27;로 실패하는 경우가 많음 — 광고가 천박해 보이거나 발표가 두렵거나 자기 홍보가 오만으로 느껴져도, 불편을 감내하는 것이 개인 성장의 대가</li></ul></div>
<div class="rb-sub">고객 확보</div>
<p class="rb-p">가장 좋지만 얻기 어려운 판촉은 긍정적 입소문이다 — 다만 시작 단계나 수입을 더 높이려 할 때는 입소문만으로 부족할 수 있다(연 수입의 약 1%를 마케팅에 배정, 수의사 시간 가치도 산정). 네 범주는 중복될 수 있다.</p>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">고객 확보 네 범주</span></div><ul><li>서비스 영역 확장: 초음파 성별 판정·수정란이식 등 요청 충족 → 만족 + 같은 서비스 찾는 신규 고객</li><li>기존 서비스 판촉: 이미 있는 서비스를 고객이 모르는 경우가 많음 — 브로슈어 비치, 청구서에 세부, 접수실·실험실에 물적 증거 전시</li><li>관계 개발·발표: 지도 기관·제약사·품종 협회·축산 단체 발표 자원, 업계지 기고</li><li>광고: 비싸므로 예산·윤리 안에서 노출 극대화 — 지역 축산 간행물·품종 협회지가 적절</li></ul></div>
<div class="rb-sub">고객 만족 — 과정·물적 증거·유통·가격</div>
<div class="rb-clinical"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v6M9 5h6M6 9v4a6 6 0 0 0 12 0V9"/><path d="M6 9H4M18 9h2"/><circle cx="12" cy="19" r="2"/></svg><span class="rb-tag">임상</span><span class="rb-tt">과정·물적 증거</span></div><div class="rb-cc-b">과정을 아름답게 — 직원·수의사의 외양·태도가 곧 받을 서비스의 단서다(부족한 것은 흔히 수의사 자신). 물적 증거는 완료 후 볼 것을 남겨야 — BBSE는 수의번식학회(SFT) 기준 양식(저작권 침해 복제 탓에 최근 온라인 BSE 양식으로 통계 집계), 임신 검사는 무리 상태 만족 여부를 양식에 문서화해 사본은 진료소·한 부는 목장에. 양식을 우송하면 진료소 이름을 고객 앞에 남긴다.</div></div>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">유통(Place)과 가격(Price)</span></div><ul><li>유통: 시설·일정·가용성 — 반입(haul-in)/현장(출장)/중간 모두 성공 가능. 농장 방문이 편하나 소수 동물은 관리 시설이 통제·수행에 유리. 일정 충돌이 고객 불만의 주원천 → 인내·교육 필요. 더 적은 서비스에 집중·전문화할 때 잘 작동</li><li>가격: 가장 민감한 사안 — 이상적 가격은 &#x27;기꺼이 받되 그보다 낮으면 거절할&#x27; 수준(달성 어려움). 세 유형 고객: 교육에 반응 / 미래에 반응 / 결코 반응 안 함. 경쟁 가격만이 아니라 유연성·창의성에 반응(단 신중히)</li></ul></div>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">가격 책정 방식</span></div><ul><li>시간당 vs 작업당: 계절성 큰 진료는 시간당이 한가한 시기 보전 요율을 요해 비매력적 — 젖소는 생산이 고름</li><li>보증: 결과 약속(수태율·이유 체중 향상)으로 망설이는 고객에 수익적이나 윤리 문제·단기 제안이어야</li><li>컨설팅: 절차에 더해 제공 — 절차 비용에 포함되길, 무료 컨설팅(전화 상담)은 주의</li><li>약품 조제: 전통적 수익원이나 온라인·대형 매장과 경쟁 — 비조제 절차를 방해 않게 재고 관리 기술 필요</li></ul></div>

<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">고객 유지 수단</span></div><ul><li>뉴스레터: 가용 절차·현안·최근 진단 갱신 — 잘 받아들여지나 일관 제작이 어렵고 개인적 손길이 중요</li><li>이메일·소셜 미디어: 쉬운 배포이나 모든 고객이 수용하진 않음</li><li>개인 접촉: 과거 무리 촉진·BBSE 등 향후 절차를 계산된 근거로 알림 — 모든 서비스가 미래 접촉 기회</li></ul></div>
<div class="rb-clinical"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v6M9 5h6M6 9v4a6 6 0 0 0 12 0V9"/><path d="M6 9H4M18 9h2"/><circle cx="12" cy="19" r="2"/></svg><span class="rb-tag">임상</span><span class="rb-tt">계획 평가</span></div><div class="rb-cc-b">정기 평가가 설계의 일부여야 — 수입·반복 거래는 쉽게 판정되나 고객 만족·직원 사기는 똑같이 중요하지만 평가가 어렵다. &#x27;무엇을 해야 하는지와 성공을 어떻게 측정할지&#x27;에 대한 합의 구축이 가장 중요한 요소일 수 있다.</div></div>
<div class="rb-sub">요약</div>
<p class="rb-p">모든 수의 진료에 마케팅 시스템이 자리한다 — 고객을 끌고 만족시키고 유지하는 방법은 사업 시작 순간부터 존재하나, 그 시스템이 충분히 효과적인지는 여러 요인에 달렸다. 소 번식 진료를 시작하는 수의사는 유리한 위치에 있다 — 일부 번식 서비스의 약품·기법·절차를 합법적으로 제공하고, 위생 검사 서류를 발급하며, 질병·건강·번식 성적의 상관을 파악·치료할 훈련을 받은 유일한 직종이고, 인력이 부족하다고 보고된다.</p>
<p class="rb-p">다만 직종 밖 사람들이 소 번식에 침투하고 있어(공정·불공정 경쟁) — 직종은 합법적 권한을 주장하고 비수의사·미준수 수의사를 신고할 책임이 있으되, 직종 밖의 가치 있는 기여와 우호적 관계도 유념한다. 보상(금전·명성·만족)이 희생(노동·조건·위험)을 정당화해야 진료가 성공한다 — 양질의 수의사를 유치·보수하고 장비·안전을 제공하며 업무를 나눠 진료 밖의 삶을 갖게 해야 한다. 사업의 다른 부분에 쏟은 만큼의 사고·창의·용기를 마케팅에 적용하면, 충분한 수익성의 전문 진료를 확립하지 못할 이유가 없다.</p></div>

function namuify(root, doc){
  root = root || document.getElementById('main');
  if(!root) return;

  const admin = (typeof isAdmin==='function') && isAdmin();
  const tab = (typeof UI!=='undefined' && UI.vetTab) ? UI.vetTab : 'repro';
  const sub = root.querySelector('.modal-sub');
  let titleText = doc.title || (sub ? sub.textContent.trim() : '문서');
  if(sub) sub.remove();

    const subText = gs ? gs.textContent.trim() : '';
    const h = document.createElement('h2');

    h.dataset.vkey = tab+'::'+t;

    ch.replaceWith(h);

    toc.push(tocCh);
    const block = h.nextElementSibling;
    if(block && block.classList.contains('rb-block')){
      block.querySelectorAll('.rb-sub').forEach(rs=>{
        si++;

        const h3 = document.createElement('h3');

        rs.replaceWith(h3);
        tocCh.subs.push({num:ci+'.'+si, text:st, id:'s-'+ci+'-'+si});

      }).join('')+'</ul>' : '';

  root.insertAdjacentHTML('afterbegin', header + tocHtml + introHtml);
  root.querySelectorAll('.namu-toc-tog[data-toc-tog]').forEach(function(tg){

      e.preventDefault();

    });
  });
  vetApplyOverrides(root);
  root.querySelectorAll('.namu-h2,.namu-h3').forEach(function(hh){
    hh.addEventListener('click', function(){ namuToggle(hh); });
  });
  root.querySelectorAll('.namu-edit').forEach(function(ed){
    ed.addEventListener('click', function(e){ e.stopPropagation(); const hh=ed.closest('.namu-h2,.namu-h3'); if(hh) vetEnterEdit(hh); });
  });
}
function namuToggle(h){
  var collapsed = h.classList.toggle('namu-collapsed');
  var stop = (h.tagName === 'H2') ? ['H2'] : ['H2','H3'];
  var n = h.nextElementSibling;
  while(n && stop.indexOf(n.tagName) === -1){
    n.style.display = collapsed ? 'none' : '';
    n = n.nextElementSibling;
  }
}
let VETEDITS = {}, _vetLoaded = false, _vetLoading = false;
async function vetEditsEnsure(){
  if(_vetLoaded || _vetLoading) return;
  if(typeof firebase==='undefined' || !firebase.apps || !firebase.apps.length) return;
  _vetLoading = true;
  try{
    const db = firebase.firestore();
    const snap = await db.collection('library').doc('vetEdits').get();
    VETEDITS = (snap.exists && snap.data() && snap.data().data) ? (JSON.parse(snap.data().data)||{}) : {};
    _vetLoaded = true;
  }catch(e){ console.warn('vetEdits load 실패', e); }
  _vetLoading = false;
  if(typeof UI!=='undefined' && UI.vetMode){ try{ renderVet(); }catch(e){} }
}
async function vetEditsSave(){
  try{
    const db = firebase.firestore();
    await db.collection('library').doc('vetEdits').set({data:JSON.stringify(VETEDITS), updated:Date.now()}, {merge:true});
    if(typeof toast==='function') toast('수정 내용이 저장됐어요.');
  }catch(e){ console.warn('vetEdits save 실패', e); if(typeof toast==='function') toast('저장 실패 — 주인 계정 로그인 상태를 확인해주세요.'); }
}
function vetSecNodes(h){
  var stop = (h.tagName==='H2') ? ['H2'] : ['H2','H3'];
  var nodes=[], n=h.nextElementSibling;
  while(n && stop.indexOf(n.tagName)===-1){ nodes.push(n); n=n.nextElementSibling; }
  return nodes;
}
function vetApplyOverrides(root){
  if(!VETEDITS) return;
  root.querySelectorAll('.namu-h2,.namu-h3').forEach(function(h){
    var key=h.dataset.vkey; if(!key) return;
    var html=VETEDITS[key]; if(html==null) return;
    var nodes=vetSecNodes(h); if(!nodes.length) return;
    var parent=nodes[0].parentNode;
    var anchor=nodes[nodes.length-1].nextSibling;
    nodes.forEach(function(n){ n.remove(); });
    var tmp=document.createElement('div'); tmp.innerHTML=html;
    while(tmp.firstChild){ parent.insertBefore(tmp.firstChild, anchor); }
  });
}
function vetEnterEdit(h){
  if(!((typeof isAdmin==='function') && isAdmin())) return;
  if(document.querySelector('.vet-edit-box')) return;
  var nodes=vetSecNodes(h); if(!nodes.length) return;
  var parent=nodes[0].parentNode;
  var box=document.createElement('div');
  box.className='vet-edit-box'; box.setAttribute('contenteditable','true');
  parent.insertBefore(box, nodes[0]);
  nodes.forEach(function(n){ box.appendChild(n); });
  var bar=document.createElement('div');
  bar.className='vet-edit-bar';
  bar.innerHTML='<button type="button" class="vet-eb-save">저장</button><button type="button" class="vet-eb-cancel">취소</button>';
  box.insertAdjacentElement('afterend', bar);
  box.focus();
  bar.querySelector('.vet-eb-save').addEventListener('click', async function(){
    VETEDITS[h.dataset.vkey]=box.innerHTML;
    this.textContent='저장 중…'; this.disabled=true;
    await vetEditsSave();
    renderVet();
  });
  bar.querySelector('.vet-eb-cancel').addEventListener('click', function(){ renderVet(); });
}

function groupGrassSections(root){

    const details = document.createElement('details');

    const summary = document.createElement('summary');

function allOwnersScheduleHtml(){
  const today = todayStr();
  // 개체별 스케줄과 동일한 규칙(scheduleRowsForOwner): 자동개체 포함·숨긴칸 제외·축주별 설정 범위
  const allRows = [];
  DATA.owners.forEach(owner => {
    scheduleRowsForOwner(owner).forEach(r => { if(r.date >= today) allRows.push({ ...r, owner }); });
  });
  allRows.sort((a,b)=>a.date.localeCompare(b.date)||(a.owner.localeCompare(b.owner))||(a.aid.localeCompare(b.aid)));
  if(!allRows.length) return `<div class="empty-state">표시할 스케줄이 없어요.</div>`;
  let html = '';
  let lastDate = '';
  allRows.forEach(row => {
    if(row.date !== lastDate){
      lastDate = row.date;
      const isToday = row.date === today;
      html += `<div class="allsched-date ${isToday?'allsched-today':''}">${row.date} (${weekdayKr(row.date)})</div>`;
    }
    const done = row.done;
    const skipped = isCellSkipped(row.owner, row.aid, row.date);
    html += `<div class="allsched-item ${done?'done':''} ${skipped?'skipped':''} ${row.isAuto?'auto':''}">
      <span class="tag-chip sm" data-animal-id="${esc(row.aid)}" data-owner="${esc(row.owner)}">${esc(row.aid)}</span>
      <span class="allsched-owner">${esc(row.owner)}</span>
      <span class="allsched-note">${esc(row.note)}</span>
      <button class="done-btn ${done?'is-done':''}" data-action="toggleCellDoneAll" data-owner="${esc(row.owner)}" data-aid="${esc(row.aid)}" data-date="${row.date}" title="함(완료)">${svgIcon('check',14)}</button>
      <button class="skip-btn ${skipped?'is-skip':''}" data-action="toggleCellSkipAll" data-owner="${esc(row.owner)}" data-aid="${esc(row.aid)}" data-date="${row.date}" title="안 함">${svgIcon('x',14)}</button>
    </div>`;
  });
  return html;
}

  value = (value||'').trim();

  if(value===''){
    if(idx>-1) DATA.schedule.splice(idx,1);

    if(idx>-1) DATA.schedule[idx].note = value;
    else DATA.schedule.push({ id:uid(UI.owner+'-sch'), owner:UI.owner, animalId, date, note:value });
  }
  saveState();
}

function exportData(){
  try{
    const payload = JSON.stringify(DATA, null, 2);
    const blob = new Blob([payload], { type:'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `번식기록부_백업_${todayStr()}.json`;
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
    toast('백업 파일을 내려받았어요.');
  }catch(e){ console.error(e); toast('백업 내보내기에 실패했어요.'); }
}
function handleImportFile(file){
  if(!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try{
      const obj = JSON.parse(reader.result);
      if(!obj || !Array.isArray(obj.owners) || !Array.isArray(obj.animals) || !Array.isArray(obj.records)){
        toast('형식이 올바른 백업 파일이 아니에요.'); return;
      }
      const cnt = `축주 ${obj.owners.length} · 개체 ${obj.animals.length} · 기록 ${obj.records.length}`;
      if(!confirm(`이 백업으로 현재 데이터를 모두 교체할까요?\n(${cnt})\n현재 내용은 사라집니다.`)) return;
      DATA = obj;
      SAVE_LOCKED = false;                 // 복원하면 저장 잠금 해제
      DATA.owners.forEach(ensureOwnerMeta);
      if(!DATA.owners.includes(UI.owner)) UI.owner = DATA.owners[0];
      saveState();
      applyTheme();
      const banner = document.getElementById('load-error-banner'); if(banner) banner.remove();
      closeModal();
      render();
      toast('백업을 복원했어요.');
    }catch(e){ console.error(e); toast('파일을 읽지 못했어요.'); }
  };
  reader.readAsText(file);
}

function genToken(){
  const c='abcdefghijkmnpqrstuvwxyz23456789'; let s='';
  for(let i=0;i<7;i++) s+=c[Math.floor(Math.random()*c.length)];
  return s;
}
function ownerShareToken(owner, regenerate){
  DATA.shareTokens = DATA.shareTokens || {};
  if(regenerate || !DATA.shareTokens[owner]){ DATA.shareTokens[owner] = genToken(); saveState(); }
  return DATA.shareTokens[owner];
}
function recordsOf(owner, animalId){
  return DATA.records.filter(r=>r.owner===owner && r.animalId===animalId)
    .sort((a,b)=> recordSortKey(b) - recordSortKey(a));
}
function shareAnimalStatus(owner, a){
  const recs = recordsOf(owner, a.animalId);
  if(isCurrentlyPregnant(recs)) return { status:'임신중', days:null };
  if(a.fattening) return { status:'비육전환', days:null };
  const aiRecs = recs.filter(r=>r.aiDate).sort((x,y)=> sortKeyOf(y)-sortKeyOf(x));
  if(!aiRecs.length) return { status:'미수정', days:null };
  const aiTs = sortKeyOf(aiRecs[0]);
  const diag = recs.filter(r=>r.pregnant && sortKeyOf(r)>=aiTs).sort((x,y)=> sortKeyOf(y)-sortKeyOf(x));
  const preg = diag.length ? (diag[0].pregnant||'').trim().toUpperCase() : '';
  const aiD = dateOnly(aiRecs[0].aiDate);
  const days = Math.floor((new Date(todayStr()+'T00:00') - new Date(aiD+'T00:00'))/86400000);
  if(preg==='X') return { status:'비임신', days };
  if(preg==='O') return calvedAfterPregnancy(recs)
    ? { status:'분만', days:null }      // O 떴지만 이미 분만 → 임신중 아님
    : { status:'임신중', days:null };
  return { status: days>=30 ? '임신감정 필요' : '감정 대기', days };
}
function shareExpCalving(owner, a){
  const recs = recordsOf(owner, a.animalId);
  if(!isCurrentlyPregnant(recs)) return null;
  const withCalv = recs.filter(r=>(r.expectedCalving||'').trim());
  return withCalv.length ? dateOnly(withCalv[0].expectedCalving) : null;
}
function buildSharePayload(owner){
  const animals = DATA.animals.filter(a=>a.owner===owner)
    .sort((a,b)=>a.animalId.localeCompare(b.animalId))
    .map(a=>{ const s=shareAnimalStatus(owner,a); return { id:a.animalId, status:s.status, days:s.days, expectedCalving:shareExpCalving(owner,a) }; });
  // 동기화/처치 일정: 자동(동기화 프로토콜 등)+수동 일정 포함, 오늘 기준 과거 7일~미래, '안 함' 제외
  // 단, 임신감정·발정확인은 처치가 아니므로 viewer에서 제외(같은 날 처치가 함께 있으면 처치만 남김)
  const cutoff = addDays(todayStr(), -7);
  const isNonTreat = t => t.includes('임신감정') || t.includes('발정확인');
  const schedule = scheduleRowsForOwner(owner)
    .filter(r => r.date >= cutoff && !r.skipped)
    .map(r => ({
      date: r.date,
      id: r.aid,
      note: (r.note||'').split(' / ').map(t=>t.trim()).filter(t=>t && !isNonTreat(t)).join(' / ').replace(/CIDR/gi, '사이더').replace(/\bAI\b/g, '인공수정')
    }))
    .filter(r => r.note)
    .sort((a,b)=> a.date<b.date?-1:a.date>b.date?1:0);
  return { owner, updatedAt: todayStr(), animals, schedule };
}

        <div class="lib-reader-body" id="lib-reader">${LIB.content ? libHighlight(LIB.content, LIB.query) : '<span class="lib-empty-inline">내용이 비어 있어요. ‘편집’으로 번역을 넣으세요.</span>'}</div>
      `;
    }
  }

  openModal(`<div class="modal lib-modal">
    ${body}
    <div class="lib-close-row"><button class="btn secondary" data-action="closeModal">닫기</button></div>
  </div>`);

  if(LIB.view==='reader' && !LIB.editing){
    const si = document.getElementById('lib-search');
    if(si) si.addEventListener('input', ()=>{
      LIB.query = si.value;
      const rd = document.getElementById('lib-reader');
      if(rd) rd.innerHTML = LIB.content ? libHighlight(LIB.content, LIB.query) : '';
    });
  }
}

  libRenameBook: async ()=>{

    for(const c of (b.chapters||[])){ await libDeleteChapter(b.id, c.id); }

  libToggleReorder: ()=>{ LIB.reorder = !LIB.reorder; renderLibrary(); },

    const b = libBook(LIB.bookId); if(!b) return;

    if(i<=0) return;
    [b.chapters[i-1], b.chapters[i]] = [b.chapters[i], b.chapters[i-1]];
    renderLibrary();
    try{ await libSaveIndex(); }catch(e){ toast('저장 실패'); }
  },
  libMoveDown: async (ds)=>{
    const b = libBook(LIB.bookId); if(!b) return;
    const i = b.chapters.findIndex(c=>c.id===ds.chap);

    renderLibrary();
    try{ await libSaveIndex(); }catch(e){ toast('저장 실패'); }
  },

    const numOf = t => { const m = String(t).match(/\d+/); return m ? parseInt(m[0],10) : 999999; };
    b.chapters.sort((x,y)=> numOf(x.title) - numOf(y.title));
    renderLibrary();
    try{ await libSaveIndex(); toast('번호순으로 정렬했어요.'); }catch(e){ toast('저장 실패'); }

function initEvents(){
  document.addEventListener('click', e=>{
    const chip = e.target.closest('.tag-chip[data-animal-id]');
    if(chip){
      e.preventDefault();
      const id = chip.dataset.animalId;
      const owner = chip.dataset.owner;
      if(owner && DATA.owners.includes(owner)) UI.owner = owner;
      if(document.getElementById('modalRoot')) closeModal();
      if(UI.globalSearch){ UI.globalSearch=''; const gi=document.getElementById('globalSearchInput'); if(gi) gi.value=''; }
      UI.view = 'animal';
      UI.selectedAnimal = id;
      renderMain();
      return;
    }
    const el = e.target.closest('[data-action]');
    if(!el) return;
    const action = el.dataset.action;
    if(ACTIONS[action]) ACTIONS[action](el.dataset, e);
  });
  document.addEventListener('input', e=>{
    const t = e.target;
    if(t.id==='animalSearchInput'){
      UI.animalSearch=t.value;
      const box=document.getElementById('animalListBox'), cnt=document.getElementById('animalCount');
      if(box){ const d=animalListData(); box.innerHTML=d.listHtml; if(cnt) cnt.textContent=d.animals.length; }
      else { pendingFocus={id:t.id,pos:t.selectionStart}; renderMain(); }
    }
    else if(t.id==='dateSearchInput'){
      UI.dateSearch=t.value;
      const box=document.getElementById('dateRowsBox');
      if(box){ box.innerHTML=dateViewRows(); }
      else { pendingFocus={id:t.id,pos:t.selectionStart}; renderMain(); }
    }
    else if(t.id==='globalSearchInput'){
      UI.globalSearch=t.value;
      renderMain();
    }
    else if(t.classList && t.classList.contains('ov-free')){
      const key=t.dataset.key; if(ovaryState[key]){ ovaryState[key].free=t.value; const hid=document.getElementById('f_'+key); if(hid) hid.value=ovaryCombined(key); }
    }
  });
  document.addEventListener('keydown', e=>{
    const n=e.target;
    if(n && n.classList && (n.classList.contains('ov-num')||n.classList.contains('ov-note')) && e.key==='Enter'){
      e.preventDefault();
      ACTIONS.ovaryAdd({key:n.dataset.key});
    }
  });
  document.addEventListener('change', e=>{
    const t = e.target;
    if(t.matches && t.matches('.sched-cell input')){ if(!isAdmin()){ t.value = DATA.schedule.find(s=>s.owner===UI.owner&&s.animalId===t.dataset.aid&&s.date===t.dataset.date)?.note||''; return noAdminToast(); } updateScheduleCell(t.dataset.aid, t.dataset.date, t.value); }
    else if(t.id==='dateFromInput'){ UI.dateFrom=t.value; renderMain(); }
    else if(t.id==='dateToInput'){ UI.dateTo=t.value; renderMain(); }
    else if(t.id==='calc_aiDate'){ actionCalcDateChange(t.value); }
    else if(t.id==='f_estrusDate_date' || t.id==='f_aiDate_date'){
      const nextEl = document.getElementById('f_nextEstrusDate');
      if(nextEl && t.value){ nextEl.value = addDays(t.value, 21); }
    }
    else if(t.dataset && t.dataset.animalField){
      if(!isAdmin()) return noAdminToast();
      const a = DATA.animals.find(x=>x.owner===UI.owner && x.animalId===t.dataset.id);
      if(a){ a[t.dataset.animalField] = t.value; saveState(); renderMain(); }
    }
    else if(t.id==='f_pregnant'){ refreshPregStage(); }
    else if(t.id==='f_sync1Date' && UI.activeSyncProtocol){
      fillSyncProtocolDates(UI.activeSyncProtocol, t.value);
    }
  });
  document.addEventListener('focusin', e=>{
    if(e.target.matches && e.target.matches('.sched-cell input')){
      UI.focusedCell = { id:e.target.id, aid:e.target.dataset.aid, date:e.target.dataset.date };
    }
  });
  document.addEventListener('keydown', e=>{
    if(e.key==='Escape') closeModal();
  });
}

/* ============================================================
   초기화
============================================================ */
function applyTheme(){
  if(!DATA.theme) DATA.theme = 'light';
  document.documentElement.setAttribute('data-theme', DATA.theme==='dark' ? 'dark' : 'light');
}
// 명백한 오류 날짜 정리 (2000년 이전 예상분만일 → 빈값). 멱등.
function sanitizeData(){
  let changed = false;
  (DATA.records||[]).forEach(r=>{
    const v = (r.expectedCalving||'');
    if(v && /^\d{4}-/.test(v) && parseInt(v.slice(0,4),10) < 2000){
      r.expectedCalving = ''; changed = true;
    }
  });
  return changed;
}
async function init(){
  STORAGE_MODE = await detectStorageMode();
  let stored = null, loadFailed = false;
  try{
    stored = await loadState();
  }catch(e){
    loadFailed = true;
    console.error('불러오기 실패 — 저장을 잠급니다', e);
  }

  if(loadFailed){
    // 읽기 실패: 절대 시드로 덮어쓰지 않음. 화면엔 시드를 보여주되 저장은 잠금.
    DATA = buildInitial();
    SAVE_LOCKED = true;
    setTimeout(showLoadErrorBanner, 0);
  } else if(stored){
    DATA = stored;
  } else {
    // 저장소가 정말 비어있음(최초 실행) → 시드 저장 OK
    DATA = buildInitial();
    await saveState();
  }
  DATA.owners.forEach(ensureOwnerMeta);
  const sanitized = sanitizeData();                 // 오류 날짜(1900 등) 자동 정리
  if(sanitized && !SAVE_LOCKED){ try{ await saveState(); }catch(e){ console.error('정리 저장 실패', e); } }
  UI.owner = DATA.owners[0];
  applyTheme();
  initEvents();
  render();
  subscribeRemoteIfNeeded();
  window.__appReady = true;
}

function showLoadErrorBanner(){
  if(document.getElementById('load-error-banner')) return;
  const bar = document.createElement('div');
  bar.id = 'load-error-banner';
  bar.style.cssText = 'position:sticky;top:0;z-index:9999;background:#A32D2D;color:#fff;'
    + 'padding:10px 14px;font-size:13px;font-weight:700;text-align:center;line-height:1.5;';
  bar.innerHTML = svgIcon('noEntry',14)+' 저장된 데이터를 불러오지 못했어요. 표시된 건 기본 시드 데이터이며 '
    + '<u>저장이 잠겨 있어</u> 덮어쓰기 사고는 일어나지 않아요. 새로고침하면 다시 시도합니다.';
  document.body.prepend(bar);
}

/* ============================================================
   뷰어 / 관리자 모드
============================================================ */
const ADMIN_KEY = 'breeding-admin';

// 현재 수정 권한(주인 구글 로그인) 여부
function isAdmin(){
  return _isOwner === true;
}

// 구글 로그인 → 주인 계정이면 수정 권한 부여
async function openAdminLogin(){
  if(typeof firebase==='undefined' || !firebase.auth){
    toast('로그인 기능을 불러오지 못했어요. 새로고침 후 다시 시도해주세요.');
    return;
  }
  try{
    const provider = new firebase.auth.GoogleAuthProvider();
    provider.setCustomParameters({ prompt: 'select_account' });
    const res = await firebase.auth().signInWithPopup(provider);
    const email = res.user && res.user.email;
    if(email !== OWNER_EMAIL){
      // 권한 없는 계정 → 다시 익명(읽기 전용)으로 되돌림
      await firebase.auth().signOut();
      await firebase.auth().signInAnonymously();
      toast('이 계정은 수정 권한이 없어요.');
      return;
    }
    toast('관리자 모드로 전환됐어요. 수정·삭제가 가능해요.');
    // _isOwner 갱신 + 화면 갱신은 onAuthStateChanged 가 처리
  }catch(e){
    console.error(e);
    if(e && e.code === 'auth/popup-closed-by-user') return;
    toast('구글 로그인이 취소되었거나 실패했어요.');
  }
}

async function logoutAdmin(){
  try{
    await firebase.auth().signOut();
    await firebase.auth().signInAnonymously();   // 읽기는 계속 되도록 익명 복귀
  }catch(e){ console.error(e); }
  if(UI.view === 'owner') UI.view = 'animal';
  toast('보기 모드로 전환됐어요.');
  // render 는 onAuthStateChanged 가 처리
}

function noAdminToast(){
  toast('🔒 관리자 모드에서만 수정할 수 있어요.');
}

/* ============================================================
   엑셀 내보내기
============================================================ */
function exportExcel(){
  if(typeof XLSX === 'undefined'){
    toast('엑셀 라이브러리 로딩 중이에요. 잠시 후 다시 시도해주세요.'); return;
  }
  const wb = XLSX.utils.book_new();

  // ── 시트 1: 진료·수정 기록 ──
  const recHeaders = [
    '축주','개체번호','진료일','발정일시','수정일시','수정간격',
    '다음발정일','예상분만일','예상발정주기','1차감정','2차감정','성감정','분만일','송아지성별',
    '발정증상(외음부)','발정증상(점액)','발정증상(자궁수축)','발정증상(기타)',
    '직장검사(자궁)','직장검사(좌난소)','직장검사(우난소)',
    '초음파(자궁)','초음파(좌난소)','초음파(우난소)',
    '자궁질환','난소질환',
    '호르몬처치','수정횟수','내수정횟수','농가수정횟수','KPN','진료메모',
    '동기화1','동기화1날짜','동기화2','동기화2날짜','동기화3','동기화3날짜',
    '동기화4','동기화4날짜','동기화5','동기화5날짜','동기화6','동기화6날짜',
    '동기화7','동기화7날짜',
  ];
  const recRows = DATA.records.map(r => {
    const row = [
      r.owner, r.animalId,
      r.examDate || '',
      r.estrusDate || '', r.aiDate || '', r.aiInterval || '',
      r.nextEstrusDate ? r.nextEstrusDate.slice(0,10) : '',
      r.expectedCalving ? r.expectedCalving.slice(0,10) : '',
      r.expectedCycle || '', r.pregnant || '', r.pregnant2 || '', r.fetalSex || '',
      r.calvingDate ? r.calvingDate.slice(0,10) : '', r.calfSex || '',
      r.estrusVulvar || '', r.estrusMucus || '', r.estrusContraction || '', r.estrusOther || '',
      r.rectalUterus || '', r.rectalOvaryL || '', r.rectalOvaryR || '',
      r.ultraUterus || '', r.ultraOvaryL || '', r.ultraOvaryR || '',
      r.uterineDisease || '', r.ovarianDisease || '',
      r.hormoneTreatment || '', r.aiCount || '', r.inHouseAiCount || '',
      r.farmAiCount || '', r.kpn || '', r.notes || '',
    ];
    for(let i=1;i<=7;i++){
      row.push(r['sync'+i+'Type']||'');
      const sd = r['sync'+i+'Date'];
      row.push(sd ? sd.slice(0,10) : '');
    }
    return row;
  });
  const ws1 = XLSX.utils.aoa_to_sheet([recHeaders, ...recRows]);
  // 열 너비 자동 설정
  ws1['!cols'] = recHeaders.map((_,i) => ({ wch: i<2 ? 10 : i<10 ? 14 : 12 }));
  XLSX.utils.book_append_sheet(wb, ws1, '진료·수정 기록');

  // ── 시트 2: 개체 정보 ──
  const animalHeaders = ['축주','개체번호','품종','부','외조부','외외증조부','출생일','산차','마지막분만일','수정난이도','수정난이도메모'];
  const animalRows = DATA.animals.map(a => [
    a.owner, a.animalId, a.breed||'한우', a.sire||'', a.damSire||'', a.damDamSire||'',
    a.birth||'', a.parity||'', a.lastCalving||'',
    a.aiDifficulty||'', a.aiDifficultyNote||'',
  ]);
  const ws2 = XLSX.utils.aoa_to_sheet([animalHeaders, ...animalRows]);
  ws2['!cols'] = animalHeaders.map(h => ({ wch: h.length > 6 ? 14 : 10 }));
  XLSX.utils.book_append_sheet(wb, ws2, '개체 정보');

  // ── 시트 3: 스케줄 ──
  const schedHeaders = ['축주','개체번호','날짜','내용','완료여부'];
  const schedRows = DATA.schedule.map(s => [
    s.owner, s.animalId, s.date, s.note||'',
    DATA.completedCells && DATA.completedCells[`${s.owner}|${s.animalId}|${s.date}`] ? '완료' : '',
  ]);
  const ws3 = XLSX.utils.aoa_to_sheet([schedHeaders, ...schedRows]);
  ws3['!cols'] = [{ wch:10 },{ wch:18 },{ wch:12 },{ wch:20 },{ wch:8 }];
  XLSX.utils.book_append_sheet(wb, ws3, '스케줄');

  // 파일명: 날짜 포함
  const today = todayStr().replace(/-/g,'');
  XLSX.writeFile(wb, `번식진료기록부_${today}.xlsx`);
  toast('엑셀 파일이 다운로드됐어요.');

/* ============================================================
   입장 비밀번호 (전체 보기 잠금) — 0523
   · 축주가 viewer 주소를 고쳐 index로 들어오는 것 차단
   · 통과 후엔 같은 세션 동안 다시 안 물음
   · '수정'은 별도 관리자 모드(0918) 그대로
============================================================ */
const ENTRY_PASSWORD = '0523';
function showEntryGate(onPass){
  if(sessionStorage.getItem('app-entered')==='1'){ onPass(); return; }
  const ov = document.createElement('div');
  ov.id = 'entry-gate';
  ov.style.cssText = 'position:fixed;inset:0;z-index:99999;background:#0b1f1d;display:flex;align-items:center;justify-content:center;padding:24px;';
  ov.innerHTML = `
    <div style="width:100%;max-width:320px;text-align:center;font-family:'IBM Plex Sans KR',sans-serif;color:#eafaf7;">
      <div style="margin-bottom:8px;"><svg viewBox="0 0 32 32" width="44" height="44" xmlns="http://www.w3.org/2000/svg"><rect x="1" y="1" width="30" height="30" rx="8" style="fill:var(--primary)"/><g fill="none" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 6.5 L16 11 L21 6.5"/><line x1="16" y1="10.5" x2="16" y2="26.5"/><path d="M16 12.6c2.6 0 2.6 2.4 0 2.4s-2.6 2.4 0 2.4 2.6 2.4 0 2.4-2.6 2.4 0 2.4 2.6 2.4 0 2.4"/></g><circle cx="16" cy="26.6" r="1.3" fill="#fff"/></svg></div>
      <div style="font-size:18px;font-weight:800;margin-bottom:4px;">번식진료 기록부</div>
      <div style="font-size:12.5px;color:#7fc8bf;margin-bottom:20px;">열람하려면 비밀번호를 입력하세요</div>
      <input id="entry-pw" type="password" inputmode="numeric" placeholder="비밀번호"
        style="width:100%;box-sizing:border-box;padding:13px 14px;font-size:16px;text-align:center;letter-spacing:.3em;
        border:1px solid #1f5249;border-radius:11px;background:#0f2a27;color:#fff;outline:none;">
      <div id="entry-err" style="height:16px;font-size:11.5px;color:#ff8f8f;margin:8px 0 4px;"></div>
      <button id="entry-btn" style="width:100%;padding:13px;font-size:15px;font-weight:800;border:none;border-radius:11px;
        background:#00A69C;color:#fff;cursor:pointer;">입장</button>
    </div>`;
  document.body.appendChild(ov);
  const inp = ov.querySelector('#entry-pw');
  const err = ov.querySelector('#entry-err');
  const tryPass = ()=>{
    if(inp.value === ENTRY_PASSWORD){
      sessionStorage.setItem('app-entered','1');
      ov.remove();
      onPass();
    } else {
      err.textContent = '비밀번호가 맞지 않아요.';
      inp.value=''; inp.focus();
    }
  };
  ov.querySelector('#entry-btn').addEventListener('click', tryPass);
  inp.addEventListener('keydown', e=>{ if(e.key==='Enter') tryPass(); });
  setTimeout(()=>inp.focus(), 50);
}

showEntryGate(init);
