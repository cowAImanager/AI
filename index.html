<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Reproduction Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore-compat.js"></script>
<style>
:root{
  --bg:#F8F6EF;
  --surface:#FFFFFF;
  --surface-alt:#F1EEE4;
  --ink:#20211C;
  --ink-soft:#8B857A;
  --primary:#1AA086;
  --primary-dark:#0E6B57;
  --accent:#ED7A33;
  --accent-soft:#FBEEE1;
  --tag-yellow:#F7C843;
  --tag-ink:#1A1200;
  --line:#E6E0D3;
  --today:#FFE49A;
  --green-soft:#E9F3EE;
  --estrus-soft:#E8F0FC;
  --ai-text:#8A3A10;
  --sync-bg:#EDE8F8;
  --sync-text:#5040A0;
  --estrus-text:#1E4D7A;
  --notpregnant-bg:#B07020;
  --notpregnant-row-bg:#FDF5E0;
  --notpregnant-row-border:#DFB040;
  --overdue-days-text:#903A10;
  --active-item-bg:#FFF4E0;
  --today-cell-bg:#FFF8E0;
  --radius:12px;
}
html[data-theme="dark"]{
  --bg:#1A1A17;
  --surface:#25241F;
  --surface-alt:#2F2E27;
  --ink:#ECE8DF;
  --ink-soft:#9A9385;
  --primary:#2CC0A2;
  --primary-dark:#84E6CF;
  --accent:#FF9152;
  --accent-soft:#3A2410;
  --tag-yellow:#F7C843;
  --tag-ink:#1A1200;
  --line:#3A382F;
  --today:#5C4A1E;
  --green-soft:#1C2C24;
  --estrus-soft:#162440;
  --ai-text:#FFB088;
  --sync-bg:#28204A;
  --sync-text:#C0B0F0;
  --estrus-text:#88BCEE;
  --notpregnant-bg:#C08020;
  --notpregnant-row-bg:#342A08;
  --notpregnant-row-border:#906020;
  --overdue-days-text:#FF9060;
  --active-item-bg:#342E08;
  --today-cell-bg:#302808;
}
html[data-theme="dark"] body{background:var(--bg);}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:'IBM Plex Sans KR',-apple-system,BlinkMacSystemFont,system-ui,'Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif;-webkit-font-smoothing:antialiased;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:
    repeating-radial-gradient(ellipse 160px 80px at 25% 35%, transparent 0, transparent 76px, rgba(26,160,134,.022) 77px, transparent 78px),
    repeating-radial-gradient(ellipse 220px 110px at 72% 58%, transparent 0, transparent 106px, rgba(26,160,134,.018) 107px, transparent 108px),
    repeating-radial-gradient(ellipse 130px 65px at 80% 20%, transparent 0, transparent 62px, rgba(26,160,134,.016) 63px, transparent 64px);
}
html[data-theme="dark"] body::before{
  background-image:
    repeating-radial-gradient(ellipse 160px 80px at 25% 35%, transparent 0, transparent 76px, rgba(44,192,162,.06) 77px, transparent 78px),
    repeating-radial-gradient(ellipse 220px 110px at 72% 58%, transparent 0, transparent 106px, rgba(44,192,162,.045) 107px, transparent 108px);
}
.app{position:relative;z-index:1;}
button{font-family:inherit;}
.app{max-width:1180px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;}

/* ---------- header ---------- */
header.topbar{padding:20px 20px 0;background:var(--bg);}
.title-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.title-row h1{font-weight:900;font-size:20px;margin:0;letter-spacing:-0.02em;color:var(--primary-dark);}
.title-row .sub{font-size:11.5px;color:var(--ink-soft);font-weight:600;letter-spacing:.04em;text-transform:uppercase;opacity:.8;}
.header-actions{margin-left:auto;display:flex;align-items:center;gap:8px;}
.status-badge{font-size:11px;color:var(--ink-soft);background:var(--surface-alt);border:1px solid var(--line);border-radius:999px;padding:4px 10px;font-weight:600;}
.theme-toggle{width:32px;height:32px;border-radius:50%;border:1px solid var(--line);background:var(--surface-alt);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;padding:0;}
.theme-toggle:hover{background:var(--surface);}

.owner-tabs{display:flex;gap:6px;margin-top:16px;border-bottom:1px solid var(--line);flex-wrap:wrap;}
.owner-tab{padding:9px 18px;border-radius:10px 10px 0 0;background:var(--surface-alt);color:var(--ink-soft);font-weight:700;font-size:14px;cursor:pointer;border:1px solid var(--line);border-bottom:none;position:relative;top:1px;transition:background .15s,color .15s;letter-spacing:-.01em;}
.owner-tab.active{background:var(--surface);color:var(--primary-dark);font-weight:800;box-shadow:0 -2px 8px rgba(0,0,0,.06);}
.owner-tab.addnew{background:transparent;border:1px dashed var(--line);color:var(--ink-soft);font-weight:600;}
.owner-tab.calc-tab{background:var(--primary);color:#fff;border-color:var(--primary);margin-right:6px;}
.owner-tab.calc-tab:hover{opacity:.88;}
.owner-tab.allsched-tab{background:var(--primary-dark);}
.owner-tab.addnew:hover{background:var(--surface-alt);}

.subnav{display:flex;gap:20px;padding:14px 20px 0;align-items:center;}
.subnav button{background:none;border:none;font-size:14px;font-weight:700;color:var(--ink-soft);padding:6px 2px 12px;cursor:pointer;border-bottom:3px solid transparent;}
.subnav button.active{color:var(--primary-dark);border-color:var(--accent);}

main{flex:1;padding:18px 20px 70px;}

/* ---------- tag chip (signature element: ear tag) ---------- */
.tag-chip{display:inline-flex;align-items:center;background:var(--tag-yellow);color:var(--tag-ink);font-family:'IBM Plex Mono',monospace;font-weight:800;font-size:12.5px;padding:5px 10px 5px 17px;border-radius:3px 9px 9px 3px;position:relative;box-shadow:1px 2px 0 rgba(0,0,0,0.18);white-space:nowrap;letter-spacing:0.03em;}
.tag-chip::before{content:'';position:absolute;left:6px;top:50%;width:5px;height:5px;background:var(--bg);border:1px solid rgba(0,0,0,0.3);border-radius:50%;transform:translateY(-50%);}
.tag-chip.lg{font-size:17px;padding:9px 16px 9px 25px;}
.tag-chip.lg::before{left:9px;width:6px;height:6px;}
.tag-chip.sm{font-size:12px;padding:4px 9px 4px 14px;}
.tag-chip.sm::before{left:4px;width:4px;height:4px;}

/* ---------- buttons ---------- */
.btn{background:var(--primary);color:#fff;border:none;padding:9px 16px;border-radius:9px;font-weight:700;font-size:13px;cursor:pointer;transition:opacity .15s;}
.btn:hover{opacity:.88;}
.btn.secondary{background:var(--surface-alt);color:var(--ink);border:1px solid var(--line);}
.btn.ghost{background:transparent;color:var(--primary-dark);border:1px solid var(--primary);}
.btn.danger{background:var(--surface);color:var(--accent);border:1px solid var(--accent);}
.btn.small{padding:5px 11px;font-size:12px;border-radius:7px;}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.iconbtn{background:none;border:none;cursor:pointer;color:var(--ink-soft);font-size:13px;padding:4px 7px;border-radius:6px;}
.iconbtn:hover{background:var(--surface-alt);color:var(--accent);}

/* ---------- panels ---------- */
.panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:16px;box-shadow:0 2px 16px rgba(0,0,0,.07),0 1px 3px rgba(0,0,0,.04);}
.search-input{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:9px;font-size:13px;margin-bottom:10px;font-family:inherit;background:var(--bg);}
.search-input:focus{outline:2px solid var(--tag-yellow);background:var(--surface);}

/* ---------- animal view ---------- */
.animal-layout{display:grid;grid-template-columns:280px 1fr;gap:18px;align-items:start;}
@media (max-width:760px){
  .animal-layout{grid-template-columns:1fr;}
  .animal-layout.has-selection .list-panel{display:none;}
  .animal-layout:not(.has-selection) .detail-panel{display:none;}
}
.mobile-back{display:none;}
@media (max-width:760px){ .mobile-back{display:inline-flex;margin-bottom:12px;} }
.panel-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;gap:8px;}
.panel-head h3{font-size:13px;margin:0;color:var(--ink-soft);font-weight:700;}
.animal-list{max-height:68vh;overflow-y:auto;display:flex;flex-direction:column;gap:3px;}
.animal-list-item{display:flex;flex-direction:column;gap:5px;padding:10px 9px;border-radius:9px;cursor:pointer;border:1px solid transparent;}
.animal-list-item:hover{background:var(--surface-alt);}
.animal-list-item.active{background:var(--active-item-bg);border-color:var(--tag-yellow);}
.animal-meta{font-size:11px;color:var(--ink-soft);display:flex;gap:8px;flex-wrap:wrap;}
.empty-state{color:var(--ink-soft);font-size:13px;text-align:center;padding:40px 10px;}

.animal-detail-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;flex-wrap:wrap;}
.head-actions{display:flex;gap:6px;flex-wrap:wrap;}
.info-grid{display:flex;flex-direction:column;gap:14px;margin-top:16px;padding-top:14px;border-top:1px solid var(--line);}
.info-groups{display:flex;flex-direction:column;gap:12px;margin-top:16px;}
.info-panel{border:1px solid var(--line);border-radius:14px;padding:14px 16px;display:flex;flex-direction:column;gap:13px;position:relative;overflow:hidden;}
.info-panel::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;}
.info-panel.pedigree{background:var(--green-soft);}
.info-panel.pedigree::before{background:var(--primary);}
.info-panel.breeding{background:var(--accent-soft);}
.info-panel.breeding::before{background:var(--accent);}
.info-panel-title{font-size:11.5px;font-weight:800;letter-spacing:.02em;display:flex;align-items:center;gap:5px;}
.info-panel.pedigree .info-panel-title{color:var(--primary-dark);}
.info-panel.breeding .info-panel-title{color:var(--ai-text);}
.info-row{display:grid;gap:12px 18px;}
.info-row.cols1{grid-template-columns:1fr;}
.info-row.cols2{grid-template-columns:repeat(2,minmax(0,1fr));}
.info-row.cols3{grid-template-columns:repeat(3,minmax(0,1fr));}
.info-row.cols4{grid-template-columns:repeat(4,minmax(0,1fr));}
@media (max-width:520px){
  .info-row.cols3,.info-row.cols4{grid-template-columns:repeat(2,minmax(0,1fr));}
}
.info-row .field label{display:block;font-size:10.5px;color:var(--ink-soft);font-weight:700;margin-bottom:3px;letter-spacing:.02em;}
.info-row .field .val{font-size:14px;font-weight:600;}

/* 좌측 목록 품종 그림 */
.list-id-row{display:flex;align-items:center;gap:6px;}
.breed-emoji{font-size:16px;line-height:1;flex-shrink:0;}

/* 수정난이도 별 */
.diff-stars .on{color:var(--tag-yellow);letter-spacing:1px;}
.diff-stars .off{color:var(--line);letter-spacing:1px;}
.diff-num{font-size:12px;color:var(--ink-soft);font-weight:600;}

/* 분만예정일 계산 결과 카드 */
.calc-results{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:18px;}
.calc-result{background:var(--green-soft);border:1px solid var(--line);border-radius:12px;padding:13px 15px;}
.calc-result.accent{background:var(--accent-soft);}
.calc-result-label{font-size:11px;color:var(--ink-soft);font-weight:700;margin-bottom:6px;}
.calc-result-val{font-size:15.5px;font-weight:800;color:var(--primary-dark);line-height:1.3;}
.calc-result.accent .calc-result-val{color:var(--accent);}
@media (max-width:480px){
  .calc-results{grid-template-columns:1fr;}
}

.section-title{font-size:13px;font-weight:700;color:var(--ink-soft);margin:22px 0 8px;display:flex;justify-content:space-between;align-items:center;}

/* 축주 정보 */
.kv-display-list{display:flex;flex-direction:column;gap:6px;}
.kv-display-row{display:flex;justify-content:space-between;align-items:center;background:var(--surface);border:1px solid var(--line);border-radius:9px;padding:9px 13px;font-size:13.5px;}
.kv-display-name{font-weight:700;color:var(--ink);}
.kv-display-amount{color:var(--ink-soft);font-weight:600;}
.kv-row-list{display:flex;flex-direction:column;gap:8px;margin-top:8px;}
.kv-row{display:flex;gap:8px;align-items:center;}

/* 동기화 */
.sync-proto-row{display:flex;flex-wrap:wrap;align-items:center;gap:6px;margin:6px 0 4px;}
.sync-proto-label{font-size:11.5px;font-weight:700;color:var(--ink-soft);margin-right:2px;}
.sync-proto-btn{border:1px solid var(--primary);background:var(--green-soft);color:var(--primary-dark);border-radius:8px;padding:6px 12px;font-size:12.5px;font-weight:800;cursor:pointer;font-family:inherit;}
.sync-proto-btn:hover{background:var(--primary);color:#fff;}
.sync-proto-btn.clear{border-color:var(--line);background:var(--surface-alt);color:var(--ink-soft);font-weight:700;}
.sync-proto-btn.clear:hover{background:var(--line);color:var(--ink);}
.sync-proto-hint{font-size:11.5px;color:var(--ink-soft);margin:2px 0 8px;}
.sync-list{display:flex;flex-direction:column;gap:7px;margin-top:6px;}
.sync-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.sync-row select{min-width:140px;}
.sync-row input[type=date]{min-width:110px;}
.sync-row input[type=time]{min-width:88px;}
.sync-num{width:20px;height:20px;border-radius:50%;background:var(--primary);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.sync-row select{flex:1.4;padding:8px 9px;border:1px solid var(--line);border-radius:8px;font-family:inherit;font-size:13px;background:var(--bg);}
.sync-row input[type=date]{flex:1;padding:8px 9px;border:1px solid var(--line);border-radius:8px;font-family:inherit;font-size:13px;background:var(--bg);}
.sync-row input[type=time]{flex:.8;padding:8px 9px;border:1px solid var(--line);border-radius:8px;font-family:inherit;font-size:13px;background:var(--bg);}
.sync-row select:focus,.sync-row input:focus{outline:2px solid var(--tag-yellow);background:var(--surface);}
.kv-row .kv-name{flex:1.3;}
.kv-row .kv-amount{flex:1;}
.kv-row input{padding:8px 9px;border:1px solid var(--line);border-radius:8px;font-family:inherit;font-size:13px;background:var(--bg);}
.kv-row input:focus{outline:2px solid var(--tag-yellow);background:var(--surface);}

/* 임신감정 */
.preg-summary{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px;}
@media (max-width:560px){ .preg-summary{grid-template-columns:repeat(2,1fr);} }
.preg-stat{background:var(--surface);border:1px solid var(--line);border-radius:13px;padding:14px 10px;text-align:center;display:flex;flex-direction:column;justify-content:flex-start;}
.preg-stat-num{font-size:25px;font-weight:900;color:var(--ink);line-height:1;}
.preg-stat-label{font-size:11.5px;color:var(--ink-soft);font-weight:700;margin-top:7px;line-height:1.35;}
.preg-stat-sub{font-weight:600;font-size:10px;color:var(--ink-soft);}
.preg-stat.pregcol{background:var(--green-soft);}
.preg-stat.pregcol .preg-stat-num{color:var(--primary-dark);}
.preg-stat.ratecol{background:var(--accent-soft);}
.preg-stat.ratecol .preg-stat-num{color:var(--accent);}
.preg-stat.ratecol2{background:var(--estrus-soft);}
.preg-stat.ratecol2 .preg-stat-num{color:var(--estrus-text);}
.pregcheck-list{display:flex;flex-direction:column;gap:9px;}

/* 질환 보기 */
.disease-row{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--line);border-radius:11px;padding:12px 15px;cursor:pointer;flex-wrap:wrap;}
.disease-row:hover{background:var(--surface-alt);}
.disease-date{font-size:13px;color:var(--ink-soft);font-weight:700;}
.disease-tags{display:flex;gap:6px;flex-wrap:wrap;margin-left:auto;}
.disease-tag{font-size:12px;font-weight:800;padding:5px 11px;border-radius:8px;}
.disease-tag.uterine{background:var(--accent-soft);color:var(--ai-text);}
.disease-tag.ovary{background:var(--estrus-soft);color:var(--estrus-text);}
.disease-tag.improved{background:var(--green-soft);color:var(--primary-dark);}
.disease-tag.activecyst{background:var(--notpregnant-bg,#F7C1C1);color:#791F1F;}
.pregcheck-row{display:flex;align-items:center;gap:14px;background:var(--surface);border:1px solid var(--line);border-radius:11px;padding:13px 16px;cursor:pointer;flex-wrap:wrap;}
.pregcheck-row:hover{background:var(--surface-alt);}
.pregcheck-row.overdue{background:var(--accent-soft);border-color:var(--accent);}
.pregcheck-date{font-size:13px;color:var(--ink-soft);font-weight:700;}
.pregcheck-days{font-size:13.5px;font-weight:800;color:var(--primary-dark);}
.pregcheck-row.overdue .pregcheck-days{color:var(--overdue-days-text);}
.pregcheck-status{font-size:12px;color:var(--ink-soft);background:var(--surface-alt);padding:3px 9px;border-radius:7px;font-weight:600;}
.pregcheck-badge{font-size:12px;font-weight:800;color:#fff;background:var(--accent);padding:5px 11px;border-radius:7px;margin-left:auto;}
.pregcheck-badge.notpregnant{background:var(--notpregnant-bg);}
.pregcheck-badge.confirmed{background:var(--primary);}
.pregcheck-row.notpregnant{background:var(--notpregnant-row-bg);border-color:var(--notpregnant-row-border);}
.pregcheck-row.confirmed{background:var(--green-soft);border-color:var(--primary);}

.record-card{border:1px solid var(--line);border-radius:11px;padding:14px 16px;margin-top:10px;background:var(--surface);box-shadow:0 1px 6px rgba(0,0,0,.05);}
.record-card .row1{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;flex-wrap:wrap;}
.record-dates{display:flex;gap:8px;flex-wrap:wrap;}
.date-pill{font-size:11.5px;font-weight:700;padding:4px 9px;border-radius:7px;background:var(--surface-alt);color:var(--ink-soft);}
.date-pill.exam{background:var(--green-soft);color:var(--primary-dark);}
.date-pill.estrus{background:var(--estrus-soft);color:var(--estrus-text);}
.date-pill.ai{background:var(--accent-soft);color:var(--ai-text);}
.date-pill.sync{background:var(--sync-bg);color:var(--sync-text);}
.record-body{font-size:14px;margin-top:10px;color:var(--ink);line-height:1.5;display:flex;flex-direction:column;gap:7px;}
.record-body .kv{display:flex;gap:8px;align-items:baseline;border-bottom:1px solid var(--bg);padding-bottom:6px;}
.record-body .kv:last-child{border-bottom:none;padding-bottom:0;}
.record-body .kv b{color:var(--primary-dark);font-weight:800;font-size:12.5px;min-width:92px;flex-shrink:0;}
.record-notes{margin-top:8px;color:var(--ink);font-size:14px;background:var(--bg);padding:9px 12px;border-radius:8px;line-height:1.5;}

/* ---------- date view ---------- */
.toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:14px;}
.seg{display:inline-flex;border:1px solid var(--line);border-radius:9px;overflow:hidden;}
.seg button{border:none;background:var(--surface);padding:8px 14px;font-size:13px;font-weight:700;color:var(--ink-soft);cursor:pointer;}
.seg button.active{background:var(--primary);color:#fff;}
.toolbar input[type=date]{padding:8px 9px;border:1px solid var(--line);border-radius:8px;font-family:inherit;font-size:13px;background:var(--surface);}
.toolbar .search-input{width:200px;margin-bottom:0;}

.data-table{width:100%;border-collapse:collapse;font-size:13px;background:var(--surface);border-radius:12px;overflow:hidden;}
.data-table th{text-align:left;font-size:11px;color:var(--ink-soft);padding:8px 10px;border-bottom:2px solid var(--line);font-weight:700;}
.data-table td{padding:10px;border-bottom:1px solid var(--line);vertical-align:top;cursor:pointer;}
.data-table tr:hover td{background:var(--surface-alt);}
.data-table .actions{white-space:nowrap;}
.note-trunc{max-width:340px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:block;}

/* ---------- schedule ---------- */
.sched-toolbar{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:12px;}
.chip-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
.quick-chip{background:var(--surface-alt);border:1px solid var(--line);border-radius:999px;padding:6px 13px;font-size:12px;cursor:pointer;font-weight:700;color:var(--ink);}
.quick-chip:hover{background:var(--tag-yellow);border-color:var(--tag-yellow);color:var(--tag-ink);}
.sched-wrap{overflow:auto;border:1px solid var(--line);border-radius:12px;max-height:70vh;background:var(--surface);}
.sched-table{border-collapse:separate;border-spacing:0;font-size:12px;}
.sched-table th,.sched-table td{border-right:1px solid var(--line);border-bottom:1px solid var(--line);min-width:62px;text-align:center;}
.sched-table thead th{position:sticky;top:0;background:var(--surface-alt);z-index:2;padding:7px 4px;font-weight:700;color:var(--ink-soft);font-size:11px;}
.sched-table thead th.weekend{color:var(--accent);}
.sched-table thead th.today{background:var(--today);color:var(--ink);}
.sched-table th.corner{position:sticky;left:0;top:0;z-index:4;background:var(--surface-alt);min-width:180px;text-align:left;padding:7px 12px;}
.sched-table td.rowhead{position:sticky;left:0;background:var(--surface);z-index:3;text-align:left;padding:8px 10px;min-width:180px;}
.rowhead-inner{display:flex;align-items:center;justify-content:space-between;gap:6px;}
.sched-cell{padding:0;}
.sched-cell.today{background:var(--today-cell-bg);}
.sched-cell.auto input{color:var(--primary);font-style:italic;opacity:.85;}
.sched-cell.done input{text-decoration:line-through;opacity:.5;}
.sched-cell-inner{display:flex;align-items:center;width:100%;}
.sched-cell-inner input{flex:1;min-width:0;}
.done-btn{width:20px;height:20px;flex-shrink:0;border:1px solid var(--line);background:var(--surface-alt);border-radius:4px;font-size:11px;font-weight:700;cursor:pointer;color:var(--ink-soft);display:flex;align-items:center;justify-content:center;padding:0;margin-left:2px;}
.done-btn.is-done{background:var(--primary);color:#fff;border-color:var(--primary);}

/* 전체 스케줄 */

/* 풀정보 */
.grass-legend{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0 14px;}
.grass-tag{font-size:11.5px;font-weight:600;padding:4px 10px;border-radius:7px;}
.grass-section-title{font-size:13px;font-weight:800;color:var(--primary-dark);margin:20px 0 10px;padding-top:14px;border-top:1px solid var(--line);}
.grass-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:10px;}
.grass-card{border-radius:11px;padding:12px 14px;border:1px solid var(--line);background:var(--surface);}
.grass-card.straw{border-left:4px solid #C8A44A;}
.grass-card.quality{border-left:4px solid #4A8A40;}
.grass-card.import{border-left:4px solid var(--primary-dark);}
.grass-name{font-size:13.5px;font-weight:800;color:var(--ink);margin-bottom:4px;}
.grass-alias{font-weight:600;color:var(--ink-soft);font-size:12px;margin-left:3px;}
.grass-badge{display:inline-block;font-size:10.5px;font-weight:800;padding:2px 7px;border-radius:6px;margin-left:6px;vertical-align:middle;white-space:nowrap;}
.grass-badge.rec{background:#E8F5E8;color:#2A6A2A;}
.grass-badge.warn{background:#FFE5D0;color:#9A3810;}
html[data-theme="dark"] .grass-badge.rec{background:#1A3A1A;color:#7ACD7A;}
html[data-theme="dark"] .grass-badge.warn{background:#3A1A08;color:#FF9070;}
.grass-meta{font-size:11.5px;color:var(--ink-soft);display:flex;align-items:center;gap:5px;margin-bottom:6px;}
.grass-color-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0;border:1px solid rgba(0,0,0,.15);}
.grass-stats{display:flex;gap:6px;margin-bottom:7px;flex-wrap:wrap;}
.stat-tdn{font-size:11px;font-weight:800;background:#FFF3CD;color:#7A5A00;padding:2px 8px;border-radius:6px;}
.stat-cp{font-size:11px;font-weight:800;background:#D5EDD8;color:#1C5C34;padding:2px 8px;border-radius:6px;}
.stat-price{font-size:11px;font-weight:800;padding:2px 8px;border-radius:6px;}
.stat-price.p1{background:#E8F5E8;color:#2A6A2A;}   /* 저렴 */
.stat-price.p2{background:#EEF5E0;color:#4A6A1A;}   /* 보통 */
.stat-price.p3{background:#FFF0E0;color:#8A5010;}   /* 조금 비쌈 */
.stat-price.p4{background:#FFE5D0;color:#9A3810;}   /* 비쌈 */
.stat-price.p5{background:#FFD5C0;color:#AA2808;}   /* 가장 비쌈 */
html[data-theme="dark"] .stat-price.p1{background:#1A3A1A;color:#7ACD7A;}
html[data-theme="dark"] .stat-price.p2{background:#283A10;color:#AACD5A;}
html[data-theme="dark"] .stat-price.p3{background:#3A2810;color:#CDA05A;}
html[data-theme="dark"] .stat-price.p4{background:#3A1A08;color:#CDA050;}
html[data-theme="dark"] .stat-price.p5{background:#3A0A00;color:#FF9070;}
.grass-desc{font-size:12px;color:var(--ink-soft);line-height:1.55;margin-bottom:6px;}
.grass-sim{font-size:11.5px;color:var(--primary);font-weight:700;}
.grass-rec-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;}
.grass-rec{background:var(--surface-alt);border-radius:11px;padding:13px 16px;}
.grass-rec-title{font-size:13px;font-weight:800;color:var(--ink);margin-bottom:8px;}
.grass-rec ul{margin:0;padding-left:16px;display:flex;flex-direction:column;gap:5px;}
.grass-rec li{font-size:12.5px;color:var(--ink-soft);line-height:1.4;}

/* 풀정보 접이식 섹션 */
.grass-acc{border:1px solid var(--line);border-radius:10px;margin:8px 0;background:var(--surface);overflow:hidden;}
.grass-acc[open]{box-shadow:0 1px 8px rgba(0,0,0,.06);}
.grass-acc-sum{list-style:none;cursor:pointer;font-size:13.5px;font-weight:800;color:var(--primary-dark);padding:13px 15px;display:flex;align-items:center;justify-content:space-between;gap:8px;}
.grass-acc-sum::-webkit-details-marker{display:none;}
.grass-acc-sum::after{content:'▾';font-size:12px;color:var(--ink-soft);transition:transform .15s;flex-shrink:0;}
.grass-acc[open] .grass-acc-sum::after{transform:rotate(180deg);}
.grass-acc-sum:hover{background:var(--surface-alt);}
.grass-acc .grass-grid,.grass-acc .grass-rec-grid{padding:2px 14px 14px;}
.gst-wrap{display:flex;flex-direction:column;gap:1px;min-width:0;}
.gst-main{font-size:13.5px;font-weight:800;color:var(--primary-dark);line-height:1.3;}
.gst-sub{font-size:11px;font-weight:600;color:var(--ink-soft);line-height:1.3;}
html[data-theme="dark"] .stat-tdn{background:#4A3A10;color:#FFD870;}
html[data-theme="dark"] .stat-cp{background:#1A3A20;color:#7BE39D;}
.allsched-list{max-height:380px;overflow-y:auto;display:flex;flex-direction:column;gap:4px;}
.allsched-date{font-size:11.5px;font-weight:800;color:var(--ink-soft);padding:8px 0 3px;border-bottom:1px solid var(--line);}
.allsched-date.allsched-today{color:var(--primary-dark);font-size:13px;}
.allsched-item{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:8px;background:var(--surface);}
.allsched-item.done{opacity:.5;}
.allsched-item.done .allsched-note{text-decoration:line-through;}
.allsched-item.auto .allsched-note{font-style:italic;color:var(--primary);}
.allsched-owner{font-size:11px;color:var(--ink-soft);font-weight:600;}
.allsched-note{flex:1;font-size:13px;font-weight:600;}
@media (max-width:768px){
  /* 모바일: 풀정보 모달 1열 + 카드 안 정보(TDN/CP/가격)도 전부 세로로 쌓기 */
  .modal-overlay{padding:8px;}
  .grass-grid,.grass-rec-grid{grid-template-columns:1fr;gap:10px;}
  .grass-legend{flex-direction:column;gap:6px;}
  .grass-tag{width:100%;font-size:12px;line-height:1.5;}
  .grass-card{padding:13px 15px;}
  .grass-meta{flex-wrap:wrap;}
  .grass-stats{flex-direction:column;align-items:flex-start;gap:5px;}
  .grass-stats span{font-size:11.5px;white-space:normal;width:fit-content;max-width:100%;}
  .grass-section-title{font-size:13.5px;margin:16px 0 8px;}
  .grass-name{font-size:15px;}
  .grass-desc{font-size:13px;line-height:1.55;}
  .grass-rec{padding:13px 15px;}
  .grass-rec li{font-size:13px;}
}
.sched-cell input{width:100%;height:38px;border:none;background:transparent;text-align:center;font-size:11px;font-family:inherit;padding:2px;color:var(--ink);}
.sched-cell input:focus{background:var(--surface);outline:2px solid var(--tag-yellow);position:relative;z-index:1;}

/* 스케줄 표/목록 토글 + 목록(아젠다) 보기 */
.sched-modetoggle{margin-bottom:14px;}
.sched-agenda-bar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
.sched-agenda{display:flex;flex-direction:column;gap:4px;}
.sched-agenda .allsched-item{border:1px solid var(--line);}
.sched-agenda .allsched-date{padding:12px 2px 4px;}

/* 모바일: 스케줄 표 모드 압축 + 빠른코드 가로 스크롤 + 목록 줄바꿈 */
@media (max-width:768px){
  .sched-table th.corner,.sched-table td.rowhead{min-width:92px;}
  .sched-table th,.sched-table td{min-width:48px;}
  .sched-table thead th{font-size:10px;padding:6px 2px;}
  .sched-table td.rowhead{padding:6px 7px;}
  .sched-cell input{font-size:10px;height:34px;}
  .rowhead-inner .tag-chip.sm{font-size:10px;padding:3px 7px 3px 12px;}
  .chip-row{flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:5px;}
  .quick-chip{flex:0 0 auto;}
  .sched-toolbar{gap:8px;}
  .sched-toolbar > div{flex-wrap:wrap;}
  #scheduleAddInput{width:150px !important;}
  /* 목록 항목: 긴 귀표에 눌리지 않게 내용을 아래 줄로 */
  .sched-agenda .allsched-item{flex-wrap:wrap;padding:9px 10px;}
  .sched-agenda .allsched-note{flex:1 1 100%;order:3;margin-top:5px;font-size:13.5px;line-height:1.4;}
  .sched-agenda .done-btn{margin-left:auto;}
}

/* ---------- modal ---------- */
.modal-overlay{position:fixed;inset:0;background:rgba(20,24,18,.5);display:flex;align-items:center;justify-content:center;padding:18px;z-index:200;}
.modal{background:var(--surface);border-radius:18px;padding:24px;width:100%;max-width:660px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.18),0 4px 16px rgba(0,0,0,.1);}
.modal h2{margin:0 0 4px;font-size:18px;color:var(--primary-dark);}
.modal .modal-sub{font-size:12px;color:var(--ink-soft);margin-bottom:16px;}
.form-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:12px 14px;}
.form-grid.full{grid-template-columns:1fr;}
.field{display:flex;flex-direction:column;gap:4px;}
.field label{font-size:11px;color:var(--ink-soft);font-weight:700;}
.field input,.field select,.field textarea{padding:8px 9px;border:1px solid var(--line);border-radius:8px;font-family:inherit;font-size:13px;width:100%;background:var(--bg);}
.field input:focus,.field select:focus,.field textarea:focus{outline:2px solid var(--tag-yellow);background:var(--surface);}
.field textarea{resize:vertical;min-height:56px;}
.field-pair{display:flex;gap:6px;flex-wrap:wrap;}
.field-pair input{flex:1 1 92px;min-width:92px;}
.field.checkbox{flex-direction:row;align-items:center;gap:7px;}
.field.checkbox input{width:auto;}
.chips-inline{display:flex;gap:5px;flex-wrap:wrap;margin-top:2px;}
.chips-inline button{border:1px solid var(--line);background:var(--surface-alt);border-radius:7px;padding:3px 9px;font-size:11.5px;cursor:pointer;font-weight:600;}
.fieldset-title{font-size:12.5px;font-weight:700;color:var(--primary-dark);margin:18px 0 4px;padding-top:14px;border-top:1px solid var(--line);}
.legacy-note{font-size:11.5px;color:var(--ink-soft);background:var(--bg);border-radius:7px;padding:7px 10px;margin:6px 0 4px;}
.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:22px;}
.modal-actions .left{margin-right:auto;}
details.opt-section summary{cursor:pointer;font-size:12.5px;font-weight:700;color:var(--ink-soft);margin-top:14px;}

.confirm-modal{max-width:380px;text-align:center;}
.confirm-modal p{font-size:14px;color:var(--ink);line-height:1.5;}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#262420;color:#fff;padding:11px 20px;border-radius:30px;font-size:13px;font-weight:600;z-index:300;box-shadow:0 8px 24px rgba(0,0,0,.25);}

@media (max-width:540px){
  .modal{padding:18px;border-radius:14px;}
  .form-grid{grid-template-columns:1fr 1fr;}
}

/* Firebase 초기화 (동기화 가능하면 연결, 아니면 로컬 폴백) */
window.__cloudReady = (async () => {
  const cfg = window.FIREBASE_CONFIG;
  if(!cfg || !cfg.apiKey || !cfg.projectId) return false;
  if(typeof firebase === 'undefined') return false;
  try{
    firebase.initializeApp(cfg);
    const auth = firebase.auth();
    await auth.signInAnonymously();
    const db = firebase.firestore();
    const ref = db.collection('breedingApp').doc('state');
    window.__cloud = {
      async get(){ const snap = await ref.get(); return snap.exists ? snap.data().json : null; },
      async set(jsonStr, ts){ await ref.set({ json: jsonStr, updatedAt: ts }); },
      subscribe(cb){ return ref.onSnapshot(snap => { if(snap.exists){ const d=snap.data(); cb(d.json, d.updatedAt); } }, err=>console.error('동기화 오류',err)); }
    };
    console.log('✅ Firebase 연결 성공');
    return true;
  }catch(e){
    console.error('Firebase 초기화 실패', e);
    return false;
  }
})();

/* ============================================================
   저장소 — 3가지 모드 자동 감지
   1) Claude 아티팩트 내부: window.storage 사용 (설정 불필요)
   2) 독립 호스팅 + Firebase 설정됨: 클라우드 동기화 (여러 기기)
   3) 독립 호스팅 + Firebase 미설정: 이 브라우저에만 저장
============================================================ */
let STORAGE_MODE = 'local';      // 'claude' | 'cloud' | 'local'
let lastLocalWriteTs = 0;

async function detectStorageMode(){
  if(typeof window.storage !== 'undefined' && window.storage && typeof window.storage.get === 'function'){
    return 'claude';
  }
  const cloudOk = await window.__cloudReady;
  if(cloudOk && window.__cloud) return 'cloud';
  return 'local';
}

async function loadState(){
  if(STORAGE_MODE==='claude'){
    const res = await window.storage.get(STORAGE_KEY);
    return (res && res.value) ? JSON.parse(res.value) : null;
  } else if(STORAGE_MODE==='cloud'){
    const json = await window.__cloud.get();
    return json ? JSON.parse(json) : null;
  } else {
    const v = localStorage.getItem(STORAGE_KEY);
    return v ? JSON.parse(v) : null;
  }
}
let SAVE_LOCKED = false;   // 불러오기 실패 시 켜짐 — 시드로 실제 저장소를 덮어쓰지 않도록 잠금
async function saveState(){
  if(SAVE_LOCKED){ console.warn('저장 잠금 상태 — 쓰기 건너뜀'); return; }
  try{
    const payload = JSON.stringify(DATA);
    if(STORAGE_MODE==='claude'){
      await window.storage.set(STORAGE_KEY, payload);
    } else if(STORAGE_MODE==='cloud'){
      lastLocalWriteTs = Date.now();
      await window.__cloud.set(payload, lastLocalWriteTs);
    } else {
      localStorage.setItem(STORAGE_KEY, payload);
    }
  }catch(e){ console.error('저장 실패', e); toast('저장에 실패했어요. 잠시 후 다시 시도해주세요.'); }
}
function subscribeRemoteIfNeeded(){
  if(STORAGE_MODE!=='cloud' || !window.__cloud) return;
  window.__cloud.subscribe((json, ts)=>{
    if(!json || ts===lastLocalWriteTs) return;     // 내가 방금 쓴 변경은 무시
    try{
      const incoming = JSON.parse(json);
      DATA = incoming;
      DATA.owners.forEach(ensureOwnerMeta);
      if(!DATA.owners.includes(UI.owner)) UI.owner = DATA.owners[0];
      applyTheme();
      render();
      toast('다른 기기에서 변경된 내용을 불러왔어요.');
    }catch(e){ console.error('동기화 데이터 처리 실패', e); }
  });
}
function storageStatusLabel(){
  if(SAVE_LOCKED) return { icon:'⛔', text:'저장 잠금(읽기 실패)' };
  if(STORAGE_MODE==='cloud') return { icon:'☁️', text:'클라우드 저장' };
  if(STORAGE_MODE==='claude') return { icon:'🧩', text:'아티팩트 저장' };
  return { icon:'💾', text:'이 브라우저에만 저장' };
}
function buildInitial(){
  const d = JSON.parse(JSON.stringify(RAW_INITIAL));
  d.scheduleAnimals = {};
  d.scheduleRange = {};
  d.ownerProfiles = {};
  d.theme = 'light';
  d.owners.forEach(o=>{
    const ids = [...new Set(d.schedule.filter(s=>s.owner===o).map(s=>s.animalId))];
    d.scheduleAnimals[o] = ids;
    const dates = d.schedule.filter(s=>s.owner===o).map(s=>s.date).sort();
    if(dates.length){
      d.scheduleRange[o] = { start: dates[0], end: addDays(dates[dates.length-1], 5) };
    } else {
      d.scheduleRange[o] = { start: todayStr(), end: addDays(todayStr(), 30) };
    }
    d.ownerProfiles[o] = defaultOwnerProfile();
  });
  return d;
}
function defaultOwnerProfile(){
  return { address:'', phone:'', feeds:[], grasses:[], supplements:[] };
}
function ensureOwnerMeta(owner){
  if(!DATA.scheduleAnimals[owner]) DATA.scheduleAnimals[owner] = [];
  if(!DATA.scheduleRange[owner]) DATA.scheduleRange[owner] = { start: todayStr(), end: addDays(todayStr(),30) };
  if(!DATA.ownerProfiles) DATA.ownerProfiles = {};
  if(!DATA.ownerProfiles[owner]) DATA.ownerProfiles[owner] = defaultOwnerProfile();
  if(!DATA.completedCells) DATA.completedCells = {};
}
// completedCells 키: "owner|animalId|date"
function cellKey(owner, aid, date){ return `${owner}|${aid}|${date}`; }
function isCellDone(owner, aid, date){ return !!(DATA.completedCells||{})[cellKey(owner,aid,date)]; }
function toggleCellDone(owner, aid, date){
  if(!DATA.completedCells) DATA.completedCells = {};
  const k = cellKey(owner, aid, date);
  if(DATA.completedCells[k]) delete DATA.completedCells[k];
  else DATA.completedCells[k] = true;
  saveState();
}

/* ============================================================
   날짜 유틸
============================================================ */
function todayStr(){
  const d = new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function addDays(dateStr, n){
  const [y,m,d] = dateStr.split('-').map(Number);
  const dt = new Date(y, m-1, d);
  dt.setDate(dt.getDate()+n);
  return dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0');
}
function dateOnly(str){ return str ? str.slice(0,10) : ''; }
function timeOnly(str){ return (str && str.length>10) ? str.slice(11,16) : ''; }
function combineDT(dateVal, timeVal){
  if(!dateVal) return null;
  return timeVal ? (dateVal+' '+timeVal) : dateVal;
}
function fmtShort(str){
  if(!str) return '—';
  const date = str.slice(0,10);
  const time = str.length>10 ? str.slice(11,16) : '';
  const [y,m,d] = date.split('-');
  return `${m}/${d}` + (time ? ' '+time : '');
}
function fmtFull(str){ return str || '—'; }
function ageMonths(birth){
  if(!birth) return '—';
  const [y,m,d] = birth.split('-').map(Number);
  const now = new Date();
  let months = (now.getFullYear()-y)*12 + (now.getMonth()+1-m);
  if(now.getDate() < d) months -= 1;
  return months + '개월';
}
/* 품종 그림/배지 + 수정난이도 별 꾸밈 */
function breedIcon(breed){ return breed==='젖소' ? '🐄' : '🐂'; }
function difficultyStars(level){
  if(!level) return '—';
  const n = Math.max(0, Math.min(5, +level));
  return `<span class="diff-stars"><span class="on">${'★'.repeat(n)}</span><span class="off">${'☆'.repeat(5-n)}</span></span> <span class="diff-num">(${n}/5)</span>`;
}
function weekdayKr(dateStr){
  const [y,m,d] = dateStr.split('-').map(Number);
  return ['일','월','화','수','목','금','토'][new Date(y,m-1,d).getDay()];
}
function isWeekend(dateStr){
  const [y,m,d] = dateStr.split('-').map(Number);
  const wd = new Date(y,m-1,d).getDay();
  return wd===0 || wd===6;
}
function dateRangeArray(start,end){
  const out = [];
  let cur = start;
  let guard = 0;
  while(cur <= end && guard < 400){
    out.push(cur);
    cur = addDays(cur,1);
    guard++;
  }
  return out;
}
function uid(prefix){
  return prefix+'-'+Date.now().toString(36)+Math.random().toString(36).slice(2,7);
}
function esc(str){
  if(str===null || str===undefined) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function lastNonEmpty(recs, field){
  for(const r of recs){ if(r[field]) return r[field]; }
  return null;
}
function sortKeyOf(r){
  const d = r.examDate || r.aiDate || r.estrusDate;
  if(!d) return -1;
  return new Date(d.slice(0,10)+'T'+(d.length>10?d.slice(11,16):'00:00')).getTime();
}

/* ===== 발정주기일 추정 (초음파 → 프로토콜 → 오늘 투영) ===== */
function daysBetween(fromStr, toStr){
  if(!fromStr || !toStr) return 0;
  const a = new Date(fromStr.slice(0,10)+'T00:00');
  const b = new Date(toStr.slice(0,10)+'T00:00');
  return Math.round((b - a) / 86400000);
}
function parseUltra(text){
  text = text || '';
  const cyst = /낭종/.test(text);
  // 낭종으로 표기된 'NNmm' 수치는 집계에서 제거 (난포낭종/황체낭종 등)
  const clean = text.replace(/[가-힣A-Za-z]*낭종[^\d]{0,4}\(?\s*\d+(?:\.\d+)?\s*mm/g, ' 낭종 ')
                    .replace(/\d+(?:\.\d+)?\s*mm[^\d]{0,4}낭종/g, ' 낭종 ');
  const clMentioned = /황체/.test(clean);
  let clSize = null;
  const cm = clean.match(/황체[가-힣\s]*?(\d+(?:\.\d+)?)\s*mm/);
  if(cm) clSize = parseFloat(cm[1]);
  const smallFoll = /소난포/.test(clean);
  const allMm = [...clean.matchAll(/(\d+(?:\.\d+)?)\s*mm/g)].map(x=>parseFloat(x[1]));
  const foll = allMm.slice();
  if(clSize!=null){ const i=foll.indexOf(clSize); if(i>-1) foll.splice(i,1); }
  const follMax = foll.length ? Math.max(...foll) : null;
  let dom = null;
  const dm = clean.match(/(?:우성|우세)난포[^\d]{0,3}(\d+(?:\.\d+)?)\s*mm/);
  if(dm) dom = parseFloat(dm[1]);
  return { clMentioned, clSize, smallFoll, follMax, dom, cyst };
}
function recHasCyst(r){
  if(!r) return false;
  if(/낭종/.test(r.ovarianDisease||'')) return true;
  const u = [r.ultraUterus, r.ultraOvaryL, r.ultraOvaryR, r.ultrasound].filter(Boolean).join(' ');
  return /낭종/.test(u);
}
function cycleDayRange(p){
  const cl=p.clSize, clM=p.clMentioned, f=p.follMax, dom=p.dom, small=p.smallFoll;
  if(!clM && f!=null && f>=12) return [0,0];
  if((!clM || (cl!=null && cl<=10)) && small) return [1,2];
  if(cl!=null && cl>=20){
    if((dom!=null && dom>=15) || (f!=null && f>=15)) return [7,9];
    if(small) return [10,12];
    if(f!=null && f>=8) return [13,17];
  }
  if(cl!=null && cl>=15 && f!=null && f>=8) return [3,6];
  if(cl!=null && cl>=10 && cl<=20 && f!=null && f>=10) return [18,20];
  return null;
}
function estimateCycleToday(animal, recs){
  if(!recs || !recs.length) return null;
  // 가장 최근 진료가 낭종(질환 또는 초음파)이면 추정 안 함
  if(recHasCyst(recs[0])) return { cystSkip:true };
  const cycleLen = parseInt(animal.cycleLength,10) || 21;
  const mode = animal.waveMode || '2';
  if(mode==='3'){
    const base = recs[0];
    const baseDate = dateOnly(base.examDate || base.aiDate || base.estrusDate || '');
    if(!baseDate) return null;
    const md = parseFloat(animal.manualCycleDay);
    if(isNaN(md)) return { needManual:true, cycleLen };
    const elapsed = daysBetween(baseDate, todayStr());
    let day = (md*(cycleLen/21) + elapsed) % cycleLen; if(day<0) day+=cycleLen;
    return { day: Math.round(day), cycleLen, elapsed, baseDate, basis:`수동 ${md}일`, mode };
  }
  // 2난포파: 낭종이 아닌, 초음파가 적힌 가장 최근 진료 기준
  const ultraRec = recs.find(r => !recHasCyst(r) && [r.ultraOvaryL,r.ultraOvaryR,r.ultraUterus,r.ultrasound].some(v=>v&&v.trim()));
  if(!ultraRec) return { undetermined:true, cycleLen };
  const baseDate = dateOnly(ultraRec.examDate || ultraRec.aiDate || ultraRec.estrusDate || '');
  if(!baseDate) return { undetermined:true, cycleLen };
  const ultra = [ultraRec.ultraOvaryL, ultraRec.ultraOvaryR, ultraRec.ultraUterus, ultraRec.ultrasound].filter(Boolean).join(' ');
  const p = parseUltra(ultra);
  const rng = cycleDayRange(p);
  if(!rng) return { undetermined:true, cycleLen, baseDate };
  const elapsed = daysBetween(baseDate, todayStr());
  let day = (((rng[0]+rng[1])/2)*(cycleLen/21) + elapsed) % cycleLen; if(day<0) day+=cycleLen;
  return { day: Math.round(day), cycleLen, elapsed, baseDate, basis:`초음파 ${rng[0]}~${rng[1]}일`, mode };
}
function cycleTodayHtml(animal, recs){
  const r = estimateCycleToday(animal, recs);
  if(!r) return '—';
  if(r.cystSkip) return `<span style="color:var(--ink-soft);">낭종 — 추정 안 함</span>`;
  if(r.needManual) return `<span style="color:var(--ink-soft);">3난포파 · 주기일 입력 필요</span>`;
  if(r.undetermined) return `<span style="color:var(--ink-soft);">${r.cyst?'낭종 — 추정 제외':'초음파로 판정 불가'}</span>`;
  return `<span style="color:var(--accent);font-weight:800;">약 ${r.day}일째</span>`
    + `<div style="font-size:11px;color:var(--ink-soft);font-weight:500;margin-top:2px;">`
    + `${r.mode==='3'?'3':'2'}난포파 · 주기 ${r.cycleLen}일 · ${r.basis} · 진료후 ${r.elapsed}일</div>`;
}

function estrusSummary(r){
  const parts = [];
  if(r.estrusVulvar) parts.push('외음부종창/충혈 '+r.estrusVulvar);

  if(r.estrusOther) parts.push(r.estrusOther);
  if(parts.length) return parts.join(' · ');
  return r.estrusSign || '';
}
function rectalSummary(r){
  const parts = [];
  if(r.rectalUterus) parts.push('자궁 '+r.rectalUterus);
  if(r.rectalOvaryL) parts.push('좌난소 '+r.rectalOvaryL);
  if(r.rectalOvaryR) parts.push('우난소 '+r.rectalOvaryR);
  if(parts.length) return parts.join(' · ');
  return r.rectalExam || '';
}
function ultraSummary(r){
  const parts = [];
  if(r.ultraUterus) parts.push('자궁 '+r.ultraUterus);
  if(r.ultraOvaryL) parts.push('좌난소 '+r.ultraOvaryL);
  if(r.ultraOvaryR) parts.push('우난소 '+r.ultraOvaryR);
  if(parts.length) return parts.join(' · ');
  return r.ultrasound || '';
}

   스케줄 보기
============================================================ */
/* 진료기록 기반 자동 스케줄 계산 */
function buildAutoSchedule(owner){
  // { animalId: { date: [note, ...] } }
  const result = {};
  const add = (aid, date, note) => {
    if(!date) return;
    if(!result[aid]) result[aid] = {};
    if(!result[aid][date]) result[aid][date] = [];
    if(!result[aid][date].includes(note)) result[aid][date].push(note);
  };

  DATA.records.filter(r=>r.owner===owner).forEach(rec => {
    // 동기화 단계 자동 추가
    for(let i=1;i<=SYNC_STEPS;i++){
      const type = rec['sync'+i+'Type'];
      const date = dateOnly(rec['sync'+i+'Date']);
      if(type && date) add(rec.animalId, date, type);
    }
  });

  // 발정주기 예측 → 예상 발정일 ±1일에 '발정확인' 자동 추가
  DATA.animals.filter(a=>a.owner===owner).forEach(a => {
    const recs = DATA.records.filter(r=>r.owner===owner && r.animalId===a.animalId)
      .sort((x,y)=> sortKeyOf(y) - sortKeyOf(x));
    if(!recs.length) return;
    if((lastNonEmpty(recs,'pregnant')||'').trim().toUpperCase()==='O') return; // 임신 확정 제외
    const est = estimateCycleToday(a, recs);
    if(!est || typeof est.day!=='number' || !est.baseDate) return;            // 낭종/판정불가/수동미입력 제외
    const cycleLen = est.cycleLen;
    if(daysBetween(est.baseDate, todayStr()) > cycleLen*2) return;            // 2주기 넘게 지난 추정 제외
    const daysToEstrus = (cycleLen - est.day) % cycleLen;
    const nextEstrus = addDays(todayStr(), daysToEstrus);
    for(let k=0;k<3;k++){
      const ed = addDays(nextEstrus, k*cycleLen);
      add(a.animalId, addDays(ed,-1), '발정확인');
      add(a.animalId, ed, '발정확인');
      add(a.animalId, addDays(ed,1), '발정확인');
    }
  });
  return result;
}

/* 한 축주의 스케줄 항목들을 날짜순으로 모음 (표/목록 공통 데이터) */
function scheduleRowsForOwner(owner){
  ensureOwnerMeta(owner);
  const range = DATA.scheduleRange[owner];
  const dates = dateRangeArray(range.start, range.end);
  const auto = buildAutoSchedule(owner);
  const ids = Array.from(new Set([...(DATA.scheduleAnimals[owner] || []), ...Object.keys(auto)]));
  const rows = [];
  ids.forEach(aid => {
    dates.forEach(d => {
      const manual = DATA.schedule.find(s=>s.owner===owner && s.animalId===aid && s.date===d);
      const autoEntries = (auto[aid]||{})[d] || [];
      const note = manual ? manual.note : autoEntries.join(' / ');
      if(!note) return;
      rows.push({ aid, date:d, note, done:isCellDone(owner,aid,d), isAuto: !manual && !!autoEntries.length, manual: !!manual });
    });
  });
  rows.sort((a,b)=> a.date.localeCompare(b.date) || a.aid.localeCompare(b.aid));
  return rows;
}

/* 목록(날짜별) 보기 — 모바일 기본 */
function renderScheduleAgenda(){
  const range = DATA.scheduleRange[UI.owner];

/* ============================================================
   임신감정 보기
============================================================ */
function renderPregCheckView(){
  const today = todayStr();
  const animals = ownerAnimals();
  const rows = [];
  animals.forEach(a => {
    const allRecs = DATA.records.filter(r=>r.owner===UI.owner && r.animalId===a.animalId);
    const aiRecs = allRecs.filter(r=>r.aiDate).sort((x,y)=> sortKeyOf(y) - sortKeyOf(x));
    // 임신여부가 적힌 기록 중 가장 최근 것 (날짜 없는 기록도 인정)
    const pregRecs = allRecs.filter(r => (r.pregnant||'').trim()).sort((x,y)=> sortKeyOf(y) - sortKeyOf(x));
    const pregRec = pregRecs[0] || null;
    const pregnant = pregRec ? pregRec.pregnant : '';
    // 수정기록도 없고 임신표기도 없으면 제외
    if(!aiRecs.length && !pregnant) return;
    const aiRec = aiRecs[0] || null;
    const aiD = aiRec ? dateOnly(aiRec.aiDate) : '';
    const days = aiD ? Math.floor((new Date(today+'T00:00') - new Date(aiD+'T00:00')) / 86400000) : null;
    const recordForEdit = pregRec || aiRec;
    rows.push({ animalId: a.animalId, record: recordForEdit, aiDate: aiRec ? aiRec.aiDate : null, days, pregnant });
  });
  rows.sort((x,y)=> (y.days==null?-1:y.days) - (x.days==null?-1:x.days));

  const pregnant = rows.filter(r => (r.pregnant||'').trim().toUpperCase() === 'O');
  const active   = rows.filter(r => (r.pregnant||'').trim().toUpperCase() !== 'O');

  const renderRow = row => {
    const preg = (row.pregnant||'').trim().toUpperCase();
    const isNotPregnant = preg==='X';
    const isPregnant = preg==='O';
    const needsCheck = !row.pregnant && row.days!=null && row.days>=30;
    let rowClass = '';
    let badge = '';
    if(isNotPregnant){ rowClass='notpregnant'; badge = `<span class="pregcheck-badge notpregnant">🟠 비임신진단</span>`; }
    else if(needsCheck){ rowClass='overdue'; badge = `<span class="pregcheck-badge">🔴 임신감정 필요</span>`; }
    else if(isPregnant){ rowClass='confirmed'; badge = `<span class="pregcheck-badge confirmed">✅ 임신중</span>`; }
    return `
    <div class="pregcheck-row ${rowClass}" data-action="editRecord" data-id="${esc(row.record.id)}">
      <span class="tag-chip">${esc(row.animalId)}</span>
      <span class="pregcheck-date">${row.aiDate?('수정일 '+fmtShort(row.aiDate)):'수정기록 없음'}</span>
      ${row.days!=null?`<span class="pregcheck-days">${row.days}일 경과</span>`:''}
      ${row.pregnant?`<span class="pregcheck-status">임신여부 ${esc(row.pregnant)}</span>`:''}
      ${badge}
    </div>
  `;
  };

  const activeHtml = active.map(renderRow).join('') || `<div class="empty-state">해당 개체가 없어요.</div>`;
  const pregnantHtml = pregnant.map(renderRow).join('') || `<div class="empty-state">임신 확인된 개체가 없어요.</div>`;

  // 수정 = 수정상세정보의 KPN(정액번호)이 기입된 기록만 카운트
  const aiServiceRecs = DATA.records.filter(r => r.owner===UI.owner && (r.kpn||'').trim());
  const totalServices = aiServiceRecs.length;                  // 총 수정횟수
  const bred = new Set(aiServiceRecs.map(r=>r.animalId)).size; // 수정한 두수
  const rateCow = bred ? Math.round(pregnant.length / bred * 100) : 0;
  const rateSvc = totalServices ? Math.round(pregnant.length / totalServices * 100) : 0;

  return `
    <div class="panel">
      <div class="preg-summary">
        <div class="preg-stat">
          <div class="preg-stat-num">${active.length}</div>
          <div class="preg-stat-label">임신감정 대상</div>
        </div>
        <div class="preg-stat pregcol">
          <div class="preg-stat-num">${pregnant.length}</div>
          <div class="preg-stat-label">임신중</div>
        </div>
        <div class="preg-stat ratecol">
          <div class="preg-stat-num">${rateCow}%</div>
          <div class="preg-stat-label">수태율 (개체별)<br><span class="preg-stat-sub">임신 ${pregnant.length} / 수정 ${bred}두</span></div>
        </div>
        <div class="preg-stat ratecol2">
          <div class="preg-stat-num">${rateSvc}%</div>
          <div class="preg-stat-label">수태율 (수정횟수)<br><span class="preg-stat-sub">임신 ${pregnant.length} / 수정 ${totalServices}회</span></div>
        </div>
      </div>
      <div class="section-title"><span>임신감정 대상 (${active.length}두)</span></div>
      <div class="pregcheck-list">${activeHtml}</div>
      <div class="section-title" style="margin-top:26px;"><span>🐄 임신중 (${pregnant.length}두)</span></div>
      <div class="pregcheck-list">${pregnantHtml}</div>
    </div>
  `;
}

/* ============================================================

============================================================ */
function renderDiseaseView(){
  const dkey = r => dateOnly(r.examDate || r.aiDate || r.estrusDate || '');
  const recs = DATA.records
    .filter(r => r.owner===UI.owner && (((r.uterineDisease||'').trim()) || ((r.ovarianDisease||'').trim())))
    .sort((a,b)=> (dkey(b)||'').localeCompare(dkey(a)||''));

  const uterineCount = recs.filter(r => (r.uterineDisease||'').trim()).length;
  const ovaryCount   = recs.filter(r => (r.ovarianDisease||'').trim()).length;
  const animalsSet   = new Set(recs.map(r=>r.animalId));

  // 낭종 호전 판정: 과거 낭종 기록이 있는데 가장 최근 진료에서 낭종 없음
  const cystAnimals = new Set(recs.filter(recHasCyst).map(r=>r.animalId));
  let improvedCount = 0;
  cystAnimals.forEach(id => { const latest = animalRecords(id)[0]; if(latest && !recHasCyst(latest)) improvedCount++; });

  const rows = recs.map(r => {
    const d = dkey(r);
    const tags = [];
    if((r.uterineDisease||'').trim()) tags.push(`<span class="disease-tag uterine">자궁 · ${esc(r.uterineDisease.trim())}</span>`);
    if((r.ovarianDisease||'').trim()) tags.push(`<span class="disease-tag ovary">난소 · ${esc(r.ovarianDisease.trim())}</span>`);
    if(recHasCyst(r)){
      const latest = animalRecords(r.animalId)[0];
      const resolved = latest && !recHasCyst(latest);
      tags.push(resolved
        ? `<span class="disease-tag improved">✅ 낭종 호전</span>`
        : `<span class="disease-tag activecyst">🔴 낭종 진행중</span>`);
    }
    return `
    <div class="disease-row" data-action="editRecord" data-id="${esc(r.id)}">
      <span class="tag-chip">${esc(r.animalId)}</span>
      <span class="disease-date">${d?fmtShort(d):'—'}</span>
      <span class="disease-tags">${tags.join('')}</span>
    </div>`;
  }).join('') || `<div class="empty-state">등록된 질환 기록이 없어요.</div>`;

  return `
    <div class="panel">
      <div class="preg-summary">
        <div class="preg-stat">
          <div class="preg-stat-num">${animalsSet.size}</div>
          <div class="preg-stat-label">질환 개체</div>
        </div>
        <div class="preg-stat ratecol">
          <div class="preg-stat-num">${uterineCount}</div>
          <div class="preg-stat-label">자궁질환</div>
        </div>
        <div class="preg-stat ratecol2">
          <div class="preg-stat-num">${ovaryCount}</div>
          <div class="preg-stat-label">난소질환</div>
        </div>
        <div class="preg-stat pregcol">
          <div class="preg-stat-num">${improvedCount}</div>
          <div class="preg-stat-label">낭종 호전</div>
        </div>
      </div>
      <div class="section-title"><span>질환 기록 (${recs.length}건)</span></div>
      <div class="pregcheck-list">${rows}</div>
    </div>
  `;
}

/* 프로토콜 버튼: 단계별 type 채우고, 1번 날짜가 있으면 오프셋 날짜 자동 계산 */
function applySyncProtocol(name){
  const p = SYNC_PROTOCOLS[name];
  if(!p) return;
  for(let i=1;i<=SYNC_STEPS;i++){
    const typeEl = document.getElementById('f_sync'+i+'Type');
    const dateEl = document.getElementById('f_sync'+i+'Date');
    const timeEl = document.getElementById('f_sync'+i+'Time');
    if(!typeEl) continue;
    if(i <= p.steps.length){
      typeEl.value = p.steps[i-1];
    } else {
      typeEl.value = '';
      if(dateEl) dateEl.value = '';
      if(timeEl) timeEl.value = '';
    }
  }
  UI.activeSyncProtocol = name;
  const base = (document.getElementById('f_sync1Date')||{}).value || '';
  if(base) fillSyncProtocolDates(name, base);
  toast(`${name} 적용 — 1번 날짜를 넣으면 나머지가 자동 계산돼요.`);
}
function fillSyncProtocolDates(name, base){
  const p = SYNC_PROTOCOLS[name];
  if(!p || !base) return;
  for(let i=1;i<=p.steps.length;i++){
    const dateEl = document.getElementById('f_sync'+i+'Date');
    if(dateEl) dateEl.value = addDays(base, p.offsets[i-1]);
  }
}
function clearSyncSteps(){
  UI.activeSyncProtocol = null;
  for(let i=1;i<=SYNC_STEPS;i++){
    const typeEl = document.getElementById('f_sync'+i+'Type');
    const dateEl = document.getElementById('f_sync'+i+'Date');
    const timeEl = document.getElementById('f_sync'+i+'Time');
    if(typeEl) typeEl.value = '';
    if(dateEl) dateEl.value = '';
    if(timeEl) timeEl.value = '';
  }
  toast('동기화 단계를 모두 비웠어요.');
}
function syncSummary(r){
  const parts = [];
  for(let i=1;i<=SYNC_STEPS;i++){
    const type = r['sync'+i+'Type'];
    const date = r['sync'+i+'Date'];
    if(type) parts.push(`${i}) ${type}${date?' '+fmtShort(date):''}`);
  }
  return parts.join(' · ');
}
function firstSyncDate(r){
  for(let i=1;i<=SYNC_STEPS;i++){
    const type = r['sync'+i+'Type'];
    const date = r['sync'+i+'Date'];
    if(type && date) return date;
  }
  return null;
}
function parseDT(str){
  if(!str) return null;
  const datePart = str.slice(0,10);
  const timePart = str.length>10 ? str.slice(11,16) : '00:00';
  const [y,m,d] = datePart.split('-').map(Number);
  const [hh,mm] = timePart.split(':').map(Number);
  return new Date(y, m-1, d, hh, mm);
}
function ownerAnimalsFor(owner){
  return DATA.animals.filter(a=>a.owner===owner).sort((a,b)=>a.animalId.localeCompare(b.animalId));
}
function ensureAnimalExists(owner, animalId){
  if(!DATA.animals.find(a=>a.owner===owner && a.animalId===animalId)){
    DATA.animals.push({animalId, owner, breed:'한우', sire:'', damSire:'', damDamSire:'', birth:null, parity:'', lastCalving:null});
  }
}

function actionCalcInterval(){
  const sd = combineDT(document.getElementById('f_estrusDate_date').value, document.getElementById('f_estrusDate_time').value);
  const ad = combineDT(document.getElementById('f_aiDate_date').value, document.getElementById('f_aiDate_time').value);
  if(!sd || !ad){ toast('발정일시와 수정일시를 먼저 입력해주세요.'); return; }
  const t1 = parseDT(sd), t2 = parseDT(ad);
  let diffMin = Math.round((t2-t1)/60000);
  const neg = diffMin<0; diffMin = Math.abs(diffMin);
  const days = Math.floor(diffMin/1440), hours = Math.floor((diffMin%1440)/60), mins = diffMin%60;
  const parts = [];
  if(days) parts.push(days+'일');
  if(hours) parts.push(hours+'시간');
  if(!days && mins) parts.push(mins+'분');
  document.getElementById('f_aiInterval').value = (neg?'-':'') + (parts.join(' ') || '0분');
}

  // 동기화 단계가 있으면 스케줄에 보이도록 개체 등록 + 기간 확장
  const syncDates = [];
  for(let i=1;i<=SYNC_STEPS;i++){
    if(rec['sync'+i+'Type'] && rec['sync'+i+'Date']) syncDates.push(dateOnly(rec['sync'+i+'Date']));
  }
  if(syncDates.length){
    ensureOwnerMeta(owner);
    if(!DATA.scheduleAnimals[owner].includes(animalId)) DATA.scheduleAnimals[owner].push(animalId);
    const rng = DATA.scheduleRange[owner];
    syncDates.forEach(d => { if(d < rng.start) rng.start = d; if(d > rng.end) rng.end = d; });

function actionSaveAnimal(){
  const owner = modalCtx.owner;
  const newId = document.getElementById('f_animalId').value.trim();
  if(!newId){ toast('개체번호를 입력해주세요.'); return; }
  const oldId = modalCtx.originalId;
  const dup = DATA.animals.find(a=>a.owner===owner && a.animalId===newId && a.animalId!==oldId);
  if(dup){ toast('이미 존재하는 개체번호예요.'); return; }
  const fields = {
    breed: (document.getElementById('f_breed')||{}).value || '한우',
    sire: document.getElementById('f_sire').value.trim(),
    damSire: document.getElementById('f_damSire').value.trim(),
    damDamSire: document.getElementById('f_damDamSire').value.trim(),
    birth: document.getElementById('f_birth').value || null,
    parity: document.getElementById('f_parity').value.trim(),
    lastCalving: document.getElementById('f_lastCalving').value || null,
    aiDifficulty: document.getElementById('f_aiDifficulty').value,
    aiDifficultyNote: document.getElementById('f_aiDifficultyNote').value.trim(),
    waveMode: (document.getElementById('f_waveMode')||{}).value || '2',
    cycleLength: (document.getElementById('f_cycleLength')||{}).value.trim() || '21',
    manualCycleDay: (document.getElementById('f_manualCycleDay')||{}).value.trim(),
  };
  if(oldId===null){
    DATA.animals.push({ animalId:newId, owner, ...fields });
    UI.selectedAnimal = newId;
  } else {
    const a = DATA.animals.find(x=>x.owner===owner && x.animalId===oldId);
    Object.assign(a, fields);
    if(newId!==oldId){
      a.animalId = newId;
      DATA.records.forEach(r=>{ if(r.owner===owner && r.animalId===oldId) r.animalId=newId; });
      DATA.schedule.forEach(s=>{ if(s.owner===owner && s.animalId===oldId) s.animalId=newId; });
      const sidx = DATA.scheduleAnimals[owner].indexOf(oldId);
      if(sidx>-1) DATA.scheduleAnimals[owner][sidx]=newId;
      if(UI.selectedAnimal===oldId) UI.selectedAnimal=newId;
    }
  }
  saveState();
  closeModal();
  renderMain();
  toast('개체정보를 저장했어요.');
}

function actionDeleteAnimal(ds){
  const owner = UI.owner, id = ds.id;
  openConfirm('이 개체와 관련된 모든 진료·수정 기록, 스케줄이 함께 삭제돼요. 계속할까요?', ()=>{
    DATA.animals = DATA.animals.filter(a=>!(a.owner===owner && a.animalId===id));
    DATA.records = DATA.records.filter(r=>!(r.owner===owner && r.animalId===id));
    DATA.schedule = DATA.schedule.filter(s=>!(s.owner===owner && s.animalId===id));
    DATA.scheduleAnimals[owner] = (DATA.scheduleAnimals[owner]||[]).filter(x=>x!==id);
    if(UI.selectedAnimal===id) UI.selectedAnimal = null;
    saveState();
    renderMain();
    toast('개체를 삭제했어요.');
  });
}

/* 풀정보: 섹션 제목 + 카드를 접이식(아코디언)으로 묶기 — 모바일에서 목차부터 보이게 */
function groupGrassSections(){
  const root = document.getElementById('modalRoot');
  if(!root) return;
  const titles = [...root.querySelectorAll('.grass-section-title')];
  titles.forEach(title => {
    const details = document.createElement('details');
    details.className = 'grass-acc';
    details.open = false;          // 기본 접힘 → 목차처럼 보임
    const summary = document.createElement('summary');
    summary.className = 'grass-acc-sum';
    summary.innerHTML = title.innerHTML;
    details.appendChild(summary);
    title.replaceWith(details);
    let node = details.nextElementSibling;
    while(node && !node.classList.contains('grass-section-title') && !node.classList.contains('modal-actions')){
      const next = node.nextElementSibling;
      details.appendChild(node);
      node = next;
    }
  });
}

      <div class="modal-actions"><button class="btn secondary" data-action="closeModal">닫기</button></div>
    </div>

function allOwnersScheduleHtml(){
  const today = todayStr();
  const range = { start: addDays(today,-7), end: addDays(today, 45) };
  const dates = dateRangeArray(range.start, range.end);
  const allRows = [];
  DATA.owners.forEach(owner => {
    ensureOwnerMeta(owner);
    const auto = buildAutoSchedule(owner);
    const ids = DATA.scheduleAnimals[owner] || [];
    ids.forEach(aid => {
      dates.forEach(d => {
        const manual = DATA.schedule.find(s=>s.owner===owner && s.animalId===aid && s.date===d);
        const autoEntries = (auto[aid]||{})[d] || [];
        const note = manual ? manual.note : autoEntries.join(' / ');
        if(!note) return;
        const done = isCellDone(owner, aid, d);
        allRows.push({ owner, aid, date:d, note, done, isAuto:!manual&&!!autoEntries.length });
      });
    });
  });
  allRows.sort((a,b)=>a.date.localeCompare(b.date)||(a.aid.localeCompare(b.aid)));
  if(!allRows.length) return `<div class="empty-state">표시할 스케줄이 없어요.</div>`;
  let html = '';
  let lastDate = '';
  allRows.forEach(row => {
    if(row.date !== lastDate){
      lastDate = row.date;
      const isToday = row.date === today;
      html += `<div class="allsched-date ${isToday?'allsched-today':''}">${row.date} (${weekdayKr(row.date)})</div>`;
    }
    const done = row.done;
    html += `<div class="allsched-item ${done?'done':''} ${row.isAuto?'auto':''}">
      <span class="tag-chip sm">${esc(row.aid)}</span>
      <span class="allsched-owner">${esc(row.owner)}</span>
      <span class="allsched-note">${esc(row.note)}</span>
      <button class="done-btn ${done?'is-done':''}" data-action="toggleCellDoneAll" data-owner="${esc(row.owner)}" data-aid="${esc(row.aid)}" data-date="${row.date}" title="${done?'완료취소':'완료처리'}">✓</button>
    </div>`;
  });
  return html;
}

function updateScheduleCell(animalId, date, value){
  value = (value||'').trim();
  const idx = DATA.schedule.findIndex(s=>s.owner===UI.owner && s.animalId===animalId && s.date===date);
  if(value===''){
    if(idx>-1) DATA.schedule.splice(idx,1);
  } else {
    if(idx>-1) DATA.schedule[idx].note = value;
    else DATA.schedule.push({ id:uid(UI.owner+'-sch'), owner:UI.owner, animalId, date, note:value });
  }
  saveState();
}

function exportData(){
  try{
    const payload = JSON.stringify(DATA, null, 2);
    const blob = new Blob([payload], { type:'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `번식기록부_백업_${todayStr()}.json`;
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
    toast('백업 파일을 내려받았어요.');
  }catch(e){ console.error(e); toast('백업 내보내기에 실패했어요.'); }
}
function handleImportFile(file){
  if(!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try{
      const obj = JSON.parse(reader.result);
      if(!obj || !Array.isArray(obj.owners) || !Array.isArray(obj.animals) || !Array.isArray(obj.records)){
        toast('형식이 올바른 백업 파일이 아니에요.'); return;
      }
      const cnt = `축주 ${obj.owners.length} · 개체 ${obj.animals.length} · 기록 ${obj.records.length}`;
      if(!confirm(`이 백업으로 현재 데이터를 모두 교체할까요?\n(${cnt})\n현재 내용은 사라집니다.`)) return;
      DATA = obj;
      SAVE_LOCKED = false;                 // 복원하면 저장 잠금 해제
      DATA.owners.forEach(ensureOwnerMeta);
      if(!DATA.owners.includes(UI.owner)) UI.owner = DATA.owners[0];
      saveState();
      applyTheme();
      const banner = document.getElementById('load-error-banner'); if(banner) banner.remove();
      closeModal();
      render();
      toast('백업을 복원했어요.');
    }catch(e){ console.error(e); toast('파일을 읽지 못했어요.'); }
  };
  reader.readAsText(file);
}

  const st = storageStatusLabel();

      <h2>데이터 백업 / 복원</h2>
      <div class="modal-sub" style="margin-bottom:14px;">
        현재 저장 위치: <b>${st.icon} ${esc(st.text)}</b><br>
        데이터는 index.html 파일이 아니라 위 저장소에 보관돼요. 파일을 새로 올려도
        같은 주소(같은 브라우저/클라우드)면 유지됩니다. 만일을 대비해 주기적으로 백업을 내려받아 두세요.
      </div>
      <div style="display:flex;flex-direction:column;gap:10px;">
        <button class="btn" data-action="exportData">⬇️ 백업 내보내기 (JSON 다운로드)</button>
        <button class="btn secondary" data-action="importData">⬆️ 백업 가져오기 (현재 데이터 교체)</button>
      </div>

  const inp = document.getElementById('import-file-input');
  if(inp) inp.addEventListener('change', e => { if(e.target.files && e.target.files[0]) handleImportFile(e.target.files[0]); });
}

function initEvents(){
  document.addEventListener('click', e=>{
    const el = e.target.closest('[data-action]');
    if(!el) return;
    const action = el.dataset.action;
    if(ACTIONS[action]) ACTIONS[action](el.dataset, e);
  });
  document.addEventListener('input', e=>{
    const t = e.target;
    if(t.id==='animalSearchInput'){
      UI.animalSearch=t.value;
      const box=document.getElementById('animalListBox'), cnt=document.getElementById('animalCount');
      if(box){ const d=animalListData(); box.innerHTML=d.listHtml; if(cnt) cnt.textContent=d.animals.length; }
      else { pendingFocus={id:t.id,pos:t.selectionStart}; renderMain(); }
    }
    else if(t.id==='dateSearchInput'){
      UI.dateSearch=t.value;
      const box=document.getElementById('dateRowsBox');
      if(box){ box.innerHTML=dateViewRows(); }
      else { pendingFocus={id:t.id,pos:t.selectionStart}; renderMain(); }
    }
  });
  document.addEventListener('change', e=>{
    const t = e.target;
    if(t.matches && t.matches('.sched-cell input')){ if(!isAdmin()){ t.value = DATA.schedule.find(s=>s.owner===UI.owner&&s.animalId===t.dataset.aid&&s.date===t.dataset.date)?.note||''; return noAdminToast(); } updateScheduleCell(t.dataset.aid, t.dataset.date, t.value); }
    else if(t.id==='dateFromInput'){ UI.dateFrom=t.value; renderMain(); }
    else if(t.id==='dateToInput'){ UI.dateTo=t.value; renderMain(); }
    else if(t.id==='calc_aiDate'){ actionCalcDateChange(t.value); }
    else if(t.id==='f_estrusDate_date' || t.id==='f_aiDate_date'){
      const nextEl = document.getElementById('f_nextEstrusDate');
      if(nextEl && t.value){ nextEl.value = addDays(t.value, 21); }
    }
    else if(t.id==='f_sync1Date' && UI.activeSyncProtocol){
      fillSyncProtocolDates(UI.activeSyncProtocol, t.value);
    }
  });
  document.addEventListener('focusin', e=>{
    if(e.target.matches && e.target.matches('.sched-cell input')){
      UI.focusedCell = { id:e.target.id, aid:e.target.dataset.aid, date:e.target.dataset.date };
    }
  });
  document.addEventListener('keydown', e=>{
    if(e.key==='Escape') closeModal();
  });
}

/* ============================================================
   초기화
============================================================ */
function applyTheme(){
  if(!DATA.theme) DATA.theme = 'light';
  document.documentElement.setAttribute('data-theme', DATA.theme==='dark' ? 'dark' : 'light');
}
async function init(){
  STORAGE_MODE = await detectStorageMode();
  let stored = null, loadFailed = false;
  try{
    stored = await loadState();
  }catch(e){
    loadFailed = true;
    console.error('불러오기 실패 — 저장을 잠급니다', e);
  }

  if(loadFailed){
    // 읽기 실패: 절대 시드로 덮어쓰지 않음. 화면엔 시드를 보여주되 저장은 잠금.
    DATA = buildInitial();
    SAVE_LOCKED = true;
    setTimeout(showLoadErrorBanner, 0);
  } else if(stored){
    DATA = stored;
  } else {
    // 저장소가 정말 비어있음(최초 실행) → 시드 저장 OK
    DATA = buildInitial();
    await saveState();
  }
  DATA.owners.forEach(ensureOwnerMeta);
  UI.owner = DATA.owners[0];
  applyTheme();
  initEvents();
  render();
  subscribeRemoteIfNeeded();
}

function showLoadErrorBanner(){
  if(document.getElementById('load-error-banner')) return;
  const bar = document.createElement('div');
  bar.id = 'load-error-banner';
  bar.style.cssText = 'position:sticky;top:0;z-index:9999;background:#A32D2D;color:#fff;'
    + 'padding:10px 14px;font-size:13px;font-weight:700;text-align:center;line-height:1.5;';
  bar.innerHTML = '⚠️ 저장된 데이터를 불러오지 못했어요. 표시된 건 기본 시드 데이터이며 '
    + '<u>저장이 잠겨 있어</u> 덮어쓰기 사고는 일어나지 않아요. 새로고침하면 다시 시도합니다.';
  document.body.prepend(bar);
}

const ADMIN_PASSWORD = '0918'; // ← 원하는 비밀번호로 바꾸세요
const ADMIN_KEY = 'breeding-admin';

// 현재 관리자 모드인지 여부
function isAdmin(){
  return sessionStorage.getItem(ADMIN_KEY) === 'ok';
}

// 관리자 비밀번호 모달 열기
function openAdminLogin(){
  openModal(`
    <div class="modal" style="max-width:340px;text-align:center;">
      <div style="font-size:28px;margin-bottom:8px;">🔐</div>
      <h2 style="margin:0 0 4px;">관리자 모드</h2>
      <div class="modal-sub" style="margin-bottom:20px;">비밀번호를 입력하면 수정·추가·삭제가 가능해요.</div>
      <input id="admin-pw" type="password" placeholder="비밀번호" style="
        width:100%;box-sizing:border-box;padding:12px 16px;font-size:17px;
        border:1.5px solid var(--line);border-radius:10px;background:var(--surface-alt);
        color:var(--ink);font-family:inherit;text-align:center;letter-spacing:4px;outline:none;margin-bottom:8px;
      ">
      <div id="admin-err" style="height:16px;font-size:12px;color:var(--accent);margin-bottom:12px;"></div>
      <div class="modal-actions">
        <button class="btn secondary" data-action="closeModal">취소</button>
        <button class="btn" id="admin-login-btn">입력</button>
      </div>
    </div>
  `);
  const pw = document.getElementById('admin-pw');
  const btn = document.getElementById('admin-login-btn');
  const err = document.getElementById('admin-err');
  const attempt = () => {
    if(pw.value === ADMIN_PASSWORD){
      sessionStorage.setItem(ADMIN_KEY, 'ok');
      closeModal();
      render();
      toast('관리자 모드로 전환됐어요.');
    } else {
      err.textContent = '비밀번호가 틀렸어요.';
      pw.value = '';
      pw.focus();
      setTimeout(()=>{ err.textContent=''; }, 1500);
    }
  };
  btn.addEventListener('click', attempt);
  pw.addEventListener('keydown', e=>{ if(e.key==='Enter') attempt(); });
  setTimeout(()=>pw.focus(), 100);
}

function logoutAdmin(){
  sessionStorage.removeItem(ADMIN_KEY);
  if(UI.view === 'owner') UI.view = 'animal';
  render();
  toast('뷰어 모드로 전환됐어요.');
}

function noAdminToast(){
  toast('🔒 관리자 모드에서만 수정할 수 있어요.');
}

/* ============================================================
   엑셀 내보내기
============================================================ */
function exportExcel(){
  if(typeof XLSX === 'undefined'){
    toast('엑셀 라이브러리 로딩 중이에요. 잠시 후 다시 시도해주세요.'); return;
  }
  const wb = XLSX.utils.book_new();

  // ── 시트 1: 진료·수정 기록 ──
  const recHeaders = [
    '축주','개체번호','진료일','발정일시','수정일시','수정간격',
    '다음발정일','예상분만일','예상발정주기','임신여부',
    '발정증상(외음부)','발정증상(점액)','발정증상(자궁수축)','발정증상(기타)',
    '직장검사(자궁)','직장검사(좌난소)','직장검사(우난소)',
    '초음파(자궁)','초음파(좌난소)','초음파(우난소)',
    '자궁질환','난소질환',
    '호르몬처치','수정횟수','내수정횟수','농가수정횟수','KPN','진료메모',
    '동기화1','동기화1날짜','동기화2','동기화2날짜','동기화3','동기화3날짜',
    '동기화4','동기화4날짜','동기화5','동기화5날짜','동기화6','동기화6날짜',
    '동기화7','동기화7날짜',
  ];
  const recRows = DATA.records.map(r => {
    const row = [
      r.owner, r.animalId,
      r.examDate ? r.examDate.slice(0,10) : '',
      r.estrusDate || '', r.aiDate || '', r.aiInterval || '',
      r.nextEstrusDate ? r.nextEstrusDate.slice(0,10) : '',
      r.expectedCalving ? r.expectedCalving.slice(0,10) : '',
      r.expectedCycle || '', r.pregnant || '',
      r.estrusVulvar || '', r.estrusMucus || '', r.estrusContraction || '', r.estrusOther || '',
      r.rectalUterus || '', r.rectalOvaryL || '', r.rectalOvaryR || '',
      r.ultraUterus || '', r.ultraOvaryL || '', r.ultraOvaryR || '',
      r.uterineDisease || '', r.ovarianDisease || '',
      r.hormoneTreatment || '', r.aiCount || '', r.inHouseAiCount || '',
      r.farmAiCount || '', r.kpn || '', r.notes || '',
    ];
    for(let i=1;i<=7;i++){
      row.push(r['sync'+i+'Type']||'');
      const sd = r['sync'+i+'Date'];
      row.push(sd ? sd.slice(0,10) : '');
    }
    return row;
  });
  const ws1 = XLSX.utils.aoa_to_sheet([recHeaders, ...recRows]);
  // 열 너비 자동 설정
  ws1['!cols'] = recHeaders.map((_,i) => ({ wch: i<2 ? 10 : i<10 ? 14 : 12 }));
  XLSX.utils.book_append_sheet(wb, ws1, '진료·수정 기록');

  // ── 시트 2: 개체 정보 ──
  const animalHeaders = ['축주','개체번호','품종','부','외조부','외외증조부','출생일','산차','마지막분만일','수정난이도','수정난이도메모'];
  const animalRows = DATA.animals.map(a => [
    a.owner, a.animalId, a.breed||'한우', a.sire||'', a.damSire||'', a.damDamSire||'',
    a.birth||'', a.parity||'', a.lastCalving||'',
    a.aiDifficulty||'', a.aiDifficultyNote||'',
  ]);
  const ws2 = XLSX.utils.aoa_to_sheet([animalHeaders, ...animalRows]);
  ws2['!cols'] = animalHeaders.map(h => ({ wch: h.length > 6 ? 14 : 10 }));
  XLSX.utils.book_append_sheet(wb, ws2, '개체 정보');

  // ── 시트 3: 스케줄 ──
  const schedHeaders = ['축주','개체번호','날짜','내용','완료여부'];
  const schedRows = DATA.schedule.map(s => [
    s.owner, s.animalId, s.date, s.note||'',
    DATA.completedCells && DATA.completedCells[`${s.owner}|${s.animalId}|${s.date}`] ? '완료' : '',
  ]);
  const ws3 = XLSX.utils.aoa_to_sheet([schedHeaders, ...schedRows]);
  ws3['!cols'] = [{ wch:10 },{ wch:18 },{ wch:12 },{ wch:20 },{ wch:8 }];
  XLSX.utils.book_append_sheet(wb, ws3, '스케줄');

  // 파일명: 날짜 포함
  const today = todayStr().replace(/-/g,'');
  XLSX.writeFile(wb, `번식진료기록부_${today}.xlsx`);
  toast('엑셀 파일이 다운로드됐어요.');
}
