<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Reproduction Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore-compat.js"></script>
<style>
:root{
  --bg:#F2F3F5;
  --surface:#FFFFFF;
  --surface-alt:#ECECEC;
  --ink:#202122;
  --ink-soft:#72777D;
  --primary:#00A69C;
  --primary-dark:#008275;
  --accent:#2E70D6;
  --accent-soft:#E8F0FB;
  --tag-yellow:#F7C843;
  --tag-ink:#1A1200;
  --line:#D6D9DC;
  --today:#CDEFEB;
  --green-soft:#E3F4F1;
  --estrus-soft:#E8F0FC;
  --ai-text:#1F5FB5;
  --sync-bg:#EDE8F8;
  --sync-text:#5040A0;
  --estrus-text:#1E4D7A;
  --notpregnant-bg:#C0392B;
  --notpregnant-soft:#FBEDEC;
  --fatten-soft:#F1E7E1;
  --fatten-ink:#7B4A33;
  --notpregnant-row-bg:#FBEAE8;
  --notpregnant-row-border:#E0A9A2;
  --overdue-days-text:#B03020;
  --active-item-bg:#E3F4F1;
  --today-cell-bg:#E8F7F4;
  --radius:6px;
}
html[data-theme="dark"]{
  --bg:#1C1D20;
  --surface:#2A2C30;
  --surface-alt:#34363B;
  --ink:#DCDDDE;
  --ink-soft:#9AA0A6;
  --primary:#1FC0AD;
  --primary-dark:#5FDED0;
  --accent:#5B9BF0;
  --accent-soft:#1B2A3F;
  --tag-yellow:#F7C843;
  --tag-ink:#1A1200;
  --line:#3A3D42;
  --today:#234A46;
  --green-soft:#19302C;
  --estrus-soft:#162440;
  --ai-text:#7FB3F5;
  --sync-bg:#28204A;
  --sync-text:#C0B0F0;
  --estrus-text:#88BCEE;
  --notpregnant-bg:#E06A5C;
  --notpregnant-soft:#3a2522;
  --fatten-soft:#332620;
  --fatten-ink:#C8A18C;
  --notpregnant-row-bg:#3A2422;
  --notpregnant-row-border:#7A4540;
  --overdue-days-text:#FF8A78;
  --active-item-bg:#19302C;
  --today-cell-bg:#1C3A36;
}
html[data-theme="dark"] body{background:var(--bg);}
*{box-sizing:border-box;}
html{overflow-y:scroll;scrollbar-gutter:stable;}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:'IBM Plex Sans KR',-apple-system,BlinkMacSystemFont,system-ui,'Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif;-webkit-font-smoothing:antialiased;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:
    repeating-radial-gradient(ellipse 160px 80px at 25% 35%, transparent 0, transparent 76px, rgba(26,160,134,.022) 77px, transparent 78px),
    repeating-radial-gradient(ellipse 220px 110px at 72% 58%, transparent 0, transparent 106px, rgba(26,160,134,.018) 107px, transparent 108px),
    repeating-radial-gradient(ellipse 130px 65px at 80% 20%, transparent 0, transparent 62px, rgba(26,160,134,.016) 63px, transparent 64px);
}
html[data-theme="dark"] body::before{
  background-image:
    repeating-radial-gradient(ellipse 160px 80px at 25% 35%, transparent 0, transparent 76px, rgba(44,192,162,.06) 77px, transparent 78px),
    repeating-radial-gradient(ellipse 220px 110px at 72% 58%, transparent 0, transparent 106px, rgba(44,192,162,.045) 107px, transparent 108px);
}
.app{position:relative;z-index:1;}
button{font-family:inherit;}
body,button,input,select,textarea{word-break:keep-all;overflow-wrap:break-word;}
.status-badge{white-space:nowrap;}
.app{max-width:1180px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;}

/* ---------- header ---------- */
header.topbar{margin:0 20px;padding:16px 20px 0;background:var(--surface);border-bottom:1px solid var(--line);border-top:3px solid var(--primary);}
.title-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.title-row h1{font-weight:900;font-size:20px;margin:0;letter-spacing:-0.02em;color:var(--primary-dark);display:flex;align-items:center;gap:9px;}
.brand-badge{display:inline-flex;flex:0 0 auto;filter:drop-shadow(0 1px 2px rgba(0,0,0,.15));}
.app-version{display:inline-block;font-size:10.5px;font-weight:700;color:var(--ink-soft);background:var(--surface-alt);border:1px solid var(--line);border-radius:6px;padding:1px 6px;margin-left:8px;vertical-align:middle;letter-spacing:.3px;}
.title-row .sub{font-size:11.5px;color:var(--ink-soft);font-weight:600;letter-spacing:.04em;text-transform:uppercase;opacity:.8;}
.header-actions{margin-left:auto;display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end;}
.header-actions .btn{display:inline-flex;align-items:center;gap:5px;}
.header-actions .ic,.status-badge .ic{flex:0 0 auto;}
.ic{vertical-align:middle;}
.iconbtn svg,.diff-stars svg{vertical-align:middle;}
.diff-stars svg{margin:0 .5px;}
.status-badge{display:inline-flex;align-items:center;gap:4px;}
.status-badge{font-size:11px;color:var(--ink-soft);background:var(--surface-alt);border:1px solid var(--line);border-radius:999px;padding:4px 10px;font-weight:600;}
.theme-toggle{width:32px;height:32px;border-radius:50%;border:1px solid var(--line);background:var(--surface-alt);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;padding:0;}
.theme-toggle:hover{background:var(--surface);}

.owner-tabs{display:flex;gap:6px;margin-top:16px;border-bottom:1px solid var(--line);flex-wrap:wrap;}
.owner-tab{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:9px 9px 0 0;background:var(--surface-alt);color:var(--ink-soft);font-weight:700;font-size:12.5px;cursor:pointer;border:1px solid var(--line);border-bottom:none;position:relative;top:1px;transition:background .15s,color .15s;letter-spacing:-.01em;}
.owner-tabs .tab-break{display:none;}
.owner-tab.active{background:var(--surface);color:var(--primary-dark);font-weight:800;box-shadow:0 -2px 8px rgba(0,0,0,.06);}
.owner-tab.addnew{background:transparent;border:1px dashed var(--line);color:var(--ink-soft);font-weight:600;}
.owner-tab.fav{background:var(--tag-yellow);color:#5a4500;border-color:var(--tag-yellow);}
.owner-tab.fav.active{background:var(--surface);color:var(--primary-dark);border-color:var(--line);box-shadow:0 -2px 8px rgba(247,200,67,.45);}
.owner-tab.manage{background:transparent;border:1px solid var(--line);color:var(--ink-soft);font-weight:600;}
.owner-tab.archived-view{background:var(--surface-alt);color:var(--ink-soft);border-style:dashed;}
.ownmg-list{display:flex;flex-direction:column;gap:7px;}
.ownmg-row{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:9px 11px;border:1px solid var(--line);border-radius:10px;background:var(--surface);flex-wrap:wrap;}
.ownmg-row.arch{opacity:.7;background:var(--surface-alt);}
.ownmg-main{display:flex;flex-direction:column;gap:1px;}
.ownmg-name{font-weight:800;font-size:14px;}
.ownmg-sub{font-size:11px;color:var(--ink-soft);}
.ownmg-actions{display:flex;gap:5px;align-items:center;flex-wrap:wrap;}
.ownmg-actions .iconbtn.archive{color:var(--accent);}
.ownmg-actions .iconbtn.restore{color:var(--primary-dark);}
.ownmg-divider{font-size:12px;font-weight:700;color:var(--ink-soft);margin:14px 0 8px;}
.owner-tab.calc-tab{background:var(--primary);color:#fff;border-color:var(--primary);margin-right:6px;}
.owner-tab.calc-tab:hover{opacity:.88;}
.owner-tab.allsched-tab{background:var(--primary-dark);}
.owner-tab.addnew:hover{background:var(--surface-alt);}

.subnav{display:flex;gap:20px;padding:14px 0 0;align-items:center;flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.subnav::-webkit-scrollbar{display:none;}
.subnav button{background:none;border:none;font-size:14px;font-weight:700;color:var(--ink-soft);padding:6px 2px 12px;cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;flex:0 0 auto;}
.subnav button.active{color:var(--primary-dark);border-color:var(--primary);}
.global-search-bar{display:flex;align-items:center;gap:7px;margin:0;padding:5px 8px 5px 12px;background:var(--surface);border:1px solid var(--line);border-radius:999px;position:relative;width:190px;transition:border-color .15s,box-shadow .15s;}
.global-search-bar:focus-within{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-ring,rgba(0,166,156,.13));}
.global-search-bar .gs-icon{display:inline-flex;color:var(--ink-soft);flex:0 0 auto;}
.global-search-bar .gs-icon svg{width:15px;height:15px;}
.gs-input{flex:1 1 auto;min-width:0;border:none;background:none;font-family:inherit;font-size:13px;color:var(--ink);outline:none;}
.gs-input::placeholder{color:var(--ink-soft);font-size:12.5px;}
.gs-clear{flex:0 0 auto;border:none;background:var(--ink-soft);color:#fff;width:18px;height:18px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;padding:0;opacity:.65;}
.gs-clear svg{width:11px;height:11px;}
.gs-clear:hover{opacity:1;}
.resolved-check{display:flex;align-items:center;gap:6px;margin:6px 2px 2px;font-size:11px;color:var(--ink-soft);font-weight:700;cursor:pointer;}
.resolved-check input{width:14px;height:14px;accent-color:var(--primary);cursor:pointer;}
.share-card{border:1px solid var(--line);border-radius:11px;padding:12px 13px;background:var(--surface-alt);}
.share-row{font-size:13px;margin-bottom:7px;color:var(--ink);}
.share-link{width:100%;font-family:ui-monospace,monospace;font-size:11.5px;padding:7px 9px;border:1px solid var(--line);border-radius:7px;background:var(--surface);color:var(--ink-soft);box-sizing:border-box;}
.share-btns{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;}
.share-status{font-size:11px;margin-top:7px;color:var(--ink-soft);min-height:14px;}
.share-status.ok{color:var(--primary-dark);font-weight:700;}
.share-status.err{color:var(--notpregnant-bg);font-weight:700;}
.sr-list{display:flex;flex-direction:column;gap:8px;}
.sr-row{border:1px solid var(--line);border-radius:10px;padding:11px 13px;background:var(--surface);display:flex;flex-direction:column;gap:7px;}
.sr-head{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.sr-owner{font-size:12.5px;color:var(--ink-soft);font-weight:700;}
.sr-idtag{font-size:11px;font-weight:700;color:var(--primary-dark);background:var(--green-soft);border:1px solid var(--primary);border-radius:6px;padding:2px 7px;}
.sr-snips{display:flex;flex-direction:column;gap:4px;}
.sr-snip{font-size:13px;color:var(--ink);line-height:1.4;}
.sr-snip b{color:var(--ink-soft);font-weight:700;font-size:11.5px;margin-right:5px;}
.sr-more{font-size:11.5px;color:var(--ink-soft);font-weight:600;}
.gs-mark{background:var(--tag-yellow);color:#5a4500;border-radius:3px;padding:0 2px;font-weight:700;}

main{flex:1;padding:18px 20px 70px;}

/* ---------- tag chip (signature element: ear tag) ---------- */
.tag-chip{display:inline-flex;align-items:center;background:var(--surface);color:var(--ink);font-family:'IBM Plex Mono',monospace;font-weight:800;font-size:12.5px;padding:5px 11px 5px 16px;border:1px solid var(--line);border-radius:4px;position:relative;overflow:hidden;box-shadow:none;white-space:nowrap;letter-spacing:0.03em;}
.tag-chip::before{content:'';position:absolute;left:0;top:0;bottom:0;width:5px;background:var(--primary);border-radius:0;}
.tag-chip.lg{font-size:17px;padding:9px 16px 9px 20px;}
.tag-chip.lg::before{width:6px;}
.tag-chip.sm{font-size:12px;padding:4px 10px 4px 14px;}
.tag-chip.sm::before{width:4px;}
.tag-chip[data-animal-id]{cursor:pointer;}
.tag-chip[data-animal-id]:hover{border-color:var(--primary);background:var(--surface-alt);}

/* ---------- buttons ---------- */
.btn{background:var(--primary);color:#fff;border:none;padding:9px 16px;border-radius:9px;font-weight:700;font-size:13px;cursor:pointer;transition:opacity .15s;}
.btn:hover{opacity:.88;}
.btn.secondary{background:var(--surface-alt);color:var(--ink);border:1px solid var(--line);}
.btn.ghost{background:transparent;color:var(--primary-dark);border:1px solid var(--primary);}
.btn.danger{background:var(--surface);color:var(--accent);border:1px solid var(--accent);}
.btn.small{padding:5px 11px;font-size:12px;border-radius:7px;white-space:nowrap;}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.iconbtn{background:none;border:none;cursor:pointer;color:var(--ink-soft);font-size:13px;padding:4px 7px;border-radius:6px;}
.iconbtn:hover{background:var(--surface-alt);color:var(--accent);}

/* ---------- panels ---------- */
.panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:16px;box-shadow:none;}
.search-input{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:9px;font-size:13px;margin-bottom:10px;font-family:inherit;background:var(--bg);}
.search-input:focus{outline:2px solid var(--tag-yellow);background:var(--surface);}

/* ---------- animal view ---------- */
.animal-layout{display:grid;grid-template-columns:340px 1fr;gap:18px;align-items:start;}
@media (max-width:760px){
  .animal-layout{grid-template-columns:1fr;}
  .animal-layout.has-selection .list-panel{display:none;}
  .animal-layout:not(.has-selection) .detail-panel{display:none;}
}
.mobile-back{display:none;}
@media (max-width:760px){ .mobile-back{display:inline-flex;margin-bottom:12px;} }
.panel-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;gap:8px;}
.panel-head h3{font-size:13px;margin:0;color:var(--ink-soft);font-weight:700;}
.animal-list{max-height:68vh;overflow-y:auto;overflow-x:hidden;display:flex;flex-direction:column;gap:3px;}
.animal-sort{display:flex;gap:6px;margin:8px 0 6px;}
.animal-sort-btn{flex:1 1 0;font-family:inherit;font-size:12px;font-weight:700;color:var(--ink-soft);background:var(--surface-alt);border:1px solid var(--line);border-radius:7px;padding:6px 8px;cursor:pointer;transition:all .12s;}
.animal-sort-btn.active{color:#fff;background:var(--primary);border-color:var(--primary);}
.list-status{font-size:10.5px !important;padding:3px 8px !important;margin-left:auto;flex:0 0 auto;}
.animal-list-item{display:flex;flex-direction:column;gap:4px;padding:8px 9px;border-radius:9px;cursor:pointer;border:1px solid transparent;min-width:0;}
.animal-list-item:hover{background:var(--surface-alt);}
.animal-list-item.active{background:var(--active-item-bg);border-color:var(--tag-yellow);}
.animal-meta{font-size:11px;color:var(--ink-soft);display:flex;gap:8px;flex-wrap:wrap;}
.empty-state{color:var(--ink-soft);font-size:13px;text-align:center;padding:40px 10px;}

.animal-detail-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;flex-wrap:wrap;}
.head-actions{display:flex;gap:6px;flex-wrap:wrap;}
.info-grid{display:flex;flex-direction:column;gap:14px;margin-top:16px;padding-top:14px;border-top:1px solid var(--line);}
.info-groups{display:flex;flex-direction:column;gap:0;margin-top:14px;}
.info-panel{border:none;border-radius:0;padding:16px 0;display:flex;flex-direction:column;gap:14px;position:relative;background:transparent;border-top:1px solid var(--line);}
.info-panel:first-child{border-top:none;padding-top:4px;}
.info-panel::before{display:none;}
.info-panel-title{font-size:12px;font-weight:800;letter-spacing:.02em;display:flex;align-items:center;gap:6px;color:var(--ink);}
.info-panel-title .ic{color:var(--primary);}
.rec-title{margin:22px 0 10px;}
.rec-title .rec-add-btn{margin-left:auto;font-size:11px;padding:4px 10px;font-weight:700;}
.info-panel.breeding .info-panel-title .ic{color:var(--accent);}
.info-panel.pedigree .info-panel-title{color:var(--ink);}
.info-panel.breeding .info-panel-title{color:var(--ink);}
.kv2-list{display:flex;flex-direction:column;}
.kv2-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:9px 0;border-bottom:1px solid var(--line);min-height:40px;}
.kv2-row:last-child{border-bottom:none;}
.kv2-label{font-size:12.5px;color:var(--ink-soft);font-weight:700;flex:0 0 auto;letter-spacing:.01em;}
.kv2-val{font-size:14px;font-weight:600;color:var(--ink);display:flex;align-items:center;justify-content:flex-end;gap:6px;flex:1 1 auto;min-width:0;text-align:right;}
.kv2-unit{font-size:13px;color:var(--ink-soft);font-weight:600;}
.kv2-note{font-size:12px;color:var(--ink-soft);font-weight:500;margin-left:6px;}
.kv2-row.block{flex-direction:column;align-items:flex-start;gap:5px;}
.kv2-val.full{justify-content:flex-start;text-align:left;flex-wrap:wrap;width:100%;}
.kv2-val .inline-edit{margin:0;}
.kv2-val .inline-edit.sel{width:auto;max-width:160px;}
.info-row{display:grid;gap:12px 18px;}
.info-row.cols1{grid-template-columns:1fr;}
.info-row.cols2{grid-template-columns:repeat(2,minmax(0,1fr));}
.info-row.cols3{grid-template-columns:repeat(3,minmax(0,1fr));}
.info-row.cols4{grid-template-columns:repeat(4,minmax(0,1fr));}
@media (max-width:520px){
  .info-row.cols3,.info-row.cols4{grid-template-columns:repeat(2,minmax(0,1fr));}
}
.info-row .field label{display:block;font-size:10.5px;color:var(--ink-soft);font-weight:700;margin-bottom:3px;letter-spacing:.02em;}
.info-row .field .val{font-size:13px;font-weight:600;}
.breeding-grid{align-items:start;}
.pair-grid{grid-template-columns:repeat(4,minmax(0,1fr));column-gap:24px;justify-content:start;}
.breeding-grid .field label{min-height:15px;white-space:nowrap;}
.breeding-grid .val{min-height:26px;line-height:26px;font-size:13px;font-weight:600;}
.breeding-grid .val .kv2-note,.breeding-grid .val > div{line-height:1.35;}
.breeding-grid .inline-edit,.breeding-grid .inline-edit.num,.breeding-grid .inline-edit.sel,.breeding-grid input[type=date].inline-edit{height:26px;box-sizing:border-box;vertical-align:middle;font-size:10.5px;padding:2px 6px;}
.breeding-grid .kv2-unit{vertical-align:middle;font-size:10.5px;}
.breeding-grid .cycle-today-main{font-size:10.5px;font-weight:700;}
.breeding-grid .fatten-badge,.breeding-grid .fatten-btn,.breeding-grid .btn.small,.breeding-grid .btn.secondary.small{height:26px;box-sizing:border-box;display:inline-flex;align-items:center;vertical-align:middle;font-size:10.5px;padding:0 9px;}

/* 좌측 목록 품종 그림 */
.list-id-row{display:flex;align-items:center;gap:4px;flex-wrap:nowrap;min-width:0;}
.list-id-row .tag-chip{flex:0 0 auto;}
.list-id-row .tag-chip{flex-shrink:0;}
.list-id-row .breed-emoji{flex-shrink:0;}
.list-id-row .preg-badge,.list-id-row .fatten-badge{flex-shrink:0;}
.breed-emoji{font-size:16px;line-height:1;flex-shrink:0;}

/* 수정난이도 별 */
.diff-stars .on{color:var(--tag-yellow);letter-spacing:1px;}
.diff-stars .off{color:var(--line);letter-spacing:1px;}
.diff-num{font-size:12px;color:var(--ink-soft);font-weight:600;}

/* 분만예정일 계산 결과 카드 */
.calc-results{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:18px;}
.calc-result{background:var(--green-soft);border:1px solid var(--line);border-radius:12px;padding:13px 15px;}
.calc-result.accent{background:var(--accent-soft);}
.calc-result-label{font-size:11px;color:var(--ink-soft);font-weight:700;margin-bottom:6px;}
.calc-result-val{font-size:15.5px;font-weight:800;color:var(--primary-dark);line-height:1.3;}
.calc-result.accent .calc-result-val{color:var(--accent);}
@media (max-width:480px){
  .calc-results{grid-template-columns:1fr;}
}

.section-title{font-size:14px;font-weight:800;color:var(--ink);margin:24px 0 11px;display:flex;justify-content:space-between;align-items:center;padding-bottom:5px;border-bottom:2px solid var(--primary);letter-spacing:-.01em;}
.section-title .btn.small{font-size:11px;padding:4px 9px;}
.section-title::before{content:"";display:inline-block;width:4px;height:17px;background:var(--primary);margin-right:8px;border-radius:1px;vertical-align:-2px;}
.section-title>span:first-child{flex:1;}

/* 축주 정보 */
.kv-display-list{display:flex;flex-direction:column;gap:6px;}
.kv-display-row{display:flex;justify-content:space-between;align-items:center;background:var(--surface);border:1px solid var(--line);border-radius:9px;padding:9px 13px;font-size:13.5px;}
.kv-display-name{font-weight:700;color:var(--ink);}
.kv-display-amount{color:var(--ink-soft);font-weight:600;}
.kv-row-list{display:flex;flex-direction:column;gap:8px;margin-top:8px;}
.kv-row{display:flex;gap:8px;align-items:center;}

/* 동기화 */
.sync-proto-row{display:flex;flex-wrap:wrap;align-items:center;gap:6px;margin:6px 0 4px;}
.sync-proto-label{font-size:10.5px;font-weight:700;color:var(--ink-soft);margin-right:2px;}
.sync-proto-btn{border:1px solid var(--primary);background:var(--green-soft);color:var(--primary-dark);border-radius:8px;padding:5px 10px;font-size:11px;font-weight:800;cursor:pointer;font-family:inherit;}
.sync-proto-btn:hover{background:var(--primary);color:#fff;}
.sync-proto-btn.clear{border-color:var(--line);background:var(--surface-alt);color:var(--ink-soft);font-weight:700;}
.sync-proto-btn.clear:hover{background:var(--line);color:var(--ink);}
.sync-proto-hint{font-size:11.5px;color:var(--ink-soft);margin:2px 0 8px;}
.sync-list{display:flex;flex-direction:column;gap:7px;margin-top:6px;}
.sync-row{display:flex;gap:6px;align-items:center;flex-wrap:nowrap;}
.sync-num{width:18px;height:18px;border-radius:50%;background:var(--primary);color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.sync-row select{flex:1 1 0;min-width:0;padding:5px 6px;border:1px solid var(--line);border-radius:8px;font-family:inherit;font-size:11px;background:var(--bg);height:28px;box-sizing:border-box;}
.sync-row input[type=date]{flex:0 0 100px;min-width:0;padding:5px 6px;border:1px solid var(--line);border-radius:8px;font-family:inherit;font-size:11px;background:var(--bg);height:28px;box-sizing:border-box;}
.sync-row input[type=time]{flex:0 0 74px;min-width:0;padding:5px 6px;border:1px solid var(--line);border-radius:8px;font-family:inherit;font-size:11px;background:var(--bg);height:28px;box-sizing:border-box;}
.sync-row select:focus,.sync-row input:focus{outline:2px solid var(--tag-yellow);background:var(--surface);}
.kv-row .kv-name{flex:1.3;}
.kv-row .kv-amount{flex:1;}
.kv-row input{padding:8px 9px;border:1px solid var(--line);border-radius:8px;font-family:inherit;font-size:13px;background:var(--bg);}
.kv-row input:focus{outline:2px solid var(--tag-yellow);background:var(--surface);}

/* 임신감정 */
.preg-summary{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:18px;}
.preg-summary.five{grid-template-columns:repeat(5,minmax(0,1fr));}
.preg-summary.disease-three{grid-template-columns:repeat(3,minmax(0,1fr));}
@media (max-width:560px){
  .preg-summary{grid-template-columns:repeat(2,minmax(0,1fr));}
  .preg-summary.five{grid-template-columns:repeat(2,minmax(0,1fr));}
  /* 임신감정: 1줄 2칸(대상·임신중) + 2줄 3칸 */
  .preg-summary.preg-five{grid-template-columns:repeat(6,1fr);}
  .preg-summary.preg-five > :nth-child(1),
  .preg-summary.preg-five > :nth-child(2){grid-column:span 3;}
  .preg-summary.preg-five > :nth-child(3),
  .preg-summary.preg-five > :nth-child(4),
  .preg-summary.preg-five > :nth-child(5){grid-column:span 2;}
  /* 질환: 5칸 한 줄 */
  .preg-summary.disease-three{grid-template-columns:repeat(3,minmax(0,1fr));gap:6px;}
  .preg-summary.disease-three .preg-stat{padding:9px 4px;}
  .preg-summary.disease-three .preg-stat-num{font-size:18px;}
  .preg-summary.disease-three .preg-stat-label{font-size:10px;line-height:1.2;letter-spacing:-.02em;}
}
.preg-stat{background:var(--surface);border:1px solid var(--line);border-radius:13px;padding:14px 10px;text-align:center;display:flex;flex-direction:column;justify-content:flex-start;}
.preg-stat-num{font-size:25px;font-weight:900;color:var(--ink);line-height:1;}
.preg-stat-label{font-size:11.5px;color:var(--ink-soft);font-weight:700;margin-top:7px;line-height:1.35;}
.preg-stat-sub{display:block;margin-top:3px;font-weight:700;font-size:10px;color:var(--primary-dark);white-space:nowrap;}
.preg-stat.pregcol{background:var(--green-soft);}
.preg-stat.pregcol .preg-stat-num{color:var(--primary-dark);}
.preg-stat.ratecol{background:var(--accent-soft);}
.preg-stat.ratecol .preg-stat-num{color:var(--accent);}
.preg-stat.ratecol2{background:var(--estrus-soft);}
.preg-stat.ratecol2 .preg-stat-num{color:var(--estrus-text);}
.pregcheck-list{display:flex;flex-direction:column;gap:5px;}

/* 질환 보기 */
.disease-row{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--line);border-radius:11px;padding:8px 13px;cursor:pointer;flex-wrap:wrap;}
.disease-row:hover{background:var(--surface-alt);}
.disease-date{font-size:13px;color:var(--ink-soft);font-weight:700;}
.disease-tags{display:flex;gap:6px;flex-wrap:wrap;margin-left:auto;}
.disease-tag{font-size:12px;font-weight:800;padding:5px 11px;border-radius:8px;}
.disease-tag.uterine{background:var(--accent-soft);color:var(--ai-text);}
.disease-tag.ovary{background:var(--estrus-soft);color:var(--estrus-text);}
.disease-tag.improved{background:var(--green-soft);color:var(--primary-dark);}
.disease-tag.activecyst{background:var(--notpregnant-bg,#F7C1C1);color:#791F1F;}
.preg-tags{display:inline-flex;gap:5px;flex-wrap:wrap;}
.preg-tag{font-size:11px;font-weight:800;padding:3px 8px;border-radius:7px;white-space:nowrap;}
.preg-tag.pos{background:var(--green-soft);color:var(--primary-dark);}
.preg-tag.neg{background:var(--notpregnant-row-bg);color:var(--notpregnant-bg);}
.preg-tag.rechk{background:var(--tag-yellow);color:#5a4500;}
.preg-tag.sex{background:var(--estrus-soft);color:var(--estrus-text);}
.preg-tag.calf{background:var(--accent-soft);color:var(--ai-text);}
.preg-tag.due{background:var(--green-soft);color:var(--primary-dark);}
.preg-tag.overdue{background:#F7C1C1;color:#791F1F;}
.fatten-badge{display:inline-flex;align-items:center;gap:3px;background:#7A3B12;color:#fff;font-size:12px;font-weight:800;padding:4px 9px;border-radius:8px;white-space:nowrap;letter-spacing:-.01em;}
.fatten-badge.sm{font-size:9px;padding:2px 5px;border-radius:6px;gap:2px;letter-spacing:-.02em;}
.head-id-wrap{display:inline-flex;align-items:center;gap:8px;flex-wrap:wrap;}
.ai-stepper{display:inline-flex;align-items:center;gap:8px;}
.ai-stepper .iconbtn.step{width:30px;height:30px;font-size:18px;font-weight:800;border-radius:8px;background:var(--surface-alt);border:1px solid var(--line);display:inline-flex;align-items:center;justify-content:center;padding:0;}
.ai-stepper .iconbtn.step:hover{background:var(--primary);color:#fff;border-color:var(--primary);}
.ai-stepper .ai-count-num{font-size:18px;min-width:20px;text-align:center;color:var(--primary-dark);}
.dbl-toggle{cursor:pointer;}
.dbl-toggle.on{background:var(--primary)!important;color:#fff!important;border-color:var(--primary)!important;}
.dbl-badge{display:inline-block;background:var(--accent);color:#fff;font-size:11px;font-weight:800;padding:1px 7px;border-radius:6px;letter-spacing:.02em;vertical-align:middle;}
.preg-stage2.disabled{opacity:.4;pointer-events:none;}
.pregcheck-row.fattened{opacity:.9;}
.pregcheck-row .fatten-badge.sm{margin-left:6px;font-size:12px;padding:5px 11px;border-radius:7px;gap:3px;letter-spacing:-.01em;}
.sched-x{background:none;border:none;color:var(--notpregnant-bg,#C0392B);font-size:13px;font-weight:800;cursor:pointer;padding:2px 6px;border-radius:6px;line-height:1;flex-shrink:0;}
.sched-x:hover{background:rgba(192,57,43,.12);}
.inline-edit{font-family:inherit;font-size:14px;font-weight:700;color:var(--ink);background:var(--surface-alt);border:1px solid var(--line);border-radius:7px;padding:5px 8px;width:100%;max-width:150px;}
.inline-edit.num{width:64px;max-width:64px;text-align:center;padding:5px 6px;}
.inline-edit:focus{outline:none;border-color:var(--primary);background:var(--surface);}
.inline-edit:hover{border-color:var(--primary);}
.tag-chip.lg.fattened,.tag-chip.sm.fattened{opacity:.6;text-decoration:line-through;}
.animal-list-item.fattened{opacity:.62;}
.animal-list-item.fattened.active{opacity:1;}
.btn.small.fatten-btn,.btn.fatten-btn{background:#7A3B12;color:#fff;border:none;}
.btn.fatten-btn:hover{opacity:.88;}
.pregcheck-row{display:flex;align-items:center;gap:14px;background:var(--surface);border:1px solid var(--line);border-radius:11px;padding:13px 16px;cursor:pointer;flex-wrap:wrap;}
.pregcheck-mid{display:contents;}
.pregcheck-row:hover{background:var(--surface-alt);}
.pregcheck-row.overdue{background:var(--accent-soft);border-color:var(--accent);}
.pregcheck-date{font-size:13px;color:var(--ink-soft);font-weight:700;}
.pregcheck-days{font-size:13.5px;font-weight:800;color:var(--primary-dark);}
.pregcheck-row.overdue .pregcheck-days{color:var(--overdue-days-text);}
.pregcheck-status{font-size:12px;color:var(--ink-soft);background:var(--surface-alt);padding:3px 9px;border-radius:7px;font-weight:600;}
.pregcheck-badge{font-size:12px;font-weight:800;color:#fff;background:var(--accent);padding:5px 11px;border-radius:7px;margin-left:auto;}
.pregcheck-badge.notpregnant{background:var(--notpregnant-bg);}
.pregcheck-end{margin-left:auto;display:inline-flex;align-items:center;gap:6px;flex:0 0 auto;}
.pregcheck-end .pregcheck-badge{margin-left:0;}
.preg-subtag{font-size:11px;font-weight:700;padding:3px 8px;border-radius:6px;white-space:nowrap;flex:0 0 auto;}
/* 임신감정 통일 배지 — 분만D-day / 임신감정 필요 / 재수정 대기 / 비육전환 모두 동일 모양·크기 */
.pc-badge{font-size:12px;font-weight:800;padding:5px 11px;border-radius:7px;white-space:nowrap;flex:0 0 auto;letter-spacing:-.01em;line-height:1.25;display:inline-flex;align-items:center;}
.pc-badge.preg{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;}
.pc-badge.done{background:var(--primary);color:#fff;}
.pc-badge.check{background:var(--accent);color:#fff;}
.pc-badge.warn{background:var(--notpregnant-bg);color:#fff;}
.pc-badge.rebreed{background:var(--notpregnant-soft);color:var(--notpregnant-bg);}
.pc-badge.fatten{background:var(--fatten-soft);color:var(--fatten-ink);}
.pc-badge.unknown{background:var(--surface-alt);color:var(--ink-soft);border:1px solid var(--line);}
.preg-subtag.red{background:var(--notpregnant-soft);color:var(--notpregnant-bg);}
.preg-subtag.brown{background:var(--fatten-soft);color:var(--fatten-ink);}
.pregcheck-badge.confirmed{background:var(--primary);}
.pregcheck-badge.preg{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;font-size:12px;font-weight:800;padding:5px 11px;border-radius:7px;letter-spacing:0;box-shadow:none;}
.pregcheck-badge.unknown{background:var(--surface-alt);color:var(--ink-soft);border:1px solid var(--line);font-size:12px;font-weight:800;padding:5px 11px;border-radius:7px;}
.preg-badge{display:inline-flex;align-items:center;gap:3px;background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;font-size:12px;font-weight:900;padding:4px 10px;border-radius:8px;white-space:nowrap;letter-spacing:.01em;box-shadow:0 2px 7px rgba(26,160,134,.38);}
.preg-badge.sm{font-size:9px;padding:2px 5px;border-radius:6px;box-shadow:none;gap:2px;letter-spacing:-.02em;}
.pregcheck-row.notpregnant{background:var(--notpregnant-row-bg);border-color:var(--notpregnant-row-border);}
.pregcheck-row.confirmed{background:var(--green-soft);border-color:var(--primary);}

.record-card{border:1px solid var(--line);border-radius:11px;padding:14px 16px;margin-top:10px;background:var(--surface);box-shadow:0 1px 6px rgba(0,0,0,.05);}
.record-card .row1{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;flex-wrap:wrap;}
.record-dates{display:flex;gap:8px;flex-wrap:wrap;}
.date-pill{font-size:11.5px;font-weight:700;padding:4px 9px;border-radius:7px;background:var(--surface-alt);color:var(--ink-soft);}
.date-pill.exam{background:var(--green-soft);color:var(--primary-dark);}
.date-pill.estrus{background:var(--estrus-soft);color:var(--estrus-text);}
.date-pill.ai{background:var(--accent-soft);color:var(--ai-text);}
.date-pill.sync{background:var(--sync-bg);color:var(--sync-text);}
.record-body{font-size:14px;margin-top:10px;color:var(--ink);line-height:1.5;display:flex;flex-direction:column;gap:7px;}
.record-body .kv{display:flex;gap:8px;align-items:baseline;border-bottom:1px solid var(--bg);padding-bottom:6px;font-size:13px;}
.record-body .kv:last-child{border-bottom:none;padding-bottom:0;}
.record-body .kv b{color:var(--primary-dark);font-weight:800;font-size:13px;min-width:92px;flex-shrink:0;}
.record-notes{margin-top:8px;color:var(--ink);font-size:13px;background:var(--bg);padding:9px 12px;border-radius:8px;line-height:1.5;}

/* ---------- date view ---------- */
.toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:14px;}
.seg{display:inline-flex;border:1px solid var(--line);border-radius:9px;overflow:hidden;}
.seg button{border:none;background:var(--surface);padding:8px 14px;font-size:13px;font-weight:700;color:var(--ink-soft);cursor:pointer;}
.seg button.active{background:var(--primary);color:#fff;}
.toolbar input[type=date]{padding:8px 9px;border:1px solid var(--line);border-radius:8px;font-family:inherit;font-size:13px;background:var(--surface);}
.date-field{position:relative;display:inline-flex;align-items:center;}
.date-field .date-clear{position:absolute;right:6px;top:50%;transform:translateY(-50%);width:18px;height:18px;border:none;background:var(--ink-soft);color:#fff;border-radius:50%;font-size:10px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;opacity:.7;}
.date-field .date-clear:hover{opacity:1;}
.toolbar .search-input{width:200px;margin-bottom:0;}

.data-table{width:100%;border-collapse:collapse;font-size:13px;background:var(--surface);border-radius:6px;overflow:hidden;table-layout:fixed;}
.data-table th{text-align:left;font-size:11px;color:var(--ink-soft);padding:8px 10px;border-bottom:2px solid var(--line);font-weight:700;}
.data-table td{padding:10px;border-bottom:1px solid var(--line);vertical-align:top;cursor:pointer;}
.data-table td.rowbreak{display:none;}
.data-table tr:hover td{background:var(--surface-alt);}
.data-table .actions{white-space:nowrap;}
.note-trunc{max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:block;}
@media (max-width:640px){
  .data-table{table-layout:auto;border:none;background:transparent;}
  .data-table colgroup,.data-table thead{display:none;}
  .data-table,.data-table tbody{display:block;width:auto;}
  .data-table tr{display:flex;flex-wrap:wrap;align-items:center;gap:5px 8px;border:1px solid var(--line);border-radius:9px;margin-bottom:7px;padding:9px 11px;background:var(--surface);}
  .data-table td{display:inline-flex;align-items:center;border:none;padding:0;font-size:12.5px;}
  .data-table td.empty{display:none;}
  .data-table td[data-label]:not([data-label=""])::before{content:attr(data-label);font-weight:700;color:var(--ink-soft);font-size:10px;margin-right:4px;}
  .data-table td[data-label=""]{flex:0 0 auto;}
  .data-table td[data-label="진료"],.data-table td[data-label="수정"]{flex:0 0 auto;color:var(--ink-soft);font-weight:700;}
  .data-table td[data-label="비고"]{flex:1 1 auto;min-width:0;margin-top:5px;}
  .data-table td[data-label="비고"]::before{display:none;}
  .data-table td[data-label="비고"] .note-trunc{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;}
  .data-table td.rowbreak{display:block;flex:0 0 100%;width:100%;height:0;padding:0;margin:0;border:none;}
  .data-table td.actions{flex:0 0 auto;margin-left:auto;margin-top:5px;display:flex;justify-content:flex-end;gap:6px;align-self:flex-start;}
  .data-table td.actions:empty{display:none;}
  .data-table td.actions .iconbtn{flex:0 0 auto;padding:4px 10px;font-size:11.5px;border:1px solid var(--line);border-radius:6px;color:var(--ink-soft);}
}

/* ---------- schedule ---------- */
.sched-toolbar{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:12px;}
.chip-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
.quick-chip{background:var(--surface-alt);border:1px solid var(--line);border-radius:999px;padding:6px 13px;font-size:12px;cursor:pointer;font-weight:700;color:var(--ink);}
.quick-chip:hover{background:var(--tag-yellow);border-color:var(--tag-yellow);color:var(--tag-ink);}
.sched-wrap{overflow:auto;border:1px solid var(--line);border-radius:12px;max-height:70vh;background:var(--surface);}
.sched-table{border-collapse:separate;border-spacing:0;font-size:12px;}
.sched-table th,.sched-table td{border-right:1px solid var(--line);border-bottom:1px solid var(--line);min-width:62px;text-align:center;}
.sched-table thead th{position:sticky;top:0;background:var(--surface-alt);z-index:2;padding:7px 4px;font-weight:700;color:var(--ink-soft);font-size:11px;}
.sched-table thead th.weekend{color:var(--accent);}
.sched-table thead th.today{background:var(--today);color:var(--ink);}
.sched-table th.corner{position:sticky;left:0;top:0;z-index:4;background:var(--surface-alt);min-width:180px;text-align:left;padding:7px 12px;}
.sched-table td.rowhead{position:sticky;left:0;background:var(--surface);z-index:3;text-align:left;padding:8px 10px;min-width:180px;}
.rowhead-inner{display:flex;align-items:center;justify-content:space-between;gap:6px;}
.sched-cell{padding:0;}
.sched-cell.today{background:var(--today-cell-bg);}
.sched-cell.auto input{color:var(--primary);font-style:italic;opacity:.85;}
.sched-cell.done input{text-decoration:line-through;opacity:.5;}
.sched-cell-inner{display:flex;flex-direction:column;align-items:stretch;width:100%;}
.sched-cell-inner input{width:100%;min-width:0;}
.sched-cell-btns{display:flex;justify-content:center;gap:3px;padding:2px 0 3px;}
.sched-cell-btns .done-btn,.sched-cell-btns .skip-btn{width:18px;height:16px;margin-left:0;font-size:10px;border-radius:3px;}
.done-btn{width:20px;height:20px;flex-shrink:0;border:1px solid var(--line);background:var(--surface-alt);border-radius:4px;font-size:11px;font-weight:700;cursor:pointer;color:var(--ink-soft);display:flex;align-items:center;justify-content:center;padding:0;margin-left:2px;}
.done-btn.is-done{background:var(--primary);color:#fff;border-color:var(--primary);}
.skip-btn{width:20px;height:20px;flex-shrink:0;border:1px solid var(--line);background:var(--surface-alt);border-radius:4px;font-size:11px;font-weight:700;cursor:pointer;color:var(--ink-soft);display:flex;align-items:center;justify-content:center;padding:0;margin-left:2px;}
.skip-btn.is-skip{background:var(--notpregnant-bg,#C0392B);color:#fff;border-color:var(--notpregnant-bg,#C0392B);}
.sched-cell.skipped input{text-decoration:line-through;opacity:.45;}
.allsched-item.skipped .allsched-note{text-decoration:line-through;opacity:.55;}

/* 전체 스케줄 */

/* 풀정보 */
.grass-legend{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0 14px;}
.grass-tag{font-size:11.5px;font-weight:600;padding:4px 10px;border-radius:7px;}
.grass-section-title{font-size:13px;font-weight:800;color:var(--primary-dark);margin:20px 0 10px;padding-top:14px;border-top:1px solid var(--line);}
.grass-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:10px;}
.grass-card{border-radius:11px;padding:12px 14px;border:1px solid var(--line);background:var(--surface);}
.grass-card.straw{border-left:4px solid #C8A44A;}
.grass-card.quality{border-left:4px solid #4A8A40;}
.grass-card.import{border-left:4px solid var(--primary-dark);}
.grass-name{font-size:13.5px;font-weight:800;color:var(--ink);margin-bottom:4px;}
.grass-alias{font-weight:600;color:var(--ink-soft);font-size:12px;margin-left:3px;}
.grass-badge{display:inline-block;font-size:10.5px;font-weight:800;padding:2px 7px;border-radius:6px;margin-left:6px;vertical-align:middle;white-space:nowrap;}
.grass-badge.rec{background:#E8F5E8;color:#2A6A2A;}
.grass-badge.warn{background:#FFE5D0;color:#9A3810;}
html[data-theme="dark"] .grass-badge.rec{background:#1A3A1A;color:#7ACD7A;}
html[data-theme="dark"] .grass-badge.warn{background:#3A1A08;color:#FF9070;}
.grass-meta{font-size:11.5px;color:var(--ink-soft);display:flex;align-items:center;gap:5px;margin-bottom:6px;}

.grass-desc{font-size:12px;color:var(--ink-soft);line-height:1.55;margin-bottom:6px;}

.grass-acc{border:1px solid var(--line);border-radius:10px;margin:8px 0;background:var(--surface);overflow:hidden;}

.grass-acc-sum{list-style:none;cursor:pointer;font-size:13.5px;font-weight:800;color:var(--primary-dark);padding:13px 15px;display:flex;align-items:center;justify-content:space-between;gap:8px;}

.gst-wrap{display:flex;flex-direction:column;gap:1px;min-width:0;}
.gst-main{font-size:13.5px;font-weight:800;color:var(--primary-dark);line-height:1.3;}
.gst-sub{font-size:11px;font-weight:600;color:var(--ink-soft);line-height:1.3;}
html[data-theme="dark"] .stat-tdn{background:#4A3A10;color:#FFD870;}

.sched-cell input{width:100%;height:38px;border:none;background:transparent;text-align:center;font-size:11px;font-family:inherit;padding:2px;color:var(--ink);}

/* 스케줄 표/목록 토글 + 목록(아젠다) 보기 */

/* 모바일: 스케줄 표 모드 압축 + 빠른코드 가로 스크롤 + 목록 줄바꿈 */

}

/* ---------- modal ---------- */
.modal-overlay{position:fixed;inset:0;background:rgba(20,24,18,.5);display:flex;align-items:center;justify-content:center;padding:18px;z-index:200;}
.modal{background:var(--surface);border-radius:8px;padding:24px;width:100%;max-width:660px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.18),0 4px 16px rgba(0,0,0,.1);}
.modal h2{margin:0 0 4px;font-size:16px;color:var(--primary-dark);}
.modal .modal-sub{font-size:12px;color:var(--ink-soft);margin-bottom:16px;}
.form-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:12px 14px;}
.date-grid{grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:8px 10px;}
.date-grid .field label{font-size:10px;margin-bottom:2px;}
.date-grid .field input{height:30px;padding:3px 7px;font-size:11.5px;}
.date-grid .field-pair input[type=time]{max-width:88px;}
.date-grid .field-pair{flex-wrap:nowrap;}
.date-grid .field-pair input{min-width:0;flex:1 1 auto;}
.date-grid .field-pair input[type=time]{flex:0 0 92px;}
.date-grid .dt-field{grid-column:1 / -1;}
.form-grid.rc-grid{grid-template-columns:1fr 1fr 1fr;gap:8px 10px;}
.rc-grid .field label{font-size:10px;margin-bottom:2px;}
.rc-grid .field input{height:30px;padding:3px 8px;font-size:11.5px;}
.date-grid .dbl-toggle{font-size:10.5px;padding:5px 8px;}
.modal input[type=date],.modal input[type=time],.breeding-grid input[type=date]{-webkit-appearance:none;appearance:none;text-align:left;}
.form-grid.full{grid-template-columns:1fr;}
.field{display:flex;flex-direction:column;gap:4px;}
.field label{font-size:10.5px;color:var(--ink-soft);font-weight:700;}
.field input,.field select,.field textarea{padding:7px 9px;border:1px solid var(--line);border-radius:8px;font-family:inherit;font-size:12px;width:100%;background:var(--bg);}
.field input:focus,.field select:focus,.field textarea:focus{outline:2px solid var(--tag-yellow);background:var(--surface);}
.field textarea{resize:vertical;min-height:56px;}
.field-pair{display:flex;gap:6px;flex-wrap:wrap;}
.field-pair input{flex:1 1 92px;min-width:92px;}
.field.checkbox{flex-direction:row;align-items:center;gap:7px;}
.field.checkbox input{width:auto;}
.chips-inline{display:flex;gap:5px;flex-wrap:wrap;margin-top:2px;}
.chips-inline button{border:1px solid var(--line);background:var(--surface-alt);border-radius:7px;padding:3px 9px;font-size:11.5px;cursor:pointer;font-weight:600;}
.fieldset-title{font-size:11.5px;font-weight:700;color:var(--primary-dark);margin:16px 0 4px;padding-top:12px;border-top:1px solid var(--line);}
.ovary-field .ov-row{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-top:2px;}
.ox-grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px 14px;}
.ox-compact{flex-direction:row !important;align-items:center;justify-content:space-between;gap:8px;}
.ox-compact label{flex:1 1 auto;font-size:11px;}
.ox-toggle{display:inline-flex;border:1px solid var(--line);border-radius:7px;overflow:hidden;flex:0 0 auto;}
.ox-btn{border:none;background:var(--bg);color:var(--ink-soft);font-family:inherit;font-size:11px;font-weight:800;padding:4px 11px;cursor:pointer;}
.ox-btn+.ox-btn{border-left:1px solid var(--line);}
.ox-btn.on{background:var(--primary);color:#fff;}
.ox-btn.on.x{background:var(--notpregnant-bg);}
.seg-toggle{display:inline-flex;border:1px solid var(--line);border-radius:7px;overflow:hidden;flex:0 0 auto;}
.seg-tbtn{border:none;background:var(--bg);color:var(--ink-soft);font-family:inherit;font-size:11px;font-weight:800;padding:4px 10px;cursor:pointer;}
.seg-tbtn+.seg-tbtn{border-left:1px solid var(--line);}
.seg-tbtn.on{background:var(--primary);color:#fff;}
.seg-tbtn.on[data-val="X"]{background:var(--notpregnant-bg);}
.ov-seg-group{display:inline-flex;border:1px solid var(--line);border-radius:8px;overflow:hidden;background:var(--bg);height:32px;box-sizing:border-box;}
.ov-seg{border:none;background:transparent;color:var(--ink-soft);font-family:inherit;font-size:11px;font-weight:700;height:32px;padding:0 11px;cursor:pointer;display:inline-flex;align-items:center;}
.ov-seg+.ov-seg{border-left:1px solid var(--line);}
.ov-seg.on{background:var(--primary);color:#fff;}
.ov-num-wrap{position:relative;display:inline-flex;align-items:center;}
.ov-num-wrap input{width:74px;height:32px;padding:0 28px 0 10px;border:1px solid var(--line);border-radius:8px;font-family:inherit;font-size:12px;background:var(--bg);box-sizing:border-box;}
.ov-num-wrap input:focus{outline:2px solid var(--tag-yellow);background:var(--surface);}
.ov-num-wrap .ov-unit{position:absolute;right:9px;font-size:12px;color:var(--ink-soft);font-weight:700;pointer-events:none;}
.ov-add{border:1px solid var(--line);background:var(--surface-alt);border-radius:7px;height:32px;padding:0 12px;font-family:inherit;font-size:11px;font-weight:700;color:var(--ink-soft);cursor:pointer;display:inline-flex;align-items:center;}
.ov-note{flex:1 1 120px;min-width:100px;height:32px;padding:0 10px;border:1px solid var(--line);border-radius:8px;font-family:inherit;font-size:12px;background:var(--bg);box-sizing:border-box;}
.ov-note:focus{outline:2px solid var(--tag-yellow);background:var(--surface);}
.ov-chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:7px;}
.ov-chip{display:inline-flex;align-items:center;gap:5px;background:var(--green-soft);color:var(--primary-dark);border:1px solid var(--primary);border-radius:7px;padding:3px 8px;font-size:11.5px;font-weight:700;}
.ov-chip .ov-x{cursor:pointer;display:inline-flex;opacity:.6;}
.ov-chip .ov-x:hover{opacity:1;}
.ov-free{margin-top:7px;padding:7px 9px;border:1px solid var(--line);border-radius:8px;font-family:inherit;font-size:12px;width:100%;background:var(--bg);box-sizing:border-box;}
.ov-free:focus{outline:2px solid var(--tag-yellow);background:var(--surface);}
.legacy-note{font-size:11px;color:var(--ink-soft);background:var(--bg);border-radius:7px;padding:6px 10px;margin:6px 0 4px;}
.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:22px;}
.modal-actions .left{margin-right:auto;}
details.opt-section summary{cursor:pointer;font-size:12.5px;font-weight:700;color:var(--ink-soft);margin-top:14px;}

.confirm-modal{max-width:380px;text-align:center;}
.confirm-modal p{font-size:14px;color:var(--ink);line-height:1.5;}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#262420;color:#fff;padding:11px 20px;border-radius:30px;font-size:13px;font-weight:600;z-index:300;box-shadow:0 8px 24px rgba(0,0,0,.25);}

  .header-actions .btn.small{padding:5px 9px;font-size:14px;}
  .status-badge .btn-label{display:none;}
  .status-badge{font-size:13px;padding:4px 8px;}

  .owner-tabs{gap:4px;margin-top:10px;}

/* 보관함 (라이브러리) */
.lib-modal{max-width:560px;width:100%;max-height:86vh;display:flex;flex-direction:column;}
.lib-bar{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:12px;}
.lib-title-lg{font-size:18px;font-weight:800;color:var(--ink);display:inline-flex;align-items:center;gap:7px;}
.lib-title-ic{display:inline-flex;color:var(--primary);}
.lib-back{background:none;border:none;color:var(--primary-dark);font-size:14px;font-weight:700;cursor:pointer;padding:4px 0;}
.lib-list{display:flex;flex-direction:column;gap:7px;overflow-y:auto;flex:1;min-height:0;}
.lib-book{display:flex;align-items:center;gap:10px;padding:13px 14px;border:1px solid var(--line);border-radius:11px;background:var(--surface-alt);cursor:pointer;transition:all .12s;}
.lib-book:hover{border-color:var(--primary);}
.lib-book-main{flex:1;min-width:0;}
.lib-book-title{font-size:14.5px;font-weight:700;color:var(--ink);}
.lib-book-sub{font-size:12px;color:var(--ink-soft);margin-top:2px;}
.lib-book-meta{font-size:12px;color:var(--ink-soft);font-weight:700;flex:0 0 auto;}
.lib-book-head{margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid var(--line);}
.lib-book-actions{display:flex;gap:8px;margin-top:8px;}
.lib-mini{font-size:11.5px;font-weight:700;padding:5px 10px;border:1px solid var(--line);border-radius:7px;background:var(--surface);color:var(--ink-soft);cursor:pointer;}
.lib-mini.danger{color:var(--notpregnant-bg);border-color:var(--notpregnant-soft);}
.lib-chap{display:flex;align-items:center;gap:11px;padding:12px 14px;border:1px solid var(--line);border-radius:10px;background:var(--surface);cursor:pointer;transition:all .12s;}
.lib-chap:hover{border-color:var(--primary);background:var(--green-soft);}
.lib-chap-no{flex:0 0 auto;width:24px;height:24px;border-radius:50%;background:var(--primary);color:#fff;font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center;}
.lib-chap-title{flex:1;font-size:14px;font-weight:600;color:var(--ink);}
.lib-chevron{color:var(--ink-soft);font-size:18px;}
.lib-chap.reorder{cursor:default;}
.lib-reorder-hint{font-size:11.5px;color:var(--ink-soft);margin:2px 0 8px;}
.lib-reorder-btns{display:flex;gap:4px;margin-left:auto;flex:0 0 auto;}
.lib-move{width:30px;height:30px;border:1px solid var(--line);border-radius:7px;background:var(--surface);color:var(--ink);font-size:14px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.lib-move:hover:not(:disabled){border-color:var(--primary);color:var(--primary-dark);}
.lib-move:disabled{opacity:.3;cursor:default;}

.lib-empty,.lib-empty-inline{color:var(--ink-soft);font-size:13px;text-align:center;padding:30px 10px;line-height:1.6;}
.lib-loading{text-align:center;color:var(--ink-soft);padding:40px;font-size:14px;}
.lib-reader-title{font-size:17px;font-weight:800;color:var(--ink);margin:4px 0 10px;}
.lib-search{width:100%;box-sizing:border-box;padding:9px 12px;font-size:13px;border:1px solid var(--line);border-radius:9px;background:var(--surface-alt);color:var(--ink);margin-bottom:12px;outline:none;}
.lib-reader-body{flex:1;overflow-y:auto;min-height:0;font-size:15px;line-height:1.85;color:var(--ink);white-space:pre-wrap;word-break:break-word;padding-right:4px;}
.lib-mark{background:#ffe9a8;color:#7a5600;border-radius:3px;padding:0 1px;}
.lib-edit-title{width:100%;box-sizing:border-box;padding:10px 12px;font-size:15px;font-weight:700;border:1px solid var(--line);border-radius:9px;background:var(--surface-alt);color:var(--ink);margin-bottom:8px;outline:none;}
.lib-edit-body{width:100%;box-sizing:border-box;flex:1;min-height:300px;padding:12px;font-size:14px;line-height:1.8;border:1px solid var(--line);border-radius:9px;background:var(--surface-alt);color:var(--ink);resize:vertical;outline:none;font-family:inherit;white-space:pre-wrap;}
.lib-edit-foot{margin-top:8px;}
.lib-close-row{margin-top:12px;display:flex;justify-content:flex-end;flex:0 0 auto;}

/* 공태관리 */
/* 요약카드 클릭 필터 */
.preg-stat.clickable{cursor:pointer;transition:all .12s;position:relative;}
.preg-stat.clickable:hover{filter:brightness(.97);}
.preg-stat.clickable.sel{outline:2px solid var(--primary);outline-offset:-2px;border-radius:10px;}
.filter-note{font-size:12px;color:var(--ink-soft);margin:10px 2px 0;display:flex;align-items:center;gap:8px;}
.filter-clear{font-size:12px;font-weight:700;color:var(--primary-dark);background:none;border:none;cursor:pointer;text-decoration:underline;padding:0;}
.open-wrap{padding:4px 2px;}
.open-head{display:flex;align-items:center;gap:10px;margin-bottom:4px;}
.open-head h2{font-size:18px;font-weight:800;color:var(--ink);margin:0;}
.open-count{font-size:13px;font-weight:700;color:#fff;background:var(--primary);border-radius:20px;padding:2px 11px;}
.open-sub{font-size:12.5px;color:var(--ink-soft);margin-bottom:12px;}
.open-list{display:flex;flex-direction:column;gap:5px;}
.open-row{display:flex;align-items:center;gap:12px;padding:9px 13px;border:1px solid var(--line);border-radius:12px;background:var(--surface);cursor:pointer;transition:all .12s;}
.open-row:hover{border-color:var(--primary);background:var(--green-soft);}
.open-row.noinfo{background:var(--surface-alt);}
.open-id{flex:0 0 auto;min-width:46px;font-size:15px;font-weight:800;color:var(--primary-dark);font-variant-numeric:tabular-nums;}
.open-main{flex:1;min-width:0;}
.open-name{font-size:14px;font-weight:700;color:var(--ink);margin-bottom:3px;}
.open-due{font-size:13px;color:var(--ink-soft);display:flex;align-items:center;gap:7px;flex-wrap:wrap;}
.open-due b{color:var(--ink);font-weight:800;font-size:14px;}
.open-due.muted{color:var(--ink-soft);font-style:normal;}
.open-dd{display:inline-block;font-size:11.5px;font-weight:800;color:var(--estrus-text);background:var(--estrus-soft);border-radius:6px;padding:1px 8px;}
.open-dd.today{color:#fff;background:var(--notpregnant-bg);}
.open-basis{font-size:10.5px;font-weight:700;color:var(--ink-soft);border:1px solid var(--line);border-radius:5px;padding:0 5px;}
.open-chev{flex:0 0 auto;color:var(--ink-soft);font-size:20px;}
.open-st{display:inline-block;font-size:10.5px;font-weight:800;border-radius:5px;padding:1px 7px;margin-left:4px;vertical-align:middle;}
.open-row.oneline{gap:9px;}
.open-row.oneline .open-name{flex:1;min-width:0;font-size:14px;font-weight:700;color:var(--ink);margin:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.open-row.oneline .open-st{flex:0 0 auto;margin-left:0;}
.open-row.oneline .open-due{flex:0 0 auto;font-size:13px;color:var(--ink);font-weight:700;display:flex;align-items:center;gap:6px;}
.open-row.oneline .open-due.muted{color:var(--ink-soft);font-weight:600;}

.open-st.rebreed{color:var(--notpregnant-bg);background:var(--notpregnant-soft,#FBE9E7);}
.open-st.unbred{color:var(--ink-soft);background:var(--surface-alt);border:1px solid var(--line);}

/* 공태관리 — 모바일 글자 밀도 (다른 뷰와 동일하게) */
@media (max-width:600px){
  .open-wrap{padding:2px 0;}
  .open-head h2{font-size:15px;}
  .open-count{font-size:11px;padding:2px 9px;}
  .open-sub{font-size:11px;margin-bottom:10px;}
  .open-list{gap:4px;}
  .open-row{padding:7px 10px;gap:9px;border-radius:10px;}
  .open-id{min-width:38px;font-size:13px;}
  .open-name{font-size:12.5px;}
  .open-due{font-size:11.5px;gap:6px;}
  .open-due b{font-size:12.5px;}
  .open-dd{font-size:10.5px;padding:1px 7px;}
  .open-basis{font-size:9.5px;}
  .open-st{font-size:10px;padding:1px 6px;}
  .open-chev{font-size:18px;}
  .open-row.oneline{gap:7px;}
  .open-row.oneline .open-name{font-size:12.5px;}
  .open-row.oneline .open-due{font-size:11.5px;}
  .open-row.oneline .open-due b{font-size:12.5px;}
}

/* 수의학 하부 탭 */
.vet-back{display:inline-flex;align-items:center;gap:4px;font-size:12.5px;font-weight:700;color:var(--ink-soft);cursor:pointer;padding:4px 2px;margin-bottom:4px;border-radius:6px;}
.vet-back:hover{color:var(--primary);}
.vet-subtabs{display:flex;gap:4px;margin:10px 0 14px;border-bottom:2px solid var(--line);}
.vet-subtabs-header{margin:14px 0 0;border-bottom:none;}
.vet-subtabs-header .vet-subtab{padding:8px 16px 14px;margin-bottom:0;}
.vet-subtab{border:none;background:none;font-family:inherit;font-size:14px;font-weight:700;color:var(--ink-soft);padding:8px 16px;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;}
.vet-subtab.active{color:var(--primary);border-bottom-color:var(--primary);}
.vet-subtab:hover{color:var(--primary);}
.home-link{display:inline-flex;align-items:center;border-radius:8px;transition:opacity .15s;}
.home-link:hover{opacity:.7;}
/* 번식학 콘텐츠 */
.rb-block{padding:2px 0 8px;}
.rb-sub{font-size:14px;font-weight:800;color:var(--primary-dark);margin:18px 0 9px;padding:8px 12px;background:var(--accent-soft);border-radius:9px;border-left:4px solid var(--primary);}
.rb-h{font-size:13px;font-weight:700;color:var(--ink);margin:13px 0 5px;}
.rb-p{font-size:13px;line-height:1.75;color:var(--ink-soft);margin:7px 0;}
.rb-list{margin:5px 0 11px;padding-left:19px;}
.rb-list li{font-size:13px;line-height:1.8;color:var(--ink);margin-bottom:8px;}
.rb-label{display:inline-block;background:var(--primary);color:#fff;font-size:11px;padding:1px 8px;border-radius:6px;margin-right:5px;font-weight:700;}
/* 번식학 학습 콜아웃 */
.rb-intro{font-size:12.5px;color:var(--ink-soft);line-height:1.7;margin:4px 0 14px;padding:10px 12px;background:var(--surface-alt);border-radius:9px;}
/* ===== 정보 박스 3종 — 위키 본문형(라벨·테두리 중심) ===== */
.rb-bi{width:15px;height:15px;flex:0 0 auto;}
.rb-tag{flex:0 0 auto;font-size:10px;font-weight:800;letter-spacing:.3px;padding:1.5px 7px;border-radius:5px;color:#fff;}
.rb-tt{flex:1 1 auto;font-size:12.5px;font-weight:800;color:var(--ink);letter-spacing:-.2px;}
.rb-key-t,.rb-cc-h{display:flex;align-items:center;gap:7px;padding:9px 13px 8px;border-bottom:1px solid var(--line);}
/* KEY — 요약 */
.rb-key{background:var(--surface);border:1px solid var(--line);border-left:3px solid var(--accent);border-radius:7px;padding:0;margin:15px 0;overflow:hidden;}
.rb-key-t .rb-bi{color:var(--accent);}
.rb-key-t .rb-tag{background:var(--accent);}
.rb-key ul{margin:0;padding:10px 14px 11px 30px;list-style:none;}
.rb-key li{position:relative;font-size:13.5px;line-height:1.72;color:var(--ink);margin-bottom:6px;font-weight:500;}
.rb-key li:last-child{margin-bottom:0;}
.rb-key li::before{content:'';position:absolute;left:-15px;top:9px;width:4px;height:4px;border-radius:50%;background:var(--ink-soft);}
.rb-key-concl{font-size:13.5px;line-height:1.72;color:var(--ink);font-weight:700;margin:0 13px 11px 30px;padding-left:11px;border-left:2.5px solid var(--accent);}
/* CAUTION — 주의 */
.rb-caution{background:var(--surface);border:1px solid var(--line);border-left:3px solid var(--notpregnant-bg,#C0392B);border-radius:7px;margin:15px 0;overflow:hidden;}
.rb-caution .rb-bi{color:var(--notpregnant-bg,#C0392B);}
.rb-caution .rb-tag{background:var(--notpregnant-bg,#C0392B);}
.rb-cc-b{font-size:13.5px;line-height:1.74;color:var(--ink);padding:9px 14px 11px;}
/* CLINICAL — 임상 */
.rb-clinical{background:var(--surface);border:1px solid var(--line);border-left:3px solid var(--primary);border-radius:7px;margin:15px 0;overflow:hidden;}
.rb-clinical .rb-bi{color:var(--primary);}
.rb-clinical .rb-tag{background:var(--primary);}
.rb-clinical .rb-cc-b{font-size:13.5px;line-height:1.74;color:var(--ink);padding:9px 14px 11px;}
/* ===== 나무위키 스타일 수의학 문서 ===== */
.namu-doc{font-size:14px;line-height:1.7;color:var(--ink);}
.namu-doc .namu-title{font-size:23px;font-weight:800;color:var(--ink);margin:0;padding:2px 0 7px;border-bottom:3px solid var(--primary);letter-spacing:-.3px;}
.namu-meta{font-size:11.5px;color:var(--ink-soft);margin-top:7px;}
.namu-cat{font-size:12px;color:var(--ink-soft);margin-top:4px;}
.namu-doc .namu-toc{display:inline-block;min-width:50%;max-width:100%;box-sizing:border-box;border:1px solid var(--line);background:var(--surface-alt);border-radius:8px;padding:9px 18px 11px;margin:14px 0 8px;}
.namu-toc-t{font-size:12.5px;font-weight:800;color:var(--ink);text-align:center;margin-bottom:6px;}
.namu-toc ul{list-style:none;margin:0;padding:0;}
.namu-toc ul ul{padding-left:15px;}
.namu-toc li{font-size:12.5px;line-height:1.8;color:var(--ink);}
.namu-toc a{cursor:pointer;text-decoration:none;color:var(--ink);}
.namu-toc a:hover{text-decoration:underline;}
.namu-toc a:hover .namu-toc-n{text-decoration:underline;}
.namu-toc-n{color:var(--primary);font-weight:800;margin-right:3px;}
.namu-doc .namu-toc-subs{display:none;margin-top:2px;}
.namu-doc .namu-toc-ch.open > .namu-toc-subs{display:block;}
.namu-doc .namu-toc-tog{display:inline-flex;align-items:center;justify-content:center;width:15px;height:15px;cursor:pointer;color:var(--ink-soft);vertical-align:-2px;transition:transform .15s;}
.namu-doc .namu-toc-ch.open > .namu-toc-tog{transform:rotate(90deg);}
.namu-doc .namu-toc-tog-empty{cursor:default;visibility:hidden;}
.namu-cat b{color:var(--accent);margin-right:5px;font-weight:700;}
.namu-infobox{float:right;width:250px;max-width:48%;border:2px solid var(--primary);border-radius:7px;overflow:hidden;margin:8px 0 14px 18px;background:var(--surface);font-size:12.5px;}
.namu-ib-t{background:var(--primary);color:#fff;font-weight:800;text-align:center;padding:9px 8px;font-size:14px;}
.namu-ib-r{display:flex;border-top:1px solid var(--line);}
.namu-ib-k{flex:0 0 33%;background:var(--surface-alt);font-weight:700;padding:7px 9px;color:var(--ink);}
.namu-ib-v{flex:1;padding:7px 9px;color:var(--ink-soft);line-height:1.5;}
@media(max-width:560px){.namu-infobox{float:none;width:100%;max-width:100%;margin:8px 0 16px;}}
.namu-toc{display:inline-block;min-width:230px;max-width:100%;border:1px solid var(--line);background:var(--surface-alt);border-radius:4px;padding:9px 18px 11px;margin:18px 0 22px;clear:both;}
.namu-toc-t{font-weight:800;font-size:13px;margin-bottom:6px;color:var(--ink);}
.namu-toc-i{font-size:12.5px;line-height:2;}
.namu-toc-l2{padding-left:22px;}
.namu-toc-i a{color:var(--accent);text-decoration:none;}
.namu-toc-i a:hover{text-decoration:underline;}
.namu-toc-n{color:var(--ink-soft);margin-right:5px;}
.namu-h2{font-size:20px;font-weight:800;color:var(--ink);margin:38px 0 14px;padding-top:9px;padding-bottom:9px;border-top:2.5px solid var(--primary);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:8px;flex-wrap:wrap;scroll-margin-top:14px;clear:both;cursor:pointer;letter-spacing:-.2px;}
.namu-h3{font-size:16.5px;font-weight:800;color:var(--ink);margin:26px 0 11px;padding-bottom:7px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:7px;flex-wrap:wrap;scroll-margin-top:14px;cursor:pointer;letter-spacing:-.2px;}
.namu-h2 .namu-htext,.namu-h3 .namu-htext{flex:1 1 auto;color:var(--ink);}
.namu-num{color:var(--primary);font-weight:800;flex:0 0 auto;}
.namu-h2 svg.ic{width:18px;height:18px;flex:0 0 auto;}
.namu-hsub{flex-basis:100%;font-size:12.5px;font-weight:600;color:var(--ink-soft);margin-top:4px;}
.namu-edit{font-size:11.5px;color:var(--ink-soft);font-weight:600;flex:0 0 auto;}
.namu-chev{flex:0 0 auto;display:inline-flex;align-items:center;color:var(--ink-soft);transition:transform .15s;}
.namu-chev svg{width:16px;height:16px;}
.namu-h2.namu-collapsed .namu-chev,.namu-h3.namu-collapsed .namu-chev{transform:rotate(-90deg);}
/* 본문 가독성 — 나무위키 데스크탑 밀도 */
.namu-doc{font-size:13.5px;line-height:1.65;color:var(--ink);letter-spacing:-0.01em;}
.namu-doc .rb-p{font-size:13.5px;line-height:1.68;color:var(--ink);margin:9px 0;max-width:none;}
.namu-doc .rb-p,.namu-doc .rb-list li,.namu-doc .rb-key li,.namu-doc .rb-key-concl,.namu-doc .rb-cc-b,.namu-doc .rb-intro{word-break:normal;overflow-wrap:anywhere;}
.namu-doc .rb-h{font-size:14.5px;font-weight:800;color:var(--ink);margin:17px 0 6px;}
.namu-doc .rb-list{margin:8px 0 13px;padding-left:21px;}
.namu-doc .rb-list li{font-size:13.5px;line-height:1.65;margin-bottom:5px;}
.namu-doc .rb-label{font-size:11px;padding:1px 8px;}
.namu-doc .rb-intro{font-size:14px;line-height:1.78;padding:12px 15px;margin:8px 0 17px;}
.namu-doc .rb-key{margin:16px 0;}
.namu-doc .rb-key-t{font-size:12.5px;}
.namu-doc .rb-key li{font-size:13px;line-height:1.62;margin-bottom:5px;}
.namu-doc .rb-key-concl{font-size:13px;line-height:1.62;}
.namu-doc .rb-cc-h{font-size:12.5px;}
.namu-doc .rb-cc-b{font-size:13px;line-height:1.64;}
.namu-doc .rb-caution,.namu-doc .rb-clinical{margin:16px 0;}
/* 수의학 문서 — 질환관리 등 일반 뷰의 .panel 아래 창과 동일 */
.vet-main{background:transparent;}

  .namu-doc .rb-list{padding-left:19px;}
  .namu-doc .rb-list li{font-size:13.5px;line-height:1.64;}

    window.__cloud = {
      async get(){ const snap = await ref.get(); return snap.exists ? snap.data().json : null; },
      async set(jsonStr, ts){ await ref.set({ json: jsonStr, updatedAt: ts }); },

let STORAGE_MODE = 'local';      // 'claude' | 'cloud' | 'local'
let lastLocalWriteTs = 0;

async function detectStorageMode(){
  if(typeof window.storage !== 'undefined' && window.storage && typeof window.storage.get === 'function'){
    return 'claude';
  }
  const cloudOk = await window.__cloudReady;
  if(cloudOk && window.__cloud) return 'cloud';
  return 'local';
}

async function loadState(){
  if(STORAGE_MODE==='claude'){
    const res = await window.storage.get(STORAGE_KEY);
    return (res && res.value) ? JSON.parse(res.value) : null;
  } else if(STORAGE_MODE==='cloud'){
    const json = await window.__cloud.get();
    return json ? JSON.parse(json) : null;
  } else {
    const v = localStorage.getItem(STORAGE_KEY);
    return v ? JSON.parse(v) : null;
  }
}

      await window.__cloud.set(payload, lastLocalWriteTs);
    } else {
      localStorage.setItem(STORAGE_KEY, payload);
    }
  }catch(e){ console.error('저장 실패', e); toast('저장에 실패했어요. 잠시 후 다시 시도해주세요.'); }
}
function subscribeRemoteIfNeeded(){
  if(STORAGE_MODE!=='cloud' || !window.__cloud) return;
  window.__cloud.subscribe((json, ts)=>{
    if(!json || ts===lastLocalWriteTs) return;     // 내가 방금 쓴 변경은 무시
    try{
      const incoming = JSON.parse(json);
      DATA = incoming;
      sanitizeData();
      DATA.owners.forEach(ensureOwnerMeta);
      if(!DATA.owners.includes(UI.owner)) UI.owner = DATA.owners[0];
      applyTheme();
      render();
      toast('다른 기기에서 변경된 내용을 불러왔어요.');
    }catch(e){ console.error('동기화 데이터 처리 실패', e); }
  });
}

function buildInitial(){
  const d = JSON.parse(JSON.stringify(RAW_INITIAL));
  d.scheduleAnimals = {};
  d.scheduleRange = {};
  d.ownerProfiles = {};
  d.theme = 'light';
  d.owners.forEach(o=>{
    const ids = [...new Set(d.schedule.filter(s=>s.owner===o).map(s=>s.animalId))];
    d.scheduleAnimals[o] = ids;
    const dates = d.schedule.filter(s=>s.owner===o).map(s=>s.date).sort();
    if(dates.length){
      d.scheduleRange[o] = { start: dates[0], end: addDays(dates[dates.length-1], 5) };
    } else {
      d.scheduleRange[o] = { start: todayStr(), end: addDays(todayStr(), 30) };
    }
    d.ownerProfiles[o] = defaultOwnerProfile();
  });
  return d;
}
function defaultOwnerProfile(){
  return { address:'', phone:'', feeds:[], grasses:[], supplements:[] };
}
function ensureOwnerMeta(owner){
  if(!DATA.scheduleAnimals[owner]) DATA.scheduleAnimals[owner] = [];
  if(!DATA.scheduleRange[owner]) DATA.scheduleRange[owner] = { start: todayStr(), end: addDays(todayStr(),30) };
  if(!DATA.ownerProfiles) DATA.ownerProfiles = {};
  if(!DATA.ownerProfiles[owner]) DATA.ownerProfiles[owner] = defaultOwnerProfile();
  if(!DATA.completedCells) DATA.completedCells = {};
  if(!DATA.skippedCells) DATA.skippedCells = {};
  if(!DATA.dismissedCells) DATA.dismissedCells = {};
  if(!DATA.ownerFlags) DATA.ownerFlags = {};
  if(!DATA.ownerFlags[owner]) DATA.ownerFlags[owner] = { favorite:false, archived:false };
}
function ownerFav(o){ return !!((DATA.ownerFlags||{})[o]||{}).favorite; }
function ownerArch(o){ return !!((DATA.ownerFlags||{})[o]||{}).archived; }
function orderedActiveOwners(){
  const active = DATA.owners.filter(o=>!ownerArch(o));
  return [...active.filter(ownerFav), ...active.filter(o=>!ownerFav(o))];
}
function archivedOwners(){ return DATA.owners.filter(ownerArch); }
// completedCells 키: "owner|animalId|date"
function cellKey(owner, aid, date){ return `${owner}|${aid}|${date}`; }
function isCellDone(owner, aid, date){ return !!(DATA.completedCells||{})[cellKey(owner,aid,date)]; }
function isCellSkipped(owner, aid, date){ return !!(DATA.skippedCells||{})[cellKey(owner,aid,date)]; }
function isCellDismissed(owner, aid, date){ return !!(DATA.dismissedCells||{})[cellKey(owner,aid,date)]; }
function dismissCell(owner, aid, date){
  if(!DATA.dismissedCells) DATA.dismissedCells = {};
  DATA.dismissedCells[cellKey(owner,aid,date)] = true;
}
function toggleCellDone(owner, aid, date){
  if(!DATA.completedCells) DATA.completedCells = {};
  const k = cellKey(owner, aid, date);
  if(DATA.completedCells[k]) delete DATA.completedCells[k];
  else { DATA.completedCells[k] = true; if(DATA.skippedCells) delete DATA.skippedCells[k]; }  // 완료 켜면 '안 함' 해제
  saveState();
}
function toggleCellSkip(owner, aid, date){
  if(!DATA.skippedCells) DATA.skippedCells = {};
  const k = cellKey(owner, aid, date);
  if(DATA.skippedCells[k]) delete DATA.skippedCells[k];
  else { DATA.skippedCells[k] = true; if(DATA.completedCells) delete DATA.completedCells[k]; }   // '안 함' 켜면 완료 해제
  saveState();
}
// 토글 시 전체 재렌더 없이 해당 셀의 ✓/✕ 버튼·클래스만 갱신 (표 스크롤 위치 유지)
function refreshSchedToggleBtns(e, owner, aid, date){
  const btn = e && e.target ? e.target.closest('button') : null;
  const cell = btn ? (btn.closest('.sched-cell') || btn.closest('.allsched-item')) : null;
  if(!cell) return;
  const doneOn = isCellDone(owner, aid, date);
  const skipOn = isCellSkipped(owner, aid, date);
  const dB = cell.querySelector('.done-btn');
  const sB = cell.querySelector('.skip-btn');
  if(dB) dB.classList.toggle('is-done', doneOn);
  if(sB) sB.classList.toggle('is-skip', skipOn);
  cell.classList.toggle('done', doneOn);
  cell.classList.toggle('skipped', skipOn);
}

/* ============================================================
   날짜 유틸
============================================================ */
function todayStr(){
  const d = new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function addDays(dateStr, n){
  const [y,m,d] = dateStr.split('-').map(Number);
  const dt = new Date(y, m-1, d);
  dt.setDate(dt.getDate()+n);
  return dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0');
}
function dateOnly(str){ return str ? str.slice(0,10) : ''; }
function timeOnly(str){ return (str && str.length>10) ? str.slice(11,16) : ''; }
function combineDT(dateVal, timeVal){
  if(!dateVal) return null;
  return timeVal ? (dateVal+' '+timeVal) : dateVal;
}
function fmtShort(str){
  if(!str) return '—';
  const date = str.slice(0,10);
  const time = str.length>10 ? str.slice(11,16) : '';
  const [y,m,d] = date.split('-');
  return `${m}/${d}` + (time ? ' '+time : '');
}
function fmtFull(str){ return str || '—'; }
function ageMonths(birth){
  if(!birth) return '—';
  const [y,m,d] = birth.split('-').map(Number);
  const now = new Date();
  let months = (now.getFullYear()-y)*12 + (now.getMonth()+1-m);
  if(now.getDate() < d) months -= 1;
  return months + '개월';
}
/* 품종 그림/배지 + 수정난이도 별 꾸밈 */
function breedIcon(breed){ return breed==='젖소' ? '🐄' : '🐂'; }
function difficultyStars(level){
  if(!level) return '—';
  const n = Math.max(0, Math.min(5, +level));
  return `<span class="diff-stars"><span class="on">${Array(n).fill(`<svg viewBox=\"0 0 24 24\" width=\"13\" height=\"13\" fill=\"currentColor\"><path d=\"M12 3.5l2.6 5.3 5.8.8-4.2 4.1 1 5.8L12 16.8l-5.2 2.7 1-5.8-4.2-4.1 5.8-.8z\"/></svg>`).join('')}</span><span class="off">${Array(5-n).fill(`<svg viewBox=\"0 0 24 24\" width=\"13\" height=\"13\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linejoin=\"round\"><path d=\"M12 3.5l2.6 5.3 5.8.8-4.2 4.1 1 5.8L12 16.8l-5.2 2.7 1-5.8-4.2-4.1 5.8-.8z\"/></svg>`).join('')}</span></span> <span class="diff-num">(${n}/5)</span>`;
}
function weekdayKr(dateStr){
  const [y,m,d] = dateStr.split('-').map(Number);
  return ['일','월','화','수','목','금','토'][new Date(y,m-1,d).getDay()];
}
function isWeekend(dateStr){
  const [y,m,d] = dateStr.split('-').map(Number);
  const wd = new Date(y,m-1,d).getDay();
  return wd===0 || wd===6;
}
function dateRangeArray(start,end){
  const out = [];
  let cur = start;
  let guard = 0;
  while(cur <= end && guard < 400){
    out.push(cur);
    cur = addDays(cur,1);
    guard++;
  }
  return out;
}
function uid(prefix){
  return prefix+'-'+Date.now().toString(36)+Math.random().toString(36).slice(2,7);
}
function esc(str){
  if(str===null || str===undefined) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

    const idHit = a.animalId.replace(/\s/g,'').toLowerCase().includes(qn);
    let g = null;
    if(idHit){ g = ensure(a.owner, a.animalId); g.idHit = true; }
    ['breed','sire','damSire','damDamSire'].forEach(f => {
      if((a[f]||'').toLowerCase().includes(ql)){
        g = g || ensure(a.owner, a.animalId);
        g.hits.push({ label:({breed:'품종',sire:'부',damSire:'외조부',damDamSire:'외외증조부'})[f], text:a[f] });
      }
    });
  });
  // 기록(모든 텍스트 필드)
  DATA.records.forEach(r => {
    const idHit = (r.animalId||'').replace(/\s/g,'').toLowerCase().includes(qn);
    const snips = [];
    for(const k in r){
      if(SKIP.has(k)) continue;
      const v = r[k];
      if(typeof v==='string' && v && v.toLowerCase().includes(ql)){
        snips.push({ label: FIELD_LABELS[k] || k, text: v });
      }
    }
    if(idHit || snips.length){
      const g = ensure(r.owner, r.animalId);
      if(idHit) g.idHit = true;
      snips.forEach(s => g.hits.push(s));
    }
  });
  const list = Object.values(groups);
  if(!list.length){
    return `<div class="panel"><div class="empty-state">'${esc(q)}' 검색 결과가 없어요.<br><span style="font-size:13px;color:var(--ink-soft);">개체번호·비고·소견·질환·호르몬·혈통 등에서 찾아요.</span></div></div>`;
  }
  list.sort((a,b) => (b.owner===UI.owner?1:0)-(a.owner===UI.owner?1:0) || a.owner.localeCompare(b.owner) || a.animalId.localeCompare(b.animalId));
  const rows = list.map(g => {
    // 중복 스니펫 제거
    const seen = new Set();
    const uniq = g.hits.filter(h => { const key=h.label+'|'+h.text; if(seen.has(key)) return false; seen.add(key); return true; });
    const shown = uniq.slice(0,4);
    const more = uniq.length - shown.length;
    const snipHtml = shown.map(h => `<span class="sr-snip"><b>${esc(h.label)}</b> ${gsHighlight(h.text, q)}</span>`).join('');
    return `
      <div class="sr-row">
        <div class="sr-head">
          <span class="tag-chip" data-animal-id="${esc(g.animalId)}" data-owner="${esc(g.owner)}">${esc(g.animalId)}</span>
          <span class="sr-owner">${esc(g.owner)}</span>
          ${g.idHit?'<span class="sr-idtag">개체번호 일치</span>':''}
        </div>
        ${snipHtml?`<div class="sr-snips">${snipHtml}${more>0?`<span class="sr-more">+${more}건</span>`:''}</div>`:''}
      </div>`;
  }).join('');
  return `
    <div class="panel">
      <div class="section-title"><span>검색 결과 — '${esc(q)}' (${list.length}두)</span></div>
      <div class="sr-list">${rows}</div>
    </div>`;
}
