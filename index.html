<div class="rb-clinical"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v6M9 5h6M6 9v4a6 6 0 0 0 12 0V9"/><path d="M6 9H4M18 9h2"/><circle cx="12" cy="19" r="2"/></svg><span class="rb-tag">임상</span><span class="rb-tt">난소 구조물이 보조가 된다</span></div><div class="rb-cc-b">황체(CL)의 유무·위치(좌·우)를 알면 검사가 빨라진다. CL 두 개는 쌍태 가능성, 배아와 반대쪽 CL은 임신 손실 고위험, 작거나 질 나쁜 CL은 낮은 P4(임신 손실 위험)를 시사. 공동성(cavitary) CL은 공동이 너무 크고 황체 가장자리가 너무 작아 전체 부피가 낮은 경우가 아니면 우려할 필요 없다. 질 나쁘거나 반대쪽 CL은 GnRH로 부황체를 만들어 P4를 개선할 수 있다. 단 60일 이전 임신 진단은 태반 형성 완료 후 재검해야 한다(특히 후기 배아·초기 태아 사망 위험 높은 비유 젖소).</div></div>
<div class="rb-sub">배아·태아 태령 추정</div>
<p class="rb-p">초음파는 약 120일까지 태령 추정에서 직장촉진보다 훨씬 우수하다 — 액체량(변동)이 아니라 배아·태아 크기 자체를 재기 때문이다(크기는 기온·품종과 무관하게 일관). 방법 둘: ① 구조물 직접 측정 후 태령 차트 대응, ② 발달 시각 평가.</p>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">측정 부위와 공식</span></div><ul><li>체간 직경: 배꼽 높이 흉곽 최대폭</li><li>뇌두 직경: 눈 바로 뒤 두개골 최대</li><li>머리 길이: 두정~코끝</li><li>두정-둔부 길이(CRL): 미근부~두정</li><li>약 50일까지 공식: 배아·태아 길이(mm) + 18 = 태령(일)</li><li>50일 초과·다른 측정은 태령 차트·소프트웨어 필요</li><li>120일 이후는 부정확(도달·측정 어렵고 개체 변동 시작; 안구·태반분엽·자궁동맥은 변동 너무 커 부적합)</li></ul></div>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">구조물 초음파 출현 시기 (표 40.1, 평균/범위 일)</span></div><ul><li>배아 본체 20.3 (19~24) / 심박동 20.9 (19~24)</li><li>요막 23.2 / 척수 29.1 / 앞다리 싹 29.1</li><li>양막 29.5 / 안와 30.2 / 뒷다리 싹 31.2</li><li>태반분엽 35.2 (33~38)</li><li>갈라진 발굽 44.6 / 태동 44.8 / 늑골 52.8</li></ul><div class="rb-key-concl">현장에선 각 구조물이 범위 &#x27;상단&#x27;에서 가장 쉽게 보임</div></div>
<div class="rb-sub">배아·태아 생존성</div>
<p class="rb-p">비유 젖소는 특히 태반 형성 전 60일 이전에 상당한 임신 손실을 겪는다 — 손실이 임신 후보우의 약 3.6배이고 흔히 최초 진단일부터 90일까지 10~12%다(가설: 고산유 P4 저하·분만 후 질환·특정 정액·쌍태·열 스트레스). 그래서 60일 이전 진단은 재확인이 필요하다.</p>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">생존성 판정 — 한눈에</span></div><ul><li>태아 심박동: 약 24일부터, 초기 최소 130bpm → 60일까지 약 190bpm</li><li>심박동 안 보이나 나머지 정상이면 재검(소·태아 움직임 탓일 수 있음)</li><li>양수·융모요막액: 최소 70일까지 맑고 무에코 — 70일 이전 혼탁+심박동 없음 = 배아·태아 사망</li><li>사망 시 분리된 융모요막이 임신액에 떠 보일 수 있음</li><li>70일 이후엔 정상도 액체 혼탁 가능하나 태동으로 확인</li><li>사망 태아: 골격과 안 맞는 고에코 영역·복강 액체 / 미라: 에코성 뼈 잔해·자궁내액 결여·태동/심박동 결여</li></ul></div>
<div class="rb-clinical"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v6M9 5h6M6 9v4a6 6 0 0 0 12 0V9"/><path d="M6 9H4M18 9h2"/><circle cx="12" cy="19" r="2"/></svg><span class="rb-tag">임상</span><span class="rb-tt">사망 잔존과 곤란 징후</span></div><div class="rb-cc-b">PGF·CL 퇴행이 없으면 사망 배아·태아는 수 주 잔존하고 막슬립·양막낭 같은 주징후가 여전히 촉진된다 — 초음파로 빠르게 식별해 PGF로 치료하면 대부분 48시간 내 완전 배출. 사망 전 곤란: 130bpm 미만 심박수(재평가), 살아있는 태아의 융모요막 경미 분리·비정상 액체(추적), 예상보다 작은 살아있는 태아(보통 교배일 오기), 반대쪽·질 나쁜 CL(재검).</div></div>
<div class="rb-sub">쌍태</div>
<p class="rb-p">젖소(고산유)·일부 육우 계통(유전)에서 쌍태율이 높고, 젖소는 낭종성 난소 이력 소에서 위험이 더 높다. 쌍태는 임신 손실·난산·분만 전후 질환·번식 성적 저하·프리마틴·모축 조기 도태 위험을 높인다. 그래도 유산은 보통 권장 안 됨 — 다른 임신 실패나 또 다른 쌍태 가능성 때문에 모니터·관리가 낫다(임신 손실 검사, 조기 건유, 고에너지 사료, 분만 모니터·조산, 대사 질환 경계). 그래서 어느 소가 쌍태인지 아는 게 중요하다.</p>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">쌍태 진단 — 초음파</span></div><ul><li>직장촉진은 부정확, 세심한 초음파가 대부분 식별</li><li>소 쌍태의 95%+가 이란성 → 난소에서 CL 2개(때로 그 이상) 확인</li><li>CL 두 개 임신우의 약 60%가 쌍태 / CL 셋 이상이면 세쌍둥이 고려</li><li>전체 자궁을 체계적으로 따라가 단일 태아를 두 번 세지 않게</li><li>쌍태선(twin line): 두 융모요막이 합쳐지는 부위 — 태아를 안 둘러싸고 멀어져 양막낭과 구별, 45일 이전엔 안 보이고 제대와 혼동 주의</li><li>쌍태는 단태보다 액체 많고 골반 입구를 더 일찍 넘음</li><li>유일한 주징후는 &#x27;두 태아의 존재&#x27;</li></ul></div>
<div class="rb-clinical"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v6M9 5h6M6 9v4a6 6 0 0 0 12 0V9"/><path d="M6 9H4M18 9h2"/><circle cx="12" cy="19" r="2"/></svg><span class="rb-tag">임상</span><span class="rb-tt">손실과 자연 감소</span></div><div class="rb-cc-b">쌍태(특히 동측)는 임신 내내, 특히 첫 60일에 손실률이 단태의 3.1~6.9배(반대쪽은 임신 중기에 더 잘 일어날 수 있음). 자연 감소는 후기 배아·초기 태아 단계에 흔하고, 연구상 쌍태의 8~24%가 단태로 감소했다 — CL 감소는 흔히 배아 감소 자궁각과 동측 난소에서. 수기 감소는 미미하게만 성공.</div></div>
<div class="rb-sub">태아 성별 판정</div>
<p class="rb-p">생식결절(GT — 수컷은 음경, 암컷은 음핵)의 상대 위치로 임신 55일부터 판정한다. 이 단계에 GT는 수컷에서 제대 바로 뒤, 암컷에서 꼬리 바로 아래 최종 위치에 이른다. 약 80일까지 GT는 고에코 이엽(bilobed) 구조로 보이고, 70일 이후 포피·외음부 피부가 덮기 시작해 80일이면 밝은 이엽 양상이 줄어든다.</p>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">성별 판정 — 한눈에</span></div><ul><li>이상적 시기 60~80일: 태아 도달 쉽고, 구조 위치 잡을 만큼 작고, GT가 피부에 안 가려짐</li><li>90일 이후 자궁이 골반 넘어 도달 어려울 수 있음</li><li>음낭(세 밝은 선)·유두(밝은 점)만으로 진단은 비권장 — GT·음경·외음부를 봐야 함(유두가 음낭과 닮을 수 있음)</li><li>지표: 크고 구불구불한 제대 뒤=수컷 GT 영역, 무에코 반추위·제4위도 그 영역, 흉곽 &#x27;V&#x27;로 두미측 식별</li></ul></div>
<div class="rb-caution"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg><span class="rb-tag">주의</span><span class="rb-tt">흔한 오류</span></div><div class="rb-cc-b">가장 흔한 오류는 생식 구조가 체벽에서 얼마나 &#x27;돌출&#x27;하는지 인식 못 해 생긴다(너무 일찍 멈추지 말 것). 60일이면 제대~수컷 GT, 암컷 GT~미근부 사이 틈이 거의 없어 느리고 작은 움직임이 결정적(빨리 지나치면 놓침). 오인: 다리가 제대를 가림, 횡단면 뼈가 GT 닮음, 제대 경면반사가 수컷 GT로, 꼬리 횡단면이 암컷 GT로 — 의심되면 제대·회음부 양쪽을 다 검사한다.</div></div>
<div class="rb-sub">발정 주기 전반의 정상 자궁·난소</div>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">주기 단계별 초음파 소견</span></div><ul><li>전발정기: 혈류 증가로 자궁이 더 이질적, 배란 3일 전부터 무에코 점액 축적, 큰 난포(16~20mm), CL은 보이나 작아짐</li><li>발정기: 자궁이 가장 이질적, 자궁강에 무에코 점액(경면반사 흔함), 자궁내막이 정상의 약 2.5배(휴지기 6.9mm→발정기 9.4mm), 승가허용 종료 약 12시간 후 배란</li><li>후발정기: 작은 난포(&lt;8mm) 새 파, 1~2일엔 작은 난포만, 2~3일에 무에코 공동 있는 작은 이질적 CL 출현</li><li>발정휴지기: 자궁 균질·중간 회색·액체 거의 없음, CL 균질(약 80%가 어느 단계서 공동 — 맑은 액체나 응고혈), 2~20mm 난포</li><li>임신: 21일 이전엔 휴지기와 비슷, 21~23일 소량 액체, 24일까지 배아 보기 어려움, 자궁내막은 발정기처럼 두꺼워지지 않고 경면반사 적음</li></ul></div>
<div class="rb-sub">난소 병리 — 무배란과 낭종</div>
<p class="rb-p">Wiltbank는 배란 실패를 네 범주로 분류했고 초음파가 판정을 돕는다.</p>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">무배란 4범주</span></div><ul><li>① 출현 단계까지만 자람(정지 난소): 작은 난포만 여럿 있고 어느 것도 4mm를 넘지 못하며 CL도 없다. 초기 후발정기와 비슷해 보이므로 며칠 뒤 2차 검사로 구별해야 한다. 극심한 영양실조나 제부(Zebu) 소가 아니면 드물다.</li><li>② 선택 단계까지는 자라지만 배란 크기에는 못 미침: 분만 후에 전형적으로 나타난다. CL이 없고 난소도 작지만, 난포는 8.5mm 정도까지 자라며 난포파가 동적으로 이어진다.</li><li>③ 배란 크기를 넘어섬(난포낭종): 직경 22mm가 넘는, 벽이 얇은 액체 구조로 보인다.</li><li>④ 황체 조직이 있는 상태에서의 무배란(황체기능 연장): 남아 있는 황체가 정상 간격의 배란을 막는다.</li></ul></div>
<div class="rb-clinical"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v6M9 5h6M6 9v4a6 6 0 0 0 12 0V9"/><path d="M6 9H4M18 9h2"/><circle cx="12" cy="19" r="2"/></svg><span class="rb-tag">임상</span><span class="rb-tt">난포낭종 — 초음파가 촉진보다 우수</span></div><div class="rb-cc-b">난포낭종은 가시적 황체 가장자리 부재로 공동성 CL·황체낭종·황체화 난포낭종과 구별된다. 대부분 양성(같은/반대쪽 난소에서 황체·난포파 정상 발달)이라 여러 주기·임신까지 잔존 가능 — 초음파는 액체 구조 안 황체 조직이나 다른 곳 작은 CL을 잘 봐 양성/병적 감별에 촉진보다 훨씬 우수. 양쪽 난소 철저 검사 필수: 황체 조직 있으면 양성, 없으면 5~14일 후 2차 검사로 CL 발달 판정. 전통적으로 GnRH 치료 → 대부분 배란보다 황체화(7일 후 두꺼운 황체 가장자리), Ovsynch 시작 가능. 초음파 진단은 &#x27;GnRH에 황체 조직으로 반응 안 한 낭종&#x27;에만 P4 보충을 한정하는 데 유용.</div></div>
<p class="rb-p">황체기능 연장(④)은 유중 P4 3ng/ml 초과가 30일(또는 19일) 넘게 지속되는 CL 잔존으로, 확인엔 다회 검사·P4 검사가 필요하다. Ovsynch는 P4 존재 하에 잘 작동하므로 잔존 여부보다 &#x27;CL 존재&#x27; 식별이 더 중요하다. (그 외 난소 병리는 드묾 — 과립막세포종이 가끔: 난소가 매우 크고 고에코 영역은 종양 혈관·치밀 조직의 경면반사.)</p>
<div class="rb-sub">동기화 프로토콜 — CL 평가</div>
<p class="rb-p">Ovsynch 전 PGF로 전동기화(Presynch)하면 정상 주기 동물은 첫 GnRH(G1) 예정 시 CL을 가져야 한다 — 이때 난소 검사로 전동기화 성공을 안다. 많은 소가 CL 없으면 프로토콜 실패(부실 순응도·건강·낮은 BCS·영양 문제).</p>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">G1 CL·난포와 수태율 (Galvão)</span></div><ul><li>CL 있고 G1 배란: 38일 수태율 42.2%</li><li>CL 있고 G1 배란 없음: 37.7%</li><li>CL 없고 G1 배란: 27.6%</li><li>CL 없고 G1 배란 없음: 15.4%</li></ul><div class="rb-key-concl">기능적 CL 존재가 G1 배란보다 중요</div></div>
<div class="rb-clinical"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v6M9 5h6M6 9v4a6 6 0 0 0 12 0V9"/><path d="M6 9H4M18 9h2"/><circle cx="12" cy="19" r="2"/></svg><span class="rb-tag">임상</span><span class="rb-tt">CL 크기 기준</span></div><div class="rb-cc-b">초음파는 매우 초기 후발정기·퇴행 중 전발정기 CL까지 잘 봐 민감하나, 이들은 Ovsynch 최적 P4를 못 낼 수 있다. Bicalho는 2.2cm 기준 시 초음파가 혈중 P4 1ng/ml 초과 CL 식별에 약 90% 민감·특이(촉진은 민감도 33~60%)라 했다. 단 Ovsynch는 일부 CL이 2.2cm 미만일 수 있는 주기 5~10일에 가장 잘 작동 — 저자는 전형적 초기 휴지기 CL로 보이면 최소 1.5cm를 쓰고, 전발정기 퇴행 중으로 보이면 배란 후 5~10일까지 기다려 시작한다.</div></div>
<div class="rb-sub">자궁·자궁경·질 병리</div>
<div class="rb-clinical"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v6M9 5h6M6 9v4a6 6 0 0 0 12 0V9"/><path d="M6 9H4M18 9h2"/><circle cx="12" cy="19" r="2"/></svg><span class="rb-tag">임상</span><span class="rb-tt">자궁염·자궁내막염·자궁축농증</span></div><div class="rb-cc-b">임상·대부분의 잠재성 감염을 초음파로 진단한다 — 현장 기기는 촉진보다 훨씬 적은 2mm 액체를 보고 에코성으로 성질도 평가. 대부분 에코성 화농 물질이 자궁강에(밀도 따라 연회색~밝은 백색), 자궁축농증은 양 많고 중간 에코(그림 40.20), 만성 잠재성은 소량 고에코. 발정 경면반사를 소량 에코성 액체로 혼동 주의. 액체 없을 땐 자궁내막·자궁경 두께 증가로 분만 후 자궁내막염 평가(단 발정기에도 두꺼워져 양 난소·자궁 철저 검사).</div></div>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">기타 자궁·자궁경·질 병리</span></div><ul><li>점액자궁증: 임신 무관 멸균 무/약에코 액체, 자궁내막 안 두꺼워짐, 난소와 무관 — 배아 부재 확인 필수(후보우는 처녀막·난관부 선천 폐쇄와 연관)</li><li>림프육종: 국소·전체 자궁벽의 매우 단단한 비후(림프절 조직처럼 보임)</li><li>농양: 화농 물질 주위 피막으로 염증과 구별 — 자궁 농양은 임성 예후 나쁨, 자궁경 농양은 강 확장 여부 따라, 질 농양은 교배·분만 방해 안 하면 보통 무problem</li><li>질염: 질강 에코성 물질·점막 비후(보호 시스 쓰면 예후 보통~양호)</li><li>질 요저류(UP): 소변은 화농보다 덜 에코성이나 섞임, 방광염 동반 가능</li><li>기질증(공기질증): 가스가 반향 아티팩트로</li></ul></div>
<div class="rb-sub">수정란이식(ET)과 난자 채취(OPU)</div>
<div class="rb-clinical"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v6M9 5h6M6 9v4a6 6 0 0 0 12 0V9"/><path d="M6 9H4M18 9h2"/><circle cx="12" cy="19" r="2"/></svg><span class="rb-tag">임상</span><span class="rb-tt">공여우·수란우 평가</span></div><div class="rb-cc-b">공여우는 과배란 전 자궁 건강·난소 기능 평가 — 난포 동원기 검사로 반응 예측(파 시작 시 많은 난포 동원 소가 FSH 후 더 많이 생성). 채란일 CL 수 세기는 초음파가 촉진보다 훨씬 유용(작은·공동성·깊이 박힌 CL도 봄) — 얇은 벽 공동성 CL이 미배란 난포와 구별 어려워도 채란한다(예상보다 많은 배아 회수 가능). 수란우는 동기화 전 자궁·난소 평가(경산우가 후보우보다 중요) — CL 식별이 결정적이고 초음파가 촉진보다 정확(수란우 CL의 거의 100% vs 촉진 80%)해 더 많은 동물을 쓴다.</div></div>
<p class="rb-p">수란우 임신 검사는 편한 단계에 — 동결 배아는 하루 작게, IVF 배아는 하루 크게 보일 수 있다. ET 쌍태는 드물지만 손실 위험 높다(배아 분할·2배아 이식·ET 전 발정 시 수정). 이상적 검사 시기는 이식 후 21일(배아 28일)이고, 높은 가치 때문에 60일 이후 재검을 항상 한다(성별·기형 평가도). OPU(IVF용 난자 채취)는 경질 변환기에 부착한 유도 바늘로 한다(보통 곡선형, 특수 도입기로 선형 직장 변환기도 가능).</p>
<div class="rb-sub">배아·태아 기형</div>
<p class="rb-p">기형은 드물지만 중요하다 — 모니터링·유산·분만 대비가 바람직할 수 있다. 대부분 약 50~90일(성체 축소판을 닮을 만큼 발달했으나 검사에 너무 크진 않은)에 가장 잘 보인다.</p>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">주요 기형 — 초음파 소견</span></div><ul><li>무배아 낭종: 양막낭 밖 35일 배아 — 심박동 있어도 거의 생존 못 함(재검 시 빈 양막낭·내용물 결여)</li><li>내반체(Schistosomus reflexus): 체강 밖 액체 충만 태아 위, 척주가 심히 굽어 &#x27;V&#x27;</li><li>태아 복수: 복강 내 액체(정상은 장기가 액체 없이 강을 채움) — 액체 고인 사망 태아와 감별</li><li>태아 전신부종(anasarca): 피부 아래 액체(복수의 복강 내 액체와 구별)</li><li>제대탈장: 큰 제대에 복부 구조, 복강 내 태아 위 부재</li><li>무심장 쌍태(무정형구상체): 순환계로 유지되는 조직 덩어리, 성별 없어 프리마틴 우려 없음, 분만 문제 드묾</li><li>결합 쌍태: 머리 둘 등 — 매우 드물고 가까이 누운 정상 쌍태와 구별</li></ul></div>
<div class="rb-sub">아티팩트</div>
<p class="rb-p">흔한 아티팩트를 정상·병리로 오진하지 않으려면 인식이 중요하다(올바로 식별하면 평가에 도움도 된다).</p>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">주요 아티팩트</span></div><ul><li>반사·굴절 음영: 액체가 빔을 반사·굴절해 그 아래 영상이 안 보임(액체 구조 측면 가장자리)</li><li>빔폭: 한 빔이 같은 깊이 두 조직을 지나 측벽이 더 에코성으로 — 난포 가장자리가 황체로 오인될 수 있음</li><li>반향(reverberation): 두 강한 경계면(직장벽/변환기 ↔ 가스/뼈) 사이 반복 반향, 등간격으로 작아지는 평행선(기질증)</li><li>경면반사: 밀도 다른 두 면이 수평·수직 정렬 시 가는 밝은 수평선(액체-치밀 조직 경계)</li><li>거울상: 반향의 일종, 골반골 아래 거짓 &#x27;쌍태&#x27; — 하나를 둘로 오인 주의</li><li>차단 음영: 뼈의 &#x27;감옥 창살&#x27;, 분변도 어두운 저화질</li><li>증강: 액체 아래가 실제보다 밝게(게인 조정으로 감소)</li><li>크리스털 결함: 변환기 면에서 수직으로 뻗는 검은 선(깨진 크리스털·끊긴 배선, 항상 같은 위치)</li></ul></div>
<div class="rb-clinical"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v6M9 5h6M6 9v4a6 6 0 0 0 12 0V9"/><path d="M6 9H4M18 9h2"/><circle cx="12" cy="19" r="2"/></svg><span class="rb-tag">임상</span><span class="rb-tt">미래</span></div><div class="rb-cc-b">3D 초음파(태아 기형·태령), 컬러 도플러(현재 소에서 태아 생존성 평가 가능, 향후 난소·자궁 혈류로 주기 단계·배란 예측)가 적용되고 있다. 수컷 생식기·타 장기계도 초음파로 평가할 수 있다.</div></div></div>
  `;
}
function reproBreedHtml(){
  return `
<div class="modal-sub" style="margin-bottom:6px;">${svgIcon('pin',16)} 수정 — 발정 발견·인공수정·동기화</div>
<div class="grass-section-title"><span class="gst-wrap"><span class="gst-main">${svgIcon('search',15)} 6. 발정 관찰과 발정 발견</span><span class="gst-sub">관찰 시간·횟수가 발견율을 가른다 · ST와 징후 · AM-PM 규칙 · 발견 효율 지표 · 보조도구(패치·시정우·전자 AAMS)</span></span></div>
<div class="rb-block"><div class="rb-sub">발정 관찰은 &quot;따로 시간을 내야&quot; 보인다</div>
<p class="rb-p">발정은 암컷이 수컷을 성적으로 허용하는 상태이며, 그에 따른 행동·외견 변화가 발정 징후다. 번식 관리의 시작이자 가장 흔한 실패 지점이 발정 발견이다 — 못 찾으면 수정 자체를 못 하기 때문이다.</p>
<p class="rb-p">핵심은 작업 중 곁눈질 관찰만으로는 많이 놓친다는 것이다. 발정 관찰만을 위한 시간을 따로 내야 발견율이 오른다. 정해진 시간에 같은 페이스로 봐야 &quot;평소와 다름&quot;이 눈에 들어온다.</p>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">관찰 시간·횟수별 발견율</span></div><ul><li>1회 60분 × 아침·저녁 2회 → 94%</li><li>1회 30분 × 하루 3회 → 65%</li><li>1회 10분 × 하루 3회 → 45%</li><li>착유 작업 틈틈이 30분씩만 → 30~41%로 급락</li></ul></div>
<p class="rb-p">발정은 밤중~이른 아침에 발현하기 쉽다. 아침 착유 전, 저녁 착유 후, 밤 시간대가 좋다. 여름엔 발정이 저녁~밤으로 치우치므로 시원한 시간대·심야 관찰이 유리하다. 프리스톨·프리번에서는 파서 이동 시와 우사 복귀 후에 징후가 잘 나타난다.</p>
<div class="rb-sub">진짜 발정 = 스탠딩(ST)</div>
<p class="rb-p">다른 소가 올라타도(마운팅, MT) 가만히 서서 받아주는 상태가 스탠딩(ST)이며, 이것이 &quot;진짜 발정&quot;이다. ST를 보이는 소는 네 다리를 바깥쪽으로 버티고 약간 허리를 굽힌 배만 자세를 취한다. 올라탄 소(MT)도 발정 가능성이 높다. 바닥이 미끄러운 콘크리트면 ST·MT가 줄고, 흙바닥·방목지면 늘어난다 — 흙 운동장에 한 시간이라도 내보내면 발견율이 오른다.</p>
<div class="rb-caution"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg><span class="rb-tag">주의</span><span class="rb-tt">안전</span></div><div class="rb-cc-b">프리스톨에서 사람이 등을 돌렸을 때 발정우가 반사적으로 등에 올라탈 수 있다. 큰 사고로 이어지니 주위를 살피며 관찰한다.</div></div>
<div class="rb-sub">ST 이외의 발정 징후 — 이걸 봐야 발견율이 오른다</div>
<p class="rb-p">ST만 타겟으로 하면 많은 발정을 놓친다. ST만 보면 발견율이 12~30%지만, 그 외 징후까지 포함하면 관찰 횟수가 더 적어도 74~90%까지 오른다. 실제로 ST를 아예 안 보이는 소가 상당수(약 63%)다. 발정 징후는 &quot;수컷이 알아차리게 하려는&quot; 행동이라, 평소와 다른 눈에 띄는 행동이라고 생각하면 외우기 쉽다.</p>
<ul class="rb-list"><li><b class="rb-label">외음부 종창·충혈</b> 발정기엔 통통하게 붓고 주름이 펴지며 점막 충혈이 강해진다. 비발정기엔 주름이 많고 조여 있다.</li><li><b class="rb-label">점액 배출</b> 투명하고 잘 늘어나 바닥까지 끊기지 않는 점액이면 좋은 발정 → 즉시 수정 경향. 단단하고 약간 백색이며 10~20cm에서 툭 끊기면 시작·종료기 → 반나절 늦춰도 됨. 단단한 점액은 황체기에도 나올 수 있으니 직장검사로 황체 퇴행·난포를 확인한다.</li><li><b class="rb-label">냄새 맡기·턱 괴기</b> 다른 소 외음부 냄새를 맡거나 엉덩이·허리에 턱을 올림. 하는 소·당하는 소 모두 확인.</li><li><b class="rb-label">플레멘</b> 냄새 맡은 뒤 윗입술을 위로 말아 올림.</li><li><b class="rb-label">그룹 형성</b> 발정우들이 모여 서로 냄새 맡고 뭉쳐 다님 — 매우 눈에 띔.</li><li><b class="rb-label">활동량 증가</b> 휴식 시간에 혼자 서 있거나, 자주 울고, 콧김이 거칠고, 추울 때 등에서 김이 남. 계류식에서도 머리를 자주 흔드는 등으로 관찰.</li><li><b class="rb-label">눈물·충혈</b> 눈을 부릅뜨고 촉촉·충혈.</li><li><b class="rb-label">좌골결절 찰과상</b> 승가 당한 흔적. 생생하면 반나절 이내, 마른 딱지면 1일 이상 경과.</li><li><b class="rb-label">발정 후 출혈</b> 발정 종료 2일 전후 배출. 이미 배란이 끝난 경우가 많아 &quot;발정을 놓쳤다&quot;는 신호다(난소 배란점이 아니라 자궁 혈류 증가로 고인 피). 2~3일 전 발정으로 기록하고 다음 회귀일을 노린다.</li></ul>
<div class="rb-clinical"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v6M9 5h6M6 9v4a6 6 0 0 0 12 0V9"/><path d="M6 9H4M18 9h2"/><circle cx="12" cy="19" r="2"/></svg><span class="rb-tag">임상</span><span class="rb-tt">핵심 자세</span></div><div class="rb-cc-b">&quot;평소와 다르다&quot; 싶으면 적극적으로 발정 여부를 확인한다. 발정 강약·징후·컨디션까지 기록해 두면 이번에 수정할지 다음으로 미룰지 판단이 정확해진다.</div></div>
<div class="rb-sub">발정 발견 — 서론 — 왜 발정 발견인가</div>
<p class="rb-p">미국 젖소 생산자의 약 90%가 무리 교배에 인공수정(AI)을 쓴다. 낮은 발정 발견 효율은 젖소 농장 부진한 번식 성적의 주요 원인이고 상당한 경제 손실을 낳는다. 부실한 발견은 발정우를 못 찾거나(비효율), 배란 대비 잘못된 시점에 수정하거나, 발정이 아닌 소를 수정하는(부정확) 결과를 부른다. 발견 능력은 사람의 실수·보조도구 오용·날씨·스트레스·바닥·산유량·내분비 상태 등 많은 요인의 영향을 받는다.</p>
<p class="rb-p">호르몬 동기화(오브싱크·코싱크 등 TAI)는 발견 노력을 줄여 주지만, 발정 발견 기반 AI는 여전히 대부분 젖소 농장 교배 관리에 필수다. 많은 농가가 후보우는 발정 발견으로 수정하고, 미국 육우 농장은 대부분 자연교배라 동기화·발견·AI를 쓰는 비율이 7% 미만이다. AI·수정란이식(ET)에 의존하는 번식우 농장에선 발정 발견 + TAI 조합이 교배 프로그램의 초석이고, 적절한 발견이 70일 교배철 임신율이나 ET 수정란 수·질을 좌우한다.</p>
<div class="rb-sub">발정 발견 — 발정의 생리</div>
<p class="rb-p">발정(heat)은 암소가 수소를 받아들이는 발정 주기 단계로 12~18시간 지속되며, 호르몬이 뇌 행동 중추에 작용해 일어난다. 배란 전 난포가 자라 고농도 에스트라디올을 분비하고, 이것이 역치에 이르러 시상하부·전엽 뇌하수체에 양성 되먹임을 유도해 LH 농도 증가와 일차 징후(승가 허용·서기)를 낳는다. 발정 행동은 낮은 P4·높은 E2, 그리고 발정 시작 24~32시간 후 배란을 일으키는 GnRH·LH 배란 전 급증과 일치한다.</p>
<p class="rb-p">이 내분비 변화는 이차 징후도 만든다 — 맑은 질 분비물, 외음부 부종, 질 충혈, 자궁 긴장도 증가. 자궁경 점액이 더 풍부·맑고 덜 점성이 되어 정자 수송을 돕는다. 발정 중 자궁내막 백혈구(특히 호중구)가 늘어 세균·죽은 정자·세포 잔해를 식작용으로 청소한다.</p>
<div class="rb-clinical"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v6M9 5h6M6 9v4a6 6 0 0 0 12 0V9"/><path d="M6 9H4M18 9h2"/><circle cx="12" cy="19" r="2"/></svg><span class="rb-tag">임상</span><span class="rb-tt">무징후 배란 vs 무배란 발정</span></div><div class="rb-cc-b">일부는 뚜렷한 징후 없이 무징후(무발정) 배란을 하는데, 젖소 분만 후 초기에 흔하다. 반대로 덜 흔한 무배란 발정은 발정 징후는 보이나 LH가 낮거나 LH 급증이 없거나 난포의 LH 반응성이 낮을 때 생긴다. 한 현장 연구에서 발정으로 발견된 비유 젖소의 배란 실패율은 6.5%였다.</div></div>
<div class="rb-sub">발정 발견 — 소의 발정 징후</div>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">일차 징후 — 승가 허용(부동 기립)</span></div><ul><li>가장 뚜렷한 발정 행동 = 승가를 받기 위해 도망 안 치고 가만히 서는 것</li><li>승가 허용 횟수 변동 큼(3~140회), 평균 35회·각 3~7초</li><li>일부 암소는 승가 허용 징후를 안 보여 교배 관리의 난제</li></ul></div>
<p class="rb-p">이차 징후(발정 전후 가능): 안절부절·신경질·신체 활동 증가, 꼬리 들기, 외음부·꼬리·뒷다리에 길고 맑은 점액, 붉고 이완·부종된 외음부와 질 충혈, 거칠어진 미근부(승가당한 흔적)·등/옆구리 진흙. 다른 소를 따라다니고 더 자주 울며, 옆에 서고 외음부 냄새 맡기·플레멘 반응·머리 얹기. 승가·승가당하되 안 서고, 핥기·비비기·박치기 같은 혼란스러운 행동도.</p>
<div class="rb-caution"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg><span class="rb-tag">주의</span><span class="rb-tt">질 분비물로 읽기</span></div><div class="rb-cc-b">발정 중 풍부한 맑은 분비물은 정상. 혈성 분비물도 정상이나 발정이 1~3일 전 끝났음을(후발정기·이미 배란) 가리켜 수정엔 보통 너무 늦다 → 19일 후 다음 발정을 면밀히 관찰. 혼탁·우유빛·화농성이면 질·자궁경·자궁 감염 가능 → 수태율 저하.</div></div>
<p class="rb-p">동시에 여러 소가 성적 행동을 보이면(특히 동기화 시) 누가 발정인지 가리기 어렵다 — 성적 활성 군(SAG)에서 승가하는 소가 반드시 발정인 건 아니고 곧 들어올 수 있다(E2 상승 또는 사회적 우위에서 비롯). 한 관찰 연구(홀스타인 200두)에서 승가 허용 기립 지속은 4.7±1.5시간, 첫~마지막 발정 행동 간 지속은 14.0±1.9시간이었고, 가장 흔한 행동은 외음부 냄새 맡기·턱 얹기였다. 발정 중 뚜렷한 이유 없이 사료 섭취·산유가 줄 수 있다(육우는 우는 송아지로 산유 감소를 알아채기도).</p>
<div class="rb-sub">발정 발견 — 발정 발현·발견에 영향을 주는 요인</div>
<p class="rb-p">발정 강도·발견 가능성은 품종·분만 후 기간·산차·산유량·건강·영양·날씨·스트레스·호르몬 치료·수소 존재·바닥·무리 크기 등의 영향을 받는다.</p>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">요인별 정리 — 한눈에</span></div><ul><li>품종: Bos taurus(8~18h)가 Bos indicus(6~12h)보다 뚜렷, 어두운 색 품종이 더 큼</li><li>분만 후: 초기 배란은 흔히 발정이 약/없음(분만기 고E2의 불응 효과). 비유우 약 20%(7~41%)가 60일 VWP 종료 시 무발정·무배란</li><li>산유량: 고생산우는 E2 낮고 발정 짧음(E2·P4 대사율↑) — 단 무관하다는 보고도</li><li>영양·BCS: 부족·부실 BCS는 발정에 부정적; 고급 사료의 산유 증가가 오히려 발정 강도를 낮추기도</li><li>산차: 일차 징후(승가 허용)는 산차↑로 길고 강해짐(경산우가 더 정확) / 초산우는 보행·승가 활동이 더 큼</li><li>건강: 파행·유방염은 발정 발현을 줄임(신체 활동↓ 또는 낮은 P4·LH)</li><li>날씨: 열·폭우·고습은 발정 억제; 시원한 밤·이른 아침(저녁 7시~아침 7시)에 승가·기립↑</li><li>바닥: 흙바닥&gt;콘크리트/미끄럼; 고무매트가 개선; 계류식&lt;자유우방; 축사우가 방목우보다 승가 많음</li><li>수소 존재: 페로몬으로 분만 후 주기 재개 촉진·첫 발정 단축(단 발정 지속·강도엔 영향 없다는 보고도)</li><li>개체 밀도: 동시 발정 多 → 강도·발견↑, 단 과밀은 비발정우 오기립 → 오진</li></ul></div>
<div class="rb-sub">발정 발견 — 시각 관찰</div>
<p class="rb-p">시각 관찰은 가장 흔한 발견법이다. 관찰자 경험·빈도·길이·시간대가 효율을 크게 좌우한다. 아침 1시간·저녁 1시간 무리를 관찰하되, 소가 수용·급이·방목 구역을 오가며 사회적 상호작용을 하는 정상 활동 중에 본다. 일차 징후(승가 허용)를 식별하면서 이차 징후(맑은 분비물·외음부 부종·활동 증가)도 놓치지 않고, 일부는 짧은 발정을, 일부는 아무 징후도 안 보임을 인지한다.</p>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">시각 관찰 효율</span></div><ul><li>승가 허용 발견 효율은 무리마다 50% 미만~약 90%로 편차 큼</li><li>이른 아침+늦은 저녁 각 1시간 하루 2회 → 94% 보고</li><li>하루 3회 각 30분 → 90% 개선</li><li>미끄러운 콘크리트·고인 물 바닥은 항상 피함(불안정하면 승가 꺼림)</li><li>발견 담당자에 재정 인센티브(임신 암소당) → 효율에 즉각적 효과</li></ul></div>
<div class="rb-sub">발정 발견 — 발정 발견 기반 AI — AM-PM 규칙</div>
<p class="rb-p">발견 기반 AI는 오전–오후 규칙(AM–PM rule)이 중심이다: 아침에 발정이면 저녁에, 저녁에 발정이면 다음 날 아침에 수정. 소는 발정 시작 24~32시간 후 배란하므로, 발견 약 8~12시간 후 AI하면 정자가 수정능 획득에 충분한 시간을 얻는다. 밤새 발정을 보이는 소가 많아 특히 더운 달(7·8월)엔 저녁 늦게·아침 일찍 관찰·수정을 권한다.</p>
<p class="rb-p">발견·발정 시작을 정확히 잡는 농장은 AM–PM으로, 임신율이 낮고 발견이 부실한 농장은 승가 허용으로 발견 직후 수정을 권한다. 발정 중기~승가 완료 후 몇 시간까지가 최적 임신율 구간이다.</p>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">AI 시점이 임신율·배아·성별을 좌우</span></div><ul><li>발견 8~18시간 후 AI 임신율 66.2% → 30시간 초과 후 45.4%로 감소</li><li>조기 AI: 수정률↓·배아질 적절 / 발정 후 24h AI: 수정률↑·배아질↓ / 약 12시간(6~16h) 중간(AM-PM): 균형</li><li>늦은 AI(배란 10h 전)는 수컷, 이른 AI(배란 20h 전)는 암컷 자손을 선호하는 경향</li><li>주의: 임신 진단된 소가 승가 허용을 보이면 각별히 — 임신우 AI는 배아 사망·유산 위험</li></ul></div>
<div class="rb-sub">발정 발견 — 발정 발견 효율 지표</div>
<p class="rb-p">수정 위험(insemination risk)은 번식 성적을 크게 좌우하고, 수정되는 소 수는 발견 능력에 달렸다. 효율 평가의 전제는 발정·AI(날짜·시점)·임신 진단·분만일의 신뢰할 기록이다. 발견 문제가 심한 농장은 임신 위험이 낮고 재수정이 많으며 분만~첫 수정·수태 간격이 길다.</p>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">목표치 — 한눈에</span></div><ul><li>VWP(분만 후 60일)까지 소의 80~85%가 발정 발견 → 무발정 비율 15~20% 미만</li><li>적절한 농장: 분만–첫 수정 71~76일, 주기우 대부분(&gt;70%)이 발정 간 간격(IEI) 18~24일</li><li>정상 IEI(18~24일) : 연장 IEI(36~48일) 비율 = 4:1</li><li>부정확 농장: 너무 짧은(&lt;17일)/긴(30일) IEI가 &gt;15%, AI일 대표우(n=20) 유중 P4 측정 시 5% 초과가 &gt;1ng/ml(수정 시 발정 아님)</li><li>비효율 농장: 첫 수정 전 일상적으로 놓쳐 분만–첫 수정 90일, IEI가 기대 21일의 2~3배(36~44·54~66일)</li></ul></div>
<div class="rb-sub">발정 발견 — 보조도구 ① 패치·표지·시정우</div>
<p class="rb-p">보조도구는 시각 관찰을 대체하지 않고 보완한다 — 행동을 지속 모니터링해 효율을 높인다.</p>
<ul class="rb-list"><li><b class="rb-label">둔부 알림 패치</b> 미근부에 붙여 승가 허용을 식별. 압력 감지(Kamar — 승가 압력으로 색소가 터져 빨갛게)나 자가접착 긁힘형(Estrotect — 승가당하면 밝은 신호층 노출).</li><li><b class="rb-label">미근부 표지</b> 분필·왁스·크레용·페인트로 미근부 표시 → 지워지거나 번지면 승가당함. 패치보다 저렴.</li><li><b class="rb-label">턱 볼 마커</b> 표지 동물 턱 아래 잉크 저장통(볼 베어링) — 승가 시 암소 등·둔부에 표시(약 25두분). 보통 시정 수소·테스토스테론 처리 암소와 병용.</li></ul>
<p class="rb-p">시정(teaser) 동물: 승가 허용 발정우를 식별·승가하나 자연 교배는 못 하게 외과 변형한 수소(또는 안드로겐 처리 암소)다. 육우에선 그 존재가 분만 후 주기 재개를 자극해 분만–첫 발정 간격을 줄이는 이점도 있다. 단점 — 특정 암소만 선호해 다른 발정우를 놓치거나, 교배 못 함을 알고 성욕을 잃기도. AI 전 분리하므로 온순한 개체를 고른다.</p>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">시정 수소 외과 기법</span></div><ul><li>정관절제술: 정관 일부 제거 — 고환·음경 정상, 정자 수송만 차단. 삽입은 가능 → 교미전파 질병 통제 못 함</li><li>부고환 미부 절제술: 정자가 정관·사정에 못 이름. 역시 삽입 가능 → 질병 전파 단점</li><li>음경 편위: 음경·포피를 옆구리로 전위 → 발기는 되나 질 삽입 불가(등인대 5cm 절제로 복측 편위시키는 대안도)</li><li>음경절제술: 음경 2/3 제거·끝을 외부화 → 성욕 보통 감소, 교미전파 감염 예방엔 도움. 윤리·복지 우려 고려</li><li>안드로겐 처리: 도태 미임신우·프리마틴·거세우에 테스토스테론(200mg 근육 격일 3주)/임플란트 — 비용 낮고 질병 전파 없으며 교배철 후 도축 판매 가능. 파행 없고 체격 크고 우위여야 적극 승가</li></ul></div>
<div class="rb-sub">발정 발견 — 보조도구 ② 전자 발정 발견 — AAMS</div>
<p class="rb-p">무리 확대·집약화로 노동력이 부족해지며 전자 기술이 발전했다 — 3축 가속도계+무선원격측정으로 행동을 지속 모니터링한다. 자동 활동 모니터링 시스템(AAMS)은 신체 활동 증가(발정 시 겨울 400%·여름 175%)를 태그(목걸이·귀표)로 기록해, 최근 7일 같은 시간대 평균 대비 활동 지수를 알고리즘으로 계산한다.</p>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">AAMS 성능·한계</span></div><ul><li>자유우방 3개 농장: 약 70%가 활동 증가로 식별; 시스템이 발정 기록한 소의 95%가 배란, 못 찾은 소의 35%도 배란</li><li>SMARTBOW(귀표 3D 가속도계, 실내 경산우): 민감도·특이도·양성/음성예측도·정확도·오류율 97·98·96·94·96·2%</li><li>시각 관찰만 한 경우 배란우의 56%만 기립 관찰 — 기기는 시각보다 15~35% 더 많이 발견</li><li>활동 증가 지속 16.1±4.7시간(승가 허용 13.4시간과 유사), 이차 징후는 승가 허용 약 2시간 전부터 증가</li><li>AI→배란 평균 간격 7.9시간(수정능 획득에 충분)</li><li>한계: 무리 약 20% 무발정–무배란은 활동으로 못 찾아 Ovsynch로 회부 → 낮은 P/TAI; 밀집 수용은 완전한 발정 발현에 부적절</li><li>수정 시점: 초산우는 알림 후 0~8시간, 경산우는 24시간까지 AI해도 임신 위험 차이 없음</li></ul></div>
<p class="rb-p">AAMS+TAI 결합이 현재 과제이자 유망 도구다 — AAMS 기반 AI가 TAI에 준하는 성적을 낼 수 있다는 보고가 있다. 도입은 이점에 대한 주저, 기술 미숙, 과도한 정보, 높은 초기 투자, 기술 지원 가용성에 영향받는다.</p>
<div class="rb-sub">발정 발견 — 보조도구 ③ 보수계·HeatWatch·기타</div>
<ul class="rb-list"><li><b class="rb-label">보수계(만보계)</b> 발정우는 시간당 걸음이 황체기보다 2~4배 많음 — 다리 부착 기기가 걸음을 세 기준치 초과 시 발정으로 신호. 효율 49~90%(자유우방에 유리, 계류식·과도 이동 농장엔 제한).</li><li><b class="rb-label">HeatWatch</b> 미근부 압력 감지 송신기 — 승가당하면 식별·날짜·시간·승가 지속을 컴퓨터로 보고. 시각 관찰이 비효율일 때 유용하나 투자비 높고 차양·나무·언덕에서 신호 방해.</li></ul>
<p class="rb-p">연구 단계 방법들: 체온·우유 온도(발정일 0.3~0.4℃↑이나 변동·교란 큼), 적외선 열화상(0.2℃ 차·민감도 80%지만 위양/위음성 높아 비권장), 질 점액 전기저항(전발정·발정기에 감소; 무선 질 센서로 17건 중 16건 발견), 전자 코(회음부 페로몬·호흡 시료로 발정/비발정 구별, 민감도·특이도 0.83·0.86). 대부분 아직 정확·신뢰 가능한 통상법으로는 미정착.</p>
<div class="rb-sub">발정 발견 — 요약</div>
<p class="rb-p">발정 발현·발견은 다요인적 형질이다. 효율은 관찰자 경험·빈도·길이와 보조도구에 달렸고, 보조도구 선택은 무리 관리·비용·노동·효능·유용성에 달렸다. 핵심은 발정우를 발견해 &#x27;행동 발정·배란 대비 적절한 시점&#x27;에 수정하는 것이다. 시각 관찰 + 보조도구(특히 전자 기술) 통합이 발견 효율을 높인다. 어떤 방법을 쓰든 발견 절차를 자주 모니터링(인력 재교육)하고, 체계적 자료 수집(발정·AI·분만일)을 유지하며, 전산에 일관되게 옮겨 &#x27;유용한&#x27; 번식 성적 보고를 얻는 것이 중요하다.</p></div>
<div class="grass-section-title"><span class="gst-wrap"><span class="gst-main">${svgIcon('pin',15)} 7. 인공수정 (AI)</span><span class="gst-sub">수정 적기·위생 시술·수정 가부 + 실무(정액통·융해·냉각충격·수정 술기·시점)</span></span></div>
<div class="rb-block"><div class="rb-sub">수정 적기 — 30시간을 거꾸로 읽는다</div>
<p class="rb-p">인공수정을 정성껏 하는 것은 수태율과 농장 번식 성적에 직접 영향을 준다. 적기의 바탕은 2장의 생리다 — 발정 시작 24~30시간 후 배란하므로, 배란 즈음에 수정능을 획득한 정자가 난관에 대기하도록 타이밍을 맞춘다.</p>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">타이밍 기준</span></div><ul><li>ST(스탠딩) 개시 후 4~12시간이 적기 (16시간 이내면 양호)</li><li>전통적 AM-PM법: 발정 발견 12시간 후 — 단 발견이 발정 중후반이면 늦음</li><li>현대 고능력우는 발정이 짧아 발정 발견 후 6시간 이내가 실용적</li><li>하루 1회만 관찰한다면 발견 즉시 가능한 한 빨리 수정</li></ul></div>
<div class="rb-sub">시술 순서 — 위생이 전부다</div>
<p class="rb-p">정자는 한랭·알코올·오염에 약하다. 시술의 절반은 위생과 온도 관리다.</p>
<ul class="rb-list"><li><b class="rb-label">도구·정액 융해</b> 주입기·핀셋·스트로 커터는 매번 알코올 솜으로 닦고 건조(알코올 남으면 정자 사멸). 동결정액은 회사별 권장 온도 준수(예 35~37°C 45초, 38°C 15초). 캐니스터는 서리 라인에서 멈추고 15초 이내에 꺼내며, 한 번에 한 개씩 융해.</li><li><b class="rb-label">소 준비</b> 보정·꼬리 묶기. 외음부와 주변·꼬리 뒷면을 온수로 씻고 알코올 솜으로 닦는다.</li><li><b class="rb-label">주입기 데우기</b> 융해된 정액이 20°C 밑으로 떨어지면 한랭 감작(cold shock)으로 정자가 상한다. 장전부를 종이타월 마찰열로 데워둔다.</li><li><b class="rb-label">주입</b> 외음부 벌려 위 45도로 질에 삽입 → 10cm에서 아래 45도로 끝까지. 직장에 손을 넣어 자궁경관 앞 1/3을 잡고, 경관을 주입기 쪽으로 회전시키며 끌어당겨 주입기를 내자궁구 너머 자궁체부로 유도. 정액은 자궁체부에 주입한다(체부가 매우 짧으니 위치에 주의). 뺀 뒤 정액 배출·피·고름 여부를 확인.</li></ul>
<div class="rb-sub">수정 전 직장검사 — 수정 가/부 판단</div>
<p class="rb-p">수정 전에 난소·자궁을 촉진해 정말 발정인지 확인한다. &quot;난포 있음 = 발정&quot;이 아니다 — 황체기에도 15mm 난포는 흔하기 때문이다. 제1난포파 우성 난포가 저P4 시기에 15~20mm까지 크게 자라고 폐쇄된 뒤에도 한동안 크기를 유지해, 황체기에 제2난포파 우성 난포와 함께 난포 두 개로 만져지기도 한다. 그래서 난포뿐 아니라 황체가 퇴행했는지를 반드시 본다.</p>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">수정 OK 조건 (둘 다 충족)</span></div><ul><li>한쪽에 15mm 이상 난포 존재</li><li>황체가 20mm 미만 (= 퇴행 중)</li></ul></div>
<div class="rb-caution"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg><span class="rb-tag">주의</span><span class="rb-tt">수정 금지</span></div><div class="rb-cc-b">20mm 이상의 기능성 황체가 만져지면 발정이 아니다 → 수정 금지. 특히 직전 7~10일 전에 발정/수정 이력이 있으면 제1난포파 우성 난포의 E2로 &quot;발정 같은&quot; 징후가 나온 것일 수 있고, 임신 중일 수도 있다(임신 중 수정 시 약 50% 유산). 자궁 내부를 확인한다.</div></div>
<p class="rb-p">발정 확인 흐름: ① 외음부 종창·충혈 ② 점액 유무 ③ 자궁 수축(배란 직전엔 약할 수 있음) ④ 15mm 이상 난포 ⑤ 20mm 미만 황체 ⑥ 생식기를 조작해 점액이 추가로 나오지 않는지.</p>
<div class="rb-sub">인공수정 실무 — 서론·정액통 관리</div>
<p class="rb-p">인공수정(AI)은 가장 오래된 보조생식기술로, 본래 위생적 이유로 개척됐지만 동결정액 공급과 함께 임성 개선·유전 진보 가속의 경제적 이점이 분명해졌다. 정액 채취·가공·전달 어느 한 부분의 결함도 임성을 떨어뜨리므로 진정한 &#x27;팀 접근&#x27;이 필요하다. AI 센터가 양질 정액을 유통해도, 판매 후 임성은 정액을 올바르게 다루고 융해하며 적기에 정확히 수정하는 사람의 능력에 달려 있다.</p>
<p class="rb-p">정액 취급의 일차 목표는 정자를 해로운 조건에 최소 노출해 수정 능력을 보존하는 것이다. 동결보존·저장·융해 중 정자 손상은 냉각충격, 얼음 결정 형성, 산화 스트레스, 막 변성, 동결보호제 독성, 삼투 변화에서 비롯된다.</p>
<div class="rb-clinical"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v6M9 5h6M6 9v4a6 6 0 0 0 12 0V9"/><path d="M6 9H4M18 9h2"/><circle cx="12" cy="19" r="2"/></svg><span class="rb-tag">임상</span><span class="rb-tt">정액통(탱크) 관리</span></div><div class="rb-cc-b">동결정액은 액체질소 통(견고한 외피 + 내부 칸, 사이는 극진공 단열)에 보관한다. 통은 밀폐형이 아니라 온도 변동에 따라 기체를 방출한다(밀폐되면 폭발 위험). 진공이 주 단열 요소라 목관(neck tube)에 과한 힘·흔들림이 가해지면 갈라져 진공이 손실되고, 외피 천공·외부 용접도 진공을 깬다. 통 상단 심한 서리 축적은 급속 증발·고장 신호다. −196℃에서 무기한 보관 가능하나 액체질소 최소 5cm 깊이를 유지하고 정기적으로 모니터·보충한다.</div></div>
<div class="rb-caution"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg><span class="rb-tag">주의</span><span class="rb-tt">정액통 취급 수칙</span></div><div class="rb-cc-b">직사광선 피해 서늘·청결·건조·환기 좋은 곳에 두고, 나무 팔레트 위에 올려 콘크리트 바닥에 직접 두지 않는다(부식 방지). 통끼리 쌓지 않고, 눕혀 굴리지 않으며, 증발을 자주 관찰할 수 있는 곳에 둔다. 차량 운반 시 손상·유출 막게 고정한다.</div></div>
<div class="rb-sub">인공수정 실무 — 동결정액 저장·열 손상</div>
<p class="rb-p">대부분 정액은 0.25·0.5ml 스트로에 담긴다(성판별 정액은 일관되게 0.25ml). 같은 수소 스트로 5개를 고블릿에, 고블릿 2개를 케인에 담아 캐니스터에 저장한다. 낮은 온도 유지가 저장 성공의 핵심이다 — 물이 얼면서 정자는 농축된 염·희석제 용액에 노출되고, 얼음과 농축액의 불안정성이 정자에 해롭다. 동결보호제와 최적 동결 프로그램이 손상을 최소화하지만, 정액은 얼음 재결정화가 시작되는 임계 온도(−100~−80℃)보다 충분히 낮게 유지해야 한다.</p>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">통 목 부위 온도 (표 36.1)</span></div><ul><li>목 상단: 2.2 ~ 12.2℃</li><li>상단에서 2.54cm: −15 ~ −22.2℃</li><li>5.08cm: −40 ~ −46℃</li><li>7.62cm: −75 ~ −82℃</li><li>10.16cm: −100 ~ −120℃ (임계 온도대)</li><li>12.7cm: −140 ~ −160℃</li><li>15.24cm: −180 ~ −192℃</li></ul></div>
<div class="rb-caution"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg><span class="rb-tag">주의</span><span class="rb-tt">열 손상은 영구적</span></div><div class="rb-cc-b">스트로를 통 상단에서 5cm 위로 올리면, 실온(22℃)·냉장(5℃) 어디서든 임계 재결정화 온도(−100~−80℃)에 단 10~20초면 도달한다. 정자 열 손상은 영구적이라 액체질소로 되돌려도 교정되지 않는다. 따라서 케인·캐니스터는 서리선(frost line) 아래에서 5~8초만 유지하고, 필요하면 통 안으로 다시 내려 냉각한 뒤 올린다.</div></div>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">열 손상 최소화 요령</span></div><ul><li>정액 재고 시스템을 통 근처 벽에 부착, 한 수소 정액을 한 랙에 모으고 캐니스터·고블릿에 수소 번호 표시 → 불필요한 검색·고온 노출 차단</li><li>통 간 이동은 두 사람이 통을 나란히 놓고, 가능하면 이동 전 질소를 채운다</li><li>융해 시 캐니스터를 목 하부까지 올려 고블릿을 잡고 더 내려, 다른 스트로를 열 손상에서 보호(꺼내기 어려우면 고블릿 탭을 45°로 구부림)</li><li>핀셋으로 스트로를 꺼내는 즉시 랙·캐니스터를 통 본체로 빠르게 내림</li></ul></div>
<p class="rb-p">스트로당 정자 수는 가변적이다 — 높은 희석(0.25ml당 200만)과 낮은 희석(1500만)은 융해 직후 운동성·막/염색질 완전성·임신율에 차이가 없었으나, 일부 수소는 임성 유지에 더 많은 정자가 필요하다. 수정용량당 정자 수가 매우 적은 성판별 정액은 임성이 거의 필연적으로 감소한다.</p>
<div class="rb-sub">인공수정 실무 — 융해와 냉각충격</div>
<p class="rb-p">융해법은 수조·셔츠 주머니·공기·체내 등 여러 가지가 권장돼 왔으나, 한 농장에선 모두 같은 방법을 쓰는 게 좋다. NAAB(전미동물육종협회) 권고는 30~35℃ 수조에 최소 30초(40초 권장) 담그는 것이고, 융해 정액은 15분 이내에 수정하며 융해 후 급격한 온도 저하를 피한다.</p>
<div class="rb-clinical"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v6M9 5h6M6 9v4a6 6 0 0 0 12 0V9"/><path d="M6 9H4M18 9h2"/><circle cx="12" cy="19" r="2"/></svg><span class="rb-tag">임상</span><span class="rb-tt">주머니 융해 vs 수조</span></div><div class="rb-cc-b">셔츠 주머니 융해는 초기 30℃였다가 1분 뒤 약 19℃로 떨어져 정자에 악영향을 줄 수 있고, 주변 온도·의복 두께에 따라 매우 가변적이며 수조보다 훨씬 느리다. 빠른 융해가 융해 후 생존성은 높지만, 최근 연구는 시험관 질이 개선돼도 생체 내 임성은 주머니 융해와 차이가 없다고도 본다. 여러 스트로 동시 융해도 가능한데(숙련 수정사는 20분 내 최대 4두 교배), 침지 직후 스트로를 흔들어 엉김을 막아야 한다.</div></div>
<p class="rb-p">융해 후 물과 정액이 섞이면 비가역적 손상이 오므로, 수조에서 꺼낸 스트로는 자르기 전 종이타월로 건조한다(천공 등 결함 스트로는 폐기). 그리고 냉각충격(cold shock) 예방이 결정적이다 — 융해 후 차가운 환경에서 급격히 온도가 떨어지면 정자 형질막이 비가역적으로 변해 운동성·수정 능력을 잃는다(데워도 회복 안 됨). 정자로 나트륨이 유입되고 칼륨·마그네슘이 유출된다.</p>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">냉각충격 — 주변 온도의 영향 (표 36.3)</span></div><ul><li>35℃ 융해 후 주입기 준비(약 1분) 중 온도 저하</li><li>21℃: 저하 3~6℃뿐 — 봉을 데우면 효과적으로 대응</li><li>16℃: 약 20℃ 저하 — 데워도 지연만 됨</li><li>4℃: 약 15℃ 저하 — 데워도 지연만 됨</li><li>스트로는 표면 대 부피 비가 커 냉각충격에 취약 → 서늘한 환경에선 예방 조치 필수</li></ul></div>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">추운 날씨 냉각충격 예방</span></div><ul><li>교배 동물 가까이의 차폐·가온 공간에서 융해·주입기 장전</li><li>장전 후 주입기를 의복 안이나 보온기에 끼워 단열한 채 보정틀로 이동</li><li>차폐·가온 공간에서 주입기 준비·교배 수행</li><li>주입기 보온기(장전 주입기를 35℃ 유지하는 휴대 운반함) 활용</li></ul></div>
<div class="rb-sub">인공수정 실무 — 수정 술기</div>
<p class="rb-p">소 AI 수정법은 자궁체·양측 자궁각·심부 자궁각·난포내 수정이 있으나, 가장 흔한 것은 직장질법(rectovaginal)으로 자궁경 내구(internal os) 바로 앞쪽 자궁체에 주입하는 것이다. 자궁경 통과 기술만이 목표가 되어선 안 되고, 위생·정확한 주입 부위 식별·생식 해부 이해가 함께 가야 한다.</p>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">직장질법 수정 순서</span></div><ul><li>장전 주입기를 위생 플라스틱 커버에 넣어 질 오염 차단</li><li>암소를 스트레스 최소로 보정(코르티솔 상승이 LH 급증을 억제)</li><li>촉진 팔로 직장에서 자궁경을 찾아 단단히 잡음</li><li>외음부를 종이타월로 닦고, 주입기를 외음부에 30~40° 각도로 넣어(요도구 진입 방지) 자궁경 외구까지 통과 — 요도구·질 주름·질 천장(fornix) 피함</li><li>봉이 자궁경 안에 있으면 끝이 만져지지 않음 — 자궁경을 조작하며 약 3개의 어긋난 윤상주름을 일정 압력으로 통과(끝이 주름에 걸리지 않게)</li><li>주입기 끝을 내구에서 약 1cm 앞 자궁체에 위치(직장 내 집게손가락 끝으로 확인)</li><li>자궁경을 소 장축과 평행하게 잡고 약 5초에 걸쳐 천천히 주입(정액량 최대화·한쪽 자궁각 편중 최소화)</li><li>주입 중 봉을 자궁경 뒤로 빼지 않음; 소가 움직이거나 봉이 미끄러지면 재배치</li></ul></div>
<p class="rb-p">표준은 자궁체 주입이지만, 양측 자궁각 수정은 임성에 변화가 없거나 개선하기도 했다. 동측 자궁각에 저용량(200만)과 자궁체 정상 용량(1500만)의 임신율은 비슷했으나, 자궁체·양측 자궁각에 저용량을 쓰면 임성이 감소했다. 자궁난관접합부 부근 주입(Ghent 기기)도 정자 용량·주입 부위가 임신율에 영향을 주지 않았고, 난포내 수정(배란 전 난포에 0.06ml 직접)은 저임성 암소의 대안으로 제안됐으나 추가 연구가 필요하다. 수정 시 PGF2α 투여는 후보우에선 임성을 개선했으나 경산우에선 아니었고, 수정 후 음핵 마사지(5초)는 임신율을 개선하지 않았다.</p>
<div class="rb-sub">인공수정 실무 — 수정 시점</div>
<p class="rb-p">승가허용 발정이 가장 신뢰할 지표이고, 발정 암소는 하루 중 언제든 활동을 보여 하루 여러 번 관찰이 중요하다. 시점의 제약은 짧다 — 배란은 젖소에서 발정 시작 약 28~32시간 후, 난자 최적 임성은 배란 6~12시간 후, 생식기 내 정자 수명은 24~30시간이다. 그래서 성공 수정의 기회 창이 매우 짧다.</p>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">수정 시점 — 한눈에</span></div><ul><li>전통 &#x27;오전–오후&#x27; 규칙: 오전 발정 → 오후, 오후 발정 → 다음 날 아침</li><li>단 대규모 현장에선 오전–오후 규칙으로 최대 수태율이 안 나올 수 있음(발견 빈도 감소가 영향)</li><li>젖소 최고 AI 수태율: 발정 시작 4~12시간 후</li><li>통에서 스트로를 꺼내 AI까지는 15분을 넘기지 않음</li></ul></div>
<div class="rb-clinical"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v6M9 5h6M6 9v4a6 6 0 0 0 12 0V9"/><path d="M6 9H4M18 9h2"/><circle cx="12" cy="19" r="2"/></svg><span class="rb-tag">임상</span><span class="rb-tt">요약</span></div><div class="rb-cc-b">수정은 기술적(집중·세심함·해부 이해·주입 부위와 봉 위치 식별)·관리적(정액 저장·통 관리) 역량을 모두 요한다. 면밀한 노력이면 농장 수정사도 성공할 수 있으나, 성공은 위험·함정에 대한 지식에도 달려 있다. 수태당 수정 횟수·수태율 같은 지표를 주기적으로 평가하고, 정기적으로 재교육받아 기법과 신지견을 갱신한다.</div></div></div>
<div class="grass-section-title"><span class="gst-wrap"><span class="gst-main">${svgIcon('calendar',15)} 10. 발정·배란 동기화</span><span class="gst-sub">제제 5종 + PGF/CIDR/Select-Synch + 오브싱크·변법 + E2+P4 + 동기화 심화(난포동태·기전·프로토콜·STAI)</span></span></div>
<div class="rb-block"><div class="rb-sub">대표 호르몬 제제 5종</div>
<p class="rb-p">동기화는 번식 진료에서 가장 판단이 요구되는 처치다. 제제의 특징만이 아니라 처치 시점 소의 호르몬 상태와 처치 후 변화까지 이해해야 효과를 낸다. 모든 프로토콜은 결국 2장의 3대 타임라인(GnRH 30h, PGF 3~5일, P4 제거 2~4일)의 조합이다.</p>
<ul class="rb-list"><li><b class="rb-label">GnRH</b> 우성 난포(11mm 이상)를 배란시켜 새 난포파를 만든다. 투여 후 26~30시간에 배란, 36시간 지나도 배란 없으면 무효. 난포가 없으면 효과 없다.</li><li><b class="rb-label">hCG</b> LH 작용. 수정 후 5일째 투여 → 제1난포파 우성 난포(13mm 이상)를 배란시켜 부황체 형성 → 혈중 P4 상승(황체 기능 보강).</li><li><b class="rb-label">PGF2α</b> 황체 퇴행 유도 → 발정. 자궁축농증·내막염 치료도. 단 황체기 6일 이전엔 잘 안 듣고(어린 황체 저항성, 3장), 중증 자궁 질환 땐 황체가 안 죽을 수 있다.</li><li><b class="rb-label">E2</b> 발정 유도·자궁경관 확장·자궁 수축. 주로 P4와 병용. 배란 유발로 쓰면 투여 약 16~24h 후 LH 서지, 약 42~52h 후 배란.</li><li><b class="rb-label">P4(질내 유치형, CIDR)</b> 혈중 P4를 높여 발정·배란 억제(황체 효과 모방). 동기화 프로그램의 핵심 부품.</li></ul>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">동기화를 푸는 두 레버 (1장으로 연결)</span></div><ul><li>모든 동기화는 결국 1장의 두 손잡이를 인위로 돌리는 것이다.</li><li>P4 두 박자 — P4를 한동안 깔았다가(시상하부 프라이밍) → 뺀다(탈억제). CIDR·P4 장치를 넣었다 빼는 것이 이 두 박자의 재현이다.</li><li>E2 되먹임 — E2는 P4 배경에 따라 얼굴을 바꾼다. 고P4=음성(브레이크: 난포 폐쇄·억제), 저P4+프라이밍=양성(액셀: LH 서지).</li></ul><div class="rb-key-concl">GnRH는 이 되먹임 회로를 건너뛰고 뇌하수체를 직접 때려 서지를 만드는 지름길이다. 각 프로토콜은 이 레버를 어떻게 돌리느냐의 차이일 뿐이다.</div></div>
<div class="rb-sub">발정 동기화 — PGF2α 단독</div>
<p class="rb-p">황체 보유우에 PGF2α를 투여해 황체를 퇴행시키고 P4를 낮춰 우성 난포 발육·발정을 유도한다. 발정 발현이 투여 후 2~6일로 폭이 넓은데, 그 이유는 투여 시점의 우성 난포 크기에 달려 있다.</p>
<ul class="rb-list"><li><b class="rb-label">우성 난포 10mm 전후(주기 전반)</b> P4 저하 후 난포가 발육·성숙해야 해 발정까지 3~4일.</li><li><b class="rb-label">우성 난포 15mm 초과</b> 이미 커 성숙이 빠르고 E2도 많아 발정까지 2일.</li><li><b class="rb-label">우성 난포 폐쇄 타이밍</b> 새 우성 난포가 선발·성숙해야 해 발정까지 5일 이후.</li><li><b class="rb-label">제2난포파 이후 10mm 전후(주기 후반)</b> 발정까지 3~4일.</li></ul>
<div class="rb-clinical"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v6M9 5h6M6 9v4a6 6 0 0 0 12 0V9"/><path d="M6 9H4M18 9h2"/><circle cx="12" cy="19" r="2"/></svg><span class="rb-tag">임상</span><span class="rb-tt">현장 데이터·금기</span></div><div class="rb-cc-b">홀스타인(n=622) 무작위 투여 시 발정은 3일째 49.8%, 4일째 14.1%로 3~4일에 몰렸다 → 투여 3~4일째 집중 관찰. 단 황체기 6일 이전(이전 발정 6일 이내, 발정 후 출혈 4일 이내) 투여는 권장하지 않는다.</div></div>
<p class="rb-p">PGF가 황체를 녹여 P4를 빼는 것이 곧 두 박자의 둘째 박자(탈억제)다. 주기 소는 이미 황체기 동안 P4를 겪어 시상하부가 프라이밍돼 있으므로, P4만 빠지면 우성 난포의 E2가 양성 되먹임으로 돌아서 LH 서지·배란이 일어난다.</p>
<div class="rb-sub">CIDR(질내 P4 제제) 단독</div>
<p class="rb-p">질내 P4 제제(CIDR 등)는 질 점막으로 P4가 흡수돼 혈중 P4를 높게 유지한다. 넣어두는 동안은 이 P4가 LH 펄스를 눌러 발정·배란을 억제하고, 제제를 빼면 P4가 뚝 떨어지면서 억눌렸던 소들이 한꺼번에 발정에 들어온다 — 이게 발정 집중화다. 보통 7~14일간 넣어 둔다.</p>
<p class="rb-p">삽입 기간이 왜 중요한가. 홀스타인 미경산우에서 7일·14일·21일 삽입을 비교한 시험이 있다. 오래 넣어둘수록 발정이 더 좁게 모이는데(21일 삽입은 제거 2일째에 96%가 발정), 이유는 오래 넣어두는 동안 자기 황체가 자연히 퇴행해버린 소가 늘기 때문이다 — 즉 뺄 때 이미 황체가 없어 곧바로 발정이 오는 소가 많아진다. 그래서 14·21일 단독은 추가 호르몬 없이도 발정이 잘 모인다.</p>
<p class="rb-p">그런데 발정이 잘 모이는 것과 수태율이 높은 것은 다르다. 막상 수태율을 보면 14·21일 단독이 7일 삽입 + PGF2α 병용(7d+PGF2α)보다 떨어진다. P4 제제를 오래 넣어두는 동안 난포파를 통제하지 못해, 우성 난포가 너무 오래 발육·노화(aging)한 상태로 수정을 맞게 되기 때문이다. 늙은 난포 속 난자는 수태력이 낮다.</p>
<p class="rb-p">그래서 7일 삽입 + PGF2α 병용을 쓴다. 7일은 짧아서 뺄 때 아직 황체를 가진 소가 많다. 이 황체가 P4를 계속 내면 제제만 빼도 발정이 오지 않으므로, 제거와 동시에 PGF2α를 반드시 같이 놓아 황체를 녹여준다. 난포를 노화시키지 않고 적정 시점에 수정할 수 있어 수태율이 더 낫다.</p>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">CIDR 단독 — 한눈에</span></div><ul><li>발정이 잘 모이는 것(집중화)과 수태율이 높은 것은 다르다 — 오래 넣어두면 발정은 모이지만 난포가 노화해 수태율은 떨어진다.</li><li>P4 제제 단독은 난포파를 통제하지 못해 제거 후 발정의 수태율이 불안정하다 → 최근엔 GnRH·PGF를 엮은 배란 동기화·정시 AI와 병용한다.</li></ul></div>
<p class="rb-p">CIDR를 넣는 동안은 외부 P4가 첫 박자를 맡는다(시상하부를 프라이밍하면서, 고P4로 E2를 음성 쪽에 묶어 발정을 억제). 빼면 둘째 박자(탈억제)가 되어 E2가 양성으로 돌아서며 발정이 몰린다. 자기 황체가 없는 소에서도 P4 장치가 두 박자를 대신 만들어 주는 셈이다.</p>
<div class="rb-sub">Select-Synch</div>
<p class="rb-p">Select-Synch는 난포 나이를 맞추는 방법이다. 앞의 PGF2α 단독·CIDR 단독은 유기된 발정이 개체마다 들쭉날쭉하고, 수정 대상 난포의 일령이 높아지면 난자가 노화해 수태율이 떨어진다는 약점이 있다. 실제로 난포 일령이 5~10일이면 수태율이 서서히 떨어지고, 11일을 넘으면 급락한다. 그래서 난포파 자체를 인위로 리셋해 적정 나이의 난포에 수정하자는 것이 Select-Synch다.</p>
<p class="rb-p">황체가 있는 소에서 시작한다. GnRH(0일)를 놓으면 LH 서지가 일어나 우성 난포가 배란되고(투여 약 30시간 후), 그 자리에서 새 난포파가 출발한다 — 난포 나이가 0으로 리셋되는 셈이다. 7일째가 되면 새 우성 난포가 5.5일령으로 자라는데, 이때 PGF2α로 황체를 녹여 발정·배란이 적정 일령 난포에서 일어나게 한다. 이후 7~10일에 발정을 관찰해 AI한다.</p>
<p class="rb-p">0일 GnRH는 시상하부를 건너뛰고 뇌하수체를 직접 때려 LH 서지를 만든다. 자연 주기에선 E2가 양성 되먹임으로 만들던 그 서지를, 여기선 GnRH가 대신 일으켜 우성 난포를 배란시키고 난포파를 0으로 리셋하는 것이다. 7일 PGF는 P4를 빼는 둘째 박자에 해당한다.</p>
<div class="rb-sub">오브싱크(Ovsynch)와 시작 시기</div>
<p class="rb-p">Select-Synch에 마지막 GnRH를 더해 배란까지 동기화하므로 발정 관찰 없이 정시 AI가 가능하다. 골격은 GnRH(0일) → PGF2α(7일) → GnRH(9일) → 정시 AI(2차 GnRH 약 16시간 후). 첫 GnRH가 우성 난포를 배란시켜 난포파를 리셋하고, 7일 기다려 새 우성 난포를 키운 뒤, PGF로 황체를 녹이고, 2차 GnRH로 배란을 유도해 시간을 맞춰 수정한다.</p>
<div class="rb-caution"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg><span class="rb-tag">주의</span><span class="rb-tt">시작 시기가 성패를 가른다</span></div><div class="rb-cc-b">주기 5일 이전 시작: 우성 난포가 작아 1차 GnRH로 배란이 안 됨 → 실패. 주기 14일 이후 시작: PGF 투여 전 황체가 이미 퇴행해 AI 전에 배란 → 실패. 결론: 주기 5~14일 사이에 시작. 14일 이후 시작해야 하면 1차 GnRH와 함께 P4 제제를 넣어 조기 배란을 막는다.</div></div>
<p class="rb-p">오브싱크는 배란을 GnRH로 두 번 직접 일으킨다. 1차 GnRH는 현재 우성 난포를 배란시켜 난포파를 0으로 리셋하고(반응할 우성 난포가 있어야 하므로 주기 5일 이전엔 실패), 7일 PGF로 P4를 빼고(둘째 박자), 2차 GnRH가 새로 자란 성숙 난포를 정시에 배란시킨다. 자연 주기라면 E2의 양성 되먹임이 만들 LH 서지를, 두 번 다 GnRH가 뇌하수체를 직접 때려 대신 일으키는 것이다. 주기 14일 이후 시작이 위험한 건, PGF 전에 황체가 스스로 녹아 P4가 먼저 빠지면 자기 E2가 양성 되먹임으로 미리 서지를 터뜨려 AI 전에 배란해버리기 때문이다 — 이때 P4 제제를 넣어 그 조기 탈억제를 막는다.</p>
<div class="rb-sub">오브싱크 변법 — 히트싱크·시더싱크·eCG</div>
<p class="rb-p">오브싱크(GnRH 0일 → PGF2α 7일 → GnRH 9일 → 정시 AI)를 소 상태나 현장 사정에 맞게 변형한 것들이다.</p>
<div class="rb-h">히트싱크 (Heatsynch) — 마지막 GnRH를 E2로 바꾼 변법</div>
<p class="rb-p">오브싱크의 마지막 배란 유발제(2차 GnRH)를 E2로 바꾼다. 배란 유기 효과는 GnRH와 비슷한데, E2를 쓰면 AI 시점에 발정 징후가 나타나 시술자가 발정을 눈으로 보고 수정할 수 있어 안심된다는 게 이점이다. 관건은 E2 타이밍 — E2 투여 후 약 16~24시간에 LH 서지 피크가 오고, 배란은 E2 투여 약 42~52시간 후다.</p>
<ul class="rb-list"><li>GnRH (0일)</li><li>PGF2α (7일)</li><li>E2 (8일, PGF 24시간 후)</li><li>정시 AI (9~9.5일, E2 후 24~36시간)</li></ul>
<p class="rb-p">마지막 E2는 1장의 양성 되먹임을 직접 당기는 것이다. 7일 PGF로 이미 P4가 낮아져 있어(프라이밍은 주기 소라 충족) 외부 고E2가 &quot;저P4+프라이밍&quot; 조건에 맞아 시상하부를 통해 LH 서지를 일으킨다. GnRH(뇌하수체 직격)보다 배란이 느린(42~52h) 것은 E2가 시상하부 양성 되먹임 회로를 한 바퀴 돌아 작동하기 때문이다.</p>
<div class="rb-h">시더싱크 (CIDR-Synch) — 오브싱크 + CIDR</div>
<p class="rb-p">오브싱크는 황체 보유우라야 높은 수태율이 나온다. 그래서 시작 시 황체가 불명확하거나, 주기 후반(14일 이후)에 시작해 처치 중 황체가 퇴행해버릴 우려가 있으면, CIDR(P4 제제)를 함께 넣어 P4를 인위로 받쳐준다. 골격은 오브싱크와 같고 거기에 CIDR가 더해진 것이라, 황체가 불안한 소에서도 쓸 수 있게 해준다.</p>
<div class="rb-h">eCG 프로토콜 — 무발정·생식력 저하 소에</div>
<p class="rb-p">난소가 잘 안 도는 소(무발정기·생식력 저하)에 쓴다. P4 장치로 P4를 높게 깔아(고P4 = FSH·LH 억제·난포 성장 억제) 발정·배란을 일단 누르고 동기화한 뒤, 장치를 빼 P4가 빠진 자리에 eCG를 놓아 난포 발육·배란을 강하게 밀어준다(저P4+E2 = LH 자극·배란).</p>
<ul class="rb-list"><li>P4 장치 삽입 (0일)</li><li>PGF2α (6일, 황체 퇴행)</li><li>장치 제거 + eCG 400~600IU(구 PMSG), 쌍태 방지 위해 용량 조절 (7일)</li><li>정시 AI (8~10일) — 가장 흔한 건 56시간 1회 AI; 발정 확인 후 AI나 48·72시간 2회 AI도 가능</li></ul>
<p class="rb-p">주의: 대사 상태가 나쁘거나 분만 직후인 소에 쓰면 실패하기 쉽다.</p>
<p class="rb-p">대상이 무발정·생식력 저하 소인 게 핵심이다. 이런 소는 ① P4를 겪은 적 없어 프라이밍이 빠져 있고(3장 낭종, 사양·육성의 사춘기 전과 같은 상태) ② 자기 LH 드라이브도 약하다. 프로토콜이 이 둘을 메운다 — P4 장치(0일)가 빠진 프라이밍을 깔아 주고(첫 박자), 장치 제거(둘째 박자) 자리에 eCG(FSH·LH 활성)를 부어 약한 엔진을 보충해 난포 발육·배란을 강하게 민다.</p>
<div class="rb-clinical"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v6M9 5h6M6 9v4a6 6 0 0 0 12 0V9"/><path d="M6 9H4M18 9h2"/><circle cx="12" cy="19" r="2"/></svg><span class="rb-tag">임상</span><span class="rb-tt">대원칙</span></div><div class="rb-cc-b">호르몬 처치는 효과적이지만, 소의 난소·자궁·과거~현재 상태를 이해한 뒤 한다. 오브싱크·시더싱크 모두 &quot;황체 보유&quot;가 수태율의 전제임을 잊지 않는다.</div></div>
<div class="rb-sub">E2+P4 프로그램</div>
<p class="rb-p">오브싱크가 GnRH로 우성 난포를 배란시켜 난포파를 리셋하는 것과 달리, E2+P4는 E2+P4로 뇌하수체의 FSH·LH 방출을 억눌러 우성 난포를 폐쇄시킨 뒤 새 난포파를 띄운다. 가장 큰 이점은 황체·난포 상태에 덜 의존해 발정주기와 관계없이 아무 때나 시작할 수 있다는 것이다(시작 시기에 민감한 오브싱크와 대조된다).</p>
<p class="rb-p">작동 흐름은 이렇다. 0일에 E2와 P4 제제를 함께 넣으면 고E2+고P4가 만들어져 FSH·LH 방출이 억제되고, 자라던 난포(우성 난포 포함)가 폐쇄된다. 이후 E2가 서서히 분해돼 고P4만 남고 우성 난포도 사라지면 FSH가 회복되며 새 난포파가 출발한다(평균 4일째). 9일에 PGF2α와 P4 제거로 황체를 녹이고, 10일에 E2로 배란을 유도해(E2 후 16~24시간 LH 서지, 42~52시간 후 배란) 11~11.5일에 정시 AI한다.</p>
<ul class="rb-list"><li>E2 2.0mg + P4 제제 삽입 (0일) → 고E2+고P4 → 난포 폐쇄</li><li>새 난포파 출현 (평균 4일) → E2 분해, 고P4만 남아 FSH 회복</li><li>PGF2α + P4 제거 (9일) → 황체 퇴행 (난포 약 5일령)</li><li>E2 (10일) → 배란 유도 (난포 약 6일령)</li><li>정시 AI (11~11.5일) → 난포 약 7~7.5일령</li></ul>
<p class="rb-p">같은 E2를 앞에선 음성, 뒤에선 양성으로 시간차로 쓰는 프로그램이다. 0일 E2는 P4를 함께 넣어 고P4 배경이라 1장 ③조건대로 양성이 차단되고 음성으로 작동해 FSH·LH를 눌러 우성 난포를 폐쇄시킨다(리셋). 그동안 깔린 P4가 시상하부를 프라이밍하고, 9일 P4 제거로 P4가 빠진 뒤 10일 E2는 &quot;저P4+프라이밍&quot; 조건이라 이번엔 양성 되먹임으로 LH 서지를 일으킨다. P4 장치 하나가 폐쇄(음성 배경)와 프라이밍을 동시에 맡으니, 난포·황체 상태와 무관하게 아무 때나 시작할 수 있다.</p>
<div class="rb-caution"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg><span class="rb-tag">주의</span><span class="rb-tt">수태율이 떨어지는 패턴</span></div><div class="rb-cc-b">소 상태(육우/젖소·산유량)에 따라 E2 분해 속도가 달라 새 난포파 발현이 3~5일로 폭이 생기고, AI 때 난포 크기 편차가 커진다. ① 20mm 가까운 큰 난포 + 퇴행 황체/무황체: 우성 난포가 폐쇄되지 않아 노화한 난자를 배란 → 수태율↓. ② 15mm 미만 작은 난포(특히 한우·흑모와종): 발육 개시가 늦거나 PGF까지 일수가 짧으면(흑모와종 8일 이내) AI 시점에 난포가 덜 커 있음.</div></div>
<div class="rb-sub">동기화 심화 — 서론·난포 동태</div>
<p class="rb-p">AI 무리에서 분만 간 간격을 정하는 두 인자는 발정 발견(공시율)과 분만율이다. 효과적인 동기화 프로토콜의 요건은 &#x27;지정 간격 동안 예측 가능하고 높은 발정·배란 반응&#x27;과 &#x27;정해진 시점의 단일 수정에 대한 높은 임신율&#x27;이다. 발정 주기를 잘 통제하려면 ① 새 난포파 출현을 동기화하고 ② 황체기를 보장하며 ③ 황체기를 종료시키고 ④ 배란을 동기화해야 한다.</p>
<p class="rb-p">난포 성장은 파동(wave) 양상으로, 각 파는 출현→선택/폐쇄→우성→배란 또는 폐쇄를 거치며 7~10일(2파 18일 주기 vs 3파 24일 주기) 수명을 갖는다. 새 파 출현은 일시적(1~2일) FSH 증가가 받치고, FSH 정점은 파 출현 직전이다. 가장 큰 난포가 약 8.0mm에 이를 때 &#x27;편차(deviation)&#x27;가 시작돼(소에서 약 8시간 차) 단일 우성 난포와 종속 난포로 갈린다. 우성 선택 무렵 FSH 의존에서 LH 의존으로 전환되며, 우성 난포는 과립막에 LH 수용체를 발현한다.</p>
<div class="rb-clinical"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v6M9 5h6M6 9v4a6 6 0 0 0 12 0V9"/><path d="M6 9H4M18 9h2"/><circle cx="12" cy="19" r="2"/></svg><span class="rb-tag">임상</span><span class="rb-tt">우성 지속이 임성을 좌우</span></div><div class="rb-cc-b">외인성 황체용해/프로게스타겐 중단에서 발정까지 간격은 그 시점의 난포파 단계에 달렸다 — 선택된 우성 난포가 있으면 2~3일 내, 선택 전이면 3~7일 후 발정한다. 발정 동기성은 우성 지속이 4일 미만 또는 10~12일 초과일 때 최적이고, 특히 배란 난포의 우성 지속이 10일을 넘으면 조기 활성화된 &#x27;노화 난자&#x27; 때문에 임신율이 급락한다. 그래서 새 파 출현을 정밀히 통제하는 것이 핵심이다.</div></div>
<div class="rb-sub">동기화 심화 — 새 파 출현의 약리적 통제</div>
<p class="rb-p">난포파 통제는 두 원리에 근거한다 — ① 새 파 출현은 주로 FSH 의존, ② 에스트로겐 활성 우성 난포는 대체로 LH 의존. 따라서 프로게스타겐·에스트로겐의 음성 되먹임으로 FSH·LH를 억제해 파 출현을 동기화한다. 외인성 유도엔 ① 기존 파의 일관된 종료 ② 새 파를 부를 FSH의 예측 가능한 일시 증가 ③ 선택 후 우성 난포의 정상 성장이 필요하다.</p>
<div class="rb-clinical"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v6M9 5h6M6 9v4a6 6 0 0 0 12 0V9"/><path d="M6 9H4M18 9h2"/><circle cx="12" cy="19" r="2"/></svg><span class="rb-tag">임상</span><span class="rb-tt">GnRH로 새 파 유도</span></div><div class="rb-cc-b">GnRH는 즉각 LH·FSH 급증을 일으키나(크기는 P4 농도·난포파 단계와 무관), 효과는 우성 난포 유무에 달렸다. 우성 선택 후 GnRH는 그것을 배란시켜 1.5~2.0일 후 새 파가 출현하지만, 선택 전 GnRH는 그 파에 영향이 없다(성장 난포 과립막에 LH 수용체가 없어서). 그래서 GnRH 동기화는 &#x27;기능적 우성 난포가 있을 때&#x27;만 작동하고, 이후 유도된 황체를 퇴행시킬 PGF2α가 필수다. 소는 발정 주기 5~12일에 GnRH를 줄 때 가장 일관되게 반응한다.</div></div>
<div class="rb-clinical"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v6M9 5h6M6 9v4a6 6 0 0 0 12 0V9"/><path d="M6 9H4M18 9h2"/><circle cx="12" cy="19" r="2"/></svg><span class="rb-tag">임상</span><span class="rb-tt">에스트라디올로 새 파 유도</span></div><div class="rb-cc-b">에스트라디올은 우성 난포 성장기를 억제하고(P4 병용 시 더 깊게), 시상하부·뇌하수체 모두에 음성으로 FSH·LH를 누른다. 프로게스틴 삽입 소에 에스트라디올-17β(2.5~5mg) 또는 EB·발레레이트(2mg)를 주면 약 4~4.5일 후 변동 거의 없이 새 파가 출현한다(E2가 대사되며 FSH 급증→새 파). 가장 성공적인 난포파 동기화 호르몬이지만, 에스트라디올 금지국이 늘어 대안이 필요하다.</div></div>
<div class="rb-sub">동기화 심화 — 황체 수명 통제</div>
<div class="rb-clinical"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v6M9 5h6M6 9v4a6 6 0 0 0 12 0V9"/><path d="M6 9H4M18 9h2"/><circle cx="12" cy="19" r="2"/></svg><span class="rb-tag">임상</span><span class="rb-tt">황체용해 기전</span></div><div class="rb-cc-b">황체용해는 배란 전 난포의 에스트라디올 → 뇌하수체 옥시토신 방출 → 소량 자궁 PGF2α 방출로 시작되고, PGF2α가 추가 황체·자궁 옥시토신과 PGF2α를 부르는 양성 되먹임 고리를 연다(황체 PGF2α도 자가/측분비로 신호 증폭). PGF2α는 황체 혈류를 줄이고 큰 황체세포 세포자멸사를 촉진해 CL을 소멸시킨다.</div></div>
<p class="rb-p">소에서 PGF2α는 발정 주기 약 5일 이후 CL의 즉각 퇴행을 일으킨다 — P4가 24시간 내 기저로 급락하고 LH 박동이 늘어 발정·배란이 유도된다. 빠른 황체용해에도 치료–발정 간격은 가변적인데(난포파 단계 의존), 우성 난포가 있으면 2~3일 내, 우성 전·퇴행 단계면 4~6일 걸린다.</p>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">PGF2α 5~6일 두 번 투여</span></div><ul><li>PGF2α는 발정 후 처음 5~6일은 황체용해를 잘 못 시킴(과거엔 미성숙 CL에 수용체 없어서로 봤으나, 최근 배란 후 2일이면 PGF2α 수용체 존재 입증)</li><li>주기 5·6일 단일 투여는 반응 가변적</li><li>12시간 간격 두 번 투여 → 발정 후 2~5일에 일관된 황체 퇴행(95~100%)</li></ul></div>
<p class="rb-p">외인성 프로게스테론(PRID 1.55g, CIDR 1.38g[미국]/1.9g[캐나다], Cue-Mate 1.56g)은 황체기를 모방·연장한다. 모든 P4 기반 동기화에서 최대 85%가 제거 후 36~72시간에 발정하고, GnRH·E2로 배란을 유도해 제거 후 48~84시간 FTAI가 가능하다.</p>
<div class="rb-sub">동기화 심화 — 프로게스테론의 세 가지 이점</div>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">P4 동기화의 이점</span></div><ul><li>① LH 급증·발정 행동 억제: P4를 역치(&gt;1ng/ml) 이상 유지. 단 14·21일 장기 치료는 잔존 우성 난포(노화 난자)로 수태율이 단기보다 10~15% 낮아 → 7~9일 단기 프로토콜 개발</li><li>② 무발정 암소 반응: P4 보충은 처음엔 LH를 줄이나 이후 LH 박동성을 높여 우성 난포 발달↑, 시상하부를 발정·LH 급증에 프라이밍. (육우 약 20%·미국 젖소 초산우 28%·경산우 15%가 분만 후 60일까지 무배란)</li><li>③ 낭종성 난소(미국 젖소 약 10%) 치료: 높은 LH 박동·LH 급증 부재가 특징인데, P4가 LH 박동을 낮춰 낭종 교체→새 우성 난포 정상 발달→중단 후 배란</li></ul></div>
<div class="rb-clinical"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v6M9 5h6M6 9v4a6 6 0 0 0 12 0V9"/><path d="M6 9H4M18 9h2"/><circle cx="12" cy="19" r="2"/></svg><span class="rb-tag">임상</span><span class="rb-tt">배란 유도 — GnRH·hCG·E2</span></div><div class="rb-cc-b">단일 GnRH는 젖소 분만 후 약 10~18일, 육우 21~31일에 주면 LH 급증·배란을 유도한다(육우는 48시간 송아지 격리 결합도 효과). hCG 500~3000IU, 외인성 E2도 배란을 유도한다. 단 분만 후 GnRH 유도 CL은 자발 CL보다 수명이 짧고, 자궁 복구 전 GnRH는 자궁축농증을 부를 수 있어 분만 후 초기 단일 GnRH는 실무 유용성이 낮다.</div></div>
<div class="rb-sub">동기화 심화 — 프로토콜별 정리</div>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">프로스타글란딘 프로토콜</span></div><ul><li>황체용해 기전이라 성숙 CL이 있는 주기 암소에만 적용</li><li>PGF2α(25mg) 또는 클로프로스테놀(500μg) → 주기 무리의 55~65%에서 발정</li><li>11~14일 후 2차 주사 → 동기 발정(1차 반응우가 6~15일, 대다수 7~9일이 되므로)</li><li>단 모든 성숙 CL이 용해되진 않음 — 6일째 약 25%, 7일째 약 33%, 8~16일째도 100% 미만 반응</li></ul></div>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">프로게스테론 프로토콜</span></div><ul><li>14일 치료(IVPD/경구 MGA): 배란 14일 억제 → 노화 난포 배란으로 임성 낮음 → 제거 19일 후 PGF2α(잔존 난포 배란 후 CL 퇴행). 육우 후보우에 흔함. MGA 0.5mg/일·14일 곡물 혼합 급여(비용 효율적)</li><li>7일 노출(IVPD): 배란 7일 억제 → PGF2α 시 모든 주기우가 ≥7일 CL → 제거 2~6일 후 발정</li><li>7일+GnRH: P4만으로는 난포파 동기화 안 됨 → 시작 시 GnRH로 새 파 개시해 잔존 난포 감소, GnRH~PGF2α 사이 프로게스틴이 조기 발정을 차단</li></ul></div>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">배란 동기화 (FTAI)</span></div><ul><li>오브싱크: GnRH → 7일 후 PGF2α → 48시간 후 2차 GnRH → 16시간(8~24) 후 정시수정. 첫 GnRH가 우성 난포 배란/황체화로 약 3일 후 새 파 개시, 2차 GnRH가 배란 동기성↑. 후보우에선 효과 덜함</li><li>CO-Synch: 2차 GnRH를 AI와 동시 → 처치 1회 절감(육우에 이점)</li><li>Presynch-Ovsynch: 14일 간격 PGF2α 2회 전동기화 후 11·12·14일째 오브싱크 시작(5~12일에 맞춤). 단 PGF2α 전동기화는 무배란우엔 무효</li><li>G6G: PGF2α→2일 후 GnRH로 새 주기 개시→6일 후 오브싱크</li><li>Double-Ovsynch: 오브싱크로 전동기화·주기성 유도 후 교배용 오브싱크(무배란 젖소에 유리)</li></ul></div>
<div class="rb-sub">동기화 심화 — P4·eCG 추가와 분할 정시수정(STAI)</div>
<div class="rb-clinical"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v6M9 5h6M6 9v4a6 6 0 0 0 12 0V9"/><path d="M6 9H4M18 9h2"/><circle cx="12" cy="19" r="2"/></svg><span class="rb-tag">임상</span><span class="rb-tt">GPG에 프로게스테론·eCG 추가</span></div><div class="rb-cc-b">오브싱크·코싱크에서 첫 GnRH~PGF2α 사이 7일(또는 5일) P4 보충은 발정·배란 동기성과 수태를 높이고 무발정·후보우·낭종우에 유리하다 — 5일 P4 + 전발정기 72시간 연장은 육우 AI 임신율을 최대 15% 높였다(단 5일 프로토콜은 주기 5일 단일 PGF2α 황체용해가 가변적이라 CIDR 제거 시 6~12시간 뒤 2차 PGF2α 필요). eCG는 난포 발달을 늘려 계절 분만 무발정 소에 유리 — P4 기구 제거 시 eCG 400IU가 49일 교배철 74% 임신, 무발정 젖소·육우에서 FTAI 임신율을 10~15% 높였다.</div></div>
<div class="rb-clinical"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v6M9 5h6M6 9v4a6 6 0 0 0 12 0V9"/><path d="M6 9H4M18 9h2"/><circle cx="12" cy="19" r="2"/></svg><span class="rb-tag">임상</span><span class="rb-tt">분할 정시수정(Split-Time AI, STAI)</span></div><div class="rb-cc-b">동기화 받은 암컷 일부는 FTAI 전 발정을 안 보이는데, 이들에 일괄로 GnRH를 줘 배란을 유도해도 임신율이 평균 27% 낮다. STAI는 &#x27;비발정 암컷의 수정을 예정 정시 AI보다 20~24시간 늦추는&#x27; 방법이다. PGF2α 투여 시 발정 발견 패치로 발정 상태를 판정해 최적 시점에 수정한다 — 7일 CO-Synch+IVPD/14일 IVPD-PGF2α 후 성우 30~50%·후보우 20~40%가 PGF2α 후 66시간 전에 발정을 안 보이는데, 그중 55%가 지연 시점까지 발정을 보였고, 수정을 20~24시간 늦춰 비발정 암컷 임신율이 16%p 개선됐다. 또 활성화된 발정 패치가 있는 소엔 GnRH가 불필요해 GnRH 사용도 줄인다.</div></div>
<div class="rb-sub">AI 후 hCG 투여 — 황체 보강과 수태율</div>
<p class="rb-p">hCG는 LH와 약 85% 구조가 같은 성선자극호르몬으로, LH 유사 작용을 낸다(반감기는 약 24시간으로 LH의 20분보다 훨씬 길다). 제제로서의 효능은 난포낭종·배란 장애·난포 발육 장애(난소 발육 부전·난소 정지·난소 위축)에 있고, 투여로 기대하는 것은 배란과 황체 형성이라 기본적으로 GnRH와 비슷한 효과다. 그런데 현장에서 hCG를 가장 많이 쓰는 맥락은 따로 있다 — AI 후에 혈중 P4를 끌어올려 수태율을 높이려는 것이다.</p>
<p class="rb-p">보통 AI로부터 5일 전후에 투여한다. 배란 뒤 새로 발육을 시작한 제1난포파 우성 난포가 10mm 이상으로 자랐을 때 hCG를 놓으면, 그 난포가 배란·황체화되어 부황체(accessory CL)가 생긴다. 이 부황체가 황체 체적을 늘려 혈중 P4를 올린다 — hCG의 LH 유사 작용으로 기존 황체 기능도 보강되지만, P4 상승의 주역은 이 부황체 형성이다. 그래서 P4는 hCG 투여 2~3일이 지나서야 오르기 시작해, 질내 유치형 P4 제제(CIDR)보다 상승이 느리다.</p>
<ul class="rb-list"><li>투여량–배란율: 1,000 IU에서도 GnRH(100μg)와 비슷한 배란율이 나오고, 2,000 IU에서 90%에 육박, 2,500 IU 이상에서 90%를 넘는다(홀스타인 비유우 기준). 2,000 IU 이상이면 높은 배란율을 기대할 수 있다.</li></ul>
<div class="rb-caution"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg><span class="rb-tag">주의</span><span class="rb-tt">아무 소에나 놓는다고 수태율이 오르진 않는다</span></div><div class="rb-cc-b">AI 후 hCG 투여 시험 10건을 종합하면, 무작위로 투여했을 때의 수태율 향상은 미미하다(평균 +3.0% 수준, 개별적으로 유의했던 건 3,300 IU를 쓴 2건뿐). 다만 대상을 좁히면 달라진다 — ① 초산우, ② 리피트 브리더(생식기에 이상이 없는데도 3회 AI로 수태되지 않는 소)처럼 원래 수태율이 낮은 소·우군에서 효과가 인정된다. 따라서 모든 소에 일괄로 놓기보다, 수태율이 낮은 소를 골라 쓰는 것이 맞다.</div></div>
<p class="rb-p">요약: 이제 발정 발견 시 또는 발견 없이 정시에 수정해 수용 가능한 임성을 얻는 프로토콜이 존재하고, 치료 시작 시 주기를 안 도는 암컷에서도 성공한다. 특히 &#x27;사춘기 전후 후보우·무주기 암소에서 임성 있는 배란을 개시&#x27;하는 것이 동기화·정시 AI로 임성을 개선하는 일차 방법이며, 수정 전 IVPD(질내 P4) 기반 동기화가 다른 호르몬 개입보다 임성을 더 효과적으로 높인다. 지역·목초·사료·품종·체형·분만 후 간격·기후가 성공에 영향을 주므로 이를 염두에 둔다.</p></div>
  `;
}
function reproPregHtml(){
  return `
<div class="modal-sub" style="margin-bottom:6px;">${svgIcon('dna',16)} 임신 — 임신 인식·감정·태아 프로그래밍</div>
<div class="grass-section-title"><span class="gst-wrap"><span class="gst-main">${svgIcon('dna',15)} 8. 수정·임신 인식·착상</span><span class="gst-sub">배아 발육, IFN-τ의 저울, 프로게스테론, 착상, 프리마틴</span></span></div>
<div class="rb-block"><div class="rb-sub">수정과 배아의 이동</div>
<p class="rb-p">배란된 난자는 난관채에 받아들여져 팽대부–협부 접합부에 머문다. 자궁에 주입된 정자는 자궁경관을 지나 난관협부에 도착, 상피와 결합해 일정 시간 저장되었다가 배란에 맞춰 결합이 풀리고 수정능을 획득하며 활발히 움직여 난자와 만난다. 수정란은 약 1일에 한 번씩 분열하지만(난할) 크기는 커지지 않는다.</p>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">배아 발육 일정</span></div><ul><li>Day 1 2세포 → Day 2 4세포 → Day 3 8세포</li><li>Day 4~5 상실배, 8~16세포기에 난관→자궁으로 하강</li><li>Day 6~7 자궁각에서 배반포 형성 후 투명대 탈출(부화)</li></ul></div>
<div class="rb-sub">모체 임신 인식 — 황체를 살리는 일</div>
<p class="rb-p">임신이 성립하려면 가장 먼저 황체를 살려야 한다. 소의 황체는 가만 두면 주기 끝(16~17일)에 자궁이 뿜는 PGF2α에 녹는다. 그런데 임신 유지에 필요한 프로게스테론은 그보다 더 오래 필요하다. 그래서 임신한 소는 &quot;나 새끼 들었다&quot;는 신호를 황체가 녹기 전에 보내야 하는데, 이게 모체 임신 인식이다.</p>
<p class="rb-p">신호를 보내는 건 영양막이 분비하는 IFN-τ다. 배반포는 Day 13경 3mm 구형이지만 14일부터 실처럼 길어지기 시작해 17일이면 25cm, 신장배가 된다. 이 가늘고 길어진 영양막에서 IFN-τ가 나온다. 핵심은 IFN-τ가 자궁의 프로스타글란딘 저울을 바꾼다는 점이다 — PGF2α는 황체를 녹이는 쪽, PGE2는 황체를 지키는 쪽인데, IFN-τ가 이 저울을 PGE2 쪽으로 기울여 황체를 살린다. 거꾸로 배아 발육이 늦어 IFN-τ가 부족하면 저울이 PGF2α 쪽으로 기울어 황체가 녹고 임신이 깨진다.</p>
<div class="rb-caution"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg><span class="rb-tag">주의</span><span class="rb-tt">지연성 재발정</span></div><div class="rb-cc-b">현대 유우에서 수정 후 불수태우의 약 30%는 황체 퇴행이 지연되어 재발정이 늦어진다. 어느 시기까지 배아가 IFN-τ를 분비해 황체용해를 막다가 도중에 배아가 사멸해 버린 경우다. 그래서 수정우는 25~26일까지 재발정을 확인해야 한다.</div></div>
<div class="rb-sub">초기 임신과 프로게스테론</div>
<p class="rb-p">프로게스테론은 임신 첫 200일을 황체에서 공급한다(태반은 3분기는 되어야 충분히 만든다). 그러니 초기 임신은 전적으로 황체에 달려 있다. P4는 황체를 유지시킬 뿐 아니라 자궁 환경 자체를 임신에 맞게 세팅한다 — 내막 분비를 자극해 배아에 먹이를 대고, 자궁 평활근을 조용하고 이완된 상태로 묶는다.</p>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">P4 보충 효과 (수정 후 5~9일)</span></div><ul><li>영양막 길이 4배</li><li>자궁 IFN-τ 6배</li></ul><div class="rb-key-concl">초기 P4가 높을수록 배아가 잘 자라고 수태율↑ (낮으면 내막 영양소 수송체가 줄어 배아가 굶음)</div></div>
<p class="rb-p">배아는 9~10일 부화 → 14일부터 신장 → 19~20일 30cm를 넘기도 한다. 20~33일에 자궁과 융모막이 접촉→부착으로 맞물리고 요막이 발달해 융모요막 태반을 만든다. 소의 착상은 임신 3주째 시작되는 표재성 부착이며, 자궁벽 소구 약 100개가 태아쪽 융모엽과 맞물려 태반분엽을 이룬다.</p>
<div class="rb-sub">임신 중 어미의 변화</div>
<p class="rb-p">임신 중 어미 심혈관계는 동맥압·혈관 저항이 떨어지고 심박출량이 최대 30~40% 는다(심박수는 15%만 늘고 나머지는 1회 박출량이 메움). 분만 후 자궁태반으로 가던 혈류가 유선으로 재분배되는 것이 분만 직후 최고 비유를 가능하게 한다. 영양 면의 핵심은 임신 막바지로, 젖소의 임신 말 영양 요구는 같은 체중 비임신 소보다 약 75% 높다. 임신 7개월이면 태아가 출생체중의 40%에 이르고, 예상 분만 약 60일 전 건유로 비유와 태아 성장의 경쟁을 막는다.</p>
<div class="rb-sub">프리마틴 (Freemartin)</div>
<p class="rb-p">수소와 쌍태로 태어난 암송아지는 불임일 수 있다. 두 태아의 태반 혈관이 문합되어 피가 섞이면, 성 분화 중인 암컷이 수컷 쌍태의 테스토스테론·항뮐러관호르몬에 노출되기 때문이다. 수컷 조혈줄기세포까지 넘어와 키메라가 되며 생식선이 간성으로 끝나기도 한다. 수소와 쌍태로 난 암송아지를 번식우로 쓸지 판단할 때 반드시 떠올린다.</p></div>
<div class="grass-section-title"><span class="gst-wrap"><span class="gst-main">${svgIcon('clipboard',15)} 9. 임신 감정</span><span class="gst-sub">직장검사·초음파 시기별 소견, 태아 발육·성별, 병변 감별 + 직장촉진 심화 + 생화학 검사(P4·PAG·EPF·ISG)</span></span></div>
<div class="rb-block"><div class="rb-sub">감정 방법과 시기</div>
<p class="rb-p">임신 감정은 번식 성적 평가에서 가장 중요한 행위다. 초음파의 가장 큰 가치는 사실 양성(임신) 확인이 아니라 비임신(open cow)의 조기 발견에 있다 — 비임신우를 빨리 가려내 다시 수정 사이클에 올려야 한다. 단, 임신 90일 이내 초기 배아사·태아사가 6~15% 발생할 수 있어 후속 확인이 필요하다.</p>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">감정 가능 시기</span></div><ul><li>직장검사: AI 후 35일 이후 (양막낭 촉지는 30~40일부터)</li><li>초음파(에코): AI 후 26일 이후</li><li>PAG 검사(혈액·유즙): 수정 후 28일 전후</li><li>AI 후 60일에 재감정, 쌍태우는 90일에도 추가 감정</li></ul></div>
<div class="rb-sub">직장검사 임신 감정 (시기별)</div>
<ul class="rb-list"><li><b class="rb-label">30~40일</b> 양막낭 촉지, 태막 슬립(자궁각을 끼워 올릴 때 &quot;드르륵&quot; 미끄러지는 감촉, 40일 이후 권장). 태자는 황체 있는 쪽 자궁각에 위치.</li><li><b class="rb-label">60일 전후</b> 자궁각·양막낭이 커져 태막 슬립이 주 방법. 좌우 자궁각 차이로 판정. 연습은 이 시기 소로.</li><li><b class="rb-label">80일 전후</b> 태반소엽(자궁소구에서 발달)이 울퉁불퉁 만져진다.</li><li><b class="rb-label">90일 이후</b> 자궁이 복강으로 가라앉아 자궁동맥(중자궁동맥) 박동·진전음으로 확인. 임신각 쪽 8~10mm &quot;쏴-쏴-&quot;, 비임신각 5mm로 약함.</li><li><b class="rb-label">6개월 이후</b> 타진법(부구법): 우측에서 압박하면 태자가 주먹에 부딪힘.</li></ul>
<div class="rb-caution"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg><span class="rb-tag">주의</span><span class="rb-tt">자궁축농증 vs 임신</span></div><div class="rb-cc-b">자궁 내강에 농·점액이 차도 자궁이 부푼다. 양쪽 자궁각이 같게 부풀고 태막 슬립(&quot;드르륵&quot;)이 없으면 임신이 아니라 자궁 질환을 의심.</div></div>
<div class="rb-sub">초음파 — 원리와 스캔 기법</div>
<p class="rb-p">초음파(B모드)는 반사 강도를 밝기로 바꿔 보여준다. 액체(난포액·태아액)는 초음파를 흡수해 검게(무에코), 근육·황체는 회색, 뼈·금속은 희게 보인다. 그래서 난포는 검은 구체, 황체는 진한 회색~흰색 영역으로 나온다.</p>
<p class="rb-p">스캔은 횡종단면에서 방광 → 자궁경부 → 자궁체 → 자궁각 순으로 보며, 프로브를 좌우로 움직여 난소를 확인한다. 자궁체 위에서 시작해 자궁각을 따라 프로브를 옮기며 좌우 스위프(sweep)하고, 자궁각 분기부를 지나 난소까지 따라간다. 직장 촉진으로 구조물을 먼저 찾는 연습이 선행되어야 한다.</p>
<ul class="rb-list"><li><b class="rb-label">난포</b> 내부 과립세포층·외부 난포막세포층으로 둘러싸인 검은 무에코 원형. 난모세포는 난구에 의해 난포강에 매달림.</li><li><b class="rb-label">황체</b> 강한 에코(하얗게). 배란 3~4일부터 커져 12~16일에 최대. 2~3cm면 성숙(P4 최고).</li><li><b class="rb-label">출혈성 황체</b> 배란 직후~3일, 어둡게. 퇴행기 황체와 둘 다 에코가 낮아 구분 어려움.</li><li><b class="rb-label">공동성 황체</b> 내부 액체 공동. 황체기 전반부에 보이며 점차 닫히는 정상 변이 — 황체 낭종과 혼동 금지.</li></ul>
<div class="rb-sub">초음파 임신 진단·태아 발육·성별</div>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">태아 발육 이정표</span></div><ul><li>25일경: 배아 심박동 확인 (심박이 없으면 배아 사멸)</li><li>30일경: 배아포(embryonic vesicle)</li><li>35일~: 배아 10mm(30일)→20mm로 커져 진단 쉬워짐</li><li>45일: cotyledons·태아 움직임</li><li>50일 배아포 ~42mm, 56일 배아 ~53mm(갈비뼈 석회화 시작)</li></ul></div>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">태아 나이 추정 (25~45일)</span></div><ul><li>태아 길이(mm, 두–미) + 18 = 일령</li><li>예: 15mm→33일 / 20~25mm→40일 / 40mm→50일 / 80mm→60일</li></ul></div>
<ul class="rb-list"><li><b class="rb-label">성별 판정</b> 55~60일부터. 생식결절(genital tubercle) 위치로 — 고에코 이중엽 구조물. 수컷=제대 바로 뒤, 암컷=꼬리 아래·뒷다리 사이.</li><li><b class="rb-label">쌍태</b> 황체가 2개면 50% 확률로 쌍태. 양막강 2개·태아 2마리, 두 요막이 접하는 두꺼운 선(트윈 라인)이 보이면 쌍태 확률 높음. 60~90일에도 배아 사멸이 단태보다 많아 90일 추가 감정.</li></ul>
<div class="rb-caution"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg><span class="rb-tag">주의</span><span class="rb-tt">태아 사망 징후</span></div><div class="rb-cc-b">태아막 분리는 사망 징후. 양막액·요막액의 양과 투명도도 함께 평가한다.</div></div>
<div class="rb-sub">직장촉진 심화 — 검사 접근과 주징후</div>
<p class="rb-p">이상적 임신감정은 최소 침습적이고 장비·시간 투자가 적으며 즉시 결과로 우방(cow-side) 판단을 돕고 높은 민감도·특이도를 갖춰야 한다. 신뢰할 방법은 직장촉진·직장초음파·내분비검사 셋인데, 직장촉진이 가장 흔히 쓰이고 가장 많은 기준을 충족한다. 정상 해부·생리를 잘 이해하면 임신 30~35일에도 거의 100%에 근접하는 일관된 결과를 얻고 임신 단계까지 추정할 수 있다.</p>
<p class="rb-p">검사는 자궁경 식별에서 시작한다 — 자궁경은 섬유연골성으로 단단해(닭 목 같은 느낌) 기준점이 된다. 비임신·초기 임신엔 골반강·골반 입구에, 경산우·임신 진행 시 더 앞·복측으로 당겨진다. 자궁경을 잡아 자궁체·자궁각을 뒤로 견인하고, 복측 자궁각간 인대로 자궁각을 골반 바닥에 눕혀 끝까지 촉진한 뒤 각 끝 너머에서 난소를 만진다. 임신이 진행되면 태아·태수 무게로 견인이 불가능해져 제자리에서 검사한다.</p>
