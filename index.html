/* ============================================================
   개체별 보기
============================================================ */
function ownerAnimals(){
  return DATA.animals.filter(a=>a.owner===UI.owner).sort((a,b)=>a.animalId.localeCompare(b.animalId));
}
function animalRecords(animalId){
  return DATA.records.filter(r=>r.owner===UI.owner && r.animalId===animalId)
    .sort((a,b)=> recordSortKey(b) - recordSortKey(a));
}
// 기록의 대표 날짜 = 진료일 우선, 없으면 발정→수정→분만→동기화 순. (동기화 미래일정이 진료일을 덮지 않음)
function recordSortKey(r){
  const d = r.examDate || r.estrusDate || r.aiDate || r.calvingDate || firstSyncDate(r);
  if(!d) return -1;
  return new Date(d.slice(0,10)+'T'+(d.length>10?d.slice(11,16):'00:00')).getTime();
}
function lastNonEmpty(recs, field){
  for(const r of recs){ if(r[field]) return r[field]; }
  return null;
}
function sortKeyOf(r){
  const d = r.examDate || r.aiDate || r.estrusDate;
  if(!d) return -1;
  return new Date(d.slice(0,10)+'T'+(d.length>10?d.slice(11,16):'00:00')).getTime();
}
// 개체번호 3번째 그룹 기준 정렬 (예: "002 2029 9407 0" → 9407)
function animalSortGroup(id){
  const parts = String(id||'').trim().split(/\s+/);
  const g = parts.length>=3 ? parts[2] : (parts[parts.length-1]||'');
  const n = parseInt(g,10);
  return isNaN(n) ? Infinity : n;
}
function sortScheduleIds(ids){
  const asc = (DATA.scheduleSortDir||'asc') !== 'desc';
  return ids.slice().sort((a,b)=>{
    const ka=animalSortGroup(a), kb=animalSortGroup(b);
    if(ka!==kb) return asc ? ka-kb : kb-ka;
    return asc ? String(a).localeCompare(String(b)) : String(b).localeCompare(String(a));
  });
}
function lastRecordDate(animalId){
  const recs = animalRecords(animalId);
  if(!recs.length) return null;
  return recs[0].examDate || recs[0].aiDate || recs[0].estrusDate || null;
}
// 개체 상태 → 배지 클래스 + 정렬 우선순위 (작을수록 위로)
function animalStatusMeta(status){
  switch(status){
    case '임신감정 필요': return { cls:'check',   order:0 };
    case '감정 대기':     return { cls:'warn',    order:1 };
    case '비임신':        return { cls:'rebreed', order:2 };
    case '미수정':        return { cls:'unknown', order:3 };
    case '임신중':        return { cls:'preg',    order:4 };
    case '비육전환':      return { cls:'fatten',  order:5 };
    default:              return { cls:'unknown', order:6 };
  }
}

/* ===== 발정주기일 추정 (초음파 → 프로토콜 → 오늘 투영) ===== */
function daysBetween(fromStr, toStr){
  if(!fromStr || !toStr) return 0;
  const a = new Date(fromStr.slice(0,10)+'T00:00');
  const b = new Date(toStr.slice(0,10)+'T00:00');
  return Math.round((b - a) / 86400000);
}
function parseUltra(text){
  text = text || '';
  const cyst = /낭종/.test(text);
  // 낭종으로 표기된 'NNmm' 수치는 집계에서 제거 (난포낭종/황체낭종 등)
  const clean = text.replace(/[가-힣A-Za-z]*낭종[^\d]{0,4}\(?\s*\d+(?:\.\d+)?\s*mm/g, ' 낭종 ')
                    .replace(/\d+(?:\.\d+)?\s*mm[^\d]{0,4}낭종/g, ' 낭종 ');
  const clMentioned = /황체/.test(clean);
  let clSize = null;
  const cm = clean.match(/황체[가-힣\s]*?(\d+(?:\.\d+)?)\s*mm/);
  if(cm) clSize = parseFloat(cm[1]);
  const smallFoll = /소난포/.test(clean);
  const allMm = [...clean.matchAll(/(\d+(?:\.\d+)?)\s*mm/g)].map(x=>parseFloat(x[1]));
  const foll = allMm.slice();
  if(clSize!=null){ const i=foll.indexOf(clSize); if(i>-1) foll.splice(i,1); }
  const follMax = foll.length ? Math.max(...foll) : null;
  let dom = null;
  const dm = clean.match(/(?:우성|우세)난포[^\d]{0,3}(\d+(?:\.\d+)?)\s*mm/);
  if(dm) dom = parseFloat(dm[1]);
  return { clMentioned, clSize, smallFoll, follMax, dom, cyst };
}
function recHasCyst(r){
  if(!r) return false;
  if(/낭종/.test(r.ovarianDisease||'')) return true;
  const u = [r.ultraUterus, r.ultraOvaryL, r.ultraOvaryR, r.ultrasound].filter(Boolean).join(' ');
  return /낭종/.test(u);
}
const VWP_DAYS = 40;   // 분만 후 재수정 휴지기
// 낭종 종류를 명확히 식별 (난포낭종 / 황체낭종)
function cystType(r){
  const src = [r.ovarianDisease, r.ultraUterus, r.ultraOvaryL, r.ultraOvaryR, r.ultrasound].filter(Boolean).join(' ');
  if(/난포\s*낭종|난포낭종|난포성\s*낭종/.test(src)) return '난포낭종';
  if(/황체\s*낭종|황체낭종|황체성\s*낭종/.test(src)) return '황체낭종';
  return '낭종';
}
function recDate(r){ return dateOnly(r.examDate || r.aiDate || r.estrusDate || ''); }
/* 기록에 수기로 적어둔 '다음발정일' 중 가장 최근 것 (추정 불가일 때 보조용) */
function manualNextEstrus(recs){
  const ds = recs.filter(r => dateOnly(r.nextEstrusDate||'')).map(r => dateOnly(r.nextEstrusDate)).sort();
  return ds.length ? ds[ds.length-1] : '';
}
function latestCalvingDate(recs){
  const ds = recs.filter(r => dateOnly(r.calvingDate||'')).map(r => dateOnly(r.calvingDate)).sort();
  return ds.length ? ds[ds.length-1] : '';
}
function latestCalvingRec(recs){
  const cs = recs.filter(r => dateOnly(r.calvingDate||''))
    .sort((x,y)=> dateOnly(y.calvingDate).localeCompare(dateOnly(x.calvingDate)));
  return cs[0] || null;
}
// 직전 임신(1차 O) 이후 분만했는지
function calvedAfterPregnancy(recs){
  const calv = latestCalvingDate(recs);
  if(!calv) return false;                                                    // 분만일 없으면 분만완료 아님
  // 분만일 이후에 임신(O) 감정이 다시 찍혔으면 재임신 → 분만완료 아님(임신중)
  const reBred = recs.some(r => (r.pregnant||'').trim().toUpperCase()==='O' && recDate(r) > calv);
  return !reBred;
}
function isCurrentlyPregnant(recs){
  if(!recs || !recs.length) return false;
  const sorted = recs.slice().sort((x,y)=> sortKeyOf(y) - sortKeyOf(x));
  const aiRecs = recs.filter(r=>r.aiDate);
  const latestAiTs = aiRecs.length ? Math.max(...aiRecs.map(sortKeyOf)) : -Infinity;
  const diagPool = sorted.filter(r => sortKeyOf(r) >= latestAiTs);   // 최근 수정 이후의 감정만
  if((lastNonEmpty(diagPool,'pregnant')||'').trim().toUpperCase()!=='O') return false; // 최근 수정 후 1차 O 아님
  if(calvedAfterPregnancy(recs)) return false;                                          // 임신 후 분만함
  return true;
}
// 최근 수정(AI) 후 임신감정 결과를 아직 기다리는 중인지 (1차 X도 O도 분만도 아님)
function awaitingPregOutcome(recs){
  const aiRecs = (recs||[]).filter(r=>r.aiDate);
  if(!aiRecs.length) return false;                                   // 수정 안 함 → 대기 아님
  if(calvedAfterPregnancy(recs)) return false;                       // 분만했으면 대기 아님
  const latestAiTs = Math.max(...aiRecs.map(sortKeyOf));
  const diag = recs.filter(r => sortKeyOf(r) >= latestAiTs)
                   .map(r => (r.pregnant||'').trim().toUpperCase());
  if(diag.includes('X')) return false;                              // 1차 X 떴으면 재수정 대상 → 대기 끝
  return true;                                                       // 아직 감정 결과 없음 → 대기
}
function cycleDayRange(p){
  const cl=p.clSize, clM=p.clMentioned, f=p.follMax, dom=p.dom, small=p.smallFoll;
  if(!clM && f!=null && f>=12) return [0,0];
  if((!clM || (cl!=null && cl<=10)) && small) return [1,2];
  if(cl!=null && cl>=20){
    if((dom!=null && dom>=15) || (f!=null && f>=15)) return [7,9];
    if(small) return [10,12];
    if(f!=null && f>=8) return [13,17];
  }
  if(cl!=null && cl>=15 && f!=null && f>=8) return [3,6];
  if(cl!=null && cl>=10 && cl<=20 && f!=null && f>=10) return [18,20];
  return null;
}
function estimateCycleToday(animal, recs){
  if(!recs || !recs.length) return null;
  if(animal && animal.fattening) return { fattenSkip:true };
  if(isCurrentlyPregnant(recs)) return { pregnantSkip:true };
  // 가장 최근 진료가 낭종(질환 또는 초음파)이면 추정 안 함
  if(recHasCyst(recs[0])) return { cystSkip:true };
  const cycleLen = parseInt(animal.cycleLength,10) || 21;
  const mode = animal.waveMode || '2';
  if(mode==='3'){
    const base = recs[0];
    const baseDate = dateOnly(base.examDate || base.aiDate || base.estrusDate || '');
    if(!baseDate) return null;
    const md = parseFloat(animal.manualCycleDay);
    if(isNaN(md)) return { needManual:true, cycleLen };
    const elapsed = daysBetween(baseDate, todayStr());
    let day = (md*(cycleLen/21) + elapsed) % cycleLen; if(day<0) day+=cycleLen;
    return { day: Math.round(day), cycleLen, elapsed, baseDate, basis:`수동 ${md}일`, mode };
  }
  // 2난포파: 낭종이 아닌, 초음파가 적힌 가장 최근 진료 기준
  const ultraRec = recs.find(r => !recHasCyst(r) && [r.ultraOvaryL,r.ultraOvaryR,r.ultraUterus,r.ultrasound].some(v=>v&&v.trim()));
  if(!ultraRec) return { undetermined:true, cycleLen };
  const baseDate = dateOnly(ultraRec.examDate || ultraRec.aiDate || ultraRec.estrusDate || '');
  if(!baseDate) return { undetermined:true, cycleLen };
  const ultra = [ultraRec.ultraOvaryL, ultraRec.ultraOvaryR, ultraRec.ultraUterus, ultraRec.ultrasound].filter(Boolean).join(' ');
  const p = parseUltra(ultra);
  const rng = cycleDayRange(p);
  if(!rng) return { undetermined:true, cycleLen, baseDate };
  const elapsed = daysBetween(baseDate, todayStr());
  let day = (((rng[0]+rng[1])/2)*(cycleLen/21) + elapsed) % cycleLen; if(day<0) day+=cycleLen;
  return { day: Math.round(day), cycleLen, elapsed, baseDate, basis:`초음파 ${rng[0]}~${rng[1]}일`, mode };
}
function cycleTodayHtml(animal, recs){
  const r = estimateCycleToday(animal, recs);
  if(!r) return '—';
  if(r.fattenSkip) return `<span style="color:var(--ink-soft);">비육전환 — 추정 안 함</span>`;
  if(r.pregnantSkip) return `<span class="preg-badge">🍼 임신중</span> <span style="color:var(--ink-soft);font-size:12px;">발정주기 추정 안 함</span>`;
  if(r.cystSkip) return `<span style="color:var(--ink-soft);">낭종 — 추정 안 함</span>`;
  if(r.needManual) return `<span style="color:var(--ink-soft);">3난포파 · 주기일 입력 필요</span>`;
  if(r.undetermined) return `<span style="color:var(--ink-soft);">${r.cyst?'낭종 — 추정 제외':'초음파로 판정 불가'}</span>`;
  return `<span class="cycle-today-main" style="color:var(--accent);">약 ${r.day}일째</span>`
    + `<div style="font-size:11px;color:var(--ink-soft);font-weight:500;margin-top:2px;">`
    + `${r.mode==='3'?'3':'2'}난포파 · ${r.basis} · 진료후 ${r.elapsed}일</div>`;
}

function currentAiCount(a, recs){
  if(a && a.aiCountCurrent!=null && a.aiCountCurrent!==''){ return parseInt(a.aiCountCurrent,10)||0; }
  const v = lastNonEmpty(recs||[], 'aiCount');
  return v ? (parseInt(v,10)||0) : 0;
}
function animalListData(){
  const q = UI.animalSearch.replace(/\s/g,'').trim();
  let animals = ownerAnimals().filter(a => a.animalId.replace(/\s/g,'').includes(q));
  // 각 개체 상태 계산
  const withStatus = animals.map(a => {
    const s = shareAnimalStatus(UI.owner, a);
    return { a, status: s.status, days: s.days, meta: animalStatusMeta(s.status) };
  });
  // 정렬: 상태별 또는 개체번호순
  if(UI.animalSort==='status'){
    withStatus.sort((x,y)=>{
      if(x.meta.order!==y.meta.order) return x.meta.order-y.meta.order;
      return animalSortGroup(x.a.animalId)-animalSortGroup(y.a.animalId);
    });
  } else {
    withStatus.sort((x,y)=>{
      const ka=animalSortGroup(x.a.animalId), kb=animalSortGroup(y.a.animalId);
      if(ka!==kb) return ka-kb;
      return String(x.a.animalId).localeCompare(String(y.a.animalId));
    });
  }
  animals = withStatus.map(w=>w.a);
  const listHtml = withStatus.map(({a, status, days, meta}) => {
    const last = lastRecordDate(a.animalId);
    const dayTxt = (days!=null && (status==='임신감정 필요'||status==='감정 대기'||status==='비임신')) ? ` ${days}일` : '';
    const badge = `<span class="pc-badge ${meta.cls} list-status">${esc(status)}${dayTxt}</span>`;
    return `
    <div class="animal-list-item ${a.animalId===UI.selectedAnimal?'active':''} ${a.fattening?'fattened':''}" data-action="selectAnimal" data-id="${esc(a.animalId)}">
      <span class="list-id-row"><span class="breed-emoji">${breedIcon(a.breed)}</span><span class="tag-chip sm">${esc(a.animalId)}</span>${badge}</span>
      <span class="animal-meta">
        <span>산차 ${esc(a.parity||'—')}</span>
        <span>${ageMonths(a.birth)}</span>
        <span>최근 ${last?fmtShort(last):'기록없음'}</span>
      </span>
    </div>`;
  }).join('') || `<div class="empty-state">검색 결과가 없어요.</div>`;
  return { animals, listHtml };
}

function estrusSummary(r){
  const parts = [];
  if(r.estrusVulvar) parts.push('외음부종창/충혈 '+r.estrusVulvar);
  if(r.estrusMucus) parts.push('점액 '+r.estrusMucus);
  if(r.estrusContraction) parts.push('자궁수축 '+r.estrusContraction);
  if(r.estrusMT) parts.push('MT '+r.estrusMT);
  if(r.estrusST) parts.push('ST '+r.estrusST);
  if(r.estrusOther) parts.push(r.estrusOther);
  if(parts.length) return parts.join(' · ');
  return r.estrusSign || '';
}
function rectalSummary(r){
  const parts = [];
  if(r.rectalUterus) parts.push('자궁 '+r.rectalUterus);
  if(r.rectalOvaryL) parts.push('좌난소 '+r.rectalOvaryL);
  if(r.rectalOvaryR) parts.push('우난소 '+r.rectalOvaryR);
  if(parts.length) return parts.join(' · ');
  return r.rectalExam || '';
}
function ultraSummary(r){
  const parts = [];
  if(r.ultraUterus) parts.push('자궁 '+r.ultraUterus);
  if(r.ultraOvaryL) parts.push('좌난소 '+r.ultraOvaryL);
  if(r.ultraOvaryR) parts.push('우난소 '+r.ultraOvaryR);
  if(parts.length) return parts.join(' · ');
  return r.ultrasound || '';
}

function dateNoteSummary(r){
  const parts = [];
  const preg = [];
  if((r.pregnant||'').trim())  preg.push('1차 '+r.pregnant.trim());
  if((r.pregnant2||'').trim()) preg.push('2차 '+r.pregnant2.trim());
  if((r.fetalSex||'').trim())  preg.push('성 '+r.fetalSex.trim());
  if(preg.length) parts.push('감정 '+preg.join('/'));
  if((r.calvingDate||'').trim()) parts.push('분만 '+dateOnly(r.calvingDate)+((r.calfSex||'').trim()?'('+r.calfSex.trim()+')':''));
  if((r.uterineDisease||'').trim()) parts.push('자궁: '+r.uterineDisease.trim());
  if((r.ovarianDisease||'').trim()) parts.push('난소: '+r.ovarianDisease.trim());
  // 구조화된 난소질환이 없어도 초음파 텍스트에 낭종이 있으면 우선 표시
  let extra = '';
  if(!(r.ovarianDisease||'').trim() && /낭종/.test(r.ultrasound||'')) extra = (ultraSummary(r) || r.ultrasound);
  else extra = estrusSummary(r) || ultraSummary(r) || rectalSummary(r) || r.notes || '';
  if(extra) parts.push(extra);
  return parts.join(' · ');
}

/* 진료기록 기반 자동 스케줄 계산 */
function buildAutoSchedule(owner){
  // { animalId: { date: [note, ...] } }
  const result = {};
  const add = (aid, date, note) => {
    if(!date) return;
    if(!result[aid]) result[aid] = {};
    if(!result[aid][date]) result[aid][date] = [];
    if(!result[aid][date].includes(note)) result[aid][date].push(note);
  };

  DATA.records.filter(r=>r.owner===owner).forEach(rec => {
    // 동기화 단계 자동 추가
    for(let i=1;i<=SYNC_STEPS;i++){
      const type = rec['sync'+i+'Type'];
      const date = dateOnly(rec['sync'+i+'Date']);
      if(type && date) add(rec.animalId, date, type);
    }
  });

  return result;
}

function isMobileWidth(){
  return typeof window !== 'undefined' && window.matchMedia && window.matchMedia('(max-width:768px)').matches;
}

function renderScheduleView(){
  ensureOwnerMeta(UI.owner);
  const mode = UI.schedMode || (isMobileWidth() ? 'list' : 'grid');
  const asc = (DATA.scheduleSortDir||'asc')!=='desc';
  const toggle = `<div class="sched-toolbar">
    <div class="seg sched-modetoggle">
      <button class="${mode==='list'?'active':''}" data-action="setSchedMode" data-mode="list">📋 목록</button>
      <button class="${mode==='grid'?'active':''}" data-action="setSchedMode" data-mode="grid">📊 표</button>
    </div>
    <button class="btn secondary small" data-action="toggleSchedSort" title="개체번호(3번째 그룹) 정렬">번호순 ${asc?'▲ 올림':'▼ 내림'}</button>
  </div>`;
  return toggle + (mode==='list' ? renderScheduleAgenda() : renderScheduleGrid());
}

/* 한 축주의 스케줄 항목들을 날짜순으로 모음 (표/목록 공통 데이터) */
function scheduleRowsForOwner(owner){
  ensureOwnerMeta(owner);
  const range = DATA.scheduleRange[owner];
  const dates = dateRangeArray(range.start, range.end).filter(d => d >= addDays(todayStr(),-2)); // 3일 이상 지난 일정 숨김
  const auto = buildAutoSchedule(owner);
  const ids = sortScheduleIds(Array.from(new Set([...(DATA.scheduleAnimals[owner] || []), ...Object.keys(auto)])));
  const rows = [];
  ids.forEach(aid => {
    dates.forEach(d => {
      const manual = DATA.schedule.find(s=>s.owner===owner && s.animalId===aid && s.date===d);
      const autoEntries = (auto[aid]||{})[d] || [];
      // 자동 일정인데 사용자가 숨긴 칸이면 제외 (수동 일정은 유지)
      if(!manual && autoEntries.length && isCellDismissed(owner, aid, d)) return;
      const note = manual ? manual.note : autoEntries.join(' / ');
      if(!note) return;
      rows.push({ aid, date:d, note, done:isCellDone(owner,aid,d), skipped:isCellSkipped(owner,aid,d), isAuto: !manual && !!autoEntries.length, manual: !!manual });
    });
  });
  rows.sort((a,b)=> a.date.localeCompare(b.date) || a.aid.localeCompare(b.aid));
  return rows;
}

/* 목록(날짜별) 보기 — 모바일 기본 */
function renderScheduleAgenda(){
  const range = DATA.scheduleRange[UI.owner];
  const rows = scheduleRowsForOwner(UI.owner);
  const today = todayStr();

  let body = '';
  if(!rows.length){
    body = `<div class="empty-state">이 기간에 표시할 일정이 없어요.${isAdmin()?'<br>아래 + 일정 버튼으로 추가할 수 있어요.':''}</div>`;
  } else {
    let last = '';
    rows.forEach(r => {
      if(r.date !== last){
        last = r.date;
        body += `<div class="allsched-date ${r.date===today?'allsched-today':''}">${fmtShort(r.date)} (${weekdayKr(r.date)})${r.date===today?' · 오늘':''}</div>`;
      }
      const tappable = r.manual && isAdmin();
      body += `<div class="allsched-item ${r.done?'done':''} ${r.skipped?'skipped':''} ${r.isAuto?'auto':''}" ${tappable?`data-action="editSchedItem" data-aid="${esc(r.aid)}" data-date="${r.date}" style="cursor:pointer;"`:''}>
        <span class="tag-chip sm" data-animal-id="${esc(r.aid)}">${esc(r.aid)}</span>
        <span class="allsched-note">${esc(r.note)}${r.isAuto?' <span style="font-size:10px;opacity:.7;">(자동)</span>':''}</span>
        <button class="done-btn ${r.done?'is-done':''}" data-action="cellDoneToggle" data-aid="${esc(r.aid)}" data-date="${r.date}" data-stop="1" title="함(완료)">${svgIcon('check',14)}</button>
        <button class="skip-btn ${r.skipped?'is-skip':''}" data-action="cellSkipToggle" data-aid="${esc(r.aid)}" data-date="${r.date}" data-stop="1" title="안 함">${svgIcon('x',14)}</button>
      </div>`;
    });
  }

  return `
    <div class="sched-agenda-bar">
      <button class="btn secondary small" data-action="shiftRange" data-dir="-7">◀ 7일</button>
      <span style="font-size:12px;color:var(--ink-soft);font-weight:700;">${range.start.slice(5)} ~ ${range.end.slice(5)}</span>
      <button class="btn secondary small" data-action="shiftRange" data-dir="7">7일 ▶</button>
      <button class="btn secondary small" data-action="extendRange">+7일</button>
      ${isAdmin()?`<button class="btn small" data-action="addSchedItem" style="margin-left:auto;">+ 일정</button>`:''}
      ${(()=>{ const n=Object.keys(DATA.dismissedCells||{}).filter(k=>k.startsWith(UI.owner+'|')).length; return (isAdmin()&&n)?`<button class="btn secondary small" data-action="restoreDismissed" title="숨긴 자동 일정 모두 복원">${svgIcon('undo',14)} 숨김 ${n} 복원</button>`:''; })()}
    </div>
    <div class="sched-agenda">${body}</div>
  `;
}

function renderScheduleGrid(){
  const range = DATA.scheduleRange[UI.owner];
  const dates = dateRangeArray(range.start, range.end).filter(d => d >= addDays(todayStr(),-2)); // 3일 이상 지난 일정 숨김
  const today = todayStr();

  // 자동생성 스케줄 계산 (동기화 단계 + 발정 예측)
  const auto = buildAutoSchedule(UI.owner);
  const animalIds = sortScheduleIds(Array.from(new Set([...(DATA.scheduleAnimals[UI.owner] || []), ...Object.keys(auto)])));

  const header = `<th class="corner">개체번호</th>` + dates.map(d => `
    <th class="${isWeekend(d)?'weekend':''} ${d===today?'today':''}">${fmtShort(d)}<br>${weekdayKr(d)}</th>
  `).join('');

  const bodyRows = animalIds.map(aid => {
    const safeId = aid.replace(/\s+/g,'_');
    const cells = dates.map(d => {
      const manual = DATA.schedule.find(s=>s.owner===UI.owner && s.animalId===aid && s.date===d);

      if(!manual && autoEntries.length && isCellDismissed(UI.owner, aid, d)) autoEntries = [];  // 숨긴 자동 일정
      const autoText = autoEntries.join(' / ');
      const displayVal = manual ? manual.note : autoText;
      const isAuto = !manual && !!autoText;
      const done = isCellDone(UI.owner, aid, d);
      const skipped = isCellSkipped(UI.owner, aid, d);
      const hasContent = !!(displayVal);
      return `<td class="sched-cell ${d===today?'today':''} ${isAuto?'auto':''} ${done&&hasContent?'done':''} ${skipped&&hasContent?'skipped':''}">
        <div class="sched-cell-inner">
          <input type="text" id="sc_${safeId}_${d}" data-aid="${esc(aid)}" data-date="${d}" value="${esc(displayVal)}" ${isAuto?'placeholder="'+esc(autoText)+'"':''}>
          ${hasContent?`<div class="sched-cell-btns">
            <button class="done-btn ${done?'is-done':''}" data-action="cellDoneToggle" data-aid="${esc(aid)}" data-date="${d}" title="함(완료)">${svgIcon('check',14)}</button>
            <button class="skip-btn ${skipped?'is-skip':''}" data-action="cellSkipToggle" data-aid="${esc(aid)}" data-date="${d}" title="안 함">${svgIcon('x',14)}</button>
          </div>`:''}
        </div>
      </td>`;
    }).join('');
    return `<tr>
      <td class="rowhead">
        <div class="rowhead-inner">
          <span class="tag-chip sm" data-animal-id="${esc(aid)}">${esc(aid)}</span>
          <button class="iconbtn" data-action="removeScheduleAnimal" data-id="${esc(aid)}">${svgIcon('x',14)}</button>
        </div>
      </td>

============================================================ */
function renderPregCheckView(){
  const today = todayStr();
  const animals = ownerAnimals();
  const rows = [];
  animals.forEach(a => {
    const allRecs = DATA.records.filter(r=>r.owner===UI.owner && r.animalId===a.animalId);
    const aiRecs = allRecs.filter(r=>r.aiDate).sort((x,y)=> sortKeyOf(y) - sortKeyOf(x));
    const sorted = allRecs.slice().sort((x,y)=> sortKeyOf(y) - sortKeyOf(x));
    // 감정은 '가장 최근 수정 이후'의 것만 현재 상태로 인정 (지난 수정의 감정은 무시)
    const latestAiTs = aiRecs.length ? sortKeyOf(aiRecs[0]) : -Infinity;
    const diagPool = sorted.filter(r => sortKeyOf(r) >= latestAiTs);
    const preg1 = (lastNonEmpty(diagPool,'pregnant')||'').trim();
    const preg2 = (lastNonEmpty(diagPool,'pregnant2')||'').trim();
    const fsex  = (lastNonEmpty(diagPool,'fetalSex')||'').trim();
    // 수정기록도 없고 감정 표기도 전혀 없으면 제외
    if(!aiRecs.length && !preg1 && !preg2 && !fsex && !latestCalvingDate(allRecs)) return;
    const aiRec = aiRecs[0] || null;
    const aiD = aiRec ? dateOnly(aiRec.aiDate) : '';
    const days = aiD ? Math.floor((new Date(today+'T00:00') - new Date(aiD+'T00:00')) / 86400000) : null;
    const isPreg = isCurrentlyPregnant(allRecs);
    const calved = calvedAfterPregnancy(allRecs);
    const calvRec = latestCalvingRec(allRecs);
    const calvDate = calvRec ? dateOnly(calvRec.calvingDate) : '';
    const calfSex = calvRec ? (calvRec.calfSex||'') : '';
    const expCalv = dateOnly(lastNonEmpty(sorted,'expectedCalving')||'');
    const recordForEdit = sorted.find(r => (r.pregnant||r.pregnant2||r.fetalSex||r.calvingDate)) || aiRec || sorted[0];
    rows.push({ animalId: a.animalId, record: recordForEdit, aiDate: aiRec ? aiRec.aiDate : null, days,
      pregnant: preg1, preg1, preg2, fsex, isPreg, calved, calvDate, calfSex, expCalv, fattening: !!a.fattening });
  });
  rows.sort((x,y)=> (y.days==null?-1:y.days) - (x.days==null?-1:x.days));

  const pregnant = rows.filter(r => r.isPreg);
  const active   = rows.filter(r => !r.isPreg);

  const renderRow = row => {
    const p1 = (row.preg1||'').trim().toUpperCase();
    const p2 = (row.preg2||'').trim().toUpperCase();
    const isNotPregnant = p1==='X' && !row.isPreg && !row.calved;
    const needsCheck = !row.fattening && !row.preg1 && !row.calved && row.days!=null && row.days>=30;
    let rowClass = '';
    if(row.calved) rowClass='confirmed';
    else if(row.isPreg) rowClass='confirmed';
    else if(isNotPregnant) rowClass='notpregnant';
    else if(needsCheck) rowClass='overdue';

    const tags = [];
    if(row.preg1) tags.push(`<span class="preg-tag ${p1==='O'?'pos':(p1==='X'?'neg':'rechk')}">1차 ${esc(row.preg1)}</span>`);
    if(p1!=='X'){   // 1차 X면 2차·성감정은 의미 없으니 숨김
      if(row.preg2) tags.push(`<span class="preg-tag ${p2==='O'?'pos':(p2==='X'?'neg':'rechk')}">2차 ${esc(row.preg2)}</span>`);
      if(row.fsex)  tags.push(`<span class="preg-tag sex">성 ${esc(row.fsex)}</span>`);
    }

    let badge = '';
    if(row.calved){
      const pp = daysBetween(row.calvDate, todayStr());
      const vwp = row.fattening ? '' : (pp < VWP_DAYS ? `재수정 대기 D-${VWP_DAYS-pp}` : '재수정 가능');
      tags.length = 0; // 분만완료 행은 분만 정보 위주로
      tags.push(`<span class="preg-tag calf">분만 ${fmtShort(row.calvDate)}</span>`);
      if(row.calfSex) tags.push(`<span class="preg-tag sex">송아지 ${esc(row.calfSex)}</span>`);
      if(vwp) tags.push(`<span class="preg-tag ${pp<VWP_DAYS?'rechk':'pos'}">${vwp}</span>`);
      badge = `<span class="pc-badge done">분만완료</span>`;
    } else if(row.isPreg){
      if(row.expCalv){
        const dd = daysBetween(todayStr(), row.expCalv);
        if(dd >= 0){
          badge = `<span class="pc-badge preg">${fmtShort(row.expCalv)} 분만 D-${dd}</span>`;
        } else {
          rowClass='overdue';
          badge = `<span class="pc-badge warn">${fmtShort(row.expCalv)} 분만 확인</span>`;
        }
      } else {
        badge = `<span class="pc-badge unknown">임신중</span>`;
      }
    } else if(needsCheck){
      badge = `<span class="pc-badge check">임신감정 필요</span>`;
    }

    // 보조 상태 (비육전환 / 재수정 대기) — 메인 배지와 같은 모양·크기
    let subTag = '';
    if(row.fattening) subTag = `<span class="pc-badge fatten">비육전환</span>`;
    else if(isNotPregnant) subTag = `<span class="pc-badge rebreed">재수정 대기</span>`;

    return `
    <div class="pregcheck-row ${rowClass} ${row.fattening?'fattened':''}" data-action="editRecord" data-id="${esc(row.record.id)}">
      <span class="tag-chip" data-animal-id="${esc(row.animalId)}">${esc(row.animalId)}</span>
      <span class="pregcheck-mid">
        <span class="pregcheck-date">${row.aiDate?('<span class="pcd-prefix">수정일 </span>'+fmtShort(row.aiDate)):'수정기록 없음'}</span>
        ${row.calved && row.calvDate?`<span class="pregcheck-days">분만 ${daysBetween(row.calvDate, todayStr())}일 경과</span>`:(row.days!=null && !row.calved?`<span class="pregcheck-days">${row.days}일 경과</span>`:'')}
        <span class="preg-tags">${tags.join('')}</span>
      </span>
      <span class="pregcheck-end">${badge}${subTag}</span>
    </div>
  `;
  };

  const activeHtml = active.map(renderRow).join('') || `<div class="empty-state">해당 개체가 없어요.</div>`;
  const pregnantHtml = pregnant.map(renderRow).join('') || `<div class="empty-state">임신 확인된 개체가 없어요.</div>`;

  // 수태율: 임신감정(O/X)이 난 라운드 중 '그 라운드의 수정을 내가 한 것'만 집계.
  //   (감정은 감정한 날, 내수정횟수는 수정한 날에 적힐 수 있으므로 — 같은 줄이 아니어도
  //    개체별 날짜순으로 보며 '직전 수정' 기록의 내수정 여부로 내 라운드인지 판정)
  const dkeyP = r => dateOnly(r.examDate || r.aiDate || r.estrusDate || '');
  const inh = r => String((r.inHouseAiCount!=null && r.inHouseAiCount!=='') ? r.inHouseAiCount : (r.inHouseAi||'')).trim();
  const inhN = r => { const n = parseInt(inh(r),10); return isNaN(n) ? 0 : n; };
  const pregOf = r => (r.pregnant||'').trim().toUpperCase();
  const allByAnimal = {};
  DATA.records.filter(r=>r.owner===UI.owner).forEach(r => { (allByAnimal[r.animalId] = allByAnimal[r.animalId] || []).push(r); });

  let totalServices = 0, svcSuccess = 0;   // 분모: 내가 수정한 라운드의 감정 수 / 분자: 그중 O
  let fsSuccess = 0, fsTotal = 0;          // 첫수정 수태율
  Object.values(allByAnimal).forEach(list => {
    list.sort((a,b)=> dkeyP(a).localeCompare(dkeyP(b)));
    // 수정횟수대비 수태율 — 각 감정(O/X)을 직전 수정의 내수정 여부와 연결
    let lastAiMine = null;   // 가장 최근 수정(aiDate)을 내가 했는지
    list.forEach(r => {
      if(r.aiDate) lastAiMine = inhN(r) >= 1;
      const p = pregOf(r);
      if(p==='O' || p==='X'){
        let mine = lastAiMine;
        if(mine===null) mine = inhN(r) >= 1;   // 직전 수정이 없으면 감정 기록 자체의 내수정 사용
        if(mine){ totalServices++; if(p==='O') svcSuccess++; }
      }
    });
    // 첫수정 수태율 — '내수정 1' 실제수정이 분모(결과 난 사이클만), 재수정 없이 O면 성공
    const firstIdx = [];
    list.forEach((r,i)=>{ if(inh(r)==='1' && r.aiDate) firstIdx.push(i); });
    firstIdx.forEach((startI, k) => {
      const endI = (k+1 < firstIdx.length) ? firstIdx[k+1] : list.length;
      const cycle = list.slice(startI, endI);
      const hasResult = cycle.some(r => pregOf(r)==='O' || pregOf(r)==='X');
      if(!hasResult) return;
      fsTotal++;
      const hasReAI = cycle.some(r => inhN(r) >= 2);
      const hasO = cycle.some(r => pregOf(r)==='O');
      if(!hasReAI && hasO) fsSuccess++;
    });
  });
  const rateSvc = totalServices ? Math.round(svcSuccess / totalServices * 100) : 0;
  const avgServices = svcSuccess ? (totalServices / svcSuccess).toFixed(1) : '—';
  const rateFirst = fsTotal ? Math.round(fsSuccess / fsTotal * 100) : 0;

  const pf = UI.pregFilter || 'all';   // all | active | pregnant
  const showActive = (pf==='all' || pf==='active');
  const showPreg   = (pf==='all' || pf==='pregnant');

  return `
    <div class="panel">
      <div class="preg-summary five preg-five">
        <div class="preg-stat clickable ${pf==='active'?'sel':''}" data-action="setPregFilter" data-filter="active">
          <div class="preg-stat-num">${active.length}</div>
          <div class="preg-stat-label">임신감정 대상</div>
        </div>
        <div class="preg-stat pregcol clickable ${pf==='pregnant'?'sel':''}" data-action="setPregFilter" data-filter="pregnant">
          <div class="preg-stat-num">${pregnant.length}</div>
          <div class="preg-stat-label">임신중</div>
        </div>
        <div class="preg-stat ratecol2">
          <div class="preg-stat-num">${rateSvc}%</div>
          <div class="preg-stat-label">수정횟수대비 수태율 <span class="preg-stat-sub">수태 ${svcSuccess} / 수정 ${totalServices}</span></div>
        </div>
        <div class="preg-stat ratecol">
          <div class="preg-stat-num">${rateFirst}%</div>
          <div class="preg-stat-label">첫수정 수태율 <span class="preg-stat-sub">수태 ${fsSuccess} / 첫수정 ${fsTotal}</span></div>
        </div>
        <div class="preg-stat">
          <div class="preg-stat-num">${avgServices}<span style="font-size:14px;font-weight:700;">회</span></div>
          <div class="preg-stat-label">수태당 수정횟수 <span class="preg-stat-sub">수정 ${totalServices} / 수태 ${svcSuccess}</span></div>
        </div>
      </div>
      ${pf!=='all'?`<div class="filter-note">‘${pf==='active'?'임신감정 대상':'임신중'}’만 보는 중 · <button class="filter-clear" data-action="setPregFilter" data-filter="all">전체 보기</button></div>`:''}
      ${showActive?`<div class="section-title"><span>임신감정 대상 (${active.length}두)</span></div>
      <div class="pregcheck-list">${activeHtml}</div>`:''}
      ${showPreg?`<div class="section-title" ${showActive?'style="margin-top:26px;"':''}><span>🐄 임신중 (${pregnant.length}두)</span></div>
      <div class="pregcheck-list">${pregnantHtml}</div>`:''}
    </div>
  `;
}

/* ===== 공태관리: 미수정 개체의 다음 발정예정일 모음 ===== */
function nextEstrusForAnimal(a, recs){
  // 1순위: 수기로 적어둔 '다음발정일'
  const cycleLen = parseInt(a.cycleLength,10) || 21;
  const today = todayStr();
  const project = (d) => { // 오늘 지난 예정일은 주기 더해 미래로
    let x = dateOnly(d); let guard=0;
    while(x < today && guard++ < 60){ x = addDays(x, cycleLen); }
    return x;
  };
  const manual = manualNextEstrus(recs);
  if(manual) return { date: project(manual), basis:'수기', cycleLen };
  // 2순위: 발정주기 추정으로 다음 발정일 계산
  const est = estimateCycleToday(a, recs);
  if(est && typeof est.day==='number' && est.baseDate){
    const daysToEstrus = (est.cycleLen - est.day) % est.cycleLen;
    return { date: addDays(today, daysToEstrus), basis:'추정', cycleLen: est.cycleLen };
  }
  return null; // 정보없음
}
function renderOpenView(){
  const owner = UI.owner;
  const animals = DATA.animals.filter(a=>a.owner===owner);
  const today = todayStr();
  const withDate = [];
  const noInfo = [];
  animals.forEach(a => {
    const recs = recordsOf(owner, a.animalId).sort((x,y)=> sortKeyOf(y)-sortKeyOf(x));
    const st = shareAnimalStatus(owner, a).status;
    // 공태(빈 자궁) 대상: 미수정 + 비임신(재수정 대기). 임신중/비육전환/감정대기 제외
    if(st!=='미수정' && st!=='비임신') return;
    if(a.fattening) return;
    if(awaitingPregOutcome(recs)) return;
    const nx = nextEstrusForAnimal(a, recs);
    if(nx){
      const dd = daysBetween(today, nx.date);
      withDate.push({ a, date:nx.date, dd, basis:nx.basis, st });
    } else {
      noInfo.push({ a, st });
    }
  });
  withDate.sort((x,y)=> x.date.localeCompare(y.date));
  noInfo.sort((x,y)=> animalNumKey(x.a.animalId)-animalNumKey(y.a.animalId));

  const total = withDate.length + noInfo.length;
  if(total===0){
    return `<div class="open-wrap"><div class="open-head"><h2>공태관리</h2></div>
      <div class="empty-msg">미수정 상태인 개체가 없어요.</div></div>`;
  }

  const ddLabel = dd => dd<=0 ? `<span class="open-dd today">오늘! D-0</span>`
    : `<span class="open-dd">D-${dd}</span>`;

  const rowsHtml = withDate.map(({a,date,dd,basis,st}) => `
    <div class="open-row oneline" data-action="gotoAnimalDetail" data-id="${esc(a.animalId)}">
      <div class="open-id">${esc(a.animalId)}</div>
      <div class="open-name">${esc(animalShortName(a))}</div>
      <div class="open-due">${fmtShort(date)} ${ddLabel(dd)}</div>
      <div class="open-chev">›</div>
    </div>`).join('');

  const noInfoHtml = noInfo.map(({a,st}) => `
    <div class="open-row oneline noinfo" data-action="gotoAnimalDetail" data-id="${esc(a.animalId)}">
      <div class="open-id">${esc(a.animalId)}</div>
      <div class="open-name">${esc(animalShortName(a))}</div>
      <div class="open-due muted">정보없음</div>
      <div class="open-chev">›</div>
    </div>`).join('');

  return `<div class="open-wrap">
    <div class="open-head"><h2>공태관리</h2><span class="open-count">${total}마리</span></div>
    <div class="open-sub">미수정 개체의 다음 발정예정일이에요. 줄을 누르면 개체 상세로 이동해요.</div>
    <div class="open-list">${rowsHtml}${noInfoHtml}</div>
  </div>`;
}
/* 개체번호에서 정렬용 숫자 키 (마지막 숫자그룹) */
function animalNumKey(id){
  const m = String(id||'').match(/(\d+)(?!.*\d)/);
  return m ? parseInt(m[1],10) : 999999;
}
/* 개체 짧은 이름 (번호 뒤 라벨이 있으면 사용, 없으면 번호) */
function animalShortName(a){
  return a.name || a.animalId || '';
}

function renderDiseaseView(){
  const dkey = r => dateOnly(r.examDate || r.aiDate || r.estrusDate || '');
  const allDiseaseRecs = DATA.records
    .filter(r => r.owner===UI.owner && (((r.uterineDisease||'').trim()) || ((r.ovarianDisease||'').trim()) || recHasCyst(r)))
    .sort((a,b)=> (dkey(b)||'').localeCompare(dkey(a)||''));

  // 호전된 개체는 목록에서 제외 (표시만 제외, 데이터는 보존)
  // 호전 정의: 가장 최근 진료에서 낭종 없음, 또는 자궁질환이 치료완료 처리됨
  const isImprovedRec = r => {
    const latest = animalRecords(r.animalId)[0];
    const hasUt = (r.uterineDisease||'').trim();
    const hasCyst = recHasCyst(r);
    // 낭종 기록인데 최신 진료에 낭종 없음 → 호전
    if(hasCyst && latest && !recHasCyst(latest)) return true;
    // 자궁질환인데 치료완료 플래그 → 호전
    if(hasUt && r.uterineResolved) return true;
    return false;
  };
  const recs = allDiseaseRecs.filter(r => !isImprovedRec(r));

  const uterineCount = recs.filter(r => (r.uterineDisease||'').trim()).length;
  const ovaryCount   = recs.filter(r => (r.ovarianDisease||'').trim() || recHasCyst(r)).length;
  const animalsSet   = new Set(recs.map(r=>r.animalId));

  const df = UI.diseaseFilter || 'all';   // all | uterine | ovary
  const matchFilter = r => {
    if(df==='all') return true;
    const hasUt = (r.uterineDisease||'').trim();
    if(df==='uterine') return hasUt;
    if(df==='ovary') return (r.ovarianDisease||'').trim() || recHasCyst(r);
    return true;
  };
  const filteredRecs = recs.filter(matchFilter);

  const rows = filteredRecs.map(r => {
    const d = dkey(r);
    const tags = [];
    if((r.uterineDisease||'').trim()){
      tags.push(`<span class="disease-tag uterine">${esc(r.uterineDisease.trim())}</span>`);
    }
    if((r.ovarianDisease||'').trim()){
      tags.push(`<span class="disease-tag ovary">${esc(r.ovarianDisease.trim())}</span>`);
    } else if(recHasCyst(r)){
      tags.push(`<span class="disease-tag ovary">${esc(cystType(r))}</span>`);
    }
    return `
    <div class="disease-row" data-action="editRecord" data-id="${esc(r.id)}">
      <span class="tag-chip" data-animal-id="${esc(r.animalId)}">${esc(r.animalId)}</span>
      <span class="disease-date">${d?fmtShort(d):'—'}</span>
      <span class="disease-tags">${tags.join('')}</span>
    </div>`;
  }).join('') || `<div class="empty-state">등록된 질환 기록이 없어요.</div>`;

  return `
    <div class="panel">
      <div class="preg-summary disease-three">
        <div class="preg-stat">
          <div class="preg-stat-num">${animalsSet.size}</div>
          <div class="preg-stat-label">질환 개체</div>
        </div>
        <div class="preg-stat ratecol clickable ${df==='uterine'?'sel':''}" data-action="setDiseaseFilter" data-filter="uterine">
          <div class="preg-stat-num">${uterineCount}</div>
          <div class="preg-stat-label">자궁질환</div>
        </div>

/* ===== 구조화 초음파 난소 입력 ===== */
const OVARY_TYPES = ['난포','황체','낭종','소난포들'];
let ovaryState = {};   // { ultraOvaryL:{items,type,free}, ultraOvaryR:{...} }
function parseOvary(val){
  const items=[]; const leftover=[];
  String(val||'').split(',').map(s=>s.trim()).filter(Boolean).forEach(part=>{
    let matched=false;
    for(const t of OVARY_TYPES){
      // 소난포들: 크기 없음, 뒤에 비고 가능
      if(t==='소난포들'){
        const m0 = part.match(/^소난포들(?:\s+(.+))?$/);
        if(m0){ items.push({type:t,size:'',note:(m0[1]||'').trim()}); matched=true; break; }
        continue;
      }
      const m = part.match(new RegExp('^'+t+'\\s*(\\d+(?:\\.\\d+)?)\\s*mm(?:\\s+(.+))?$'));
      if(m){ items.push({type:t,size:m[1],note:(m[2]||'').trim()}); matched=true; break; }
    }
    if(!matched) leftover.push(part);
  });
  return { items, free: leftover.join(', ') };
}
function ovaryCombined(key){
  const st = ovaryState[key]; if(!st) return '';
  const parts = st.items.map(it => {
    let s = it.type;
    if(it.size) s += ' ' + it.size + 'mm';
    if(it.note) s += ' ' + it.note;
    return s;
  });
  if(st.free && st.free.trim()) parts.push(st.free.trim());
  return parts.join(', ');
}
function ovaryChipsHtml(key){
  const st = ovaryState[key]; if(!st) return '';
  return st.items.map((it,i)=>`<span class="ov-chip">${esc(it.type)}${it.size?' '+esc(it.size)+'mm':''}${it.note?' '+esc(it.note):''}<span class="ov-x" data-action="ovaryDel" data-key="${key}" data-i="${i}">${svgIcon('x',12)}</span></span>`).join('');
}
function ovarySync(key){
  const hid = document.getElementById('f_'+key); if(hid) hid.value = ovaryCombined(key);
  const box = document.getElementById('ovchips_'+key); if(box) box.innerHTML = ovaryChipsHtml(key);
}
function ovaryInput(label, key, val){
  const parsed = parseOvary(val);
  ovaryState[key] = { items: parsed.items, type:'난포', free: parsed.free };
  const segs = OVARY_TYPES.map(t=>`<button type="button" class="ov-seg ${t==='난포'?'on':''}" data-action="ovaryType" data-key="${key}" data-ovtype="${t}">${t}</button>`).join('');

  </div>`;

/* 프로토콜 버튼: 단계별 type 채우고, 1번 날짜가 있으면 오프셋 날짜 자동 계산 */
function applySyncProtocol(name){
  const p = SYNC_PROTOCOLS[name];
  if(!p) return;
  for(let i=1;i<=SYNC_STEPS;i++){
    const typeEl = document.getElementById('f_sync'+i+'Type');
    const dateEl = document.getElementById('f_sync'+i+'Date');
    const timeEl = document.getElementById('f_sync'+i+'Time');
    if(!typeEl) continue;
    if(i <= p.steps.length){
      typeEl.value = p.steps[i-1];
    } else {
      typeEl.value = '';
      if(dateEl) dateEl.value = '';
      if(timeEl) timeEl.value = '';
    }
  }
  UI.activeSyncProtocol = name;
  const base = (document.getElementById('f_sync1Date')||{}).value || '';
  if(base) fillSyncProtocolDates(name, base);
  toast(`${name} 적용 — 1번 날짜를 넣으면 나머지가 자동 계산돼요.`);
}
function fillSyncProtocolDates(name, base){
  const p = SYNC_PROTOCOLS[name];
  if(!p || !base) return;
  for(let i=1;i<=p.steps.length;i++){
    const dateEl = document.getElementById('f_sync'+i+'Date');
    if(dateEl) dateEl.value = addDays(base, p.offsets[i-1]);
  }
}
function clearSyncSteps(){
  UI.activeSyncProtocol = null;
  for(let i=1;i<=SYNC_STEPS;i++){
    const typeEl = document.getElementById('f_sync'+i+'Type');
    const dateEl = document.getElementById('f_sync'+i+'Date');
    const timeEl = document.getElementById('f_sync'+i+'Time');
    if(typeEl) typeEl.value = '';
    if(dateEl) dateEl.value = '';
    if(timeEl) timeEl.value = '';
  }
  toast('동기화 단계를 모두 비웠어요.');
}
function syncSummary(r){
  const parts = [];
  for(let i=1;i<=SYNC_STEPS;i++){
    const type = r['sync'+i+'Type'];
    const date = r['sync'+i+'Date'];
    if(type) parts.push(`${i}) ${type}${date?' '+fmtShort(date):''}`);
  }
  return parts.join(' · ');
}
function firstSyncDate(r){
  for(let i=1;i<=SYNC_STEPS;i++){
    const type = r['sync'+i+'Type'];
    const date = r['sync'+i+'Date'];
    if(type && date) return date;
  }
  return null;
}
function parseDT(str){
  if(!str) return null;
  const datePart = str.slice(0,10);
  const timePart = str.length>10 ? str.slice(11,16) : '00:00';
  const [y,m,d] = datePart.split('-').map(Number);
  const [hh,mm] = timePart.split(':').map(Number);
  return new Date(y, m-1, d, hh, mm);
}
function ownerAnimalsFor(owner){
  return DATA.animals.filter(a=>a.owner===owner).sort((a,b)=>a.animalId.localeCompare(b.animalId));

}

function actionCalcInterval(){
  const sd = combineDT(document.getElementById('f_estrusDate_date').value, document.getElementById('f_estrusDate_time').value);
  const ad = combineDT(document.getElementById('f_aiDate_date').value, document.getElementById('f_aiDate_time').value);
  if(!sd || !ad){ toast('발정일시와 수정일시를 먼저 입력해주세요.'); return; }
  const t1 = parseDT(sd), t2 = parseDT(ad);
  let diffMin = Math.round((t2-t1)/60000);
  const neg = diffMin<0; diffMin = Math.abs(diffMin);
  const days = Math.floor(diffMin/1440), hours = Math.floor((diffMin%1440)/60), mins = diffMin%60;
  const parts = [];
  if(days) parts.push(days+'일');
  if(hours) parts.push(hours+'시간');
  if(!days && mins) parts.push(mins+'분');
  document.getElementById('f_aiInterval').value = (neg?'-':'') + (parts.join(' ') || '0분');
}

function actionSaveRecord(){
  const owner = modalCtx.owner;
  const animalId = (modalCtx.presetAnimalId || (document.getElementById('f_animalId')||{}).value || '').trim();
  if(!animalId){ toast('개체번호를 입력해주세요.'); return; }
  const g = id => document.getElementById(id);
  const rec = {
    id: modalCtx.id || uid(owner+'-rec'),
    owner, animalId,
    examDate: combineDT(g('f_examDate_date').value, g('f_examDate_time').value),
    estrusDate: combineDT(g('f_estrusDate_date').value, g('f_estrusDate_time').value),
    aiDate: combineDT(g('f_aiDate_date').value, g('f_aiDate_time').value),
    doubleAi: (g('f_doubleAi')||{value:''}).value==='1',
    aiDate2: ((g('f_doubleAi')||{value:''}).value==='1') ? combineDT((g('f_aiDate2_date')||{value:''}).value, (g('f_aiDate2_time')||{value:''}).value) : null,
    aiInterval: g('f_aiInterval').value.trim(),
    nextEstrusDate: g('f_nextEstrusDate').value || null,
    expectedCalving: g('f_expectedCalving').value || null,
    expectedCycle: g('f_expectedCycle').value.trim(),
    pregnant: g('f_pregnant').value.trim(),
    pregnant2: (g('f_pregnant2')||{value:''}).value.trim(),
    fetalSex: (g('f_fetalSex')||{value:''}).value.trim(),
    calvingDate: (g('f_calvingDate')||{value:''}).value || null,
    calfSex: (g('f_calfSex')||{value:''}).value.trim(),
    estrusVulvar: g('f_estrusVulvar').value.trim(),
    estrusMucus: g('f_estrusMucus').value.trim(),
    estrusContraction: g('f_estrusContraction').value.trim(),
    estrusMT: (g('f_estrusMT')||{value:''}).value.trim(),
    estrusST: (g('f_estrusST')||{value:''}).value.trim(),
    estrusOther: g('f_estrusOther').value.trim(),
    rectalUterus: g('f_rectalUterus').value.trim(),
    rectalHorn: modalCtx.legacy.rectalHorn,
    rectalOvaryL: g('f_rectalOvaryL').value.trim(),
    rectalOvaryR: g('f_rectalOvaryR').value.trim(),
    ultraUterus: g('f_ultraUterus').value.trim(),
    ultraHorn: modalCtx.legacy.ultraHorn,
    ultraOvaryL: g('f_ultraOvaryL').value.trim(),
    ultraOvaryR: g('f_ultraOvaryR').value.trim(),
    uterineDisease: (g('f_uterineDisease')||{value:''}).value.trim(),
    uterineResolved: !!((g('f_uterineResolved')||{}).checked),
    ovarianDisease: (g('f_ovarianDisease')||{value:''}).value.trim(),
    estrusSign: modalCtx.legacy.estrusSign,
    rectalExam: modalCtx.legacy.rectalExam,
    ultrasound: modalCtx.legacy.ultrasound,
    hormoneTreatment: g('f_hormoneTreatment').value.trim(),
    notes: g('f_notes').value.trim(),
    recordParity: modalCtx.legacy.recordParity,
    aiCount: g('f_aiCount').value.trim(),
    inHouseAiCount: g('f_inHouseAiCount').value.trim(),
    farmAiCount: g('f_farmAiCount').value.trim(),
    kpn: g('f_kpn').value.trim(),
    aiOrder: modalCtx.legacy.aiOrder,
    inHouseAi: modalCtx.legacy.inHouseAi,
    carcass: modalCtx.legacy.carcass,
    ribeye: modalCtx.legacy.ribeye,
    backfat: modalCtx.legacy.backfat,
    marbling: modalCtx.legacy.marbling,
  };
  for(let i=1;i<=SYNC_STEPS;i++){
    rec['sync'+i+'Type'] = g('f_sync'+i+'Type').value;
    rec['sync'+i+'Date'] = combineDT(g('f_sync'+i+'Date').value, g('f_sync'+i+'Time').value);
  }
  ensureAnimalExists(owner, animalId);
  // 동기화 단계가 있으면 스케줄에 보이도록 개체 등록 + 기간 확장
  const syncDates = [];
  for(let i=1;i<=SYNC_STEPS;i++){
    if(rec['sync'+i+'Type'] && rec['sync'+i+'Date']) syncDates.push(dateOnly(rec['sync'+i+'Date']));
  }
  if(syncDates.length){
    ensureOwnerMeta(owner);
    if(!DATA.scheduleAnimals[owner].includes(animalId)) DATA.scheduleAnimals[owner].push(animalId);
    const rng = DATA.scheduleRange[owner];
    syncDates.forEach(d => { if(d < rng.start) rng.start = d; if(d > rng.end) rng.end = d; });
  }
  const prevRec = DATA.records.find(x=>x.id===rec.id);
  const oldCalv = prevRec ? dateOnly(prevRec.calvingDate||'') : '';
  const newCalv = dateOnly(rec.calvingDate||'');
  const oldAi = prevRec ? (prevRec.aiDate||'') : '';
  const newAi = rec.aiDate || '';
  const idx = DATA.records.findIndex(x=>x.id===rec.id);
  // 자동 +1 기준값은 '이 기록을 제외한' 현재 수정횟수
  const baseAiCount = (()=>{
    const animal = DATA.animals.find(a=>a.owner===owner && a.animalId===animalId);
    if(!animal) return 0;
    return currentAiCount(animal, DATA.records.filter(r=>r.owner===owner && r.animalId===animalId && r.id!==rec.id));
  })();
  if(idx>-1) DATA.records[idx] = rec; else DATA.records.push(rec);

  // 분만일 자동 처리: 분만일이 '새로' 들어오면 산차 +1, 최근분만일 자동 갱신
  let parityBumped = false, aiBumped = false;
  if(newCalv){
    const animal = DATA.animals.find(a=>a.owner===owner && a.animalId===animalId);
    if(animal){
      if(!oldCalv){                                  // 빈 값 → 분만일 입력 (신규 분만)
        const p = parseInt(animal.parity,10);
        animal.parity = String((isNaN(p)?0:p) + 1);
        animal.aiCountCurrent = '0';                  // 분만하면 수정횟수 리셋 (다음 수정부터 0)
        parityBumped = true;
      }
      const latest = latestCalvingDate(DATA.records.filter(r=>r.owner===owner && r.animalId===animalId));
      if(latest) animal.lastCalving = latest;        // 최근분만일 = 기록 중 가장 최근 분만일
    }
  }
  // 수정일(aiDate)이 '새로' 들어오면 현재 수정횟수 자동 +1 (같은 저장에서 분만 리셋이 일어나면 제외)
  if(newAi && !oldAi && !(newCalv && !oldCalv)){
    const animal = DATA.animals.find(a=>a.owner===owner && a.animalId===animalId);
    if(animal){ animal.aiCountCurrent = String(baseAiCount + 1); aiBumped = true; }
  }
  saveState();
  closeModal();
  UI.selectedAnimal = animalId;
  renderMain();
  const msgs = [];
  if(parityBumped) msgs.push('산차 +1·최근분만일 갱신');
  if(aiBumped) msgs.push('수정횟수 +1');
  toast(msgs.length ? '기록 저장 · '+msgs.join(' · ') : '기록을 저장했어요.');
}

function actionSaveAnimal(){
  const owner = modalCtx.owner;
  const newId = document.getElementById('f_animalId').value.trim();
  if(!newId){ toast('개체번호를 입력해주세요.'); return; }
  const oldId = modalCtx.originalId;
  const dup = DATA.animals.find(a=>a.owner===owner && a.animalId===newId && a.animalId!==oldId);
  if(dup){ toast('이미 존재하는 개체번호예요.'); return; }
  const fields = {
    breed: (document.getElementById('f_breed')||{}).value || '한우',
    sire: document.getElementById('f_sire').value.trim(),
    damSire: document.getElementById('f_damSire').value.trim(),
    damDamSire: document.getElementById('f_damDamSire').value.trim(),
    birth: document.getElementById('f_birth').value || null,
    parity: document.getElementById('f_parity').value.trim(),
    lastCalving: document.getElementById('f_lastCalving').value || null,
    aiDifficulty: document.getElementById('f_aiDifficulty').value,
    aiDifficultyNote: document.getElementById('f_aiDifficultyNote').value.trim(),
    waveMode: (document.getElementById('f_waveMode')||{}).value || '2',
    cycleLength: (document.getElementById('f_cycleLength')||{}).value.trim() || '21',
    manualCycleDay: (document.getElementById('f_manualCycleDay')||{}).value.trim(),
    aiCountCurrent: (document.getElementById('f_aiCountCurrent')||{}).value.trim(),
  };
  if(oldId===null){
    DATA.animals.push({ animalId:newId, owner, ...fields });
    UI.selectedAnimal = newId;
  } else {
    const a = DATA.animals.find(x=>x.owner===owner && x.animalId===oldId);
    Object.assign(a, fields);
    if(newId!==oldId){
      a.animalId = newId;
      DATA.records.forEach(r=>{ if(r.owner===owner && r.animalId===oldId) r.animalId=newId; });
      DATA.schedule.forEach(s=>{ if(s.owner===owner && s.animalId===oldId) s.animalId=newId; });
      const sidx = DATA.scheduleAnimals[owner].indexOf(oldId);
      if(sidx>-1) DATA.scheduleAnimals[owner][sidx]=newId;
      if(UI.selectedAnimal===oldId) UI.selectedAnimal=newId;
    }
  }
  saveState();
  closeModal();
  renderMain();
  toast('개체정보를 저장했어요.');
}

function actionDeleteAnimal(ds){
  const owner = UI.owner, id = ds.id;

}

<div class="modal-sub" style="margin-bottom:6px;">${svgIcon('dna',16)} 기초 생리 — 호르몬·발정주기·난포파</div>
<div class="grass-section-title"><span class="gst-wrap"><span class="gst-main">${svgIcon('dna',15)} 1. 번식 호르몬과 내분비 축</span><span class="gst-sub">시상하부–뇌하수체–난소 축, 8대 호르몬의 작용과 스테로이드 생성</span></span></div>
<div class="rb-block"><div class="rb-sub">번식은 하나의 되먹임 회로다</div>
<p class="rb-p">시상하부가 GnRH를 &quot;펄스(pulse)&quot;로 내보내면 뇌하수체 전엽이 LH와 FSH를 분비한다. 이 둘이 난소로 가서 난포를 키우고 배란시키며 스테로이드(에스트라디올·프로게스테론)를 만들게 한다. 난소가 만든 스테로이드는 다시 위로 올라가 GnRH·LH 분비를 조절한다. 이 되먹임 고리가 주기 내내 호르몬 농도를 출렁이게 만들고, 그 출렁임이 겉으로 드러난 것이 곧 발정주기다. 호르몬은 극미량으로 작동하기 때문에 농도·타이밍·표적세포의 수용체 상태가 모두 맞아떨어져야 효과가 난다. 호르몬 제제를 &quot;분명히 줬는데 안 듣는&quot; 일이 흔한 이유가 여기 있다 — 난포·황체·자궁의 상태와 처치 타이밍이 어긋나면 같은 약도 듣지 않는다.</p>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">화학적 분류</span></div><ul><li>스테로이드: 에스트라디올(E2)·프로게스테론(P4)·테스토스테론</li><li>펩티드·단백: GnRH·LH·FSH·옥시토신·인히빈</li><li>지방산: PGF2α</li></ul></div>
<div class="rb-sub">8대 호르몬의 작용 (하나씩 제대로)</div>
<div class="rb-h">GnRH — 회로의 최상위 지령</div>
<p class="rb-p">뇌하수체의 생식선자극호르몬(LH·FSH) 분비를 담당하는 유일한 시상하부 신경펩티드다. 펄스성으로 방출되어 LH 펄스를 그대로 끌어낸다. 이 펄스를 만들어내는 발생기(pacemaker)가 시상하부 궁상핵의 키스펩틴 신경세포인데, 키스펩틴·뉴로키닌B·다이노르핀을 함께 내보내기 때문에 KNDy 뉴런이라 부른다. 영양·에너지 정보가 바로 이 KNDy 회로로 들어와 번식의 on/off를 결정한다 — 소가 굶으면 다이노르핀이 키스펩틴을 눌러 GnRH 펄스가 줄고 번식이 멈춘다. 반대로 체지방이 늘면 거기서 나오는 렙틴이 올라가는데, 이 렙틴이 일정 수준(역치)을 넘으면 &quot;에너지가 충분하다&quot;는 신호가 되어 비로소 회로가 정상 작동한다(그 선에 못 미치면 회로는 켜지지 않는다). 어린 소가 언제 사춘기에 이르는지, 분만한 소가 언제 다시 발정을 보이는지가 영양 상태에 크게 좌우되는 것도 바로 이 KNDy 회로 때문이다.</p>
<div class="rb-h">LH — 펄스(pulse)와 서지(surge), 두 얼굴</div>
<p class="rb-p">LH는 평소엔 펄스(pulse)성으로 분비되다가 배란 직전 한 번 크게 터지는 급증(서지, surge)을 이룬다. 펄스상 LH는 우성 난포의 최종 성숙과 황체의 발육·유지를 맡고, 난포에서 프레그네놀론·프로게스테론·안드로겐 생산을 촉진한다. 서지상 LH는 배란을 일으킨다. 황체기에는 P4가 높아 LH 펄스가 4~6시간에 한 번꼴로 드물어 평균 LH가 낮게 깔리고, 황체용해로 P4가 떨어지면 LH 펄스가 시간당 한 번 이상으로 잦아진다 — 이 펄스 빈도의 변화야말로 발정주기를 굴리는 핵심 스위치다. 이 배란전 서지를 터뜨리는 방아쇠가 바로 에스트라디올(E2)이다. 우성 난포가 키운 고농도 E2가 역치를 넘어 일정 시간 지속되면, 평소의 음성 되먹임이 양성으로 뒤집혀 GnRH가 대량 방출되고 그것이 LH 서지로 이어진다(자세한 조건은 아래 E2 항목). 단, P4가 낮게 깔려 있어야 이 양성 되먹임이 작동하므로, 황체용해로 P4가 떨어진 난포기에서야 서지가 터진다.</p>
<div class="rb-h">FSH — 난포파의 시동</div>
<p class="rb-p">FSH는 난포파를 시작시킨다. 난소의 과립막세포에 작용해 방향화효소(aromatase)를 켜서, 협막세포가 만든 안드로겐을 에스트로겐으로 바꾸게 한다. 동시에 과립막세포에 LH 수용체가 생기도록 자극한다. 난포가 자라면서 내놓는 E2와 인히빈이 거꾸로 FSH 농도를 떨어뜨리는데, 이 FSH 하강이 곧 편차(deviation) — 우성 난포 하나만 살아남고 나머지는 퇴화하는 분기점이다(자세한 기전은 3장).</p>
<div class="rb-h">에스트라디올(E2) — 발정의 호르몬, 양날의 되먹임</div>
<p class="rb-p">우성 난포에서 분비되며 발정 행동을 일으킨다(발정 개시 시점에 최고조). 핵심은 시상하부·뇌하수체에 음성·양성 되먹임을 상황에 따라 정반대로 발휘한다는 것이다. E2가 낮거나 중간일 때는 음성 되먹임으로 작동해 GnRH·LH 펄스를 눌러 둔다. 그러다 우성 난포가 자라 E2가 일정 역치를 넘어서면 되먹임의 부호가 뒤집혀 양성으로 전환되고, 거꾸로 GnRH·LH 분비를 자극한다. 단지 역치를 넘는 것만으로는 부족하고, 그 고농도가 일정 시간(대략 반나절 이상) 지속돼야 비로소 배란성 LH 서지가 터진다. 발정 12~18시간 전에 E2가 역치를 넘는다는 2장의 타임라인이 바로 이 &quot;지속&quot; 조건을 가리킨다. 같은 고농도 E2라도 P4가 높게 깔려 있으면(황체기) 양성 되먹임이 차단되어 서지가 일어나지 않는다. 황체용해로 P4가 떨어진 뒤라야 E2의 양성 되먹임이 작동한다 — 동기화에서 P4 제제를 빼야 발정·배란이 열리는 이유가 이것이다. 다만 P4의 역할은 &quot;높을 때 차단&quot;에 그치지 않는다 — 그 전에 P4가 한동안 깔려 이 양성 되먹임 회로를 미리 길들여 둬야(예비점화) 나중에 P4가 빠졌을 때 비로소 서지가 터진다. 그래서 P4가 한 번도 깔린 적 없으면 낮아도 서지가 불발된다(P4 항목 참조). 음성 되먹임(펄스 억제)은 주로 시상하부 궁상핵의 KNDy 회로에서 일어나고, 양성 되먹임(서지)은 시상하부 전시각교차전핵(AVPV·preoptic 영역)의 키스펩틴 뉴런이 활성화되며 일어난다 — 같은 E2가 작용하는 부위에 따라 정반대 결과를 내는 셈이다. 되먹임 외에 E2는 자궁내막의 옥시토신 수용체 수를 늘려 황체용해를 미리 준비시킨다. 그리고 인히빈과 함께 다른 난포들의 퇴화를 촉진한다. 농도가 오르면 FSH를 낮춘다.</p>
<div class="rb-h">프로게스테론(P4) — 주기의 브레이크이자 임신의 토대</div>
<p class="rb-p">황체에서 나오는 임신 유지 호르몬이자 발정주기의 브레이크다. 임신 후기에는 태반도 P4를 만들지만, 소는 약 200일까지는 황체가 P4 공급을 책임지므로 초기 임신은 전적으로 황체에 달려 있다. 중추에서 P4는 LH 펄스 빈도를 눌러(황체기 4~6시간에 1회) 우성 난포가 과도하게 성숙·배란하는 것을 막는다. 동시에 E2의 양성 되먹임(서지)을 차단하므로, 황체기에는 E2가 높아도 LH 서지가 터지지 않는다(E2 4조건 ③과 같은 축). 이 억제는 용량 의존적이라, P4가 어중간하게 낮으면 LH 억제가 풀려 우성 난포가 멈추지도 배란하지도 못한 채 계속 자라 낭종이 된다(3장). 한편 P4의 중추 작용에는 정반대 얼굴이 하나 더 있다 — 황체기 동안 한동안 깔린 P4는 당장의 서지는 막지만, 동시에 시상하부의 E2 양성 되먹임 회로(서지를 일으키는 AVPV 키스펩틴)를 미리 길들여 둔다(예비점화, priming). 그래서 서지가 터지려면 &quot;P4가 깔렸다가 → 빠지는&quot; 두 박자가 필요하다 — 한동안 깔린 적이 있어야 회로가 준비되고, 그 뒤 빠져야 비로소 E2가 서지를 터뜨린다. 한 번도 P4가 충분히 깔린 적 없는 소(사춘기 전 미경산우, 황체가 안 생긴 낭종 소)는 이 예비점화가 없어 E2가 있어도 서지가 안 터진다(3장; 사양·육성의 사춘기 편).</p>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">프라이밍(예비점화) — 한눈에</span></div><ul><li>원리 — E2가 LH 서지를 터뜨리려면, 서지를 일으키는 시상하부 회로(AVPV 키스펩틴)가 먼저 P4에 길들여져 있어야(프라이밍) 한다</li><li>두 박자 — ① P4가 한동안 깔림(프라이밍) → ② P4가 빠짐 → ③ 그제야 E2가 서지를 터뜨려 배란</li><li>결핍 ① 사춘기 전 미경산우 — P4를 겪은 적이 없어 프라이밍이 안 됨 → E2를 만들어도 자발 배란 못 함(사양·육성의 사춘기 편)</li><li>결핍 ② 난포낭종 — 황체가 안 생겨 P4가 쭉 낮아 프라이밍이 빠짐 → E2가 있어도 서지 불발, 난포가 계속 커짐(3장)</li><li>임상 레버 — 빠진 프라이밍을 P4 제제(질내 CIDR·프로게스틴)로 채운다 → 사춘기 유도·낭종 치료. 동기화는 P4를 넣었다 빼며 이 두 박자를 인위로 재현하는 것</li></ul></div>
<p class="rb-p">자궁에서는 두 가지 일을 한다. 첫째, 자궁근의 수축을 억제해(자궁 정온) 임신 내내 자궁을 잠재워 둔다 — 분만이 다가와 P4가 떨어지면 이 브레이크가 풀린다. 둘째, 자궁내막 분비선을 자극해 &quot;자궁유(uterine milk)&quot;를 내어 착상 전 배아에 영양을 댄다. 그래서 수정 후 초기 P4가 높을수록 영양막이 잘 자라고 인터페론 타우(IFN-τ) 분비가 늘어 수태율이 오른다(8장 P4 보충 효과와 직결). 혈중 P4 농도는 황체 크기와 잘 비례한다 — 직장검사·초음파에서 황체 크기로 그 소의 P4(황체 기능)를 가늠하는 근거다(5·9장). 임상에서는 우유·혈중 P4 측정으로 황체 유무·임신 여부·무발정의 원인을 감별하고, 외인성 P4(질내 유치형 CIDR)로 발정을 억제했다가 제거해 동기화에 활용한다(10장).</p>
<div class="rb-h">PGF2α — 황체를 무너뜨리는 자궁의 신호</div>
<p class="rb-p">자궁내막에서 펄스성으로 분비되는 황체용해 인자다. 자궁정맥에서 난소동맥으로 직접 넘어가는 국소 역류 경로로 고농도가 되어 황체에 작용한다. 주기 16~17일경, 옥시토신이 자궁내막의 옥시토신 수용체와 결합하면서 터져 나온다. 임신이 성립하려면 바로 이 PGF2α의 분비를 막아야 한다(8장 IFN-τ).</p>
<div class="rb-h">옥시토신</div>
<p class="rb-p">시상하부(실방핵·시삭상핵)에서 만들어져 뇌하수체 후엽에 저장됐다가, 유두 자극이나 자궁·자궁경관의 기계적 자극에 반응해 방출되는 펩타이드 호르몬이다. 대표 작용은 평활근 수축이다 — 비유에서는 유선포를 감싼 근상피세포를 수축시켜, 유선포에 고인 유즙을 유관·유조로 짜내는 사유(milk let-down)를 일으킨다. 단 유즙 &quot;생산&quot;은 프로락틴의 몫이고, 옥시토신은 이미 만들어진 유즙을 &quot;내보내는&quot; 역할만 한다. 자궁에서는 분만 진통·태아 만출·태반 배출을 돕고, 교배 후 정자의 자궁→난관 수송도 거든다. 이 자궁 감수성은 스테로이드가 좌우해 E2가 높으면 올라가고 P4가 높으면 내려간다 — 발정우(저P4·고E2)의 자궁을 직장검사로 만지면 자궁이 꽉 수축하거나 사유가 비치는 반면, 황체우는 그렇지 않은 이유다. 자궁내막 옥시토신 수용체와 결합해 내막 PGF2α 분비를 일으킨다. 이 수용체가 주기 16~17일경 늘어 발정 시 최고조에 이르므로, 옥시토신–PGF2α–황체용해의 방아쇠가 바로 이 시기에 당겨진다.</p>
<div class="rb-h">인히빈</div>
<p class="rb-p">우성 난포의 과립막세포에서 나와 FSH 방출을 억제한다. 난포파 초기엔 작은 난포들이 내는 인히빈 A가, 이후엔 우성 난포의 E2가 FSH를 누르는 주역을 맡는다.</p>
<div class="rb-sub">스테로이드는 어떻게 만들어지나 — 2세포설</div>
<p class="rb-p">난포의 스테로이드 생성은 두 세포의 분업이다. 바깥쪽 협막세포가 LH 자극을 받아 콜레스테롤로부터 안드로겐을 만든다. 안쪽 과립막세포가 FSH 자극으로 방향화효소를 켜 그 안드로겐을 에스트라디올로 바꾼다. 그래서 충분한 E2가 나오려면 협막(LH)과 과립막(FSH)이 둘 다 제대로 작동해야 한다.</p>
<div class="rb-clinical"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v6M9 5h6M6 9v4a6 6 0 0 0 12 0V9"/><path d="M6 9H4M18 9h2"/><circle cx="12" cy="19" r="2"/></svg><span class="rb-tag">임상</span><span class="rb-tt">이 분업을 알면 풀린다</span></div><div class="rb-cc-b">&quot;왜 FSH만으로는 발정이 안 오는가&quot;, &quot;왜 우성 난포가 8mm에서 과립막에 LH 수용체를 갖추는 것이 생존의 열쇠인가&quot;가 이 2세포설에서 곧바로 설명된다 — LH 수용체를 얻은 우성 난포는 FSH가 낮아져도 LH로 계속 자라며 E2를 뿜을 수 있다.</div></div></div>
<div class="rb-block"><div class="rb-sub">기타 호르몬 — AMH·프로락틴</div>
<div class="rb-h">항뮬러관 호르몬(AMH) — 난소에 남은 난포 수의 지표</div>
<p class="rb-p">난포의 과립막세포(주로 전포상·초기 포상난포)에서 나오는 TGF-β 계열 호르몬이다. 원래 기능은 배아 발생기에 뮬러관(난관·자궁이 될 관) 형성을 억제하는 것이지만, 번식 임상에서 주목받는 쓰임새는 따로 있다. 혈중 AMH 농도가 난소 안의 포상난포 수(AFC)를 그대로 반영한다 — AFC가 많을수록 AMH가 높다. 게다가 발정주기 단계에 거의 영향을 받지 않아, 아무 때나 한 번 채혈해도 그 소의 &quot;난소 예비능&quot;을 안정적으로 가늠할 수 있다. 그래서 AMH가 높은 소일수록 과배란 처치에 잘 반응해 회수되는 난자·수정란 수가 많다(예: 채란 시 황체 15개 초과가 기대되는 컷오프 ≈ 123.5 pg/mL). 공란우(도너) 선발에 활용할 수 있다. 나아가 어린 시기(생후 11~15개월)의 AMH가 낮은 소는 초산 이후 도태율이 높고 산유량도 낮은 경향이 있어, 생애 생산성·우군에 남길 소의 선발 지표로도 검토된다. 단 너무 높아도 마냥 좋지만은 않고, 사양·영양·혈통에 따라 반응이 달라지므로 AMH 하나만으로 단정하긴 어렵다.</p>
<div class="rb-h">프로락틴(PRL) — 유즙 생산의 스위치</div>
<p class="rb-p">뇌하수체 전엽의 락토트로프에서 나오는 단백 호르몬으로, 분비는 시상하부의 도파민(억제)과 TRH·VIP(촉진)로 조절된다. E2·P4·성장호르몬·갑상선·부신피질 호르몬과 협동해 유선을 발육시키고 유즙 생산·분비를 자극한다. 단 이미 만든 유즙을 짜내는 사유(let-down)는 PRL이 아니라 옥시토신의 몫이다. 분만 전후 1일쯤 혈중 PRL이 일시적으로 확 오르는데, 이 상승을 막으면 이후 산유량이 크게 떨어진다 — 즉 이 PRL 급등을 비유(유즙 생산) 개시의 스위치로 본다. 다만 번식주기 쪽 역할은 동물 종마다 다르다. 개·고양이·설치류에선 황체를 유지·자극하지만, 소에서는 PRL을 억제해도 LH·P4·황체기 길이·발정기 E2 등에 영향이 없어 — 소의 발정주기 동태에는 관여하지 않는 것으로 본다.</p></div>
<div class="grass-section-title"><span class="gst-wrap"><span class="gst-main">${svgIcon('refresh',15)} 2. 발정주기 개관과 호르몬 동태</span><span class="gst-sub">21일 주기의 호르몬 서사, LH 펄스·서지, 임상 3대 타임라인</span></span></div>
<div class="rb-block"><div class="rb-sub">발정주기를 호르몬 이야기로 읽기</div>
<p class="rb-p">소의 발정주기는 평균 21일(실제 17~24일)이고, 그 전체가 결국 호르몬 네 축—GnRH/LH/FSH와 난소의 E2·P4—이 서로 밀고 당기는 한 편의 이야기다. 발정 당일을 0일로 잡는다. 발정은 난포가 자라며 E2가 올라와 생긴다. 이 E2 농도가 발정 12~18시간 전에 역치를 넘으면 배란전 GnRH 급증이 터지고 따라서 LH 급증이 일어난다. LH 급증의 시작은 대개 발정 시작과 맞물린다. 자연발정에서는 발정 시작 24~30시간 후, GnRH로 유도하면 약 30시간 후에 배란한다 — 인공수정 적기를 따질 때 이 30시간이 기준점이다. 배란이 끝나면 E2가 뚝 떨어지고, 비어버린 난포의 세포들이 황체로 바뀌어 P4를 만들기 시작해 배란 8일쯤 뒤 최고에 이른다. 황체기에는 P4가 높아 LH 펄스가 4~6시간에 한 번꼴로 드물고 평균 LH가 낮게 깔린다. 그러다 16~17일경 자궁내막에서 황체용해성 PGF2α가 터져 황체를 무너뜨리면 P4가 떨어진다. 누르고 있던 뚜껑이 열리는 셈이라 LH 펄스가 시간당 1회꼴로 잦아지고, 이 늘어난 생식선자극호르몬이 난포를 키우고 E2를 올려 결국 발정과 배란으로 간다. 이 구간이 난포기다.</p>
<div class="rb-caution"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg><span class="rb-tag">주의</span><span class="rb-tt">왜 발정 관찰을 18~24일에 폭넓게 하나</span></div><div class="rb-cc-b">&quot;21일&quot;은 평균값일 뿐이다. 미수정우의 발정주기는 18~24일 범위에서 관찰되고, 미경산우는 조금 짧게(19~20일), 고산차 경산우는 조금 길게(22~23일) 회귀하는 경향이 있다. 같은 소도 매번 1~2일씩 달라진다. 게다가 현대 고능력 착유우는 평균보다 하루 정도 주기가 길어졌을 가능성이 있어, 수정우는 25~26일까지 재발정을 확인해야 한다.</div></div>
<div class="rb-sub">LH 펄스 vs 서지 — 같은 호르몬, 다른 일</div>
<p class="rb-p">LH가 발정주기에서 두 가지 전혀 다른 일을 한다는 점을 분리해 이해해야 한다. 펄스(pulse)상 분비는 우성 난포와 황체를 천천히 키우는 일을 하고, 그 빈도는 P4에 의해 좌우된다(황체기 저빈도 → 황체용해 후 고빈도). 반면 서지(surge)상 분비는 충분히 높아진 E2가 시상하부에 양성 되먹임을 걸 때 한 번 크게 터져 배란을 일으킨다. 같은 LH지만, 펄스는 &quot;성장&quot;, 서지는 &quot;배란&quot;이다. 이 둘을 한 사슬로 꿰면 발정주기 전체가 한눈에 들어온다. LH 펄스의 빈도는 P4가 쥐고 있다 — 황체기(고P4)엔 4~6시간에 한 번꼴로 드물어 우성 난포가 끝까지 성숙하지 못하고, 황체용해로 P4가 떨어지면(난포기) 시간당 한 번 이상으로 잦아진다. 잦아진 펄스가 우성 난포를 성숙시켜 E2를 끌어올리고, 충분히 높아진 E2를 시상하부가 감지하면 LH 서지가 터져 배란이 일어난다. 결국 P4가 &quot;LH 펄스 빈도&quot;라는 손잡이로 언제 난포를 익히고 언제 배란시킬지를 조절하는 셈이며, 이 펄스→서지 전환이 발정주기를 굴리는 핵심 엔진이다.</p>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">발정주기를 굴리는 한 사슬 — 한눈에</span></div><ul><li>P4 하강 → LH 펄스 빈도↑ → 우성난포 성숙 → E2↑ → (시상하부 감지) → LH 서지 → 배란</li><li>거꾸로, 황체기엔 고P4 → 펄스 저빈도 → 우성난포 성숙도 LH 서지도 차단된다</li></ul></div>
<div class="rb-sub">임상 3대 타임라인 (외우면 동기화가 다 풀린다)</div>
<p class="rb-p">발정주기 생리를 임상으로 끌어내리면 호르몬 제제의 반응 시간 세 가지로 압축된다. 이 셋을 몸에 익히면 10장의 모든 동기화 프로토콜이 이 타임라인의 조합으로 보인다.</p>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">① GnRH 기준</span></div><ul><li>GnRH 투여 → 24~32시간(평균 28~30h) 후 배란</li><li>동시에 난포 모집이 일어나 평균 2일 후(3~5일 내) 새 난포파 발생</li></ul></div>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">② PGF2α 기준</span></div><ul><li>PGF2α 투여 → 12~24h 후 황체용해 → 24h 후 P4 최저점(nadir) → 48~72h 후 발정</li><li>전체적으로 보통 투여 후 3~5일에 발정</li></ul></div>

<div class="grass-section-title"><span class="gst-wrap"><span class="gst-main">${svgIcon('refresh',15)} 3. 난포파와 황체 동태</span><span class="gst-sub">난포파·편차·우성난포 선택, FSH 엔진, PGF 저항성, 동난포 수</span></span></div>
<div class="rb-block"><div class="rb-sub">난포파 한 번의 흐름</div>
<p class="rb-p">소의 난소를 이해하는 핵심은 난포파(follicular wave)다. 소의 난포는 물결치듯 무리지어 자라며, 한 발정주기에는 대개 이런 난포파가 두 번(2파) 또는 세 번(3파) 친다. 먼저 3~4mm짜리 작은 난포 여러 개(8~41개)가 2~3일 안에 같이 자라기 시작한다. 이틀쯤은 비슷한 속도로 크다가, 그중 하나가 계속 자라도록 선택되고(우성 난포) 나머지는 폐쇄·퇴행한다(종속 난포). 첫 난포파는 2파든 3파든 배란일(0일)에 출현한다. 두 번째 난포파는 2파 주기에서 9~10일, 3파 주기에서 8~9일에 나오고, 3파에서는 세 번째가 15~16일에 더 나온다. 황체가 살아 있어 P4가 깔려 있는 동안에는 우성 난포가 배란하지 못하고 무배란으로 폐쇄된다. 그러다 황체용해가 시작될 때 마침 떠 있던 우성 난포가 배란 난포가 된다. 즉 &quot;어느 난포파의 우성 난포가 배란하느냐&quot;는 황체용해 타이밍과 난포파 타이밍이 맞물리는 운에 가깝다.</p>
<div class="rb-sub">&quot;21일 주기&quot;는 평균일 뿐 — 2파 vs 3파</div>
<p class="rb-p">흔히 말하는 &quot;21일 주기&quot;는 평균값일 뿐 실재하지 않는다. 황체는 2파 주기에서 3파 주기보다 일찍 퇴행하기 시작해(약 16일 vs 19일) 주기 자체가 짧아진다(2파 ≈ 20일, 3파 ≈ 23일). 2파냐 3파냐를 가르는 핵심 변수는 1차 난포파 우성 난포가 얼마나 오래 우성을 유지하느냐인데, 이 기간이 2파에서 더 길다.</p>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">2파 vs 3파 — 한눈에</span></div><ul><li>주기 길이: 2파 ≈ 20일 / 3파 ≈ 23일</li><li>황체 퇴행 시작: 2파 ≈ 16일 / 3파 ≈ 19일</li><li>비율은 품종·연령보다 영양·열스트레스에 좌우 — 나쁘면 3파↑</li><li>한 마리가 한 양상을 보이면 다음 주기에도 같을 확률 70%</li></ul></div>
<div class="rb-sub">두 난소는 한 몸처럼 움직인다</div>
<p class="rb-p">한쪽 난소가 독립적으로 난포파를 갖지 않는다. 우성 난포는 종속 난포와 다음 난포파를 전신(혈류) 경로로 억제하므로, 연속되는 우성 난포가 좌우 어느 쪽에 생길지는 무작위다. 실험적으로 가장 큰 난포가 있는 난소를 떼어내면 남은 난소의 난포 발달이 살아나지만, 큰 난포가 없는 쪽을 떼면 그런 보상이 없다 — 큰 난포가 전신을 누르고 있었다는 증거다.</p>
<div class="rb-clinical"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v6M9 5h6M6 9v4a6 6 0 0 0 12 0V9"/><path d="M6 9H4M18 9h2"/><circle cx="12" cy="19" r="2"/></svg><span class="rb-tag">임상</span><span class="rb-tt">예외는 임신</span></div><div class="rb-cc-b">임신 중에는 우성 난포가 황체 반대쪽 난소에 더 자주(75~80%) 생긴다.</div></div>
<div class="rb-sub">난포파를 움직이는 엔진은 FSH</div>
<p class="rb-p">난포파가 출현하기 직전 FSH가 급증하고, 자라난 난포가 거꾸로 FSH를 눌러 다음 난포파를 막는다. FSH를 누르는 난포 산물은 인히빈과 에스트라디올인데, 난포파 첫 이틀은 작은 난포들이 만드는 인히빈 A가, 그 뒤로는 우성 난포의 에스트라디올이 주역이다. FSH는 난포파 출현 4일 후 최저를 찍고, 우성 난포가 한물갈 무렵 다시 올라와 다음 난포파 출현 12~24시간 전에 정점을 친다.</p>
<div class="rb-clinical"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v6M9 5h6M6 9v4a6 6 0 0 0 12 0V9"/><path d="M6 9H4M18 9h2"/><circle cx="12" cy="19" r="2"/></svg><span class="rb-tag">임상</span><span class="rb-tt">동기화의 원리가 여기 있다</span></div><div class="rb-cc-b">그래서 기존 우성 난포를 인위적으로 제거(GnRH로 배란시킴)하면 12시간 안에 FSH가 튀고 24시간 안에 새 난포파가 나온다. 오브싱크에서 첫 GnRH로 난포파를 새로 띄우는 원리가 바로 이것이다.</div></div>
<div class="rb-sub">우성 난포의 선택과 편차(deviation)</div>
<p class="rb-p">작은 난포(6mm 미만)는 FSH에 의존하므로 FSH가 떨어지면 대부분 2~5일 내 퇴행한다. 그런데 우성이 될 난포만은 FSH 수용체를 충분히 갖춰 FSH가 줄어도 버티고, 결정적으로 LH에 반응하는 능력을 얻어 FSH 없이도 자란다. 이 전환은 우성 난포가 8mm를 넘을 때 일어난다. 가장 큰 두 난포의 성장 곡선이 갈라지는 편차(deviation)는 미래 우성 난포가 약 8.5mm일 때, 난포파 출현 2.5일 후에 뚜렷해진다. 이렇게 선발된 제1난포파 우성 난포는 배란 직후, 황체가 아직 작아 P4가 낮은 시기에 자란다. P4가 낮으면 LH 펄스 억제가 덜하므로 직경이 15~20mm(고산차 소는 20mm 전후)까지 크게 발육하는데 — 황체기 한복판의 높은 P4 아래에서 자라는 제2·제3난포파 우성 난포보다 크다. 다만 자라는 동안 P4가 올라가 LH 펄스가 눌리므로, 제1난포파 우성 난포는 성숙·배란에 이르지 못하고 발정주기 중반(Day 10~11경)에 폐쇄된다. 폐쇄로 인히빈이 사라지면 FSH가 다시 올라 제2난포파가 출현한다 — 난포파가 주기 중 2~3번 반복되는 이유다. 원래 우성 난포를 없애거나 FSH를 넣어주면 종속 난포도 우성이 될 수 있고, 우성 난포가 둘 이상 생기는 공동우성이 이중 배란으로 이어진다. 비유 젖소에서 다배란이 흔하며(난포파의 21~36%) 고생산일수록 발생률이 높다 — 쌍태 위험과 직결된다.</p>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">편차(deviation) — 한눈에</span></div><ul><li>8mm: 과립막에 LH 수용체 발달 시작 → FSH 의존에서 LH 의존으로 전환</li><li>약 8.5mm·출현 2.5일: 우성/종속이 갈리는 편차</li><li>우성 난포 = 낮은 FSH에서 버티는 능력 + LH 반응 능력</li></ul></div>
<div class="rb-sub">프로게스테론과 난포낭종</div>
<p class="rb-p">프로게스테론은 LH 펄스를 눌러 우성 난포 성장을 용량 의존적으로 억제한다. P4가 높으면 우성 난포가 작고 단명하며 다음 난포파가 빨리 오고, 낮으면 우성 난포가 과도하게 오래 살아남는다. 바로 이게 난포낭종으로 이어진다. 여기서 LH의 두 얼굴을 구분해야 한다. P4가 낮으면 난포를 키우는 LH 펄스의 억제가 풀려 우성 난포가 계속 자란다. 그런데 배란을 일으키는 것은 펄스가 아니라 LH 서지인데, 이 서지는 E2가 역치를 넘어 충분히 지속될 때 시상하부의 양성 되먹임으로 터진다(1장 E2 ②③). 낭종에서는 난포가 E2를 만들어 발정 비슷한 징후를 보이는 소도 있지만, E2에 대한 시상하부의 양성 되먹임 반응성이 떨어져 있어 LH 서지가 불발된다 — 고비유 초기의 음에너지·스트레스가 이 반응성 저하의 흔한 배경이다. 결국 난포는 펄스로 자라기만 할 뿐 배란하지 못하고, P4도 낮아 퇴행 신호도 없어 — 배란도 퇴행도 못 한 채 계속 커져(흔히 25mm 이상이 10일 넘게 유지되며 같은 상황이 반복) 낭종이 된다. 시상하부의 E2 양성 되먹임 회로(서지를 일으키는 AVPV 키스펩틴, 1장)는 그냥 켜지지 않고, 사전에 P4에 한 번 길들여지는 &quot;예비점화(priming)&quot;가 있어야 작동한다. 낭종 소는 황체가 제대로 안 생겨 P4가 쭉 낮은 탓에 이 예비점화를 받지 못한 상태다 — E2는 있어도 그것을 서지로 바꿀 회로가 길들여지지 않은 셈이다. 이는 사춘기 전 미경산우가 E2를 만들어도 자발 배란을 못 하는 것과 같은 원리다(사양·육성의 사춘기 편). 난소 난포낭종의 근본 원인이 이 저(低)프로게스테론–과잉 LH 펄스–시상하부 E2 반응성 저하 상황이며, 혈중 P4를 올려주면(질내 P4 제제 등) 빠졌던 예비점화가 채워져 반응성이 회복되는 것이 치료의 근거가 된다.</p>
<div class="rb-sub">배란과 난모세포 성숙</div>
<p class="rb-p">황체용해로 P4가 떨어지면 음성 되먹임이 풀려 LH 펄스가 잦고 강해진다. 이 LH가 우성 난포를 최종 성숙시키고 E2를 끌어올리며 발정 행동과 LH 급증을 부른다. LH 급증 이후 여러 단백분해효소가 난포벽을 허물어 평균 30시간 뒤 난포가 터진다. 난모세포는 LH 급증 약 20시간 뒤 상당수가 성숙(제2감수분열 중기)에 도달하는데, 이게 체외수정·수정란이식에서 성숙 시간을 잡는 근거다.</p>
<div class="rb-sub">황체의 기원·공동성 황체, 그리고 PGF 저항성</div>
<p class="rb-p">배란으로 빈 난포의 과립층·협막세포가 빠르게 혈관화·황체화하면서 부풀어 황체가 된다. 혈장 P4는 황체 크기와 잘 비례한다. 현장에서 헷갈리기 쉬운 게 황체 중심의 공동(cavity)인데, 정상 황체의 40~70%가 발달 중 가운데에 액체 찬 공동을 갖는다. 초음파에서 무에코로 보이지만 P4 농도는 공동 유무와 무관하다 — 공동 있는 황체라고 기능이 떨어지는 게 아니다(황체 낭종과 혼동 금지).</p>
<div class="rb-caution"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg><span class="rb-tag">주의</span><span class="rb-tt">어린 황체의 PGF 저항성 — 임상 직결</span></div><div class="rb-cc-b">발정 후 첫 5~6일 동안은 PGF를 줘도 황체용해가 잘 안 된다. 흔히 &quot;어린 황체엔 수용체가 없어서&quot;라고들 하지만 사실 배란 2일 후부터 수용체는 있다. 진짜 차이는 양성 되먹임 고리에 있다 — 성숙 황체는 옥시토신·TNF를 끼고 내막 PGF 방출을 스스로 부르는 고리를 갖춰, PGF가 여러 번 터지며 황체용해를 끝까지 밀어붙인다. 반면 어린 황체엔 이 고리가 아직 없어 PGF 한 방에 저항한다. 그래서 어린 황체를 무너뜨리려면 반복 투여가 필요하다. 결론: PGF2α는 황체기 6일 이전(이전 발정 6일 이내, 발정 후 출혈 4일 이내)엔 권장하지 않는다.</div></div>
<div class="rb-sub">동난포 수(AFC)와 번식 상태별 난소</div>
<p class="rb-p">초음파로 세는 난포 수(antral follicle count)는 개체마다 크게 다르지만, 난포파 출현 시의 내재적 난포 수는 한 개체 안에서 매우 반복적이다 — 한 번 측정하면 그 소의 과배란 잠재력을 가늠할 수 있다. AFC가 높은 분만 후 젖소는 수태율이 더 높고 분만–수태 간격이 짧다. 반대로 임신 첫 1/3에 영양이 제한된 어미의 송아지는 AFC가 60% 낮게 태어나, 딸의 평생 가임성에까지 영향이 간다(13장 태아 프로그래밍). 번식 상태에 따라 난소 동태가 다르다. 사춘기 전 송아지도 생후 2주부터 이미 성체와 똑같이 난포파를 친다 — 부족한 건 난포파가 아니라 배란을 끌어낼 LH다. 분만 후 첫 배란 주기는 짧고(약 7.7일) 첫 황체가 작고 단명한데, 이 양상이 분만 후 주기 재개와 똑 닮았다. 임신 중에도 난포파는 계속 돌되 만기 직전 21일만 멈춘다. 노령우(15세 이상)는 FSH가 오히려 높은데도 모집되는 난포가 적고, 결정적으로 난모세포 질이 떨어져 어린 딸의 절반밖에 수정란을 못 만든다 — 수가 아니라 난자 자체의 능력이 떨어진다.</p></div>
  `;

<div class="modal-sub" style="margin-bottom:6px;">${svgIcon('clipboard',16)} 검사 — 생식기 해부·직장검사·초음파</div>
<div class="grass-section-title"><span class="gst-wrap"><span class="gst-main">${svgIcon('book',15)} 4. 생식기 해부와 직장검사 기초</span><span class="gst-sub">생식기를 흐름으로 따라가기 — 난소·난관·자궁·소구·경관</span></span></div>
<div class="rb-block"><div class="rb-sub">생식기를 흐름으로 따라가면 손끝의 지도가 그려진다</div>
<p class="rb-p">암소 생식기는 난자를 만들어 수정시키는 일과, 수정란을 품어 기르는 일 두 가지를 한다. 구조를 이 흐름으로 따라가면 직장검사 때 손끝이 더듬는 길이 그대로 머릿속에 그려진다.</p>
<p class="rb-p">배란된 난자는 난관채(fimbriae)가 받아챈다. 받아챈 난자는 누두부 바로 안쪽 팽대부(ampulla)로 들어가는데, 수정이 일어나는 곳은 자궁이 아니라 바로 여기다. 수정란은 팽대부에서 만들어진 뒤 구불구불한 협부(isthmus)를 지나 자궁각으로 내려온다.</p>
<p class="rb-p">자궁은 짧은 자궁체에 긴 자궁각 두 개가 달린 구조다. 두 각이 갈라지는 부위를 복막이 한 덩어리로 싸매고 있어서 체부가 실제보다 길어 보인다 — 직장검사에서 체부를 잡았다고 느낀 게 사실은 두 각의 시작부일 때가 많다. 자궁각은 앞으로 뻗다가 배쪽으로 꺾이고 다시 뒤로 휘어 난소 위쪽에서 끝난다. 소의 난소는 다른 종보다 골반에 더 가깝고 난소간막(mesovarium)이 짧아 자궁각을 배쪽·꼬리쪽으로 끌어당긴다 — 직장검사 때 난소와 자궁이 골반 바닥 쪽으로 아래로 휘어 매달려 있다는 게 검사의 전제다.</p>
<div class="rb-sub">난소·난관의 구조</div>
<p class="rb-p">난소는 좌우 1개씩, 길이 2~3cm이며 구조물(난포·황체)의 유무에 따라 크기가 변한다. 바깥 피질(겉질)에 난포와 황체가 들어 있고 안쪽 수질(속질)은 결합조직·혈관·신경섬유로 채워져 있다. 암컷은 사춘기가 되면 배아기에 이미 다 만들어진 &quot;유한한&quot; 난모세포 집단을 꺼내 쓰기 시작한다 — 평생 생식세포를 새로 만드는 수컷과 대조적이다.</p>
<p class="rb-p">난관은 자궁각 끝에서 뻗은 가는 관(20~25cm)으로 세 부분으로 나뉜다. 누두부(깔때기)는 복강 쪽으로 열려 있고, 팽대부는 중간의 가장 넓은 부분, 협부는 가장 좁아 자궁과 연결된다. 보통 직장검사로는 난관을 촉지하지 못한다.</p>
<ul class="rb-list"><li><b class="rb-label">난포 촉감</b> 난포액으로 찬 매끈한 구체, 물풍선 같은 파동감. 발정기 15~18mm.</li><li><b class="rb-label">황체 촉감</b> 세포가 꽉 차 고기 같은 탄력. 기능성 황체는 2.5~3.0cm, 닭가슴살 같은 적당한 부드러움.</li><li><b class="rb-label">고유난소인대</b> 2~3mm, 오독오독한 감촉. 난소 촉진 시 여포·황체 위치를 기록하는 기준이 된다.</li></ul>
<div class="rb-sub">자궁벽·소구·태반분엽 — 태반정체의 해부학</div>
<p class="rb-p">자궁벽은 바깥 장막(serosa), 중간 근층(myometrium), 안쪽 내막(endometrium) 세 겹인데, 임상에서 의미 있는 건 가장 안쪽 내막이다. 내막에는 혈관이 빽빽하게 솟은 소구(caruncle)가 점점이 박혀 있고, 임신이 되면 이 소구가 태아쪽 융모엽(cotyledon)과 단추 채우듯 맞물려 태반분엽(placentome)을 이룬다. 소 자궁에는 소구가 약 100개 있다.</p>
<div class="rb-clinical"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v6M9 5h6M6 9v4a6 6 0 0 0 12 0V9"/><path d="M6 9H4M18 9h2"/><circle cx="12" cy="19" r="2"/></svg><span class="rb-tag">임상</span><span class="rb-tt">왜 태반이 안 떨어지나</span></div><div class="rb-cc-b">태반정체로 태반이 끈질기게 안 떨어지는 이유가 바로 이 소구–융모엽 맞물림 구조에 있다.</div></div>
<div class="rb-sub">경관과 질 — 검사·수정의 기준점</div>
<p class="rb-p">자궁 바깥으로 나오면 자궁경관이 관문 역할을 한다. 단단하고 근육질이며 내강으로 돌출된 3~4개의 원형주름이 서로 맞물려 자궁 내부를 외부로부터 밀폐한다. 직장검사나 인공수정 시 경관을 찾으면 그 너머가 자궁이라는 지도가 선다 — 경관은 손끝의 기준점이다.</p>
<div class="rb-caution"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg><span class="rb-tag">주의</span><span class="rb-tt">AI 시 주의</span></div><div class="rb-cc-b">경관 너머 질에서는 자궁경이 꼬리·배쪽으로 돌출해 있어 등쪽 질천장이 배쪽보다 더 깊다. 인공수정 시 기구가 배쪽으로 미끄러지지 않도록 위쪽 45도로 넣는 이유가 이것이다.</div></div></div>
<div class="grass-section-title"><span class="gst-wrap"><span class="gst-main">${svgIcon('clipboard',15)} 5. 직장검사 실전</span><span class="gst-sub">준비·삽입·접근·촉진 판단, 크기 기준과 주기 시점 추정</span></span></div>
<div class="rb-block"><div class="rb-sub">준비와 삽입 — 직장벽을 다루는 법</div>
<p class="rb-p">직장검사는 직장에 팔을 넣어 직장벽 너머로 난소·자궁을 만져 평가하는, 기구 없이 팔 하나로 하는 단순하지만 심오한 기술이다. 먼저 자기 손가락·손바닥 폭을 재 두면 촉진으로 얻은 난포·황체 크기를 가늠할 수 있다. 손톱은 짧게, 장갑은 어깨까지, 공기는 빼고 착용하고 윤활제를 쓴다.</p>
<p class="rb-p">삽입할 때 핵심은 손가락 끝으로 직장 안을 헤집는 게 아니라, 새끼손가락 외측과 그에 이어지는 손바닥 외측을 &quot;하나의 선&quot;으로 삼아 직장벽을 넓히듯 나아가는 것이다. 손목 전체를 옆으로 회전시키며 벽을 밀어 늘리면 소의 노책(힘주기)이 줄고 부담 없이 들어간다. 가스가 차 벽이 긴장되면 주름을 검지·중지에 걸어 앞으로 당겨 연동을 자극해 가스를 뺀다. 검사 중 연동운동이나 노책이 오면 거스르지 말고 가만히 있으면 팔을 타고 지나가며, 지나간 뒤엔 벽이 부드러워져 자유롭게 움직일 수 있다.</p>
<div class="rb-sub">접근 순서: 자궁경관 → 자궁 → 난소</div>
<p class="rb-p">처음에는 랜드마크인 자궁경관을 찾는다. 손을 한쪽으로 밀어 단단하고 안으로 만곡된 골반을 느끼고 아래로 내려가면, 골반이 안 만져지는 부드러운 곳이 생식기다. 그 주변을 떠내듯 손목을 회전시키며 아래로 힘을 주면 길이 10~15cm·폭 3~5cm의, 앞뒤로 훑으면 오독오독한 단단한 관 — 자궁경관 — 이 잡힌다.</p>
<p class="rb-p">자궁경관에서 손바닥 하나 안쪽 아래에 자궁이 있다. 자궁각 사이에 손을 넣어 네 손가락을 모으고 새끼손가락 측면을 &quot;선&quot;으로 벽을 늘리며 전방으로 회전시키면 자궁각을 잡기 쉽다. 좌우 자궁각의 굵기·탄력·벽 두께를 비교한다. 난소는 자궁 위치에서 손바닥 하나만큼 좌/우로 수평 이동해 탐색하면 매끈하고 둥근 구조물로 만져진다. 손바닥으로 떠받치고 고유난소인대를 손가락 사이에 끼워 고정한 뒤 엄지·검지로 훑는다. 길을 잃으면 자궁경관으로 돌아온다.</p>
<div class="rb-sub">촉진으로 무엇을 읽나 — 자궁 수축·황체·난포</div>
<p class="rb-p">자궁 촉진에서 먼저 보는 것은 수축 유무다. 발정 시의 자궁은 강하게 조여 익힌 소시지 같은 단단함과 탄력으로 아래로 말려 있고(수축), 황체기의 자궁은 부드럽고 윤곽이 흐릿하다(이완). 발정 시라도 검사를 오래 하면 수축이 약해지므로 처음 촉진했을 때의 소견이 중요하다.</p>
<p class="rb-p">난소에서는 황체와 난포를 구별해 크기·촉감을 기록한다. 기능성 황체는 25mm 전후로 충실감과 적당한 부드러움(닭가슴살)이 있고, 퇴행 황체는 20mm 미만으로 단단하고 울퉁불퉁하다. 난포는 파동감 있는 매끈한 반구로, 10mm 미만은 단단·팽팽, 15mm 이상은 파동감이 있되 팽팽함이 약해지며, 배란 직전이면 강한 파동감에 물렁해진다.</p>
<div class="rb-caution"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg><span class="rb-tag">주의</span><span class="rb-tt">늘 의심하라</span></div><div class="rb-cc-b">난소 촉진 때 &quot;정말 황체인가? 여포일 가능성은 없는가?&quot;를 항상 의심하며 만진다. 자신감은 갖되 과신은 금물이다.</div></div>
<div class="rb-sub">난포·황체 평가의 최적 크기 (초음파 기준)</div>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">난포</span></div><ul><li>배란 가능성 높은 우성 난포: 13~16mm (최소 10mm)</li><li>17mm 이상은 과성숙 → 난자 노화·신선도 저하</li></ul></div>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">황체 — 임신 유지력 기준</span></div><ul><li>이상적 15~25mm, 가장 좋은 건 20~25mm</li><li>15mm 미만은 부적합</li><li>공동성 황체는 공동이 18mm 이하이거나 전체 면적의 40% 미만이면 정상</li></ul></div>
<div class="rb-caution"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg><span class="rb-tag">주의</span><span class="rb-tt">맥락 구분</span></div><div class="rb-cc-b">이 &quot;황체 15~25mm&quot;는 임신을 떠받칠 기능성 황체의 이상적 크기다. 수정 가부를 볼 때의 &quot;황체 20mm 미만 = 수정 OK&quot;는 발정기에 퇴행 중인 황체 기준이라 맥락이 다르다(7장).</div></div>
<div class="rb-sub">난소 소견으로 발정주기 시점 추정 (2난포파 가정)</div>
<p class="rb-p">황체 유무와 난포 개수만으로 주기의 대략적 시점을 역산할 수 있다. 이건 발정 동기화·수정 판단의 밑바탕이 된다.</p>
<div class="rb-key"><div class="rb-key-t"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span class="rb-tag">요약</span><span class="rb-tt">주기 시점 역산 (2난포파 가정, 날짜순)</span></div><ul><li>1~2일 (배란 직후): 황체 없음 · 난포 없음</li><li>3~5일: 황체 없음(형성 중) · 난포 여러 개</li><li>6~10일: 황체 있음 · 우성 난포 1개</li><li>11~12일: 황체 있음 · 뚜렷한 난포 없음</li><li>13~18일: 황체 있음 · 난포 여러 개</li><li>19~21일 (발정 임박): 황체 없음(퇴행) · 우성 난포 1개</li></ul></div>
<div class="rb-caution"><div class="rb-cc-h"><svg class="rb-bi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg><span class="rb-tag">주의</span><span class="rb-tt">한쪽만 보면 오진</span></div><div class="rb-cc-b">좌우 난소는 한 단위로 작동한다. 한쪽만 촉진하면 틀릴 수 있다 — 한쪽엔 우성 난포, 다른 쪽엔 퇴행 황체만 보일 수 있다. P4는 황체에서 나와 중추에서 GnRH를 억제하므로, 황체가 있으면 우성 난포가 있어도 배란은 차단된다.</div></div>
<div class="rb-sub">주기 단계 판단의 실전 원칙</div>
<p class="rb-p">발정주기는 세 부분으로 나눠 본다. 시작(1~5일)과 끝(19~21일)만 직장검사로 확실히 진단할 수 있고, 중앙부(5~19일)는 정확한 날짜를 알기 어렵다. 하지만 임상에선 &quot;정확한 날짜&quot;보다 &quot;어느 시기인지&quot;만 알아도 치료 방침 결정엔 충분하다. 황체 평가에서 크기는 주관적이다 — 퇴행 중이거나 형성 초기인 황체가 의외로 크게 느껴진다. 황체의 단단함(경도)이 사실상 가장 신뢰할 유일한 지표다. 부드러우면 주기 초기, 단단하면 말기에 가깝다. 황체의 &quot;샴페인 코르크&quot; 돌기가 안쪽으로 발달하면 촉진이 어려울 수 있다.</p></div>
<div class="grass-section-title"><span class="gst-wrap"><span class="gst-main">${svgIcon('activity',15)} 16. 생식기 초음파 평가</span><span class="gst-sub">임신감정·태령·생존성·쌍태·성별 / 발정주기별 자궁·난소 소견 / 난소·자궁 병리 / 동기화 CL / ET·OPU / 기형 / 아티팩트</span></span></div>
<div class="rb-block"><div class="rb-sub">임신감정 — 시기와 난소 보조</div>
<p class="rb-p">이론적으로 교배 후 21일이면 임신체를 볼 수 있으나 현장에선 보통 비실용적이다. 한 숙련 검사자 시험에서 성우 24일의 음성예측도(미임신 진단)는 89%였고(미임신 진단의 11%가 32일 재검 시 임신), 26일엔 공태의 99%를 올바로 식별했다(후보우는 24일에 같은 수준). 26일 vs 28일의 차이가 큰데, 26일 배아는 자궁벽 대비 보기 어렵고 28일 배아는 길이 1cm로 자궁액 안에서 쉽게 보인다 — 발달이 빨라 며칠만 기다려도 정확도·속도가 오른다. 단 조기 검사가 즉각적 관리 결정으로 이어지지 않으면 가치가 없다.</p>
