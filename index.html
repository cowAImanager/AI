============================================================ */
const ADMIN_KEY = 'breeding-admin';

// 현재 수정 권한(주인 구글 로그인) 여부
function isAdmin(){
  return _isOwner === true;
}

// 구글 로그인 → 주인 계정이면 수정 권한 부여
async function openAdminLogin(){
  if(typeof firebase==='undefined' || !firebase.auth){
    toast('로그인 기능을 불러오지 못했어요. 새로고침 후 다시 시도해주세요.');
    return;
  }
  try{
    const provider = new firebase.auth.GoogleAuthProvider();
    provider.setCustomParameters({ prompt: 'select_account' });
    const res = await firebase.auth().signInWithPopup(provider);
    const email = res.user && res.user.email;
    if(email !== OWNER_EMAIL){
      // 권한 없는 계정 → 다시 익명(읽기 전용)으로 되돌림
      await firebase.auth().signOut();
      await firebase.auth().signInAnonymously();
      toast('이 계정은 수정 권한이 없어요.');
      return;
    }
    toast('관리자 모드로 전환됐어요. 수정·삭제가 가능해요.');
    // _isOwner 갱신 + 화면 갱신은 onAuthStateChanged 가 처리
  }catch(e){
    console.error(e);
    if(e && e.code === 'auth/popup-closed-by-user') return;
    toast('구글 로그인이 취소되었거나 실패했어요.');
  }
}

async function logoutAdmin(){
  try{
    await firebase.auth().signOut();
    await firebase.auth().signInAnonymously();   // 읽기는 계속 되도록 익명 복귀
  }catch(e){ console.error(e); }
  if(UI.view === 'owner') UI.view = 'animal';
  toast('보기 모드로 전환됐어요.');
  // render 는 onAuthStateChanged 가 처리
}

function noAdminToast(){
  toast('🔒 관리자 모드에서만 수정할 수 있어요.');
}

      r.expectedCalving ? r.expectedCalving.slice(0,10) : '',
      r.expectedCycle || '', r.pregnant || '', r.pregnant2 || '', r.fetalSex || '',
      r.calvingDate ? r.calvingDate.slice(0,10) : '', r.calfSex || '',
      r.estrusVulvar || '', r.estrusMucus || '', r.estrusContraction || '', r.estrusOther || '',
      r.rectalUterus || '', r.rectalOvaryL || '', r.rectalOvaryR || '',
      r.ultraUterus || '', r.ultraOvaryL || '', r.ultraOvaryR || '',
      r.uterineDisease || '', r.ovarianDisease || '',
      r.hormoneTreatment || '', r.aiCount || '', r.inHouseAiCount || '',
      r.farmAiCount || '', r.kpn || '', r.notes || '',
    ];
    for(let i=1;i<=7;i++){
      row.push(r['sync'+i+'Type']||'');
      const sd = r['sync'+i+'Date'];
      row.push(sd ? sd.slice(0,10) : '');
    }
    return row;
  });
  const ws1 = XLSX.utils.aoa_to_sheet([recHeaders, ...recRows]);
  // 열 너비 자동 설정
  ws1['!cols'] = recHeaders.map((_,i) => ({ wch: i<2 ? 10 : i<10 ? 14 : 12 }));
  XLSX.utils.book_append_sheet(wb, ws1, '진료·수정 기록');

  // ── 시트 2: 개체 정보 ──
  const animalHeaders = ['축주','개체번호','품종','부','외조부','외외증조부','출생일','산차','마지막분만일','수정난이도','수정난이도메모'];
  const animalRows = DATA.animals.map(a => [
    a.owner, a.animalId, a.breed||'한우', a.sire||'', a.damSire||'', a.damDamSire||'',
    a.birth||'', a.parity||'', a.lastCalving||'',
    a.aiDifficulty||'', a.aiDifficultyNote||'',
  ]);
  const ws2 = XLSX.utils.aoa_to_sheet([animalHeaders, ...animalRows]);
  ws2['!cols'] = animalHeaders.map(h => ({ wch: h.length > 6 ? 14 : 10 }));
  XLSX.utils.book_append_sheet(wb, ws2, '개체 정보');

  // ── 시트 3: 스케줄 ──
  const schedHeaders = ['축주','개체번호','날짜','내용','완료여부'];
  const schedRows = DATA.schedule.map(s => [
    s.owner, s.animalId, s.date, s.note||'',
    DATA.completedCells && DATA.completedCells[`${s.owner}|${s.animalId}|${s.date}`] ? '완료' : '',
  ]);
  const ws3 = XLSX.utils.aoa_to_sheet([schedHeaders, ...schedRows]);
  ws3['!cols'] = [{ wch:10 },{ wch:18 },{ wch:12 },{ wch:20 },{ wch:8 }];
  XLSX.utils.book_append_sheet(wb, ws3, '스케줄');

  // 파일명: 날짜 포함
  const today = todayStr().replace(/-/g,'');
  XLSX.writeFile(wb, `번식진료기록부_${today}.xlsx`);
  toast('엑셀 파일이 다운로드됐어요.');
}

/* ============================================================
   입장 비밀번호 (전체 보기 잠금) — 0523
   · 축주가 viewer 주소를 고쳐 index로 들어오는 것 차단
   · 통과 후엔 같은 세션 동안 다시 안 물음
   · '수정'은 별도 관리자 모드(0918) 그대로
============================================================ */
const ENTRY_PASSWORD = '0523';
function showEntryGate(onPass){
  if(sessionStorage.getItem('app-entered')==='1'){ onPass(); return; }
  const ov = document.createElement('div');
  ov.id = 'entry-gate';
  ov.style.cssText = 'position:fixed;inset:0;z-index:99999;background:#0b1f1d;display:flex;align-items:center;justify-content:center;padding:24px;';
  ov.innerHTML = `
    <div style="width:100%;max-width:320px;text-align:center;font-family:'IBM Plex Sans KR',sans-serif;color:#eafaf7;">
      <div style="font-size:34px;margin-bottom:6px;">🐄</div>
      <div style="font-size:18px;font-weight:800;margin-bottom:4px;">번식진료 기록부</div>
      <div style="font-size:12.5px;color:#7fc8bf;margin-bottom:20px;">열람하려면 비밀번호를 입력하세요</div>
      <input id="entry-pw" type="password" inputmode="numeric" placeholder="비밀번호"
        style="width:100%;box-sizing:border-box;padding:13px 14px;font-size:16px;text-align:center;letter-spacing:.3em;
        border:1px solid #1f5249;border-radius:11px;background:#0f2a27;color:#fff;outline:none;">
      <div id="entry-err" style="height:16px;font-size:11.5px;color:#ff8f8f;margin:8px 0 4px;"></div>
      <button id="entry-btn" style="width:100%;padding:13px;font-size:15px;font-weight:800;border:none;border-radius:11px;
        background:#00A69C;color:#fff;cursor:pointer;">입장</button>
    </div>`;
  document.body.appendChild(ov);
  const inp = ov.querySelector('#entry-pw');
  const err = ov.querySelector('#entry-err');
  const tryPass = ()=>{
    if(inp.value === ENTRY_PASSWORD){
      sessionStorage.setItem('app-entered','1');
      ov.remove();
      onPass();
    } else {
      err.textContent = '비밀번호가 맞지 않아요.';
      inp.value=''; inp.focus();
    }
  };
  ov.querySelector('#entry-btn').addEventListener('click', tryPass);
  inp.addEventListener('keydown', e=>{ if(e.key==='Enter') tryPass(); });
  setTimeout(()=>inp.focus(), 50);
}

showEntryGate(init);
</script>
