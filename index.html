<div class="modal-sub" style="margin-bottom:6px;">${svgIcon('dna',16)} 번식학 — 소 번식 생리·진료 통합 정리</div>
<p class="rb-intro">번식 생리(호르몬·발정주기)부터 발정 관찰·직장 검사·인공수정·임신 감정·번식 장애·분만 후 회복·실전 번식 관리까지, 학습 순서대로 정리했습니다. 핵심 수치와 임상 판단 기준은 별도 박스로 강조했습니다.</p>
<div class="grass-section-title"><span class="gst-wrap"><span class="gst-main">${svgIcon('dna',15)} 1. 번식 호르몬과 내분비 축</span><span class="gst-sub">시상하부–뇌하수체–난소 축, 8대 호르몬의 작용과 스테로이드 생성</span></span></div>
<div class="rb-block"><div class="rb-sub">번식은 하나의 되먹임 회로다</div>
<p class="rb-p">소의 번식 생리는 결국 시상하부–뇌하수체–난소(성선) 축이라는 하나의 회로가 호르몬을 주고받는 이야기다. 시상하부가 GnRH를 &quot;펄스(pulse)&quot;으로 내보내면 뇌하수체 전엽이 LH와 FSH를 분비하고, 이 둘이 난소로 가서 난포를 키우고 배란시키며 스테로이드(에스트라디올·프로게스테론)를 만들게 한다. 그렇게 난소가 만든 스테로이드는 다시 위로 올라가 GnRH·LH 분비를 조절한다. 이 되먹임 고리가 주기 내내 호르몬 농도를 출렁이게 만들고, 그 출렁임이 겉으로 드러난 것이 곧 발정주기다.</p>
<p class="rb-p">호르몬은 극미량으로 작동하기 때문에 농도·타이밍·표적세포의 수용체 상태가 모두 맞아떨어져야 효과가 난다. 호르몬 제제를 &quot;분명히 줬는데 안 듣는&quot; 일이 흔한 이유가 여기 있다 — 난포·황체·자궁의 상태와 처치 타이밍이 어긋나면 같은 약도 듣지 않는다.</p>
<div class="rb-key"><div class="rb-key-t">화학적 분류</div><ul><li>스테로이드: 에스트라디올(E2)·프로게스테론(P4)·테스토스테론</li><li>펩티드·단백: GnRH·LH·FSH·옥시토신·인히빈</li><li>지방산: PGF2α</li></ul></div>
<div class="rb-sub">8대 호르몬의 작용 (하나씩 제대로)</div>
<div class="rb-h">GnRH — 회로의 최상위 지령</div>
<p class="rb-p">뇌하수체의 생식선자극호르몬(LH·FSH) 분비를 담당하는 유일한 시상하부 신경펩티드다. 펄스성으로 방출되어 LH 펄스를 그대로 끌어낸다. 이 펄스를 만들어내는 발생기(pacemaker)가 시상하부 궁상핵의 키스펩틴 신경세포인데, 키스펩틴·뉴로키닌B·다이노르핀을 함께 내보내기 때문에 KNDy 뉴런이라 부른다. 영양·에너지 정보가 바로 이 KNDy 회로로 들어와 번식의 on/off를 결정한다 — 소가 굶으면 다이노르핀이 키스펩틴을 눌러 GnRH 펄스가 줄고 번식이 멈춘다. 반대로 체지방이 늘면 거기서 나오는 렙틴이 올라가는데, 이 렙틴이 일정 수준(역치)을 넘으면 &quot;에너지가 충분하다&quot;는 신호가 되어 비로소 회로가 정상 작동한다(그 선에 못 미치면 회로는 켜지지 않는다). 어린 소가 언제 사춘기에 이르는지, 분만한 소가 언제 다시 발정을 보이는지가 영양 상태에 크게 좌우되는 것도 바로 이 KNDy 회로 때문이다.</p>
<div class="rb-h">LH — 펄스(pulse)와 서지(surge), 두 얼굴</div>
<p class="rb-p">LH는 평소엔 펄스(pulse)성으로 분비되다가 배란 직전 한 번 크게 터지는 급증(서지, surge)을 이룬다. 펄스상 LH는 우성 난포의 최종 성숙과 황체의 발육·유지를 맡고, 난포에서 프레그네놀론·프로게스테론·안드로겐 생산을 촉진한다. 서지상 LH는 배란을 일으킨다. 황체기에는 P4가 높아 LH 펄스가 4~6시간에 한 번꼴로 드물어 평균 LH가 낮게 깔리고, 황체용해로 P4가 떨어지면 LH 펄스가 시간당 한 번 이상으로 잦아진다 — 이 펄스 빈도의 변화야말로 발정주기를 굴리는 핵심 스위치다.</p>
<p class="rb-p">이 배란전 서지를 터뜨리는 방아쇠가 바로 에스트라디올(E2)이다. 우성 난포가 키운 고농도 E2가 역치를 넘어 일정 시간 지속되면, 평소의 음성 되먹임이 양성으로 뒤집혀 GnRH가 대량 방출되고 그것이 LH 서지로 이어진다(자세한 조건은 아래 E2 항목). 단, P4가 낮게 깔려 있어야 이 양성 되먹임이 작동하므로, 황체용해로 P4가 떨어진 난포기에서야 서지가 터진다.</p>
<div class="rb-h">FSH — 난포파의 시동</div>
<p class="rb-p">FSH는 난포파를 시작시킨다. 난소의 과립막세포에 작용해 방향화효소(aromatase)를 켜서, 협막세포가 만든 안드로겐을 에스트로겐으로 바꾸게 한다. 동시에 과립막세포에 LH 수용체가 생기도록 자극한다. 난포가 자라면서 내놓는 E2와 인히빈이 거꾸로 FSH 농도를 떨어뜨리는데, 이 FSH 하강이 곧 편차(deviation) — 우성 난포 하나만 살아남고 나머지는 퇴화하는 분기점이다(자세한 기전은 3장).</p>
<div class="rb-h">에스트라디올(E2) — 발정의 호르몬, 양날의 되먹임</div>
<p class="rb-p">우성 난포에서 분비되며 발정 행동을 일으킨다(발정 개시 시점에 최고조). 핵심은 시상하부·뇌하수체에 음성·양성 되먹임을 상황에 따라 정반대로 발휘한다는 점인데, 그 전환에는 단순히 &quot;높으냐&quot;만이 아니라 농도·지속시간·프로게스테론 배경·작용 부위라는 네 가지 조건이 함께 걸린다.</p>
<p class="rb-p">① 농도(역치): E2가 낮거나 중간일 때는 음성 되먹임으로 작동해 GnRH·LH 펄스를 눌러 둔다. 그러다 우성 난포가 자라 E2가 일정 역치를 넘어서면 되먹임의 부호가 뒤집혀 양성으로 전환되고, 거꾸로 GnRH·LH 분비를 자극한다.</p>
<p class="rb-p">② 지속시간: 단지 역치를 넘는 것만으로는 부족하고, 그 고농도가 일정 시간(대략 반나절 이상) 지속돼야 비로소 배란성 LH 서지가 터진다. 발정 12~18시간 전에 E2가 역치를 넘는다는 2장의 타임라인이 바로 이 &quot;지속&quot; 조건을 가리킨다.</p>
<p class="rb-p">③ 프로게스테론 배경: 같은 고농도 E2라도 P4가 높게 깔려 있으면(황체기) 양성 되먹임이 차단되어 서지가 일어나지 않는다. 황체용해로 P4가 떨어진 뒤라야 E2의 양성 되먹임이 작동한다 — 동기화에서 P4 제제를 빼야 발정·배란이 열리는 이유가 이것이다. 다만 P4의 역할은 &quot;높을 때 차단&quot;에 그치지 않는다 — 그 전에 P4가 한동안 깔려 이 양성 되먹임 회로를 미리 길들여 둬야(예비점화) 나중에 P4가 빠졌을 때 비로소 서지가 터진다. 그래서 P4가 한 번도 깔린 적 없으면 낮아도 서지가 불발된다(P4 항목 참조).</p>
<p class="rb-p">④ 작용 부위: 음성 되먹임(펄스 억제)은 주로 시상하부 궁상핵의 KNDy 회로에서 일어나고, 양성 되먹임(서지)은 시상하부 전시각교차전핵(AVPV·preoptic 영역)의 키스펩틴 뉴런이 활성화되며 일어난다 — 같은 E2가 작용하는 부위에 따라 정반대 결과를 내는 셈이다.</p>
<div class="rb-key"><div class="rb-key-t">E2 되먹임 — 두 얼굴 한눈에</div><ul><li>음성 되먹임(평소·브레이크) — E2 저~중농도 → GnRH·LH 펄스를 눌러 둔다. 자리: 시상하부 궁상핵 KNDy 회로</li><li>양성 되먹임(배란·액셀) — E2 고농도 → GnRH·LH 대량 방출(서지) → 배란. 자리: AVPV(전시각교차전핵) 키스펩틴</li><li>음성을 양성으로 뒤집는 4조건 — ① 농도(역치 넘김) ② 지속(반나절 이상) ③ P4 배경(낮고, 미리 프라이밍돼 있어야) ④ 작용 부위(궁상핵=음성 / AVPV=양성)</li><li>한 줄 — 같은 E2라도 농도·지속·P4·부위에 따라 브레이크(음성)가 액셀(양성)로 뒤집힌다</li></ul></div>
<p class="rb-p">되먹임 외에 E2는 자궁내막의 옥시토신 수용체 수를 늘려 황체용해를 미리 준비시키고, 인히빈과 함께 다른 난포들의 퇴화를 촉진하며, 농도가 오르면 FSH를 낮춘다.</p>
<div class="rb-h">프로게스테론(P4) — 주기의 브레이크이자 임신의 토대</div>
<p class="rb-p">황체에서 나오는 임신 유지 호르몬이자 발정주기의 브레이크다. 임신 후기에는 태반도 P4를 만들지만, 소는 약 200일까지는 황체가 P4 공급을 책임지므로 초기 임신은 전적으로 황체에 달려 있다.</p>
<p class="rb-p">중추에서 P4는 LH 펄스 빈도를 눌러(황체기 4~6시간에 1회) 우성 난포가 과도하게 성숙·배란하는 것을 막는다. 동시에 E2의 양성 되먹임(서지)을 차단하므로, 황체기에는 E2가 높아도 LH 서지가 터지지 않는다(E2 4조건 ③과 같은 축). 이 억제는 용량 의존적이라, P4가 어중간하게 낮으면 LH 억제가 풀려 우성 난포가 멈추지도 배란하지도 못한 채 계속 자라 낭종이 된다(3장).</p>
<p class="rb-p">한편 P4의 중추 작용에는 정반대 얼굴이 하나 더 있다 — 황체기 동안 한동안 깔린 P4는 당장의 서지는 막지만, 동시에 시상하부의 E2 양성 되먹임 회로(서지를 일으키는 AVPV 키스펩틴)를 미리 길들여 둔다(예비점화, priming). 그래서 서지가 터지려면 &quot;P4가 깔렸다가 → 빠지는&quot; 두 박자가 필요하다 — 한동안 깔린 적이 있어야 회로가 준비되고, 그 뒤 빠져야 비로소 E2가 서지를 터뜨린다. 한 번도 P4가 충분히 깔린 적 없는 소(사춘기 전 미경산우, 황체가 안 생긴 낭종 소)는 이 예비점화가 없어 E2가 있어도 서지가 안 터진다(3장·13장).</p>
<div class="rb-key"><div class="rb-key-t">프라이밍(예비점화) — 한눈에</div><ul><li>원리 — E2가 LH 서지를 터뜨리려면, 서지를 일으키는 시상하부 회로(AVPV 키스펩틴)가 먼저 P4에 길들여져 있어야(프라이밍) 한다</li><li>두 박자 — ① P4가 한동안 깔림(프라이밍) → ② P4가 빠짐 → ③ 그제야 E2가 서지를 터뜨려 배란</li><li>결핍 ① 사춘기 전 미경산우 — P4를 겪은 적이 없어 프라이밍이 안 됨 → E2를 만들어도 자발 배란 못 함(13장)</li><li>결핍 ② 난포낭종 — 황체가 안 생겨 P4가 쭉 낮아 프라이밍이 빠짐 → E2가 있어도 서지 불발, 난포가 계속 커짐(3장)</li><li>임상 레버 — 빠진 프라이밍을 P4 제제(질내 CIDR·프로게스틴)로 채운다 → 사춘기 유도·낭종 치료. 동기화는 P4를 넣었다 빼며 이 두 박자를 인위로 재현하는 것</li></ul></div>
<p class="rb-p">자궁에서는 두 가지 일을 한다. 첫째, 자궁근의 수축을 억제해(자궁 정온) 임신 내내 자궁을 잠재워 둔다 — 분만이 다가와 P4가 떨어지면 이 브레이크가 풀린다. 둘째, 자궁내막 분비선을 자극해 &quot;자궁유(uterine milk)&quot;를 내어 착상 전 배아에 영양을 댄다. 그래서 수정 후 초기 P4가 높을수록 영양막이 잘 자라고 인터페론 타우(IFN-τ) 분비가 늘어 수태율이 오른다(8장 P4 보충 효과와 직결).</p>
<p class="rb-p">혈중 P4 농도는 황체 크기와 잘 비례한다 — 직장검사·초음파에서 황체 크기로 그 소의 P4(황체 기능)를 가늠하는 근거다(5·9장). 임상에서는 우유·혈중 P4 측정으로 황체 유무·임신 여부·무발정의 원인을 감별하고, 외인성 P4(질내 유치형 CIDR)로 발정을 억제했다가 제거해 동기화에 활용한다(10장).</p>
<div class="rb-h">PGF2α — 황체를 무너뜨리는 자궁의 신호</div>
<p class="rb-p">자궁내막에서 펄스성으로 분비되는 황체용해 인자다. 자궁정맥에서 난소동맥으로 직접 넘어가는 국소 역류 경로로 고농도가 되어 황체에 작용한다. 주기 16~17일경, 옥시토신이 자궁내막의 옥시토신 수용체와 결합하면서 터져 나온다. 임신이 성립하려면 바로 이 PGF2α의 분비를 막아야 한다(8장 IFN-τ).</p>
<div class="rb-h">옥시토신</div>
<p class="rb-p">자궁내막 옥시토신 수용체와 결합해 내막 PGF2α 분비를 일으킨다. 이 수용체가 주기 16~17일경 늘어 발정 시 최고조에 이르므로, 옥시토신–PGF2α–황체용해의 방아쇠가 바로 이 시기에 당겨진다.</p>
<div class="rb-h">인히빈</div>
<p class="rb-p">우성 난포의 과립막세포에서 나와 FSH 방출을 억제한다. 난포파 초기엔 작은 난포들이 내는 인히빈 A가, 이후엔 우성 난포의 E2가 FSH를 누르는 주역을 맡는다.</p>
<div class="rb-sub">스테로이드는 어떻게 만들어지나 — 2세포설</div>
<p class="rb-p">난포의 스테로이드 생성은 두 세포의 분업이다. 바깥쪽 협막세포가 LH 자극을 받아 콜레스테롤로부터 안드로겐을 만들고, 안쪽 과립막세포가 FSH 자극으로 방향화효소를 켜 그 안드로겐을 에스트라디올로 바꾼다. 그래서 충분한 E2가 나오려면 협막(LH)과 과립막(FSH)이 둘 다 제대로 작동해야 한다.</p>
<div class="rb-clinical"><b>이 분업을 알면 풀린다</b> &quot;왜 FSH만으로는 발정이 안 오는가&quot;, &quot;왜 우성 난포가 8mm에서 과립막에 LH 수용체를 갖추는 것이 생존의 열쇠인가&quot;가 이 2세포설에서 곧바로 설명된다 — LH 수용체를 얻은 우성 난포는 FSH가 낮아져도 LH로 계속 자라며 E2를 뿜을 수 있다.</div></div>
<div class="grass-section-title"><span class="gst-wrap"><span class="gst-main">${svgIcon('refresh',15)} 2. 발정주기 개관과 호르몬 동태</span><span class="gst-sub">21일 주기의 호르몬 서사, LH 펄스·서지, 임상 3대 타임라인</span></span></div>
<div class="rb-block"><div class="rb-sub">발정주기를 호르몬 이야기로 읽기</div>
<p class="rb-p">소의 발정주기는 평균 21일(실제 17~24일)이고, 그 전체가 결국 호르몬 네 축—GnRH/LH/FSH와 난소의 E2·P4—이 서로 밀고 당기는 한 편의 이야기다. 발정 당일을 0일로 잡는다.</p>
<p class="rb-p">발정은 난포가 자라며 E2가 올라와 생긴다. 이 E2 농도가 발정 12~18시간 전에 역치를 넘으면 배란전 GnRH 급증이 터지고 따라서 LH 급증이 일어난다. LH 급증의 시작은 대개 발정 시작과 맞물린다. 자연발정에서는 발정 시작 24~30시간 후, GnRH로 유도하면 약 30시간 후에 배란한다 — 인공수정 적기를 따질 때 이 30시간이 기준점이다.</p>
<p class="rb-p">배란이 끝나면 E2가 뚝 떨어지고, 비어버린 난포의 세포들이 황체로 바뀌어 P4를 만들기 시작해 배란 8일쯤 뒤 최고에 이른다. 황체기에는 P4가 높아 LH 펄스가 4~6시간에 한 번꼴로 드물고 평균 LH가 낮게 깔린다. 그러다 16~17일경 자궁내막에서 황체용해성 PGF2α가 터져 황체를 무너뜨리면 P4가 떨어진다. 누르고 있던 뚜껑이 열리는 셈이라 LH 펄스가 시간당 1회꼴로 잦아지고, 이 늘어난 생식선자극호르몬이 난포를 키우고 E2를 올려 결국 발정과 배란으로 간다. 이 구간이 난포기다.</p>
<div class="rb-caution"><b>왜 발정 관찰을 18~24일에 폭넓게 하나</b> &quot;21일&quot;은 평균값일 뿐이다. 미수정우의 발정주기는 18~24일 범위에서 관찰되고, 미경산우는 조금 짧게(19~20일), 고산차 경산우는 조금 길게(22~23일) 회귀하는 경향이 있다. 같은 소도 매번 1~2일씩 달라진다. 게다가 현대 고능력 착유우는 평균보다 하루 정도 주기가 길어졌을 가능성이 있어, 수정우는 25~26일까지 재발정을 확인해야 한다.</div>
<div class="rb-sub">LH 펄스 vs 서지 — 같은 호르몬, 다른 일</div>
<p class="rb-p">LH가 발정주기에서 두 가지 전혀 다른 일을 한다는 점을 분리해 이해해야 한다. 펄스(pulse)상 분비는 우성 난포와 황체를 천천히 키우는 일을 하고, 그 빈도는 P4에 의해 좌우된다(황체기 저빈도 → 황체용해 후 고빈도). 반면 서지(surge)상 분비는 충분히 높아진 E2가 시상하부에 양성 되먹임을 걸 때 한 번 크게 터져 배란을 일으킨다. 같은 LH지만, 펄스는 &quot;성장&quot;, 서지는 &quot;배란&quot;이다.</p>
<p class="rb-p">이 둘을 한 사슬로 꿰면 발정주기 전체가 한눈에 들어온다. LH 펄스의 빈도는 P4가 쥐고 있다 — 황체기(고P4)엔 4~6시간에 한 번꼴로 드물어 우성 난포가 끝까지 성숙하지 못하고, 황체용해로 P4가 떨어지면(난포기) 시간당 한 번 이상으로 잦아진다. 잦아진 펄스가 우성 난포를 성숙시켜 E2를 끌어올리고, 충분히 높아진 E2를 시상하부가 감지하면 LH 서지가 터져 배란이 일어난다. 결국 P4가 &quot;LH 펄스 빈도&quot;라는 손잡이로 언제 난포를 익히고 언제 배란시킬지를 조절하는 셈이며, 이 펄스→서지 전환이 발정주기를 굴리는 핵심 엔진이다.</p>
<div class="rb-key"><div class="rb-key-t">발정주기를 굴리는 한 사슬 — 한눈에</div><ul><li>P4 하강 → LH 펄스 빈도↑ → 우성난포 성숙 → E2↑ → (시상하부 감지) → LH 서지 → 배란</li><li>거꾸로, 황체기엔 고P4 → 펄스 저빈도 → 우성난포 성숙도 LH 서지도 차단된다</li></ul></div>
<div class="rb-sub">임상 3대 타임라인 (외우면 동기화가 다 풀린다)</div>
<p class="rb-p">발정주기 생리를 임상으로 끌어내리면 호르몬 제제의 반응 시간 세 가지로 압축된다. 이 셋을 몸에 익히면 10장의 모든 동기화 프로토콜이 이 타임라인의 조합으로 보인다.</p>
<div class="rb-key"><div class="rb-key-t">① GnRH 기준</div><ul><li>GnRH 투여 → 24~32시간(평균 28~30h) 후 배란</li><li>동시에 난포 모집이 일어나 평균 2일 후(3~5일 내) 새 난포파 발생</li></ul></div>
<div class="rb-key"><div class="rb-key-t">② PGF2α 기준</div><ul><li>PGF2α 투여 → 12~24h 후 황체용해 → 24h 후 P4 최저점(nadir) → 48~72h 후 발정</li><li>전체적으로 보통 투여 후 3~5일에 발정</li></ul></div>
<div class="rb-key"><div class="rb-key-t">③ 질내 P4 제제 기준</div><ul><li>질내 P4 장치(CIDR 등) 제거 → 2~4일 후 발정</li></ul></div></div>
<div class="grass-section-title"><span class="gst-wrap"><span class="gst-main">${svgIcon('refresh',15)} 3. 난포파와 황체 동태</span><span class="gst-sub">난포파·편차·우성난포 선택, FSH 엔진, PGF 저항성, 동난포 수</span></span></div>
<div class="rb-block"><div class="rb-sub">난포파 한 번의 흐름</div>
<p class="rb-p">소의 난소를 이해하는 핵심은 난포파(follicular wave)다. 소의 난포는 물결치듯 무리지어 자라며, 한 발정주기에는 대개 이런 난포파가 두 번(2파) 또는 세 번(3파) 친다.</p>
<p class="rb-p">먼저 3~4mm짜리 작은 난포 여러 개(8~41개)가 2~3일 안에 같이 자라기 시작한다. 이틀쯤은 비슷한 속도로 크다가, 그중 하나가 계속 자라도록 선택되고(우성 난포) 나머지는 폐쇄·퇴행한다(종속 난포). 첫 난포파는 2파든 3파든 배란일(0일)에 출현한다. 두 번째 난포파는 2파 주기에서 9~10일, 3파 주기에서 8~9일에 나오고, 3파에서는 세 번째가 15~16일에 더 나온다.</p>
<p class="rb-p">황체가 살아 있어 P4가 깔려 있는 동안에는 우성 난포가 배란하지 못하고 무배란으로 폐쇄된다. 그러다 황체용해가 시작될 때 마침 떠 있던 우성 난포가 배란 난포가 된다. 즉 &quot;어느 난포파의 우성 난포가 배란하느냐&quot;는 황체용해 타이밍과 난포파 타이밍이 맞물리는 운에 가깝다.</p>
<div class="rb-sub">&quot;21일 주기&quot;는 평균일 뿐 — 2파 vs 3파</div>
<p class="rb-p">흔히 말하는 &quot;21일 주기&quot;는 평균값일 뿐 실재하지 않는다. 황체는 2파 주기에서 3파 주기보다 일찍 퇴행하기 시작해(약 16일 vs 19일) 주기 자체가 짧아진다(2파 ≈ 20일, 3파 ≈ 23일). 2파냐 3파냐를 가르는 핵심 변수는 1차 난포파 우성 난포가 얼마나 오래 우성을 유지하느냐인데, 이 기간이 2파에서 더 길다.</p>
<div class="rb-key"><div class="rb-key-t">2파 vs 3파 — 한눈에</div><ul><li>주기 길이: 2파 ≈ 20일 / 3파 ≈ 23일</li><li>황체 퇴행 시작: 2파 ≈ 16일 / 3파 ≈ 19일</li><li>비율은 품종·연령보다 영양·열스트레스에 좌우 — 나쁘면 3파↑</li><li>한 마리가 한 양상을 보이면 다음 주기에도 같을 확률 70%</li></ul></div>
<div class="rb-sub">두 난소는 한 몸처럼 움직인다</div>
<p class="rb-p">한쪽 난소가 독립적으로 난포파를 갖지 않는다. 우성 난포는 종속 난포와 다음 난포파를 전신(혈류) 경로로 억제하므로, 연속되는 우성 난포가 좌우 어느 쪽에 생길지는 무작위다. 실험적으로 가장 큰 난포가 있는 난소를 떼어내면 남은 난소의 난포 발달이 살아나지만, 큰 난포가 없는 쪽을 떼면 그런 보상이 없다 — 큰 난포가 전신을 누르고 있었다는 증거다.</p>
<div class="rb-clinical"><b>예외는 임신</b> 임신 중에는 우성 난포가 황체 반대쪽 난소에 더 자주(75~80%) 생긴다.</div>
<div class="rb-sub">난포파를 움직이는 엔진은 FSH</div>
<p class="rb-p">난포파가 출현하기 직전 FSH가 급증하고, 자라난 난포가 거꾸로 FSH를 눌러 다음 난포파를 막는다. FSH를 누르는 난포 산물은 인히빈과 에스트라디올인데, 난포파 첫 이틀은 작은 난포들이 만드는 인히빈 A가, 그 뒤로는 우성 난포의 에스트라디올이 주역이다. FSH는 난포파 출현 4일 후 최저를 찍고, 우성 난포가 한물갈 무렵 다시 올라와 다음 난포파 출현 12~24시간 전에 정점을 친다.</p>
<div class="rb-clinical"><b>동기화의 원리가 여기 있다</b> 그래서 기존 우성 난포를 인위적으로 제거(GnRH로 배란시킴)하면 12시간 안에 FSH가 튀고 24시간 안에 새 난포파가 나온다. 오브싱크에서 첫 GnRH로 난포파를 새로 띄우는 원리가 바로 이것이다.</div>
<div class="rb-sub">우성 난포의 선택과 편차(deviation)</div>
<p class="rb-p">작은 난포(6mm 미만)는 FSH에 의존하므로 FSH가 떨어지면 대부분 2~5일 내 퇴행한다. 그런데 우성이 될 난포만은 FSH 수용체를 충분히 갖춰 FSH가 줄어도 버티고, 결정적으로 LH에 반응하는 능력을 얻어 FSH 없이도 자란다. 이 전환은 우성 난포가 8mm를 넘을 때 일어난다. 가장 큰 두 난포의 성장 곡선이 갈라지는 편차(deviation)는 미래 우성 난포가 약 8.5mm일 때, 난포파 출현 2.5일 후에 뚜렷해진다.</p>
<p class="rb-p">이렇게 선발된 제1난포파 우성 난포는 배란 직후, 황체가 아직 작아 P4가 낮은 시기에 자란다. P4가 낮으면 LH 펄스 억제가 덜하므로 직경이 15~20mm(고산차 소는 20mm 전후)까지 크게 발육하는데 — 황체기 한복판의 높은 P4 아래에서 자라는 제2·제3난포파 우성 난포보다 크다. 다만 자라는 동안 P4가 올라가 LH 펄스가 눌리므로, 제1난포파 우성 난포는 성숙·배란에 이르지 못하고 발정주기 중반(Day 10~11경)에 폐쇄된다. 폐쇄로 인히빈이 사라지면 FSH가 다시 올라 제2난포파가 출현한다 — 난포파가 주기 중 2~3번 반복되는 이유다.</p>
<p class="rb-p">원래 우성 난포를 없애거나 FSH를 넣어주면 종속 난포도 우성이 될 수 있고, 우성 난포가 둘 이상 생기는 공동우성이 이중 배란으로 이어진다. 비유 젖소에서 다배란이 흔하며(난포파의 21~36%) 고생산일수록 발생률이 높다 — 쌍태 위험과 직결된다.</p>
<div class="rb-key"><div class="rb-key-t">편차(deviation) — 한눈에</div><ul><li>8mm: 과립막에 LH 수용체 발달 시작 → FSH 의존에서 LH 의존으로 전환</li><li>약 8.5mm·출현 2.5일: 우성/종속이 갈리는 편차</li><li>우성 난포 = 낮은 FSH에서 버티는 능력 + LH 반응 능력</li></ul></div>
<div class="rb-sub">프로게스테론과 난포낭종</div>
<p class="rb-p">프로게스테론은 LH 펄스를 눌러 우성 난포 성장을 용량 의존적으로 억제한다. P4가 높으면 우성 난포가 작고 단명하며 다음 난포파가 빨리 오고, 낮으면 우성 난포가 과도하게 오래 살아남는다. 바로 이게 난포낭종으로 이어진다.</p>
<p class="rb-p">여기서 LH의 두 얼굴을 구분해야 한다. P4가 낮으면 난포를 키우는 LH 펄스의 억제가 풀려 우성 난포가 계속 자란다. 그런데 배란을 일으키는 것은 펄스가 아니라 LH 서지인데, 이 서지는 E2가 역치를 넘어 충분히 지속될 때 시상하부의 양성 되먹임으로 터진다(1장 E2 ②③). 낭종에서는 난포가 E2를 만들어 발정 비슷한 징후를 보이는 소도 있지만, E2에 대한 시상하부의 양성 되먹임 반응성이 떨어져 있어 LH 서지가 불발된다 — 고비유 초기의 음에너지·스트레스가 이 반응성 저하의 흔한 배경이다.</p>
<p class="rb-p">결국 난포는 펄스로 자라기만 할 뿐 배란하지 못하고, P4도 낮아 퇴행 신호도 없어 — 배란도 퇴행도 못 한 채 계속 커져(흔히 25mm 이상이 10일 넘게 유지되며 같은 상황이 반복) 낭종이 된다. 시상하부의 E2 양성 되먹임 회로(서지를 일으키는 AVPV 키스펩틴, 1장)는 그냥 켜지지 않고, 사전에 P4에 한 번 길들여지는 &quot;예비점화(priming)&quot;가 있어야 작동한다. 낭종 소는 황체가 제대로 안 생겨 P4가 쭉 낮은 탓에 이 예비점화를 받지 못한 상태다 — E2는 있어도 그것을 서지로 바꿀 회로가 길들여지지 않은 셈이다. 이는 사춘기 전 미경산우가 E2를 만들어도 자발 배란을 못 하는 것과 같은 원리다(13장). 난소 난포낭종의 근본 원인이 이 저(低)프로게스테론–과잉 LH 펄스–시상하부 E2 반응성 저하 상황이며, 혈중 P4를 올려주면(질내 P4 제제 등) 빠졌던 예비점화가 채워져 반응성이 회복되는 것이 치료의 근거가 된다.</p>
<div class="rb-sub">배란과 난모세포 성숙</div>
<p class="rb-p">황체용해로 P4가 떨어지면 음성 되먹임이 풀려 LH 펄스가 잦고 강해진다. 이 LH가 우성 난포를 최종 성숙시키고 E2를 끌어올리며 발정 행동과 LH 급증을 부른다. LH 급증 이후 여러 단백분해효소가 난포벽을 허물어 평균 30시간 뒤 난포가 터진다. 난모세포는 LH 급증 약 20시간 뒤 상당수가 성숙(제2감수분열 중기)에 도달하는데, 이게 체외수정·수정란이식에서 성숙 시간을 잡는 근거다.</p>
<div class="rb-sub">황체의 기원·공동성 황체, 그리고 PGF 저항성</div>
<p class="rb-p">배란으로 빈 난포의 과립층·협막세포가 빠르게 혈관화·황체화하면서 부풀어 황체가 된다. 혈장 P4는 황체 크기와 잘 비례한다. 현장에서 헷갈리기 쉬운 게 황체 중심의 공동(cavity)인데, 정상 황체의 40~70%가 발달 중 가운데에 액체 찬 공동을 갖는다. 초음파에서 무에코로 보이지만 P4 농도는 공동 유무와 무관하다 — 공동 있는 황체라고 기능이 떨어지는 게 아니다(황체 낭종과 혼동 금지).</p>
<div class="rb-caution"><b>어린 황체의 PGF 저항성 — 임상 직결</b> 발정 후 첫 5~6일 동안은 PGF를 줘도 황체용해가 잘 안 된다. 흔히 &quot;어린 황체엔 수용체가 없어서&quot;라고들 하지만 사실 배란 2일 후부터 수용체는 있다. 진짜 차이는 양성 되먹임 고리에 있다 — 성숙 황체는 옥시토신·TNF를 끼고 내막 PGF 방출을 스스로 부르는 고리를 갖춰, PGF가 여러 번 터지며 황체용해를 끝까지 밀어붙인다. 반면 어린 황체엔 이 고리가 아직 없어 PGF 한 방에 저항한다. 그래서 어린 황체를 무너뜨리려면 반복 투여가 필요하다. 결론: PGF2α는 황체기 6일 이전(이전 발정 6일 이내, 발정 후 출혈 4일 이내)엔 권장하지 않는다.</div>
<div class="rb-sub">동난포 수(AFC)와 번식 상태별 난소</div>
<p class="rb-p">초음파로 세는 난포 수(antral follicle count)는 개체마다 크게 다르지만, 난포파 출현 시의 내재적 난포 수는 한 개체 안에서 매우 반복적이다 — 한 번 측정하면 그 소의 과배란 잠재력을 가늠할 수 있다. AFC가 높은 분만 후 젖소는 수태율이 더 높고 분만–수태 간격이 짧다. 반대로 임신 첫 1/3에 영양이 제한된 어미의 송아지는 AFC가 60% 낮게 태어나, 딸의 평생 가임성에까지 영향이 간다(14장).</p>
<p class="rb-p">번식 상태에 따라 난소 동태가 다르다. 사춘기 전 송아지도 생후 2주부터 이미 성체와 똑같이 난포파를 친다 — 부족한 건 난포파가 아니라 배란을 끌어낼 LH다. 분만 후 첫 배란 주기는 짧고(약 7.7일) 첫 황체가 작고 단명한데, 이 양상이 분만 후 주기 재개와 똑 닮았다. 임신 중에도 난포파는 계속 돌되 만기 직전 21일만 멈춘다. 노령우(15세 이상)는 FSH가 오히려 높은데도 모집되는 난포가 적고, 결정적으로 난모세포 질이 떨어져 어린 딸의 절반밖에 수정란을 못 만든다 — 수가 아니라 난자 자체의 능력이 떨어진다.</p></div>
<div class="grass-section-title"><span class="gst-wrap"><span class="gst-main">${svgIcon('book',15)} 4. 생식기 해부와 직장검사 기초</span><span class="gst-sub">생식기를 흐름으로 따라가기 — 난소·난관·자궁·소구·경관</span></span></div>
<div class="rb-block"><div class="rb-sub">생식기를 흐름으로 따라가면 손끝의 지도가 그려진다</div>
<p class="rb-p">암소 생식기는 난자를 만들어 수정시키는 일과, 수정란을 품어 기르는 일 두 가지를 한다. 구조를 이 흐름으로 따라가면 직장검사 때 손끝이 더듬는 길이 그대로 머릿속에 그려진다.</p>
<p class="rb-p">배란된 난자는 난관채(fimbriae)가 받아챈다. 받아챈 난자는 누두부 바로 안쪽 팽대부(ampulla)로 들어가는데, 수정이 일어나는 곳은 자궁이 아니라 바로 여기다. 수정란은 팽대부에서 만들어진 뒤 구불구불한 협부(isthmus)를 지나 자궁각으로 내려온다.</p>
<p class="rb-p">자궁은 짧은 자궁체에 긴 자궁각 두 개가 달린 구조다. 두 각이 갈라지는 부위를 복막이 한 덩어리로 싸매고 있어서 체부가 실제보다 길어 보인다 — 직장검사에서 체부를 잡았다고 느낀 게 사실은 두 각의 시작부일 때가 많다. 자궁각은 앞으로 뻗다가 배쪽으로 꺾이고 다시 뒤로 휘어 난소 위쪽에서 끝난다. 소의 난소는 다른 종보다 골반에 더 가깝고 난소간막(mesovarium)이 짧아 자궁각을 배쪽·꼬리쪽으로 끌어당긴다 — 직장검사 때 난소와 자궁이 골반 바닥 쪽으로 아래로 휘어 매달려 있다는 게 검사의 전제다.</p>
<div class="rb-sub">난소·난관의 구조</div>
<p class="rb-p">난소는 좌우 1개씩, 길이 2~3cm이며 구조물(난포·황체)의 유무에 따라 크기가 변한다. 바깥 피질(겉질)에 난포와 황체가 들어 있고 안쪽 수질(속질)은 결합조직·혈관·신경섬유로 채워져 있다. 암컷은 사춘기가 되면 배아기에 이미 다 만들어진 &quot;유한한&quot; 난모세포 집단을 꺼내 쓰기 시작한다 — 평생 생식세포를 새로 만드는 수컷과 대조적이다.</p>
<p class="rb-p">난관은 자궁각 끝에서 뻗은 가는 관(20~25cm)으로 세 부분으로 나뉜다. 누두부(깔때기)는 복강 쪽으로 열려 있고, 팽대부는 중간의 가장 넓은 부분, 협부는 가장 좁아 자궁과 연결된다. 보통 직장검사로는 난관을 촉지하지 못한다.</p>
<ul class="rb-list"><li><b class="rb-label">난포 촉감</b> 난포액으로 찬 매끈한 구체, 물풍선 같은 파동감. 발정기 15~18mm.</li><li><b class="rb-label">황체 촉감</b> 세포가 꽉 차 고기 같은 탄력. 기능성 황체는 2.5~3.0cm, 닭가슴살 같은 적당한 부드러움.</li><li><b class="rb-label">고유난소인대</b> 2~3mm, 오독오독한 감촉. 난소 촉진 시 여포·황체 위치를 기록하는 기준이 된다.</li></ul>
<div class="rb-sub">자궁벽·소구·태반분엽 — 태반정체의 해부학</div>
<p class="rb-p">자궁벽은 바깥 장막(serosa), 중간 근층(myometrium), 안쪽 내막(endometrium) 세 겹인데, 임상에서 의미 있는 건 가장 안쪽 내막이다. 내막에는 혈관이 빽빽하게 솟은 소구(caruncle)가 점점이 박혀 있고, 임신이 되면 이 소구가 태아쪽 융모엽(cotyledon)과 단추 채우듯 맞물려 태반분엽(placentome)을 이룬다. 소 자궁에는 소구가 약 100개 있다.</p>
<div class="rb-clinical"><b>왜 태반이 안 떨어지나</b> 태반정체로 태반이 끈질기게 안 떨어지는 이유가 바로 이 소구–융모엽 맞물림 구조에 있다.</div>
<div class="rb-sub">경관과 질 — 검사·수정의 기준점</div>
<p class="rb-p">자궁 바깥으로 나오면 자궁경관이 관문 역할을 한다. 단단하고 근육질이며 내강으로 돌출된 3~4개의 원형주름이 서로 맞물려 자궁 내부를 외부로부터 밀폐한다. 직장검사나 인공수정 시 경관을 찾으면 그 너머가 자궁이라는 지도가 선다 — 경관은 손끝의 기준점이다.</p>
<div class="rb-caution"><b>AI 시 주의</b> 경관 너머 질에서는 자궁경이 꼬리·배쪽으로 돌출해 있어 등쪽 질천장이 배쪽보다 더 깊다. 인공수정 시 기구가 배쪽으로 미끄러지지 않도록 위쪽 45도로 넣는 이유가 이것이다.</div></div>
<div class="grass-section-title"><span class="gst-wrap"><span class="gst-main">${svgIcon('clipboard',15)} 5. 직장검사 실전</span><span class="gst-sub">준비·삽입·접근·촉진 판단, 크기 기준과 주기 시점 추정</span></span></div>
<div class="rb-block"><div class="rb-sub">준비와 삽입 — 직장벽을 다루는 법</div>
<p class="rb-p">직장검사는 직장에 팔을 넣어 직장벽 너머로 난소·자궁을 만져 평가하는, 기구 없이 팔 하나로 하는 단순하지만 심오한 기술이다. 먼저 자기 손가락·손바닥 폭을 재 두면 촉진으로 얻은 난포·황체 크기를 가늠할 수 있다. 손톱은 짧게, 장갑은 어깨까지, 공기는 빼고 착용하고 윤활제를 쓴다.</p>
<p class="rb-p">삽입할 때 핵심은 손가락 끝으로 직장 안을 헤집는 게 아니라, 새끼손가락 외측과 그에 이어지는 손바닥 외측을 &quot;하나의 선&quot;으로 삼아 직장벽을 넓히듯 나아가는 것이다. 손목 전체를 옆으로 회전시키며 벽을 밀어 늘리면 소의 노책(힘주기)이 줄고 부담 없이 들어간다. 가스가 차 벽이 긴장되면 주름을 검지·중지에 걸어 앞으로 당겨 연동을 자극해 가스를 뺀다. 검사 중 연동운동이나 노책이 오면 거스르지 말고 가만히 있으면 팔을 타고 지나가며, 지나간 뒤엔 벽이 부드러워져 자유롭게 움직일 수 있다.</p>
<div class="rb-sub">접근 순서: 자궁경관 → 자궁 → 난소</div>
<p class="rb-p">처음에는 랜드마크인 자궁경관을 찾는다. 손을 한쪽으로 밀어 단단하고 안으로 만곡된 골반을 느끼고 아래로 내려가면, 골반이 안 만져지는 부드러운 곳이 생식기다. 그 주변을 떠내듯 손목을 회전시키며 아래로 힘을 주면 길이 10~15cm·폭 3~5cm의, 앞뒤로 훑으면 오독오독한 단단한 관 — 자궁경관 — 이 잡힌다.</p>
<p class="rb-p">자궁경관에서 손바닥 하나 안쪽 아래에 자궁이 있다. 자궁각 사이에 손을 넣어 네 손가락을 모으고 새끼손가락 측면을 &quot;선&quot;으로 벽을 늘리며 전방으로 회전시키면 자궁각을 잡기 쉽다. 좌우 자궁각의 굵기·탄력·벽 두께를 비교한다. 난소는 자궁 위치에서 손바닥 하나만큼 좌/우로 수평 이동해 탐색하면 매끈하고 둥근 구조물로 만져진다. 손바닥으로 떠받치고 고유난소인대를 손가락 사이에 끼워 고정한 뒤 엄지·검지로 훑는다. 길을 잃으면 자궁경관으로 돌아온다.</p>
<div class="rb-sub">촉진으로 무엇을 읽나 — 자궁 수축·황체·난포</div>
<p class="rb-p">자궁 촉진에서 먼저 보는 것은 수축 유무다. 발정 시의 자궁은 강하게 조여 익힌 소시지 같은 단단함과 탄력으로 아래로 말려 있고(수축), 황체기의 자궁은 부드럽고 윤곽이 흐릿하다(이완). 발정 시라도 검사를 오래 하면 수축이 약해지므로 처음 촉진했을 때의 소견이 중요하다.</p>
<p class="rb-p">난소에서는 황체와 난포를 구별해 크기·촉감을 기록한다. 기능성 황체는 25mm 전후로 충실감과 적당한 부드러움(닭가슴살)이 있고, 퇴행 황체는 20mm 미만으로 단단하고 울퉁불퉁하다. 난포는 파동감 있는 매끈한 반구로, 10mm 미만은 단단·팽팽, 15mm 이상은 파동감이 있되 팽팽함이 약해지며, 배란 직전이면 강한 파동감에 물렁해진다.</p>
<div class="rb-caution"><b>늘 의심하라</b> 난소 촉진 때 &quot;정말 황체인가? 여포일 가능성은 없는가?&quot;를 항상 의심하며 만진다. 자신감은 갖되 과신은 금물이다.</div>
<div class="rb-sub">난포·황체 평가의 최적 크기 (초음파 기준)</div>
<div class="rb-key"><div class="rb-key-t">난포</div><ul><li>배란 가능성 높은 우성 난포: 13~16mm (최소 10mm)</li><li>17mm 이상은 과성숙 → 난자 노화·신선도 저하</li></ul></div>
<div class="rb-key"><div class="rb-key-t">황체 — 임신 유지력 기준</div><ul><li>이상적 15~25mm, 가장 좋은 건 20~25mm</li><li>15mm 미만은 부적합</li><li>공동성 황체는 공동이 18mm 이하이거나 전체 면적의 40% 미만이면 정상</li></ul></div>
<div class="rb-caution"><b>맥락 구분</b> 이 &quot;황체 15~25mm&quot;는 임신을 떠받칠 기능성 황체의 이상적 크기다. 수정 가부를 볼 때의 &quot;황체 20mm 미만 = 수정 OK&quot;는 발정기에 퇴행 중인 황체 기준이라 맥락이 다르다(7장).</div>
<div class="rb-sub">난소 소견으로 발정주기 시점 추정 (2난포파 가정)</div>
<p class="rb-p">황체 유무와 난포 개수만으로 주기의 대략적 시점을 역산할 수 있다. 이건 발정 동기화·수정 판단의 밑바탕이 된다.</p>
<div class="rb-key"><div class="rb-key-t">주기 시점 역산 (2난포파 가정, 날짜순)</div><ul><li>1~2일 (배란 직후): 황체 없음 · 난포 없음</li><li>3~5일: 황체 없음(형성 중) · 난포 여러 개</li><li>6~10일: 황체 있음 · 우성 난포 1개</li><li>11~12일: 황체 있음 · 뚜렷한 난포 없음</li><li>13~18일: 황체 있음 · 난포 여러 개</li><li>19~21일 (발정 임박): 황체 없음(퇴행) · 우성 난포 1개</li></ul></div>
<div class="rb-caution"><b>한쪽만 보면 오진</b> 좌우 난소는 한 단위로 작동한다. 한쪽만 촉진하면 틀릴 수 있다 — 한쪽엔 우성 난포, 다른 쪽엔 퇴행 황체만 보일 수 있다. P4는 황체에서 나와 중추에서 GnRH를 억제하므로, 황체가 있으면 우성 난포가 있어도 배란은 차단된다.</div>
<div class="rb-sub">주기 단계 판단의 실전 원칙</div>
<p class="rb-p">발정주기는 세 부분으로 나눠 본다. 시작(1~5일)과 끝(19~21일)만 직장검사로 확실히 진단할 수 있고, 중앙부(5~19일)는 정확한 날짜를 알기 어렵다. 하지만 임상에선 &quot;정확한 날짜&quot;보다 &quot;어느 시기인지&quot;만 알아도 치료 방침 결정엔 충분하다. 황체 평가에서 크기는 주관적이다 — 퇴행 중이거나 형성 초기인 황체가 의외로 크게 느껴진다. 황체의 단단함(경도)이 사실상 가장 신뢰할 유일한 지표다. 부드러우면 주기 초기, 단단하면 말기에 가깝다. 황체의 &quot;샴페인 코르크&quot; 돌기가 안쪽으로 발달하면 촉진이 어려울 수 있다.</p></div>
<div class="grass-section-title"><span class="gst-wrap"><span class="gst-main">${svgIcon('search',15)} 6. 발정 관찰과 발정 징후</span><span class="gst-sub">관찰 시간·횟수가 발견율을 가른다, ST와 그 외 징후</span></span></div>
<div class="rb-block"><div class="rb-sub">발정 관찰은 &quot;따로 시간을 내야&quot; 보인다</div>
<p class="rb-p">발정은 암컷이 수컷을 성적으로 허용하는 상태이며, 그에 따른 행동·외견 변화가 발정 징후다. 번식 관리의 시작이자 가장 흔한 실패 지점이 발정 발견이다 — 못 찾으면 수정 자체를 못 하기 때문이다.</p>
<p class="rb-p">핵심은 작업 중 곁눈질 관찰만으로는 많이 놓친다는 것이다. 발정 관찰만을 위한 시간을 따로 내야 발견율이 오른다. 정해진 시간에 같은 페이스로 봐야 &quot;평소와 다름&quot;이 눈에 들어온다.</p>
<div class="rb-key"><div class="rb-key-t">관찰 시간·횟수별 발견율</div><ul><li>1회 60분 × 아침·저녁 2회 → 94%</li><li>1회 30분 × 하루 3회 → 65%</li><li>1회 10분 × 하루 3회 → 45%</li><li>착유 작업 틈틈이 30분씩만 → 30~41%로 급락</li></ul></div>
<p class="rb-p">발정은 밤중~이른 아침에 발현하기 쉽다. 아침 착유 전, 저녁 착유 후, 밤 시간대가 좋다. 여름엔 발정이 저녁~밤으로 치우치므로 시원한 시간대·심야 관찰이 유리하다. 프리스톨·프리번에서는 파서 이동 시와 우사 복귀 후에 징후가 잘 나타난다.</p>
<div class="rb-sub">진짜 발정 = 스탠딩(ST)</div>
<p class="rb-p">다른 소가 올라타도(마운팅, MT) 가만히 서서 받아주는 상태가 스탠딩(ST)이며, 이것이 &quot;진짜 발정&quot;이다. ST를 보이는 소는 네 다리를 바깥쪽으로 버티고 약간 허리를 굽힌 배만 자세를 취한다. 올라탄 소(MT)도 발정 가능성이 높다. 바닥이 미끄러운 콘크리트면 ST·MT가 줄고, 흙바닥·방목지면 늘어난다 — 흙 운동장에 한 시간이라도 내보내면 발견율이 오른다.</p>
<div class="rb-caution"><b>안전</b> 프리스톨에서 사람이 등을 돌렸을 때 발정우가 반사적으로 등에 올라탈 수 있다. 큰 사고로 이어지니 주위를 살피며 관찰한다.</div>
<div class="rb-sub">ST 이외의 발정 징후 — 이걸 봐야 발견율이 오른다</div>
<p class="rb-p">ST만 타겟으로 하면 많은 발정을 놓친다. ST만 보면 발견율이 12~30%지만, 그 외 징후까지 포함하면 관찰 횟수가 더 적어도 74~90%까지 오른다. 실제로 ST를 아예 안 보이는 소가 상당수(약 63%)다. 발정 징후는 &quot;수컷이 알아차리게 하려는&quot; 행동이라, 평소와 다른 눈에 띄는 행동이라고 생각하면 외우기 쉽다.</p>
<ul class="rb-list"><li><b class="rb-label">외음부 종창·충혈</b> 발정기엔 통통하게 붓고 주름이 펴지며 점막 충혈이 강해진다. 비발정기엔 주름이 많고 조여 있다.</li><li><b class="rb-label">점액 배출</b> 투명하고 잘 늘어나 바닥까지 끊기지 않는 점액이면 좋은 발정 → 즉시 수정 경향. 단단하고 약간 백색이며 10~20cm에서 툭 끊기면 시작·종료기 → 반나절 늦춰도 됨. 단단한 점액은 황체기에도 나올 수 있으니 직장검사로 황체 퇴행·난포를 확인한다.</li><li><b class="rb-label">냄새 맡기·턱 괴기</b> 다른 소 외음부 냄새를 맡거나 엉덩이·허리에 턱을 올림. 하는 소·당하는 소 모두 확인.</li><li><b class="rb-label">플레멘</b> 냄새 맡은 뒤 윗입술을 위로 말아 올림.</li><li><b class="rb-label">그룹 형성</b> 발정우들이 모여 서로 냄새 맡고 뭉쳐 다님 — 매우 눈에 띔.</li><li><b class="rb-label">활동량 증가</b> 휴식 시간에 혼자 서 있거나, 자주 울고, 콧김이 거칠고, 추울 때 등에서 김이 남. 계류식에서도 머리를 자주 흔드는 등으로 관찰.</li><li><b class="rb-label">눈물·충혈</b> 눈을 부릅뜨고 촉촉·충혈.</li><li><b class="rb-label">좌골결절 찰과상</b> 승가 당한 흔적. 생생하면 반나절 이내, 마른 딱지면 1일 이상 경과.</li><li><b class="rb-label">발정 후 출혈</b> 발정 종료 2일 전후 배출. 이미 배란이 끝난 경우가 많아 &quot;발정을 놓쳤다&quot;는 신호다(난소 배란점이 아니라 자궁 혈류 증가로 고인 피). 2~3일 전 발정으로 기록하고 다음 회귀일을 노린다.</li></ul>
<div class="rb-clinical"><b>핵심 자세</b> &quot;평소와 다르다&quot; 싶으면 적극적으로 발정 여부를 확인한다. 발정 강약·징후·컨디션까지 기록해 두면 이번에 수정할지 다음으로 미룰지 판단이 정확해진다.</div></div>
<div class="grass-section-title"><span class="gst-wrap"><span class="gst-main">${svgIcon('pin',15)} 7. 인공수정 (AI)</span><span class="gst-sub">수정 적기, 위생적 시술, 수정 가/부 판단</span></span></div>
<div class="rb-block"><div class="rb-sub">수정 적기 — 30시간을 거꾸로 읽는다</div>
<p class="rb-p">인공수정을 정성껏 하는 것은 수태율과 농장 번식 성적에 직접 영향을 준다. 적기의 바탕은 2장의 생리다 — 발정 시작 24~30시간 후 배란하므로, 배란 즈음에 수정능을 획득한 정자가 난관에 대기하도록 타이밍을 맞춘다.</p>
<div class="rb-key"><div class="rb-key-t">타이밍 기준</div><ul><li>ST(스탠딩) 개시 후 4~12시간이 적기 (16시간 이내면 양호)</li><li>전통적 AM-PM법: 발정 발견 12시간 후 — 단 발견이 발정 중후반이면 늦음</li><li>현대 고능력우는 발정이 짧아 발정 발견 후 6시간 이내가 실용적</li><li>하루 1회만 관찰한다면 발견 즉시 가능한 한 빨리 수정</li></ul></div>
<div class="rb-sub">시술 순서 — 위생이 전부다</div>
<p class="rb-p">정자는 한랭·알코올·오염에 약하다. 시술의 절반은 위생과 온도 관리다.</p>
<ul class="rb-list"><li><b class="rb-label">도구·정액 융해</b> 주입기·핀셋·스트로 커터는 매번 알코올 솜으로 닦고 건조(알코올 남으면 정자 사멸). 동결정액은 회사별 권장 온도 준수(예 35~37°C 45초, 38°C 15초). 캐니스터는 서리 라인에서 멈추고 15초 이내에 꺼내며, 한 번에 한 개씩 융해.</li><li><b class="rb-label">소 준비</b> 보정·꼬리 묶기. 외음부와 주변·꼬리 뒷면을 온수로 씻고 알코올 솜으로 닦는다.</li><li><b class="rb-label">주입기 데우기</b> 융해된 정액이 20°C 밑으로 떨어지면 한랭 감작(cold shock)으로 정자가 상한다. 장전부를 종이타월 마찰열로 데워둔다.</li><li><b class="rb-label">주입</b> 외음부 벌려 위 45도로 질에 삽입 → 10cm에서 아래 45도로 끝까지. 직장에 손을 넣어 자궁경관 앞 1/3을 잡고, 경관을 주입기 쪽으로 회전시키며 끌어당겨 주입기를 내자궁구 너머 자궁체부로 유도. 정액은 자궁체부에 주입한다(체부가 매우 짧으니 위치에 주의). 뺀 뒤 정액 배출·피·고름 여부를 확인.</li></ul>
<div class="rb-sub">수정 전 직장검사 — 수정 가/부 판단</div>
<p class="rb-p">수정 전에 난소·자궁을 촉진해 정말 발정인지 확인한다. &quot;난포 있음 = 발정&quot;이 아니다 — 황체기에도 15mm 난포는 흔하기 때문이다. 제1난포파 우성 난포가 저P4 시기에 15~20mm까지 크게 자라고 폐쇄된 뒤에도 한동안 크기를 유지해, 황체기에 제2난포파 우성 난포와 함께 난포 두 개로 만져지기도 한다. 그래서 난포뿐 아니라 황체가 퇴행했는지를 반드시 본다.</p>
<div class="rb-key"><div class="rb-key-t">수정 OK 조건 (둘 다 충족)</div><ul><li>한쪽에 15mm 이상 난포 존재</li><li>황체가 20mm 미만 (= 퇴행 중)</li></ul></div>
<div class="rb-caution"><b>수정 금지</b> 20mm 이상의 기능성 황체가 만져지면 발정이 아니다 → 수정 금지. 특히 직전 7~10일 전에 발정/수정 이력이 있으면 제1난포파 우성 난포의 E2로 &quot;발정 같은&quot; 징후가 나온 것일 수 있고, 임신 중일 수도 있다(임신 중 수정 시 약 50% 유산). 자궁 내부를 확인한다.</div>
<p class="rb-p">발정 확인 흐름: ① 외음부 종창·충혈 ② 점액 유무 ③ 자궁 수축(배란 직전엔 약할 수 있음) ④ 15mm 이상 난포 ⑤ 20mm 미만 황체 ⑥ 생식기를 조작해 점액이 추가로 나오지 않는지.</p></div>
<div class="grass-section-title"><span class="gst-wrap"><span class="gst-main">${svgIcon('dna',15)} 8. 수정·임신 인식·착상</span><span class="gst-sub">배아 발육, IFN-τ의 저울, 프로게스테론, 착상, 프리마틴</span></span></div>
<div class="rb-block"><div class="rb-sub">수정과 배아의 이동</div>
<p class="rb-p">배란된 난자는 난관채에 받아들여져 팽대부–협부 접합부에 머문다. 자궁에 주입된 정자는 자궁경관을 지나 난관협부에 도착, 상피와 결합해 일정 시간 저장되었다가 배란에 맞춰 결합이 풀리고 수정능을 획득하며 활발히 움직여 난자와 만난다. 수정란은 약 1일에 한 번씩 분열하지만(난할) 크기는 커지지 않는다.</p>
<div class="rb-key"><div class="rb-key-t">배아 발육 일정</div><ul><li>Day 1 2세포 → Day 2 4세포 → Day 3 8세포</li><li>Day 4~5 상실배, 8~16세포기에 난관→자궁으로 하강</li><li>Day 6~7 자궁각에서 배반포 형성 후 투명대 탈출(부화)</li></ul></div>
<div class="rb-sub">모체 임신 인식 — 황체를 살리는 일</div>
<p class="rb-p">임신이 성립하려면 가장 먼저 황체를 살려야 한다. 소의 황체는 가만 두면 주기 끝(16~17일)에 자궁이 뿜는 PGF2α에 녹는다. 그런데 임신 유지에 필요한 프로게스테론은 그보다 더 오래 필요하다. 그래서 임신한 소는 &quot;나 새끼 들었다&quot;는 신호를 황체가 녹기 전에 보내야 하는데, 이게 모체 임신 인식이다.</p>
<p class="rb-p">신호를 보내는 건 영양막이 분비하는 IFN-τ다. 배반포는 Day 13경 3mm 구형이지만 14일부터 실처럼 길어지기 시작해 17일이면 25cm, 신장배가 된다. 이 가늘고 길어진 영양막에서 IFN-τ가 나온다. 핵심은 IFN-τ가 자궁의 프로스타글란딘 저울을 바꾼다는 점이다 — PGF2α는 황체를 녹이는 쪽, PGE2는 황체를 지키는 쪽인데, IFN-τ가 이 저울을 PGE2 쪽으로 기울여 황체를 살린다. 거꾸로 배아 발육이 늦어 IFN-τ가 부족하면 저울이 PGF2α 쪽으로 기울어 황체가 녹고 임신이 깨진다.</p>
<div class="rb-caution"><b>지연성 재발정</b> 현대 유우에서 수정 후 불수태우의 약 30%는 황체 퇴행이 지연되어 재발정이 늦어진다. 어느 시기까지 배아가 IFN-τ를 분비해 황체용해를 막다가 도중에 배아가 사멸해 버린 경우다. 그래서 수정우는 25~26일까지 재발정을 확인해야 한다.</div>
<div class="rb-sub">초기 임신과 프로게스테론</div>
<p class="rb-p">프로게스테론은 임신 첫 200일을 황체에서 공급한다(태반은 3분기는 되어야 충분히 만든다). 그러니 초기 임신은 전적으로 황체에 달려 있다. P4는 황체를 유지시킬 뿐 아니라 자궁 환경 자체를 임신에 맞게 세팅한다 — 내막 분비를 자극해 배아에 먹이를 대고, 자궁 평활근을 조용하고 이완된 상태로 묶는다.</p>
<div class="rb-key"><div class="rb-key-t">P4 보충 효과 (수정 후 5~9일)</div><ul><li>영양막 길이 4배</li><li>자궁 IFN-τ 6배</li></ul><div class="rb-key-concl">→ 초기 P4가 높을수록 배아가 잘 자라고 수태율↑ (낮으면 내막 영양소 수송체가 줄어 배아가 굶음)</div></div>
<p class="rb-p">배아는 9~10일 부화 → 14일부터 신장 → 19~20일 30cm를 넘기도 한다. 20~33일에 자궁과 융모막이 접촉→부착으로 맞물리고 요막이 발달해 융모요막 태반을 만든다. 소의 착상은 임신 3주째 시작되는 표재성 부착이며, 자궁벽 소구 약 100개가 태아쪽 융모엽과 맞물려 태반분엽을 이룬다.</p>
<div class="rb-sub">임신 중 어미의 변화</div>
<p class="rb-p">임신 중 어미 심혈관계는 동맥압·혈관 저항이 떨어지고 심박출량이 최대 30~40% 는다(심박수는 15%만 늘고 나머지는 1회 박출량이 메움). 분만 후 자궁태반으로 가던 혈류가 유선으로 재분배되는 것이 분만 직후 최고 비유를 가능하게 한다. 영양 면의 핵심은 임신 막바지로, 젖소의 임신 말 영양 요구는 같은 체중 비임신 소보다 약 75% 높다. 임신 7개월이면 태아가 출생체중의 40%에 이르고, 예상 분만 약 60일 전 건유로 비유와 태아 성장의 경쟁을 막는다.</p>
<div class="rb-sub">프리마틴 (Freemartin)</div>
<p class="rb-p">수소와 쌍태로 태어난 암송아지는 불임일 수 있다. 두 태아의 태반 혈관이 문합되어 피가 섞이면, 성 분화 중인 암컷이 수컷 쌍태의 테스토스테론·항뮐러관호르몬에 노출되기 때문이다. 수컷 조혈줄기세포까지 넘어와 키메라가 되며 생식선이 간성으로 끝나기도 한다. 수소와 쌍태로 난 암송아지를 번식우로 쓸지 판단할 때 반드시 떠올린다.</p></div>
<div class="grass-section-title"><span class="gst-wrap"><span class="gst-main">${svgIcon('clipboard',15)} 9. 임신 감정</span><span class="gst-sub">직장검사·초음파 시기별 소견, 태아 발육·성별, 병변 감별</span></span></div>
<div class="rb-block"><div class="rb-sub">감정 방법과 시기</div>
<p class="rb-p">임신 감정은 번식 성적 평가에서 가장 중요한 행위다. 초음파의 가장 큰 가치는 사실 양성(임신) 확인이 아니라 비임신(open cow)의 조기 발견에 있다 — 비임신우를 빨리 가려내 다시 수정 사이클에 올려야 한다. 단, 임신 90일 이내 초기 배아사·태아사가 6~15% 발생할 수 있어 후속 확인이 필요하다.</p>
<div class="rb-key"><div class="rb-key-t">감정 가능 시기</div><ul><li>직장검사: AI 후 35일 이후 (양막낭 촉지는 30~40일부터)</li><li>초음파(에코): AI 후 26일 이후</li><li>PAG 검사(혈액·유즙): 수정 후 28일 전후</li><li>AI 후 60일에 재감정, 쌍태우는 90일에도 추가 감정</li></ul></div>
<div class="rb-sub">직장검사 임신 감정 (시기별)</div>
<ul class="rb-list"><li><b class="rb-label">30~40일</b> 양막낭 촉지, 태막 슬립(자궁각을 끼워 올릴 때 &quot;드르륵&quot; 미끄러지는 감촉, 40일 이후 권장). 태자는 황체 있는 쪽 자궁각에 위치.</li><li><b class="rb-label">60일 전후</b> 자궁각·양막낭이 커져 태막 슬립이 주 방법. 좌우 자궁각 차이로 판정. 연습은 이 시기 소로.</li><li><b class="rb-label">80일 전후</b> 태반소엽(자궁소구에서 발달)이 울퉁불퉁 만져진다.</li><li><b class="rb-label">90일 이후</b> 자궁이 복강으로 가라앉아 자궁동맥(중자궁동맥) 박동·진전음으로 확인. 임신각 쪽 8~10mm &quot;쏴-쏴-&quot;, 비임신각 5mm로 약함.</li><li><b class="rb-label">6개월 이후</b> 타진법(부구법): 우측에서 압박하면 태자가 주먹에 부딪힘.</li></ul>
<div class="rb-caution"><b>자궁축농증 vs 임신</b> 자궁 내강에 농·점액이 차도 자궁이 부푼다. 양쪽 자궁각이 같게 부풀고 태막 슬립(&quot;드르륵&quot;)이 없으면 임신이 아니라 자궁 질환을 의심.</div>
<div class="rb-sub">초음파 — 원리와 스캔 기법</div>
<p class="rb-p">초음파(B모드)는 반사 강도를 밝기로 바꿔 보여준다. 액체(난포액·태아액)는 초음파를 흡수해 검게(무에코), 근육·황체는 회색, 뼈·금속은 희게 보인다. 그래서 난포는 검은 구체, 황체는 진한 회색~흰색 영역으로 나온다.</p>
<p class="rb-p">스캔은 횡종단면에서 방광 → 자궁경부 → 자궁체 → 자궁각 순으로 보며, 프로브를 좌우로 움직여 난소를 확인한다. 자궁체 위에서 시작해 자궁각을 따라 프로브를 옮기며 좌우 스위프(sweep)하고, 자궁각 분기부를 지나 난소까지 따라간다. 직장 촉진으로 구조물을 먼저 찾는 연습이 선행되어야 한다.</p>
<ul class="rb-list"><li><b class="rb-label">난포</b> 내부 과립세포층·외부 난포막세포층으로 둘러싸인 검은 무에코 원형. 난모세포는 난구에 의해 난포강에 매달림.</li><li><b class="rb-label">황체</b> 강한 에코(하얗게). 배란 3~4일부터 커져 12~16일에 최대. 2~3cm면 성숙(P4 최고).</li><li><b class="rb-label">출혈성 황체</b> 배란 직후~3일, 어둡게. 퇴행기 황체와 둘 다 에코가 낮아 구분 어려움.</li><li><b class="rb-label">공동성 황체</b> 내부 액체 공동. 황체기 전반부에 보이며 점차 닫히는 정상 변이 — 황체 낭종과 혼동 금지.</li></ul>
<div class="rb-sub">초음파 임신 진단·태아 발육·성별</div>
<div class="rb-key"><div class="rb-key-t">태아 발육 이정표</div><ul><li>25일경: 배아 심박동 확인 (심박이 없으면 배아 사멸)</li><li>30일경: 배아포(embryonic vesicle)</li><li>35일~: 배아 10mm(30일)→20mm로 커져 진단 쉬워짐</li><li>45일: cotyledons·태아 움직임</li><li>50일 배아포 ~42mm, 56일 배아 ~53mm(갈비뼈 석회화 시작)</li></ul></div>
<div class="rb-key"><div class="rb-key-t">태아 나이 추정 (25~45일)</div><ul><li>태아 길이(mm, 두–미) + 18 = 일령</li><li>예: 15mm→33일 / 20~25mm→40일 / 40mm→50일 / 80mm→60일</li></ul></div>
<ul class="rb-list"><li><b class="rb-label">성별 판정</b> 55~60일부터. 생식결절(genital tubercle) 위치로 — 고에코 이중엽 구조물. 수컷=제대 바로 뒤, 암컷=꼬리 아래·뒷다리 사이.</li><li><b class="rb-label">쌍태</b> 황체가 2개면 50% 확률로 쌍태. 양막강 2개·태아 2마리, 두 요막이 접하는 두꺼운 선(트윈 라인)이 보이면 쌍태 확률 높음. 60~90일에도 배아 사멸이 단태보다 많아 90일 추가 감정.</li></ul>
<div class="rb-caution"><b>태아 사망 징후</b> 태아막 분리는 사망 징후. 양막액·요막액의 양과 투명도도 함께 평가한다.</div></div>
<div class="grass-section-title"><span class="gst-wrap"><span class="gst-main">${svgIcon('calendar',15)} 10. 발정·배란 동기화</span><span class="gst-sub">제제 5종 + PGF/CIDR/Select-Synch + 오브싱크·변법 + E2+P4</span></span></div>
<div class="rb-block"><div class="rb-sub">대표 호르몬 제제 5종</div>
<p class="rb-p">동기화는 번식 진료에서 가장 판단이 요구되는 처치다. 제제의 특징만이 아니라 처치 시점 소의 호르몬 상태와 처치 후 변화까지 이해해야 효과를 낸다. 모든 프로토콜은 결국 2장의 3대 타임라인(GnRH 30h, PGF 3~5일, P4 제거 2~4일)의 조합이다.</p>
<ul class="rb-list"><li><b class="rb-label">GnRH</b> 우성 난포(11mm 이상)를 배란시켜 새 난포파를 만든다. 투여 후 26~30시간에 배란, 36시간 지나도 배란 없으면 무효. 난포가 없으면 효과 없다.</li><li><b class="rb-label">hCG</b> LH 작용. 수정 후 5일째 투여 → 제1난포파 우성 난포(13mm 이상)를 배란시켜 부황체 형성 → 혈중 P4 상승(황체 기능 보강).</li><li><b class="rb-label">PGF2α</b> 황체 퇴행 유도 → 발정. 자궁축농증·내막염 치료도. 단 황체기 6일 이전엔 잘 안 듣고(어린 황체 저항성, 3장), 중증 자궁 질환 땐 황체가 안 죽을 수 있다.</li><li><b class="rb-label">E2</b> 발정 유도·자궁경관 확장·자궁 수축. 주로 P4와 병용. 배란 유발로 쓰면 투여 약 16~24h 후 LH 서지, 약 42~52h 후 배란.</li><li><b class="rb-label">P4(질내 유치형, CIDR)</b> 혈중 P4를 높여 발정·배란 억제(황체 효과 모방). 동기화 프로그램의 핵심 부품.</li></ul>
<div class="rb-key"><div class="rb-key-t">동기화를 푸는 두 레버 (1장으로 연결)</div><ul><li>모든 동기화는 결국 1장의 두 손잡이를 인위로 돌리는 것이다.</li><li>P4 두 박자 — P4를 한동안 깔았다가(시상하부 프라이밍) → 뺀다(탈억제). CIDR·P4 장치를 넣었다 빼는 것이 이 두 박자의 재현이다.</li><li>E2 되먹임 — E2는 P4 배경에 따라 얼굴을 바꾼다. 고P4=음성(브레이크: 난포 폐쇄·억제), 저P4+프라이밍=양성(액셀: LH 서지).</li></ul><div class="rb-key-concl">→ GnRH는 이 되먹임 회로를 건너뛰고 뇌하수체를 직접 때려 서지를 만드는 지름길이다. 각 프로토콜은 이 레버를 어떻게 돌리느냐의 차이일 뿐이다.</div></div>
<div class="rb-sub">발정 동기화 — PGF2α 단독</div>
<p class="rb-p">황체 보유우에 PGF2α를 투여해 황체를 퇴행시키고 P4를 낮춰 우성 난포 발육·발정을 유도한다. 발정 발현이 투여 후 2~6일로 폭이 넓은데, 그 이유는 투여 시점의 우성 난포 크기에 달려 있다.</p>
<ul class="rb-list"><li><b class="rb-label">우성 난포 10mm 전후(주기 전반)</b> P4 저하 후 난포가 발육·성숙해야 해 발정까지 3~4일.</li><li><b class="rb-label">우성 난포 15mm 초과</b> 이미 커 성숙이 빠르고 E2도 많아 발정까지 2일.</li><li><b class="rb-label">우성 난포 폐쇄 타이밍</b> 새 우성 난포가 선발·성숙해야 해 발정까지 5일 이후.</li><li><b class="rb-label">제2난포파 이후 10mm 전후(주기 후반)</b> 발정까지 3~4일.</li></ul>
<div class="rb-clinical"><b>현장 데이터·금기</b> 홀스타인(n=622) 무작위 투여 시 발정은 3일째 49.8%, 4일째 14.1%로 3~4일에 몰렸다 → 투여 3~4일째 집중 관찰. 단 황체기 6일 이전(이전 발정 6일 이내, 발정 후 출혈 4일 이내) 투여는 권장하지 않는다.</div>
<p class="rb-p">PGF가 황체를 녹여 P4를 빼는 것이 곧 두 박자의 둘째 박자(탈억제)다. 주기 소는 이미 황체기 동안 P4를 겪어 시상하부가 프라이밍돼 있으므로, P4만 빠지면 우성 난포의 E2가 양성 되먹임으로 돌아서 LH 서지·배란이 일어난다.</p>
<div class="rb-sub">CIDR(질내 P4 제제) 단독</div>
<p class="rb-p">질내 P4 제제(CIDR 등)는 질 점막으로 P4가 흡수돼 혈중 P4를 높게 유지한다. 넣어두는 동안은 이 P4가 LH 펄스를 눌러 발정·배란을 억제하고, 제제를 빼면 P4가 뚝 떨어지면서 억눌렸던 소들이 한꺼번에 발정에 들어온다 — 이게 발정 집중화다. 보통 7~14일간 넣어 둔다.</p>
<p class="rb-p">삽입 기간이 왜 중요한가. 홀스타인 미경산우에서 7일·14일·21일 삽입을 비교한 시험이 있다. 오래 넣어둘수록 발정이 더 좁게 모이는데(21일 삽입은 제거 2일째에 96%가 발정), 이유는 오래 넣어두는 동안 자기 황체가 자연히 퇴행해버린 소가 늘기 때문이다 — 즉 뺄 때 이미 황체가 없어 곧바로 발정이 오는 소가 많아진다. 그래서 14·21일 단독은 추가 호르몬 없이도 발정이 잘 모인다.</p>
<p class="rb-p">그런데 발정이 잘 모이는 것과 수태율이 높은 것은 다르다. 막상 수태율을 보면 14·21일 단독이 7일 삽입 + PGF2α 병용(7d+PGF2α)보다 떨어진다. P4 제제를 오래 넣어두는 동안 난포파를 통제하지 못해, 우성 난포가 너무 오래 발육·노화(aging)한 상태로 수정을 맞게 되기 때문이다. 늙은 난포 속 난자는 수태력이 낮다.</p>
<p class="rb-p">그래서 7일 삽입 + PGF2α 병용을 쓴다. 7일은 짧아서 뺄 때 아직 황체를 가진 소가 많다. 이 황체가 P4를 계속 내면 제제만 빼도 발정이 오지 않으므로, 제거와 동시에 PGF2α를 반드시 같이 놓아 황체를 녹여준다. 난포를 노화시키지 않고 적정 시점에 수정할 수 있어 수태율이 더 낫다.</p>
<div class="rb-key"><div class="rb-key-t">CIDR 단독 — 한눈에</div><ul><li>발정이 잘 모이는 것(집중화)과 수태율이 높은 것은 다르다 — 오래 넣어두면 발정은 모이지만 난포가 노화해 수태율은 떨어진다.</li><li>P4 제제 단독은 난포파를 통제하지 못해 제거 후 발정의 수태율이 불안정하다 → 최근엔 GnRH·PGF를 엮은 배란 동기화·정시 AI와 병용한다.</li></ul></div>
<p class="rb-p">CIDR를 넣는 동안은 외부 P4가 첫 박자를 맡는다(시상하부를 프라이밍하면서, 고P4로 E2를 음성 쪽에 묶어 발정을 억제). 빼면 둘째 박자(탈억제)가 되어 E2가 양성으로 돌아서며 발정이 몰린다. 자기 황체가 없는 소에서도 P4 장치가 두 박자를 대신 만들어 주는 셈이다.</p>
<div class="rb-sub">Select-Synch</div>
<p class="rb-p">Select-Synch는 난포 나이를 맞추는 방법이다. 앞의 PGF2α 단독·CIDR 단독은 유기된 발정이 개체마다 들쭉날쭉하고, 수정 대상 난포의 일령이 높아지면 난자가 노화해 수태율이 떨어진다는 약점이 있다. 실제로 난포 일령이 5~10일이면 수태율이 서서히 떨어지고, 11일을 넘으면 급락한다. 그래서 난포파 자체를 인위로 리셋해 적정 나이의 난포에 수정하자는 것이 Select-Synch다.</p>
<p class="rb-p">황체가 있는 소에서 시작한다. GnRH(0일)를 놓으면 LH 서지가 일어나 우성 난포가 배란되고(투여 약 30시간 후), 그 자리에서 새 난포파가 출발한다 — 난포 나이가 0으로 리셋되는 셈이다. 7일째가 되면 새 우성 난포가 5.5일령으로 자라는데, 이때 PGF2α로 황체를 녹여 발정·배란이 적정 일령 난포에서 일어나게 한다. 이후 7~10일에 발정을 관찰해 AI한다.</p>
<p class="rb-p">0일 GnRH는 시상하부를 건너뛰고 뇌하수체를 직접 때려 LH 서지를 만든다. 자연 주기에선 E2가 양성 되먹임으로 만들던 그 서지를, 여기선 GnRH가 대신 일으켜 우성 난포를 배란시키고 난포파를 0으로 리셋하는 것이다. 7일 PGF는 P4를 빼는 둘째 박자에 해당한다.</p>
<div class="rb-sub">오브싱크(Ovsynch)와 시작 시기</div>
<p class="rb-p">Select-Synch에 마지막 GnRH를 더해 배란까지 동기화하므로 발정 관찰 없이 정시 AI가 가능하다. 골격은 GnRH(0일) → PGF2α(7일) → GnRH(9일) → 정시 AI(2차 GnRH 약 16시간 후). 첫 GnRH가 우성 난포를 배란시켜 난포파를 리셋하고, 7일 기다려 새 우성 난포를 키운 뒤, PGF로 황체를 녹이고, 2차 GnRH로 배란을 유도해 시간을 맞춰 수정한다.</p>
<div class="rb-caution"><b>시작 시기가 성패를 가른다</b> 주기 5일 이전 시작: 우성 난포가 작아 1차 GnRH로 배란이 안 됨 → 실패. 주기 14일 이후 시작: PGF 투여 전 황체가 이미 퇴행해 AI 전에 배란 → 실패. 결론: 주기 5~14일 사이에 시작. 14일 이후 시작해야 하면 1차 GnRH와 함께 P4 제제를 넣어 조기 배란을 막는다.</div>
<p class="rb-p">오브싱크는 배란을 GnRH로 두 번 직접 일으킨다. 1차 GnRH는 현재 우성 난포를 배란시켜 난포파를 0으로 리셋하고(반응할 우성 난포가 있어야 하므로 주기 5일 이전엔 실패), 7일 PGF로 P4를 빼고(둘째 박자), 2차 GnRH가 새로 자란 성숙 난포를 정시에 배란시킨다. 자연 주기라면 E2의 양성 되먹임이 만들 LH 서지를, 두 번 다 GnRH가 뇌하수체를 직접 때려 대신 일으키는 것이다. 주기 14일 이후 시작이 위험한 건, PGF 전에 황체가 스스로 녹아 P4가 먼저 빠지면 자기 E2가 양성 되먹임으로 미리 서지를 터뜨려 AI 전에 배란해버리기 때문이다 — 이때 P4 제제를 넣어 그 조기 탈억제를 막는다.</p>
<div class="rb-sub">오브싱크 변법 — 히트싱크·시더싱크·eCG</div>
<p class="rb-p">오브싱크(GnRH 0일 → PGF2α 7일 → GnRH 9일 → 정시 AI)를 소 상태나 현장 사정에 맞게 변형한 것들이다.</p>
<div class="rb-h">히트싱크 (Heatsynch) — 마지막 GnRH를 E2로 바꾼 변법</div>
<p class="rb-p">오브싱크의 마지막 배란 유발제(2차 GnRH)를 E2로 바꾼다. 배란 유기 효과는 GnRH와 비슷한데, E2를 쓰면 AI 시점에 발정 징후가 나타나 시술자가 발정을 눈으로 보고 수정할 수 있어 안심된다는 게 이점이다. 관건은 E2 타이밍 — E2 투여 후 약 16~24시간에 LH 서지 피크가 오고, 배란은 E2 투여 약 42~52시간 후다.</p>
<ul class="rb-list"><li>GnRH (0일)</li><li>PGF2α (7일)</li><li>E2 (8일, PGF 24시간 후)</li><li>정시 AI (9~9.5일, E2 후 24~36시간)</li></ul>
<p class="rb-p">마지막 E2는 1장의 양성 되먹임을 직접 당기는 것이다. 7일 PGF로 이미 P4가 낮아져 있어(프라이밍은 주기 소라 충족) 외부 고E2가 &quot;저P4+프라이밍&quot; 조건에 맞아 시상하부를 통해 LH 서지를 일으킨다. GnRH(뇌하수체 직격)보다 배란이 느린(42~52h) 것은 E2가 시상하부 양성 되먹임 회로를 한 바퀴 돌아 작동하기 때문이다.</p>
<div class="rb-h">시더싱크 (CIDR-Synch) — 오브싱크 + CIDR</div>
<p class="rb-p">오브싱크는 황체 보유우라야 높은 수태율이 나온다. 그래서 시작 시 황체가 불명확하거나, 주기 후반(14일 이후)에 시작해 처치 중 황체가 퇴행해버릴 우려가 있으면, CIDR(P4 제제)를 함께 넣어 P4를 인위로 받쳐준다. 골격은 오브싱크와 같고 거기에 CIDR가 더해진 것이라, 황체가 불안한 소에서도 쓸 수 있게 해준다.</p>
<div class="rb-h">eCG 프로토콜 — 무발정·생식력 저하 소에</div>
<p class="rb-p">난소가 잘 안 도는 소(무발정기·생식력 저하)에 쓴다. P4 장치로 P4를 높게 깔아(고P4 = FSH·LH 억제·난포 성장 억제) 발정·배란을 일단 누르고 동기화한 뒤, 장치를 빼 P4가 빠진 자리에 eCG를 놓아 난포 발육·배란을 강하게 밀어준다(저P4+E2 = LH 자극·배란).</p>
<ul class="rb-list"><li>P4 장치 삽입 (0일)</li><li>PGF2α (6일, 황체 퇴행)</li><li>장치 제거 + eCG 400~600IU(구 PMSG), 쌍태 방지 위해 용량 조절 (7일)</li><li>정시 AI (8~10일) — 가장 흔한 건 56시간 1회 AI; 발정 확인 후 AI나 48·72시간 2회 AI도 가능</li></ul>
<p class="rb-p">주의: 대사 상태가 나쁘거나 분만 직후인 소에 쓰면 실패하기 쉽다.</p>
<p class="rb-p">대상이 무발정·생식력 저하 소인 게 핵심이다. 이런 소는 ① P4를 겪은 적 없어 프라이밍이 빠져 있고(3·13장 낭종·사춘기 전과 같은 상태) ② 자기 LH 드라이브도 약하다. 프로토콜이 이 둘을 메운다 — P4 장치(0일)가 빠진 프라이밍을 깔아 주고(첫 박자), 장치 제거(둘째 박자) 자리에 eCG(FSH·LH 활성)를 부어 약한 엔진을 보충해 난포 발육·배란을 강하게 민다.</p>
<div class="rb-clinical"><b>대원칙</b> 호르몬 처치는 효과적이지만, 소의 난소·자궁·과거~현재 상태를 이해한 뒤 한다. 오브싱크·시더싱크 모두 &quot;황체 보유&quot;가 수태율의 전제임을 잊지 않는다.</div>
<div class="rb-sub">E2+P4 프로그램</div>
<p class="rb-p">오브싱크가 GnRH로 우성 난포를 배란시켜 난포파를 리셋하는 것과 달리, E2+P4는 E2+P4로 뇌하수체의 FSH·LH 방출을 억눌러 우성 난포를 폐쇄시킨 뒤 새 난포파를 띄운다. 가장 큰 이점은 황체·난포 상태에 덜 의존해 발정주기와 관계없이 아무 때나 시작할 수 있다는 것이다(시작 시기에 민감한 오브싱크와 대조된다).</p>
<p class="rb-p">작동 흐름은 이렇다. 0일에 E2와 P4 제제를 함께 넣으면 고E2+고P4가 만들어져 FSH·LH 방출이 억제되고, 자라던 난포(우성 난포 포함)가 폐쇄된다. 이후 E2가 서서히 분해돼 고P4만 남고 우성 난포도 사라지면 FSH가 회복되며 새 난포파가 출발한다(평균 4일째). 9일에 PGF2α와 P4 제거로 황체를 녹이고, 10일에 E2로 배란을 유도해(E2 후 16~24시간 LH 서지, 42~52시간 후 배란) 11~11.5일에 정시 AI한다.</p>
<ul class="rb-list"><li>E2 2.0mg + P4 제제 삽입 (0일) → 고E2+고P4 → 난포 폐쇄</li><li>새 난포파 출현 (평균 4일) → E2 분해, 고P4만 남아 FSH 회복</li><li>PGF2α + P4 제거 (9일) → 황체 퇴행 (난포 약 5일령)</li><li>E2 (10일) → 배란 유도 (난포 약 6일령)</li><li>정시 AI (11~11.5일) → 난포 약 7~7.5일령</li></ul>
<p class="rb-p">같은 E2를 앞에선 음성, 뒤에선 양성으로 시간차로 쓰는 프로그램이다. 0일 E2는 P4를 함께 넣어 고P4 배경이라 1장 ③조건대로 양성이 차단되고 음성으로 작동해 FSH·LH를 눌러 우성 난포를 폐쇄시킨다(리셋). 그동안 깔린 P4가 시상하부를 프라이밍하고, 9일 P4 제거로 P4가 빠진 뒤 10일 E2는 &quot;저P4+프라이밍&quot; 조건이라 이번엔 양성 되먹임으로 LH 서지를 일으킨다. P4 장치 하나가 폐쇄(음성 배경)와 프라이밍을 동시에 맡으니, 난포·황체 상태와 무관하게 아무 때나 시작할 수 있다.</p>
<div class="rb-caution"><b>수태율이 떨어지는 패턴</b> 소 상태(육우/젖소·산유량)에 따라 E2 분해 속도가 달라 새 난포파 발현이 3~5일로 폭이 생기고, AI 때 난포 크기 편차가 커진다. ① 20mm 가까운 큰 난포 + 퇴행 황체/무황체: 우성 난포가 폐쇄되지 않아 노화한 난자를 배란 → 수태율↓. ② 15mm 미만 작은 난포(특히 한우·흑모와종): 발육 개시가 늦거나 PGF까지 일수가 짧으면(흑모와종 8일 이내) AI 시점에 난포가 덜 커 있음.</div></div>
<div class="grass-section-title"><span class="gst-wrap"><span class="gst-main">${svgIcon('noEntry',15)} 11. 번식 장애</span><span class="gst-sub">무배란/무발정/발견실패 분류, 난소·자궁 질환, 리피트 브리더</span></span></div>
<div class="rb-block"><div class="rb-sub">분류 — 발정이 없으면 난소 상태로 가른다</div>
<p class="rb-p">번식 장애는 우군의 약 10~20%에서 발생하며 난소 관련이 50~60%, 자궁 관련이 20~30%다. VWP를 경과해도 발정이 없는 소는 검진 시 난소 상태로 분류하는 것이 출발점이다.</p>
<ul class="rb-list"><li><b class="rb-label">무배란우</b> 황체 없음, 주기 미회복 — 난소 정지·난포 낭종.</li><li><b class="rb-label">무발정 배란우(둔성 발정)</b> 배란·황체는 있으나 외부 징후가 없음.</li><li><b class="rb-label">발정 발견 실패</b> 관찰 미비 또는 황체 유잔으로 인한 인위적 무발정.</li></ul>
<div class="rb-sub">난소 장애</div>
<p class="rb-p">난소 정지는 황체 형성이 없고 주기가 미회복된, 진짜로 발정이 없는 상태다. 분만 후 회복이 순조로우면 보통 30~40일에 첫 발정이 오므로, 이를 넘겨 난소가 조용하면 의심한다. 배경에 분만 전후 영양 부족, 난산·주산기 질환, 저BCS가 흔하다. 배란 유도제(GnRH/hCG)나 동기화로 배란을 촉진하되, 근본은 컨디션 회복이다.</p>
<p class="rb-p">난포 낭종은 우성 난포가 멈춰야 할 시점에 P4가 낮아 LH 억제가 풀리면, 난포가 배란도 퇴행도 못 하고 25mm 이상으로 커져 10일 이상 유지되는 것이다(저프로게스테론–과잉 LH가 근본 원인, 3장). 고비유 초기 강한 음에너지 균형이 흔한 배경이다. 25mm 이상의 낭종 자체보다 그 이면에서 발육 중인 우성 난포의 배란을 노려 배란 유도제·동기화를 쓰고, 1~2주 후 새 황체 형성을 확인한다.</p>
<p class="rb-p">황체 유존(잔)은 임신 아닌데 황체가 장기간(20mm 이상 15일 이상) 유지돼 발정이 안 오는 상태다. 자궁 내 이물질(미이라·농·점액)이나 내막염에 의한 PGF2α 생성 저해가 배경이며, PGF2α 투여로 퇴행시킨다(자궁 이상 시 세척 병행). 무발정 배란(둔성 발정)은 고비유우에서 E2의 발정 발현 효과가 약해 흔하며, 분만 후 첫 배란의 약 94%가 발정을 동반하지 않는다는 보고와 맥을 같이한다.</p>
<div class="rb-sub">자궁·질 장애</div>
<p class="rb-p">먼저 외음부에서 점액 이외의 비정상 배출물(농=하얀 덩어리, 뇨=소변)이 있는지 본다.</p>
<ul class="rb-list"><li><b class="rb-label">요질</b> 소변이 질 내로 역류·저류(황색·요취). 노령우·수척우에 많고, 외자궁구를 덮을 정도면 발정 시 소변이 자궁으로 역류해 번식이 곤란.</li><li><b class="rb-label">질염</b> 농·질벽 충혈(발정 충혈보다 붉은기 강함). 난산·태반정체·자궁염에 속발. 역성비누 온수/생리식염수 반복 세척.</li><li><b class="rb-label">자궁내막염</b> 외자궁구 농 배출=임상성, 농 안 보이면=잠재성(사이토브러시로 확인). 정상 발정인데 3회 수정 불수태면 의심. 자궁 내 주입(항생제·요드제)이 1선택, 심하면 생리식염수 세척. 발정 발현·수태율을 떨어뜨리므로 번식 개시 전 평가·처치가 중요.</li><li><b class="rb-label">자궁축농증</b> 자궁강에 농 저류 + 난소에 황체 유지(농이 PGF2α를 막아 황체가 안 죽음). 임신 2~3개월과 감별(태막 슬립 없음, 좌우 대칭 팽만). PGF2α로 발정 유도·농 배출 후 자궁 내 주입.</li></ul>
<div class="rb-sub">리피트 브리더 (장기 불수태우)</div>
<p class="rb-p">발정주기·생식기가 정상인데 3회 이상 수정해도 수태되지 않는 소(또는 분만 후 150일 이후 미수태). 발생률 10~20%. 원인이 다양해 단일 처치로 해결되지 않으므로, 우군마다 유효한 방법을 찾는다.</p>
<ul class="rb-list"><li><b class="rb-label">배란 지연형</b> 발정·배란은 되나 발정 개시부터 배란까지 시간이 길어진다(보통 30h, 42h 이후 배란). 수정과 동시에 GnRH/hCG를 근주해 배란을 돕고 부황체 형성을 유도 — 수태율 약 10%↑(무처치 32% vs 처치 42%).</li><li><b class="rb-label">잠재성 자궁내막염형</b> 배란 지연이 아닌데도 3회 이상 불수태면 의심한다. AI 1일 후 배란 확인 시점에 0.5% 포비돈 요드제를 자궁 내 주입 — 항생제나 고농도 요드제보다 수태율 개선 효과가 높다.</li><li><b class="rb-label">진성 리피트 브리더</b> 위 처치로도 안 되면 배 발육 저하·수정 장애를 고려한다. ① 황체 보강: 수정 5일 후 hCG 또는 질내 P4(MFBP)(특히 4회 이상 수정우). ② 자궁내막 기능 회복: E2+P4 변법(시작 시 E2 5.0mg 증량, P4 7~9일 유치)로 정시 AI. ③ 수정란 이식(ET)·추가 이식(Hitch-hike). ④ 배사멸 방지: 임신 30일경 배사멸이 반복되는 소는 임신 확인 후 질내 P4를 2주 유치.</li></ul>
<div class="rb-sub">초음파로 본 병변 &amp; 전신 요인</div>
<ul class="rb-list"><li><b class="rb-label">난포낭종 vs 황체화 난포낭종</b> 난포낭종: 얇은 벽(3mm 이하)+균일 무에코+P4&lt;0.9ng/ml. 황체화 난포낭종: 벽 3mm 이상(3~5mm)+내부 회색 입자+P4&gt;0.9ng/ml. 벽이 두꺼워진 황체화 낭종은 생리적 공동성 황체와 혼동 주의.</li><li><b class="rb-label">자궁 병변</b> 자궁내막염=벽 비후+액체, 무에코에 흰 반점→점액화농성. 자궁농증=벽이 압력으로 얇음. 점액자궁증=다량 정상 액체+벽 정상 두께. 배아 흡수=심박 없음, 액체 성상 변화.</li></ul>
<div class="rb-clinical"><b>생식기보다 소체부터</b> 파행(제병)은 통증·건물 섭취 저하로, 유방염은 발정 발현·수태율 저하로 번식을 크게 떨어뜨린다 — 생식기를 보기 전에 소체의 명백한 이상부터 치료한다. 기능성 황체가 끼면 직장검사만으로 오진하기 쉬우니 초음파로 확인한다.</div></div>
<div class="grass-section-title"><span class="gst-wrap"><span class="gst-main">${svgIcon('refresh',15)} 12. 분만 후 회복과 번식 검진 실무</span><span class="gst-sub">자궁 수복·난소 회복, 검진 빈도·전략·대상우, 번식 지표</span></span></div>
<div class="rb-block"><div class="rb-sub">자궁 수복 (산욕기)</div>
<p class="rb-p">분만으로 태아가 만출되면 생식기는 다시 임신 가능한 상태로 회복해 가는데 이 기간이 산욕기다. 자궁은 분만 직후부터 수축해 분만 후 약 5일이면 중량이 절반으로 준다. 오로(자궁 내 저류물)는 분만 후 2~3일에 가장 많고 10일까지 보이며, 처음 적갈색에서 점차 백색 점액으로 옅어지다 사라진다.</p>
<div class="rb-key"><div class="rb-key-t">정상 회복 수치(목표)</div><ul><li>오로 배출 완료: ~25일</li><li>좌우 자궁각 차이 소실: ~30일</li><li>자궁 내 농 소실: ~35일</li><li>자궁내막 염증 수습: ~40일</li></ul><div class="rb-key-concl">→ 정상 분만이면 30~40일경 수복 완료</div></div>
<div class="rb-caution"><b>자궁염·산욕열의 배경</b> 점액 없이 적갈색 수양성 오로가 나오면 자궁염, 발열·식욕부진까지 있으면 산욕열로 보고 치료한다. 수복 지연 원인은 난산·태반정체·쌍태분만·유열·과비(BCS 3.75↑)다.</div>
<div class="rb-sub">난소 기능 회복 — 무발정 배란의 함정</div>
<p class="rb-p">분만 후 난소는 4~5일경 첫 난포파를 시작해, 우성 난포가 평균 11.6일에 출현하고 첫 배란이 평균 27.4일에 일어난다. 첫 배란이 빠른 소의 특징은 분만 전후 대사·간 기능이 좋고 유량이 낮다는 것이다 — 고산유우는 간 부하가 크고 글루코스가 유선으로 우선 가서 배란·발정 재개가 늦다.</p>
<div class="rb-clinical"><b>첫 배란의 89%는 발정 없이 온다</b> 난소 주기가 회복돼도 겉으로 발정이 안 보일 수 있다 — 첫 배란의 89%가 무발정 배란이다. 무발정 비율은 2회 배란 시 ~35%, 3회 ~15%, 5회 이후 7%로 낮아진다. 또 첫 배란 후 다음이 21일이 아닌 10일 전후로 짧게 올 수 있어 주기를 추적해야 한다.</div>
<div class="rb-caution"><b>분만 후 60일 함정</b> 분만 1개월경 발정을 보이다 60일 이후 사라지는 경우가 있다. 유량 급증으로 에너지 밸런스가 가장 마이너스가 되는 시기라 발정이 약해지기 때문이다. 더 심해지면 배란 자체가 멈춘다 → 사양 관리 개선이 답이다.</div>
<div class="rb-sub">번식 검진 실무 — 빈도·전략·대상우</div>
<div class="rb-caution"><b>검진 빈도: 3주 간격 절대 금지</b> 보통 2주 간격(대규모 1주, 소규모 4주). 3주(=21일=발정주기)는 매번 같은 주기 같은 타이밍의 소만 보게 돼 평가가 불가능해진다.</div>
<div class="rb-key"><div class="rb-key-t">세 가지 기본 전략</div><ul><li>적기까지 초회 AI (VWP 후 21일 이내 모든 대상우 AI)</li><li>발정 발견율 올리기 (관찰 시간·테일페인트·만보계·동기화)</li><li>수태율 올리기 (적기 AI·정액 취급·환경 냉각·BCS)</li></ul></div>
<ul class="rb-list"><li><b class="rb-label">검진 대상우 5</b> ① 프레쉬 체크(분만 후 30~40일, 자궁 평가) ② 이상 분비물우(자궁내막염) ③ VWP 경과 무발정우(무배란/둔성발정/발견실패) ④ 리피트 브리더(150일↑ 미수태 or AI 3회 실패) ⑤ 임신 감정(AI 후 25일↑ 무발정 — 직장검사 35일·초음파 26일, 60일 재감정).</li></ul>
<div class="rb-clinical"><b>수익성 기준</b> 개별 소는 분만 후 120일까지 수태가 수익성 플러스, 130~150일 넘기면 다음 분만 시 난산·주산기 질환이 증가한다.</div>
<div class="rb-sub">번식 성적 지표와 선순환</div>
<ul class="rb-list"><li><b class="rb-label">발정 발견율</b> 수정 대상우 대비 발정을 발견한 비율. 과거 21일 기준 평가. 못 찾으면 수정 자체 불가 → 가장 기본.</li><li><b class="rb-label">수태율</b> 수정한 소 대비 수태된 비율. &lt;20%면 수정 기술·타이밍·사양 관리 재검토.</li><li><b class="rb-label">공태 일수</b> 분만~수태 일수. 이해는 쉽지만 임신우만 반영 → 농장 전체 임신우 비율과 함께 본다.</li><li><b class="rb-label">임신율</b> 수정률 × 수태율. 실시간·실제적 지표.</li><li><b class="rb-label">VWP</b> 분만 후 수정하지 않는 자발적 대기 기간. 보통 60일(고능력우 70~80일).</li></ul>
<div class="rb-key"><div class="rb-key-t">목표·BCS</div><ul><li>임신율 목표 21% = 발정 발견율 70%↑ × 수태율 30%↑</li><li>분만 후 21일 BCS 변화 → 60일 수정 수태율: 감소군 22.8% / 유지군 36.0% / 증가군 78.3%</li><li>BCS 2.5 이하로 내려가면 가임 주기 회복이 크게 늦어짐</li></ul></div>
<div class="rb-clinical"><b>선순환 만들기</b> 악순환은 &quot;수태 지연 → 과비로 분만 → BCS 급락·질병 → 다시 번식 저하&quot;다. 근본 대책은 분만 시 과비 예방 = 이전 유기에 적기 수태(공태 일수 단축). 분만 후 130일 이내 수태가 다음 유기까지 좋게 하는 핵심이다.</div></div>
<div class="grass-section-title"><span class="gst-wrap"><span class="gst-main">${svgIcon('star',15)} 13. 사춘기와 후보우 관리</span><span class="gst-sub">사춘기 기전·연령 결정 요인·교배 타이밍·생식기 점수(RTS)</span></span></div>
<div class="rb-block"><div class="rb-sub">사춘기의 정의와 기전</div>
<p class="rb-p">사춘기는 미경산우가 스스로 새끼를 밸 수 있게 되는 때다. 임상적으로는 첫 발정이 눈에 띄기 전에 이미 P4가 올라오기 시작하므로, 혈청 P4가 처음 1ng/ml를 넘는 날을 사춘기로 잡는다.</p>
<div class="rb-caution"><b>사춘기 ≠ 첫 배란</b> 대부분의 미경산우는 사춘기 전후에 겉으로 발정 징후 없이 배란하는 무발정 배란을 한 번 거치고, 그때 생긴 황체도 정상보다 짧게 가다 사라진다. &quot;발정을 안 보였으니 미성숙&quot;이라 단정하면 틀린다.</div>
<p class="rb-p">기전의 핵심은 음성 되먹임 민감도다. 어린 미경산우의 시상하부–뇌하수체는 E2 음성 되먹임에 지나치게 민감해 LH가 눌려 있다 — 배란 능력 자체는 일찍부터 있지만(생식선자극호르몬을 주사하면 1개월령에도 배란 유도 가능) 자발적으로는 못 한다. 사춘기가 가까워지며 이 민감도가 떨어지면 LH 펄스가 잦아지고(첫 배란 무렵 시간당 약 1회), 잦아진 LH가 난포를 성숙시켜 거기서 나온 E2가 거꾸로 GnRH 발생기를 가속해 배란성 LH 급증을 터뜨린다.</p>
<div class="rb-clinical"><b>프로게스테론의 예비점화</b> 첫 배란 후 황체가 짧게 끝나는 것은 내막 옥시토신 수용체가 많아 PGF2α가 일찍 터지기 때문이며, P4에 12~14일 노출돼야 수용체가 하향 조절된다. 그리고 사춘기 직전 약하게 한두 번 오르는 P4가 시상하부를 E2 양성 되먹임에 길들여 이후 정상 주기를 확립한다 — 프로게스틴 처치가 사춘기를 앞당기고 동기화 수태율을 올리는 근거다. 성성숙한 소에서도 P4가 쭉 낮아 이 예비점화가 빠지면 같은 일이 벌어진다 — E2가 있어도 서지가 안 터지는 난포낭종이며(3장), 그 치료에 P4 제제를 쓰는 것도 빠진 예비점화를 채워주는 것이다.</div>
<div class="rb-sub">사춘기 연령을 좌우하는 것</div>
<p class="rb-p">사춘기는 보통 9~10개월이지만 6~24개월까지 폭이 넓고, 핵심 원리는 연령보다 체중의 영향을 더 받는다는 것이다. 잘 먹여 빨리 키운 미경산우는 더 어린 나이에 도달하고, 같은 골격이면 더 무거운 쪽이 더 일찍 온다. 품종 효과는 이를 압도해, 성숙 체격이 큰 품종일수록 사춘기가 늦고 더 무겁다.</p>
<div class="rb-key"><div class="rb-key-t">영양·신호</div><ul><li>증체 예: 100kg부터 하루 1.1/0.8/0.5kg → 사춘기 9/11/16개월</li><li>영양–사춘기를 잇는 신호: 렙틴(체지방 역치)·키스펩틴</li><li>4~9개월령이 신경내분비 축을 프로그래밍하는 결정적 창</li></ul></div>
<ul class="rb-list"><li><b class="rb-label">어미·태아 영양</b> 처녀우(어린 어미)의 딸은 1년령 동난포 수가 적다(난소 비축 작음) → 성숙한 어미의 딸을 후보로. 임신 후기 단백 보충 어미의 딸은 14일 일찍 사춘기.</li><li><b class="rb-label">기질·수소 노출</b> 예민한(보정틀에서 빨리 튀는) 보스 인디쿠스는 코르티솔↑로 사춘기 늦음. 수소 노출은 소에선 사춘기를 앞당기지 않음(양·염소·돼지와 다름).</li></ul>
<div class="rb-sub">교배 타이밍과 사춘기 앞당기기</div>
<div class="rb-caution"><b>첫 발정에 바로 교배 금지</b> 사춘기 첫 발정에 수태시키면 분만율이 3차 발정 교배보다 21% 낮다. 미경산우는 교배 예정 시점보다 1~3개월 앞서 사춘기에 도달해 있어야 한다. 또 3차 발정 교배는 첫 발정 교배보다 초회 수태율이 21~36% 높으므로, 목표체중에 시즌 시작 최소 3주 전 도달시켜 미리 주기를 돌게 한다.</div>
<div class="rb-key"><div class="rb-key-t">체중 목표</div><ul><li>사춘기 때 성숙 체중의 55~60%</li><li>교배 목표 ≈ 성숙 체중의 65% (품종마다 다름)</li><li>목표체중까지 ADG 0.5~0.8 kg/일 — 영국종 기준 총 약 91 kg 증체</li><li>2년령 분만이 3년령보다 생애 송아지 수↑ → 이득</li><li>실제론 56%까지만 키워도 65%와 최종 임신율·분만율 차이 없다는 연구도(사료비 두당 $22~45 절감). 단 50% 아래면 후반 수태·경량 송아지 위험</li></ul></div>
<ul class="rb-list"><li><b class="rb-label">광주기</b> 겨울은 사춘기를 늦추고, 멜라토닌·일장 연장은 앞당긴다</li><li><b class="rb-label">프로게스틴</b> MGA 8일 또는 CIDR — 예비점화를 가속하며, 조기 황체퇴행에 취약한 사춘기 전후 미경산우 동기화에 유효</li><li><b class="rb-label">영양</b> 조기 이유 + 고농후사료로 300일령 이전 조숙성 유도 가능</li><li><b class="rb-label">이오노포어</b> 모넨신 약 200 mg/일 — 사료효율·증체를 높이고 사춘기를 앞당긴다</li></ul>
<div class="rb-sub">생식기 점수(RTS)로 사춘기 가늠</div>
<p class="rb-p">직장검사로 난소 난포 발달과 자궁각 긴장도·크기를 보고 1~5로 매기는 주관적 지표다. 점수가 높을수록 인공수정 수태율과 양의 상관을 보인다.</p>
<ul class="rb-list"><li><b class="rb-label">RTS 1</b> 긴장도 없는 작은 자궁각 + 구조물 없는 작은 난소(유아형). 사춘기에서 가장 멀다.</li><li><b class="rb-label">RTS 2</b> 자궁각·난소가 더 커진 단계.</li><li><b class="rb-label">RTS 3</b> 자궁 긴장도와 난포가 만져져 주기 직전.</li><li><b class="rb-label">RTS 4</b> 자궁각이 꼬이고 배란전 크기 난포 존재(주기 도는 것으로 보되 황체는 잘 구별 안 됨).</li><li><b class="rb-label">RTS 5</b> 거기에 황체까지 만져지는 단계.</li></ul>
<div class="rb-clinical"><b>난포 수 계측(AFC)</b> RTS를 보완하는 선발 도구. 초음파로 양쪽 난소의 동난포를 합산하면 난소 비축(원시난포 수)을 반영하며, 유전·크기·나이·발정 단계가 달라도 재현성이 높다. AFC가 낮은 개체(총 &lt;15)는 작은 난소·낮은 임신율을 보였고(높은 군 &gt;25 대비), 리피트 브리더 소도 동난포가 적다 — 번식 전 가임성·수명 예측에 활용한다.</div>
<div class="rb-sub">이유 시 후보우 선발</div>
<p class="rb-p">후보우 육성은 이유 때 선발로 시작한다. 선발 기준은 나이·체중·기질·어미의 생산성이며, 발·다리 구조(지제 건전성)도 반드시 본다 — 지제 불량은 평생 생산 수명을 깎기 때문이다. 분만시즌 전반부에 태어난 개체를 고르면 시즌 시작 전 사춘기에 도달할 확률이 오른다. 나이·품종은 이미 정해져 있으므로 실질적 1차 지표는 이유체중이고, 체중·체격점수(frame score)로 줄 세워 너무 크거나 가벼운 개체를 추려낸다.</p>
<div class="rb-clinical"><b>10~15%만 더 남긴다</b> 잘 짜인 농장은 임신시킬 필요 두수보다 10~15%만 더 보유하면 된다. 그래야 현 축군 규모를 유지하면서, 불필요하게 많이 남겨 생기는 기회비용을 피할 수 있다.</div></div>
<div class="grass-section-title"><span class="gst-wrap"><span class="gst-main">${svgIcon('dna',15)} 14. 태아 프로그래밍과 영양</span><span class="gst-sub">자궁 내 환경이 평생 성적·다음 세대를 좌우한다</span></span></div>
<div class="rb-block"><div class="rb-sub">태아 프로그래밍이란</div>
<p class="rb-p">태아 프로그래밍을 한 줄로 요약하면, 태아기에 어미가 겪은 환경이 그 새끼의 평생 표현형을 바꿔놓고 그 효과는 출생 후 아무리 잘 관리해도 되돌리기 어렵다는 것이다. 같은 유전형이라도 노출이 배아·태아·송아지 중 언제 일어났느냐로 영향이 크게 달라지며, 발달 가소성이 가장 높은 태아기가 제일 취약하다.</p>
<div class="rb-caution"><b>출생체중만 보면 안 된다</b> 저체중 송아지는 이환·폐사 위험이 높고 성장이 느리며 지방은 많고 근육은 적은 나쁜 체성분에 대사·번식 기능까지 떨어진다. 다만 출생체중이 멀쩡해도 프로그래밍 효과가 숨어 있다 나중에 드러날 수 있다.</div>
<p class="rb-p">소는 양과 다르다는 점도 알아둔다 — 양은 태반이 임신 첫 2/3에 다 자라고 태아 성장의 90%가 마지막 1/3에 몰리지만, 소 태반은 임신 내내 계속 커지되 태아가 태반보다 훨씬 빨리 자란다. 그래서 양 연구를 소에 그대로 적용하면 안 된다.</p>
<div class="rb-sub">근섬유 수는 출생 전에 확정된다</div>
<p class="rb-p">자손 성적에서 반드시 기억할 핵심이다. 총 근섬유 수는 소에서 임신 180일에 확정되고 그 뒤로는 새 근섬유가 생기지 않는다 — 출생 후 성장은 전부 기존 근섬유가 굵고 길어지는 것뿐이다. 그러니 수율 좋은 도체를 원하면 출생 후가 아니라 자궁 안에서 승부가 난다.</p>
<p class="rb-p">자궁에서 영양이 부족하면 대사 성향이 지질 저장 쪽으로 굳어, 나중에 잘 먹여도 따라잡기 성장의 상당 부분이 근육이 아니라 지방으로 간다.</p>
<div class="rb-sub">어미 영양과 결정적 창</div>
<ul class="rb-list"><li><b class="rb-label">분만 전 100일 굶김</b> 송아지 출생체중 7%↓, 폐사율 10%↑. 단 태아 체중당 혈류 효율은 오히려 좋아지는 보상.</li><li><b class="rb-label">임신 첫 1/3 제한</b> 딸의 동난포 수(AFC) 60% 낮게 태어남 → 딸의 평생 가임성에 영향.</li><li><b class="rb-label">임신 후기 단백 보충</b> 딸이 14일 일찍 사춘기 도달.</li></ul>
<div class="rb-clinical"><b>멜라토닌 보충</b> 임신 후반 어미에게 멜라토닌을 보충하면 자궁동맥 혈류가 늘고, 출생체중은 그대로인데 이유 체중이 는다(육우 57파운드). 태아 근육에서 위성세포 활성·근생성이 오르고 지방 생성은 줄어, 강화된 근육 성향이 이유까지 이어진다 — 진짜 태아 프로그래밍 효과다.</div>
<div class="rb-key"><div class="rb-key-t">임상 — 한눈에</div><ul><li>임신 중 어미 영양은 출생체중을 넘어 평생 성장·도체·번식 성적과 다음 세대까지 좌우</li><li>결정적 창: 임신 첫 1/3(딸의 난소 비축) + 임신 후기(근육·체중)</li></ul></div></div>
  `;
}

function namuify(root, doc){
  root = root || document.getElementById('main');
  if(!root) return;
  doc = doc || {};
  root.classList.add('namu-doc');
  const admin = (typeof isAdmin==='function') && isAdmin();
  const tab = (typeof UI!=='undefined' && UI.vetTab) ? UI.vetTab : 'repro';
  const sub = root.querySelector('.modal-sub');
  let titleText = doc.title || (sub ? sub.textContent.trim() : '문서');
  if(sub) sub.remove();
  const intro = root.querySelector('.rb-intro');
  let introHtml = '';
  if(intro){ introHtml = intro.outerHTML; intro.remove(); }
  const stripIcon = s => s.replace(/^[\u{1F000}-\u{1FAFF}\u2600-\u27BF\uFE0F\s]+/u,'').replace(/^\s*\d+\.\s*/,'').trim();
  const chev = '<span class="namu-chev"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg></span>';
  const chapters = [...root.querySelectorAll('.grass-section-title')];
  let ci=0;
  chapters.forEach(ch=>{
    ci++; let si=0;
    const gm = ch.querySelector('.gst-main');
    const gs = ch.querySelector('.gst-sub');
    const svg = gm ? gm.querySelector('svg') : null;
    const iconHtml = svg ? svg.outerHTML : '';
    const t = stripIcon(gm ? gm.textContent : ch.textContent);
    const subText = gs ? gs.textContent.trim() : '';
    const h = document.createElement('h2');
    h.className='namu-h2'; h.id='s-'+ci;
    h.dataset.vkey = tab+'::'+t;
    h.innerHTML = chev+'<span class="namu-num">'+ci+'.</span>'+(iconHtml?' '+iconHtml:'')+' <span class="namu-htext">'+t+'</span>'+(subText?'<div class="namu-hsub">'+subText+'</div>':'');
    ch.replaceWith(h);
    const block = h.nextElementSibling;
    if(block && block.classList.contains('rb-block')){
      block.querySelectorAll('.rb-sub').forEach(rs=>{
        si++;
        const st = rs.textContent.trim();
        const h3 = document.createElement('h3');
        h3.className='namu-h3'; h3.id='s-'+ci+'-'+si;
        h3.dataset.vkey = tab+'::'+st;
        h3.innerHTML = chev+'<span class="namu-num">'+ci+'.'+si+'.</span> <span class="namu-htext">'+st+'</span>'+(admin?'<span class="namu-edit">[편집]</span>':'');
        rs.replaceWith(h3);
      });
    }
    if(admin && si===0){
      const ht = h.querySelector('.namu-htext');
      if(ht) ht.insertAdjacentHTML('afterend','<span class="namu-edit">[편집]</span>');
    }
  });
  let header = '<div class="namu-head"><h1 class="namu-title">'+titleText+'</h1>'+
    '<div class="namu-meta">최근 수정 시각: 2026-06-23 (v2026-06-23)</div>'+
    (doc.category?'<div class="namu-cat"><b>분류</b> '+doc.category+'</div>':'')+'</div>';
  root.insertAdjacentHTML('afterbegin', header + introHtml);
  vetApplyOverrides(root);
  root.querySelectorAll('.namu-h2,.namu-h3').forEach(function(hh){
    hh.addEventListener('click', function(){ namuToggle(hh); });
  });
  root.querySelectorAll('.namu-edit').forEach(function(ed){
    ed.addEventListener('click', function(e){ e.stopPropagation(); const hh=ed.closest('.namu-h2,.namu-h3'); if(hh) vetEnterEdit(hh); });
  });
}
function namuToggle(h){
  var collapsed = h.classList.toggle('namu-collapsed');
  var stop = (h.tagName === 'H2') ? ['H2'] : ['H2','H3'];
  var n = h.nextElementSibling;
  while(n && stop.indexOf(n.tagName) === -1){
    n.style.display = collapsed ? 'none' : '';
    n = n.nextElementSibling;
  }
}
let VETEDITS = {}, _vetLoaded = false, _vetLoading = false;
async function vetEditsEnsure(){
  if(_vetLoaded || _vetLoading) return;
  if(typeof firebase==='undefined' || !firebase.apps || !firebase.apps.length) return;
  _vetLoading = true;
  try{
    const db = firebase.firestore();
    const snap = await db.collection('library').doc('vetEdits').get();
    VETEDITS = (snap.exists && snap.data() && snap.data().data) ? (JSON.parse(snap.data().data)||{}) : {};
    _vetLoaded = true;
  }catch(e){ console.warn('vetEdits load 실패', e); }
  _vetLoading = false;
  if(typeof UI!=='undefined' && UI.vetMode){ try{ renderVet(); }catch(e){} }
}
async function vetEditsSave(){
  try{
    const db = firebase.firestore();
    await db.collection('library').doc('vetEdits').set({data:JSON.stringify(VETEDITS), updated:Date.now()}, {merge:true});
    if(typeof toast==='function') toast('수정 내용이 저장됐어요.');
  }catch(e){ console.warn('vetEdits save 실패', e); if(typeof toast==='function') toast('저장 실패 — 주인 계정 로그인 상태를 확인해주세요.'); }
}
function vetSecNodes(h){
  var stop = (h.tagName==='H2') ? ['H2'] : ['H2','H3'];
  var nodes=[], n=h.nextElementSibling;
  while(n && stop.indexOf(n.tagName)===-1){ nodes.push(n); n=n.nextElementSibling; }
  return nodes;
}
function vetApplyOverrides(root){
  if(!VETEDITS) return;
  root.querySelectorAll('.namu-h2,.namu-h3').forEach(function(h){
    var key=h.dataset.vkey; if(!key) return;
    var html=VETEDITS[key]; if(html==null) return;
    var nodes=vetSecNodes(h); if(!nodes.length) return;
    var parent=nodes[0].parentNode;
    var anchor=nodes[nodes.length-1].nextSibling;
    nodes.forEach(function(n){ n.remove(); });
    var tmp=document.createElement('div'); tmp.innerHTML=html;
    while(tmp.firstChild){ parent.insertBefore(tmp.firstChild, anchor); }
  });
}
function vetEnterEdit(h){
  if(!((typeof isAdmin==='function') && isAdmin())) return;
  if(document.querySelector('.vet-edit-box')) return;
  var nodes=vetSecNodes(h); if(!nodes.length) return;
  var parent=nodes[0].parentNode;
  var box=document.createElement('div');
  box.className='vet-edit-box'; box.setAttribute('contenteditable','true');
  parent.insertBefore(box, nodes[0]);
  nodes.forEach(function(n){ box.appendChild(n); });
  var bar=document.createElement('div');
  bar.className='vet-edit-bar';
  bar.innerHTML='<button type="button" class="vet-eb-save">저장</button><button type="button" class="vet-eb-cancel">취소</button>';
  box.insertAdjacentElement('afterend', bar);
  box.focus();
  bar.querySelector('.vet-eb-save').addEventListener('click', async function(){
    VETEDITS[h.dataset.vkey]=box.innerHTML;
    this.textContent='저장 중…'; this.disabled=true;
    await vetEditsSave();
    renderVet();
  });
  bar.querySelector('.vet-eb-cancel').addEventListener('click', function(){ renderVet(); });
}

/* 풀정보: 섹션 제목 + 카드를 접이식(아코디언)으로 묶기 — 모바일에서 목차부터 보이게 */
function groupGrassSections(root){
  root = root || document.getElementById('main');
  if(!root) return;
  const titles = [...root.querySelectorAll('.grass-section-title')];
  titles.forEach(title => {
    const details = document.createElement('details');
    details.className = 'grass-acc';
    details.open = false;          // 기본 접힘 → 목차처럼 보임
    const summary = document.createElement('summary');
    summary.className = 'grass-acc-sum';
    summary.innerHTML = title.innerHTML;
    details.appendChild(summary);
    title.replaceWith(details);
    let node = details.nextElementSibling;
    while(node && !node.classList.contains('grass-section-title') && !node.classList.contains('modal-actions')){
      const next = node.nextElementSibling;
      details.appendChild(node);
      node = next;
    }
  });

function allOwnersScheduleHtml(){
  const today = todayStr();
  // 개체별 스케줄과 동일한 규칙(scheduleRowsForOwner): 자동개체 포함·숨긴칸 제외·축주별 설정 범위
  const allRows = [];
  DATA.owners.forEach(owner => {
    scheduleRowsForOwner(owner).forEach(r => { if(r.date >= today) allRows.push({ ...r, owner }); });
  });
  allRows.sort((a,b)=>a.date.localeCompare(b.date)||(a.owner.localeCompare(b.owner))||(a.aid.localeCompare(b.aid)));
  if(!allRows.length) return `<div class="empty-state">표시할 스케줄이 없어요.</div>`;
  let html = '';
  let lastDate = '';
  allRows.forEach(row => {
    if(row.date !== lastDate){
      lastDate = row.date;
      const isToday = row.date === today;
      html += `<div class="allsched-date ${isToday?'allsched-today':''}">${row.date} (${weekdayKr(row.date)})</div>`;
    }
    const done = row.done;
    const skipped = isCellSkipped(row.owner, row.aid, row.date);
    html += `<div class="allsched-item ${done?'done':''} ${skipped?'skipped':''} ${row.isAuto?'auto':''}">
      <span class="tag-chip sm" data-animal-id="${esc(row.aid)}" data-owner="${esc(row.owner)}">${esc(row.aid)}</span>
      <span class="allsched-owner">${esc(row.owner)}</span>
      <span class="allsched-note">${esc(row.note)}</span>
      <button class="done-btn ${done?'is-done':''}" data-action="toggleCellDoneAll" data-owner="${esc(row.owner)}" data-aid="${esc(row.aid)}" data-date="${row.date}" title="함(완료)">${svgIcon('check',14)}</button>
      <button class="skip-btn ${skipped?'is-skip':''}" data-action="toggleCellSkipAll" data-owner="${esc(row.owner)}" data-aid="${esc(row.aid)}" data-date="${row.date}" title="안 함">${svgIcon('x',14)}</button>
    </div>`;
  });
  return html;
}

function exportData(){
  try{
    const payload = JSON.stringify(DATA, null, 2);
    const blob = new Blob([payload], { type:'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `번식기록부_백업_${todayStr()}.json`;
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
    toast('백업 파일을 내려받았어요.');
  }catch(e){ console.error(e); toast('백업 내보내기에 실패했어요.'); }
}
function handleImportFile(file){
  if(!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try{
      const obj = JSON.parse(reader.result);
      if(!obj || !Array.isArray(obj.owners) || !Array.isArray(obj.animals) || !Array.isArray(obj.records)){
        toast('형식이 올바른 백업 파일이 아니에요.'); return;
      }
      const cnt = `축주 ${obj.owners.length} · 개체 ${obj.animals.length} · 기록 ${obj.records.length}`;
      if(!confirm(`이 백업으로 현재 데이터를 모두 교체할까요?\n(${cnt})\n현재 내용은 사라집니다.`)) return;
      DATA = obj;
      SAVE_LOCKED = false;                 // 복원하면 저장 잠금 해제
      DATA.owners.forEach(ensureOwnerMeta);
      if(!DATA.owners.includes(UI.owner)) UI.owner = DATA.owners[0];
      saveState();
      applyTheme();
      const banner = document.getElementById('load-error-banner'); if(banner) banner.remove();
      closeModal();
      render();
      toast('백업을 복원했어요.');
    }catch(e){ console.error(e); toast('파일을 읽지 못했어요.'); }
  };
  reader.readAsText(file);
}

  const st = storageStatusLabel();

  _shareDB = firebase.firestore();
  return _shareDB;
}
function genToken(){
  const c='abcdefghijkmnpqrstuvwxyz23456789'; let s='';
  for(let i=0;i<7;i++) s+=c[Math.floor(Math.random()*c.length)];
  return s;
}
function ownerShareToken(owner, regenerate){
  DATA.shareTokens = DATA.shareTokens || {};
  if(regenerate || !DATA.shareTokens[owner]){ DATA.shareTokens[owner] = genToken(); saveState(); }
  return DATA.shareTokens[owner];
}
function recordsOf(owner, animalId){
  return DATA.records.filter(r=>r.owner===owner && r.animalId===animalId)
    .sort((a,b)=> recordSortKey(b) - recordSortKey(a));
}
function shareAnimalStatus(owner, a){
  const recs = recordsOf(owner, a.animalId);
  if(isCurrentlyPregnant(recs)) return { status:'임신중', days:null };
  if(a.fattening) return { status:'비육전환', days:null };
  const aiRecs = recs.filter(r=>r.aiDate).sort((x,y)=> sortKeyOf(y)-sortKeyOf(x));
  if(!aiRecs.length) return { status:'미수정', days:null };
  const aiTs = sortKeyOf(aiRecs[0]);
  const diag = recs.filter(r=>r.pregnant && sortKeyOf(r)>=aiTs).sort((x,y)=> sortKeyOf(y)-sortKeyOf(x));
  const preg = diag.length ? (diag[0].pregnant||'').trim().toUpperCase() : '';
  const aiD = dateOnly(aiRecs[0].aiDate);
  const days = Math.floor((new Date(todayStr()+'T00:00') - new Date(aiD+'T00:00'))/86400000);
  if(preg==='X') return { status:'비임신', days };
  if(preg==='O') return { status:'임신중', days:null };
  return { status: days>=30 ? '임신감정 필요' : '감정 대기', days };
}
function shareExpCalving(owner, a){
  const recs = recordsOf(owner, a.animalId);
  if(!isCurrentlyPregnant(recs)) return null;
  const withCalv = recs.filter(r=>(r.expectedCalving||'').trim());
  return withCalv.length ? dateOnly(withCalv[0].expectedCalving) : null;
}
function buildSharePayload(owner){
  const animals = DATA.animals.filter(a=>a.owner===owner)
    .sort((a,b)=>a.animalId.localeCompare(b.animalId))
    .map(a=>{ const s=shareAnimalStatus(owner,a); return { id:a.animalId, status:s.status, days:s.days, expectedCalving:shareExpCalving(owner,a) }; });
  // 동기화/처치 일정: 그 축주가 수동 입력한 스케줄 (오늘 기준 과거 7일~미래)
  const cutoff = addDays(todayStr(), -7);
  const schedule = DATA.schedule.filter(s=>s.owner===owner && (s.note||'').trim() && dateOnly(s.date) >= cutoff)
    .map(s=>({ date: dateOnly(s.date), id: s.animalId, note: (s.note||'').trim() }))
    .sort((a,b)=> a.date<b.date?-1:a.date>b.date?1:0);
  return { owner, updatedAt: todayStr(), animals, schedule };
}
function shareViewerLink(owner){
  const token = ownerShareToken(owner);
  const base = location.origin + location.pathname.replace(/[^/]*$/, 'viewer.html');
  return base + '?t=' + token;
}
async function publishShare(owner){
  const token = ownerShareToken(owner);
  const payload = buildSharePayload(owner);
  const db = await getShareDB();
  await db.collection('shared').doc(token).set(payload);
  return payload;
}

/* ============================================================
   전공책 보관함 (개인 라이브러리)
   · 진료 데이터와 분리된 Firestore 'library' 컬렉션에 저장
     - library/index           : 책·챕터 목차(가벼움)
     - library/chap_{책}_{챕터} : 챕터 본문(필요할 때만 로딩)
   · 로그인(주인)만 보고/편집. 축주(viewer)는 접근 불가
============================================================ */
let _libDB = null;
async function getLibDB(){
  if(_libDB) return _libDB;
  if(typeof firebase==='undefined') throw new Error('Firebase 미로딩');
  if(!firebase.auth().currentUser){ await firebase.auth().signInAnonymously(); }
  _libDB = firebase.firestore();
  return _libDB;
}
const LIB = { idx:{books:[]}, view:'books', bookId:null, chapId:null, content:'', query:'', editing:false, loading:false, reorder:false };

async function libLoadIndex(){
  const db = await getLibDB();
  const snap = await db.collection('library').doc('index').get();
  LIB.idx = snap.exists ? (snap.data()||{books:[]}) : {books:[]};
  if(!Array.isArray(LIB.idx.books)) LIB.idx.books = [];
  return LIB.idx;
}
async function libSaveIndex(){
  const db = await getLibDB();
  await db.collection('library').doc('index').set(LIB.idx);
}
async function libLoadChapter(bookId, chapId){
  const db = await getLibDB();
  const snap = await db.collection('library').doc('chap_'+bookId+'_'+chapId).get();
  return snap.exists ? (snap.data().content||'') : '';
}
async function libSaveChapter(bookId, chapId, content){
  const db = await getLibDB();
  await db.collection('library').doc('chap_'+bookId+'_'+chapId).set({ content, updatedAt: Date.now() });
}
async function libDeleteChapter(bookId, chapId){
  const db = await getLibDB();
  await db.collection('library').doc('chap_'+bookId+'_'+chapId).delete().catch(()=>{});
}
function libBook(id){ return LIB.idx.books.find(b=>b.id===id); }

async function openLibrary(){
  LIB.view='books'; LIB.bookId=null; LIB.chapId=null; LIB.editing=false; LIB.query='';
  renderLibrary(true);
  try{ await libLoadIndex(); renderLibrary(); }
  catch(e){ console.error(e); toast('보관함을 불러오지 못했어요.'); }
}

function libHighlight(text, q){
  const safe = esc(text);
  if(!q) return safe;
  try{
    const re = new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');
    return safe.replace(re, '<mark class="lib-mark">$1</mark>');
  }catch(_){ return safe; }
}

        ${b&&b.author?`<div class="lib-book-sub">${esc(b.author)}</div>`:''}
        <div class="lib-book-actions">
          <button class="lib-mini" data-action="libRenameBook">이름 수정</button>
          <button class="lib-mini danger" data-action="libDeleteBook">책 삭제</button>
        </div>
      </div>
      ${LIB.reorder?'<div class="lib-reorder-hint">↑↓ 로 순서를 바꾸거나, “번호순 정렬”을 누르세요.</div>':''}
      ${chaps.length ? `<div class="lib-list">${chaps.map((c,i)=>
        LIB.reorder
        ? `<div class="lib-chap reorder">
            <span class="lib-chap-no">${i+1}</span>
            <span class="lib-chap-title">${esc(c.title)}</span>
            <span class="lib-reorder-btns">
              <button class="lib-move" data-action="libMoveUp" data-chap="${esc(c.id)}" ${i===0?'disabled':''}>↑</button>
              <button class="lib-move" data-action="libMoveDown" data-chap="${esc(c.id)}" ${i===chaps.length-1?'disabled':''}>↓</button>
            </span>
          </div>`
        : `<div class="lib-chap" data-action="libOpenChapter" data-chap="${esc(c.id)}">
            <span class="lib-chap-no">${i+1}</span>
            <span class="lib-chap-title">${esc(c.title)}</span>
            <span class="lib-chevron">›</span>
          </div>`).join('')}</div>`
        : `<div class="lib-empty">아직 장이 없어요.<br>“+ 장 추가”로 번역을 넣어보세요.</div>`}
    `;
  } else if(LIB.view==='reader'){
    const b = libBook(LIB.bookId);
    const c = b && (b.chapters||[]).find(x=>x.id===LIB.chapId);
    if(LIB.editing){
      body = `
        <div class="lib-bar">
          <button class="lib-back" data-action="libBackChapters">‹ ${esc(b?b.title:'')}</button>
          <button class="btn small" data-action="libSaveChapter">저장</button>
        </div>
        <input class="lib-edit-title" id="lib-ctitle" value="${esc(c?c.title:'')}" placeholder="장 제목">
        <textarea class="lib-edit-body" id="lib-cbody" placeholder="번역 내용을 붙여넣으세요">${esc(LIB.content)}</textarea>
        <div class="lib-edit-foot">
          <button class="lib-mini danger" data-action="libDeleteChapter">이 장 삭제</button>
        </div>

    } else {
      body = `
        <div class="lib-bar">

        <div class="lib-reader-body" id="lib-reader">${LIB.content ? libHighlight(LIB.content, LIB.query) : '<span class="lib-empty-inline">내용이 비어 있어요. ‘편집’으로 번역을 넣으세요.</span>'}</div>

    const si = document.getElementById('lib-search');
    if(si) si.addEventListener('input', ()=>{
      LIB.query = si.value;
      const rd = document.getElementById('lib-reader');
      if(rd) rd.innerHTML = LIB.content ? libHighlight(LIB.content, LIB.query) : '';
    });
  }
}

const ACTIONS = {
  openLibrary: ()=>{ if(!isAdmin()) return noAdminToast(); openLibrary(); },
  libAddBook: async ()=>{
    const title = prompt('책 제목을 입력하세요'); if(!title) return;
    const author = prompt('저자 (없으면 비워두세요)') || '';
    LIB.idx.books.push({ id:'b'+Date.now(), title:title.trim(), author:author.trim(), chapters:[] });
    try{ await libSaveIndex(); renderLibrary(); toast('책을 추가했어요.'); }
    catch(e){ console.error(e); toast('저장 실패 — 보안 규칙(library)을 확인해주세요.'); }
  },
  libOpenBook: (ds)=>{ LIB.bookId=ds.book; LIB.view='chapters'; renderLibrary(); },
  libBackBooks: ()=>{ LIB.view='books'; renderLibrary(); },
  libRenameBook: async ()=>{
    const b = libBook(LIB.bookId); if(!b) return;
    const t = prompt('책 제목', b.title); if(t===null) return;
    const a = prompt('저자', b.author||''); 
    b.title=t.trim(); if(a!==null) b.author=a.trim();
    try{ await libSaveIndex(); renderLibrary(); toast('수정했어요.'); }catch(e){ toast('저장 실패'); }
  },
  libDeleteBook: async ()=>{
    const b = libBook(LIB.bookId); if(!b) return;
    if(!confirm(`"${b.title}" 책과 모든 장을 삭제할까요?`)) return;
    for(const c of (b.chapters||[])){ await libDeleteChapter(b.id, c.id); }
    LIB.idx.books = LIB.idx.books.filter(x=>x.id!==b.id);
    try{ await libSaveIndex(); LIB.view='books'; renderLibrary(); toast('삭제했어요.'); }catch(e){ toast('저장 실패'); }
  },
  libToggleReorder: ()=>{ LIB.reorder = !LIB.reorder; renderLibrary(); },
  libMoveUp: async (ds)=>{
    const b = libBook(LIB.bookId); if(!b) return;
    const i = b.chapters.findIndex(c=>c.id===ds.chap);
    if(i<=0) return;
    [b.chapters[i-1], b.chapters[i]] = [b.chapters[i], b.chapters[i-1]];
    renderLibrary();
    try{ await libSaveIndex(); }catch(e){ toast('저장 실패'); }
  },
  libMoveDown: async (ds)=>{
    const b = libBook(LIB.bookId); if(!b) return;
    const i = b.chapters.findIndex(c=>c.id===ds.chap);
    if(i<0 || i>=b.chapters.length-1) return;
    [b.chapters[i+1], b.chapters[i]] = [b.chapters[i], b.chapters[i+1]];
    renderLibrary();
    try{ await libSaveIndex(); }catch(e){ toast('저장 실패'); }
  },
  libSortByNumber: async ()=>{
    const b = libBook(LIB.bookId); if(!b) return;
    const numOf = t => { const m = String(t).match(/\d+/); return m ? parseInt(m[0],10) : 999999; };
    b.chapters.sort((x,y)=> numOf(x.title) - numOf(y.title));
    renderLibrary();
    try{ await libSaveIndex(); toast('번호순으로 정렬했어요.'); }catch(e){ toast('저장 실패'); }
  },
  libAddChapter: async ()=>{
    const b = libBook(LIB.bookId); if(!b) return;
    const title = prompt('장 제목 (예: 1장 번식생리)'); if(!title) return;
    const id = 'c'+Date.now();
    b.chapters = b.chapters||[]; b.chapters.push({ id, title:title.trim() });
    try{
      await libSaveChapter(b.id, id, '');
      await libSaveIndex();
      LIB.chapId=id; LIB.content=''; LIB.view='reader'; LIB.editing=true; LIB.query='';
      renderLibrary(); toast('장을 추가했어요. 번역을 붙여넣으세요.');
    }catch(e){ console.error(e); toast('저장 실패'); }
  },
  libOpenChapter: async (ds)=>{
    LIB.chapId=ds.chap; LIB.view='reader'; LIB.editing=false; LIB.query=''; LIB.content='';
    renderLibrary(true);
    try{ LIB.content = await libLoadChapter(LIB.bookId, LIB.chapId); renderLibrary(); }
    catch(e){ console.error(e); toast('내용을 불러오지 못했어요.'); }
  },
  libBackChapters: ()=>{ LIB.view='chapters'; LIB.editing=false; renderLibrary(); },
  libEditChapter: ()=>{ LIB.editing=true; renderLibrary(); },
  libSaveChapter: async ()=>{
    const b = libBook(LIB.bookId); const c = b&&(b.chapters||[]).find(x=>x.id===LIB.chapId); if(!c) return;

    LIB.content = bo ? bo.value : LIB.content;

      await libSaveChapter(b.id, c.id, LIB.content);
      await libSaveIndex();
      LIB.editing=false; renderLibrary(); toast('저장했어요.');
    }catch(e){ console.error(e); toast('저장 실패'); }
  },
  libDeleteChapter: async ()=>{
    const b = libBook(LIB.bookId); const c = b&&(b.chapters||[]).find(x=>x.id===LIB.chapId); if(!c) return;
    if(!confirm(`"${c.title}" 장을 삭제할까요?`)) return;
    await libDeleteChapter(b.id, c.id);
    b.chapters = b.chapters.filter(x=>x.id!==c.id);
    try{ await libSaveIndex(); LIB.view='chapters'; LIB.editing=false; renderLibrary(); toast('삭제했어요.'); }catch(e){ toast('저장 실패'); }
  },

  openShareManage: ()=>{ if(!isAdmin()) return noAdminToast(); openShareManage(); },

      if(st){ st.textContent='✗ 갱신 실패 — 인터넷/Firebase 연결을 확인해주세요.'; st.className='share-status err'; }

  shareCopy: (ds)=>{

  addOwner: ()=>{ if(!isAdmin()) return noAdminToast(); openOwnerModal(); },

  toggleOwnerFavorite: ds=>{

  },

function initEvents(){
  document.addEventListener('click', e=>{
    const chip = e.target.closest('.tag-chip[data-animal-id]');
    if(chip){
      e.preventDefault();
      const id = chip.dataset.animalId;
      const owner = chip.dataset.owner;
      if(owner && DATA.owners.includes(owner)) UI.owner = owner;
      if(document.getElementById('modalRoot')) closeModal();
      if(UI.globalSearch){ UI.globalSearch=''; const gi=document.getElementById('globalSearchInput'); if(gi) gi.value=''; }
      UI.view = 'animal';
      UI.selectedAnimal = id;
      renderMain();
      return;
    }
    const el = e.target.closest('[data-action]');
    if(!el) return;
    const action = el.dataset.action;
    if(ACTIONS[action]) ACTIONS[action](el.dataset, e);
  });
  document.addEventListener('input', e=>{
    const t = e.target;
    if(t.id==='animalSearchInput'){
      UI.animalSearch=t.value;
      const box=document.getElementById('animalListBox'), cnt=document.getElementById('animalCount');
      if(box){ const d=animalListData(); box.innerHTML=d.listHtml; if(cnt) cnt.textContent=d.animals.length; }
      else { pendingFocus={id:t.id,pos:t.selectionStart}; renderMain(); }
    }
    else if(t.id==='dateSearchInput'){
      UI.dateSearch=t.value;
      const box=document.getElementById('dateRowsBox');
      if(box){ box.innerHTML=dateViewRows(); }
      else { pendingFocus={id:t.id,pos:t.selectionStart}; renderMain(); }
    }
    else if(t.id==='globalSearchInput'){
      UI.globalSearch=t.value;
      renderMain();
    }
    else if(t.classList && t.classList.contains('ov-free')){
      const key=t.dataset.key; if(ovaryState[key]){ ovaryState[key].free=t.value; const hid=document.getElementById('f_'+key); if(hid) hid.value=ovaryCombined(key); }
    }
  });
  document.addEventListener('keydown', e=>{
    const n=e.target;
    if(n && n.classList && (n.classList.contains('ov-num')||n.classList.contains('ov-note')) && e.key==='Enter'){
      e.preventDefault();
      ACTIONS.ovaryAdd({key:n.dataset.key});
    }
  });
  document.addEventListener('change', e=>{
    const t = e.target;
    if(t.matches && t.matches('.sched-cell input')){ if(!isAdmin()){ t.value = DATA.schedule.find(s=>s.owner===UI.owner&&s.animalId===t.dataset.aid&&s.date===t.dataset.date)?.note||''; return noAdminToast(); } updateScheduleCell(t.dataset.aid, t.dataset.date, t.value); }
    else if(t.id==='dateFromInput'){ UI.dateFrom=t.value; renderMain(); }
    else if(t.id==='dateToInput'){ UI.dateTo=t.value; renderMain(); }
    else if(t.id==='calc_aiDate'){ actionCalcDateChange(t.value); }
    else if(t.id==='f_estrusDate_date' || t.id==='f_aiDate_date'){
      const nextEl = document.getElementById('f_nextEstrusDate');
      if(nextEl && t.value){ nextEl.value = addDays(t.value, 21); }
    }
    else if(t.dataset && t.dataset.animalField){
      if(!isAdmin()) return noAdminToast();
      const a = DATA.animals.find(x=>x.owner===UI.owner && x.animalId===t.dataset.id);
      if(a){ a[t.dataset.animalField] = t.value; saveState(); renderMain(); }
    }
    else if(t.id==='f_pregnant'){ refreshPregStage(); }
    else if(t.id==='f_sync1Date' && UI.activeSyncProtocol){
      fillSyncProtocolDates(UI.activeSyncProtocol, t.value);
    }
  });
  document.addEventListener('focusin', e=>{
    if(e.target.matches && e.target.matches('.sched-cell input')){
      UI.focusedCell = { id:e.target.id, aid:e.target.dataset.aid, date:e.target.dataset.date };
    }
  });
  document.addEventListener('keydown', e=>{
    if(e.key==='Escape') closeModal();
  });
}

function applyTheme(){
  if(!DATA.theme) DATA.theme = 'light';
  document.documentElement.setAttribute('data-theme', DATA.theme==='dark' ? 'dark' : 'light');
}
// 명백한 오류 날짜 정리 (2000년 이전 예상분만일 → 빈값). 멱등.
function sanitizeData(){
  let changed = false;
  (DATA.records||[]).forEach(r=>{
    const v = (r.expectedCalving||'');
    if(v && /^\d{4}-/.test(v) && parseInt(v.slice(0,4),10) < 2000){
      r.expectedCalving = ''; changed = true;
    }
  });
  return changed;
}
async function init(){
  STORAGE_MODE = await detectStorageMode();
  let stored = null, loadFailed = false;
  try{
    stored = await loadState();
  }catch(e){
    loadFailed = true;
    console.error('불러오기 실패 — 저장을 잠급니다', e);
  }

  if(loadFailed){
    // 읽기 실패: 절대 시드로 덮어쓰지 않음. 화면엔 시드를 보여주되 저장은 잠금.
    DATA = buildInitial();
    SAVE_LOCKED = true;
    setTimeout(showLoadErrorBanner, 0);
  } else if(stored){
    DATA = stored;
  } else {
    // 저장소가 정말 비어있음(최초 실행) → 시드 저장 OK
    DATA = buildInitial();
    await saveState();
  }
  DATA.owners.forEach(ensureOwnerMeta);
  const sanitized = sanitizeData();                 // 오류 날짜(1900 등) 자동 정리
  if(sanitized && !SAVE_LOCKED){ try{ await saveState(); }catch(e){ console.error('정리 저장 실패', e); } }
  UI.owner = DATA.owners[0];
  applyTheme();
  initEvents();
  render();
  subscribeRemoteIfNeeded();
  window.__appReady = true;
}

function showLoadErrorBanner(){
  if(document.getElementById('load-error-banner')) return;
  const bar = document.createElement('div');
  bar.id = 'load-error-banner';
  bar.style.cssText = 'position:sticky;top:0;z-index:9999;background:#A32D2D;color:#fff;'
    + 'padding:10px 14px;font-size:13px;font-weight:700;text-align:center;line-height:1.5;';
  bar.innerHTML = svgIcon('noEntry',14)+' 저장된 데이터를 불러오지 못했어요. 표시된 건 기본 시드 데이터이며 '
    + '<u>저장이 잠겨 있어</u> 덮어쓰기 사고는 일어나지 않아요. 새로고침하면 다시 시도합니다.';
  document.body.prepend(bar);
}
